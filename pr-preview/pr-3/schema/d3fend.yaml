        value: D3-NM
      display-order:
        tag: display-order
        value: '3'
    description: Network mapping encompasses the techniques to identify and model
      the physical layer, network layer, and data exchange layers of the organization's
      network and their physical location, and determine allowed pathways through
      that network.
    title: Network Mapping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Network_topology
    mappings:
