    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BinaryClassification
    title: Binary Classification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BinaryClassification
