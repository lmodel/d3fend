    - Blob
    mappings:
    - d3f:BinaryLargeObject
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BinaryLargeObject
  BinarySegment:
    name: BinarySegment
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BinarySegment
    description: A binary segment is a partition of binary information within a larger
      binary object, which arranges a set of binary objects for its purpose.   For
      example, code, data, heap, and stack segments are segments of the binary information
      used by a process.  Code and data segments are also found in object files.
    title: Binary Segment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BinarySegment
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BinarySegment
  BiometricAuthentication:
