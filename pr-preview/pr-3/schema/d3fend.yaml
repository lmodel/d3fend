      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SJA
      synonym:
        tag: synonym
        value: Scheduled Job Execution
      kb-article:
        tag: kb-article
        value: '## How it works Scheduled job execution can be utilized by adversaries
          for the purpose of persistence, conducting remote execution, or gaining
          privileges. Details of a scheduled job such as associated source files,
          processes, destination files, or destination servers are first identified
          and analyze'
