    class_uri: d3f:LegacySystem
  LevenshteinMatching:
    name: LevenshteinMatching
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LevenshteinMatching
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
