    class_uri: d3f:BinaryClassification
  BinaryLargeObject:
    name: BinaryLargeObject
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BinaryLargeObject
    description: A binary large object (BLOB) is a collection of binary data stored
      as a single entity. Blobs are typically images, audio or other multimedia objects,
      though sometimes binary executable code is stored as a blob.
    title: Binary Large Object
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Binary_large_object
    aliases:
