  DNSServer:
    name: DNSServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DNSServer
    description: 'A Domain Name System (DNS) name server is a kind of name server.  Domain
      names are one of the two principal namespaces of the Internet. The most important
      function of DNS servers is the translation (resolution) of human-memorable domain
      names and hostnames into the corresponding numeric Internet Protocol (IP) addresses,
      the second principal name space of the Internet which is used to identify and
      locate computer systems and resources on the Internet. (en).


      More generally, a name server is a computer application that implements a network
      service for providing responses to queries against a directory service. It translates
      an often humanly meaningful, text-based identifier to a system-internal, often
      numeric identification or addressing component. This service is performed by
      the server in response to a service protocol request.'
    title: DNS Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Name_server
    mappings:
    - d3f:DNSServer
    is_a: Server
