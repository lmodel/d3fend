    title: System Init Configuration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Autoruns
    mappings:
    - d3f:SystemInitConfiguration
    is_a: OperatingSystemConfigurationComponent
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SystemInitConfiguration
  SystemInitProcess:
    name: SystemInitProcess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemInitProcess
