    annotations:
      attack-id:
        tag: attack-id
        value: T1053.001
    description: 'Adversaries may abuse the [at](https://attack.mitre.org/software/S0110)
      utility to perform task scheduling for initial, recurring, or future execution
      of malicious code. The [at](https://attack.mitre.org/software/S0110) command
      within Linux operating systems enables administrators to schedule tasks.(Citation:
      Kifarunix - Task Scheduling in Linux)'
    title: At (Linux) Execution
    comments:
    - This technique has been revoked by T1053.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
