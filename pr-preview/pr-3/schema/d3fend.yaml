        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-KNN
      kb-article:
        tag: kb-article
        value: '## **How it works** The goal of the k-nearest neighbor algorithm is
          to identify the nearest neighbors of a given query point, so that we can
          assign a class label to that point. To determine which data points are closest
          to a given query point, the distance between the query point and the other
          data'
    description: The k-nearest neighbors algorithm, also known as KNN or k-NN, is
      a non-parametric, supervised learning classifier, which uses proximity to make
      classifications or predictions about the grouping of an individual data point.
    title: K-Nearest Neighbors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
