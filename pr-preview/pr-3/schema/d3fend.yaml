        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SSC
      kb-article:
        tag: kb-article
        value: '## How it works This technique compares the call stack stored in system
          memory with the shadow call stack maintained in the cache memory of the
          processor. Mismatches between the two are compared since a return oriented
          programming attack may only be able to control or spoof the call stack and
          not t'
    description: Comparing a call stack in system memory with a shadow call stack
      maintained by the processor to determine unauthorized shellcode activity.
    title: Shadow Stack Comparisons
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ShadowStackComparisons
    related_mappings:
    - attack:T1068
    - attack:T1203
    - attack:T1210
    - attack:T1211
    - attack:T1212
    broad_mappings:
    - d3f:CredentialAccessTechnique
    - d3f:DefenseEvasionTechnique
    - d3f:ExecutionTechnique
    - d3f:LateralMovementTechnique
    - d3f:PrivilegeEscalationTechnique
    is_a: ProcessAnalysis
    class_uri: d3f:ShadowStackComparisons
