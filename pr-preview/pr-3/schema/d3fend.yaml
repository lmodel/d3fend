    mappings:
    - d3f:OperationalRiskAssessment
    is_a: OperationalActivityMapping
    class_uri: d3f:OperationalRiskAssessment
  OperationsCenterComputer:
    name: OperationsCenterComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperationsCenterComputer
    description: 'Mainframe computers or mainframes (colloquially referred to as "big
      iron") are computers used primarily by large organizations for critical applications;
      bulk data processing, such as census, industry and consumer statistics, and
      enterprise resource planning; and transaction processing. They are larger and
      have more processing power than some other classes of computers: minicomputers,
      servers, workstations, and personal computers.'
    title: Operations Center Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Time-sharing
    - http://dbpedia.org/resource/Mainframe_computer
    aliases:
    - Mainframe
    mappings:
    - d3f:OperationsCenterComputer
    is_a: SharedComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OperationsCenterComputer
  OpticalDiscImage:
    name: OpticalDiscImage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OpticalDiscImage
    description: An optical disc image (or ISO image, from the ISO 9660 file system
      used with CD-ROM media) is a disk image that contains everything that would
      be written to an optical disc, disk sector by disc sector, including the optical
      disc file system.
    title: Optical Disc Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Optical_disc_image
    - https://en.wikipedia.org/wiki/Optical_disc_image
    mappings:
    - d3f:OpticalDiscImage
    is_a: DiskImage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OpticalDiscImage
  OpticalModem:
    name: OpticalModem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OpticalModem
    description: A modem that connects to a fiber optic network is known as an optical
      network terminal (ONT) or optical network unit (ONU). These are commonly used
      in fiber to the home installations, installed inside or outside a house to convert
      the optical medium to a copper Ethernet interface, after which a router or gateway
      is often installed to perform authentication, routing, NAT, and other typical
      consumer internet functions, in addition to "triple play" features such as telephony
      and television service.
    title: Optical Modem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Modem#Optical_modem
    mappings:
    - d3f:OpticalModem
    is_a: Modem
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OpticalModem
  OrchestrationController:
    name: OrchestrationController
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OrchestrationController
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An orchestration server provides orchestration services that automate
