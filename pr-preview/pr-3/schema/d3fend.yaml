          Persistence consists of techniques that adversaries use to keep access to
          systems across restarts, changed credentials, and other interruptions that
          could cut off their access. Techniques used for persistence often involve
          leaving behind modified ML artifacts such as poisoned training data or manipulated
          AI models.
      AML_TA0007:
        text: AML_TA0007
        description: Defense Evasion
        meaning: d3f:AML.TA0007
        notes:
