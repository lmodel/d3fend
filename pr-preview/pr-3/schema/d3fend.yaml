    description: Bayesian analysis is a statistical procedure which endeavors to estimate
      parameters of an underlying distribution based on the observed distribution.
    title: Bayesian Method
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BayesianMethod
    is_a: StatisticalMethod
    class_uri: d3f:BayesianMethod
  BayesianModelAveraging:
    name: BayesianModelAveraging
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BayesianModelAveraging
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BMA
      kb-article:
        tag: kb-article
        value: '## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning).
          Bayesian model average: A parameter estimation approach to model agnostic
          ensemble learning. (2019). Journal of Machine Learning for Modeling and
          Computing, 1(2), 61-70. [Link](https://journals.sa'
    description: A parameter estimate (or a prediction of new observations) obtained
      by averaging the estimates (or predictions) of the different models under consideration,
      each weighted by its model probability.
    title: Bayesian Model Averaging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BayesianModelAveraging
    is_a: EnsembleLearning
    class_uri: d3f:BayesianModelAveraging
  BayesianModelCombination:
    name: BayesianModelCombination
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BayesianModelCombination
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BMC
      kb-article:
        tag: kb-article
        value: '## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning).
          Shultz, K. M., & Peterson, L. E. (2011). Model-averaged confidence intervals
          for ensemble learning. In *International Joint Conference on Neural Networks*
          (pp. 2677-2684). [Link](https://axon.cs.b'
    description: Bayesian model combination (BMC) is an algorithmic correction to
      Bayesian model averaging (BMA). Instead of sampling each model in the ensemble
      individually, it samples from the space of possible ensembles (with model weights
      drawn randomly from a Dirichlet distribution having uniform parameters)
    title: Bayesian Model Combination
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BayesianModelCombination
    is_a: EnsembleLearning
    class_uri: d3f:BayesianModelCombination
  BinaryClassification:
