        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SEM
      kb-article:
        tag: kb-article
        value: '## References 1. String-searching algorithm. (2023, April 8). In _Wikipedia_.
          [Link](https://en.wikipedia.org/wiki/String-searching_algorithm) 2. Types
          of Equality. (2007, March 2). In _WikiWikiWeb_. [Link](https://wiki.c2.com/?TypesOfEquality)'
    description: String equivalence matching is a type of string pattern matching
      which is exact; that is, the strings being compared must have the same value
      for each character in their sequence and be of the same length.
    title: String Equivalence Matching
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:StringEquivalenceMatching
