  Switch:
    name: Switch
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Switch
    description: A network switch (also called switching hub, bridging hub, and by
      the IEEE MAC bridge) is networking hardware that connects devices on a computer
      network by using packet switching to receive and forward data to the destination
      device. A network switch is a multiport network bridge that uses MAC addresses
      to forward data at the data link layer (layer 2) of the OSI model. Some switches
      can also forward data at the network layer (layer 3) by additionally incorporating
      routing functionality. Such switches are commonly known as layer-3 switches
      or multilayer switches.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Network_switch
    aliases:
    - Bridging Hub
    - MAC Bridge
    - Network Switch
    - Switching Hub
    mappings:
    - d3f:Switch
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Switch
  SymbolicAI:
    name: SymbolicAI
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SymbolicAI
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SR
      synonym:
        tag: synonym
        value: Symbolic Artificial Intelligence
      kb-article:
        tag: kb-article
        value: '## How it works Symbolic artificial intelligence is used in tools
          such as logic programming, production rules, semantic nets and frames, and
          it developed applications such as knowledge-based systems (in particular,
          expert systems), symbolic mathematics, automated theorem provers, ontologies,
          the sem'
    description: Symbolic artificial intelligence is the term for the collection of
      all methods in artificial intelligence that are based on high-level symbolic
      (human-readable) representations of problems, logic, and search.
    title: Symbolic AI
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SymbolicAI
    is_a: SymbolicLogic
    class_uri: d3f:SymbolicAI
  SymbolicLink:
    name: SymbolicLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SymbolicLink
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A symbolic link (also symlink or soft link) is a term for any file
      that contains a reference to another file or directory in the form of an absolute
      or relative path and that affects pathname resolution.
    title: Symbolic Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Symbolic_link
    aliases:
    - Soft Link
    - Softlink
    - Symlink
    mappings:
    - d3f:SymbolicLink
    exact_mappings:
    - unified_cyber_ontology:SymbolicLink
    is_a: File
    mixins:
    - FileSystemLink
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SymbolicLink
  SymbolicLogic:
    name: SymbolicLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SymbolicLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SL
      kb-article:
        tag: kb-article
        value: '## How it Works ## References 1. Symbolic Logic. (2023, June 6). In
          _Wolfram Mathworld_. [Link](https://mathworld.wolfram.com/SymbolicLogic.html)
          2. Hughes, G. and Schagrin, M. (2023, Apr 19). Formal Logic. _Encyclopedia
          Brittanica_. [Link](https://www.britannica.com/topic/formal-logic) 3. Carnap,'
    description: Symbolic Logic, also known as formal logic, is a branch of mathematics
      that uses symbolic representations for logical expressions and relationships.
      It provides a systematic method for examining the structure of arguments and
      reasoning, focusing on the relationships between propositions rather than the
      content of those propositions.
    title: Symbolic Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SymbolicLogic
    is_a: AnalyticTechnique
    class_uri: d3f:SymbolicLogic
  SymmetricFeature_basedTransferLearning:
    name: SymmetricFeature_basedTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SymmetricFeatureBasedTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SFTL
      kb-article:
        tag: kb-article
        value: '## References Day, O., & Khoshgoftaar, T.M. (2017). A survey on heterogeneous
          transfer learning. *Journal of Big Data, 4*(1), 29. [Link](https://doi.org/10.1186/s40537-017-0089-0).'
    description: Homogeneous symmetric transformation takes both the source feature
      space Xs and target feature space Xt and learns feature transformations as to
      project each onto a common subspace Xc for adaptation purposes. This derived
      subspace becomes a domain-invariant feature subspace to associate cross-domain
      data, and in effect, reduces marginal distribution differences.
    title: Symmetric Feature-based Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - SymmetricFeature-basedTransferLearning
    mappings:
    - d3f:SymmetricFeature-basedTransferLearning
    is_a: HomogenousTransferLearning
    class_uri: d3f:SymmetricFeature-basedTransferLearning
  SymmetricKey:
    name: SymmetricKey
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SymmetricKey
    description: A symmetric key is a single key used for both encryption and decryption
      and used with a symmetric-key algorithm. Symmetric-key algorithms are algorithms
      for cryptography that use the same cryptographic keys for both encryption of
      plaintext and decryption of ciphertext. The keys may be identical or there may
      be a simple transformation to go between the two keys. The keys, in practice,
      represent a shared secret between two or more parties that can be used to maintain
      a private information link. This requirement that both parties have access to
      the secret key is one of the main drawbacks of symmetric key encryption, in
      comparison to public-key encrytption (also known as asymmetric key encryption).
    title: Symmetric Key
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Symmetric-key_algorithm
    mappings:
    - d3f:SymmetricKey
    is_a: CryptographicKey
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SymmetricKey
