  NetworkResource:
    name: NetworkResource
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkResource
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a shared resource, or network share, is a computer
      resource made available from one host to other hosts on a computer network.
      It is a device or piece of information on a computer that can be remotely accessed
      from another computer, typically via a local area network or an enterprise intranet,
      transparently as if it were a resource in the local machine.Network sharing
      is made possible by inter-process communication over the network.
    title: Network Resource
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Shared_resource
    aliases:
    - Shared Resource
    mappings:
    - d3f:NetworkResource
    is_a: RemoteResource
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkResource
  NetworkResourceAccess:
    name: NetworkResourceAccess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkResourceAccess
    annotations:
      owl_named_individual:
