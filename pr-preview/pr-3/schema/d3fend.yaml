  TPMBootIntegrity:
    name: TPMBootIntegrity
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TPMBootIntegrity
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-TBI
      synonym:
        tag: synonym
        value: STRM
      kb-article:
        tag: kb-article
        value: '## How it works During the boot process, the BIOS boot block (which
          with this defense enabled, is the Core Root of Trust for Measurement) measures
          boot components (firmware, ROM). The TPM hashes those measurements and stores
          the hashes in Platform Configuration Registers (PCRs). Upon a subsequent
          b'
    description: Assuring the integrity of a platform by demonstrating that the boot
      process starts from a trusted combination of hardware and software and continues
      until the operating system has fully booted and applications are running.  Sometimes
      called Static Root of Trust Measurement (STRM).
    title: TPM Boot Integrity
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TPMBootIntegrity
    is_a: PlatformHardening
    class_uri: d3f:TPMBootIntegrity
  TabletComputer:
    name: TabletComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TabletComputer
    description: A tablet computer, commonly shortened to tablet, is a mobile device,
      typically with a mobile operating system and touchscreen display processing
      circuitry, and a rechargeable battery in a single, thin and flat package. Tablets,
      being computers, do what other personal computers do, but lack some input/output
      (I/O) abilities that others have. Modern tablets largely resemble modern smartphones,
      the only differences being that tablets are relatively larger than smartphones,
      with screens 7 inches (18 cm) or larger, measured diagonally, and may not support
      access to a cellular network.
    title: Tablet Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Tablet_computer
    aliases:
