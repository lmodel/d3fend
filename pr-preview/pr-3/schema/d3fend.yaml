  Software_definedRadio:
    name: Software_definedRadio
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadio
    annotations:
      synonym:
        tag: synonym
        value: SDR
    description: Software-defined radio (SDR) is a radio communication system where
      components that conventionally have been implemented in analog hardware (e.g.
      mixers, filters, amplifiers, modulators/demodulators, detectors, etc.) are instead
      implemented by means of software on a computer or embedded system.
    title: Software-defined Radio
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Software-defined_radio
    aliases:
    - Software-definedRadio
    mappings:
    - d3f:Software-definedRadio
    is_a: HardwareDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Software-definedRadio
  Software_definedRadioComputer:
    name: Software_definedRadioComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioComputer
    annotations:
      synonym:
        tag: synonym
        value: Standalone SDR
    description: An embedded computer that includes a self-contained radio system,
      onboard compute (e.g., SoC/CPU/DSP/FPGA), and software/firmware sufficient to
      run waveforms and manage RF functions without requiring a continuously attached
      host PC. It typically exposes control and data via network or other external
      interfaces and may run an embedded OS.
    title: Software-Defined Radio Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://satsearch.co/products/alenspace-totem-software-defined-radio-sdr
    aliases:
    - Software-definedRadioComputer
    mappings:
    - d3f:Software-definedRadioComputer
    is_a: OTEmbeddedComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Software-definedRadioComputer
  Software_definedRadioConfiguration:
    name: Software_definedRadioConfiguration
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioConfiguration
    description: The physical radio hardware parameters used by a software-defined
      radio (SDR), including center frequency, bandwidth, gain settings, antenna selection,
      ADC/DAC sample rates, filter characteristics, power output, and others.
    title: Software-defined Radio Configuration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.analog.com/media/en/training-seminars/design-handbooks/Software-Defined-Radio-for-Engineers-2018/SDR4Engineers.pdf
    aliases:
    - Software-definedRadioConfiguration
    mappings:
    - d3f:Software-definedRadioConfiguration
    is_a: HardwareDeviceConfiguration
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Software-definedRadioConfiguration
  Software_definedRadioDevice:
    name: Software_definedRadioDevice
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioDevice
    annotations:
      synonym:
        tag: synonym
        value: Peripheral SDR
    description: A hardware device that functions primarily as an RF front end plus
      data conversion and transport, relying on an external host computer to run most
      waveform/DSP processing and to control operation. It is commonly connected via
      USB, PCIe, or similar links and behaves like a high-speed radio peripheral.
    title: Software-Defined Radio Device
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Software-defined_radio#RTL-SDR
    aliases:
    - Software-definedRadioDevice
    mappings:
    - d3f:Software-definedRadioDevice
    is_a: Software_definedRadio
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Software-definedRadioDevice
  Software_definedRadioEvent:
    name: Software_definedRadioEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioEvent
    annotations:
      synonym:
        tag: synonym
        value: SDR Event
    description: An event involving a software-defined radio (SDR) device indicating
      that the SDR's lifecycle state, operational state, configuration, data-streaming
      status, timing/reference status, or fault condition has changed.
    title: Software-defined Radio Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Software-definedRadioEvent
    mappings:
    - d3f:Software-definedRadioEvent
    is_a: DigitalEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:Software-definedRadioEvent
  Software_definedRadioRFStateChangeEvent:
    name: Software_definedRadioRFStateChangeEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioRFStateChangeEvent
    description: A software-defined radio (SDR) event where one or more radio-frequency
      (RF) parameters have been changed in a way that affects reception or emission
      (e.g., center frequency retune, gain/attenuation update, bandwidth/filter selection,
      antenna/port switch, TX enable/disable, etc).
    title: Software-defined Radio RF State Change Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Software-definedRadioRFStateChangeEvent
    mappings:
    - d3f:Software-definedRadioRFStateChangeEvent
    is_a: Software_definedRadioEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:Software-definedRadioRFStateChangeEvent
  Software_definedRadioWaveformApplication:
    name: Software_definedRadioWaveformApplication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioWaveformApplication
    annotations:
      synonym:
        tag: synonym
        value: SDR waveform
    description: A software implementation of a radio waveform that executes on the
      programmable processing elements of a software-defined radio and realizes the
      signal processing functions necessary to transmit and receive a specific radio
      signal. On peripheral SDRs, this can take the form of a compiled flowgraph that
      runs on the host PC, whereas in stand-alone SDRs it may be an FPGA bitstream
      or waveform package that executes on the SDR's processing elements.
    title: Software-defined Radio Waveform Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://ieeexplore.ieee.org/document/5768314
    - https://media.defense.gov/2020/Feb/13/2002249005/-1/-1/1/SCA_4.1_SCASPECIFICATION.PDF
    aliases:
    - Software-definedRadioWaveformApplication
    mappings:
    - d3f:Software-definedRadioWaveformApplication
    is_a: DigitalSignalProcessingApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Software-definedRadioWaveformApplication
  Software_definedRadioWaveformConfigurationEvent:
    name: Software_definedRadioWaveformConfigurationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioWaveformConfigurationEvent
    description: An SDR event where the waveform application's operational parameters
      have been applied and validated (e.g., sample rate, bandwidth, channel selection,
      framing/modulation options), placing the waveform in a state ready to run.
    title: Software-defined Radio Waveform Application Configuration Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Software-definedRadioWaveformConfigurationEvent
    mappings:
    - d3f:Software-definedRadioWaveformConfigurationEvent
    is_a: Software_definedRadioEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:Software-definedRadioWaveformConfigurationEvent
  Software_definedRadioWaveformLoadEvent:
    name: Software_definedRadioWaveformLoadEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDefinedRadioWaveformLoadEvent
    description: An SDR event where a waveform application (software/firmware/FPGA
      image and associated descriptors) has been installed or selected on the SDR
      and is available to be configured.
    title: Software-defined Radio Waveform Application Load Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Software-definedRadioWaveformLoadEvent
    mappings:
    - d3f:Software-definedRadioWaveformLoadEvent
    is_a: Software_definedRadioEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:Software-definedRadioWaveformLoadEvent
  SoftwareArtifactServer:
    name: SoftwareArtifactServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareArtifactServer
    description: A software artifact server provides access to the software artifacts
      in a software repository. A software repository, or "repo" for short, is a storage
      location for software packages. Often a table of contents is stored, as well
      as metadata. Repositories group packages. Sometimes the grouping is for a programming
      language, such as CPAN for the Perl programming language, sometimes for an entire
      operating system, sometimes the license of the contents is the criteria. At
      client side, a package manager helps installing from and updating the repositories.
    title: Software Artifact Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Artifact_(software_development)
    - http://dbpedia.org/resource/Software_repository
    mappings:
    - d3f:SoftwareArtifactServer
    is_a: ArtifactServer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SoftwareArtifactServer
  SoftwareClock:
    name: SoftwareClock
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareClock
    description: A clock implemented in software which may synchronize with hardware
      clocks or external time sources.
    title: Software Clock
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://linux.die.net/sag/hw-sw-clocks.html
    mappings:
    - d3f:SoftwareClock
    is_a: Clock
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SoftwareClock
  SoftwareClockEvent:
    name: SoftwareClockEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareClockEvent
    description: A clock event involving a software-based timekeeping mechanism maintained
      by an operating system or application.
    title: Software Clock Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SoftwareClockEvent
    is_a: ClockEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SoftwareClockEvent
  SoftwareDeploymentTool:
    name: SoftwareDeploymentTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareDeploymentTool
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Software that coordinates the deployment process of software to systems,
      typically remotely.
    title: Software Deployment Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SoftwareDeploymentTool
    is_a: ServiceApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SoftwareDeploymentTool
  SoftwareInventory:
    name: SoftwareInventory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SoftwareInventory
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SWI
      synonym:
        tag: synonym
        value: Software Discovery
      kb-article:
        tag: kb-article
        value: '## How it works Administrators collect information on software items
          in their architecture using a variety of administrative and management tools
          that query network nodes for information. In limited cases, where such queries
          are not supported or provide specific information of interest, an administ'
    description: Software inventorying identifies and records the software items in
