    mappings:
    - d3f:REC-0001
    exact_mappings:
    - attack:REC-0001
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0001
  REC_0001_01:
    name: REC_0001_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000101
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.01
    description: Threat actors may gather information about the victim spacecraft's
      internal software that can be used for future campaigns or to help perpetuate
      other techniques. Information (e.g. source code, binaries, etc.) about commercial,
      open-source, or custom developed software may include a variety of details such
      as types, versions, and memory maps. Leveraging this information threat actors
      may target vendors of operating systems, flight software, or open-source communities
      to embed backdoors or for performing reverse engineering research to support
      offensive cyber operations.
    title: Software Design
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/01/
    aliases:
    - REC-0001.01
    mappings:
    - d3f:REC-0001.01
    exact_mappings:
    - attack:REC-0001.01
    is_a: REC_0001
    class_uri: d3f:REC-0001.01
  REC_0001_02:
    name: REC_0001_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000102
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.02
    description: Threat actors may gather information about the victim spacecraft's
      firmware that can be used for future campaigns or to help perpetuate other techniques.
      Information about the firmware may include a variety of details such as type
      and versions on specific devices, which may be used to infer more information
      (ex. configuration, purpose, age/patch level, etc.). Leveraging this information
      threat actors may target firmware vendors to embed backdoors or for performing
      reverse engineering research to support offensive cyber operations.
    title: Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/02/
    aliases:
    - REC-0001.02
    mappings:
    - d3f:REC-0001.02
    exact_mappings:
    - attack:REC-0001.02
    is_a: REC_0001
    class_uri: d3f:REC-0001.02
  REC_0001_03:
    name: REC_0001_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000103
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.03
    description: Threat actors may gather information about any cryptographic algorithms
      used on the victim spacecraft's that can be used for future campaigns or to
      help perpetuate other techniques. Information about the algorithms can include
      type and private keys. Threat actors may also obtain the authentication scheme
      (i.e., key/password/counter values) and leverage it to establish communications
      for commanding the target spacecraft or any of its subsystems. Some spacecraft
      only require authentication vice authentication and encryption, therefore once
      obtained, threat actors may use any number of means to command the spacecraft
      without needing to go through a legitimate channel. The authentication information
      may be obtained through reconnaissance of the ground system or retrieved from
      the victim spacecraft.
    title: Cryptographic Algorithms
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/03/
    aliases:
    - REC-0001.03
    mappings:
    - d3f:REC-0001.03
    exact_mappings:
    - attack:REC-0001.03
    is_a: REC_0001
    class_uri: d3f:REC-0001.03
  REC_0001_04:
    name: REC_0001_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000104
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.04
    description: 'Threat actors may gather information about the data bus used within
      the victim spacecraft that can be used for future campaigns or to help perpetuate
      other techniques. Information about the data bus can include the make and model
      which could lead to more information (ex. protocol, purpose, controller, etc.),
      as well as locations/addresses of major subsystems residing on the bus.


      Threat actors may also gather information about the bus voltages of the victim
      spacecraft. This information can include optimal power levels, connectors, range,
      and transfer rate.'
    title: Data Bus
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/04/
    aliases:
    - REC-0001.04
    mappings:
    - d3f:REC-0001.04
    exact_mappings:
    - attack:REC-0001.04
    is_a: REC_0001
    class_uri: d3f:REC-0001.04
  REC_0001_05:
    name: REC_0001_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000105
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.05
    description: Threat actors may gather information about the thermal control system
      used with the victim spacecraft that can be used for future campaigns or to
      help perpetuate other techniques. Information gathered can include type, make/model,
      and varies analysis programs that monitor it.
    title: Thermal Control System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/05/
