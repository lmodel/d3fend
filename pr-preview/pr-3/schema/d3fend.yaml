  SystemStateImage:
    name: SystemStateImage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemStateImage
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a system image is a serialized copy of the entire state
      of a computer system stored in some non-volatile form, such as a binary executable
      file.
    title: System State Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/System_Image
    - https://en.wikipedia.org/wiki/System_image
    aliases:
