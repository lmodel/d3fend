    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTFSSymbolicLink
    description: An NTFS symbolic link records the path of another file that the links
      contents should show. Can accept relative paths. SMB networking (UNC path) and
      directory support added in NTFS 3.1.
    title: NTFS Symbolic Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/NTFS_links
