    class_uri: d3f:TimeSeriesDatabase
  Timer:
    name: Timer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Timer
    description: A timer or countdown timer is a type of clock that starts from a
      specified time duration and stops upon reaching 00:00. It can also usually be
      stopped manually before the whole duration has elapsed. An example of a simple
      timer is an hourglass. Commonly, a timer triggers an alarm when it ends. A timer
      can be implemented through hardware or software.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Timer
    mappings:
    - d3f:Timer
    is_a: Clock
    mixins:
    - RuntimeVariable
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Timer
  TimerEvent:
    name: TimerEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimerEvent
    description: An event involving a timer artifact, characterized by the initiation,
      expiration, modification, or cancellation of a countdown or interval-based temporal
      mechanism.
    title: Timer Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimerEvent
    is_a: DigitalEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TimerEvent
  TimerExpirationEvent:
    name: TimerExpirationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimerExpirationEvent
    description: An event in which a software timer reaches its configured duration
      and triggers associated actions (callbacks, interrupts, or signals).
    title: Timer Expiration Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimerExpirationEvent
    is_a: SoftwareTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TimerExpirationEvent
  TimerModificationEvent:
    name: TimerModificationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimerModificationEvent
    description: An event in which the duration or expiration time of an active timer
      is changed.
    title: Timer Modification Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimerModificationEvent
    is_a: SoftwareTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TimerModificationEvent
  TimerSetEvent:
    name: TimerSetEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimerSetEvent
    description: An event in which a software timer is initialized with a specific
      duration or expiration time.
    title: Timer Set Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimerSetEvent
    is_a: SoftwareTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TimerSetEvent
  Token_basedAuthentication:
    name: Token_basedAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TokenBasedAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-TBA
      kb-article:
        tag: kb-article
        value: '## How it works Token-based authentication starts with a user logging
          into a system, device or application, typically using a password or a security
          question. An authorization server validates that initial authentication
          and then issues an access token, which is a small piece of data that lets
          a cl'
    description: "Token-based authentication is an authentication protocol where users\
      \ verify their identity in exchange for a\_unique access token. Users can then\
      \ access the website, application, or resource for the life of the token without\
      \ having to re-enter their credentials."
    title: Token-based Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.entrust.com/resources/learn/what-is-token-based-authentication
    aliases:
    - Token-basedAuthentication
    mappings:
    - d3f:Token-basedAuthentication
    related_mappings:
    - attack:T1134.001
    - attack:T1134.002
    - attack:T1134.003
    - attack:T1528
    - attack:T1550.001
    - attack:T1558
    - attack:T1558.001
    broad_mappings:
    - d3f:CredentialAccessTechnique
    - d3f:T1134
    - d3f:T1550
    - d3f:T1558
    is_a: AgentAuthentication
    class_uri: d3f:Token-basedAuthentication
  TokenBinding:
    name: TokenBinding
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TokenBinding
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-TB
      kb-article:
        tag: kb-article
        value: '## How it works When issuing a security token to a client that supports
          Token Binding, a server includes the client''s Token Binding ID (or its
          cryptographic hash) in the token. Later on, when a client presents a security
          token containing a Token Binding ID, the server verifies that the ID in
          the to'
    description: Token binding is a security mechanism used to enhance the protection
      of tokens, such as cookies or OAuth tokens, by binding them to a specific connection.
    title: Token Binding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Token_Binding
    mappings:
    - d3f:TokenBinding
    related_mappings:
    - attack:T1134.001
    - attack:T1134.002
    - attack:T1134.003
    - attack:T1528
    - attack:T1550.001
    - attack:T1558
    - attack:T1558.001
    broad_mappings:
    - d3f:CredentialAccessTechnique
    - d3f:T1134
    - d3f:T1550
    - d3f:T1558
    is_a: CredentialHardening
    class_uri: d3f:TokenBinding
  TraceProcess:
    name: TraceProcess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TraceProcess
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A trace system call provides a means by which one process (the "tracer")
