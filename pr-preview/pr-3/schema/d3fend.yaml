        value: D3A-IBTL
      kb-article:
        tag: kb-article
        value: '## References Georgian Impact Blog. (n.d.). Transfer Learning Part
          1. [Link](https://medium.com/georgian-impact-blog/transfer-learning-part-1-ed0c174ad6e7#:~:text=Homogeneous%20Transfer%20Learning-,1.,the%20target%20domain%20for%20training).'
