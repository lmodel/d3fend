    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1589
  T1589_001:
    name: T1589_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1589001
    annotations:
      attack-id:
        tag: attack-id
        value: T1589.001
    description: Adversaries may gather credentials that can be used during targeting.
      Account credentials gathered by adversaries may be those directly associated
      with the target victim organization or attempt to take advantage of the tendency
      for users to use the same passwords across personal and business accounts.
    title: Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1589.001
    mappings:
    - d3f:T1589.001
    exact_mappings:
    - attack:T1589.001
    is_a: T1589
    class_uri: d3f:T1589.001
  T1589_002:
    name: T1589_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1589002
    annotations:
      attack-id:
        tag: attack-id
        value: T1589.002
    description: Adversaries may gather email addresses that can be used during targeting.
      Even if internal instances exist, organizations may have public-facing email
      infrastructure and addresses for employees.
    title: Email Addresses
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1589.002
    mappings:
    - d3f:T1589.002
    exact_mappings:
    - attack:T1589.002
    is_a: T1589
    class_uri: d3f:T1589.002
  T1589_003:
    name: T1589_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1589003
    annotations:
      attack-id:
        tag: attack-id
        value: T1589.003
    description: Adversaries may gather employee names that can be used during targeting.
      Employee names be used to derive email addresses as well as to help guide other
      reconnaissance efforts and/or craft more-believable lures.
    title: Employee Names
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1589.003
    mappings:
    - d3f:T1589.003
    exact_mappings:
    - attack:T1589.003
    is_a: T1589
    class_uri: d3f:T1589.003
  T1590:
    name: T1590
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590
    annotations:
      attack-id:
        tag: attack-id
        value: T1590
    description: 'Adversaries may gather information about the victim''s networks
      that can be used during targeting. Information about networks may include a
      variety of details, including administrative data (ex: IP ranges, domain names,
      etc.) as well as specifics regarding its topology and operations.'
    title: Gather Victim Network Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1590
    exact_mappings:
    - attack:T1590
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1590
  T1590_001:
    name: T1590_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590001
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.001
    description: 'Adversaries may gather information about the victim''s network domain(s)
      that can be used during targeting. Information about domains and their properties
      may include a variety of details, including what domain(s) the victim owns as
      well as administrative data (ex: name, registrar, etc.) and more directly actionable
      information such as contacts (email addresses and phone numbers), business addresses,
      and name servers.'
    title: Domain Properties
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.001
    mappings:
    - d3f:T1590.001
    exact_mappings:
    - attack:T1590.001
    is_a: T1590
    class_uri: d3f:T1590.001
  T1590_002:
    name: T1590_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590002
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.002
    description: "Adversaries may gather information about the victim's DNS that can\
      \ be used during targeting. DNS information may include a variety of details,\
      \ including registered name servers as well as records that outline addressing\
      \ for a target\u2019s subdomains, mail servers, and other hosts. DNS, MX, TXT,\
      \ and SPF records may also reveal the use of third party cloud and SaaS providers,\
      \ such as Office 365, G Suite, Salesforce, or Zendesk.(Citation: Sean Metcalf\
      \ Twitter DNS Records)"
    title: DNS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.002
    mappings:
    - d3f:T1590.002
    exact_mappings:
    - attack:T1590.002
    is_a: T1590
    class_uri: d3f:T1590.002
  T1590_003:
    name: T1590_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590003
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.003
    description: 'Adversaries may gather information about the victim''s network trust
      dependencies that can be used during targeting. Information about network trusts
      may include a variety of details, including second or third-party organizations/domains
      (ex: managed service providers, contractors, etc.) that have connected (and
      potentially elevated) network access.'
    title: Network Trust Dependencies
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.003
    mappings:
    - d3f:T1590.003
    exact_mappings:
    - attack:T1590.003
    is_a: T1590
    class_uri: d3f:T1590.003
  T1590_004:
    name: T1590_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590004
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.004
    description: Adversaries may gather information about the victim's network topology
      that can be used during targeting. Information about network topologies may
      include a variety of details, including the physical and/or logical arrangement
      of both external-facing and internal network environments. This information
      may also include specifics regarding network devices (gateways, routers, etc.)
      and other infrastructure.
    title: Network Topology
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.004
    mappings:
    - d3f:T1590.004
    exact_mappings:
    - attack:T1590.004
    is_a: T1590
    class_uri: d3f:T1590.004
  T1590_005:
    name: T1590_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590005
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.005
    description: Adversaries may gather the victim's IP addresses that can be used
      during targeting. Public IP addresses may be allocated to organizations by block,
      or a range of sequential addresses. Information about assigned IP addresses
      may include a variety of details, such as which IP addresses are in use. IP
      addresses may also enable an adversary to derive other details about a victim,
      such as organizational size, physical location(s), Internet service provider,
      and or where/how their publicly-facing infrastructure is hosted.
    title: IP Addresses
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.005
    mappings:
    - d3f:T1590.005
    exact_mappings:
    - attack:T1590.005
    is_a: T1590
    class_uri: d3f:T1590.005
  T1590_006:
    name: T1590_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1590006
    annotations:
      attack-id:
        tag: attack-id
        value: T1590.006
    description: Adversaries may gather information about the victim's network security
      appliances that can be used during targeting. Information about network security
      appliances may include a variety of details, such as the existence and specifics
      of deployed firewalls, content filters, and proxies/bastion hosts. Adversaries
      may also target information about victim network-based intrusion detection systems
      (NIDS) or other appliances related to defensive cybersecurity operations.
    title: Network Security Appliances
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1590.006
    mappings:
    - d3f:T1590.006
    exact_mappings:
    - attack:T1590.006
    is_a: T1590
    class_uri: d3f:T1590.006
  T1591:
    name: T1591
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1591
    annotations:
      attack-id:
        tag: attack-id
        value: T1591
    description: Adversaries may gather information about the victim's organization
      that can be used during targeting. Information about an organization may include
      a variety of details, including the names of divisions/departments, specifics
      of business operations, as well as the roles and responsibilities of key employees.
    title: Gather Victim Org Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1591
    exact_mappings:
    - attack:T1591
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1591
  T1591_001:
    name: T1591_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1591001
    annotations:
      attack-id:
        tag: attack-id
        value: T1591.001
    description: Adversaries may gather the victim's physical location(s) that can
      be used during targeting. Information about physical locations of a target organization
      may include a variety of details, including where key resources and infrastructure
      are housed. Physical locations may also indicate what legal jurisdiction and/or
      authorities the victim operates within.
    title: Determine Physical Locations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1591.001
    mappings:
    - d3f:T1591.001
    exact_mappings:
    - attack:T1591.001
    is_a: T1591
    class_uri: d3f:T1591.001
  T1591_002:
    name: T1591_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1591002
    annotations:
      attack-id:
        tag: attack-id
        value: T1591.002
    description: "Adversaries may gather information about the victim's business relationships\
      \ that can be used during targeting. Information about an organization\u2019\
      s business relationships may include a variety of details, including second\
      \ or third-party organizations/domains (ex: managed service providers, contractors,\
      \ etc.) that have connected (and potentially elevated) network access. This\
      \ information may also reveal supply chains and shipment paths for the victim\u2019\
      s hardware and software resources."
    title: Business Relationships
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1591.002
    mappings:
    - d3f:T1591.002
    exact_mappings:
    - attack:T1591.002
    is_a: T1591
    class_uri: d3f:T1591.002
  T1591_003:
    name: T1591_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1591003
    annotations:
      attack-id:
        tag: attack-id
        value: T1591.003
    description: "Adversaries may gather information about the victim's business tempo\
      \ that can be used during targeting. Information about an organization\u2019\
      s business tempo may include a variety of details, including operational hours/days\
      \ of the week. This information may also reveal times/dates of purchases and\
      \ shipments of the victim\u2019s hardware and software resources."
    title: Identify Business Tempo
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1591.003
    mappings:
    - d3f:T1591.003
    exact_mappings:
    - attack:T1591.003
    is_a: T1591
    class_uri: d3f:T1591.003
  T1591_004:
    name: T1591_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1591004
    annotations:
      attack-id:
        tag: attack-id
        value: T1591.004
    description: Adversaries may gather information about identities and roles within
      the victim organization that can be used during targeting. Information about
      business roles may reveal a variety of targetable details, including identifiable
      information for key personnel as well as what data/resources they have access
      to.
    title: Identify Roles
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1591.004
    mappings:
    - d3f:T1591.004
    exact_mappings:
    - attack:T1591.004
    is_a: T1591
    class_uri: d3f:T1591.004
  T1592:
    name: T1592
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1592
    annotations:
      attack-id:
        tag: attack-id
        value: T1592
    description: 'Adversaries may gather information about the victim''s hosts that
      can be used during targeting. Information about hosts may include a variety
      of details, including administrative data (ex: name, assigned IP, functionality,
      etc.) as well as specifics regarding its configuration (ex: operating system,
      language, etc.).'
    title: Gather Victim Host Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1592
    exact_mappings:
    - attack:T1592
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1592
  T1592_001:
    name: T1592_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1592001
    annotations:
      attack-id:
        tag: attack-id
        value: T1592.001
    description: 'Adversaries may gather information about the victim''s host hardware
      that can be used during targeting. Information about hardware infrastructure
      may include a variety of details such as types and versions on specific hosts,
      as well as the presence of additional components that might be indicative of
      added defensive protections (ex: card/biometric readers, dedicated encryption
      hardware, etc.).'
    title: Hardware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1592.001
    mappings:
    - d3f:T1592.001
    exact_mappings:
    - attack:T1592.001
    is_a: T1592
    class_uri: d3f:T1592.001
  T1592_002:
    name: T1592_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1592002
    annotations:
      attack-id:
        tag: attack-id
        value: T1592.002
    description: 'Adversaries may gather information about the victim''s host software
      that can be used during targeting. Information about installed software may
      include a variety of details such as types and versions on specific hosts, as
      well as the presence of additional components that might be indicative of added
      defensive protections (ex: antivirus, SIEMs, etc.).'
    title: Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1592.002
    mappings:
    - d3f:T1592.002
    exact_mappings:
    - attack:T1592.002
    is_a: T1592
    class_uri: d3f:T1592.002
  T1592_003:
    name: T1592_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1592003
    annotations:
      attack-id:
        tag: attack-id
        value: T1592.003
    description: 'Adversaries may gather information about the victim''s host firmware
      that can be used during targeting. Information about host firmware may include
      a variety of details such as type and versions on specific hosts, which may
      be used to infer more information about hosts in the environment (ex: configuration,
      purpose, age/patch level, etc.).'
    title: Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1592.003
    mappings:
    - d3f:T1592.003
    exact_mappings:
    - attack:T1592.003
    is_a: T1592
    class_uri: d3f:T1592.003
  T1592_004:
    name: T1592_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1592004
    annotations:
      attack-id:
        tag: attack-id
        value: T1592.004
    description: 'Adversaries may gather information about the victim''s client configurations
      that can be used during targeting. Information about client configurations may
      include a variety of details and settings, including operating system/version,
      virtualization, architecture (ex: 32 or 64 bit), language, and/or time zone.'
    title: Client Configurations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1592.004
    mappings:
    - d3f:T1592.004
    exact_mappings:
    - attack:T1592.004
    is_a: T1592
    class_uri: d3f:T1592.004
  T1593:
    name: T1593
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1593
    annotations:
      attack-id:
        tag: attack-id
        value: T1593
    description: 'Adversaries may search freely available websites and/or domains
      for information about victims that can be used during targeting. Information
      about victims may be available in various online sites, such as social media,
      new sites, or those hosting information about business operations such as hiring
      or requested/rewarded contracts.(Citation: Cyware Social Media)(Citation: SecurityTrails
      Google Hacking)(Citation: ExploitDB GoogleHacking)'
    title: Search Open Websites/Domains
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1593
    exact_mappings:
    - attack:T1593
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1593
  T1593_001:
    name: T1593_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1593001
    annotations:
      attack-id:
        tag: attack-id
        value: T1593.001
    description: Adversaries may search social media for information about victims
      that can be used during targeting. Social media sites may contain various information
      about a victim organization, such as business announcements as well as information
      about the roles, locations, and interests of staff.
    title: Social Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1593.001
    mappings:
    - d3f:T1593.001
    exact_mappings:
    - attack:T1593.001
    is_a: T1593
    class_uri: d3f:T1593.001
  T1593_002:
    name: T1593_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1593002
    annotations:
      attack-id:
        tag: attack-id
        value: T1593.002
    description: 'Adversaries may use search engines to collect information about
      victims that can be used during targeting. Search engine services typical crawl
      online sites to index context and may provide users with specialized syntax
      to search for specific keywords or specific types of content (i.e. filetypes).(Citation:
      SecurityTrails Google Hacking)(Citation: ExploitDB GoogleHacking)'
    title: Search Engines
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1593.002
    mappings:
    - d3f:T1593.002
    exact_mappings:
    - attack:T1593.002
    is_a: T1593
    class_uri: d3f:T1593.002
  T1593_003:
    name: T1593_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1593003
    annotations:
      attack-id:
        tag: attack-id
        value: T1593.003
    description: Adversaries may search public code repositories for information about
      victims that can be used during targeting. Victims may store code in repositories
      on various third-party websites such as GitHub, GitLab, SourceForge, and BitBucket.
      Users typically interact with code repositories through a web application or
      command-line utilities such as git.
    title: Code Repositories
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1593.003
    mappings:
    - d3f:T1593.003
    exact_mappings:
    - attack:T1593.003
    is_a: T1593
    class_uri: d3f:T1593.003
  T1594:
    name: T1594
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1594
    annotations:
      attack-id:
        tag: attack-id
        value: T1594
    description: 'Adversaries may search websites owned by the victim for information
      that can be used during targeting. Victim-owned websites may contain a variety
      of details, including names of departments/divisions, physical locations, and
      data about key employees such as names, roles, and contact info (ex: [Email
      Addresses](https://attack.mitre.org/techniques/T1589/002)). These sites may
      also have details highlighting business operations and relationships.(Citation:
      Comparitech Leak)'
    title: Search Victim-Owned Websites
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1594
    exact_mappings:
    - attack:T1594
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1594
  T1595:
    name: T1595
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1595
    annotations:
      attack-id:
        tag: attack-id
        value: T1595
    description: Adversaries may execute active reconnaissance scans to gather information
      that can be used during targeting. Active scans are those where the adversary
      probes victim infrastructure via network traffic, as opposed to other forms
      of reconnaissance that do not involve direct interaction.
    title: Active Scanning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1595
    exact_mappings:
    - attack:T1595
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1595
  T1595_001:
    name: T1595_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1595001
    annotations:
      attack-id:
        tag: attack-id
        value: T1595.001
    description: Adversaries may scan victim IP blocks to gather information that
      can be used during targeting. Public IP addresses may be allocated to organizations
      by block, or a range of sequential addresses.
    title: Scanning IP Blocks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1595.001
    mappings:
    - d3f:T1595.001
    exact_mappings:
    - attack:T1595.001
    is_a: T1595
    class_uri: d3f:T1595.001
  T1595_002:
    name: T1595_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1595002
    annotations:
      attack-id:
        tag: attack-id
        value: T1595.002
    description: 'Adversaries may scan victims for vulnerabilities that can be used
      during targeting. Vulnerability scans typically check if the configuration of
      a target host/application (ex: software and version) potentially aligns with
      the target of a specific exploit the adversary may seek to use.'
    title: Vulnerability Scanning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1595.002
    mappings:
    - d3f:T1595.002
    exact_mappings:
    - attack:T1595.002
    is_a: T1595
    class_uri: d3f:T1595.002
  T1595_003:
    name: T1595_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1595003
    annotations:
      attack-id:
        tag: attack-id
        value: T1595.003
    description: 'Adversaries may iteratively probe infrastructure using brute-forcing
      and crawling techniques. While this technique employs similar methods to [Brute
      Force](https://attack.mitre.org/techniques/T1110), its goal is the identification
      of content and infrastructure rather than the discovery of valid credentials.
      Wordlists used in these scans may contain generic, commonly used names and file
      extensions or terms specific to a particular software. Adversaries may also
      create custom, target-specific wordlists using data gathered from other Reconnaissance
      techniques (ex: [Gather Victim Org Information](https://attack.mitre.org/techniques/T1591),
      or [Search Victim-Owned Websites](https://attack.mitre.org/techniques/T1594)).'
    title: Wordlist Scanning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1595.003
    mappings:
    - d3f:T1595.003
    exact_mappings:
    - attack:T1595.003
    is_a: T1595
    class_uri: d3f:T1595.003
  T1596:
    name: T1596
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596
    annotations:
      attack-id:
        tag: attack-id
        value: T1596
    description: 'Adversaries may search freely available technical databases for
      information about victims that can be used during targeting. Information about
      victims may be available in online databases and repositories, such as registrations
      of domains/certificates as well as public collections of network data/artifacts
      gathered from traffic and/or scans.(Citation: WHOIS)(Citation: DNS Dumpster)(Citation:
      Circl Passive DNS)(Citation: Medium SSL Cert)(Citation: SSLShopper Lookup)(Citation:
      DigitalShadows CDN)(Citation: Shodan)'
    title: Search Open Technical Databases
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1596
    exact_mappings:
    - attack:T1596
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1596
  T1596_001:
    name: T1596_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596001
    annotations:
      attack-id:
        tag: attack-id
        value: T1596.001
    description: "Adversaries may search DNS data for information about victims that\
      \ can be used during targeting. DNS information may include a variety of details,\
      \ including registered name servers as well as records that outline addressing\
      \ for a target\u2019s subdomains, mail servers, and other hosts."
    title: DNS/Passive DNS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1596.001
    mappings:
    - d3f:T1596.001
    exact_mappings:
    - attack:T1596.001
    is_a: T1596
    class_uri: d3f:T1596.001
  T1596_002:
    name: T1596_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596002
    annotations:
      attack-id:
        tag: attack-id
        value: T1596.002
    description: 'Adversaries may search public WHOIS data for information about victims
      that can be used during targeting. WHOIS data is stored by regional Internet
      registries (RIR) responsible for allocating and assigning Internet resources
      such as domain names. Anyone can query WHOIS servers for information about a
      registered domain, such as assigned IP blocks, contact information, and DNS
      nameservers.(Citation: WHOIS)'
    title: WHOIS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1596.002
    mappings:
    - d3f:T1596.002
    exact_mappings:
    - attack:T1596.002
    is_a: T1596
    class_uri: d3f:T1596.002
  T1596_003:
    name: T1596_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596003
    annotations:
      attack-id:
        tag: attack-id
        value: T1596.003
    description: Adversaries may search public digital certificate data for information
      about victims that can be used during targeting. Digital certificates are issued
      by a certificate authority (CA) in order to cryptographically verify the origin
      of signed content. These certificates, such as those used for encrypted web
      traffic (HTTPS SSL/TLS communications), contain information about the registered
      organization such as name and location.
    title: Digital Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1596.003
    mappings:
    - d3f:T1596.003
    exact_mappings:
    - attack:T1596.003
    is_a: T1596
    class_uri: d3f:T1596.003
  T1596_004:
    name: T1596_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596004
    annotations:
      attack-id:
        tag: attack-id
        value: T1596.004
    description: "Adversaries may search content delivery network (CDN) data about\
      \ victims that can be used during targeting. CDNs allow an organization to host\
      \ content from a distributed, load balanced array of servers. CDNs may also\
      \ allow organizations to customize content delivery based on the requestor\u2019\
      s geographical region."
    title: CDNs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1596.004
    mappings:
    - d3f:T1596.004
    exact_mappings:
    - attack:T1596.004
    is_a: T1596
    class_uri: d3f:T1596.004
  T1596_005:
    name: T1596_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1596005
    annotations:
      attack-id:
        tag: attack-id
        value: T1596.005
    description: 'Adversaries may search within public scan databases for information
      about victims that can be used during targeting. Various online services continuously
      publish the results of Internet scans/surveys, often harvesting information
      such as active IP addresses, hostnames, open ports, certificates, and even server
      banners.(Citation: Shodan)'
    title: Scan Databases
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1596.005
    mappings:
    - d3f:T1596.005
    exact_mappings:
    - attack:T1596.005
    is_a: T1596
    class_uri: d3f:T1596.005
  T1597:
    name: T1597
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1597
    annotations:
      attack-id:
        tag: attack-id
        value: T1597
    description: 'Adversaries may search and gather information about victims from
      closed sources that can be used during targeting. Information about victims
      may be available for purchase from reputable private sources and databases,
      such as paid subscriptions to feeds of technical/threat intelligence data.(Citation:
      D3Secutrity CTI Feeds) Adversaries may also purchase information from less-reputable
      sources such as dark web or cybercrime blackmarkets.(Citation: ZDNET Selling
      Data)'
    title: Search Closed Sources
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1597
    exact_mappings:
    - attack:T1597
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1597
  T1597_001:
    name: T1597_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1597001
    annotations:
      attack-id:
        tag: attack-id
        value: T1597.001
    description: 'Adversaries may search private data from threat intelligence vendors
      for information that can be used during targeting. Threat intelligence vendors
      may offer paid feeds or portals that offer more data than what is publicly reported.
      Although sensitive details (such as customer names and other identifiers) may
      be redacted, this information may contain trends regarding breaches such as
      target industries, attribution claims, and successful TTPs/countermeasures.(Citation:
      D3Secutrity CTI Feeds)'
    title: Threat Intel Vendors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1597.001
    mappings:
    - d3f:T1597.001
    exact_mappings:
    - attack:T1597.001
    is_a: T1597
    class_uri: d3f:T1597.001
  T1597_002:
    name: T1597_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1597002
    annotations:
      attack-id:
        tag: attack-id
        value: T1597.002
    description: Adversaries may purchase technical information about victims that
      can be used during targeting. Information about victims may be available for
      purchase within reputable private sources and databases, such as paid subscriptions
      to feeds of scan databases or other data aggregation services. Adversaries may
      also purchase information from less-reputable sources such as dark web or cybercrime
      blackmarkets.
    title: Purchase Technical Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1597.002
    mappings:
    - d3f:T1597.002
    exact_mappings:
    - attack:T1597.002
    is_a: T1597
    class_uri: d3f:T1597.002
  T1598:
    name: T1598
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1598
    annotations:
      attack-id:
        tag: attack-id
        value: T1598
    description: Adversaries may send phishing messages to elicit sensitive information
      that can be used during targeting. Phishing for information is an attempt to
      trick targets into divulging information, frequently credentials or other actionable
      information. Phishing for information is different from [Phishing](https://attack.mitre.org/techniques/T1566)
      in that the objective is gathering data from the victim rather than executing
      malicious code.
    title: Phishing for Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1598
    exact_mappings:
    - attack:T1598
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1598
  T1598_001:
    name: T1598_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1598001
    annotations:
      attack-id:
        tag: attack-id
        value: T1598.001
    description: 'Adversaries may send spearphishing messages via third-party services
      to elicit sensitive information that can be used during targeting. Spearphishing
      for information is an attempt to trick targets into divulging information, frequently
      credentials or other actionable information. Spearphishing for information frequently
      involves social engineering techniques, such as posing as a source with a reason
      to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or
      sending multiple, seemingly urgent messages.'
    title: Spearphishing Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1598.001
    mappings:
    - d3f:T1598.001
    exact_mappings:
    - attack:T1598.001
    is_a: T1598
    class_uri: d3f:T1598.001
  T1598_002:
    name: T1598_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1598002
    annotations:
      attack-id:
        tag: attack-id
        value: T1598.002
    description: 'Adversaries may send spearphishing messages with a malicious attachment
      to elicit sensitive information that can be used during targeting. Spearphishing
      for information is an attempt to trick targets into divulging information, frequently
      credentials or other actionable information. Spearphishing for information frequently
      involves social engineering techniques, such as posing as a source with a reason
      to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or
      sending multiple, seemingly urgent messages.'
    title: Spearphishing Attachment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1598.002
    mappings:
    - d3f:T1598.002
    exact_mappings:
    - attack:T1598.002
    is_a: T1598
    class_uri: d3f:T1598.002
  T1598_003:
    name: T1598_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1598003
    annotations:
      attack-id:
        tag: attack-id
        value: T1598.003
    description: 'Adversaries may send spearphishing messages with a malicious link
      to elicit sensitive information that can be used during targeting. Spearphishing
      for information is an attempt to trick targets into divulging information, frequently
      credentials or other actionable information. Spearphishing for information frequently
      involves social engineering techniques, such as posing as a source with a reason
      to collect information (ex: [Establish Accounts](https://attack.mitre.org/techniques/T1585)
      or [Compromise Accounts](https://attack.mitre.org/techniques/T1586)) and/or
      sending multiple, seemingly urgent messages.'
    title: Spearphishing Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1598.003
    mappings:
    - d3f:T1598.003
    exact_mappings:
    - attack:T1598.003
    is_a: T1598
    class_uri: d3f:T1598.003
  T1598_004:
    name: T1598_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1598004
    annotations:
      attack-id:
        tag: attack-id
        value: T1598.004
    description: 'Adversaries may use voice communications to elicit sensitive information
      that can be used during targeting. Spearphishing for information is an attempt
      to trick targets into divulging information, frequently credentials or other
      actionable information. Spearphishing for information frequently involves social
      engineering techniques, such as posing as a source with a reason to collect
      information (ex: [Impersonation](https://attack.mitre.org/techniques/T1656))
      and/or creating a sense of urgency or alarm for the recipient.'
    title: Spearphishing Voice
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1598.004
    mappings:
    - d3f:T1598.004
    exact_mappings:
    - attack:T1598.004
    is_a: T1598
    class_uri: d3f:T1598.004
  T1599:
    name: T1599
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1599
    annotations:
      attack-id:
        tag: attack-id
        value: T1599
    description: Adversaries may bridge network boundaries by compromising perimeter
      network devices or internal devices responsible for network segmentation. Breaching
      these devices may enable an adversary to bypass restrictions on traffic routing
      that otherwise separate trusted and untrusted networks.
    title: Network Boundary Bridging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1599
    exact_mappings:
    - attack:T1599
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1599
  T1599_001:
    name: T1599_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1599001
    annotations:
      attack-id:
        tag: attack-id
        value: T1599.001
    description: "Adversaries may bridge network boundaries by modifying a network\
      \ device\u2019s Network Address Translation (NAT) configuration. Malicious modifications\
      \ to NAT may enable an adversary to bypass restrictions on traffic routing that\
      \ otherwise separate trusted and untrusted networks."
    title: Network Address Translation Traversal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1599.001
    mappings:
    - d3f:T1599.001
    exact_mappings:
    - attack:T1599.001
    is_a: T1599
    class_uri: d3f:T1599.001
  T1600:
    name: T1600
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1600
    annotations:
      attack-id:
        tag: attack-id
        value: T1600
    description: "Adversaries may compromise a network device\u2019s encryption capability\
      \ in order to bypass encryption that would otherwise protect data communications.\
      \ (Citation: Cisco Synful Knock Evolution)"
    title: Weaken Encryption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1600
    exact_mappings:
    - attack:T1600
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1600
  T1600_001:
    name: T1600_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1600001
    annotations:
      attack-id:
        tag: attack-id
        value: T1600.001
    description: 'Adversaries may reduce the level of effort required to decrypt data
      transmitted over the network by reducing the cipher strength of encrypted communications.(Citation:
      Cisco Synful Knock Evolution)'
    title: Reduce Key Space
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1600.001
    mappings:
    - d3f:T1600.001
    exact_mappings:
    - attack:T1600.001
    is_a: T1600
    class_uri: d3f:T1600.001
  T1600_002:
    name: T1600_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1600002
    annotations:
      attack-id:
        tag: attack-id
        value: T1600.002
    description: "Adversaries disable a network device\u2019s dedicated hardware encryption,\
      \ which may enable them to leverage weaknesses in software encryption in order\
      \ to reduce the effort involved in collecting, manipulating, and exfiltrating\
      \ transmitted data."
    title: Disable Crypto Hardware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1600.002
    mappings:
    - d3f:T1600.002
    exact_mappings:
    - attack:T1600.002
    is_a: T1600
    class_uri: d3f:T1600.002
  T1601:
    name: T1601
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1601
    annotations:
      attack-id:
        tag: attack-id
        value: T1601
    description: Adversaries may make changes to the operating system of embedded
      network devices to weaken defenses and provide new capabilities for themselves.  On
      such devices, the operating systems are typically monolithic and most of the
      device functionality and capabilities are contained within a single file.
    title: Modify System Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1601
    exact_mappings:
    - attack:T1601
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1601
  T1601_001:
    name: T1601_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1601001
    annotations:
      attack-id:
        tag: attack-id
        value: T1601.001
    description: 'Adversaries may modify the operating system of a network device
      to introduce new capabilities or weaken existing defenses.(Citation: Killing
      the myth of Cisco IOS rootkits) (Citation: Killing IOS diversity myth) (Citation:
      Cisco IOS Shellcode) (Citation: Cisco IOS Forensics Developments) (Citation:
      Juniper Netscreen of the Dead) Some network devices are built with a monolithic
      architecture, where the entire operating system and most of the functionality
      of the device is contained within a single file.  Adversaries may change this
      file in storage, to be loaded in a future boot, or in memory during runtime.'
    title: Patch System Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1601.001
    mappings:
    - d3f:T1601.001
    exact_mappings:
    - attack:T1601.001
    is_a: T1601
    class_uri: d3f:T1601.001
  T1601_002:
    name: T1601_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1601002
    annotations:
      attack-id:
        tag: attack-id
        value: T1601.002
    description: 'Adversaries may install an older version of the operating system
      of a network device to weaken security.  Older operating system versions on
      network devices often have weaker encryption ciphers and, in general, fewer/less
      updated defensive features. (Citation: Cisco Synful Knock Evolution)'
    title: Downgrade System Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1601.002
    mappings:
    - d3f:T1601.002
    exact_mappings:
    - attack:T1601.002
    is_a: T1601
    class_uri: d3f:T1601.002
  T1602:
    name: T1602
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1602
    annotations:
      attack-id:
        tag: attack-id
        value: T1602
    description: Adversaries may collect data related to managed devices from configuration
      repositories. Configuration repositories are used by management systems in order
      to configure, manage, and control data on remote systems. Configuration repositories
      may also facilitate remote access and administration of devices.
    title: Data from Configuration Repository
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1602
    exact_mappings:
    - attack:T1602
    is_a: CollectionTechnique
    class_uri: d3f:T1602
  T1602_001:
    name: T1602_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1602001
    annotations:
      attack-id:
        tag: attack-id
        value: T1602.001
    description: Adversaries may target the Management Information Base (MIB) to collect
      and/or mine valuable information in a network managed using Simple Network Management
      Protocol (SNMP).
    title: SNMP (MIB Dump)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1602.001
    mappings:
    - d3f:T1602.001
    exact_mappings:
    - attack:T1602.001
    is_a: T1602
    class_uri: d3f:T1602.001
  T1602_002:
    name: T1602_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1602002
    annotations:
      attack-id:
        tag: attack-id
        value: T1602.002
    description: Adversaries may access network configuration files to collect sensitive
      data about the device and the network. The network configuration is a file containing
      parameters that determine the operation of the device. The device typically
      stores an in-memory copy of the configuration while operating, and a separate
      configuration on non-volatile storage to load after device reset. Adversaries
      can inspect the configuration files to reveal information about the target network
      and its layout, the network device and its software, or identifying legitimate
      accounts and credentials for later use.
    title: Network Device Configuration Dump
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1602.002
    mappings:
    - d3f:T1602.002
    exact_mappings:
    - attack:T1602.002
    is_a: T1602
    class_uri: d3f:T1602.002
  T1603:
    name: T1603
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1603
    annotations:
      attack-id:
        tag: attack-id
        value: T1603
    description: Adversaries may abuse task scheduling functionality to facilitate
      initial or recurring execution of malicious code. On Android and iOS, APIs and
      libraries exist to facilitate scheduling tasks to execute at a specified date,
      time, or interval.
    title: Scheduled Task/Job
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1603
    exact_mappings:
    - attack:T1603
    is_a: ATTACKMobileExecutionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1603
  T1604:
    name: T1604
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1604
    annotations:
      attack-id:
        tag: attack-id
        value: T1604
    description: "Adversaries may use a compromised device as a proxy server to the\
      \ Internet. By utilizing a proxy, adversaries hide the true IP address of their\
      \ C2 server and associated infrastructure from the destination of the network\
      \ traffic. This masquerades an adversary\u2019s traffic as legitimate traffic\
      \ originating from the compromised device, which can evade IP-based restrictions\
      \ and alerts on certain services, such as bank accounts and social media websites.(Citation:\
      \ Threat Fabric Exobot)"
    title: Proxy Through Victim
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1604
    exact_mappings:
    - attack:T1604
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1604
  T1605:
    name: T1605
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1605
    annotations:
      attack-id:
        tag: attack-id
        value: T1605
    description: "Adversaries may use built-in command-line interfaces to interact\
      \ with the device and execute commands. Android provides a bash shell that can\
      \ be interacted with over the Android Debug Bridge (ADB) or programmatically\
      \ using Java\u2019s `Runtime` package. On iOS, adversaries can interact with\
      \ the underlying runtime shell if the device has been jailbroken."
    title: Command-Line Interface
    comments:
    - This technique has been revoked by T1623.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1623.001
    mappings:
    - d3f:T1605
    exact_mappings:
    - attack:T1605
    is_a: ATTACKMobileExecutionTechnique
    class_uri: d3f:T1605
  T1606:
    name: T1606
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1606
    annotations:
      attack-id:
        tag: attack-id
        value: T1606
    description: Adversaries may forge credential materials that can be used to gain
      access to web applications or Internet services. Web applications and services
      (hosted in cloud SaaS environments or on-premise servers) often use session
      cookies, tokens, or other materials to authenticate and authorize user access.
    title: Forge Web Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1606
    exact_mappings:
    - attack:T1606
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1606
  T1606_001:
    name: T1606_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1606001
    annotations:
      attack-id:
        tag: attack-id
        value: T1606.001
    description: Adversaries may forge web cookies that can be used to gain access
      to web applications or Internet services. Web applications and services (hosted
      in cloud SaaS environments or on-premise servers) often use session cookies
      to authenticate and authorize user access.
    title: Web Cookies
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1606.001
    mappings:
    - d3f:T1606.001
    exact_mappings:
    - attack:T1606.001
    is_a: T1606
    class_uri: d3f:T1606.001
  T1606_002:
    name: T1606_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1606002
    annotations:
      attack-id:
        tag: attack-id
        value: T1606.002
    description: 'An adversary may forge SAML tokens with any permissions claims and
      lifetimes if they possess a valid SAML token-signing certificate.(Citation:
      Microsoft SolarWinds Steps) The default lifetime of a SAML token is one hour,
      but the validity period can be specified in the <code>NotOnOrAfter</code> value
      of the <code>conditions ...</code> element in a token. This value can be changed
      using the <code>AccessTokenLifetime</code> in a <code>LifetimeTokenPolicy</code>.(Citation:
      Microsoft SAML Token Lifetimes) Forged SAML tokens enable adversaries to authenticate
      across services that use SAML 2.0 as an SSO (single sign-on) mechanism.(Citation:
      Cyberark Golden SAML)'
    title: SAML Tokens
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1606.002
    mappings:
    - d3f:T1606.002
    exact_mappings:
    - attack:T1606.002
    is_a: T1606
    class_uri: d3f:T1606.002
  T1608:
    name: T1608
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608
    annotations:
      attack-id:
        tag: attack-id
        value: T1608
    description: 'Adversaries may upload, install, or otherwise set up capabilities
      that can be used during targeting. To support their operations, an adversary
      may need to take capabilities they developed ([Develop Capabilities](https://attack.mitre.org/techniques/T1587))
      or obtained ([Obtain Capabilities](https://attack.mitre.org/techniques/T1588))
      and stage them on infrastructure under their control. These capabilities may
      be staged on infrastructure that was previously purchased/rented by the adversary
      ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)) or was
      otherwise compromised by them ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).
      Capabilities may also be staged on web services, such as GitHub or Pastebin,
      or on Platform-as-a-Service (PaaS) offerings that enable users to easily provision
      applications.(Citation: Volexity Ocean Lotus November 2020)(Citation: Dragos
      Heroku Watering Hole)(Citation: Malwarebytes Heroku Skimmers)(Citation: Netskope
      GCP Redirection)(Citation: Netskope Cloud Phishing)'
    title: Stage Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1608
    exact_mappings:
    - attack:T1608
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1608
  T1608_001:
    name: T1608_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608001
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.001
    description: Adversaries may upload malware to third-party or adversary controlled
      infrastructure to make it accessible during targeting. Malicious software can
      include payloads, droppers, post-compromise tools, backdoors, and a variety
      of other malicious content. Adversaries may upload malware to support their
      operations, such as making a payload available to a victim network to enable
      [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105) by placing
      it on an Internet accessible web server.
    title: Upload Malware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.001
    mappings:
    - d3f:T1608.001
    exact_mappings:
    - attack:T1608.001
    is_a: T1608
    class_uri: d3f:T1608.001
  T1608_002:
    name: T1608_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608002
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.002
    description: 'Adversaries may upload tools to third-party or adversary controlled
      infrastructure to make it accessible during targeting. Tools can be open or
      closed source, free or commercial. Tools can be used for malicious purposes
      by an adversary, but (unlike malware) were not intended to be used for those
      purposes (ex: [PsExec](https://attack.mitre.org/software/S0029)). Adversaries
      may upload tools to support their operations, such as making a tool available
      to a victim network to enable [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)
      by placing it on an Internet accessible web server.'
    title: Upload Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.002
    mappings:
    - d3f:T1608.002
    exact_mappings:
    - attack:T1608.002
    is_a: T1608
    class_uri: d3f:T1608.002
  T1608_003:
    name: T1608_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608003
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.003
    description: 'Adversaries may install SSL/TLS certificates that can be used during
      targeting. SSL/TLS certificates are files that can be installed on servers to
      enable secure communications between systems. Digital certificates include information
      about the key, information about its owner''s identity, and the digital signature
      of an entity that has verified the certificate''s contents are correct. If the
      signature is valid, and the person examining the certificate trusts the signer,
      then they know they can use that key to communicate securely with its owner.
      Certificates can be uploaded to a server, then the server can be configured
      to use the certificate to enable encrypted communication with it.(Citation:
      DigiCert Install SSL Cert)'
    title: Install Digital Certificate
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.003
    mappings:
    - d3f:T1608.003
    exact_mappings:
    - attack:T1608.003
    is_a: T1608
    class_uri: d3f:T1608.003
  T1608_004:
    name: T1608_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608004
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.004
    description: Adversaries may prepare an operational environment to infect systems
      that visit a website over the normal course of browsing. Endpoint systems may
      be compromised through browsing to adversary controlled sites, as in [Drive-by
      Compromise](https://attack.mitre.org/techniques/T1189). In such cases, the user's
      web browser is typically targeted for exploitation (often not requiring any
      extra user interaction once landing on the site), but adversaries may also set
      up websites for non-exploitation behavior such as [Application Access Token](https://attack.mitre.org/techniques/T1550/001).
      Prior to [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), adversaries
      must stage resources needed to deliver that exploit to users who browse to an
      adversary controlled site. Drive-by content can be staged on adversary controlled
      infrastructure that has been acquired ([Acquire Infrastructure](https://attack.mitre.org/techniques/T1583))
      or previously compromised ([Compromise Infrastructure](https://attack.mitre.org/techniques/T1584)).
    title: Drive-by Target
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.004
    mappings:
    - d3f:T1608.004
    exact_mappings:
    - attack:T1608.004
    is_a: T1608
    class_uri: d3f:T1608.004
  T1608_005:
    name: T1608_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608005
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.005
    description: Adversaries may put in place resources that are referenced by a link
      that can be used during targeting. An adversary may rely upon a user clicking
      a malicious link in order to divulge information (including credentials) or
      to gain execution, as in [Malicious Link](https://attack.mitre.org/techniques/T1204/001).
      Links can be used for spearphishing, such as sending an email accompanied by
      social engineering text to coax the user to actively click or copy and paste
      a URL into a browser. Prior to a phish for information (as in [Spearphishing
      Link](https://attack.mitre.org/techniques/T1598/003)) or a phish to gain initial
      access to a system (as in [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002)),
      an adversary must set up the resources for a link target for the spearphishing
      link.
    title: Link Target
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.005
    mappings:
    - d3f:T1608.005
    exact_mappings:
    - attack:T1608.005
    is_a: T1608
    class_uri: d3f:T1608.005
  T1608_006:
    name: T1608_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1608006
    annotations:
      attack-id:
        tag: attack-id
        value: T1608.006
    description: "Adversaries may poison mechanisms that influence search engine optimization\
      \ (SEO) to further lure staged capabilities towards potential victims. Search\
      \ engines typically display results to users based on purchased ads as well\
      \ as the site\u2019s ranking/score/reputation calculated by their web crawlers\
      \ and algorithms.(Citation: Atlas SEO)(Citation: MalwareBytes SEO)"
    title: SEO Poisoning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1608.006
    mappings:
    - d3f:T1608.006
    exact_mappings:
    - attack:T1608.006
    is_a: T1608
    class_uri: d3f:T1608.006
  T1609:
    name: T1609
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1609
    annotations:
      attack-id:
        tag: attack-id
        value: T1609
    description: 'Adversaries may abuse a container administration service to execute
      commands within a container. A container administration service such as the
      Docker daemon, the Kubernetes API server, or the kubelet may allow remote management
      of containers within an environment.(Citation: Docker Daemon CLI)(Citation:
      Kubernetes API)(Citation: Kubernetes Kubelet)'
    title: Container Administration Command
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1609
    exact_mappings:
    - attack:T1609
    is_a: ExecutionTechnique
    class_uri: d3f:T1609
  T1610:
    name: T1610
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1610
    annotations:
      attack-id:
        tag: attack-id
        value: T1610
    description: 'Adversaries may deploy a container into an environment to facilitate
      execution or evade defenses. In some cases, adversaries may deploy a new container
      to execute processes associated with a particular image or deployment, such
      as processes that execute or download malware. In others, an adversary may deploy
      a new container configured without network rules, user limitations, etc. to
      bypass existing defenses within the environment. In Kubernetes environments,
      an adversary may attempt to deploy a privileged or vulnerable container into
      a specific node in order to [Escape to Host](https://attack.mitre.org/techniques/T1611)
      and access other containers running on the node. (Citation: AppSecco Kubernetes
      Namespace Breakout 2020)'
    title: Deploy Container
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1610
    exact_mappings:
    - attack:T1610
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1610
  T1611:
    name: T1611
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1611
    annotations:
      attack-id:
        tag: attack-id
        value: T1611
    description: 'Adversaries may break out of a container to gain access to the underlying
      host. This can allow an adversary access to other containerized resources from
      the host level or to the host itself. In principle, containerized resources
      should provide a clear separation of application functionality and be isolated
      from the host environment.(Citation: Docker Overview)'
    title: Escape to Host
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1611
    exact_mappings:
    - attack:T1611
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1611
  T1612:
    name: T1612
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1612
    annotations:
      attack-id:
        tag: attack-id
        value: T1612
    description: 'Adversaries may build a container image directly on a host to bypass
      defenses that monitor for the retrieval of malicious images from a public registry.
      A remote <code>build</code> request may be sent to the Docker API that includes
      a Dockerfile that pulls a vanilla base image, such as alpine, from a public
      or local registry and then builds a custom image upon it.(Citation: Docker Build
      Image)'
    title: Build Image on Host
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1612
    exact_mappings:
    - attack:T1612
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1612
  T1613:
    name: T1613
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1613
    annotations:
      attack-id:
        tag: attack-id
        value: T1613
    description: Adversaries may attempt to discover containers and other resources
      that are available within a containers environment. Other resources may include
      images, deployments, pods, nodes, and other information such as the status of
      a cluster.
    title: Container and Resource Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1613
    exact_mappings:
    - attack:T1613
    is_a: DiscoveryTechnique
    class_uri: d3f:T1613
  T1614:
    name: T1614
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1614
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1614
    description: Adversaries may gather information in an attempt to calculate the
      geographical location of a victim host. Adversaries may use the information
      from [System Location Discovery](https://attack.mitre.org/techniques/T1614)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: System Location Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1614
    exact_mappings:
    - attack:T1614
    is_a: DiscoveryTechnique
    class_uri: d3f:T1614
  T1614_001:
    name: T1614_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1614001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1614.001
    description: 'Adversaries may attempt to gather information about the system language
      of a victim in order to infer the geographical location of that host. This information
      may be used to shape follow-on behaviors, including whether the adversary infects
      the target and/or attempts specific actions. This decision may be employed by
      malware developers and operators to reduce their risk of attracting the attention
      of specific law enforcement agencies or prosecution/scrutiny from other entities.(Citation:
      Malware System Language Check)'
    title: System Language Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1614.001
    mappings:
    - d3f:T1614.001
    exact_mappings:
    - attack:T1614.001
    is_a: T1614
    class_uri: d3f:T1614.001
  T1615:
    name: T1615
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1615
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1615
    description: 'Adversaries may gather information on Group Policy settings to identify
      paths for privilege escalation, security measures applied within a domain, and
      to discover patterns in domain objects that can be manipulated or used to blend
      in the environment. Group Policy allows for centralized management of user and
      computer settings in Active Directory (AD). Group policy objects (GPOs) are
      containers for group policy settings made up of files stored within a predictable
      network path `\<DOMAIN>\SYSVOL\<DOMAIN>\Policies\`.(Citation: TechNet Group
      Policy Basics)(Citation: ADSecurity GPO Persistence 2016)'
    title: Group Policy Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1615
    exact_mappings:
    - attack:T1615
    is_a: DiscoveryTechnique
    class_uri: d3f:T1615
  T1616:
    name: T1616
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1616
    annotations:
      attack-id:
        tag: attack-id
        value: T1616
    description: Adversaries may make, forward, or block phone calls without user
      authorization. This could be used for adversary goals such as audio surveillance,
      blocking or forwarding calls from the device owner, or C2 communication.
    title: Call Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1616
    exact_mappings:
    - attack:T1616
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCommandAndControlTechnique
    - ATTACKMobileImpactTechnique
    class_uri: d3f:T1616
  T1617:
    name: T1617
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1617
    annotations:
      attack-id:
        tag: attack-id
        value: T1617
    description: Adversaries may utilize hooking to hide the presence of artifacts
      associated with their behaviors to evade detection. Hooking can be used to modify
      return values or data structures of system APIs and function calls. This process
      typically involves using 3rd party root frameworks, such as Xposed or Magisk,
      with either a system exploit or pre-existing root access. By including custom
      modules for root frameworks, adversaries can hook system APIs and alter the
      return value and/or system data structures to alter functionality/visibility
      of various aspects of the system.
    title: Hooking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1617
    exact_mappings:
    - attack:T1617
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1617
  T1618:
    name: T1618
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1618
    annotations:
      attack-id:
        tag: attack-id
        value: T1618
    description: "Adversaries may attempt to avoid detection by hiding malicious behavior\
      \ from the user. By doing this, an adversary\u2019s modifications would most\
      \ likely remain installed on the device for longer, allowing the adversary to\
      \ continue to operate on that device."
    title: User Evasion
    comments:
    - This technique has been revoked by T1628.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1628.002
    mappings:
    - d3f:T1618
    exact_mappings:
    - attack:T1618
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1618
  T1619:
    name: T1619
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1619
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1619
    description: Adversaries may enumerate objects in cloud storage infrastructure.
      Adversaries may use this information during automated discovery to shape follow-on
      behaviors, including requesting all or specific objects from cloud storage.  Similar
      to [File and Directory Discovery](https://attack.mitre.org/techniques/T1083)
      on a local host, after identifying available storage services (i.e. [Cloud Infrastructure
      Discovery](https://attack.mitre.org/techniques/T1580)) adversaries may access
      the contents/objects stored in cloud infrastructure.
    title: Cloud Storage Object Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1619
    exact_mappings:
    - attack:T1619
    is_a: DiscoveryTechnique
    class_uri: d3f:T1619
  T1620:
    name: T1620
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1620
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1620
    description: Adversaries may reflectively load code into a process in order to
      conceal the execution of malicious payloads. Reflective loading involves allocating
      then executing payloads directly within the memory of the process, vice creating
      a thread or process backed by a file path on disk (e.g., [Shared Modules](https://attack.mitre.org/techniques/T1129)).
    title: Reflective Code Loading
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1620
    exact_mappings:
    - attack:T1620
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1620
  T1621:
    name: T1621
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1621
    annotations:
      attack-id:
        tag: attack-id
        value: T1621
    description: Adversaries may attempt to bypass multi-factor authentication (MFA)
      mechanisms and gain access to accounts by generating MFA requests sent to users.
    title: Multi-Factor Authentication Request Generation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1621
    exact_mappings:
    - attack:T1621
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1621
  T1622:
    name: T1622
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1622
    annotations:
      attack-id:
        tag: attack-id
        value: T1622
    description: 'Adversaries may employ various means to detect and avoid debuggers.
      Debuggers are typically used by defenders to trace and/or analyze the execution
      of potential malware payloads.(Citation: ProcessHacker Github)'
    title: Debugger Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1622
    exact_mappings:
    - attack:T1622
    is_a: DefenseEvasionTechnique
    mixins:
    - DiscoveryTechnique
    class_uri: d3f:T1622
  T1623:
    name: T1623
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1623
    annotations:
      attack-id:
        tag: attack-id
        value: T1623
    description: "Adversaries may abuse command and script interpreters to execute\
      \ commands, scripts, or binaries. These interfaces and languages provide ways\
      \ of interacting with computer systems and are a common feature across many\
      \ different platforms. Most systems come with some built-in command-line interface\
      \ and scripting capabilities, for example, Android is a UNIX-like OS and includes\
      \ a basic [Unix Shell](https://attack.mitre.org/techniques/T1623/001) that can\
      \ be accessed via the Android Debug Bridge (ADB) or Java\u2019s `Runtime` package."
    title: Command and Scripting Interpreter
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1623
    exact_mappings:
    - attack:T1623
    is_a: ATTACKMobileExecutionTechnique
    class_uri: d3f:T1623
  T1623_001:
    name: T1623_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1623001
    annotations:
      attack-id:
        tag: attack-id
        value: T1623.001
    description: Adversaries may abuse Unix shell commands and scripts for execution.
      Unix shells are the underlying command prompts on Android and iOS devices. Unix
      shells can control every aspect of a system, with certain commands requiring
      elevated privileges that are only accessible if the device has been rooted or
      jailbroken.
    title: Unix Shell
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1623.001
    mappings:
    - d3f:T1623.001
    exact_mappings:
    - attack:T1623.001
    is_a: T1623
    class_uri: d3f:T1623.001
  T1624:
    name: T1624
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1624
    annotations:
      attack-id:
        tag: attack-id
        value: T1624
    description: Adversaries may establish persistence using system mechanisms that
      trigger execution based on specific events. Mobile operating systems have means
      to subscribe to events such as receiving an SMS message, device boot completion,
      or other device activities.
    title: Event Triggered Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1624
    exact_mappings:
    - attack:T1624
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1624
  T1624_001:
    name: T1624_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1624001
    annotations:
      attack-id:
        tag: attack-id
        value: T1624.001
    description: Adversaries may establish persistence using system mechanisms that
      trigger execution based on specific events. Mobile operating systems have means
      to subscribe to events such as receiving an SMS message, device boot completion,
      or other device activities.
    title: Broadcast Receivers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1624.001
    mappings:
    - d3f:T1624.001
    exact_mappings:
    - attack:T1624.001
    is_a: T1624
    class_uri: d3f:T1624.001
  T1625:
    name: T1625
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1625
    annotations:
      attack-id:
        tag: attack-id
        value: T1625
    description: Adversaries may execute their own malicious payloads by hijacking
      the way operating systems run applications. Hijacking execution flow can be
      for the purposes of persistence since this hijacked execution may reoccur over
      time.
    title: Hijack Execution Flow
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1625
    exact_mappings:
    - attack:T1625
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1625
  T1625_001:
    name: T1625_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1625001
    annotations:
      attack-id:
        tag: attack-id
        value: T1625.001
    description: Adversaries may execute their own malicious payloads by hijacking
      the way an operating system runs applications. Hijacking execution flow can
      be for the purposes of persistence since this hijacked execution may reoccur
      at later points in time.
    title: System Runtime API Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1625.001
    mappings:
    - d3f:T1625.001
    exact_mappings:
    - attack:T1625.001
    is_a: T1625
    class_uri: d3f:T1625.001
  T1626:
    name: T1626
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1626
    annotations:
      attack-id:
        tag: attack-id
        value: T1626
    description: Adversaries may circumvent mechanisms designed to control elevated
      privileges to gain higher-level permissions. Most modern systems contain native
      elevation control mechanisms that are intended to limit privileges that a user
      can gain on a machine. Authorization has to be granted to specific users in
      order to perform tasks that are designated as higher risk. An adversary can
      use several methods to take advantage of built-in control mechanisms in order
      to escalate privileges on a system.
    title: Abuse Elevation Control Mechanism
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1626
    exact_mappings:
    - attack:T1626
    is_a: ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1626
  T1626_001:
    name: T1626_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1626001
    annotations:
      attack-id:
        tag: attack-id
        value: T1626.001
    description: "Adversaries may abuse Android\u2019s device administration API to\
      \ obtain a higher degree of control over the device. By abusing the API, adversaries\
      \ can perform several nefarious actions, such as resetting the device\u2019\
      s password for [Endpoint Denial of Service](https://attack.mitre.org/techniques/T1642),\
      \ factory resetting the device for [File Deletion](https://attack.mitre.org/techniques/T1630/002)\
      \ and to delete any traces of the malware, disabling all the device\u2019s cameras,\
      \ or to make it more difficult to uninstall the app."
    title: Device Administrator Permissions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1626.001
    mappings:
    - d3f:T1626.001
    exact_mappings:
    - attack:T1626.001
    is_a: T1626
    class_uri: d3f:T1626.001
  T1627:
    name: T1627
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1627
    annotations:
      attack-id:
        tag: attack-id
        value: T1627
    description: "Adversaries may use execution guardrails to constrain execution\
      \ or actions based on adversary supplied and environment specific conditions\
      \ that are expected to be present on the target. Guardrails ensure that a payload\
      \ only executes against an intended target and reduces collateral damage from\
      \ an adversary\u2019s campaign. Values an adversary can provide about a target\
      \ system or environment to use as guardrails may include environment information\
      \ such as location.(Citation: SWB Exodus March 2019)"
    title: Execution Guardrails
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1627
    exact_mappings:
    - attack:T1627
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1627
  T1627_001:
    name: T1627_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1627001
    annotations:
      attack-id:
        tag: attack-id
        value: T1627.001
    description: "Adversaries may use a device\u2019s geographical location to limit\
      \ certain malicious behaviors. For example, malware operators may limit the\
      \ distribution of a second stage payload to certain geographic regions.(Citation:\
      \ Lookout eSurv)"
    title: Geofencing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1627.001
    mappings:
    - d3f:T1627.001
    exact_mappings:
    - attack:T1627.001
    is_a: T1627
    class_uri: d3f:T1627.001
  T1628:
    name: T1628
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1628
    annotations:
      attack-id:
        tag: attack-id
        value: T1628
    description: "Adversaries may attempt to hide artifacts associated with their\
      \ behaviors to evade detection. Mobile operating systems have features and developer\
      \ APIs to hide various artifacts, such as an application\u2019s launcher icon.\
      \ These APIs have legitimate usages, such as hiding an icon to avoid application\
      \ drawer clutter when an application does not have a usable interface. Adversaries\
      \ may abuse these features and APIs to hide artifacts from the user to evade\
      \ detection."
    title: Hide Artifacts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1628
    exact_mappings:
    - attack:T1628
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1628
  T1628_001:
    name: T1628_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1628001
    annotations:
      attack-id:
        tag: attack-id
        value: T1628.001
    description: A malicious application could suppress its icon from being displayed
      to the user in the application launcher. This hides the fact that it is installed,
      and can make it more difficult for the user to uninstall the application. Hiding
      the application's icon programmatically does not require any special permissions.
    title: Suppress Application Icon
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1628.001
    mappings:
    - d3f:T1628.001
    exact_mappings:
    - attack:T1628.001
    is_a: T1628
    class_uri: d3f:T1628.001
  T1628_002:
    name: T1628_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1628002
    annotations:
      attack-id:
        tag: attack-id
        value: T1628.002
    description: "Adversaries may attempt to avoid detection by hiding malicious behavior\
      \ from the user. By doing this, an adversary\u2019s modifications would most\
      \ likely remain installed on the device for longer, allowing the adversary to\
      \ continue to operate on that device."
    title: User Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1628.002
    mappings:
    - d3f:T1628.002
    exact_mappings:
    - attack:T1628.002
    is_a: T1628
    class_uri: d3f:T1628.002
  T1628_003:
    name: T1628_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1628003
    annotations:
      attack-id:
        tag: attack-id
        value: T1628.003
    description: Adversaries may attempt to hide multimedia files from the user. By
      doing so, adversaries may conceal captured files, such as pictures, videos and/or
      screenshots, then later exfiltrate those files.
    title: Conceal Multimedia Files
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1628.003
    mappings:
    - d3f:T1628.003
    exact_mappings:
    - attack:T1628.003
    is_a: T1628
    class_uri: d3f:T1628.003
  T1629:
    name: T1629
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1629
    annotations:
      attack-id:
        tag: attack-id
        value: T1629
    description: Adversaries may maliciously modify components of a victim environment
      in order to hinder or disable defensive mechanisms. This not only involves impairing
      preventative defenses, such as anti-virus, but also detection capabilities that
      defenders can use to audit activity and identify malicious behavior. This may
      span both native defenses as well as supplemental capabilities installed by
      users or mobile endpoint administrators.
    title: Impair Defenses
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1629
    exact_mappings:
    - attack:T1629
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1629
  T1629_001:
    name: T1629_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1629001
    annotations:
      attack-id:
        tag: attack-id
        value: T1629.001
    description: Adversaries may abuse the Android device administration API to prevent
      the user from uninstalling a target application. In earlier versions of Android,
      device administrator applications needed their administration capabilities explicitly
      deactivated by the user before the application could be uninstalled. This was
      later updated so the user could deactivate and uninstall the administrator application
      in one step.
    title: Prevent Application Removal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1629.001
    mappings:
    - d3f:T1629.001
    exact_mappings:
    - attack:T1629.001
    is_a: T1629
    class_uri: d3f:T1629.001
  T1629_002:
    name: T1629_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1629002
    annotations:
      attack-id:
        tag: attack-id
        value: T1629.002
    description: "An adversary may seek to inhibit user interaction by locking the\
      \ legitimate user out of the device. This is typically accomplished by requesting\
      \ device administrator permissions and then locking the screen using `DevicePolicyManager.lockNow()`.\
      \ Other novel techniques for locking the user out of the device have been observed,\
      \ such as showing a persistent overlay, using carefully crafted \u201Ccall\u201D\
      \ notification screens, and locking HTML pages in the foreground. These techniques\
      \ can be very difficult to get around, and typically require booting the device\
      \ into safe mode to uninstall the malware.(Citation: Microsoft MalLockerB)(Citation:\
      \ Talos GPlayed)(Citation: securelist rotexy 2018)"
    title: Device Lockout
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1629.002
    mappings:
    - d3f:T1629.002
    exact_mappings:
    - attack:T1629.002
    is_a: T1629
    class_uri: d3f:T1629.002
  T1629_003:
    name: T1629_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1629003
    annotations:
      attack-id:
        tag: attack-id
        value: T1629.003
    description: Adversaries may disable security tools to avoid potential detection
      of their tools and activities. This can take the form of disabling security
      software, modifying SELinux configuration, or other methods to interfere with
      security tools scanning or reporting information. This is typically done by
      abusing device administrator permissions or using system exploits to gain root
      access to the device to modify protected system files.
    title: Disable or Modify Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1629.003
    mappings:
    - d3f:T1629.003
    exact_mappings:
    - attack:T1629.003
    is_a: T1629
    class_uri: d3f:T1629.003
  T1630:
    name: T1630
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1630
    annotations:
      attack-id:
        tag: attack-id
        value: T1630
    description: Adversaries may delete, alter, or hide generated artifacts on a device,
      including files, jailbreak status, or the malicious application itself. These
      actions may interfere with event collection, reporting, or other notifications
      used to detect intrusion activity. This may compromise the integrity of mobile
      security solutions by causing notable events or information to go unreported.
    title: Indicator Removal on Host
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1630
    exact_mappings:
    - attack:T1630
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1630
  T1630_001:
    name: T1630_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1630001
    annotations:
      attack-id:
        tag: attack-id
        value: T1630.001
    description: 'Adversaries may include functionality in malware that uninstalls
      the malicious application from the device. This can be achieved by:'
    title: Uninstall Malicious Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1630.001
    mappings:
    - d3f:T1630.001
    exact_mappings:
    - attack:T1630.001
    is_a: T1630
    class_uri: d3f:T1630.001
  T1630_002:
    name: T1630_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1630002
    annotations:
      attack-id:
        tag: attack-id
        value: T1630.002
    description: 'Adversaries may wipe a device or delete individual files in order
      to manipulate external outcomes or hide activity. An application must have administrator
      access to fully wipe the device, while individual files may not require special
      permissions to delete depending on their storage location.(Citation: Android
      DevicePolicyManager 2019)'
    title: File Deletion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1630.002
    mappings:
    - d3f:T1630.002
    exact_mappings:
    - attack:T1630.002
    is_a: T1630
    class_uri: d3f:T1630.002
  T1630_003:
    name: T1630_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1630003
    annotations:
      attack-id:
        tag: attack-id
        value: T1630.003
    description: 'An adversary could use knowledge of the techniques used by security
      software to evade detection.(Citation: Brodie)(Citation: Tan) For example, some
      mobile security products perform compromised device detection by searching for
      particular artifacts such as an installed "su" binary, but that check could
      be evaded by naming the binary something else. Similarly, polymorphic code techniques
      could be used to evade signature-based detection.(Citation: Rastogi)'
    title: Disguise Root/Jailbreak Indicators
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1630.003
    mappings:
    - d3f:T1630.003
    exact_mappings:
    - attack:T1630.003
    is_a: T1630
    class_uri: d3f:T1630.003
  T1631:
    name: T1631
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1631
    annotations:
      attack-id:
        tag: attack-id
        value: T1631
    description: Adversaries may inject code into processes in order to evade process-based
      defenses or even elevate privileges. Process injection is a method of executing
      arbitrary code in the address space of a separate live process. Running code
      in the context of another process may allow access to the process's memory,
      system/network resources, and possibly elevated privileges. Execution via process
      injection may also evade detection from security products since the execution
      is masked under a legitimate process.
    title: Process Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1631
    exact_mappings:
    - attack:T1631
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1631
  T1631_001:
    name: T1631_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1631001
    annotations:
      attack-id:
        tag: attack-id
        value: T1631.001
    description: Adversaries may inject malicious code into processes via ptrace (process
      trace) system calls in order to evade process-based defenses as well as possibly
      elevate privileges. Ptrace system call injection is a method of executing arbitrary
      code in the address space of a separate live process.
    title: Ptrace System Calls
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1631.001
    mappings:
    - d3f:T1631.001
    exact_mappings:
    - attack:T1631.001
    is_a: T1631
    class_uri: d3f:T1631.001
  T1632:
    name: T1632
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1632
    annotations:
      attack-id:
        tag: attack-id
        value: T1632
    description: 'Adversaries may undermine security controls that will either warn
      users of untrusted activity or prevent execution of untrusted applications.
      Operating systems and security products may contain mechanisms to identify programs
      or websites as possessing some level of trust. Examples of such features include:
      an app being allowed to run because it is signed by a valid code signing certificate;
      an OS prompt alerting the user that an app came from an untrusted source; or
      getting an indication that you are about to connect to an untrusted site. The
      method adversaries use will depend on the specific mechanism they seek to subvert.'
    title: Subvert Trust Controls
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1632
    exact_mappings:
    - attack:T1632
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1632
  T1632_001:
    name: T1632_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1632001
    annotations:
      attack-id:
        tag: attack-id
        value: T1632.001
    description: Adversaries may modify code signing policies to enable execution
      of applications signed with unofficial or unknown keys. Code signing provides
      a level of authenticity on an app from a developer, guaranteeing that the program
      has not been tampered with and comes from an official source. Security controls
      can include enforcement mechanisms to ensure that only valid, signed code can
      be run on a device.
    title: Code Signing Policy Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1632.001
    mappings:
    - d3f:T1632.001
    exact_mappings:
    - attack:T1632.001
    is_a: T1632
    class_uri: d3f:T1632.001
  T1633:
    name: T1633
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1633
    annotations:
      attack-id:
        tag: attack-id
        value: T1633
    description: "Adversaries may employ various means to detect and avoid virtualization\
      \ and analysis environments. This may include changing behaviors after checking\
      \ for the presence of artifacts indicative of a virtual machine environment\
      \ (VME) or sandbox. If the adversary detects a VME, they may alter their malware\u2019\
      s behavior to disengage from the victim or conceal the core functions of the\
      \ payload. They may also search for VME artifacts before dropping further payloads.\
      \ Adversaries may use the information learned from [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1633)\
      \ during automated discovery to shape follow-on behaviors."
    title: Virtualization/Sandbox Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1633
    exact_mappings:
    - attack:T1633
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1633
  T1633_001:
    name: T1633_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1633001
    annotations:
      attack-id:
        tag: attack-id
        value: T1633.001
    description: "Adversaries may employ various system checks to detect and avoid\
      \ virtualization and analysis environments. This may include changing behavior\
      \ after checking for the presence of artifacts indicative of a virtual environment\
      \ or sandbox. If the adversary detects a virtual environment, they may alter\
      \ their malware\u2019s behavior to disengage from the victim or conceal the\
      \ core functions of the implant. They may also search for virtualization artifacts\
      \ before dropping secondary or additional payloads."
    title: System Checks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1633.001
    mappings:
    - d3f:T1633.001
    exact_mappings:
    - attack:T1633.001
    is_a: T1633
    class_uri: d3f:T1633.001
  T1634:
    name: T1634
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1634
    annotations:
      attack-id:
        tag: attack-id
        value: T1634
    description: Adversaries may search common password storage locations to obtain
      user credentials. Passwords can be stored in several places on a device, depending
      on the operating system or application holding the credentials. There are also
      specific applications that store passwords to make it easier for users to manage
      and maintain. Once credentials are obtained, they can be used to perform lateral
      movement and access restricted information.
    title: Credentials from Password Store
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1634
    exact_mappings:
    - attack:T1634
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1634
  T1634_001:
    name: T1634_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1634001
    annotations:
      attack-id:
        tag: attack-id
        value: T1634.001
    description: Adversaries may collect keychain data from an iOS device to acquire
      credentials. Keychains are the built-in way for iOS to keep track of users'
      passwords and credentials for many services and features such as Wi-Fi passwords,
      websites, secure notes, certificates, private keys, and VPN credentials.
    title: Keychain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1634.001
    mappings:
    - d3f:T1634.001
    exact_mappings:
    - attack:T1634.001
    is_a: T1634
    class_uri: d3f:T1634.001
  T1635:
    name: T1635
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1635
    annotations:
      attack-id:
        tag: attack-id
        value: T1635
    description: "Adversaries can steal user application access tokens as a means\
      \ of acquiring credentials to access remote systems and resources. This can\
      \ occur through social engineering or URI hijacking and typically requires user\
      \ action to grant access, such as through a system \u201COpen With\u201D dialogue."
    title: Steal Application Access Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1635
    exact_mappings:
    - attack:T1635
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1635
  T1635_001:
    name: T1635_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1635001
    annotations:
      attack-id:
        tag: attack-id
        value: T1635.001
    description: Adversaries may register Uniform Resource Identifiers (URIs) to intercept
      sensitive data.
    title: URI Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1635.001
    mappings:
    - d3f:T1635.001
    exact_mappings:
    - attack:T1635.001
    is_a: T1635
    class_uri: d3f:T1635.001
  T1636:
    name: T1636
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636
    annotations:
      attack-id:
        tag: attack-id
        value: T1636
    description: "Adversaries may utilize standard operating system APIs to collect\
      \ data from permission-backed data stores on a device, such as the calendar\
      \ or contact list. These permissions need to be declared ahead of time. On Android,\
      \ they must be included in the application\u2019s manifest. On iOS, they must\
      \ be included in the application\u2019s `Info.plist` file."
    title: Protected User Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1636
    exact_mappings:
    - attack:T1636
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1636
  T1636_001:
    name: T1636_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636001
    annotations:
      attack-id:
        tag: attack-id
        value: T1636.001
    description: Adversaries may utilize standard operating system APIs to gather
      calendar entry data. On Android, this can be accomplished using the Calendar
      Content Provider. On iOS, this can be accomplished using the `EventKit` framework.
    title: Calendar Entries
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1636.001
    mappings:
    - d3f:T1636.001
    exact_mappings:
    - attack:T1636.001
    is_a: T1636
    class_uri: d3f:T1636.001
  T1636_002:
    name: T1636_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636002
    annotations:
      attack-id:
        tag: attack-id
        value: T1636.002
    description: Adversaries may utilize standard operating system APIs to gather
      call log data. On Android, this can be accomplished using the Call Log Content
      Provider. iOS provides no standard API to access the call log.
    title: Call Log
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1636.002
    mappings:
    - d3f:T1636.002
    exact_mappings:
    - attack:T1636.002
    is_a: T1636
    class_uri: d3f:T1636.002
  T1636_003:
    name: T1636_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636003
    annotations:
      attack-id:
        tag: attack-id
        value: T1636.003
    description: Adversaries may utilize standard operating system APIs to gather
      contact list data. On Android, this can be accomplished using the Contacts Content
      Provider. On iOS, this can be accomplished using the `Contacts` framework.
    title: Contact List
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1636.003
    mappings:
    - d3f:T1636.003
    exact_mappings:
    - attack:T1636.003
    is_a: T1636
    class_uri: d3f:T1636.003
  T1636_004:
    name: T1636_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636004
    annotations:
      attack-id:
        tag: attack-id
        value: T1636.004
    description: Adversaries may utilize standard operating system APIs to gather
      SMS messages. On Android, this can be accomplished using the SMS Content Provider.
      iOS provides no standard API to access SMS messages.
    title: SMS Messages
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1636.004
    mappings:
    - d3f:T1636.004
    exact_mappings:
    - attack:T1636.004
    is_a: T1636
    class_uri: d3f:T1636.004
  T1636_005:
    name: T1636_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1636005
    annotations:
      attack-id:
        tag: attack-id
        value: T1636.005
    description: 'Adversaries may utilize standard operating system APIs to gather
      account data. On Android, this can be accomplished by using the AccountManager
      API. For example, adversaries may use the `getAccounts()` method to list all
      accounts.(Citation: Android_AccountManager_Feb2025) On iOS, this can be accomplished
      by using the Keychain services.'
    title: Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1636.005
    mappings:
    - d3f:T1636.005
    exact_mappings:
    - attack:T1636.005
    is_a: T1636
    class_uri: d3f:T1636.005
  T1637:
    name: T1637
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1637
    annotations:
      attack-id:
        tag: attack-id
        value: T1637
    description: Adversaries may dynamically establish connections to command and
      control infrastructure to evade common detections and remediations. This may
      be achieved by using malware that shares a common algorithm with the infrastructure
      the adversary uses to receive the malware's communications. This algorithm can
      be used to dynamically adjust parameters such as the domain name, IP address,
      or port number the malware uses for command and control.
    title: Dynamic Resolution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1637
    exact_mappings:
    - attack:T1637
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1637
  T1637_001:
    name: T1637_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1637001
    annotations:
      attack-id:
        tag: attack-id
        value: T1637.001
    description: 'Adversaries may use [Domain Generation Algorithms](https://attack.mitre.org/techniques/T1637/001)
      (DGAs) to procedurally generate domain names for uses such as command and control
      communication   or malicious application distribution.(Citation: securelist
      rotexy 2018)'
    title: Domain Generation Algorithms
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1637.001
    mappings:
    - d3f:T1637.001
    exact_mappings:
    - attack:T1637.001
    is_a: T1637
    class_uri: d3f:T1637.001
  T1638:
    name: T1638
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1638
    annotations:
      attack-id:
        tag: attack-id
        value: T1638
    description: Adversaries may attempt to position themselves between two or more
      networked devices to support follow-on behaviors such as [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002)
      or [Endpoint Denial of Service](https://attack.mitre.org/techniques/T1642).
    title: Adversary-in-the-Middle
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1638
    exact_mappings:
    - attack:T1638
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1638
  T1639:
    name: T1639
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1639
    annotations:
      attack-id:
        tag: attack-id
        value: T1639
    description: Adversaries may steal data by exfiltrating it over a different protocol
      than that of the existing command and control channel. The data may also be
      sent to an alternate network location from the main command and control server.
    title: Exfiltration Over Alternative Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1639
    exact_mappings:
    - attack:T1639
    is_a: ATTACKMobileExfiltrationTechnique
    class_uri: d3f:T1639
  T1639_001:
    name: T1639_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1639001
    annotations:
      attack-id:
        tag: attack-id
        value: T1639.001
    description: Adversaries may steal data by exfiltrating it over an un-encrypted
      network protocol other than that of the existing command and control channel.
      The data may also be sent to an alternate network location from the main command
      and control server.
    title: Exfiltration Over Unencrypted Non-C2 Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1639.001
    mappings:
    - d3f:T1639.001
    exact_mappings:
    - attack:T1639.001
    is_a: T1639
    class_uri: d3f:T1639.001
  T1640:
    name: T1640
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1640
    annotations:
      attack-id:
        tag: attack-id
        value: T1640
    description: 'Adversaries may interrupt availability of system and network resources
      by inhibiting access to accounts utilized by legitimate users. Accounts may
      be deleted, locked, or manipulated (ex: credentials changed) to remove access
      to accounts.'
    title: Account Access Removal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1640
    exact_mappings:
    - attack:T1640
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1640
  T1641:
    name: T1641
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1641
    annotations:
      attack-id:
        tag: attack-id
        value: T1641
    description: Adversaries may insert, delete, or alter data in order to manipulate
      external outcomes or hide activity. By manipulating data, adversaries may attempt
      to affect a business process, organizational understanding, or decision making.
    title: Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1641
    exact_mappings:
    - attack:T1641
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1641
  T1641_001:
    name: T1641_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1641001
    annotations:
      attack-id:
        tag: attack-id
        value: T1641.001
    description: Adversaries may alter data en route to storage or other systems in
      order to manipulate external outcomes or hide activity. By manipulating transmitted
      data, adversaries may attempt to affect a business process, organizational understanding,
      or decision making.
    title: Transmitted Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1641.001
    mappings:
    - d3f:T1641.001
    exact_mappings:
    - attack:T1641.001
    is_a: T1641
    class_uri: d3f:T1641.001
  T1642:
    name: T1642
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1642
    annotations:
      attack-id:
        tag: attack-id
        value: T1642
    description: Adversaries may perform Endpoint Denial of Service (DoS) attacks
      to degrade or block the availability of services to users.
    title: Endpoint Denial of Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1642
    exact_mappings:
    - attack:T1642
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1642
  T1643:
    name: T1643
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1643
    annotations:
      attack-id:
        tag: attack-id
        value: T1643
    description: Adversaries may generate outbound traffic from devices. This is typically
      performed to manipulate external outcomes, such as to achieve carrier billing
      fraud or to manipulate app store rankings or ratings. Outbound traffic is typically
      generated as SMS messages or general web traffic, but may take other forms as
      well.
    title: Generate Traffic from Victim
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1643
    exact_mappings:
    - attack:T1643
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1643
  T1644:
    name: T1644
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1644
    annotations:
      attack-id:
        tag: attack-id
        value: T1644
    description: Adversaries may communicate with compromised devices using out of
      band data streams. This could be done for a variety of reasons, including evading
      network traffic monitoring, as a backup method of command and control, or for
      data exfiltration if the device is not connected to any Internet-providing networks
      (i.e. cellular or Wi-Fi). Several out of band data streams exist, such as SMS
      messages, NFC, and Bluetooth.
    title: Out of Band Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1644
    exact_mappings:
    - attack:T1644
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1644
  T1645:
    name: T1645
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1645
    annotations:
      attack-id:
        tag: attack-id
        value: T1645
    description: Adversaries may modify system software binaries to establish persistent
      access to devices. System software binaries are used by the underlying operating
      system and users over adb or terminal emulators.
    title: Compromise Client Software Binary
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1645
    exact_mappings:
    - attack:T1645
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1645
  T1646:
    name: T1646
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1646
    annotations:
      attack-id:
        tag: attack-id
        value: T1646
    description: Adversaries may steal data by exfiltrating it over an existing command
      and control channel. Stolen data is encoded into the normal communications channel
      using the same protocol as command and control communications.
    title: Exfiltration Over C2 Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1646
    exact_mappings:
    - attack:T1646
    is_a: ATTACKMobileExfiltrationTechnique
    class_uri: d3f:T1646
  T1647:
    name: T1647
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1647
    annotations:
      attack-id:
        tag: attack-id
        value: T1647
    description: 'Adversaries may modify property list files (plist files) to enable
      other malicious activity, while also potentially evading and bypassing system
      defenses. macOS applications use plist files, such as the <code>info.plist</code>
      file, to store properties and configuration settings that inform the operating
      system how to handle the application at runtime. Plist files are structured
      metadata in key-value pairs formatted in XML based on Apple''s Core Foundation
      DTD. Plist files can be saved in text or binary format.(Citation: fileinfo plist
      file description)'
    title: Plist File Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1647
    exact_mappings:
    - attack:T1647
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1647
  T1648:
    name: T1648
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1648
    annotations:
      attack-id:
        tag: attack-id
        value: T1648
    description: Adversaries may abuse serverless computing, integration, and automation
      services to execute arbitrary code in cloud environments. Many cloud providers
      offer a variety of serverless resources, including compute engines, application
      integration services, and web servers.
    title: Serverless Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1648
    exact_mappings:
    - attack:T1648
    is_a: ExecutionTechnique
    class_uri: d3f:T1648
  T1649:
    name: T1649
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1649
    annotations:
      attack-id:
        tag: attack-id
        value: T1649
    description: 'Adversaries may steal or forge certificates used for authentication
      to access remote systems or resources. Digital certificates are often used to
      sign and encrypt messages and/or files. Certificates are also used as authentication
      material. For example, Azure AD device certificates and Active Directory Certificate
      Services (AD CS) certificates bind to an identity and can be used as credentials
      for domain accounts.(Citation: O365 Blog Azure AD Device IDs)(Citation: Microsoft
      AD CS Overview)'
    title: Steal or Forge Authentication Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1649
    exact_mappings:
    - attack:T1649
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1649
  T1650:
    name: T1650
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1650
    annotations:
      attack-id:
        tag: attack-id
        value: T1650
    description: 'Adversaries may purchase or otherwise acquire an existing access
      to a target system or network. A variety of online services and initial access
      broker networks are available to sell access to previously compromised systems.(Citation:
      Microsoft Ransomware as a Service)(Citation: CrowdStrike Access Brokers)(Citation:
      Krebs Access Brokers Fortune 500) In some cases, adversary groups may form partnerships
      to share compromised systems with each other.(Citation: CISA Karakurt 2022)'
    title: Acquire Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1650
    exact_mappings:
    - attack:T1650
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1650
  T1651:
    name: T1651
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1651
    annotations:
      attack-id:
        tag: attack-id
        value: T1651
    description: 'Adversaries may abuse cloud management services to execute commands
      within virtual machines. Resources such as AWS Systems Manager, Azure RunCommand,
      and Runbooks allow users to remotely run scripts in virtual machines by leveraging
      installed virtual machine agents. (Citation: AWS Systems Manager Run Command)(Citation:
      Microsoft Run Command)'
    title: Cloud Administration Command
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1651
    exact_mappings:
    - attack:T1651
    is_a: ExecutionTechnique
    class_uri: d3f:T1651
  T1652:
    name: T1652
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1652
    annotations:
      attack-id:
        tag: attack-id
        value: T1652
    description: Adversaries may attempt to enumerate local device drivers on a victim
      host. Information about device drivers may highlight various insights that shape
      follow-on behaviors, such as the function/purpose of the host, present security
      tools (i.e. [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001))
      or other defenses (e.g., [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)),
      as well as potential exploitable vulnerabilities (e.g., [Exploitation for Privilege
      Escalation](https://attack.mitre.org/techniques/T1068)).
    title: Device Driver Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1652
    exact_mappings:
    - attack:T1652
    is_a: DiscoveryTechnique
    class_uri: d3f:T1652
  T1653:
    name: T1653
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1653
    annotations:
      attack-id:
        tag: attack-id
        value: T1653
    description: 'Adversaries may impair a system''s ability to hibernate, reboot,
      or shut down in order to extend access to infected machines. When a computer
      enters a dormant state, some or all software and hardware may cease to operate
      which can disrupt malicious activity.(Citation: Sleep, shut down, hibernate)'
    title: Power Settings
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1653
    exact_mappings:
    - attack:T1653
    is_a: PersistenceTechnique
    class_uri: d3f:T1653
  T1654:
    name: T1654
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1654
    annotations:
      attack-id:
        tag: attack-id
        value: T1654
    description: Adversaries may enumerate system and service logs to find useful
      data. These logs may highlight various types of valuable insights for an adversary,
      such as user authentication records ([Account Discovery](https://attack.mitre.org/techniques/T1087)),
      security or vulnerable software ([Software Discovery](https://attack.mitre.org/techniques/T1518)),
      or hosts within a compromised network ([Remote System Discovery](https://attack.mitre.org/techniques/T1018)).
    title: Log Enumeration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1654
    exact_mappings:
    - attack:T1654
    is_a: DiscoveryTechnique
    class_uri: d3f:T1654
  T1655:
    name: T1655
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1655
    annotations:
      attack-id:
        tag: attack-id
        value: T1655
    description: Adversaries may attempt to manipulate features of their artifacts
      to make them appear legitimate or benign to users and/or security tools. Masquerading
      occurs when the name, location, or appearance of an object, legitimate or malicious,
      is manipulated or abused for the sake of evading defenses and observation. This
      may include manipulating file metadata, tricking users into misidentifying the
      file type, and giving legitimate task or service names.
    title: Masquerading
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1655
    exact_mappings:
    - attack:T1655
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1655
  T1655_001:
    name: T1655_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1655001
    annotations:
      attack-id:
        tag: attack-id
        value: T1655.001
    description: Adversaries may match or approximate the name or location of legitimate
      files or resources when naming/placing them. This is done for the sake of evading
      defenses and observation. This may be done by giving artifacts the name and
      icon of a legitimate, trusted application (i.e., Settings), or using a package
      name that matches legitimate, trusted applications (i.e., `com.google.android.gm`).
    title: Match Legitimate Name or Location
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1655.001
    mappings:
    - d3f:T1655.001
    exact_mappings:
    - attack:T1655.001
    is_a: T1655
    class_uri: d3f:T1655.001
  T1656:
    name: T1656
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1656
    annotations:
      attack-id:
        tag: attack-id
        value: T1656
    description: "Adversaries may impersonate a trusted person or organization in\
      \ order to persuade and trick a target into performing some action on their\
      \ behalf. For example, adversaries may communicate with victims (via [Phishing\
      \ for Information](https://attack.mitre.org/techniques/T1598), [Phishing](https://attack.mitre.org/techniques/T1566),\
      \ or [Internal Spearphishing](https://attack.mitre.org/techniques/T1534)) while\
      \ impersonating a known sender such as an executive, colleague, or third-party\
      \ vendor. Established trust can then be leveraged to accomplish an adversary\u2019\
      s ultimate goals, possibly against multiple victims."
    title: Impersonation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1656
    exact_mappings:
    - attack:T1656
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1656
  T1657:
    name: T1657
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1657
    annotations:
      attack-id:
        tag: attack-id
        value: T1657
    description: 'Adversaries may steal monetary resources from targets through extortion,
      social engineering, technical theft, or other methods aimed at their own financial
      gain at the expense of the availability of these resources for victims. Financial
      theft is the ultimate objective of several popular campaign types including
      extortion by ransomware,(Citation: FBI-ransomware) business email compromise
      (BEC) and fraud,(Citation: FBI-BEC) "pig butchering,"(Citation: wired-pig butchering)
      bank hacking,(Citation: DOJ-DPRK Heist) and exploiting cryptocurrency networks.(Citation:
      BBC-Ronin)'
    title: Financial Theft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1657
    exact_mappings:
    - attack:T1657
    is_a: ImpactTechnique
    class_uri: d3f:T1657
  T1658:
    name: T1658
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1658
    annotations:
      attack-id:
        tag: attack-id
        value: T1658
    description: Adversaries may exploit software vulnerabilities in client applications
      to execute code. Vulnerabilities can exist in software due to insecure coding
      practices that can lead to unanticipated behavior. Adversaries may take advantage
      of certain vulnerabilities through targeted exploitation for the purpose of
      arbitrary code execution. Oftentimes the most valuable exploits to an offensive
      toolkit are those that can be used to obtain code execution on a remote system
      because they can be used to gain access to that system. Users will expect to
      see files related to the applications they commonly used to do work, so they
      are a useful target for exploit research and development because of their high
      utility.
    title: Exploitation for Client Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1658
    exact_mappings:
    - attack:T1658
    is_a: ATTACKMobileExecutionTechnique
    class_uri: d3f:T1658
  T1659:
    name: T1659
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1659
    annotations:
      attack-id:
        tag: attack-id
        value: T1659
    description: 'Adversaries may gain access and continuously communicate with victims
      by injecting malicious content into systems through online network traffic.
      Rather than luring victims to malicious payloads hosted on a compromised website
      (i.e., [Drive-by Target](https://attack.mitre.org/techniques/T1608/004) followed
      by [Drive-by Compromise](https://attack.mitre.org/techniques/T1189)), adversaries
      may initially access victims through compromised data-transfer channels where
      they can manipulate traffic and/or inject their own content. These compromised
      online network channels may also be used to deliver additional payloads (i.e.,
      [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105)) and other
      data to already compromised systems.(Citation: ESET MoustachedBouncer)'
    title: Content Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1659
    exact_mappings:
    - attack:T1659
    is_a: CommandAndControlTechnique
    mixins:
    - InitialAccessTechnique
    class_uri: d3f:T1659
  T1660:
    name: T1660
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1660
    annotations:
      attack-id:
        tag: attack-id
        value: T1660
    description: "Adversaries may send malicious content to users in order to gain\
      \ access to their mobile devices. All forms of phishing are electronically delivered\
      \ social engineering. Adversaries can conduct both non-targeted phishing, such\
      \ as in mass malware spam campaigns, as well as more targeted phishing tailored\
      \ for a specific individual, company, or industry, known as \u201Cspearphishing\u201D\
      .  Phishing often involves social engineering techniques, such as posing as\
      \ a trusted source, as well as evasion techniques, such as removing or manipulating\
      \ emails or metadata/headers from compromised accounts being abused to send\
      \ messages."
    title: Phishing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1660
    exact_mappings:
    - attack:T1660
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1660
  T1661:
    name: T1661
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1661
    annotations:
      attack-id:
        tag: attack-id
        value: T1661
    description: 'An adversary may push an update to a previously benign application
      to add malicious code. This can be accomplished by pushing an initially benign,
      functional application to a trusted application store, such as the Google Play
      Store or the Apple App Store. This allows the adversary to establish a trusted
      userbase that may grant permissions to the application prior to the introduction
      of malicious code. Then, an application update could be pushed to introduce
      malicious code.(Citation: android_app_breaking_bad)'
    title: Application Versioning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1661
    exact_mappings:
    - attack:T1661
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1661
  T1662:
    name: T1662
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1662
    annotations:
      attack-id:
        tag: attack-id
        value: T1662
    description: Adversaries may destroy data and files on specific devices or in
      large numbers to interrupt availability to systems, services, and network resources.
      Data destruction is likely to render stored data irrecoverable by forensic techniques
      through overwriting files or data on local and remote drives.
    title: Data Destruction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1662
    exact_mappings:
    - attack:T1662
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1662
  T1663:
    name: T1663
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1663
    annotations:
      attack-id:
        tag: attack-id
        value: T1663
    description: Adversaries may use legitimate remote access software, such as `VNC`,
      `TeamViewer`, `AirDroid`, `AirMirror`, etc., to establish an interactive command
      and control channel to target mobile devices.
    title: Remote Access Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1663
    exact_mappings:
    - attack:T1663
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1663
  T1664:
    name: T1664
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1664
    annotations:
      attack-id:
        tag: attack-id
        value: T1664
    description: Adversaries may exploit software vulnerabilities to gain initial
      access to a mobile device.
    title: Exploitation for Initial Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1664
    exact_mappings:
    - attack:T1664
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1664
  T1665:
    name: T1665
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1665
    annotations:
      attack-id:
        tag: attack-id
        value: T1665
    description: 'Adversaries may manipulate network traffic in order to hide and
      evade detection of their C2 infrastructure. This can be accomplished in various
      ways including by identifying and filtering traffic from defensive tools,(Citation:
      TA571) masking malicious domains to obfuscate the true destination from both
      automated scanning tools and security researchers,(Citation: Schema-abuse)(Citation:
      Facad1ng)(Citation: Browser-updates) and otherwise hiding malicious artifacts
      to delay discovery and prolong the effectiveness of adversary infrastructure
      that could otherwise be identified, blocked, or taken down entirely.'
    title: Hide Infrastructure
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1665
    exact_mappings:
    - attack:T1665
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1665
  T1666:
    name: T1666
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1666
    annotations:
      attack-id:
        tag: attack-id
        value: T1666
    description: Adversaries may attempt to modify hierarchical structures in infrastructure-as-a-service
      (IaaS) environments in order to evade defenses.
    title: Modify Cloud Resource Hierarchy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1666
    exact_mappings:
    - attack:T1666
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1666
  T1667:
    name: T1667
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1667
    annotations:
      attack-id:
        tag: attack-id
        value: T1667
    description: 'Adversaries may flood targeted email addresses with an overwhelming
      volume of messages. This may bury legitimate emails in a flood of spam and disrupt
      business operations.(Citation: sophos-bombing)(Citation: krebs-email-bombing)'
    title: Email Bombing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1667
    exact_mappings:
    - attack:T1667
    is_a: ImpactTechnique
    class_uri: d3f:T1667
  T1668:
    name: T1668
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1668
    annotations:
      attack-id:
        tag: attack-id
        value: T1668
    description: "Adversaries who successfully compromise a system may attempt to\
      \ maintain persistence by \u201Cclosing the door\u201D behind them  \u2013 in\
      \ other words, by preventing other threat actors from initially accessing or\
      \ maintaining a foothold on the same system."
    title: Exclusive Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1668
    exact_mappings:
    - attack:T1668
    is_a: PersistenceTechnique
    class_uri: d3f:T1668
  T1669:
    name: T1669
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1669
    annotations:
      attack-id:
        tag: attack-id
        value: T1669
    description: "Adversaries may gain initial access to target systems by connecting\
      \ to wireless networks. They may accomplish this by exploiting open Wi-Fi networks\
      \ used by target devices or by accessing secured Wi-Fi networks \u2014 requiring\
      \ [Valid Accounts](https://attack.mitre.org/techniques/T1078) \u2014 belonging\
      \ to a target organization.(Citation: DOJ GRU Charges 2018)(Citation: Nearest\
      \ Neighbor Volexity) Establishing a connection to a Wi-Fi access point requires\
      \ a certain level of proximity to both discover and maintain a stable network\
      \ connection."
    title: Wi-Fi Networks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1669
    exact_mappings:
    - attack:T1669
    is_a: InitialAccessTechnique
    class_uri: d3f:T1669
  T1670:
    name: T1670
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1670
    annotations:
      attack-id:
        tag: attack-id
        value: T1670
    description: 'Adversaries may carry out malicious operations using virtualization
      solutions to escape from Android sandboxes and to avoid detection. Android uses
      sandboxes to separate resources and code execution between applications and
      the operating system.(Citation: Android Application Sandbox) There are a few
      virtualization solutions available on Android, such as the Android Virtualization
      Framework (AVF).(Citation: Android AVF Overview)'
    title: Virtualization Solution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1670
    exact_mappings:
    - attack:T1670
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1670
  T1671:
    name: T1671
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1671
    annotations:
      attack-id:
        tag: attack-id
        value: T1671
    description: 'Adversaries may achieve persistence by leveraging OAuth application
      integrations in a software-as-a-service environment. Adversaries may create
      a custom application, add a legitimate application into the environment, or
      even co-opt an existing integration to achieve malicious ends.(Citation: Push
      Security SaaS Persistence 2022)(Citation: SaaS Attacks GitHub Evil Twin Integrations)'
    title: Cloud Application Integration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1671
    exact_mappings:
    - attack:T1671
    is_a: PersistenceTechnique
    class_uri: d3f:T1671
  T1672:
    name: T1672
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1672
    annotations:
      attack-id:
        tag: attack-id
        value: T1672
    description: "Adversaries may fake, or spoof, a sender\u2019s identity by modifying\
      \ the value of relevant email headers in order to establish contact with victims\
      \ under false pretenses.(Citation: Proofpoint TA427 April 2024) In addition\
      \ to actual email content, email headers (such as the FROM header, which contains\
      \ the email address of the sender) may also be modified. Email clients display\
      \ these headers when emails appear in a victim's inbox, which may cause modified\
      \ emails to appear as if they were from the spoofed entity."
    title: Email Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1672
    exact_mappings:
    - attack:T1672
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1672
  T1673:
    name: T1673
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1673
    annotations:
      attack-id:
        tag: attack-id
        value: T1673
    description: 'An adversary may attempt to enumerate running virtual machines (VMs)
      after gaining access to a host or hypervisor. For example, adversaries may enumerate
      a list of VMs on an ESXi hypervisor using a [Hypervisor CLI](https://attack.mitre.org/techniques/T1059/012)
      such as `esxcli` or `vim-cmd` (e.g. `esxcli vm process list or vim-cmd vmsvc/getallvms`).(Citation:
      Crowdstrike Hypervisor Jackpotting Pt 2 2021)(Citation: TrendMicro Play) Adversaries
      may also directly leverage a graphical user interface, such as VMware vCenter,
      in order to view virtual machines on a host.'
    title: Virtual Machine Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1673
    exact_mappings:
    - attack:T1673
    is_a: DiscoveryTechnique
    class_uri: d3f:T1673
  T1674:
    name: T1674
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1674
    annotations:
      attack-id:
        tag: attack-id
        value: T1674
    description: "Adversaries may simulate keystrokes on a victim\u2019s computer\
      \ by various means to perform any type of action on behalf of the user, such\
      \ as launching the command interpreter using keyboard shortcuts,  typing an\
      \ inline script to be executed, or interacting directly with a GUI-based application.\
      \  These actions can be preprogrammed into adversary tooling or executed through\
      \ physical devices such as Human Interface Devices (HIDs)."
    title: Input Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1674
    exact_mappings:
    - attack:T1674
    is_a: ExecutionTechnique
    class_uri: d3f:T1674
  T1675:
    name: T1675
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1675
    annotations:
      attack-id:
        tag: attack-id
        value: T1675
    description: 'Adversaries may abuse ESXi administration services to execute commands
      on guest machines hosted within an ESXi virtual environment. Persistent background
      services on ESXi-hosted VMs, such as the VMware Tools Daemon Service, allow
      for remote management from the ESXi server. The tools daemon service runs as
      `vmtoolsd.exe` on Windows guest operating systems, `vmware-tools-daemon` on
      macOS, and `vmtoolsd ` on Linux.(Citation: Broadcom VMware Tools Services)'
    title: ESXi Administration Command
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1675
    exact_mappings:
    - attack:T1675
    is_a: ExecutionTechnique
    class_uri: d3f:T1675
  T1676:
    name: T1676
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1676
    annotations:
      attack-id:
        tag: attack-id
        value: T1676
    description: "Adversaries may abuse the \u201Clinked devices\u201D feature on\
      \ messaging applications, such as Signal and WhatsApp, to register the user\u2019\
      s account to an adversary-controlled device. By abusing the \u201Clinked devices\u201D\
      \ feature, adversaries may achieve and maintain persistence through the user\u2019\
      s account, may collect information, such as the user\u2019s messages and contacts\
      \ list, and may send future messages from the linked device."
    title: Linked Devices
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1676
    exact_mappings:
    - attack:T1676
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1676
  T1677:
    name: T1677
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1677
    annotations:
      attack-id:
        tag: attack-id
        value: T1677
    description: 'Adversaries may manipulate continuous integration / continuous development
      (CI/CD) processes by injecting malicious code into the build process. There
      are several mechanisms for poisoning pipelines:'
    title: Poisoned Pipeline Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1677
    exact_mappings:
    - attack:T1677
    is_a: ExecutionTechnique
    class_uri: d3f:T1677
  T1678:
    name: T1678
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1678
    annotations:
      attack-id:
        tag: attack-id
        value: T1678
    description: Adversaries may employ various time-based methods to evade detection
      and analysis. These techniques often exploit system clocks, delays, or timing
      mechanisms to obscure malicious activity, blend in with benign activity, and
      avoid scrutiny. Adversaries can perform this behavior within virtualization/sandbox
      environments or natively on host systems.
    title: Delay Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1678
    exact_mappings:
    - attack:T1678
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1678
  T1679:
    name: T1679
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1679
    annotations:
      attack-id:
        tag: attack-id
        value: T1679
    description: 'Adversaries may intentionally exclude certain files, folders, directories,
      file types, or system components from encryption or tampering during a ransomware
      or malicious payload execution. Some file extensions that adversaries may avoid
      encrypting include `.dll`, `.exe`, and `.lnk`.(Citation: Palo Alto Unit 42 Medusa
      Group Medusa Ransomware January 2024)'
    title: Selective Exclusion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1679
    exact_mappings:
    - attack:T1679
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1679
  T1680:
    name: T1680
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1680
    annotations:
      attack-id:
        tag: attack-id
        value: T1680
    description: Adversaries may enumerate local drives, disks, and/or volumes and
      their attributes like total or free space and volume serial number. This can
      be done to prepare for ransomware-related encryption, to perform [Lateral Movement](https://attack.mitre.org/tactics/TA0109),
      or as a precursor to [Direct Volume Access](https://attack.mitre.org/techniques/T1006).
    title: Local Storage Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1680
    exact_mappings:
    - attack:T1680
    is_a: DiscoveryTechnique
    class_uri: d3f:T1680
  T1681:
    name: T1681
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1681
    annotations:
      attack-id:
        tag: attack-id
        value: T1681
    description: "Threat actors may seek information/indicators from closed or open\
      \ threat intelligence sources gathered about their own campaigns, as well as\
      \ those conducted by other adversaries that may align with their target industries,\
      \ capabilities/objectives, or other operational concerns. These reports may\
      \ include descriptions of behavior, detailed breakdowns of attacks, atomic indicators\
      \ such as malware hashes or IP addresses, timelines of a group\u2019s activity,\
      \ and more. Adversaries may change their behavior when planning their future\
      \ operations."
    title: Search Threat Vendor Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1681
    exact_mappings:
    - attack:T1681
    is_a: ReconnaissanceTechnique
    class_uri: d3f:T1681
  TA0001:
    name: TA0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '1'
    description: 'The adversary is trying to get into your network.


      Initial Access consists of techniques that use various entry vectors to gain
      their initial foothold within a network. Techniques used to gain a foothold
      include targeted spearphishing and exploiting weaknesses on public-facing web
      servers. Footholds gained through initial access may allow for continued access,
      like valid accounts and use of external remote services, or may be limited-use
      due to changing passwords.'
    title: Initial Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0001
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0001
  TA0002:
    name: TA0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '2'
    description: 'The adversary is trying to run malicious code.


      Execution consists of techniques that result in adversary-controlled code running
      on a local or remote system. Techniques that run malicious code are often paired
      with techniques from all other tactics to achieve broader goals, like exploring
      a network or stealing data. For example, an adversary might use a remote access
      tool to run a PowerShell script that does Remote System Discovery.'
    title: Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0002
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0002
  TA0003:
    name: TA0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '3'
    description: 'The adversary is trying to maintain their foothold.


      Persistence consists of techniques that adversaries use to keep access to systems
      across restarts, changed credentials, and other interruptions that could cut
      off their access. Techniques used for persistence include any access, action,
      or configuration changes that let them maintain their foothold on systems, such
      as replacing or hijacking legitimate code or adding startup code.'
    title: Persistence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0003
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0003
  TA0004:
    name: TA0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '4'
    description: 'The adversary is trying to gain higher-level permissions.


      Privilege Escalation consists of techniques that adversaries use to gain higher-level
      permissions on a system or network. Adversaries can often enter and explore
      a network with unprivileged access but require elevated permissions to follow
      through on their objectives. Common approaches are to take advantage of system
      weaknesses, misconfigurations, and vulnerabilities. Examples of elevated access
      include:


      SYSTEM/root level

      local administrator

      user account with admin-like access

      user accounts with access to specific system or perform specific function


      These techniques often overlap with Persistence techniques, as OS features that
      let an adversary persist can execute in an elevated context.'
    title: Privilege Escalation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0004
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0004
  TA0005:
    name: TA0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '5'
    description: 'The adversary is trying to avoid being detected.


      Defense Evasion consists of techniques that adversaries use to avoid detection
      throughout their compromise. Techniques used for defense evasion include uninstalling/disabling
      security software or obfuscating/encrypting data and scripts. Adversaries also
      leverage and abuse trusted processes to hide and masquerade their malware. Other
      tactics'' techniques are cross-listed here when those techniques include the
      added benefit of subverting defenses.'
    title: Defense Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0005
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0005
  TA0006:
    name: TA0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '6'
    description: 'The adversary is trying to steal account names and passwords.


      Credential Access consists of techniques for stealing credentials like account
      names and passwords. Techniques used to get credentials include keylogging or
      credential dumping. Using legitimate credentials can give adversaries access
      to systems, make them harder to detect, and provide the opportunity to create
      more accounts to help achieve their goals.'
    title: Credential Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0006
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0006
  TA0007:
    name: TA0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '7'
    description: 'The adversary is trying to figure out your environment.


      Discovery consists of techniques an adversary may use to gain knowledge about
      the system and internal network. These techniques help adversaries observe the
      environment and orient themselves before deciding how to act. They also allow
      adversaries to explore what they can control and what''s around their entry
      point in order to discover how it could benefit their current objective. Native
      operating system tools are often used toward this post-compromise information-gathering
      objective.'
    title: Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0007
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0007
  TA0008:
    name: TA0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '8'
    description: 'The adversary is trying to move through your environment.


      Lateral Movement consists of techniques that adversaries use to enter and control
      remote systems on a network. Following through on their primary objective often
      requires exploring the network to find their target and subsequently gaining
      access to it. Reaching their objective often involves pivoting through multiple
      systems and accounts to gain. Adversaries might install their own remote access
      tools to accomplish Lateral Movement or use legitimate credentials with native
      network and operating system tools, which may be stealthier.'
    title: Lateral Movement
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0008
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0008
  TA0009:
    name: TA0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '9'
    description: 'The adversary is trying to gather data of interest to their goal.


      Collection consists of techniques adversaries may use to gather information
      and the sources information is collected from that are relevant to following
      through on the adversary''s objectives. Frequently, the next goal after collecting
      data is to either steal (exfiltrate) the data or to use the data to gain more
      information about the target environment. Common target sources include various
      drive types, browsers, audio, video, and email. Common collection methods include
      capturing screenshots and keyboard input.'
    title: Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0009
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0009
  TA0010:
    name: TA0010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '11'
    description: 'The adversary is trying to steal data.


      Exfiltration consists of techniques that adversaries may use to steal data from
      your network. Once they''ve collected data, adversaries often package it to
      avoid detection while removing it. This can include compression and encryption.
      Techniques for getting data out of a target network typically include transferring
      it over their command and control channel or an alternate channel and may also
      include putting size limits on the transmission.'
    title: Exfiltration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0010
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0010
  TA0011:
    name: TA0011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '10'
    description: 'The adversary is trying to communicate with compromised systems
      to control them.


      Command and Control consists of techniques that adversaries may use to communicate
      with systems under their control within a victim network. Adversaries commonly
      attempt to mimic normal, expected traffic to avoid detection. There are many
      ways an adversary can establish command and control with various levels of stealth
      depending on the victim''s network structure and defenses.'
    title: Command And Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0011
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0011
  TA0027:
    name: TA0027
