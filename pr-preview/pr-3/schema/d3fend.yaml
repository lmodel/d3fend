  LANAccessMediation:
    name: LANAccessMediation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LANAccessMediation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-LAMED
      kb-article:
        tag: kb-article
        value: '## How it works LAN Access Mediation is a network security approach
          that manages and controls access to a Local Area Network by using key components
          such as Access Control Lists (ACLs) to specify which devices are allowed
          or denied access, Port Security to restrict device connections to specific
          sw'
    description: LAN access mediation encompasses the application of strict access
      control policies, systematic verification of devices, and authentication mechanisms
      to govern connectivity to a Local Area Network.
    title: LAN Access Mediation
    comments:
    - Layer 2 Enforcement
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
