    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  ATTACKEnterpriseDataSourceEnum:
    name: ATTACKEnterpriseDataSourceEnum
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ATTACKEnterpriseDataSourceEnum
    description: 'Enumeration of ATTACKEnterpriseDataSource values. Open set: additional
      string values beyond this list are permitted.'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    permissible_values:
      DS0001:
        text: DS0001
        description: Firmware (ATT&CK DS)
        meaning: d3f:DS0001
        notes:
        - Computer software that provides low-level control for the hardware and device(s)
          of a host, such as BIOS or UEFI/EFI
      DS0002:
        text: DS0002
        description: User Account (ATT&CK DS)
        meaning: d3f:DS0002
        notes:
        - A profile representing a user, device, service, or application used to authenticate
          and access resources
      DS0003:
        text: DS0003
        description: Scheduled Job (ATT&CK DS)
        meaning: d3f:DS0003
        notes:
        - 'Automated tasks that can be executed at a specific time or on a recurring
          schedule running in the background (ex: Cron daemon, task scheduler, BITS)'
      DS0004:
        text: DS0004
        description: Malware Repository (ATT&CK DS)
        meaning: d3f:DS0004
        notes:
        - Information obtained (via shared or submitted samples) regarding malicious
          software (droppers, backdoors, etc.) used by adversaries
      DS0005:
        text: DS0005
        description: WMI (ATT&CK DS)
        meaning: d3f:DS0005
        notes:
        - The infrastructure for management data and operations that enables local
          and remote management of Windows personal computers and servers
      DS0006:
        text: DS0006
        description: Web Credential (ATT&CK DS)
        meaning: d3f:DS0006
        notes:
        - Credential material, such as session cookies or tokens, used to authenticate
          to web applications and services
      DS0007:
        text: DS0007
        description: Image (ATT&CK DS)
        meaning: d3f:DS0007
        notes:
        - A single file used to deploy a virtual machine/bootable disk into an on-premise
          or third-party cloud environment
      DS0008:
        text: DS0008
        description: Kernel (ATT&CK DS)
        meaning: d3f:DS0008
        notes:
        - A computer program, at the core of a computer OS, that resides in memory
          and facilitates interactions between hardware and software components
      DS0009:
        text: DS0009
        description: Process (ATT&CK DS)
        meaning: d3f:DS0009
        notes:
        - Instances of computer programs that are being executed by at least one thread.
          Processes have memory space for process executables, loaded modules (DLLs
          or shared libraries), and allocated memory regions containing everything
          from user input to application-specific data structures
      DS0010:
        text: DS0010
        description: Cloud Storage (ATT&CK DS)
        meaning: d3f:DS0010
        notes:
        - Data object storage infrastructure hosted on-premise or by third-party providers,
          made available to users through network connections and/or APIs
      DS0011:
        text: DS0011
        description: Module (ATT&CK DS)
        meaning: d3f:DS0011
        notes:
        - Executable files consisting of one or more shared classes and interfaces,
          such as portable executable (PE) format binaries/dynamic link libraries
          (DLL), executable and linkable format (ELF) binaries/shared libraries, and
          Mach-O format binaries/shared libraries
      DS0012:
        text: DS0012
        description: Script (ATT&CK DS)
        meaning: d3f:DS0012
        notes:
        - A file or stream containing a list of commands, allowing them to be launched
          in sequence
      DS0013:
        text: DS0013
        description: Sensor Health (ATT&CK DS)
        meaning: d3f:DS0013
        notes:
        - Information from host telemetry providing insights about system status,
          errors, or other notable functional activity
      DS0014:
        text: DS0014
        description: Pod (ATT&CK DS)
        meaning: d3f:DS0014
        notes:
        - A single unit of shared resources within a cluster, comprised of one or
          more containers
      DS0015:
        text: DS0015
        description: Application Log (ATT&CK DS)
        meaning: d3f:DS0015
        notes:
        - Events collected by third-party services such as mail servers, web applications,
          or other appliances (not by the native OS or platform)
      DS0016:
        text: DS0016
        description: Drive (ATT&CK DS)
        meaning: d3f:DS0016
        notes:
        - A non-volatile data storage device (hard drive, floppy disk, USB flash drive)
          with at least one formatted partition, typically mounted to the file system
          and/or assigned a drive letter
      DS0017:
        text: DS0017
        description: Command (ATT&CK DS)
        meaning: d3f:DS0017
        notes:
        - A directive given to a computer program, acting as an interpreter of some
          kind, in order to perform a specific task
      DS0018:
        text: DS0018
        description: Firewall (ATT&CK DS)
        meaning: d3f:DS0018
        notes:
        - 'A network security system, running locally on an endpoint or remotely as
          a service (ex: cloud environment), that monitors and controls incoming/outgoing
          network traffic based on predefined rules'
      DS0019:
        text: DS0019
        description: Service (ATT&CK DS)
        meaning: d3f:DS0019
        notes:
        - A computer process that is configured to execute continuously in the background
          and perform system tasks, in some cases before any user has logged in
      DS0020:
        text: DS0020
        description: Snapshot (ATT&CK DS)
        meaning: d3f:DS0020
        notes:
        - A point-in-time copy of cloud volumes (files, settings, etc.) that can be
          created and/or deployed in cloud environments
      DS0021:
        text: DS0021
        description: Persona (ATT&CK DS)
        meaning: d3f:DS0021
        notes:
        - A malicious online profile representing a user commonly used by adversaries
          to social engineer or otherwise target victims
      DS0022:
        text: DS0022
        description: File (ATT&CK DS)
        meaning: d3f:DS0022
        notes:
        - A computer resource object, managed by the I/O system, for storing data
          (such as images, text, videos, computer programs, or any wide variety of
          other media)
      DS0023:
        text: DS0023
        description: Named Pipe (ATT&CK DS)
        meaning: d3f:DS0023
        notes:
        - Mechanisms that allow inter-process communication locally or over the network.
          A named pipe is usually found as a file and processes attach to it
      DS0024:
        text: DS0024
        description: Windows Registry (ATT&CK DS)
        meaning: d3f:DS0024
        notes:
        - A Windows OS hierarchical database that stores much of the information and
          settings for software programs, hardware devices, user preferences, and
          operating-system configurations
      DS0025:
        text: DS0025
        description: Cloud Service (ATT&CK DS)
        meaning: d3f:DS0025
        notes:
        - Infrastructure, platforms, or software that are hosted on-premise or by
          third-party providers, made available to users through network connections
          and/or APIs
      DS0026:
        text: DS0026
        description: Active Directory (ATT&CK DS)
        meaning: d3f:DS0026
        notes:
        - A database and set of services that allows administrators to manage permissions,
          access to network resources, and stored data objects (user, group, application,
          or devices)
      DS0027:
        text: DS0027
        description: Driver (ATT&CK DS)
        meaning: d3f:DS0027
        notes:
        - A computer program that operates or controls a particular type of device
          that is attached to a computer. Provides a software interface to hardware
          devices, enabling operating systems and other computer programs to access
          hardware functions without needing to know precise details about the hardware
          being used
      DS0028:
        text: DS0028
        description: Logon Session (ATT&CK DS)
        meaning: d3f:DS0028
        notes:
        - Logon occurring on a system or resource (local, domain, or cloud) to which
          a user/device is gaining access after successful authentication and authorization
      DS0029:
        text: DS0029
        description: Network Traffic (ATT&CK DS)
        meaning: d3f:DS0029
        notes:
        - 'Data transmitted across a network (ex: Web, DNS, Mail, File, etc.), that
          is either summarized (ex: Netflow) and/or captured as raw data in an analyzable
          format (ex: PCAP)'
      DS0030:
        text: DS0030
        description: Instance (ATT&CK DS)
        meaning: d3f:DS0030
        notes:
        - A virtual server environment which runs workloads, hosted on-premise or
          by third-party cloud providers
      DS0032:
        text: DS0032
        description: Container (ATT&CK DS)
        meaning: d3f:DS0032
        notes:
        - A standard unit of virtualized software that packages up code and all its
          dependencies so the application runs quickly and reliably from one computing
          environment to another
      DS0033:
        text: DS0033
        description: Network Share (ATT&CK DS)
        meaning: d3f:DS0033
        notes:
        - A storage resource (typically a folder or drive) made available from one
          host to others using network protocols, such as Server Message Block (SMB)
          or Network File System (NFS)
      DS0034:
        text: DS0034
        description: Volume (ATT&CK DS)
        meaning: d3f:DS0034
        notes:
        - Block object storage hosted on-premise or by third-party providers, typically
          made available to resources as virtualized hard drives
      DS0035:
        text: DS0035
        description: Internet Scan (ATT&CK DS)
        meaning: d3f:DS0035
        notes:
        - Information obtained (commonly via active network traffic probes or web
          crawling) regarding various types of resources and servers connected to
          the public Internet
      DS0036:
        text: DS0036
        description: Group (ATT&CK DS)
        meaning: d3f:DS0036
        notes:
        - A collection of multiple user accounts that share the same access rights
          to the computer and/or network resources and have common security rights
      DS0037:
        text: DS0037
        description: Certificate (ATT&CK DS)
        meaning: d3f:DS0037
        notes:
        - A digital document, which highlights information such as the owner's identity,
          used to instill trust in public keys used while encrypting network communications
      DS0038:
        text: DS0038
        description: Domain Name (ATT&CK DS)
        meaning: d3f:DS0038
        notes:
        - 'Information obtained (commonly through registration or activity logs) regarding
          one or more IP addresses registered with human readable names (ex: mitre.org)'
      DS0039:
        text: DS0039
        description: Asset (ATT&CK DS)
        meaning: d3f:DS0039
        notes:
        - Data sources with information about the set of devices found within the
          network, along with their current software and configurations
      DS0040:
        text: DS0040
        description: Operational Database (ATT&CK DS)
        meaning: d3f:DS0040
