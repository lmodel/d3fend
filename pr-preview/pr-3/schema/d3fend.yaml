    class_uri: d3f:PlatformUptime
  PlatformUptimeMonitoring:
    name: PlatformUptimeMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PlatformUptimeMonitoring
    annotations:
