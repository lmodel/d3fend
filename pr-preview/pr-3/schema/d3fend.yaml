        tag: d3fend-id
        value: D3A-GAKG
      kb-article:
        tag: kb-article
        value: '## References 1. Wolfram Research. (2012). GoodmanKruskalGamma. Wolfram
          Language function. [Link](https://reference.wolfram.com/language/ref/GoodmanKruskalGamma.html)
          1. Goodman and Kruskal''s gamma. (2022, Nov 23). In _Wikipedia_. [Link](https://en.wikipedia.org/wiki/Goodman_and_Kruskal%27s_gamma]'
    description: Goodman-Kruskal $\\gamma$ is a measure of rank correlation between
      x and y and is given by $(n_c -n_d) / (n_c + n_d)$, where $n_c$ is the number
      of concordant pairs of the observations and $n_d$ is the number of discordant
      pairs.
    title: Goodman and Kruskal's Gamma
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://reference.wolfram.com/language/ref/GoodmanKruskalGamma.html
    mappings:
