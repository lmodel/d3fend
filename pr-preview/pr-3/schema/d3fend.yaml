  TransferLearning:
    name: TransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-TL
      kb-article:
        tag: kb-article
        value: '## References Transfer learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Transfer_learning).'
    description: Transfer learning (TL) is a research problem in machine learning
      (ML) that focuses on storing knowledge gained while solving one problem and
      applying it to a different but related problem.
    title: Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://arxiv.org/abs/1808.01974
    - https://arxiv.org/abs/1911.02685
    - https://journalofbigdata.springeropen.com/articles/10.1186/s40537-016-0043-6
