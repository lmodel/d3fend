    is_a: NetworkAccessMediation
    class_uri: d3f:LANAccessMediation
  LM_0001:
    name: LM_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0001
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0001
    description: Threat actors may use the hosted payload within the victim spacecraft
      in order to gain access to other subsystems. The hosted payload often has a
      need to gather and send data to the internal subsystems, depending on its purpose.
      Threat actors may be able to take advantage of this communication in order to
      laterally move to the other subsystems and have commands be processed.
    title: Hosted Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0001/
    aliases:
    - LM-0001
    mappings:
    - d3f:LM-0001
    exact_mappings:
    - attack:LM-0001
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0001
  LM_0002:
    name: LM_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0002
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0002
    description: Threat actors may exploit victim spacecraft on-board flat architecture
      for lateral movement purposes. Depending on implementation decisions, spacecraft
      can have a completely flat architecture where remote terminals, sub-systems,
      payloads, etc. can all communicate on the same main bus without any segmentation,
      authentication, etc. Threat actors can leverage this poor design to send specially
      crafted data from one compromised devices or sub-system. This could enable the
      threat actor to laterally move to another area of the spacecraft or escalate
      privileges (i.e., bus master, bus controller)
    title: Exploit Lack of Bus Segregation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0002/
    aliases:
    - LM-0002
    mappings:
    - d3f:LM-0002
    exact_mappings:
    - attack:LM-0002
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0002
  LM_0003:
    name: LM_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0003
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0003
    description: Threat actors may attempt to command another neighboring spacecraft
      via crosslink. spacecraft in close proximity are often able to send commands
      back and forth. Threat actors may be able to leverage this access to compromise
      another spacecraft.
    title: Constellation Hopping via Crosslink
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0003/
    aliases:
    - LM-0003
    mappings:
    - d3f:LM-0003
    exact_mappings:
    - attack:LM-0003
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0003
  LM_0004:
    name: LM_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0004
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0004
    description: Threat actors may move from one spacecraft to another through visiting
      vehicle interfaces. When a vehicle docks with a spacecraft, many programs are
      automatically triggered in order to ensure docking mechanisms are locked. This
      entails several data points and commands being sent to and from the spacecraft
      and the visiting vehicle. If a threat actor were to compromise a visiting vehicle,
      they could target these specific programs in order to send malicious commands
      to the victim spacecraft once docked.
    title: Visiting Vehicle Interface(s)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0004/
    aliases:
    - LM-0004
    mappings:
    - d3f:LM-0004
    exact_mappings:
    - attack:LM-0004
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0004
  LM_0005:
    name: LM_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0005
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0005
    description: In virtualized environments, threat actors can use the open ports
      between the partitions to overcome the hypervisor's protection and damage another
      partition. Further, if the threat actor has compromised the payload, access
      to a critical partition can be gained through ports allowed by hypervisor.
    title: Virtualization Escape
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0005/
    aliases:
    - LM-0005
    mappings:
    - d3f:LM-0005
    exact_mappings:
    - attack:LM-0005
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0005
  LM_0006:
    name: LM_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0006
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0006
    description: Threat actors may attempt to exploit reduced protections placed on
      the interfaces between launch vehicles and payloads in order to move from one
      to the other.
    title: Launch Vehicle Interface
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0006/
    aliases:
    - LM-0006
    mappings:
    - d3f:LM-0006
    exact_mappings:
    - attack:LM-0006
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0006
  LM_0006_01:
    name: LM_0006_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM000601
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0006.01
    description: Threat actors may attempt to move laterally between multiple co-located
      payloads onboard the same launch vehicle during shared launch missions (i.e.,
      rideshare configurations). This differs from lateral movement between spacecraft
      subsystems or onboard hosted payloads. In this case, each payload may belong
      to a different customer or organization, but they share the same physical transport
      infrastructure. If insufficient isolation or segmentation exists between payloads
      during launch integration (e.g., shared avionics bus, data interface, or environmental
      control), threat actors may exploit the launch vehicle interface to enable cross-payload
      access or data compromise before separation.
    title: Rideshare Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0006/01/
    aliases:
    - LM-0006.01
    mappings:
    - d3f:LM-0006.01
    exact_mappings:
    - attack:LM-0006.01
    is_a: LM_0006
    class_uri: d3f:LM-0006.01
  LM_0007:
    name: LM_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LM0007
    annotations:
      attack-id:
        tag: attack-id
        value: LM-0007
    description: Threat actors may leverage valid credentials to traverse across spacecraft
      subsystems, communication buses, or even to access other spacecraft within a
      constellation, all while avoiding detection. These credentials may include system
      service accounts, user accounts, maintenance credentials, cryptographic keys,
      or other authentication mechanisms that grant authorized access. Rather than
      exploiting vulnerabilities, this technique relies on the reuse or misuse of
      trusted credentials to move laterally within the space system architecture.
      When access control boundaries are weak, flat, or poorly enforced, valid credentials
      can enable attackers to reach restricted functions or domains without raising
      alarms. This traversal allows evasion of isolation mechanisms and facilitates
      further actions without triggering traditional anomaly detection tied to unauthorized
      access attempts.
    title: Credentialed Traversal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/LM-0007/
    aliases:
    - LM-0007
    mappings:
    - d3f:LM-0007
    exact_mappings:
    - attack:LM-0007
    is_a: SPARTALateralMovementTechnique
    class_uri: d3f:LM-0007
  LaptopComputer:
    name: LaptopComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LaptopComputer
    description: A laptop computer (also laptop), is a small, portable personal computer
      (PC) with a "clamshell" form factor, typically having a thin LCD or LED computer
      screen mounted on the inside of the upper lid of the clamshell and an alphanumeric
      keyboard on the inside of the lower lid. The clamshell is opened up to use the
      computer. Laptops are folded shut for transportation, and thus are suitable
      for mobile use. Its name comes from lap, as it was deemed to be placed on a
      person's lap when being used. Although originally there was a distinction between
      laptops and notebooks (the former being bigger and heavier than the latter),
      as of 2014, there is often no longer any difference. Today, laptops are commonly
      used in a variety of settings, such as at work, in education, for playing games,
      web browsing
    title: Laptop Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Laptop
    aliases:
    - Laptop
    - Notebook
    mappings:
    - d3f:LaptopComputer
    is_a: PersonalComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:LaptopComputer
  LateralMovementTechnique:
    name: LateralMovementTechnique
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LateralMovementTechnique
    annotations:
