    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FileTransferNetworkTraffic
  FileUnmountEvent:
    name: FileUnmountEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileUnmountEvent
    description: An event where a file system or storage volume is unmounted, disconnecting
      its files and directories from the operating system or applications.
    title: File Unmount Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FileUnmountEvent
    is_a: FileEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:FileUnmountEvent
  FileUpdateEvent:
    name: FileUpdateEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileUpdateEvent
    description: An event involving changes to the content or metadata of an existing
      file, reflecting updates that alter its state or properties.
    title: File Update Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FileUpdateEvent
    is_a: FileEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:FileUpdateEvent
  FingerPrintScannerInputDevice:
    name: FingerPrintScannerInputDevice
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FingerPrintScannerInputDevice
    description: A fingerprint sensor is an electronic device used to capture a digital
      image of the fingerprint pattern. The captured image is called a live scan.
      This live scan is digitally processed to create a biometric template (a collection
      of extracted features) which is stored and used for matching. Many technologies
      have been used including optical, capacitive, RF, thermal, piezoresistive, ultrasonic,
      piezoelectric, and MEMS.
    title: Finger Print Scanner Input Device
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Fingerprint#Fingerprint_sensors
    aliases:
    - Fingerprint Sensor
    mappings:
    - d3f:FingerPrintScannerInputDevice
    is_a: ImageScannerInputDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FingerPrintScannerInputDevice
  Firewall:
    name: Firewall
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Firewall
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a firewall is a network security system that monitors
      and controls incoming and outgoing network traffic based on predetermined security
      rules. A firewall typically establishes a barrier between a trusted internal
      network and untrusted external network, such as the Internet. Firewalls are
      often categorized as either network firewalls or host-based firewalls. Network
      firewalls filter traffic between two or more networks and run on network hardware.
      Host-based firewalls run on host computers and control network traffic in and
      out of those machines. This definition refers to network firewalls.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Firewall_(computing)
    aliases:
    - Network Firewall
    mappings:
    - d3f:Firewall
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Firewall
  Firmware:
    name: Firmware
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Firmware
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In electronic systems and computing, firmware is a type of software
      that provides control, monitoring and data manipulation of engineered products
      and systems. Typical examples of devices containing firmware are embedded systems
      (such as traffic lights, consumer appliances, remote controls and digital watches),
      computers, computer peripherals, mobile phones, and digital cameras. The firmware
      contained in these devices provides the low-level control program for the device.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Firmware
    mappings:
    - d3f:Firmware
    is_a: Software
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Firmware
  FirmwareBehaviorAnalysis:
    name: FirmwareBehaviorAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirmwareBehaviorAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FBA
      synonym:
        tag: synonym
        value: Firmware Timing Analysis
      kb-article:
        tag: kb-article
        value: '## How it works Firmware behavior analysis provides protections by
          ensuring that installed firmware has not been tampered with or modified.
          Firmware analysis applies to mutable firmware and immutable read-only memory
          (ROMs). Firmware in deployed network devices is typically not analyzed and
          monitor'
    description: Analyzing the behavior of embedded code in firmware and looking for
      anomalous behavior and suspicious activity.
    title: Firmware Behavior Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FirmwareBehaviorAnalysis
    related_mappings:
    - attack:T1014
    - attack:T1542.001
    - attack:T1542.002
    - attack:T1542.004
    broad_mappings:
    - d3f:DefenseEvasionTechnique
    - d3f:T1542
    is_a: PlatformMonitoring
    class_uri: d3f:FirmwareBehaviorAnalysis
  FirmwareEmbeddedMonitoringCode:
    name: FirmwareEmbeddedMonitoringCode
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirmwareEmbeddedMonitoringCode
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FEMC
      kb-article:
        tag: kb-article
        value: '## How it works Firmware in deployed network devices is typically
          not monitored for malicious changes. This technique provides a method to
          embed a software security component into the deployed firmware which provides
          a near real-time monitoring hook. The exception handling code, in the firmware,
          is'
    description: Monitoring code is injected into firmware for integrity monitoring
      of firmware and firmware data.
    title: Firmware Embedded Monitoring Code
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FirmwareEmbeddedMonitoringCode
    related_mappings:
    - attack:T1014
    - attack:T1542.001
    - attack:T1542.002
    - attack:T1542.004
    broad_mappings:
    - d3f:DefenseEvasionTechnique
    - d3f:T1542
    is_a: PlatformMonitoring
    class_uri: d3f:FirmwareEmbeddedMonitoringCode
  FirmwareSensor:
    name: FirmwareSensor
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirmwareSensor
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Collects information on firmware installed on an Endpoint.
    title: Firmware Sensor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FirmwareSensor
    is_a: EndpointSensor
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FirmwareSensor
  FirmwareVerification:
    name: FirmwareVerification
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirmwareVerification
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FV
      kb-article:
        tag: kb-article
        value: '## How it works Cryptographic hash values are computed for system
          and peripheral firmware. The hash values are compared against precomputed
          hash values for the identified firmware. A hash value mismatch may indicate
          that the firmware may have been tampered with or updated with a non-current
          release'
    description: Cryptographically verifying firmware integrity.
    title: Firmware Verification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FirmwareVerification
    related_mappings:
    - attack:T1014
    - attack:T1542.001
    - attack:T1542.002
    - attack:T1542.004
    broad_mappings:
    - d3f:DefenseEvasionTechnique
    - d3f:T1542
    is_a: PlatformMonitoring
    class_uri: d3f:FirmwareVerification
  First_orderLogic:
    name: First_orderLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirstOrderLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-FOL
      synonym:
        tag: synonym
        value: FOL
      kb-article:
        tag: kb-article
        value: '## How it works For propositions such as "Socrates is a man", one
          can have expressions in the form "there exists x such that x is Socrates
          and x is a man", where "there exists" is a quantifier, while x is a variable.
          This distinguishes it from propositional logic, which does not use quantifiers
          or'
    description: First-order logic is a collection of formal systems used in mathematics,
      philosophy, linguistics, and computer science. First-order logic uses quantified
      variables over non-logical objects, and allows the use of sentences that contain
      variables.
    title: First-order Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - First-orderLogic
    mappings:
    - d3f:First-orderLogic
    is_a: PredicateLogic
    class_uri: d3f:First-orderLogic
  First_stageBootLoader:
    name: First_stageBootLoader
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FirstStageBootLoader
    description: The very first routine run in order to load the operating system.
    title: First-stage Boot Loader
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - First-stageBootLoader
    mappings:
    - d3f:First-stageBootLoader
    is_a: BootLoader
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:First-stageBootLoader
  FlashMemory:
    name: FlashMemory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FlashMemory
    description: Flash memory is an electronic non-volatile computer memory storage
      medium that can be electrically erased and reprogrammed.
    title: Flash Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Flash_memory
    mappings:
    - d3f:FlashMemory
    is_a: SecondaryStorage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FlashMemory
  Forecasting:
    name: Forecasting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Forecasting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Forecasting
    is_a: AnalyticalPurpose
    class_uri: d3f:Forecasting
  ForwardProxyServer:
    name: ForwardProxyServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ForwardProxyServer
    description: An forward (or open) proxy is a proxy server that is accessible by
      any Internet user. Generally, a proxy server only allows users within a network
      group (i.e. a closed proxy) to store and forward Internet services such as DNS
      or web pages to reduce and control the bandwidth used by the group. With an
      open proxy, however, any user on the Internet is able to use this forwarding
      service.
    title: Forward Proxy Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Open_proxy
    mappings:
    - d3f:ForwardProxyServer
    is_a: ProxyServer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ForwardProxyServer
  ForwardResolutionDomainDenylisting:
    name: ForwardResolutionDomainDenylisting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ForwardResolutionDomainDenylisting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FRDDL
      synonym:
        tag: synonym
        value: Forward Resolution Domain Blacklisting
      kb-article:
        tag: kb-article
        value: '## How it works Policies are created that filter DNS queries using
          fully qualified domain name (FQDN) of record in the query. A DNS policy
          can be created for blocking DNS queries from FQDNs that have been identified
          as unauthorized. ## Considerations Continuous maintenance of unauthorized
          domain'
    description: Blocking a lookup based on the query's domain name value.
    title: Forward Resolution Domain Denylisting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ForwardResolutionDomainDenylisting
    related_mappings:
    - attack:T1071.004
    - attack:T1568
    broad_mappings:
    - d3f:CommandAndControlTechnique
    - d3f:T1071
    is_a: DNSDenylisting
    class_uri: d3f:ForwardResolutionDomainDenylisting
  ForwardResolutionIPDenylisting:
    name: ForwardResolutionIPDenylisting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ForwardResolutionIPDenylisting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FRIDL
      synonym:
        tag: synonym
        value: Forward Resolution IP Blacklisting
      kb-article:
        tag: kb-article
        value: '## How it works This technique prevents a client from learning IP
          addresses deemed to be potentially malicious, which would have been delivered
          via forward resolution responses. Responses to forward resolution requests
          (that is, requests where a domain is sent and IP(s) are returned) are collected'
    description: Blocking a DNS lookup's answer's IP address value.
    title: Forward Resolution IP Denylisting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ForwardResolutionIPDenylisting
    is_a: DNSDenylisting
    class_uri: d3f:ForwardResolutionIPDenylisting
  FreeMemory:
    name: FreeMemory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FreeMemory
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    title: Free Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FreeMemory
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FreeMemory
  FullVolumeSnapshot:
    name: FullVolumeSnapshot
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FullVolumeSnapshot
    description: A full volume snapshot is a point-in-time copy of the complete contents
      of a volume.
    title: Full Volume Snapshot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://aws.amazon.com/compare/the-difference-between-incremental-differential-and-other-backups/
    mappings:
    - d3f:FullVolumeSnapshot
    is_a: VolumeSnapshot
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FullVolumeSnapshot
  FuzzyLogic:
    name: FuzzyLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FuzzyLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-FL
      kb-article:
        tag: kb-article
        value: '## How it works It is employed to handle the concept of partial truth,
          where the truth value may range between completely true and completely false.[1]
          By contrast, in Boolean logic, the truth values of variables may only be
          the integer values 0 or 1. ## References 1. Fuzzy logic. (2023, May 28).
          I'
    description: Fuzzy logic is a form of many-valued logic in which the truth value
      of variables may be any real number between 0 and 1.
    title: Fuzzy Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FuzzyLogic
    is_a: SymbolicAI
    class_uri: d3f:FuzzyLogic
  GNSSReceiver:
    name: GNSSReceiver
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#GNSSReceiver
    description: A GNSS (Global Navigation Satellite System) receiver is an electronic
      device that picks up signals from one or more satellite constellations (like
      GPS, GLONASS, Galileo, BeiDou) to calculate precise location, velocity, and
      time.
    title: GNSS Receiver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Satellite_navigation
    mappings:
    - d3f:GNSSReceiver
    is_a: Receiver
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:GNSSReceiver
  GNSSSatellite:
    name: GNSSSatellite
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#GNSSSatellite
    description: A GNSS satellite is part of a space-based constellation that transmits
      signals, allowing receivers on Earth to determine their position, navigation,
      and timing (PNT) through trilateration.
    title: GNSS Satellite
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Satellite_navigation
    mappings:
    - d3f:GNSSSatellite
    is_a: Satellite
    slots:
    - input-of
    - may-have-weakness
    - output-of
    class_uri: d3f:GNSSSatellite
  GNSSSignal:
    name: GNSSSignal
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#GNSSSignal
    annotations:
      synonym:
        tag: synonym
        value: Global Navigation Satellite System Signal
    description: A GNSS (Global Navigation Satellite System) signal is a low-power
      radio signal broadcast from satellites that contains a carrier wave, a ranging
