          neural network. In Wikipedia, The Free Encyclopedia. [Link](https://en.wikipedia.org/wiki/Residual_neural_network)'
    description: A residual neural network (ResNet) is an artificial neural network
      (ANN). It is a gateless or open-gated variant of the HighwayNet, the first working
      very deep feedforward neural network with hundreds of layers, much deeper than
      previous neural networks.
    title: Residual Neural Network
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
