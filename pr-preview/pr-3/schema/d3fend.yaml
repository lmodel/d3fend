    - attack:T1189
    - attack:T1204.001
    - attack:T1566.002
    - attack:T1566.003
    broad_mappings:
    - d3f:InitialAccessTechnique
    - d3f:T1204
    - d3f:T1566
    is_a: IdentifierReputationAnalysis
    class_uri: d3f:URLReputationAnalysis
  UncertaintySampling:
    name: UncertaintySampling
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#UncertaintySampling
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-US
      kb-article:
        tag: kb-article
        value: '## References Intro to Active Learning. inovex Blog. [Link](https://www.inovex.de/de/blog/intro-to-active-learning/).'
    description: Makes the utility inversely proportional to the uncertainty of the
      model with respect to the sample and will work with any  model provided it can
      assess its uncertainty of a predection.
    title: Uncertainty Sampling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:UncertaintySampling
    is_a: ActiveLearning
    class_uri: d3f:UncertaintySampling
  UnitTestExecutionTool:
    name: UnitTestExecutionTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#UnitTestExecutionTool
    description: An unit test execution tool automatically performs unit testing.  Unit
      testing is a software testing method by which individual units of source code
      are tested to determine whether they are fit for use.  Unit test execution tools
      work with sets of one or more computer program modules together with associated
      control data, usage procedures, and operating procedures. This contrasts with
      integration testing, which tests inter-unit dependencies and the modules as
      a group.
    title: Unit Test Execution Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Unit_testing
    mappings:
    - d3f:UnitTestExecutionTool
    is_a: TestExecutionTool
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:UnitTestExecutionTool
