        value: Domain Name Analysis
      kb-article:
        tag: kb-article
        value: '## How it works This technique can be accomplished in a number of
          ways. * One example analytic determines whether or not a domain name was
          generated with an algorithm. Domain generation algorithms (DGAs) are sometimes
          used to create a domain name automatically that will resolve to C2 infrastructur'
    description: Analysis of domain name metadata, including name and DNS records,
      to determine whether the domain is likely to resolve to an undesirable host.
    title: DNS Traffic Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DNSTrafficAnalysis
    related_mappings:
    - attack:T1040
    - attack:T1071.004
