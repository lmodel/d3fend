    class_uri: d3f:HardwareDeviceEnabledEvent
  HardwareDeviceEvent:
    name: HardwareDeviceEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDeviceEvent
    description: An event capturing the existence, state, or interaction of hardware
      or virtual devices within a system. Device events encompass activities such
      as discovery, connection, disconnection, operational state changes, or configuration
      modifications, providing visibility into device behavior and health.
    title: Hardware Device Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareDeviceEvent
    is_a: DigitalEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareDeviceEvent
  HardwareDeviceMoveEvent:
    name: HardwareDeviceMoveEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDeviceMoveEvent
    description: An event where a device is relocated or reassigned within a system
      or network, potentially affecting its operational scope or connectivity.
    title: Hardware Device Move Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
