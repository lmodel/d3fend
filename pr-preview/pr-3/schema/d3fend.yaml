    name: ShadowStack
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ShadowStack
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A shadow stack is a mechanism for protecting a procedure's stored
      return address, such as from a stack buffer overflow. The shadow stack itself
      is a second, separate stack that "shadows" the program call stack. In the function
      prologue, a function stores its return address to both the call stack and the
      shadow stack. In the function epilogue, a function loads the return address
      from both the call stack and the shadow stack, and then compares them. If the
      two records of the return address differ, then an attack is detected.
    title: Shadow Stack
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Shadow_stack
    mappings:
    - d3f:ShadowStack
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ShadowStack
