    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A translation lookaside buffer (TLB) is a memory cache that is used
      to reduce the time taken to access a user memory location. It is a part of the
      chip's memory-management unit (MMU).
    title: Translation Lookaside Buffer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
