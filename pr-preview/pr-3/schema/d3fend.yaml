        value: D3-DCE
      kb-article:
        tag: kb-article
        value: '## How it works Dead code is code that is considered unreachable by
          normal program execution. Dead code can be created by adding code under
          a condition that never evaluates to true. Dead code should be removed since
          this type of code can produce unexpected results, if accidentally or maliciously
          fo'
    description: Removing unreachable or "dead code" from compiled source code.
    title: Dead Code Elimination
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
