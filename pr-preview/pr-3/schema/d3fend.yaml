  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  d3f:
    prefix_prefix: d3f
    prefix_reference: http://d3fend.mitre.org/ontologies/d3fend.owl#
  rdfs:
