    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ATLASTactic
    description: "An ATLAS Tactic is a categorical classification of techniques within\
      \ the MITRE ATLAS\u2122 framework, representing adversarial goals particular\
      \ to artificial intelligence systems. It also adapts MITRE ATT&CK\xAE Enterprise\
      \ Matrix tactics by integrating machine learning concepts, thus capturing the\
      \ unique motives behind actions in AI-specific operations."
    title: ATLAS Tactic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://atlas.mitre.org/tactics
    mappings:
