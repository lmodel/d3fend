    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
  D3FENDKBThingSubset:
    name: D3FENDKBThingSubset
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#D3FENDKBThingSubset
