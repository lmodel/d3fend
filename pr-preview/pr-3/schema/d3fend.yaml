    title: System Init Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Booting
    - http://dbpedia.org/resource/Linux_startup_process
    - http://dbpedia.org/resource/Windows_startup_process
    aliases:
    - System Initialization Process
    - System Startup Process
    mappings:
    - d3f:SystemInitProcess
    is_a: OperatingSystemProcess
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
