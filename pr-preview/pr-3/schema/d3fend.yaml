    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AccountLocking
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-AL
      kb-article:
        tag: kb-article
        value: '## How it works Management servers with enterprise policies for account
          management provide the ability to enable and disable account for given rules.
          The rules may include specific periods of time (eg. weekend, plant shutdown,
          leave periods), specific user types or groups, or individual users. ## C'
