  DE_0001:
    name: DE_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0001
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0001
    description: Threat actors may disable fault management within the victim spacecraft
      during the attack campaign. During the development process, many fault management
      mechanisms are added to the various parts of the spacecraft in order to protect
      it from a variety of bad/corrupted commands, invalid sensor data, and more.
      By disabling these mechanisms, threat actors may be able to have commands processed
      that would not normally be allowed.
    title: Disable Fault Management
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0001/
    aliases:
    - DE-0001
    mappings:
    - d3f:DE-0001
    exact_mappings:
    - attack:DE-0001
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0001
  DE_0002:
    name: DE_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0002
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0002
    description: "Threat actors may target ground-side telemetry reception, processing,\
      \ or display to disrupt the operator\u2019s visibility into spacecraft health\
      \ and activity. This may involve denial-based attacks that prevent the spacecraft\
      \ from transmitting telemetry to the ground (e.g., disabling telemetry links\
      \ or crashing telemetry software), or more subtle deception-based attacks that\
      \ manipulate telemetry content to conceal unauthorized actions. Since telemetry\
      \ is the primary method ground controllers rely on to monitor spacecraft status,\
      \ any disruption or manipulation can delay or prevent detection of malicious\
      \ activity, suppress automated or manual mitigations, or degrade trust in telemetry-based\
      \ decision support systems."
    title: Disrupt or Deceive Downlink
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0002/
    aliases:
    - DE-0002
    mappings:
    - d3f:DE-0002
    exact_mappings:
    - attack:DE-0002
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0002
  DE_0002_01:
    name: DE_0002_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000201
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0002.01
    description: "Threat actors may utilize access to the ground system to inhibit\
      \ its ability to accurately process, render, or interpret spacecraft telemetry,\
      \ effectively leaving ground controllers unaware of the spacecraft\u2019s true\
      \ state or activity. This may involve traditional denial-based techniques, such\
      \ as disabling telemetry software, corrupting processing pipelines, or crashing\
      \ display interfaces. In addition, more subtle deception-based techniques may\
      \ be used to falsify telemetry data within the ground system \u2014 such as\
      \ modifying command counters, acknowledgments, housekeeping data, or sensor\
      \ outputs \u2014 to provide the appearance of nominal operation. These actions\
      \ can suppress alerts, mask unauthorized activity, or prevent both automated\
      \ and manual mitigations from being initiated based on misleading ground-side\
      \ information. Because telemetry is the primary method by which ground controllers\
      \ monitor the health, behavior, and safety of the spacecraft, any disruption\
      \ or falsification of this data directly undermines situational awareness and\
      \ operational control."
    title: Inhibit Ground System Functionality
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0002/01/
    aliases:
    - DE-0002.01
    mappings:
    - d3f:DE-0002.01
    exact_mappings:
    - attack:DE-0002.01
    is_a: DE_0002
    class_uri: d3f:DE-0002.01
  DE_0002_02:
    name: DE_0002_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000202
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0002.02
    description: Threat actors may overwhelm/jam the downlink signal to prevent transmitted
      telemetry signals from reaching their destination without severe modification/interference,
      effectively leaving ground controllers unaware of vehicle activity during this
      time. Telemetry is the only method in which ground controllers can monitor the
      health and stability of the spacecraft while in orbit. By disabling this downlink,
      threat actors may be able to stop mitigations from taking place.
    title: Jam Link Signal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0002/02/
    aliases:
    - DE-0002.02
    mappings:
    - d3f:DE-0002.02
    exact_mappings:
    - attack:DE-0002.02
    is_a: DE_0002
    class_uri: d3f:DE-0002.02
  DE_0002_03:
    name: DE_0002_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000203
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0002.03
    description: Threat actors may manipulate or shut down a target spacecraft's on-board
      processes to inhibit the spacecraft's ability to generate or transmit telemetry
      signals, effectively leaving ground controllers unaware of vehicle activity
      during this time. Telemetry is the only method in which ground controllers can
      monitor the health and stability of the spacecraft while in orbit. By disabling
      this downlink, threat actors may be able to stop mitigations from taking place.
    title: Inhibit Spacecraft Functionality
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0002/03/
    aliases:
    - DE-0002.03
    mappings:
    - d3f:DE-0002.03
    exact_mappings:
    - attack:DE-0002.03
    is_a: DE_0002
    class_uri: d3f:DE-0002.03
  DE_0003:
    name: DE_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0003
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003
    description: Threat actors may target various onboard values put in place to prevent
      malicious or poorly crafted commands from being processed. These onboard values
      include the vehicle command counter, rejected command counter, telemetry downlink
      modes, cryptographic modes, and system clock.
    title: On-Board Values Obfuscation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/
    aliases:
    - DE-0003
    mappings:
    - d3f:DE-0003
    exact_mappings:
    - attack:DE-0003
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0003
  DE_0003_01:
    name: DE_0003_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000301
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.01
    description: Threat actors may attempt to hide their attempted attacks by modifying
      the onboard Vehicle Command Counter (VCC). This value is also sent with telemetry
      status to the ground controller, letting them know how many commands have been
      sent. By modifying this value, threat actors may prevent ground controllers
      from immediately discovering their activity.
    title: Vehicle Command Counter (VCC)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/01/
    aliases:
    - DE-0003.01
    mappings:
    - d3f:DE-0003.01
    exact_mappings:
    - attack:DE-0003.01
    is_a: DE_0003
    class_uri: d3f:DE-0003.01
  DE_0003_02:
    name: DE_0003_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000302
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.02
    description: Threat actors may attempt to hide their attempted attacks by modifying
      the onboard Rejected Command Counter. Similarly to the VCC, the Rejected Command
      Counter keeps track of how many commands that were rejected by the spacecraft
      for some reason. Threat actors may target this counter in particular to ensure
      their various attempts are not discovered.
    title: Rejected Command Counter
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/02/
    aliases:
    - DE-0003.02
    mappings:
    - d3f:DE-0003.02
    exact_mappings:
    - attack:DE-0003.02
    is_a: DE_0003
    class_uri: d3f:DE-0003.02
  DE_0003_03:
    name: DE_0003_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000303
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.03
    description: Threat actors may modify the command receiver mode, in particular
      turning it on or off. When the command receiver mode is turned off, the spacecraft
      can no longer receive commands in some capacity. Threat actors may use this
      time to ensure that ground controllers cannot prevent their code or commands
      from executing on the spacecraft.
    title: Command Receiver On/Off Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/03/
    aliases:
    - DE-0003.03
    mappings:
    - d3f:DE-0003.03
    exact_mappings:
    - attack:DE-0003.03
    is_a: DE_0003
    class_uri: d3f:DE-0003.03
  DE_0003_04:
    name: DE_0003_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000304
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.04
    description: Threat actors may target the on-board command receivers received
      signal parameters (i.e., automatic gain control (AGC)) in order to stop specific
      commands or signals from being processed by the spacecraft. For ground controllers
      to communicate with spacecraft in orbit, the on-board receivers need to be configured
      to receive signals with a specific signal to noise ratio (ratio of signal power
      to the noise power). Targeting values related to the antenna signaling that
      are modifiable can prevent the spacecraft from receiving ground commands.
    title: Command Receivers Received Signal Strength
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/04/
    aliases:
    - DE-0003.04
    mappings:
    - d3f:DE-0003.04
    exact_mappings:
    - attack:DE-0003.04
    is_a: DE_0003
    class_uri: d3f:DE-0003.04
  DE_0003_05:
    name: DE_0003_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000305
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.05
    description: When the received signal strength reaches the established threshold
      for reliable communications, command receiver lock is achieved. Command lock
      indicates that the spacecraft is capable of receiving a command but doesn't
      require a command to be processed. Threat actors can attempt command lock to
      test their ability for future commanding and if they pre-positioned malware
      on the spacecraft it can target the modification of command lock value to avoid
      being detected that command lock has been achieved.
    title: Command Receiver Lock Modes
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/05/
    aliases:
    - DE-0003.05
    mappings:
    - d3f:DE-0003.05
    exact_mappings:
    - attack:DE-0003.05
    is_a: DE_0003
    class_uri: d3f:DE-0003.05
  DE_0003_06:
    name: DE_0003_06
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000306
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.06
    description: Threat actors may target the various downlink modes configured within
      the victim spacecraft. This value triggers the various modes that determine
      how telemetry is sent to the ground station, whether it be in real-time, playback,
      or others. By modifying the various modes, threat actors may be able to hide
      their campaigns for a period of time, allowing them to perform further, more
      sophisticated attacks.
    title: Telemetry Downlink Modes
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/06/
    aliases:
    - DE-0003.06
    mappings:
    - d3f:DE-0003.06
    exact_mappings:
    - attack:DE-0003.06
    is_a: DE_0003
    class_uri: d3f:DE-0003.06
  DE_0003_07:
    name: DE_0003_07
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000307
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.07
    description: Threat actors may modify the internal cryptographic modes of the
      victim spacecraft. Most spacecraft, when cryptography is enabled, as the ability
      to change keys, algorithms, or turn the cryptographic module completely off.
      Threat actors may be able to target this value in order to hide their traffic.
      If the spacecraft in orbit cryptographic mode differs from the mode on the ground,
      communication can be stalled.
    title: Cryptographic Modes
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/07/
    aliases:
    - DE-0003.07
    mappings:
    - d3f:DE-0003.07
    exact_mappings:
    - attack:DE-0003.07
    is_a: DE_0003
    class_uri: d3f:DE-0003.07
  DE_0003_08:
    name: DE_0003_08
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000308
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.08
    description: "Satellites often record which commands were received and executed.\
      \ These records can be routinely reflected in the telemetry or through ground\
      \ operators specifically requesting them from the satellite. If an adversary\
      \ has conducted a cyber attack against a satellite\u2019s command system, this\
      \ is an obvious source of identifying the attack and assessing the impact. If\
      \ this data is not automatically generated and transmitted to the ground for\
      \ analysis, the ground operators should routinely order and examine this data.\
      \ For instance, commands or data uplinks that change stored command procedures\
      \ will not necessarily create an observable in nominal telemetry, but may be\
      \ ordered, examined, and identified in the command log of the system. Threat\
      \ actors may manipulate these stored logs to avoid detection."
    title: Received Commands
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/08/
    aliases:
    - DE-0003.08
    mappings:
    - d3f:DE-0003.08
    exact_mappings:
    - attack:DE-0003.08
    is_a: DE_0003
    class_uri: d3f:DE-0003.08
  DE_0003_09:
    name: DE_0003_09
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000309
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.09
    description: Telemetry frames are a snapshot of satellite data at a particular
      time. Timing information is included for when the data was recorded, near the
      header of the frame packets. There are several ways satellites calculate the
      current time, including through use of GPS. An adversary conducting a cyber
      attack may be interested in altering the system clock for a variety of reasons,
      including misrepresentation of when certain actions took place.
    title: System Clock for Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/09/
    aliases:
    - DE-0003.09
    mappings:
    - d3f:DE-0003.09
    exact_mappings:
    - attack:DE-0003.09
    is_a: DE_0003
    class_uri: d3f:DE-0003.09
  DE_0003_10:
    name: DE_0003_10
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000310
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.10
    description: "A satellite with a GPS receiver can use ephemeris data from GPS\
      \ satellites to estimate its own position in space. A hostile actor could spoof\
      \ the GPS signals to cause erroneous calculations of the satellite\u2019s position.\
      \ The received ephemeris data is often telemetered and can be monitored for\
      \ indications of GPS spoofing. Reception of ephemeris data that changes suddenly\
      \ without a reasonable explanation (such as a known GPS satellite handoff),\
      \ could provide an indication of GPS spoofing and warrant further analysis.\
      \ Threat actors could also change the course of the vehicle and falsify the\
      \ telemetered data to temporarily convince ground operators the vehicle is still\
      \ on a proper course."
    title: GPS Ephemeris
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/10/
    aliases:
    - DE-0003.10
    mappings:
    - d3f:DE-0003.10
    exact_mappings:
    - attack:DE-0003.10
    is_a: DE_0003
    class_uri: d3f:DE-0003.10
  DE_0003_11:
    name: DE_0003_11
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000311
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.11
    description: Threat actors may manipulate the WDT for several reasons including
      the manipulation of timeout values which could enable processes to run without
      interference - potentially depleting on-board resources.
    title: Watchdog Timer (WDT) for Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/11/
    aliases:
    - DE-0003.11
    mappings:
    - d3f:DE-0003.11
    exact_mappings:
    - attack:DE-0003.11
    is_a: DE_0003
    class_uri: d3f:DE-0003.11
  DE_0003_12:
    name: DE_0003_12
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000312
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0003.12
    description: Threat actors may perform data poisoning attacks against the training
      data sets that are being used for security features driven by artificial intelligence
      (AI) and/or machine learning (ML). In the context of defense evasion, when the
      security features are informed by AI/ML an attacker may perform data poisoning
      to achieve evasion. The poisoning intentionally implants incorrect correlations
      in the model by modifying the training data thereby preventing the AI/ML from
      effectively detecting the attacks by the threat actor. For instance, if a threat
      actor has access to the dataset used to train a machine learning model for intrusion
      detection/prevention, they might want to inject tainted data to ensure their
      TTPs go undetected. With the datasets typically used for AI/ML (i.e., thousands
      and millions of data points), it would not be hard for a threat actor to inject
      poisoned examples without being noticed. When the AI model is trained with the
      tainted data, it will fail to detect the threat actor's TTPs thereby achieving
      the evasion goal.
    title: Poison AI/ML Training for Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0003/12/
    aliases:
    - DE-0003.12
    mappings:
    - d3f:DE-0003.12
    exact_mappings:
    - attack:DE-0003.12
    is_a: DE_0003
    class_uri: d3f:DE-0003.12
  DE_0004:
    name: DE_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0004
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0004
    description: Threat actors may gain access to a victim spacecraft by masquerading
      as an authorized entity. This can be done several ways, including through the
      manipulation of command headers, spoofing locations, or even leveraging Insider's
      access (i.e., Insider Threat)
    title: Masquerading
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0004/
    aliases:
    - DE-0004
    mappings:
    - d3f:DE-0004
    exact_mappings:
    - attack:DE-0004
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0004
  DE_0005:
    name: DE_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0005
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0005
    description: Threat actors may exploit safe mode to evade security controls and
      avoid detection by issuing commands or performing actions that would be blocked
      during nominal operations. In safe mode, spacecraft often disable telemetry
      filtering, authentication checks, or command restrictions to prioritize recovery,
      which can be subverted by an attacker to conceal malicious activity or establish
      a persistent foothold.
    title: Subvert Protections via Safe-Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0005/
    aliases:
    - DE-0005
    mappings:
    - d3f:DE-0005
    exact_mappings:
    - attack:DE-0005
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0005
  DE_0006:
    name: DE_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0006
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0006
    description: Threat actors may target whitelists on the spacecrafts as a means
      to execute and/or hide malicious processes/programs. Whitelisting is a common
      technique used on traditional IT systems but has also been used on spacecrafts.
      Whitelisting is used to prevent execution of unknown or potentially malicious
      software. However, this technique can be bypassed if not implemented correctly
      but threat actors may also simply attempt to modify the whitelist outright to
      ensure their malicious software will operate on the spacecraft that utilizes
      whitelisting.
    title: Modify Whitelist
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0006/
    aliases:
    - DE-0006
    mappings:
    - d3f:DE-0006
    exact_mappings:
    - attack:DE-0006
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0006
  DE_0007:
    name: DE_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0007
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0007
    description: Rootkits are programs that hide the existence of malware by intercepting/hooking
      and modifying operating system API calls that supply system information. Rootkits
      or rootkit enabling functionality may reside at the flight software  or kernel
      level in the operating system or lower, to include a hypervisor, Master Boot
      Record, or System Firmware.
    title: Evasion via Rootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0007/
    aliases:
    - DE-0007
    mappings:
    - d3f:DE-0007
    exact_mappings:
    - attack:DE-0007
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0007
  DE_0008:
    name: DE_0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0008
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0008
    description: Adversaries may use bootkits to persist on systems and evade detection.
      Bootkits reside at a layer below the operating system and may make it difficult
      to perform full remediation unless an organization suspects one was used and
      can act accordingly.
    title: Evasion via Bootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0008/
    aliases:
    - DE-0008
    mappings:
    - d3f:DE-0008
    exact_mappings:
    - attack:DE-0008
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0008
  DE_0009:
    name: DE_0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0009
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009
    description: This technique deals with the more physical aspects of CCD that may
      be utilized by threat actors. There are numerous ways a threat actor may utilize
      the physical operating environment to their advantage, including powering down
      and laying dormant within debris fields as well as launching EMI attacks during
      space-weather events.
    title: Camouflage, Concealment, and Decoys (CCD)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/
    aliases:
    - DE-0009
    mappings:
    - d3f:DE-0009
    exact_mappings:
    - attack:DE-0009
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0009
  DE_0009_01:
    name: DE_0009_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000901
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009.01
    description: Threat actors may hide their spacecraft by lying dormant within clusters
      of space junk or similar debris fields. This could serve several purposes including
      concealment of inspection activities being performed by the craft, as well as
      facilitating some future kinetic intercept/attack. Threat actors may also utilize
      the timing of a target spacecraft passing through a debris field to execute
      an onboard attack with cyber-physical implications, such as manipulating propulsion
      or actuators in some way, with the hope that ground operators may mistakenly
      attribute any resulting damage to debris collisions.
    title: Debris Field
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/01/
    aliases:
    - DE-0009.01
    mappings:
    - d3f:DE-0009.01
    exact_mappings:
    - attack:DE-0009.01
    is_a: DE_0009
    class_uri: d3f:DE-0009.01
  DE_0009_02:
    name: DE_0009_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000902
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009.02
    description: Space weather and its associated hazards imposed on spacecraft are
      a well-studied field of their own. However, it is also important to note the
      potential for threat actors to take advantage of heightened periods of solar
      activity to conduct electromagnetic interference (EMI) operations as they may
      be falsely attributed to natural events.
    title: Space Weather
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/02/
    aliases:
    - DE-0009.02
    mappings:
    - d3f:DE-0009.02
    exact_mappings:
    - attack:DE-0009.02
    is_a: DE_0009
    class_uri: d3f:DE-0009.02
  DE_0009_03:
    name: DE_0009_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000903
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009.03
    description: Threat actors may utilize decoy technology to disrupt detection and
      interception systems and deplete resources that might otherwise prevent an actual
      attack taking place simultaneously or shortly after the decoy is deployed.
    title: Trigger Premature Intercept
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/03/
    aliases:
    - DE-0009.03
    mappings:
    - d3f:DE-0009.03
    exact_mappings:
    - attack:DE-0009.03
    is_a: DE_0009
    class_uri: d3f:DE-0009.03
  DE_0009_04:
    name: DE_0009_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000904
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009.04
    description: "Threat actors may intentionally degrade or manipulate the spacecraft\u2019\
      s onboard sensors or associated systems used for Space Domain Awareness (SDA).\
      \ This allows an adversary to hide proximity operations, mislead threat detection\
      \ logic, or disrupt autonomous responses by confusing local SDA feeds. Unlike\
      \ debris field concealment, this technique targets the spacecraft's own perception\
      \ systems through directed interference, spoofing, or environmental manipulation.\
      \ There is a distinction with DE-0009.01 where threat actors could use debris\
      \ or environment to hide themselves. Where with this sub-technique, the threat\
      \ actor attacks your sensors so you can\u2019t see them."
    title: Targeted Deception of Onboard SSA/SDA Sensors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/04/
    aliases:
    - DE-0009.04
    mappings:
    - d3f:DE-0009.04
    exact_mappings:
    - attack:DE-0009.04
    is_a: DE_0009
    class_uri: d3f:DE-0009.04
  DE_0009_05:
    name: DE_0009_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE000905
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0009.05
    description: Threat actors may target the ground-based systems and data pipelines
      that support Space Domain Awareness (SDA), either by corrupting key data sources,
      manipulating tracking information, or overloading the ingestion architecture.
      The objective is to blind or confuse decision-makers and automated systems responsible
      for monitoring and responding to on-orbit activity. This includes compromising
      or spoofing telemetry, TLEs, sensor feeds, radar/optical returns, or orbital
      prediction services used by tracking centers. It also includes the enumeration
      and exploitation of analytic infrastructures, such as AI/ML-enhanced SDA platforms.
      In cases where SDA systems leverage AI/ML inference for object detection and
      decision support, attackers may seek to degrade model performance by flooding
      the data pipeline with misleading, noisy, adversarial, or low-quality sensor
      inputs. These disruptions aim to delay detection of threats, generate false
      positives, or cause resource exhaustion in SDA fusion and alerting systems.
      This sub-technique differs from onboard deception (e.g., sensor spoofing) by
      targeting the terrestrial decision support infrastructure, potentially affecting
      multiple spacecraft or operators simultaneously.
    title: Corruption or Overload of Ground-Based SDA Systems
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0009/05/
    aliases:
    - DE-0009.05
    mappings:
    - d3f:DE-0009.05
    exact_mappings:
    - attack:DE-0009.05
    is_a: DE_0009
    class_uri: d3f:DE-0009.05
  DE_0010:
    name: DE_0010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0010
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0010
    description: Threat actors may seek to exploit the inherent nature of flight software
      and its limited capacity for event logging/storage between downlink windows
      as a means to conceal malicious activity.
    title: Overflow Audit Log
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0010/
    aliases:
    - DE-0010
    mappings:
    - d3f:DE-0010
    exact_mappings:
    - attack:DE-0010
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0010
  DE_0011:
    name: DE_0011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0011
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0011
    description: Threat actors may leverage valid credentials to conduct unauthorized
      actions against a spacecraft or related system in a way that conceals their
      presence and evades detection. By using trusted authentication mechanisms attackers
      can blend in with legitimate operations and avoid triggering access control
      alarms or anomaly detection systems. This technique enables evasion by appearing
      authorized, allowing adversaries to issue commands, access sensitive subsystems,
      or move laterally within spacecraft or constellation architectures without exploiting
      software vulnerabilities. When credential use is poorly segmented or monitored,
      this form of access can be used to maintain stealthy persistence or facilitate
      other tactics under the guise of legitimate activity.
    title: Credentialed Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0011/
    aliases:
    - DE-0011
    mappings:
    - d3f:DE-0011
    exact_mappings:
    - attack:DE-0011
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0011
  DE_0012:
    name: DE_0012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DE0012
    annotations:
      attack-id:
        tag: attack-id
        value: DE-0012
    description: 'This technique involves two or more compromised components operating
      in coordination to conceal malicious activity. Threat actors compromise multiple
      software modules during the supply chain process and design them to behave cooperatively.
      Each component independently performs only a limited, seemingly benign function,
      such that when analyzed in isolation, no single module appears malicious. An
      example of implementation involves one component acting as a trigger agent,
      waiting for specific mission or system conditions (e.g., GPS fix, telemetry
      state) and writing a signal to a shared resource (e.g., file, bus). A separate
      action agent monitors this resource and only executes the malicious behavior
      (such as data exfiltration or command injection) upon receiving the trigger.

      This division of responsibilities significantly undermines traditional detection
      techniques, such as log analysis, static code review, or heuristic-based behavior
      monitoring.'
    title: Component Collusion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/DE-0012/
    aliases:
    - DE-0012
    mappings:
    - d3f:DE-0012
    exact_mappings:
    - attack:DE-0012
    is_a: SPARTADefenseEvasionTechnique
    class_uri: d3f:DE-0012
