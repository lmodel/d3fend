        value: '## How it works Container images are standalone collections of the
          executable code and content that are used to populate a container environment.
          They are usually created by either building a container from scratch or
          by building on top of an existing image pulled from a repository. Throughout
          the'
    description: Analyzing a Container Image with respect to a set of policies.
    title: Container Image Analysis
