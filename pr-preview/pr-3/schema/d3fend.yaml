    mappings:
    - d3f:REC-0001.06
    exact_mappings:
    - attack:REC-0001.06
    is_a: REC_0001
    class_uri: d3f:REC-0001.06
  REC_0001_07:
    name: REC_0001_07
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000107
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.07
    description: Threat actors may gather information about the type(s) of payloads
      hosted on the victim spacecraft. This information could include specific commands,
      make and model, and relevant software. Threat actors may also gather information
      about the location of the payload on the bus and internal routing as it pertains
      to commands within the payload itself.
    title: Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/07/
    aliases:
    - REC-0001.07
    mappings:
    - d3f:REC-0001.07
    exact_mappings:
    - attack:REC-0001.07
    is_a: REC_0001
    class_uri: d3f:REC-0001.07
  REC_0001_08:
    name: REC_0001_08
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000108
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.08
    description: Threat actors may gather information about the power system used
      within the victim spacecraft. This information can include type, power intake,
      and internal algorithms. Threat actors may also gather information about the
      solar panel configurations such as positioning, automated tasks, and layout.
      Additionally, threat actors may gather information about the batteries used
      within the victim spacecraft. This information can include the type, quantity,
      storage capacity, make and model, and location.
    title: Power
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/08/
    aliases:
    - REC-0001.08
    mappings:
    - d3f:REC-0001.08
    exact_mappings:
    - attack:REC-0001.08
    is_a: REC_0001
    class_uri: d3f:REC-0001.08
  REC_0001_09:
    name: REC_0001_09
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000109
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.09
    description: Threat actors may gather information about any fault management that
      may be present on the victim spacecraft. This information can help threat actors
      construct specific attacks that may put the spacecraft into a fault condition
      and potentially a more vulnerable state depending on the fault response.
    title: Fault Management
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/09/
    aliases:
    - REC-0001.09
    mappings:
    - d3f:REC-0001.09
    exact_mappings:
    - attack:REC-0001.09
    is_a: REC_0001
    class_uri: d3f:REC-0001.09
  REC_0002:
    name: REC_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0002
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0002
    description: Threat actors may gather information about the victim spacecraft's
      descriptors that can be used for future campaigns or to help perpetuate other
      techniques. Information about the descriptors may include a variety of details
      such as identity attributes, organizational structures, and mission operational
      parameters.
    title: Gather Spacecraft Descriptors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0002/
    aliases:
