    - d3f:T1505
    is_a: AssetInventory
    class_uri: d3f:NetworkNodeInventory
  NetworkPacket:
    name: NetworkPacket
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkPacket
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A network packet is a formatted unit of data carried by a packet-switched
      network. Computer communications links that do not support packets, such as
      traditional point-to-point telecommunications links, simply transmit data as
      a bit stream. When data is formatted into packets, packet switching is possible
      and the bandwidth of the communication medium can be better shared among users
      than with circuit switching.
    title: Network Packet
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Network_packet
    mappings:
    - d3f:NetworkPacket
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkPacket
  NetworkPrinter:
    name: NetworkPrinter
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkPrinter
    description: In computing, a network printer is a device that can be accessed
      over a network which makes a persistent representation of graphics or text,
      usually on paper. While most output is human-readable, bar code printers are
      an example of an expanded use for printers. The different types of printers
      include 3D printer, inkjet printer, laser printer, thermal printer, etc.  Note
      that not all printers are networked and the digital information to be printed
      must be passed either by removable media or as directly connecting the printer
      to a computer (e.g., by USB.)
    title: Network Printer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Printer_(computing)
    mappings:
    - d3f:NetworkPrinter
    is_a: SharedComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkPrinter
  NetworkProtocolAnalyzer:
    name: NetworkProtocolAnalyzer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkProtocolAnalyzer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Monitors and parses network protocols to extract values from various
      network protocol layers.
    title: Network Protocol Analyzer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
