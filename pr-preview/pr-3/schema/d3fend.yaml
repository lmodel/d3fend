  PlatformHardening:
    name: PlatformHardening
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PlatformHardening
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PH
      synonym:
        tag: synonym
        value: Endpoint Hardening
    description: 'Hardening components of a Platform with the intention of making
      them more difficult to exploit.


      Platforms includes components such as:

      * BIOS UEFI Subsystems

      * Hardware security devices such as Trusted Platform Modules

      * Boot process logic or code

      * Kernel software components'
    title: Platform Hardening
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PlatformHardening
    is_a: DefensiveTechnique
    class_uri: d3f:PlatformHardening
  PlatformMonitoring:
    name: PlatformMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PlatformMonitoring
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PM
      kb-article:
        tag: kb-article
        value: 'Platform monitoring consists of the analysis and monitoring of system
          level devices and low-level components, including hardware devices, to detect
          unauthorized modifications or suspicious activity. Monitored platform components
          includes system files and embedded devices such as: * Kernel softwar'
    description: Monitoring platform components such as operating systems software,
      hardware devices, or firmware.
    title: Platform Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PlatformMonitoring
    is_a: DefensiveTechnique
    class_uri: d3f:PlatformMonitoring
  PlatformUptime:
    name: PlatformUptime
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PlatformUptime
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A variable that notes the amount of time a platform has been running
      since its last power cycle or reset.
    title: Platform Uptime
    comments:
    - In OT controllers this may not be a default tag rather something that should
      be defined using other system tags.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
