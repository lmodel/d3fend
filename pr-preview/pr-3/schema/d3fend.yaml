      kb-article:
        tag: kb-article
        value: '## How it works Many file formats use magic numbers to identify a
          file format or protocol. Verifying that the magic number matches the expected
          value of its declared format is a simple way of verifying the file format.'
    description: Utilizing the magic number to verify the file
    title: File Magic Byte Verification
