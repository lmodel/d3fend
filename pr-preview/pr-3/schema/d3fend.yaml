    class_uri: d3f:OperationalProcessMonitoring
  OperationalRiskAssessment:
    name: OperationalRiskAssessment
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperationalRiskAssessment
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
