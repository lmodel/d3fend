    is_a: AnalyticalPurpose
    class_uri: d3f:Classifying
  Client_serverPayloadProfiling:
    name: Client_serverPayloadProfiling
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ClientServerPayloadProfiling
    annotations:
