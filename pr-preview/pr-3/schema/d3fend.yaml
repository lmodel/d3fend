  AuthenticationEventThresholding:
    name: AuthenticationEventThresholding
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AuthenticationEventThresholding
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-ANET
      kb-article:
        tag: kb-article
        value: '## How it works Authentication event data is collected (logon information
          such as device id, time of day, day of week, geo-location, etc.) to create
          an activity baseline. Then, a threshold is determined either through a manually
          specified configuration, or a statistical analysis of deviations in his'
    description: Collecting authentication events, creating a baseline user profile,
      and determining whether authentication events are consistent with the baseline
      profile.
    title: Authentication Event Thresholding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:AuthenticationEventThresholding
    is_a: UserBehaviorAnalysis
    class_uri: d3f:AuthenticationEventThresholding
  AuthenticationFunction:
