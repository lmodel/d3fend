    description: A network link is a link within the network layer, which is responsible
      for packet forwarding including routing through intermediate routers.
    title: Network Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Network_layer
    - https://www.techtarget.com/searchnetworking/definition/Network-layer
