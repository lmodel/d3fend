      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-AZET
      kb-article:
        tag: kb-article
        value: '## How it works Authorization event data is collected to create a
          baseline user profile. Authorization events that deviate from the baseline
          and exceed a static or dynamic threshold are identified for further action.
          Authorization events can include successful and failed authorization attempts
          as w'
    description: Collecting authorization events, creating a baseline user profile,
      and determining whether authorization events are consistent with the baseline
      profile.
    title: Authorization Event Thresholding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
