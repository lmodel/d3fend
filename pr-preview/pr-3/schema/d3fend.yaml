    is_a: HardwareDeviceStateEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareDeviceMoveEvent
  HardwareDeviceStateEvent:
    name: HardwareDeviceStateEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDeviceStateEvent
    description: An event involving a change to a device's state, such as connection,
      disconnection, modification, or operational state transitions (e.g., online
      or offline). Device state events provide visibility into device availability
      and operational conditions.
    title: Hardware Device State Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareDeviceStateEvent
    is_a: HardwareDeviceEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareDeviceStateEvent
  HardwareDeviceUnbindEvent:
    name: HardwareDeviceUnbindEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDeviceUnbindEvent
    description: An event where a device is logically unbound from a system or process,
      releasing it from exclusive use or integration.
    title: Hardware Device Unbind Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareDeviceUnbindEvent
    is_a: HardwareDeviceStateEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareDeviceUnbindEvent
  HardwareDeviceUpdateEvent:
    name: HardwareDeviceUpdateEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDeviceUpdateEvent
    description: An event capturing updates or changes to a device's configuration,
      properties, or state, including firmware updates, reconfigurations, or optimizations.
    title: Hardware Device Update Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareDeviceUpdateEvent
    is_a: HardwareDeviceStateEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareDeviceUpdateEvent
  HardwareDriver:
    name: HardwareDriver
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareDriver
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a device driver (commonly referred to simply as a driver)
      is a computer program that operates or controls a particular type of device
      that is attached to a computer. A driver provides a software interface to hardware
      devices, enabling operating systems and other computer programs to access hardware
      functions without needing to know precise details of the hardware being used.
      A driver communicates with the device through the computer bus or communications
      subsystem to which the hardware connects. When a calling program invokes a routine
      in the driver, the driver issues commands to the device. Once the device sends
      data back to the driver, the driver may invoke routines in the original calling
      program. Drivers are hardware dependent and operating-system-specific. They
      usually provide the interrupt handling required for any necessary asynchronous
      time-dependent hardware interface.
    title: Hardware Driver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Device_driver
    aliases:
    - Device Driver
    mappings:
    - d3f:HardwareDriver
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HardwareDriver
  HardwareTimer:
    name: HardwareTimer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareTimer
    description: A hardware timer is defined as an electronic component that serves
      as an 8-bit or 16-bit counter, capable of measuring time intervals, generating
      timed outputs, and driving loads through mechanisms such as pulse width modulation
      (PWM).
    title: Hardware Timer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.sciencedirect.com/topics/engineering/hardware-timer
    mappings:
    - d3f:HardwareTimer
    is_a: HardwareDevice
    mixins:
    - Timer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HardwareTimer
  HardwareTimerConfigurationEvent:
    name: HardwareTimerConfigurationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareTimerConfigurationEvent
    description: An event in which a hardware timer's registers or operational parameters
      are programmed or modified.
    title: Hardware Timer Configuration Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareTimerConfigurationEvent
    is_a: HardwareTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareTimerConfigurationEvent
  HardwareTimerDeviceDriver:
    name: HardwareTimerDeviceDriver
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareTimerDeviceDriver
    description: A device driver for a hardware timer.
    title: Hardware Timer Device Driver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.intel.com/content/www/us/en/docs/programmable/743810/25-1/timer-device-drivers.html
    mappings:
    - d3f:HardwareTimerDeviceDriver
    is_a: HardwareDriver
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HardwareTimerDeviceDriver
  HardwareTimerEvent:
    name: HardwareTimerEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareTimerEvent
    description: A timer event involving a physical timer mechanism implemented in
      hardware components.
    title: Hardware Timer Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareTimerEvent
    is_a: TimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareTimerEvent
  HardwareTimerInterruptEvent:
    name: HardwareTimerInterruptEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareTimerInterruptEvent
    description: An event in which a hardware timer generates an interrupt signal
      upon expiration or interval completion.
    title: Hardware Timer Interrupt Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareTimerInterruptEvent
    is_a: HardwareTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:HardwareTimerInterruptEvent
  HardwareWatchdogTimer:
    name: HardwareWatchdogTimer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HardwareWatchdogTimer
    description: A hardware watchdog timer is a watchdog timer implemented using electronic
      components.
    title: Hardware Watchdog Timer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HardwareWatchdogTimer
    is_a: HardwareTimer
    mixins:
    - WatchdogTimer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HardwareWatchdogTimer
  HarmonicMean:
    name: HarmonicMean
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HarmonicMean
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HM
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Central tendency. [Link](https://en.wikipedia.org/wiki/Central_tendency)'
    description: The reciprocal of the arithmetic mean of the reciprocals of the data
      values. This measure too is valid only for data that are measured absolutely
      on a strictly positive scale.
    title: Harmonic Mean
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HarmonicMean
    is_a: CentralTendency
    class_uri: d3f:HarmonicMean
  HeapSegment:
    name: HeapSegment
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HeapSegment
    description: The heap segment (or free store) is a large pool of memory from which
      dynamic memory requests of a process are allocated and satisfied.
    title: Heap Segment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Memory_management#HEAP
    mappings:
    - d3f:HeapSegment
    is_a: ProcessSegment
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HeapSegment
  HeterogeneousAsymmetricFeature_basedTransferLearning:
    name: HeterogeneousAsymmetricFeature_basedTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HeterogeneousAsymmetricFeatureBasedTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HAFBTL
      kb-article:
        tag: kb-article
        value: '## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big
          data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1),
          25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0).'
    description: Asymmetric transformation mapping  transforms the source feature
      space to align with that of the target or the target to that of the source.
      This, in effect, bridges the feature space gap and reduces the problem into
      a homogeneous transfer problem when further distribution differences need to
      be corrected.
    title: Heterogeneous Asymmetric Feature-based Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - HeterogeneousAsymmetricFeature-basedTransferLearning
    mappings:
    - d3f:HeterogeneousAsymmetricFeature-basedTransferLearning
    is_a: HeterogeneousTransferLearning
    class_uri: d3f:HeterogeneousAsymmetricFeature-basedTransferLearning
  HeterogeneousFeature_basedTransferLearning:
    name: HeterogeneousFeature_basedTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HeterogeneousFeatureBasedTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HFBTL
      kb-article:
        tag: kb-article
        value: '## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big
          data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1),
          25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0).'
    description: Symmetric transformation  takes both the source feature space Xs
      and target feature space Xt and learns feature transformations as to project
      each onto a common subspace Xc for adaptation purposes. This derived subspace
      becomes a domain-invariant feature subspace to associate cross-domain data,
      and in effect, reduces marginal distribution differences.
    title: Heterogeneous Feature-based Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - HeterogeneousFeature-basedTransferLearning
    mappings:
    - d3f:HeterogeneousFeature-basedTransferLearning
    is_a: HeterogeneousTransferLearning
    class_uri: d3f:HeterogeneousFeature-basedTransferLearning
  HeterogeneousTransferLearning:
    name: HeterogeneousTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HeterogeneousTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HTL
      kb-article:
        tag: kb-article
        value: '## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big
          data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1),
          25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0).'
    description: Heterogeneous transfer learning is characterized by the source and
      target domains having differing feature spaces, but may also be combined with
      other issues such as differing data distributions and label spaces.
    title: Heterogeneous Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HeterogeneousTransferLearning
    is_a: TransferLearning
    class_uri: d3f:HeterogeneousTransferLearning
  HierarchicalClustering:
    name: HierarchicalClustering
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HierarchicalClustering
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HC
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (2021, August 10). Hierarchical clustering.
          [Link](https://en.wikipedia.org/wiki/Hierarchical_clustering) html)'
    description: Hierarchical clustering (also called hierarchical cluster analysis
      or HCA) is a method of cluster analysis that seeks to build a hierarchy of clusters.
    title: Hierarchical Clustering
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HierarchicalClustering
    is_a: ClusterAnalysis
    class_uri: d3f:HierarchicalClustering
  HierarchicalDomainDenylisting:
    name: HierarchicalDomainDenylisting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HierarchicalDomainDenylisting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-HDDL
      synonym:
        tag: synonym
        value: Hierarchical Domain Blacklisting
      kb-article:
        tag: kb-article
        value: '## How it works This technique is used to block DNS queries from related
          domains and subdomains that are unauthorized. Hierarchical domain blacklisting
          considers the blacklisting of second level domains and additional sub-domains
          and specific hosts for a given query value. A denylist is maintained'
    description: Blocking the resolution of any subdomain of a specified domain name.
    title: Hierarchical Domain Denylisting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HierarchicalDomainDenylisting
    is_a: ForwardResolutionDomainDenylisting
    class_uri: d3f:HierarchicalDomainDenylisting
  High_dimensionClustering:
    name: High_dimensionClustering
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HighDimensionClustering
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HDC
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Clustering high-dimensional data.
          [Link](https://en.wikipedia.org/wiki/Clustering_high-dimensional_data)'
    description: The cluster analysis of data with anywhere from a few dozen to many
      thousands of dimensions.
    title: High-dimension Clustering
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - High-dimensionClustering
    mappings:
    - d3f:High-dimensionClustering
    is_a: ClusterAnalysis
    class_uri: d3f:High-dimensionClustering
  Higher_orderLogic:
    name: Higher_orderLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HigherOrderLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HOL
      synonym:
        tag: synonym
        value: HOL
      kb-article:
        tag: kb-article
        value: '## References 1. Higher-order logic. (2023, May 13). In _Wikipedia_.
          [Link](https://en.wikipedia.org/wiki/Higher-order_logic)'
    description: Higher-order logic is a form of predicate logic that is distinguished
      from first-order logic by additional quantifiers and, sometimes, stronger semantics.
      Higher-order logics with their standard semantics are more expressive, but their
      model-theoretic properties are less well-behaved than those of first-order logic.
    title: Higher-order Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Higher-orderLogic
    mappings:
    - d3f:Higher-orderLogic
    is_a: PredicateLogic
    class_uri: d3f:Higher-orderLogic
  Histogramming:
    name: Histogramming
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Histogramming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Histogramming
    is_a: Summarizing
    class_uri: d3f:Histogramming
  HomogenousTransferLearning:
    name: HomogenousTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HomogenousTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-HTL
      kb-article:
        tag: kb-article
        value: '## References Khalil, K., Asgher, U., & Ayaz, Y. (2022). Novel fNIRS
          study on homogeneous symmetric feature-based transfer learning for brain-computer
          interface. Scientific Reports, 12, 3198. [Link](https://www.nature.com/articles/s41598-022-06805-4).'
    description: "In homogeneous transfer learning, the feature spaces of the source\
      \ and target domains is of the same dimension (Ds\u2009=\u2009Dt) while the\
      \ data of both domains is represented by the same attributes (Xs\u2009=\u2009\
      Xt) and labels (Ys\u2009=\u2009Yt). Thus, homogeneous transfer learning aims\
      \ to bridge the gap in the data distributions experienced during cross-domain\
      \ transfer."
    title: Homogenous Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HomogenousTransferLearning
    is_a: TransferLearning
    class_uri: d3f:HomogenousTransferLearning
  HomoglyphDenylisting:
    name: HomoglyphDenylisting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HomoglyphDenylisting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-HDL
      synonym:
        tag: synonym
        value: Homoglyph Blacklisting
      kb-article:
        tag: kb-article
        value: '## How it works Homoglyph domain blacklisting considers the domain
          and subdomain structure of a lookup and compares the named components to
          blacklisted named components. The blacklisted named components are typically
          crafted modifications of known good domains, e.g., gooogle.com versus google.com.'
    description: Blocking DNS queries that are deceptively similar to legitimate domain
      names.
    title: Homoglyph Denylisting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HomoglyphDenylisting
    is_a: ForwardResolutionDomainDenylisting
    class_uri: d3f:HomoglyphDenylisting
  HomoglyphDetection:
    name: HomoglyphDetection
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HomoglyphDetection
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-HD
      kb-article:
        tag: kb-article
        value: '## How it works A homoglyph, in this context, is a deceptive string
          or word which looks like a trusted word, but is composed of different characters,
          for example: goooogle.com versus google.com. This is commonly found in phishing
          and typo squatting attacks where a human exploiting through a social e'
    description: Comparing strings using a variety of techniques to determine if a
      deceptive or malicious string is being presented to a user.
    title: Homoglyph Detection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HomoglyphDetection
    related_mappings:
    - attack:T1114.001
    - attack:T1189
    - attack:T1204.001
    - attack:T1534
    - attack:T1566.001
    - attack:T1566.002
    - attack:T1566.003
    broad_mappings:
    - d3f:InitialAccessTechnique
    - d3f:LateralMovementTechnique
    - d3f:T1114
    - d3f:T1204
    - d3f:T1566
    is_a: IdentifierAnalysis
    class_uri: d3f:HomoglyphDetection
  Host:
    name: Host
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Host
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A host is a computer or other device, typically connected to a computer
      network. A network host may offer information resources, services, and applications
      to users or other nodes on the network. A network host is a network node that
      is assigned a network layer host address. Network hosts that participate in
      applications that use the client-server model of computing, are classified as
      server or client systems. Network hosts may also function as nodes in peer-to-peer
      applications, in which all nodes share and consume resources in an equipotent
      manner.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/device
    - https://schema.ocsf.io/objects/endpoint
    - http://dbpedia.org/resource/Host_(network)
    aliases:
    - Network Host
    mappings:
    - d3f:Host
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Host
  Host_basedFirewall:
    name: Host_basedFirewall
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HostBasedFirewall
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A software firewall which controls network inbound and outbound network
      traffic to the host computer.
    title: Host-based Firewall
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Host-basedFirewall
    mappings:
    - d3f:Host-basedFirewall
    is_a: SystemSoftware
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Host-basedFirewall
  HostConfigurationSensor:
    name: HostConfigurationSensor
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HostConfigurationSensor
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Collects the configuration data on an endpoint.
    title: Host Configuration Sensor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HostConfigurationSensor
    is_a: EndpointSensor
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:HostConfigurationSensor
  HostGroup:
    name: HostGroup
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#HostGroup
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A collection of Hosts used to allow operations such as access control
      to be applied to the entire group.
    title: Host Group
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:HostGroup
    is_a: AccessControlGroup
    slots:
