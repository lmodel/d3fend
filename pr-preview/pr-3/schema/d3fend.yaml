        tag: kb-article
        value: '## How it works Password strength guidelines include increasing password
          length, permitting passwords that contain ASCII or Unicode characters, and
          requiring systems to screen new passwords against lists of commonly used
          or compromised passwords. ## Considerations Extremely complex password requirem'
