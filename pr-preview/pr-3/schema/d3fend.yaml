    is_a: VolumeSnapshot
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DifferentialVolumeSnapshot
  DigitalAccessBadge:
    name: DigitalAccessBadge
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalAccessBadge
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: CAC
    description: A credential used to gain entry to an area having automated access
      control entry points. Example media being magnetic stripe, proximity, barcode,
      or smart cards are examples.
    title: Digital Access Badge
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Access_badge
    - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-116r1.pdf
    mappings:
    - d3f:DigitalAccessBadge
    is_a: Credential
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalAccessBadge
  DigitalArtifact:
    name: DigitalArtifact
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalArtifact
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-baseurl:
        tag: display-baseurl
        value: /dao/artifact/
      synonym:
        tag: synonym
        value: Digital Asset
    description: An information-bearing artifact (object) that is, or is encoded to
      be used with, a digital computer system. This concept is broad to include the
      literal instances of an artifact, or an implicit summarization of changes to
      or properties of other artifacts.
    title: Digital Artifact
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Digital_artifactual_value
    - http://dbpedia.org/resource/Virtual_artifact
    - https://www.iso.org/obp/ui/#iso:std:iso-iec:19770:-1:ed-3:v1:en
    mappings:
    - d3f:DigitalArtifact
    close_mappings:
    - unified_cyber_ontology:Item
    broad_mappings:
    - oscal:Resource
    is_a: Artifact
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalArtifact
  DigitalAudio:
    name: DigitalAudio
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalAudio
    description: Digital audio is a representation of sound recorded in, or converted
      into, digital form.
    title: Digital Audio
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalAudio
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalAudio
  DigitalAudioVisualMedia:
    name: DigitalAudioVisualMedia
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalAudioVisualMedia
    description: Audiovisual (AV) is electronic media possessing both a sound and
      a visual component.
    title: Digital Audio Visual Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalAudioVisualMedia
    is_a: DigitalMultimedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalAudioVisualMedia
  DigitalCamera:
    name: DigitalCamera
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalCamera
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An optical instrument that can capture an image. A digital camera
      that captures photographs in digital memory.
    title: Digital Camera
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Digital_camera
    mappings:
