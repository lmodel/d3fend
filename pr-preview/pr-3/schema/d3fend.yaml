        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CI
      kb-article:
        tag: kb-article
        value: '## How it works The organization retrieves configuration information
          through means of SNMP (MIB records), WBEM (CIM records), other protocols,
          or custom scripts and captures that information in a repository, typically
          known as a Configuration Management Database (CMDB)."'
    description: Configuration inventory identifies and records the configuration
      of software and hardware and their components throughout the organization.
    title: Configuration Inventory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ConfigurationInventory
    related_mappings:
