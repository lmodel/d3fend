        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PUM
      kb-article:
        tag: kb-article
        value: '## How it works Monitoring the time since the last power cycle or
          restart alerts operators to unexpected restarts and their frequency. This
          can indicate potential issues or malicious activity, and provides valuable
          information for forensic investigations. ## Considerations The source of
          the variabl'
    description: Monitor the amount of time since the last power cycle or restart.
    title: Platform Uptime Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PlatformUptimeMonitoring
    is_a: PlatformMonitoring
    class_uri: d3f:PlatformUptimeMonitoring
  Point_biserialCorrelationCoefficient:
    name: Point_biserialCorrelationCoefficient
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PointBiserialCorrelationCoefficient
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-PBCC
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Point-biserial correlation coefficient.
          [Link](https://en.wikipedia.org/wiki/Point-biserial_correlation_coefficient)'
    description: The point biserial correlation coefficient (rpb) is a correlation
      coefficient used when one variable (e.g. Y) is dichotomous; Y can either be
      "naturally" dichotomous, like whether a coin lands heads or tails, or an artificially
      dichotomized variable.
    title: Point-biserial Correlation Coefficient
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Point-biserialCorrelationCoefficient
    mappings:
    - d3f:Point-biserialCorrelationCoefficient
    is_a: Correlation
    class_uri: d3f:Point-biserialCorrelationCoefficient
  PointEstimation:
    name: PointEstimation
