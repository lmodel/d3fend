  PhysicalLinkDisconnectEvent:
    name: PhysicalLinkDisconnectEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLinkDisconnectEvent
    description: The transmission medium is removed or power is cut, physically breaking
      the path between the two interfaces.
    title: Physical Link Disconnect Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PhysicalLinkDisconnectEvent
    is_a: PhysicalLinkEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:PhysicalLinkDisconnectEvent
  PhysicalLinkDownEvent:
    name: PhysicalLinkDownEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLinkDownEvent
    description: Carrier or negotiation is lost, or the port is shut, rendering the
      link non-operational while the medium remains connected.
    title: Physical Link Down Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PhysicalLinkDownEvent
    is_a: PhysicalLinkEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:PhysicalLinkDownEvent
  PhysicalLinkErrorDisableEvent:
