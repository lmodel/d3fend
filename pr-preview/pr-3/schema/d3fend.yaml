    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing (specifically data transmission and data storage), a
      block, sometimes called a physical record, is a sequence of bytes or bits, usually
      containing some whole number of records, having a maximum length; a block size.
      Data thus structured are said to be blocked. The process of putting data into
      blocks is called blocking, while deblocking is the process of extracting data
      from blocks. Blocked data is normally stored in a data buffer and read or written
      a whole block at a time.
    title: Memory Block
