      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A shared file resource, or network file share, is a computer file
      made available from one host to other hosts on a computer network. Network sharing
      is made possible by inter-process communication over the network. It includes
      both files and directories.
    title: Network File Share Resource
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NetworkFileShareResource
    is_a: NetworkResource
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkFileShareResource
  NetworkFlow:
