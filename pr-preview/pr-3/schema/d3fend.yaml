  REC_0001:
    name: REC_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0001
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001
    description: Threat actors may gather information about the victim spacecraft's
      design that can be used for future campaigns or to help perpetuate other techniques.
      Information about the spacecraft can include software, firmware, encryption
      type, purpose, as well as various makes and models of subsystems.
    title: Gather Spacecraft Design Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/
    aliases:
