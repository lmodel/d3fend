  K_FoldCross_Validation:
    name: K_FoldCross_Validation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#KFoldCrossValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-KFCV
      kb-article:
        tag: kb-article
        value: '## References K-Fold Cross-Validation. Machine Learning Mastery. [Link](https://machinelearningmastery.com/k-fold-cross-validation/#:~:text=Cross%2Dvalidation%20is%20a%20resampling,k%2Dfold%20cross%2Dvalidation).'
    description: Cross-validation is a resampling procedure used to evaluate machine
      learning models on a limited data sample. The procedure has a single parameter
      called k that refers to the number of groups that a given data sample is to
      be split into. As such, the procedure is often called k-fold cross-validation.
      When a specific value for k is chosen, it may be used in place of k in the reference
      to the model, such as k=10 becoming 10-fold cross-validation
    title: K-Fold Cross-Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - K-FoldCross-Validation
    mappings:
