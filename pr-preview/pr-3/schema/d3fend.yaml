        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PBWSAM
      kb-article:
        tag: kb-article
        value: '## How it works Proxy-based Web Server Access Mediation involves controlling
          access to web servers via proxy servers, which act as intermediaries between
          users and web resources. This approach can enhance security by anonymizing
          user requests, filtering content, and enforcing access policies. Examp'
    description: Proxy-based web server access mediation focuses on the regulation
      of web server access through intermediary proxy servers.
    title: Proxy-based Web Server Access Mediation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
