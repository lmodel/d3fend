    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CreateFile
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: System call to create a new file on a file system. Some operating
      systems implement this functionality as part of their d3f:OpenFile system call.
    title: Create File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://docs.microsoft.com/en-us/windows/win32/api/fileapi/nf-fileapi-createfile2
    - https://docs.microsoft.com/en-us/windows/win32/api/fileapi/nf-fileapi-createfilea
    - https://docs.microsoft.com/en-us/windows/win32/api/fileapi/nf-fileapi-createfilew
    - https://linux.die.net/man/2/creat
    mappings:
    - d3f:CreateFile
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
