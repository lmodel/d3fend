    class_uri: d3f:LateralMovementTechnique
  LegacySystem:
    name: LegacySystem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#LegacySystem
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: Legacy Digital System
    description: In computing, a legacy system is an old method, technology, computer
      system, or application program, "of, relating to, or being a previous or outdated
      computer system," yet still in use. Often referencing a system as "legacy" means
      that it paved the way for the standards that would follow it. This can also
      imply that the system is out of date or in need of replacement.
    title: Legacy System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Legacy_system
    mappings:
