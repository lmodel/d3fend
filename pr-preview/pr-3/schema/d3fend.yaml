      a file system using the open system call. This allocates resources associated
      to the file (the file descriptor), and returns a handle that the process will
      use to refer to that file. In some cases the open is performed by the first
      access. During the open, the filesystem may allocate memory for buffers, or
      it may wait until the first operation. Various other errors which may occur
      during the open include directory update failures, un-permitted multiple connections,
      media failures, communication link failures and device failures.
    title: Open File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Open_(system_call)
    mappings:
    - d3f:OpenFile
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OpenFile
  OperatingMode:
    name: OperatingMode
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingMode
    description: An operating mode designates the specific way a system, product,
      or service functions for a particular task, configuration, or phase of operation
    title: Operating Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
