    title: Exploitation of Transient Instruction Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://capec.mitre.org/data/definitions/663.html
    aliases:
    - CAPEC-663
    mappings:
    - d3f:CAPEC-663
    exact_mappings:
    - capec:CAPEC-553
    is_a: CommonAttackPattern
    class_uri: d3f:CAPEC-663
  CAPECThing:
    name: CAPECThing
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CAPECThing
    title: CAPEC Thing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:CAPECThing
    is_a: ExternalThreatModelThing
    class_uri: d3f:CAPECThing
  CART:
    name: CART
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CART
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-CAR
      kb-article:
        tag: kb-article
        value: '## References Classification and Regression Tree (CART) Algorithm.
          Analytics Steps. [Link](https://www.analyticssteps.com/blogs/classification-and-regression-tree-cart-algorithm).'
    description: "The CART algorithm is a type of classification algorithm that is\
      \ required to build a decision tree on the basis of Gini\u2019s impurity index."
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:CART
    is_a: DecisionTree
    class_uri: d3f:CART
  CCIControl:
    name: CCIControl
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CCIControl
    title: CCI Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:CCIControl
    is_a: ExternalControl
    class_uri: d3f:CCIControl
  CWE_1004:
    name: CWE_1004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CWE1004
    annotations:
      cwe-id:
        tag: cwe-id
        value: CWE-1004
    description: The product uses a cookie to store sensitive information, but the
      cookie is not marked with the HttpOnly flag.
    title: Sensitive Cookie Without 'HttpOnly' Flag
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - CWE-1004
    mappings:
    - d3f:CWE-1004
    exact_mappings:
    - cwe:CWE-1004
    is_a: CWE_732
    slots:
    - may-be-weakness-of
    class_uri: d3f:CWE-1004
  CWE_1007:
    name: CWE_1007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CWE1007
    annotations:
      cwe-id:
        tag: cwe-id
        value: CWE-1007
      synonym:
        tag: synonym
        value: Homograph Attack
    description: The product displays information or identifiers to a user, but the
      display mechanism does not make it easy for the user to distinguish between
      visually similar or identical glyphs (homoglyphs), which may cause the user
      to misinterpret a glyph and perform an unintended, insecure action.
    title: Insufficient Visual Distinction of Homoglyphs Presented to User
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - CWE-1007
    mappings:
    - d3f:CWE-1007
    exact_mappings:
    - cwe:CWE-1007
    is_a: CWE_451
    slots:
    - may-be-weakness-of
    class_uri: d3f:CWE-1007
  CWE_102:
    name: CWE_102
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CWE102
    annotations:
      cwe-id:
        tag: cwe-id
        value: CWE-102
    description: The product uses multiple validation forms with the same name, which
      might cause the Struts Validator to validate a form that the programmer does
      not expect.
    title: 'Struts: Duplicate Validation Forms'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - CWE-102
    mappings:
    - d3f:CWE-102
    exact_mappings:
    - cwe:CWE-102
    is_a: CWE_1173
    mixins:
    - CWE_694
    slots:
    - may-be-weakness-of
    class_uri: d3f:CWE-102
  CWE_1021:
    name: CWE_1021
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CWE1021
    annotations:
      cwe-id:
        tag: cwe-id
        value: CWE-1021
      synonym:
        tag: synonym
        value: Clickjacking
    description: The web application does not restrict or incorrectly restricts frame
      objects or UI layers that belong to another application or domain, which can
      lead to user confusion about which interface the user is interacting with.
    title: Improper Restriction of Rendered UI Layers or Frames
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
