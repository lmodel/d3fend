        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-RH
      kb-article:
        tag: kb-article
        value: '## How it works There are three core radiation hardening methodologies:
          1. Radiation Hardening by Process (RHBP): modifying the physical fabrication
          of a semiconductor (e.g., using SOI - Silicon on Insulator), offering the
          highest intrinsic protection. Usually the most expensive option as it requi'
    description: Radiation hardening is the process of making electronic components
      and circuits resistant to damage or malfunction caused by high levels of ionizing
      radiation.
    title: Radiation Hardening
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
