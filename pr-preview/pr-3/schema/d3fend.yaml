    class_uri: d3f:StackSegment
  Stacking:
    name: Stacking
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Stacking
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-STA
      kb-article:
        tag: kb-article
        value: '## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning).'
    description: Stacking is a method of using the results and predictions from one
      layer of ML models as inputs to another layer of ML models. Stacking (sometimes
      called stacked generalization) involves training a model to combine the predictions
      of several other learning algorithms.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Stacking
    is_a: EnsembleLearning
    class_uri: d3f:Stacking
  StandaloneHoneynet:
    name: StandaloneHoneynet
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StandaloneHoneynet
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SHN
      kb-article:
        tag: kb-article
        value: '## How it works A standalone honeynet does not directly interact with
          the real enterprise environment. It may be located near or in some portion
          of the enterprise address space, but it does not interact with enterprise
          resources. ## Considerations A standalone honeynet is a lower risk to deploy
          com'
    description: An environment created for the purpose of attracting attackers and
      eliciting their behaviors that is not connected to any production enterprise
      systems.
    title: Standalone Honeynet
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:StandaloneHoneynet
    is_a: DecoyEnvironment
    class_uri: d3f:StandaloneHoneynet
