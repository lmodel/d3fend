    description: Analyzing intercepted or summarized computer network traffic to detect
      unauthorized activity.
    title: Network Traffic Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NetworkTrafficAnalysis
    is_a: DefensiveTechnique
    class_uri: d3f:NetworkTrafficAnalysis
  NetworkTrafficAnalysisSoftware:
