  TFTPServer:
    name: TFTPServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TFTPServer
    description: Trivial File Transfer Protocol (TFTP) is a simple file transfer protocol,
      typically used to automatically transfer configuration or boot files between
      machines.  It is used where user authentication and directory visibility are
      not required.
    title: TFTP Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
