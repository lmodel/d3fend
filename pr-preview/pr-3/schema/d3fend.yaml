  BayesianHypothesisTesting:
    name: BayesianHypothesisTesting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BayesianHypothesisTesting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BHT
      kb-article:
        tag: kb-article
        value: '## How it works Given two competing hypotheses and some relevant data,
          Bayesian hypothesis testing begins by specifying separate prior distributions
          to quantitatively describe each hypothesis. The combination of the likelihood
          function for the observed data with each of the prior distributions yield'
    description: Bayesian hypothesis testing can be framed as a special case of model
      comparison where a model refers to a likelihood function and a prior distribution.
    title: Bayesian Hypothesis Testing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BayesianHypothesisTesting
    is_a: BayesianMethod
    class_uri: d3f:BayesianHypothesisTesting
  BayesianLinearRegression:
    name: BayesianLinearRegression
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BayesianLinearRegression
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BLR
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Bayesian linear regression. [Link](https://en.wikipedia.org/wiki/Bayesian_linear_regression)'
    description: Bayesian linear regression is a type of conditional modeling in which
      the mean of one variable is described by a linear combination of other variables,
