    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLinkUpEvent
    description: Auto-negotiation and signal detection complete; carrier is present
      and the link can forward frames.
    title: Physical Link Up Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PhysicalLinkUpEvent
    is_a: PhysicalLinkEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:PhysicalLinkUpEvent
  PhysicalLocation:
    name: PhysicalLocation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLocation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: The terms location  [here, a physical location] and place in geography
      are used to identify a point or an area on the Earth's surface or elsewhere.
      The term location generally implies a higher degree of certainty than place,
      which often indicates an entity with an ambiguous boundary, relying more on
      human or social attributes of place identity and sense of place than on geometry.
      The distinction between space and place is considered a central concern of geography,
      and has been addressed by scholars such as Yi-Fu Tuan and John Agnew.
    title: Physical Location
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/location
    - http://dbpedia.org/resource/Location_(geography)
    mappings:
    - d3f:PhysicalLocation
    is_a: D3FENDCore
    class_uri: d3f:PhysicalLocation
  PhysicalLock:
