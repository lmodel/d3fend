    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#KernelEvent
    description: An event involving operations at the kernel level of an operating
      system, encompassing interactions with core system resources such as drivers,
      modules, system calls, and other privileged processes. Kernel events are critical
      for understanding low-level system behavior and ensuring the integrity of the
      operating environment.
