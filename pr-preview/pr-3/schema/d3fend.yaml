    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#
    mappings:
    - d3f:T1454
    exact_mappings:
    - attack:T1454
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1454
  T1456:
    name: T1456
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1456
    annotations:
      attack-id:
        tag: attack-id
        value: T1456
    description: Adversaries may gain access to a system through a user visiting a
      website over the normal course of browsing. With this technique, the user's
      web browser is typically targeted for exploitation, but adversaries may also
      use compromised websites for non-exploitation behavior such as acquiring an
      [Application Access Token](https://attack.mitre.org/techniques/T1550/001).
    title: Drive-By Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1456
    exact_mappings:
    - attack:T1456
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1456
  T1458:
    name: T1458
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1458
    annotations:
      attack-id:
        tag: attack-id
        value: T1458
    description: 'Adversaries may move onto devices by exploiting or copying malware
      to devices connected via USB. In the case of Lateral Movement, adversaries may
      utilize the physical connection of a device to a compromised or malicious charging
      station or PC to bypass application store requirements and install malicious
      applications directly.(Citation: Lau-Mactans) In the case of Initial Access,
      adversaries may attempt to exploit the device via the connection to gain access
      to data stored on the device.(Citation: Krebs-JuiceJacking) Examples of this
      include:'
    title: Replication Through Removable Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1458
    exact_mappings:
    - attack:T1458
    is_a: ATTACKMobileInitialAccessTechnique
    mixins:
    - ATTACKMobileLateralMovementTechnique
    class_uri: d3f:T1458
  T1461:
    name: T1461
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1461
    annotations:
      attack-id:
        tag: attack-id
        value: T1461
    description: "An adversary with physical access to a mobile device may seek to\
      \ bypass the device\u2019s lockscreen. Several methods exist to accomplish this,\
      \ including:"
    title: Lockscreen Bypass
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1461
    exact_mappings:
    - attack:T1461
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1461
  T1464:
    name: T1464
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1464
    annotations:
      attack-id:
        tag: attack-id
        value: T1464
    description: Adversaries may perform Network Denial of Service (DoS) attacks to
      degrade or block the availability of targeted resources to users. Network DoS
      can be performed by exhausting the network bandwidth that services rely on,
      or by jamming the signal going to or coming from devices.
    title: Network Denial of Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1464
    exact_mappings:
    - attack:T1464
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1464
  T1471:
    name: T1471
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1471
    annotations:
      attack-id:
        tag: attack-id
        value: T1471
    description: An adversary may encrypt files stored on a mobile device to prevent
      the user from accessing them. This may be done in order to extract monetary
      compensation from a victim in exchange for decryption or a decryption key (ransomware)
      or to render data permanently inaccessible in cases where the key is not saved
      or transmitted.
    title: Data Encrypted for Impact
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1471
    exact_mappings:
    - attack:T1471
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1471
  T1472:
    name: T1472
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1472
    annotations:
      attack-id:
        tag: attack-id
        value: T1472
    description: An adversary could seek to generate fraudulent advertising revenue
      from mobile devices, for example by triggering automatic clicks of advertising
      links without user involvement.
    title: Generate Fraudulent Advertising Revenue
    comments:
    - This technique has been revoked by T1643
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1643
    mappings:
    - d3f:T1472
    exact_mappings:
    - attack:T1472
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1472
  T1474:
    name: T1474
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1474
    annotations:
      attack-id:
        tag: attack-id
        value: T1474
    description: Adversaries may manipulate products or product delivery mechanisms
      prior to receipt by a final consumer for the purpose of data or system compromise.
    title: Supply Chain Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1474
    exact_mappings:
    - attack:T1474
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1474
  T1474_001:
    name: T1474_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1474001
    annotations:
      attack-id:
        tag: attack-id
        value: T1474.001
    description: 'Adversaries may manipulate products or product delivery mechanisms
      prior to receipt by a final consumer for the purpose of data or system compromise.
      Applications often depend on external software to function properly. Popular
      open source projects that are used as dependencies in many applications may
      be targeted as a means to add malicious code to users of the dependency.(Citation:
      Grace-Advertisement)'
    title: Compromise Software Dependencies and Development Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1474.001
    mappings:
    - d3f:T1474.001
    exact_mappings:
    - attack:T1474.001
    is_a: T1474
    class_uri: d3f:T1474.001
  T1474_002:
    name: T1474_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1474002
    annotations:
      attack-id:
        tag: attack-id
        value: T1474.002
    description: Adversaries may manipulate hardware components in products prior
      to receipt by a final consumer for the purpose of data or system compromise.
      By modifying hardware or firmware in the supply chain, adversaries can insert
      a backdoor into consumer networks that may be difficult to detect and give the
      adversary a high degree of control over the system.
    title: Compromise Hardware Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1474.002
    mappings:
    - d3f:T1474.002
    exact_mappings:
    - attack:T1474.002
    is_a: T1474
    class_uri: d3f:T1474.002
  T1474_003:
    name: T1474_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1474003
    annotations:
      attack-id:
        tag: attack-id
        value: T1474.003
    description: Adversaries may manipulate application software prior to receipt
      by a final consumer for the purpose of data or system compromise. Supply chain
      compromise of software can take place in a number of ways, including manipulation
      of the application source code, manipulation of the update/distribution mechanism
      for that software, or replacing compiled releases with a modified version.
    title: Compromise Software Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1474.003
    mappings:
    - d3f:T1474.003
    exact_mappings:
    - attack:T1474.003
    is_a: T1474
    class_uri: d3f:T1474.003
  T1475:
    name: T1475
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1475
    annotations:
      attack-id:
        tag: attack-id
        value: T1475
    description: Malicious applications are a common attack vector used by adversaries
      to gain a presence on mobile devices. Mobile devices often are configured to
      allow application installation only from an authorized app store (e.g., Google
      Play Store or Apple App Store). An adversary may seek to place a malicious application
      in an authorized app store, enabling the application to be installed onto targeted
      devices.
    title: Deliver Malicious App via Authorized App Store
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1475
    exact_mappings:
    - attack:T1475
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1475
  T1476:
    name: T1476
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1476
    annotations:
      attack-id:
        tag: attack-id
        value: T1476
    description: Malicious applications are a common attack vector used by adversaries
      to gain a presence on mobile devices. This technique describes installing a
      malicious application on targeted mobile devices without involving an authorized
      app store (e.g., Google Play Store or Apple App Store). Adversaries may wish
      to avoid placing malicious applications in an authorized app store due to increased
      potential risk of detection or other reasons. However, mobile devices often
      are configured to allow application installation only from an authorized app
      store which would prevent this technique from working.
    title: Deliver Malicious App via Other Means
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1476
    exact_mappings:
    - attack:T1476
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1476
  T1477:
    name: T1477
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1477
    annotations:
      attack-id:
        tag: attack-id
        value: T1477
    description: The mobile device may be targeted for exploitation through its interface
      to cellular networks or other radio interfaces.
    title: Exploit via Radio Interfaces
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1477
    exact_mappings:
    - attack:T1477
    is_a: ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1477
  T1478:
    name: T1478
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1478
    annotations:
      attack-id:
        tag: attack-id
        value: T1478
    description: 'An adversary could attempt to install insecure or malicious configuration
      settings on the mobile device, through means such as phishing emails or text
      messages either directly containing the configuration settings as an attachment,
      or containing a web link to the configuration settings. The device user may
      be tricked into installing the configuration settings through social engineering
      techniques (Citation: Symantec-iOSProfile).'
    title: Install Insecure or Malicious Configuration
    comments:
    - This technique has been revoked by T1632.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1632.001
    mappings:
    - d3f:T1478
    exact_mappings:
    - attack:T1478
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileInitialAccessTechnique
    class_uri: d3f:T1478
  T1480:
    name: T1480
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1480
    annotations:
      attack-id:
        tag: attack-id
        value: T1480
    description: "Adversaries may use execution guardrails to constrain execution\
      \ or actions based on adversary supplied and environment specific conditions\
      \ that are expected to be present on the target. Guardrails ensure that a payload\
      \ only executes against an intended target and reduces collateral damage from\
      \ an adversary\u2019s campaign.(Citation: FireEye Kevin Mandia Guardrails) Values\
      \ an adversary can provide about a target system or environment to use as guardrails\
      \ may include specific network share names, attached physical devices, files,\
      \ joined Active Directory (AD) domains, and local/external IP addresses.(Citation:\
      \ FireEye Outlook Dec 2019)"
    title: Execution Guardrails
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1480
    exact_mappings:
    - attack:T1480
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1480
  T1480_001:
    name: T1480_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1480001
    annotations:
      attack-id:
        tag: attack-id
        value: T1480.001
    description: 'Adversaries may environmentally key payloads or other features of
      malware to evade defenses and constraint execution to a specific target environment.
      Environmental keying uses cryptography to constrain execution or actions based
      on adversary supplied environment specific conditions that are expected to be
      present on the target. Environmental keying is an implementation of [Execution
      Guardrails](https://attack.mitre.org/techniques/T1480) that utilizes cryptographic
      techniques for deriving encryption/decryption keys from specific types of values
      in a given computing environment.(Citation: EK Clueless Agents)'
    title: Environmental Keying
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1480.001
    mappings:
    - d3f:T1480.001
    exact_mappings:
    - attack:T1480.001
    is_a: T1480
    class_uri: d3f:T1480.001
  T1480_002:
    name: T1480_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1480002
    annotations:
      attack-id:
        tag: attack-id
        value: T1480.002
    description: 'Adversaries may constrain execution or actions based on the presence
      of a mutex associated with malware. A mutex is a locking mechanism used to synchronize
      access to a resource. Only one thread or process can acquire a mutex at a given
      time.(Citation: Microsoft Mutexes)'
    title: Mutual Exclusion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1480.002
    mappings:
    - d3f:T1480.002
    exact_mappings:
    - attack:T1480.002
    is_a: T1480
    class_uri: d3f:T1480.002
  T1481:
    name: T1481
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1481
    annotations:
      attack-id:
        tag: attack-id
        value: T1481
    description: Adversaries may use an existing, legitimate external Web service
      as a means for relaying data to/from a compromised system. Popular websites
      and social media, acting as a mechanism for C2, may give a significant amount
      of cover. This is due to the likelihood that hosts within a network are already
      communicating with them prior to a compromise. Using common services, such as
      those offered by Google or Twitter, makes it easier for adversaries to hide
      in expected noise. Web service providers commonly use SSL/TLS encryption, giving
      adversaries an added level of protection.
    title: Web Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1481
    exact_mappings:
    - attack:T1481
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1481
  T1481_001:
    name: T1481_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1481001
    annotations:
      attack-id:
        tag: attack-id
        value: T1481.001
    description: Adversaries may use an existing, legitimate external Web service
      to host information that points to additional command and control (C2) infrastructure.
      Adversaries may post content, known as a dead drop resolver, on Web services
      with embedded (and often obfuscated/encoded) domains or IP addresses. Once infected,
      victims will reach out to and be redirected by these resolvers.
    title: Dead Drop Resolver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1481.001
    mappings:
    - d3f:T1481.001
    exact_mappings:
    - attack:T1481.001
    is_a: T1481
    class_uri: d3f:T1481.001
  T1481_002:
    name: T1481_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1481002
    annotations:
      attack-id:
        tag: attack-id
        value: T1481.002
    description: Adversaries may use an existing, legitimate external Web service
      channel as a means for sending commands to and receiving output from a compromised
      system. Compromised systems may leverage popular websites and social media to
      host command and control (C2) instructions. Those infected systems can then
      send the output from those commands back over that Web service channel. The
      return traffic may occur in a variety of ways, depending on the Web service
      being utilized. For example, the return traffic may take the form of the compromised
      system posting a comment on a forum, issuing a pull request to development project,
      updating a document hosted on a Web service, or by sending a Tweet.
    title: Bidirectional Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1481.002
    mappings:
    - d3f:T1481.002
    exact_mappings:
    - attack:T1481.002
    is_a: T1481
    class_uri: d3f:T1481.002
  T1481_003:
    name: T1481_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1481003
    annotations:
      attack-id:
        tag: attack-id
        value: T1481.003
    description: Adversaries may use an existing, legitimate external Web service
      channel as a means for sending commands to a compromised system without receiving
      return output. Compromised systems may leverage popular websites and social
      media to host command and control (C2) instructions. Those infected systems
      may opt to send the output from those commands back over a different C2 channel,
      including to another distinct Web service. Alternatively, compromised systems
      may return no output at all in cases where adversaries want to send instructions
      to systems and do not want a response.
    title: One-Way Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1481.003
    mappings:
    - d3f:T1481.003
    exact_mappings:
    - attack:T1481.003
    is_a: T1481
    class_uri: d3f:T1481.003
  T1482:
    name: T1482
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1482
    annotations:
      attack-id:
        tag: attack-id
        value: T1482
    description: 'Adversaries may attempt to gather information on domain trust relationships
      that may be used to identify lateral movement opportunities in Windows multi-domain/forest
      environments. Domain trusts provide a mechanism for a domain to allow access
      to resources based on the authentication procedures of another domain.(Citation:
      Microsoft Trusts) Domain trusts allow the users of the trusted domain to access
      resources in the trusting domain. The information discovered may help the adversary
      conduct [SID-History Injection](https://attack.mitre.org/techniques/T1134/005),
      [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003), and [Kerberoasting](https://attack.mitre.org/techniques/T1558/003).(Citation:
      AdSecurity Forging Trust Tickets)(Citation: Harmj0y Domain Trusts) Domain trusts
      can be enumerated using the `DSEnumerateDomainTrusts()` Win32 API call, .NET
      methods, and LDAP.(Citation: Harmj0y Domain Trusts) The Windows utility [Nltest](https://attack.mitre.org/software/S0359)
      is known to be used by adversaries to enumerate domain trusts.(Citation: Microsoft
      Operation Wilysupply)'
    title: Domain Trust Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1482
    exact_mappings:
    - attack:T1482
    is_a: DiscoveryTechnique
    class_uri: d3f:T1482
  T1483:
    name: T1483
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1483
    annotations:
      attack-id:
        tag: attack-id
        value: T1483
    description: 'Adversaries may make use of Domain Generation Algorithms (DGAs)
      to dynamically identify a destination for command and control traffic rather
      than relying on a list of static IP addresses or domains. This has the advantage
      of making it much harder for defenders block, track, or take over the command
      and control channel, as there potentially could be thousands of domains that
      malware can check for instructions.(Citation: Cybereason Dissecting DGAs)(Citation:
      Cisco Umbrella DGA)(Citation: Unit 42 DGA Feb 2019)'
    title: Domain Generation Algorithms
    comments:
    - This technique has been revoked by T1568.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1568.002
    mappings:
    - d3f:T1483
    exact_mappings:
    - attack:T1483
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1483
  T1484:
    name: T1484
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1484
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1484
    description: Adversaries may modify the configuration settings of a domain or
      identity tenant to evade defenses and/or escalate privileges in centrally managed
      environments. Such services provide a centralized means of managing identity
      resources such as devices and accounts, and often include configuration settings
      that may apply between domains or tenants such as trust relationships, identity
      syncing, or identity federation.
    title: Domain or Tenant Policy Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1484
    exact_mappings:
    - attack:T1484
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1484
  T1484_001:
    name: T1484_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1484001
    annotations:
      attack-id:
        tag: attack-id
        value: T1484.001
    description: 'Adversaries may modify Group Policy Objects (GPOs) to subvert the
      intended discretionary access controls for a domain, usually with the intention
      of escalating privileges on the domain. Group policy allows for centralized
      management of user and computer settings in Active Directory (AD). GPOs are
      containers for group policy settings made up of files stored within a predictable
      network path `\<DOMAIN>\SYSVOL\<DOMAIN>\Policies\`.(Citation: TechNet Group
      Policy Basics)(Citation: ADSecurity GPO Persistence 2016)'
    title: Group Policy Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1484.001
    mappings:
    - d3f:T1484.001
    exact_mappings:
    - attack:T1484.001
    is_a: T1484
    class_uri: d3f:T1484.001
  T1484_002:
    name: T1484_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1484002
    annotations:
      attack-id:
        tag: attack-id
        value: T1484.002
    description: 'Adversaries may add new domain trusts, modify the properties of
      existing domain trusts, or otherwise change the configuration of trust relationships
      between domains and tenants to evade defenses and/or elevate privileges.Trust
      details, such as whether or not user identities are federated, allow authentication
      and authorization properties to apply between domains or tenants for the purpose
      of accessing shared resources.(Citation: Microsoft - Azure AD Federation) These
      trust objects may include accounts, credentials, and other authentication material
      applied to servers, tokens, and domains.'
    title: Trust Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1484.002
    mappings:
    - d3f:T1484.002
    exact_mappings:
    - attack:T1484.002
    is_a: T1484
    class_uri: d3f:T1484.002
  T1485:
    name: T1485
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1485
    annotations:
      attack-id:
        tag: attack-id
        value: T1485
    description: 'Adversaries may destroy data and files on specific systems or in
      large numbers on a network to interrupt availability to systems, services, and
      network resources. Data destruction is likely to render stored data irrecoverable
      by forensic techniques through overwriting files or data on local and remote
      drives.(Citation: Symantec Shamoon 2012)(Citation: FireEye Shamoon Nov 2016)(Citation:
      Palo Alto Shamoon Nov 2016)(Citation: Kaspersky StoneDrill 2017)(Citation: Unit
      42 Shamoon3 2018)(Citation: Talos Olympic Destroyer 2018) Common operating system
      file deletion commands such as <code>del</code> and <code>rm</code> often only
      remove pointers to files without wiping the contents of the files themselves,
      making the files recoverable by proper forensic methodology. This behavior is
      distinct from [Disk Content Wipe](https://attack.mitre.org/techniques/T1561/001)
      and [Disk Structure Wipe](https://attack.mitre.org/techniques/T1561/002) because
      individual files are destroyed rather than sections of a storage disk or the
      disk''s logical structure.'
    title: Data Destruction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1485
    exact_mappings:
    - attack:T1485
    is_a: ImpactTechnique
    class_uri: d3f:T1485
  T1485_001:
    name: T1485_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1485001
    annotations:
      attack-id:
        tag: attack-id
        value: T1485.001
    description: Adversaries may modify the lifecycle policies of a cloud storage
      bucket to destroy all objects stored within.
    title: Lifecycle-Triggered Deletion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1485.001
    mappings:
    - d3f:T1485.001
    exact_mappings:
    - attack:T1485.001
    is_a: T1485
    class_uri: d3f:T1485.001
  T1486:
    name: T1486
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1486
    annotations:
      attack-id:
        tag: attack-id
        value: T1486
    description: 'Adversaries may encrypt data on target systems or on large numbers
      of systems in a network to interrupt availability to system and network resources.
      They can attempt to render stored data inaccessible by encrypting files or data
      on local and remote drives and withholding access to a decryption key. This
      may be done in order to extract monetary compensation from a victim in exchange
      for decryption or a decryption key (ransomware) or to render data permanently
      inaccessible in cases where the key is not saved or transmitted.(Citation: US-CERT
      Ransomware 2016)(Citation: FireEye WannaCry 2017)(Citation: US-CERT NotPetya
      2017)(Citation: US-CERT SamSam 2018)'
    title: Data Encrypted for Impact
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1486
    exact_mappings:
    - attack:T1486
    is_a: ImpactTechnique
    class_uri: d3f:T1486
  T1487:
    name: T1487
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1487
    annotations:
      attack-id:
        tag: attack-id
        value: T1487
    description: Adversaries may corrupt or wipe the disk data structures on hard
      drive necessary to boot systems; targeting specific critical systems as well
      as a large number of systems in a network to interrupt availability to system
      and network resources.
    title: Disk Structure Wipe
    comments:
    - This technique has been revoked by T1561.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1561.002
    mappings:
    - d3f:T1487
    exact_mappings:
    - attack:T1487
    is_a: ImpactTechnique
    class_uri: d3f:T1487
  T1488:
    name: T1488
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1488
    annotations:
      attack-id:
        tag: attack-id
        value: T1488
    description: Adversaries may erase the contents of storage devices on specific
      systems as well as large numbers of systems in a network to interrupt availability
      to system and network resources.
    title: Disk Content Wipe
    comments:
    - This technique has been revoked by T1561.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1561.001
    mappings:
    - d3f:T1488
    exact_mappings:
    - attack:T1488
    is_a: ImpactTechnique
    class_uri: d3f:T1488
  T1489:
    name: T1489
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1489
    annotations:
      attack-id:
        tag: attack-id
        value: T1489
    description: 'Adversaries may stop or disable services on a system to render those
      services unavailable to legitimate users. Stopping critical services or processes
      can inhibit or stop response to an incident or aid in the adversary''s overall
      objectives to cause damage to the environment.(Citation: Talos Olympic Destroyer
      2018)(Citation: Novetta Blockbuster)'
    title: Service Stop
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1489
    exact_mappings:
    - attack:T1489
    is_a: ImpactTechnique
    class_uri: d3f:T1489
  T1490:
    name: T1490
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1490
    annotations:
      attack-id:
        tag: attack-id
        value: T1490
    description: 'Adversaries may delete or remove built-in data and turn off services
      designed to aid in the recovery of a corrupted system to prevent recovery.(Citation:
      Talos Olympic Destroyer 2018)(Citation: FireEye WannaCry 2017) This may deny
      access to available backups and recovery options.'
    title: Inhibit System Recovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1490
    exact_mappings:
    - attack:T1490
    is_a: ImpactTechnique
    class_uri: d3f:T1490
  T1491:
    name: T1491
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1491
    annotations:
      attack-id:
        tag: attack-id
        value: T1491
    description: Adversaries may modify visual content available internally or externally
      to an enterprise network, thus affecting the integrity of the original content.
      Reasons for [Defacement](https://attack.mitre.org/techniques/T1491) include
      delivering messaging, intimidation, or claiming (possibly false) credit for
      an intrusion. Disturbing or offensive images may be used as a part of [Defacement](https://attack.mitre.org/techniques/T1491)
      in order to cause user discomfort, or to pressure compliance with accompanying
      messages.
    title: Defacement
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1491
    exact_mappings:
    - attack:T1491
    is_a: ImpactTechnique
    class_uri: d3f:T1491
  T1491_001:
    name: T1491_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1491001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1491.001
    description: 'An adversary may deface systems internal to an organization in an
      attempt to intimidate or mislead users, thus discrediting the integrity of the
      systems. This may take the form of modifications to internal websites, or directly
      to user systems with the replacement of the desktop wallpaper.(Citation: Novetta
      Blockbuster) Disturbing or offensive images may be used as a part of [Internal
      Defacement](https://attack.mitre.org/techniques/T1491/001) in order to cause
      user discomfort, or to pressure compliance with accompanying messages. Since
      internally defacing systems exposes an adversary''s presence, it often takes
      place after other intrusion goals have been accomplished.(Citation: Novetta
      Blockbuster Destructive Malware)'
    title: Internal Defacement
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1491.001
    mappings:
    - d3f:T1491.001
    exact_mappings:
    - attack:T1491.001
    is_a: T1491
    class_uri: d3f:T1491.001
  T1491_002:
    name: T1491_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1491002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1491.002
    description: "An adversary may deface systems external to an organization in an\
      \ attempt to deliver messaging, intimidate, or otherwise mislead an organization\
      \ or users. [External Defacement](https://attack.mitre.org/techniques/T1491/002)\
      \ may ultimately cause users to distrust the systems and to question/discredit\
      \ the system\u2019s integrity. Externally-facing websites are a common victim\
      \ of defacement; often targeted by adversary and hacktivist groups in order\
      \ to push a political message or spread propaganda.(Citation: FireEye Cyber\
      \ Threats to Media Industries)(Citation: Kevin Mandia Statement to US Senate\
      \ Committee on Intelligence)(Citation: Anonymous Hackers Deface Russian Govt\
      \ Site) [External Defacement](https://attack.mitre.org/techniques/T1491/002)\
      \ may be used as a catalyst to trigger events, or as a response to actions taken\
      \ by an organization or government. Similarly, website defacement may also be\
      \ used as setup, or a precursor, for future attacks such as [Drive-by Compromise](https://attack.mitre.org/techniques/T1189).(Citation:\
      \ Trend Micro Deep Dive Into Defacement)"
    title: External Defacement
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1491.002
    mappings:
    - d3f:T1491.002
    exact_mappings:
    - attack:T1491.002
    is_a: T1491
    class_uri: d3f:T1491.002
  T1492:
    name: T1492
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1492
    annotations:
      attack-id:
        tag: attack-id
        value: T1492
    description: 'Adversaries may insert, delete, or manipulate data at rest in order
      to manipulate external outcomes or hide activity.(Citation: FireEye APT38 Oct
      2018)(Citation: DOJ Lazarus Sony 2018) By manipulating stored data, adversaries
      may attempt to affect a business process, organizational understanding, and
      decision making.'
    title: Stored Data Manipulation
    comments:
    - This technique has been revoked by T1565.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1565.001
    mappings:
    - d3f:T1492
    exact_mappings:
    - attack:T1492
    is_a: ImpactTechnique
    class_uri: d3f:T1492
  T1493:
    name: T1493
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1493
    annotations:
      attack-id:
        tag: attack-id
        value: T1493
    description: 'Adversaries may alter data en route to storage or other systems
      in order to manipulate external outcomes or hide activity.(Citation: FireEye
      APT38 Oct 2018)(Citation: DOJ Lazarus Sony 2018) By manipulating transmitted
      data, adversaries may attempt to affect a business process, organizational understanding,
      and decision making.'
    title: Transmitted Data Manipulation
    comments:
    - This technique has been revoked by T1565.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1565.002
    mappings:
    - d3f:T1493
    exact_mappings:
    - attack:T1493
    is_a: ImpactTechnique
    class_uri: d3f:T1493
  T1494:
    name: T1494
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1494
    annotations:
      attack-id:
        tag: attack-id
        value: T1494
    description: 'Adversaries may modify systems in order to manipulate the data as
      it is accessed and displayed to an end user.(Citation: FireEye APT38 Oct 2018)(Citation:
      DOJ Lazarus Sony 2018) By manipulating runtime data, adversaries may attempt
      to affect a business process, organizational understanding, and decision making.'
    title: Runtime Data Manipulation
    comments:
    - This technique has been revoked by T1565.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1565.003
    mappings:
    - d3f:T1494
    exact_mappings:
    - attack:T1494
    is_a: ImpactTechnique
    class_uri: d3f:T1494
  T1495:
    name: T1495
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1495
    annotations:
      attack-id:
        tag: attack-id
        value: T1495
    description: 'Adversaries may overwrite or corrupt the flash memory contents of
      system BIOS or other firmware in devices attached to a system in order to render
      them inoperable or unable to boot, thus denying the availability to use the
      devices and/or the system.(Citation: Symantec Chernobyl W95.CIH) Firmware is
      software that is loaded and executed from non-volatile memory on hardware devices
      in order to initialize and manage device functionality. These devices may include
      the motherboard, hard drive, or video cards.'
    title: Firmware Corruption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1495
    exact_mappings:
    - attack:T1495
    is_a: ImpactTechnique
    class_uri: d3f:T1495
  T1496:
    name: T1496
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1496
    annotations:
      attack-id:
        tag: attack-id
        value: T1496
    description: Adversaries may leverage the resources of co-opted systems to complete
      resource-intensive tasks, which may impact system and/or hosted service availability.
    title: Resource Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1496
    exact_mappings:
    - attack:T1496
    is_a: ImpactTechnique
    class_uri: d3f:T1496
  T1496_001:
    name: T1496_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1496001
    annotations:
      attack-id:
        tag: attack-id
        value: T1496.001
    description: Adversaries may leverage the compute resources of co-opted systems
      to complete resource-intensive tasks, which may impact system and/or hosted
      service availability.
    title: Compute Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1496.001
    mappings:
    - d3f:T1496.001
    exact_mappings:
    - attack:T1496.001
    is_a: T1496
    class_uri: d3f:T1496.001
  T1496_002:
    name: T1496_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1496002
    annotations:
      attack-id:
        tag: attack-id
        value: T1496.002
    description: Adversaries may leverage the network bandwidth resources of co-opted
      systems to complete resource-intensive tasks, which may impact system and/or
      hosted service availability.
    title: Bandwidth Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1496.002
    mappings:
    - d3f:T1496.002
    exact_mappings:
    - attack:T1496.002
    is_a: T1496
    class_uri: d3f:T1496.002
  T1496_003:
    name: T1496_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1496003
    annotations:
      attack-id:
        tag: attack-id
        value: T1496.003
    description: "Adversaries may leverage messaging services for SMS pumping, which\
      \ may impact system and/or hosted service availability.(Citation: Twilio SMS\
      \ Pumping) SMS pumping is a type of telecommunications fraud whereby a threat\
      \ actor first obtains a set of phone numbers from a telecommunications provider,\
      \ then leverages a victim\u2019s messaging infrastructure to send large amounts\
      \ of SMS messages to numbers in that set. By generating SMS traffic to their\
      \ phone number set, a threat actor may earn payments from the telecommunications\
      \ provider.(Citation: Twilio SMS Pumping Fraud)"
    title: SMS Pumping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1496.003
    mappings:
    - d3f:T1496.003
    exact_mappings:
    - attack:T1496.003
    is_a: T1496
    class_uri: d3f:T1496.003
  T1496_004:
    name: T1496_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1496004
    annotations:
      attack-id:
        tag: attack-id
        value: T1496.004
    description: Adversaries may leverage compromised software-as-a-service (SaaS)
      applications to complete resource-intensive tasks, which may impact hosted service
      availability.
    title: Cloud Service Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1496.004
    mappings:
    - d3f:T1496.004
    exact_mappings:
    - attack:T1496.004
    is_a: T1496
    class_uri: d3f:T1496.004
  T1497:
    name: T1497
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1497
    annotations:
      attack-id:
        tag: attack-id
        value: T1497
    description: 'Adversaries may employ various means to detect and avoid virtualization
      and analysis environments. This may include changing behaviors based on the
      results of checks for the presence of artifacts indicative of a virtual machine
      environment (VME) or sandbox. If the adversary detects a VME, they may alter
      their malware to disengage from the victim or conceal the core functions of
      the implant. They may also search for VME artifacts before dropping secondary
      or additional payloads. Adversaries may use the information learned from [Virtualization/Sandbox
      Evasion](https://attack.mitre.org/techniques/T1497) during automated discovery
      to shape follow-on behaviors.(Citation: Deloitte Environment Awareness)'
    title: Virtualization/Sandbox Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1497
    exact_mappings:
    - attack:T1497
    is_a: DefenseEvasionTechnique
    mixins:
    - DiscoveryTechnique
    class_uri: d3f:T1497
  T1497_001:
    name: T1497_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1497001
    annotations:
      attack-id:
        tag: attack-id
        value: T1497.001
    description: 'Adversaries may employ various system checks to detect and avoid
      virtualization and analysis environments. This may include changing behaviors
      based on the results of checks for the presence of artifacts indicative of a
      virtual machine environment (VME) or sandbox. If the adversary detects a VME,
      they may alter their malware to disengage from the victim or conceal the core
      functions of the implant. They may also search for VME artifacts before dropping
      secondary or additional payloads. Adversaries may use the information learned
      from [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)
      during automated discovery to shape follow-on behaviors.(Citation: Deloitte
      Environment Awareness)'
    title: System Checks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1497.001
    mappings:
    - d3f:T1497.001
    exact_mappings:
    - attack:T1497.001
    is_a: T1497
    class_uri: d3f:T1497.001
  T1497_002:
    name: T1497_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1497002
    annotations:
      attack-id:
        tag: attack-id
        value: T1497.002
    description: 'Adversaries may employ various user activity checks to detect and
      avoid virtualization and analysis environments. This may include changing behaviors
      based on the results of checks for the presence of artifacts indicative of a
      virtual machine environment (VME) or sandbox. If the adversary detects a VME,
      they may alter their malware to disengage from the victim or conceal the core
      functions of the implant. They may also search for VME artifacts before dropping
      secondary or additional payloads. Adversaries may use the information learned
      from [Virtualization/Sandbox Evasion](https://attack.mitre.org/techniques/T1497)
      during automated discovery to shape follow-on behaviors.(Citation: Deloitte
      Environment Awareness)'
    title: User Activity Based Checks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1497.002
    mappings:
    - d3f:T1497.002
    exact_mappings:
    - attack:T1497.002
    is_a: T1497
    class_uri: d3f:T1497.002
  T1497_003:
    name: T1497_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1497003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1497.003
    description: Adversaries may employ various time-based methods to detect and avoid
      virtualization and analysis environments. This may include enumerating time-based
      properties, such as uptime or the system clock, as well as the use of timers
      or other triggers to avoid a virtual machine environment (VME) or sandbox, specifically
      those that are automated or only operate for a limited amount of time.
    title: Time Based Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1497.003
    mappings:
    - d3f:T1497.003
    exact_mappings:
    - attack:T1497.003
    is_a: T1497
    class_uri: d3f:T1497.003
  T1498:
    name: T1498
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1498
    annotations:
      attack-id:
        tag: attack-id
        value: T1498
    description: 'Adversaries may perform Network Denial of Service (DoS) attacks
      to degrade or block the availability of targeted resources to users. Network
      DoS can be performed by exhausting the network bandwidth services rely on. Example
      resources include specific websites, email services, DNS, and web-based applications.
      Adversaries have been observed conducting network DoS attacks for political
      purposes(Citation: FireEye OpPoisonedHandover February 2016) and to support
      other malicious activities, including distraction(Citation: FSISAC FraudNetDoS
      September 2012), hacktivism, and extortion.(Citation: Symantec DDoS October
      2014)'
    title: Network Denial of Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1498
    exact_mappings:
    - attack:T1498
    is_a: ImpactTechnique
    class_uri: d3f:T1498
  T1498_001:
    name: T1498_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1498001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1498.001
    description: Adversaries may attempt to cause a denial of service (DoS) by directly
      sending a high-volume of network traffic to a target. This DoS attack may also
      reduce the availability and functionality of the targeted system(s) and network.
      [Direct Network Flood](https://attack.mitre.org/techniques/T1498/001)s are when
      one or more systems are used to send a high-volume of network packets towards
      the targeted service's network. Almost any network protocol may be used for
      flooding. Stateless protocols such as UDP or ICMP are commonly used but stateful
      protocols such as TCP can be used as well.
    title: Direct Network Flood
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1498.001
    mappings:
    - d3f:T1498.001
    exact_mappings:
    - attack:T1498.001
    is_a: T1498
    class_uri: d3f:T1498.001
  T1498_002:
    name: T1498_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1498002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1498.002
    description: 'Adversaries may attempt to cause a denial of service (DoS) by reflecting
      a high-volume of network traffic to a target. This type of Network DoS takes
      advantage of a third-party server intermediary that hosts and will respond to
      a given spoofed source IP address. This third-party server is commonly termed
      a reflector. An adversary accomplishes a reflection attack by sending packets
      to reflectors with the spoofed address of the victim. Similar to Direct Network
      Floods, more than one system may be used to conduct the attack, or a botnet
      may be used. Likewise, one or more reflectors may be used to focus traffic on
      the target.(Citation: Cloudflare ReflectionDoS May 2017) This Network DoS attack
      may also reduce the availability and functionality of the targeted system(s)
      and network.'
    title: Reflection Amplification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1498.002
    mappings:
    - d3f:T1498.002
    exact_mappings:
    - attack:T1498.002
    is_a: T1498
    class_uri: d3f:T1498.002
  T1499:
    name: T1499
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1499
    annotations:
      attack-id:
        tag: attack-id
        value: T1499
    description: 'Adversaries may perform Endpoint Denial of Service (DoS) attacks
      to degrade or block the availability of services to users. Endpoint DoS can
      be performed by exhausting the system resources those services are hosted on
      or exploiting the system to cause a persistent crash condition. Example services
      include websites, email services, DNS, and web-based applications. Adversaries
      have been observed conducting DoS attacks for political purposes(Citation: FireEye
      OpPoisonedHandover February 2016) and to support other malicious activities,
      including distraction(Citation: FSISAC FraudNetDoS September 2012), hacktivism,
      and extortion.(Citation: Symantec DDoS October 2014)'
    title: Endpoint Denial of Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1499
    exact_mappings:
    - attack:T1499
    is_a: ImpactTechnique
    class_uri: d3f:T1499
  T1499_001:
    name: T1499_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1499001
    annotations:
      attack-id:
        tag: attack-id
        value: T1499.001
    description: Adversaries may launch a denial of service (DoS) attack targeting
      an endpoint's operating system (OS). A system's OS is responsible for managing
      the finite resources as well as preventing the entire system from being overwhelmed
      by excessive demands on its capacity. These attacks do not need to exhaust the
      actual resources on a system; the attacks may simply exhaust the limits and
      available resources that an OS self-imposes.
    title: OS Exhaustion Flood
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1499.001
    mappings:
    - d3f:T1499.001
    exact_mappings:
    - attack:T1499.001
    is_a: T1499
    class_uri: d3f:T1499.001
  T1499_002:
    name: T1499_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1499002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1499.002
    description: 'Adversaries may target the different network services provided by
      systems to conduct a denial of service (DoS). Adversaries often target the availability
      of DNS and web services, however others have been targeted as well.(Citation:
      Arbor AnnualDoSreport Jan 2018) Web server software can be attacked through
      a variety of means, some of which apply generally while others are specific
      to the software being used to provide the service.'
    title: Service Exhaustion Flood
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1499.002
    mappings:
    - d3f:T1499.002
    exact_mappings:
    - attack:T1499.002
    is_a: T1498
    mixins:
    - T1499
    class_uri: d3f:T1499.002
  T1499_003:
    name: T1499_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1499003
    annotations:
      attack-id:
        tag: attack-id
        value: T1499.003
    description: 'Adversaries may target resource intensive features of applications
      to cause a denial of service (DoS), denying availability to those applications.
      For example, specific features in web applications may be highly resource intensive.
      Repeated requests to those features may be able to exhaust system resources
      and deny access to the application or the server itself.(Citation: Arbor AnnualDoSreport
      Jan 2018)'
    title: Application Exhaustion Flood
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1499.003
    mappings:
    - d3f:T1499.003
    exact_mappings:
    - attack:T1499.003
    is_a: T1499
    class_uri: d3f:T1499.003
  T1499_004:
    name: T1499_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1499004
    annotations:
      attack-id:
        tag: attack-id
        value: T1499.004
    description: 'Adversaries may exploit software vulnerabilities that can cause
      an application or system to crash and deny availability to users. (Citation:
      Sucuri BIND9 August 2015) Some systems may automatically restart critical applications
      and services when crashes occur, but they can likely be re-exploited to cause
      a persistent denial of service (DoS) condition.'
    title: Application or System Exploitation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1499.004
    mappings:
    - d3f:T1499.004
    exact_mappings:
    - attack:T1499.004
    is_a: T1499
    class_uri: d3f:T1499.004
  T1500:
    name: T1500
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1500
    annotations:
      attack-id:
        tag: attack-id
        value: T1500
    description: 'Adversaries may attempt to make payloads difficult to discover and
      analyze by delivering files to victims as uncompiled code. Similar to [Obfuscated
      Files or Information](https://attack.mitre.org/techniques/T1027), text-based
      source code files may subvert analysis and scrutiny from protections targeting
      executables/binaries. These payloads will need to be compiled before execution;
      typically via native utilities such as csc.exe or GCC/MinGW.(Citation: ClearSky
      MuddyWater Nov 2018)'
    title: Compile After Delivery
    comments:
    - This technique has been revoked by T1027.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1027.004
    mappings:
    - d3f:T1500
    exact_mappings:
    - attack:T1500
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1500
  T1501:
    name: T1501
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1501
    annotations:
      attack-id:
        tag: attack-id
        value: T1501
    description: 'Systemd services can be used to establish persistence on a Linux
      system. The systemd service manager is commonly used for managing background
      daemon processes (also known as services) and other system resources.(Citation:
      Linux man-pages: systemd January 2014)(Citation: Freedesktop.org Linux systemd
      29SEP2018) Systemd is the default initialization (init) system on many Linux
      distributions starting with Debian 8, Ubuntu 15.04, CentOS 7, RHEL 7, Fedora
      15, and replaces legacy init systems including SysVinit and Upstart while remaining
      backwards compatible with the aforementioned init systems.'
    title: Systemd Service
    comments:
    - This technique has been revoked by T1543.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1543.002
    mappings:
    - d3f:T1501
    exact_mappings:
    - attack:T1501
    is_a: PersistenceTechnique
    class_uri: d3f:T1501
  T1502:
    name: T1502
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1502
    annotations:
      attack-id:
        tag: attack-id
        value: T1502
    description: 'Adversaries may spoof the parent process identifier (PPID) of a
      new process to evade process-monitoring defenses or to elevate privileges. New
      processes are typically spawned directly from their parent, or calling, process
      unless explicitly specified. One way of explicitly assigning the PPID of a new
      process is via the <code>CreateProcess</code> API call, which supports a parameter
      that defines the PPID to use.(Citation: DidierStevens SelectMyParent Nov 2009)
      This functionality is used by Windows features such as User Account Control
      (UAC) to correctly set the PPID after a requested elevated process is spawned
      by SYSTEM (typically via <code>svchost.exe</code> or <code>consent.exe</code>)
      rather than the current user context.(Citation: Microsoft UAC Nov 2018)'
    title: Parent PID Spoofing
    comments:
    - This technique has been revoked by T1134.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1134.004
    mappings:
    - d3f:T1502
    exact_mappings:
    - attack:T1502
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1502
  T1503:
    name: T1503
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1503
    annotations:
      attack-id:
        tag: attack-id
        value: T1503
    description: 'Adversaries may acquire credentials from web browsers by reading
      files specific to the target browser.  (Citation: Talos Olympic Destroyer 2018)'
    title: Credentials from Web Browsers
    comments:
    - This technique has been revoked by T1555.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1555.003
    mappings:
    - d3f:T1503
    exact_mappings:
    - attack:T1503
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1503
  T1504:
    name: T1504
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1504
    annotations:
      attack-id:
        tag: attack-id
        value: T1504
    description: 'Adversaries may gain persistence and elevate privileges in certain
      situations by abusing [PowerShell](https://attack.mitre.org/techniques/T1086)
      profiles. A PowerShell profile  (<code>profile.ps1</code>) is a script that
      runs when PowerShell starts and can be used as a logon script to customize user
      environments. PowerShell supports several profiles depending on the user or
      host program. For example, there can be different profiles for PowerShell host
      programs such as the PowerShell console, PowerShell ISE or Visual Studio Code.
      An administrator can also configure a profile that applies to all users and
      host programs on the local computer. (Citation: Microsoft About Profiles)'
    title: PowerShell Profile
    comments:
    - This technique has been revoked by T1546.013
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.013
    mappings:
    - d3f:T1504
    exact_mappings:
    - attack:T1504
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1504
  T1505:
    name: T1505
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505
    annotations:
      attack-id:
        tag: attack-id
        value: T1505
    description: 'Adversaries may abuse legitimate extensible development features
      of servers to establish persistent access to systems. Enterprise server applications
      may include features that allow developers to write and install software or
      scripts to extend the functionality of the main application. Adversaries may
      install malicious components to extend and abuse server applications.(Citation:
      volexity_0day_sophos_FW)'
    title: Server Software Component
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1505
    exact_mappings:
    - attack:T1505
    is_a: PersistenceTechnique
    class_uri: d3f:T1505
  T1505_001:
    name: T1505_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1505.001
    description: Adversaries may abuse SQL stored procedures to establish persistent
      access to systems. SQL Stored Procedures are code that can be saved and reused
      so that database users do not waste time rewriting frequently used SQL queries.
      Stored procedures can be invoked via SQL statements to the database using the
      procedure name or via defined events (e.g. when a SQL server application is
      started/restarted).
    title: SQL Stored Procedures
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.001
    mappings:
    - d3f:T1505.001
    exact_mappings:
    - attack:T1505.001
    is_a: T1505
    class_uri: d3f:T1505.001
  T1505_002:
    name: T1505_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1505.002
    description: 'Adversaries may abuse Microsoft transport agents to establish persistent
      access to systems. Microsoft Exchange transport agents can operate on email
      messages passing through the transport pipeline to perform various tasks such
      as filtering spam, filtering malicious attachments, journaling, or adding a
      corporate signature to the end of all outgoing emails.(Citation: Microsoft TransportAgent
      Jun 2016)(Citation: ESET LightNeuron May 2019) Transport agents can be written
      by application developers and then compiled to .NET assemblies that are subsequently
      registered with the Exchange server. Transport agents will be invoked during
      a specified stage of email processing and carry out developer defined tasks.'
    title: Transport Agent
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.002
    mappings:
    - d3f:T1505.002
    exact_mappings:
    - attack:T1505.002
    is_a: T1505
    class_uri: d3f:T1505.002
  T1505_003:
    name: T1505_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1505.003
    description: 'Adversaries may backdoor web servers with web shells to establish
      persistent access to systems. A Web shell is a Web script that is placed on
      an openly accessible Web server to allow an adversary to access the Web server
      as a gateway into a network. A Web shell may provide a set of functions to execute
      or a command-line interface on the system that hosts the Web server.(Citation:
      volexity_0day_sophos_FW)'
    title: Web Shell
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.003
    mappings:
    - d3f:T1505.003
    exact_mappings:
    - attack:T1505.003
    is_a: T1505
    class_uri: d3f:T1505.003
  T1505_004:
    name: T1505_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1505.004
    description: 'Adversaries may install malicious components that run on Internet
      Information Services (IIS) web servers to establish persistence. IIS provides
      several mechanisms to extend the functionality of the web servers. For example,
      Internet Server Application Programming Interface (ISAPI) extensions and filters
      can be installed to examine and/or modify incoming and outgoing IIS web requests.
      Extensions and filters are deployed as DLL files that export three functions:
      <code>Get{Extension/Filter}Version</code>, <code>Http{Extension/Filter}Proc</code>,
      and (optionally) <code>Terminate{Extension/Filter}</code>. IIS modules may also
      be installed to extend IIS web servers.(Citation: Microsoft ISAPI Extension
      Overview 2017)(Citation: Microsoft ISAPI Filter Overview 2017)(Citation: IIS
      Backdoor 2011)(Citation: Trustwave IIS Module 2013)'
    title: IIS Components
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.004
    mappings:
    - d3f:T1505.004
    exact_mappings:
    - attack:T1505.004
    is_a: T1505
    class_uri: d3f:T1505.004
  T1505_005:
    name: T1505_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505005
    annotations:
      attack-id:
        tag: attack-id
        value: T1505.005
    description: 'Adversaries may abuse components of Terminal Services to enable
      persistent access to systems. Microsoft Terminal Services, renamed to Remote
      Desktop Services in some Windows Server OSs as of 2022, enable remote terminal
      connections to hosts. Terminal Services allows servers to transmit a full, interactive,
      graphical user interface to clients via RDP.(Citation: Microsoft Remote Desktop
      Services)'
    title: Terminal Services DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.005
    mappings:
    - d3f:T1505.005
    exact_mappings:
    - attack:T1505.005
    is_a: T1505
    class_uri: d3f:T1505.005
  T1505_006:
    name: T1505_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1505006
    annotations:
      attack-id:
        tag: attack-id
        value: T1505.006
    description: Adversaries may abuse vSphere Installation Bundles (VIBs) to establish
      persistent access to ESXi hypervisors. VIBs are collections of files used for
      software distribution and virtual system management in VMware environments.
      Since ESXi uses an in-memory filesystem where changes made to most files are
      stored in RAM rather than in persistent storage, these modifications are lost
      after a reboot. However, VIBs can be used to create startup tasks, apply custom
      firewall rules, or deploy binaries that persist across reboots. Typically, administrators
      use VIBs for updates and system maintenance.
    title: vSphere Installation Bundles
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1505.006
    mappings:
    - d3f:T1505.006
    exact_mappings:
    - attack:T1505.006
    is_a: T1505
    class_uri: d3f:T1505.006
  T1506:
    name: T1506
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1506
    annotations:
      attack-id:
        tag: attack-id
        value: T1506
    description: 'Adversaries can use stolen session cookies to authenticate to web
      applications and services. This technique bypasses some multi-factor authentication
      protocols since the session is already authenticated.(Citation: Pass The Cookie)'
    title: Web Session Cookie
    comments:
    - This technique has been revoked by T1550.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1550.004
    mappings:
    - d3f:T1506
    exact_mappings:
    - attack:T1506
    is_a: DefenseEvasionTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1506
  T1507:
    name: T1507
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1507
    annotations:
      attack-id:
        tag: attack-id
        value: T1507
    description: Adversaries may use device sensors to collect information about nearby
      networks, such as Wi-Fi and Bluetooth.
    title: Network Information Discovery
    comments:
    - This technique has been revoked by T1421
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1421
    mappings:
    - d3f:T1507
    exact_mappings:
    - attack:T1507
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1507
  T1508:
    name: T1508
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1508
    annotations:
      attack-id:
        tag: attack-id
        value: T1508
    description: A malicious application could suppress its icon from being displayed
      to the user in the application launcher to hide the fact that it is installed,
      and to make it more difficult for the user to uninstall the application. Hiding
      the application's icon programmatically does not require any special permissions.
    title: Suppress Application Icon
    comments:
    - This technique has been revoked by T1628.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1628.001
    mappings:
    - d3f:T1508
    exact_mappings:
    - attack:T1508
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1508
  T1509:
    name: T1509
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1509
    annotations:
      attack-id:
        tag: attack-id
        value: T1509
    description: Adversaries may generate network traffic using a protocol and port
      pairing that are typically not associated. For example, HTTPS over port 8088
      or port 587 as opposed to the traditional port 443. Adversaries may make changes
      to the standard port used by a protocol to bypass filtering or muddle analysis/parsing
      of network data.
    title: Non-Standard Port
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1509
    exact_mappings:
    - attack:T1509
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1509
  T1510:
    name: T1510
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1510
    annotations:
      attack-id:
        tag: attack-id
        value: T1510
    description: 'Adversaries may abuse clipboard functionality to intercept and replace
      information in the Android device clipboard.(Citation: ESET Clipboard Modification
      February 2019)(Citation: Welivesecurity Clipboard Modification February 2019)(Citation:
      Syracuse Clipboard Modification 2014) Malicious applications may monitor the
      clipboard activity through the <code>ClipboardManager.OnPrimaryClipChangedListener</code>
      interface on Android to determine when the clipboard contents have changed.(Citation:
      Dr.Webb Clipboard Modification origin2 August 2018)(Citation: Dr.Webb Clipboard
      Modification origin August 2018) Listening to clipboard activity, reading the
      clipboard contents, and modifying the clipboard contents requires no explicit
      application permissions and can be performed by applications running in the
      background, however, this behavior has changed with the release of Android 10.(Citation:
      Android 10 Privacy Changes)'
    title: Clipboard Modification
    comments:
    - This technique has been revoked by T1641.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1641.001
    mappings:
    - d3f:T1510
    exact_mappings:
    - attack:T1510
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1510
  T1512:
    name: T1512
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1512
    annotations:
      attack-id:
        tag: attack-id
        value: T1512
    description: "An adversary can leverage a device\u2019s cameras to gather information\
      \ by capturing video recordings. Images may also be captured, potentially in\
      \ specified intervals, in lieu of video files."
    title: Video Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1512
    exact_mappings:
    - attack:T1512
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1512
  T1513:
    name: T1513
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1513
    annotations:
      attack-id:
        tag: attack-id
        value: T1513
    description: 'Adversaries may use screen capture to collect additional information
      about a target device, such as applications running in the foreground, user
      data, credentials, or other sensitive information. Applications running in the
      background can capture screenshots or videos of another application running
      in the foreground by using the Android `MediaProjectionManager` (generally requires
      the device user to grant consent).(Citation: Fortinet screencap July 2019)(Citation:
      Android ScreenCap1 2019) Background applications can also use Android accessibility
      services to capture screen contents being displayed by a foreground application.(Citation:
      Lookout-Monokle) An adversary with root access or Android Debug Bridge (adb)
      access could call the Android `screencap` or `screenrecord` commands.(Citation:
      Android ScreenCap2 2019)(Citation: Trend Micro ScreenCap July 2015)'
    title: Screen Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1513
    exact_mappings:
    - attack:T1513
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1513
  T1514:
    name: T1514
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1514
    annotations:
      attack-id:
        tag: attack-id
        value: T1514
    description: 'Adversaries may leverage the AuthorizationExecuteWithPrivileges
      API to escalate privileges by prompting the user for credentials.(Citation:
      AppleDocs AuthorizationExecuteWithPrivileges) The purpose of this API is to
      give application developers an easy way to perform operations with root privileges,
      such as for application installation or updating.  This API does not validate
      that the program requesting root privileges comes from a reputable source or
      has been maliciously modified. Although this API is deprecated, it still fully
      functions in the latest releases of macOS. When calling this API, the user will
      be prompted to enter their credentials but no checks on the origin or integrity
      of the program are made. The program calling the API may also load world writable
      files which can be modified to perform malicious behavior with elevated privileges.'
    title: Elevated Execution with Prompt
    comments:
    - This technique has been revoked by T1548.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1548.004
    mappings:
    - d3f:T1514
    exact_mappings:
    - attack:T1514
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1514
  T1516:
    name: T1516
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1516
    annotations:
      attack-id:
        tag: attack-id
        value: T1516
    description: A malicious application can inject input to the user interface to
      mimic user interaction through the abuse of Android's accessibility APIs.
    title: Input Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1516
    exact_mappings:
    - attack:T1516
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileImpactTechnique
    class_uri: d3f:T1516
  T1517:
    name: T1517
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1517
    annotations:
      attack-id:
        tag: attack-id
        value: T1517
    description: 'Adversaries may collect data within notifications sent by the operating
      system or other applications. Notifications may contain sensitive data such
      as one-time authentication codes sent over SMS, email, or other mediums. In
      the case of Credential Access, adversaries may attempt to intercept one-time
      code sent to the device. Adversaries can also dismiss notifications to prevent
      the user from noticing that the notification has arrived and can trigger action
      buttons contained within notifications.(Citation: ESET 2FA Bypass)'
    title: Access Notifications
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1517
    exact_mappings:
    - attack:T1517
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1517
  T1518:
    name: T1518
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1518
    annotations:
      attack-id:
        tag: attack-id
        value: T1518
    description: Adversaries may attempt to get a listing of software and software
      versions that are installed on a system or in a cloud environment. Adversaries
      may use the information from [Software Discovery](https://attack.mitre.org/techniques/T1518)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: Software Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1518
    exact_mappings:
    - attack:T1518
    is_a: DiscoveryTechnique
    class_uri: d3f:T1518
  T1518_001:
    name: T1518_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1518001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1518.001
    description: Adversaries may attempt to get a listing of security software, configurations,
      defensive tools, and sensors that are installed on a system or in a cloud environment.
      This may include things such as cloud monitoring agents and anti-virus. Adversaries
      may use the information from [Security Software Discovery](https://attack.mitre.org/techniques/T1518/001)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: Security Software Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1518.001
    mappings:
    - d3f:T1518.001
    exact_mappings:
    - attack:T1518.001
    is_a: T1518
    class_uri: d3f:T1518.001
  T1518_002:
    name: T1518_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1518002
    annotations:
      attack-id:
        tag: attack-id
        value: T1518.002
    description: Adversaries may attempt to get a listing of backup software or configurations
      that are installed on a system. Adversaries may use this information to shape
      follow-on behaviors, such as [Data Destruction](https://attack.mitre.org/techniques/T1485),
      [Inhibit System Recovery](https://attack.mitre.org/techniques/T1490), or [Data
      Encrypted for Impact](https://attack.mitre.org/techniques/T1486).
    title: Backup Software Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1518.002
    mappings:
    - d3f:T1518.002
    exact_mappings:
    - attack:T1518.002
    is_a: T1518
    class_uri: d3f:T1518.002
  T1519:
    name: T1519
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1519
    annotations:
      attack-id:
        tag: attack-id
        value: T1519
    description: 'Adversaries may use Event Monitor Daemon (emond) to establish persistence
      by scheduling malicious commands to run on predictable event triggers. Emond
      is a [Launch Daemon](https://attack.mitre.org/techniques/T1160) that accepts
      events from various services, runs them through a simple rules engine, and takes
      action. The emond binary at <code>/sbin/emond</code> will load any rules from
      the <code>/etc/emond.d/rules/</code> directory and take action once an explicitly
      defined event takes place. The rule files are in the plist format and define
      the name, event type, and action to take. Some examples of event types include
      system startup and user authentication. Examples of actions are to run a system
      command or send an email. The emond service will not launch if there is no file
      present in the QueueDirectories path <code>/private/var/db/emondClients</code>,
      specified in the [Launch Daemon](https://attack.mitre.org/techniques/T1160)
      configuration file at<code>/System/Library/LaunchDaemons/com.apple.emond.plist</code>.(Citation:
      xorrior emond Jan 2018)(Citation: magnusviri emond Apr 2016)(Citation: sentinelone
      macos persist Jun 2019)'
    title: Emond
    comments:
    - This technique has been revoked by T1546.014
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.014
    mappings:
    - d3f:T1519
    exact_mappings:
    - attack:T1519
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1519
  T1520:
    name: T1520
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1520
    annotations:
      attack-id:
        tag: attack-id
        value: T1520
    description: 'Adversaries may use [Domain Generation Algorithms](https://attack.mitre.org/techniques/T1520)
      (DGAs) to procedurally generate domain names for command and control communication,
      and other uses such as malicious application distribution.(Citation: securelist
      rotexy 2018)'
    title: Domain Generation Algorithms
    comments:
    - This technique has been revoked by T1637.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1637.001
    mappings:
    - d3f:T1520
    exact_mappings:
    - attack:T1520
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1520
  T1521:
    name: T1521
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1521
    annotations:
      attack-id:
        tag: attack-id
        value: T1521
    description: Adversaries may explicitly employ a known encryption algorithm to
      conceal command and control traffic rather than relying on any inherent protections
      provided by a communication protocol. Despite the use of a secure algorithm,
      these implementations may be vulnerable to reverse engineering if necessary
      secret keys are encoded and/or generated within malware samples/configuration
      files.
    title: Encrypted Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1521
    exact_mappings:
    - attack:T1521
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1521
  T1521_001:
    name: T1521_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1521001
    annotations:
      attack-id:
        tag: attack-id
        value: T1521.001
    description: Adversaries may employ a known symmetric encryption algorithm to
      conceal command and control traffic, rather than relying on any inherent protections
      provided by a communication protocol. Symmetric encryption algorithms use the
      same key for plaintext encryption and ciphertext decryption. Common symmetric
      encryption algorithms include AES, Blowfish, and RC4.
    title: Symmetric Cryptography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1521.001
    mappings:
    - d3f:T1521.001
    exact_mappings:
    - attack:T1521.001
    is_a: T1521
    class_uri: d3f:T1521.001
  T1521_002:
    name: T1521_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1521002
    annotations:
      attack-id:
        tag: attack-id
        value: T1521.002
    description: "Adversaries may employ a known asymmetric encryption algorithm to\
      \ conceal command and control traffic, rather than relying on any inherent protections\
      \ provided by a communication protocol. Asymmetric cryptography, also known\
      \ as public key cryptography, uses a keypair per party: one public that can\
      \ be freely distributed, and one private that should not be distributed. Due\
      \ to how asymmetric algorithms work, the sender encrypts data with the receiver\u2019\
      s public key and the receiver decrypts the data with their private key. This\
      \ ensures that only the intended recipient can read the encrypted data. Common\
      \ public key encryption algorithms include RSA, ElGamal, and ECDSA."
    title: Asymmetric Cryptography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1521.002
    mappings:
    - d3f:T1521.002
    exact_mappings:
    - attack:T1521.002
    is_a: T1521
    class_uri: d3f:T1521.002
  T1521_003:
    name: T1521_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1521003
    annotations:
      attack-id:
        tag: attack-id
        value: T1521.003
    description: Adversaries may use [SSL Pinning](https://attack.mitre.org/techniques/T1521/003)  to
      protect the C2 traffic from being intercepted and analyzed.
    title: SSL Pinning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1521.003
    mappings:
    - d3f:T1521.003
    exact_mappings:
    - attack:T1521.003
    is_a: T1521
    class_uri: d3f:T1521.003
  T1522:
    name: T1522
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1522
    annotations:
      attack-id:
        tag: attack-id
        value: T1522
    description: Adversaries may attempt to access the Cloud Instance Metadata API
      to collect credentials and other sensitive data.
    title: Cloud Instance Metadata API
    comments:
    - This technique has been revoked by T1552.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1552.005
    mappings:
    - d3f:T1522
    exact_mappings:
    - attack:T1522
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1522
  T1523:
    name: T1523
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1523
    annotations:
      attack-id:
        tag: attack-id
        value: T1523
    description: Malicious applications may attempt to detect their operating environment
      prior to fully executing their payloads. These checks are often used to ensure
      the application is not running within an analysis environment such as a sandbox
      used for application vetting, security research, or reverse engineering.
    title: Evade Analysis Environment
    comments:
    - This technique has been revoked by T1633.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1633.001
    mappings:
    - d3f:T1523
    exact_mappings:
    - attack:T1523
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileDiscoveryTechnique
    class_uri: d3f:T1523
  T1525:
    name: T1525
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1525
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1525
    description: "Adversaries may implant cloud or container images with malicious\
      \ code to establish persistence after gaining access to an environment. Amazon\
      \ Web Services (AWS) Amazon Machine Images (AMIs), Google Cloud Platform (GCP)\
      \ Images, and Azure Images as well as popular container runtimes such as Docker\
      \ can be implanted or backdoored. Unlike [Upload Malware](https://attack.mitre.org/techniques/T1608/001),\
      \ this technique focuses on adversaries implanting an image in a registry within\
      \ a victim\u2019s environment. Depending on how the infrastructure is provisioned,\
      \ this could provide persistent access if the infrastructure provisioning tool\
      \ is instructed to always use the latest image.(Citation: Rhino Labs Cloud Image\
      \ Backdoor Technique Sept 2019)"
    title: Implant Internal Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1525
    exact_mappings:
    - attack:T1525
    is_a: PersistenceTechnique
    class_uri: d3f:T1525
  T1526:
    name: T1526
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1526
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1526
    description: An adversary may attempt to enumerate the cloud services running
      on a system after gaining access. These methods can differ from platform-as-a-service
      (PaaS), to infrastructure-as-a-service (IaaS), or software-as-a-service (SaaS).
      Many services exist throughout the various cloud providers and can include Continuous
      Integration and Continuous Delivery (CI/CD), Lambda Functions, Azure AD, etc.
      They may also include security services, such as AWS GuardDuty and Microsoft
      Defender for Cloud, and logging services, such as AWS CloudTrail and Google
      Cloud Audit Logs.
    title: Cloud Service Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1526
    exact_mappings:
    - attack:T1526
    is_a: DiscoveryTechnique
    class_uri: d3f:T1526
  T1527:
    name: T1527
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1527
    annotations:
      attack-id:
        tag: attack-id
        value: T1527
    description: Adversaries may use application access tokens to bypass the typical
      authentication process and access restricted accounts, information, or services
      on remote systems. These tokens are typically stolen from users and used in
      lieu of login credentials.
    title: Application Access Token
    comments:
    - This technique has been revoked by T1550.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1550.001
    mappings:
    - d3f:T1527
    exact_mappings:
    - attack:T1527
    is_a: DefenseEvasionTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1527
  T1528:
    name: T1528
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1528
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1528
    description: Adversaries can steal application access tokens as a means of acquiring
      credentials to access remote systems and resources.
    title: Steal Application Access Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1528
    exact_mappings:
    - attack:T1528
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1528
  T1529:
    name: T1529
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1529
    annotations:
      attack-id:
        tag: attack-id
        value: T1529
    description: 'Adversaries may shutdown/reboot systems to interrupt access to,
      or aid in the destruction of, those systems. Operating systems may contain commands
      to initiate a shutdown/reboot of a machine or network device. In some cases,
      these commands may also be used to initiate a shutdown/reboot of a remote computer
      or network device via [Network Device CLI](https://attack.mitre.org/techniques/T1059/008)
      (e.g. <code>reload</code>).(Citation: Microsoft Shutdown Oct 2017)(Citation:
      alert_TA18_106A)'
    title: System Shutdown/Reboot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1529
    exact_mappings:
    - attack:T1529
    is_a: ImpactTechnique
    class_uri: d3f:T1529
  T1530:
    name: T1530
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1530
    annotations:
      attack-id:
        tag: attack-id
        value: T1530
    description: Adversaries may access data from cloud storage.
    title: Data from Cloud Storage
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1530
    exact_mappings:
    - attack:T1530
    is_a: CollectionTechnique
    class_uri: d3f:T1530
  T1531:
    name: T1531
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1531
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1531
    description: 'Adversaries may interrupt availability of system and network resources
      by inhibiting access to accounts utilized by legitimate users. Accounts may
      be deleted, locked, or manipulated (ex: changed credentials) to remove access
      to accounts. Adversaries may also subsequently log off and/or perform a [System
      Shutdown/Reboot](https://attack.mitre.org/techniques/T1529) to set malicious
      changes into place.(Citation: CarbonBlack LockerGoga 2019)(Citation: Unit42
      LockerGoga 2019)'
    title: Account Access Removal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1531
    exact_mappings:
    - attack:T1531
    is_a: ImpactTechnique
    class_uri: d3f:T1531
  T1532:
    name: T1532
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1532
    annotations:
      attack-id:
        tag: attack-id
        value: T1532
    description: Adversaries may compress and/or encrypt data that is collected prior
      to exfiltration. Compressing data can help to obfuscate its contents and minimize
      use of network resources. Encryption can be used to hide information that is
      being exfiltrated from detection or make exfiltration less conspicuous upon
      inspection by a defender.
    title: Archive Collected Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1532
    exact_mappings:
    - attack:T1532
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1532
  T1533:
    name: T1533
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1533
    annotations:
      attack-id:
        tag: attack-id
        value: T1533
    description: Adversaries may search local system sources, such as file systems
      or local databases, to find files of interest and sensitive data prior to exfiltration.
    title: Data from Local System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1533
    exact_mappings:
    - attack:T1533
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1533
  T1534:
    name: T1534
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1534
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1534
    description: 'After they already have access to accounts or systems within the
      environment, adversaries may use internal spearphishing to gain access to additional
      information or compromise other users within the same organization. Internal
      spearphishing is multi-staged campaign where a legitimate account is initially
      compromised either by controlling the user''s device or by compromising the
      account credentials of the user. Adversaries may then attempt to take advantage
      of the trusted internal account to increase the likelihood of tricking more
      victims into falling for phish attempts, often incorporating [Impersonation](https://attack.mitre.org/techniques/T1656).(Citation:
      Trend Micro - Int SP)'
    title: Internal Spearphishing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1534
    exact_mappings:
    - attack:T1534
    is_a: LateralMovementTechnique
    class_uri: d3f:T1534
  T1535:
    name: T1535
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1535
    annotations:
      attack-id:
        tag: attack-id
        value: T1535
    description: Adversaries may create cloud instances in unused geographic service
      regions in order to evade detection. Access is usually obtained through compromising
      accounts used to manage cloud infrastructure.
    title: Unused/Unsupported Cloud Regions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1535
    exact_mappings:
    - attack:T1535
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1535
  T1536:
    name: T1536
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1536
    annotations:
      attack-id:
        tag: attack-id
        value: T1536
    description: An adversary may revert changes made to a cloud instance after they
      have performed malicious activities in attempt to evade detection and remove
      evidence of their presence. In highly virtualized environments, such as cloud-based
      infrastructure, this may be accomplished by restoring virtual machine (VM) or
      data storage snapshots through the cloud management dashboard or cloud APIs.
    title: Revert Cloud Instance
    comments:
    - This technique has been revoked by T1578.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1578.004
    mappings:
    - d3f:T1536
    exact_mappings:
    - attack:T1536
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1536
  T1537:
    name: T1537
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1537
    annotations:
      attack-id:
        tag: attack-id
        value: T1537
    description: Adversaries may exfiltrate data by transferring the data, including
      through sharing/syncing and creating backups of cloud environments, to another
      cloud account they control on the same service.
    title: Transfer Data to Cloud Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1537
    exact_mappings:
    - attack:T1537
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1537
  T1538:
    name: T1538
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1538
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1538
    description: 'An adversary may use a cloud service dashboard GUI with stolen credentials
      to gain useful information from an operational cloud environment, such as specific
      services, resources, and features. For example, the GCP Command Center can be
      used to view all assets, findings of potential security risks, and to run additional
      queries, such as finding public IP addresses and open ports.(Citation: Google
      Command Center Dashboard)'
    title: Cloud Service Dashboard
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1538
    exact_mappings:
    - attack:T1538
    is_a: DiscoveryTechnique
    class_uri: d3f:T1538
  T1539:
    name: T1539
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1539
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1539
    description: An adversary may steal web application or service session cookies
      and use them to gain access to web applications or Internet services as an authenticated
      user without needing credentials. Web applications and services often use session
      cookies as an authentication token after a user has authenticated to a website.
    title: Steal Web Session Cookie
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1539
    exact_mappings:
    - attack:T1539
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1539
  T1540:
    name: T1540
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1540
    annotations:
      attack-id:
        tag: attack-id
        value: T1540
    description: Adversaries may use code injection attacks to implant arbitrary code
      into the address space of a running application. Code is then executed or interpreted
      by that application. Adversaries utilizing this technique may exploit capabilities
      to load code in at runtime through dynamic libraries.
    title: Code Injection
    comments:
    - This technique has been revoked by T1631.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1631.001
    mappings:
    - d3f:T1540
    exact_mappings:
    - attack:T1540
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    - ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1540
  T1541:
    name: T1541
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1541
    annotations:
      attack-id:
        tag: attack-id
        value: T1541
    description: "Adversaries may abuse Android's `startForeground()` API method to\
      \ maintain continuous sensor access. Beginning in Android 9, idle applications\
      \ running in the background no longer have access to device sensors, such as\
      \ the camera, microphone, and gyroscope.(Citation: Android-SensorsOverview)\
      \ Applications can retain sensor access by running in the foreground, using\
      \ Android\u2019s `startForeground()` API method. This informs the system that\
      \ the user is actively interacting with the application, and it should not be\
      \ killed. The only requirement to start a foreground service is showing a persistent\
      \ notification to the user.(Citation: Android-ForegroundServices)"
    title: Foreground Persistence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1541
    exact_mappings:
    - attack:T1541
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1541
  T1542:
    name: T1542
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542
    annotations:
      attack-id:
        tag: attack-id
        value: T1542
    description: 'Adversaries may abuse Pre-OS Boot mechanisms as a way to establish
      persistence on a system. During the booting process of a computer, firmware
      and various startup services are loaded before the operating system. These programs
      control flow of execution before the operating system takes control.(Citation:
      Wikipedia Booting)'
    title: Pre-OS Boot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1542
    exact_mappings:
    - attack:T1542
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1542
  T1542_001:
    name: T1542_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1542.001
    description: 'Adversaries may modify system firmware to persist on systems.The
      BIOS (Basic Input/Output System) and The Unified Extensible Firmware Interface
      (UEFI) or Extensible Firmware Interface (EFI) are examples of system firmware
      that operate as the software interface between the operating system and hardware
      of a computer.(Citation: Wikipedia BIOS)(Citation: Wikipedia UEFI)(Citation:
      About UEFI)'
    title: System Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1542.001
    mappings:
    - d3f:T1542.001
    exact_mappings:
    - attack:T1542.001
    is_a: T1542
    class_uri: d3f:T1542.001
  T1542_002:
    name: T1542_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1542.002
    description: Adversaries may modify component firmware to persist on systems.
      Some adversaries may employ sophisticated means to compromise computer components
      and install malicious firmware that will execute adversary code outside of the
      operating system and main system firmware or BIOS. This technique may be similar
      to [System Firmware](https://attack.mitre.org/techniques/T1542/001) but conducted
      upon other system components/devices that may not have the same capability or
      level of integrity checking.
    title: Component Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1542.002
    mappings:
    - d3f:T1542.002
    exact_mappings:
    - attack:T1542.002
    is_a: T1542
    class_uri: d3f:T1542.002
  T1542_003:
    name: T1542_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1542.003
    description: Adversaries may use bootkits to persist on systems. Bootkits reside
      at a layer below the operating system and may make it difficult to perform full
      remediation unless an organization suspects one was used and can act accordingly.
    title: Bootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1542.003
    mappings:
    - d3f:T1542.003
    exact_mappings:
    - attack:T1542.003
    is_a: T1542
    class_uri: d3f:T1542.003
  T1542_004:
    name: T1542_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1542.004
    description: 'Adversaries may abuse the ROM Monitor (ROMMON) by loading an unauthorized
      firmware with adversary code to provide persistent access and manipulate device
      behavior that is difficult to detect. (Citation: Cisco Synful Knock Evolution)(Citation:
      Cisco Blog Legacy Device Attacks)'
    title: ROMMONkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1542.004
    mappings:
    - d3f:T1542.004
    exact_mappings:
    - attack:T1542.004
    is_a: T1542
    class_uri: d3f:T1542.004
  T1542_005:
    name: T1542_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1542005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1542.005
    description: Adversaries may abuse netbooting to load an unauthorized network
      device operating system from a Trivial File Transfer Protocol (TFTP) server.
      TFTP boot (netbooting) is commonly used by network administrators to load configuration-controlled
      network device images from a centralized management server. Netbooting is one
      option in the boot sequence and can be used to centralize, manage, and control
      device images.
    title: TFTP Boot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1542.005
    mappings:
    - d3f:T1542.005
    exact_mappings:
    - attack:T1542.005
    is_a: T1542
    class_uri: d3f:T1542.005
  T1543:
    name: T1543
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543
    annotations:
      attack-id:
        tag: attack-id
        value: T1543
    description: 'Adversaries may create or modify system-level processes to repeatedly
      execute malicious payloads as part of persistence. When operating systems boot
      up, they can start processes that perform background system functions. On Windows
      and Linux, these system processes are referred to as services.(Citation: TechNet
      Services) On macOS, launchd processes known as [Launch Daemon](https://attack.mitre.org/techniques/T1543/004)
      and [Launch Agent](https://attack.mitre.org/techniques/T1543/001) are run to
      finish system initialization and load user specific parameters.(Citation: AppleDocs
      Launch Agent Daemons)'
    title: Create or Modify System Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1543
    exact_mappings:
    - attack:T1543
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1543
  T1543_001:
    name: T1543_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1543.001
    description: 'Adversaries may create or modify launch agents to repeatedly execute
      malicious payloads as part of persistence. When a user logs in, a per-user launchd
      process is started which loads the parameters for each launch-on-demand user
      agent from the property list (.plist) file found in <code>/System/Library/LaunchAgents</code>,
      <code>/Library/LaunchAgents</code>, and <code>~/Library/LaunchAgents</code>.(Citation:
      AppleDocs Launch Agent Daemons)(Citation: OSX Keydnap malware) (Citation: Antiquated
      Mac Malware) Property list files use the <code>Label</code>, <code>ProgramArguments
      </code>, and <code>RunAtLoad</code> keys to identify the Launch Agent''s name,
      executable location, and execution time.(Citation: OSX.Dok Malware) Launch Agents
      are often installed to perform updates to programs, launch user specified programs
      at login, or to conduct other developer tasks.'
    title: Launch Agent
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1543.001
    mappings:
    - d3f:T1543.001
    exact_mappings:
    - attack:T1543.001
    is_a: T1543
    class_uri: d3f:T1543.001
  T1543_002:
    name: T1543_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1543.002
    description: 'Adversaries may create or modify systemd services to repeatedly
      execute malicious payloads as part of persistence. Systemd is a system and service
      manager commonly used for managing background daemon processes (also known as
      services) and other system resources.(Citation: Linux man-pages: systemd January
      2014) Systemd is the default initialization (init) system on many Linux distributions
      replacing legacy init systems, including SysVinit and Upstart, while remaining
      backwards compatible.'
    title: Systemd Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1543.002
    mappings:
    - d3f:T1543.002
    exact_mappings:
    - attack:T1543.002
    is_a: T1543
    class_uri: d3f:T1543.002
  T1543_003:
    name: T1543_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1543.003
    description: 'Adversaries may create or modify Windows services to repeatedly
      execute malicious payloads as part of persistence. When Windows boots up, it
      starts programs or applications called services that perform background system
      functions.(Citation: TechNet Services) Windows service configuration information,
      including the file path to the service''s executable or recovery programs/commands,
      is stored in the Windows Registry.'
    title: Windows Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1543.003
    mappings:
    - d3f:T1543.003
    exact_mappings:
    - attack:T1543.003
    is_a: T1543
    class_uri: d3f:T1543.003
  T1543_004:
    name: T1543_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1543.004
    description: 'Adversaries may create or modify Launch Daemons to execute malicious
      payloads as part of persistence. Launch Daemons are plist files used to interact
      with Launchd, the service management framework used by macOS. Launch Daemons
      require elevated privileges to install, are executed for every user on a system
      prior to login, and run in the background without the need for user interaction.
      During the macOS initialization startup, the launchd process loads the parameters
      for launch-on-demand system-level daemons from plist files found in <code>/System/Library/LaunchDaemons/</code>
      and <code>/Library/LaunchDaemons/</code>. Required Launch Daemons parameters
      include a <code>Label</code> to identify the task, <code>Program</code> to provide
      a path to the executable, and <code>RunAtLoad</code> to specify when the task
      is run. Launch Daemons are often used to provide access to shared resources,
      updates to software, or conduct automation tasks.(Citation: AppleDocs Launch
      Agent Daemons)(Citation: Methods of Mac Malware Persistence)(Citation: launchd
      Keywords for plists)'
    title: Launch Daemon
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1543.004
    mappings:
    - d3f:T1543.004
    exact_mappings:
    - attack:T1543.004
    is_a: T1543
    class_uri: d3f:T1543.004
  T1543_005:
    name: T1543_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1543005
    annotations:
      attack-id:
        tag: attack-id
        value: T1543.005
    description: Adversaries may create or modify container or container cluster management
      tools that run as daemons, agents, or services on individual hosts. These include
      software for creating and managing individual containers, such as Docker and
      Podman, as well as container cluster node-level agents such as kubelet. By modifying
      these services, an adversary may be able to achieve persistence or escalate
      their privileges on a host.
    title: Container Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1543.005
    mappings:
    - d3f:T1543.005
    exact_mappings:
    - attack:T1543.005
    is_a: T1543
    class_uri: d3f:T1543.005
  T1544:
    name: T1544
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1544
    annotations:
      attack-id:
        tag: attack-id
        value: T1544
    description: Adversaries may transfer tools or other files from an external system
      onto a compromised device to facilitate follow-on actions. Files may be copied
      from an external adversary-controlled system through the command and control
      channel  or through alternate protocols with another tool such as FTP.
    title: Ingress Tool Transfer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1544
    exact_mappings:
    - attack:T1544
    is_a: ATTACKMobileCommandAndControlTechnique
    class_uri: d3f:T1544
  T1546:
    name: T1546
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546
    annotations:
      attack-id:
        tag: attack-id
        value: T1546
    description: 'Adversaries may establish persistence and/or elevate privileges
      using system mechanisms that trigger execution based on specific events. Various
      operating systems have means to monitor and subscribe to events such as logons
      or other user activity such as running specific applications/binaries. Cloud
      environments may also support various functions and services that monitor and
      can be invoked in response to specific cloud events.(Citation: Backdooring an
      AWS account)(Citation: Varonis Power Automate Data Exfiltration)(Citation: Microsoft
      DART Case Report 001)'
    title: Event Triggered Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1546
    exact_mappings:
    - attack:T1546
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1546
  T1546_001:
    name: T1546_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.001
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by a file type association. When a file is opened, the default program
      used to open the file (also called the file association or handler) is checked.
      File association selections are stored in the Windows Registry and can be edited
      by users, administrators, or programs that have Registry access or by administrators
      using the built-in assoc utility.(Citation: Microsoft Change Default Programs)(Citation:
      Microsoft File Handlers)(Citation: Microsoft Assoc Oct 2017) Applications can
      modify the file association for a given file extension to call an arbitrary
      program when a file with the given extension is opened.'
    title: Change Default File Association
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.001
    mappings:
    - d3f:T1546.001
    exact_mappings:
    - attack:T1546.001
    is_a: T1546
    class_uri: d3f:T1546.001
  T1546_002:
    name: T1546_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.002
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by user inactivity. Screensavers are programs that execute after a
      configurable time of user inactivity and consist of Portable Executable (PE)
      files with a .scr file extension.(Citation: Wikipedia Screensaver) The Windows
      screensaver application scrnsave.scr is located in <code>C:\Windows\System32\</code>,
      and <code>C:\Windows\sysWOW64\</code>  on 64-bit Windows systems, along with
      screensavers included with base Windows installations.'
    title: Screensaver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.002
    mappings:
    - d3f:T1546.002
    exact_mappings:
    - attack:T1546.002
    is_a: T1546
    class_uri: d3f:T1546.002
  T1546_003:
    name: T1546_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.003
    description: 'Adversaries may establish persistence and elevate privileges by
      executing malicious content triggered by a Windows Management Instrumentation
      (WMI) event subscription. WMI can be used to install event filters, providers,
      consumers, and bindings that execute code when a defined event occurs. Examples
      of events that may be subscribed to are the wall clock time, user login, or
      the computer''s uptime.(Citation: Mandiant M-Trends 2015)'
    title: Windows Management Instrumentation Event Subscription
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.003
    mappings:
    - d3f:T1546.003
    exact_mappings:
    - attack:T1546.003
    is_a: T1546
    class_uri: d3f:T1546.003
  T1546_004:
    name: T1546_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.004
    description: "Adversaries may establish persistence through executing malicious\
      \ commands triggered by a user\u2019s shell. User [Unix Shell](https://attack.mitre.org/techniques/T1059/004)s\
      \ execute several configuration scripts at different points throughout the session\
      \ based on events. For example, when a user opens a command-line interface or\
      \ remotely logs in (such as via SSH) a login shell is initiated. The login shell\
      \ executes scripts from the system (<code>/etc</code>) and the user\u2019s home\
      \ directory (<code>~/</code>) to configure the environment. All login shells\
      \ on a system use /etc/profile when initiated. These configuration scripts run\
      \ at the permission level of their directory and are often used to set environment\
      \ variables, create aliases, and customize the user\u2019s environment. When\
      \ the shell exits or terminates, additional shell scripts are executed to ensure\
      \ the shell exits appropriately."
    title: Unix Shell Configuration Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.004
    mappings:
    - d3f:T1546.004
    exact_mappings:
    - attack:T1546.004
    is_a: T1546
    class_uri: d3f:T1546.004
  T1546_005:
    name: T1546_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.005
    description: Adversaries may establish persistence by executing malicious content
      triggered by an interrupt signal. The <code>trap</code> command allows programs
      and shells to specify commands that will be executed upon receiving interrupt
      signals. A common situation is a script allowing for graceful termination and
      handling of common keyboard interrupts like <code>ctrl+c</code> and <code>ctrl+d</code>.
    title: Trap
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.005
    mappings:
    - d3f:T1546.005
    exact_mappings:
    - attack:T1546.005
    is_a: T1546
    class_uri: d3f:T1546.005
  T1546_006:
    name: T1546_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.006
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by the execution of tainted binaries. Mach-O binaries have a series
      of headers that are used to perform certain operations when a binary is loaded.
      The LC_LOAD_DYLIB header in a Mach-O binary tells macOS and OS X which dynamic
      libraries (dylibs) to load during execution time. These can be added ad-hoc
      to the compiled binary as long as adjustments are made to the rest of the fields
      and dependencies.(Citation: Writing Bad Malware for OSX) There are tools available
      to perform these changes.'
    title: LC_LOAD_DYLIB Addition
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.006
    mappings:
    - d3f:T1546.006
    exact_mappings:
    - attack:T1546.006
    is_a: T1546
    class_uri: d3f:T1546.006
  T1546_007:
    name: T1546_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.007
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by Netsh Helper DLLs. Netsh.exe (also referred to as Netshell) is
      a command-line scripting utility used to interact with the network configuration
      of a system. It contains functionality to add helper DLLs for extending functionality
      of the utility.(Citation: TechNet Netsh) The paths to registered netsh.exe helper
      DLLs are entered into the Windows Registry at <code>HKLM\SOFTWARE\Microsoft\Netsh</code>.'
    title: Netsh Helper DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.007
    mappings:
    - d3f:T1546.007
    exact_mappings:
    - attack:T1546.007
    is_a: T1546
    class_uri: d3f:T1546.007
  T1546_008:
    name: T1546_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.008
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by accessibility features. Windows
      contains accessibility features that may be launched with a key combination
      before a user has logged in (ex: when the user is on the Windows logon screen).
      An adversary can modify the way these programs are launched to get a command
      prompt or backdoor without logging in to the system.'
    title: Accessibility Features
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.008
    mappings:
    - d3f:T1546.008
    exact_mappings:
    - attack:T1546.008
    is_a: T1546
    class_uri: d3f:T1546.008
  T1546_009:
    name: T1546_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.009
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by AppCert DLLs loaded into processes.
      Dynamic-link libraries (DLLs) that are specified in the <code>AppCertDLLs</code>
      Registry key under <code>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session
      Manager\</code> are loaded into every process that calls the ubiquitously used
      application programming interface (API) functions <code>CreateProcess</code>,
      <code>CreateProcessAsUser</code>, <code>CreateProcessWithLoginW</code>, <code>CreateProcessWithTokenW</code>,
      or <code>WinExec</code>. (Citation: Elastic Process Injection July 2017)'
    title: AppCert DLLs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.009
    mappings:
    - d3f:T1546.009
    exact_mappings:
    - attack:T1546.009
    is_a: T1546
    class_uri: d3f:T1546.009
  T1546_010:
    name: T1546_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.010
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by AppInit DLLs loaded into processes.
      Dynamic-link libraries (DLLs) that are specified in the <code>AppInit_DLLs</code>
      value in the Registry keys <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows
      NT\CurrentVersion\Windows</code> or <code>HKEY_LOCAL_MACHINE\Software\Wow6432Node\Microsoft\Windows
      NT\CurrentVersion\Windows</code> are loaded by user32.dll into every process
      that loads user32.dll. In practice this is nearly every program, since user32.dll
      is a very common library. (Citation: Elastic Process Injection July 2017)'
    title: AppInit DLLs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.010
    mappings:
    - d3f:T1546.010
    exact_mappings:
    - attack:T1546.010
    is_a: T1546
    class_uri: d3f:T1546.010
  T1546_011:
    name: T1546_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.011
    description: 'Adversaries may establish persistence and/or elevate privileges
      by executing malicious content triggered by application shims. The Microsoft
      Windows Application Compatibility Infrastructure/Framework (Application Shim)
      was created to allow for backward compatibility of software as the operating
      system codebase changes over time. For example, the application shimming feature
      allows developers to apply fixes to applications (without rewriting code) that
      were created for Windows XP so that it will work with Windows 10. (Citation:
      Elastic Process Injection July 2017)'
    title: Application Shimming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.011
    mappings:
    - d3f:T1546.011
    exact_mappings:
    - attack:T1546.011
    is_a: T1546
    class_uri: d3f:T1546.011
  T1546_012:
    name: T1546_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546012
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.012
    description: "Adversaries may establish persistence and/or elevate privileges\
      \ by executing malicious content triggered by Image File Execution Options (IFEO)\
      \ debuggers. IFEOs enable a developer to attach a debugger to an application.\
      \ When a process is created, a debugger present in an application\u2019s IFEO\
      \ will be prepended to the application\u2019s name, effectively launching the\
      \ new process under the debugger (e.g., <code>C:\\dbg\\ntsd.exe -g  notepad.exe</code>).\
      \ (Citation: Microsoft Dev Blog IFEO Mar 2010)"
    title: Image File Execution Options Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.012
    mappings:
    - d3f:T1546.012
    exact_mappings:
    - attack:T1546.012
    is_a: T1546
    class_uri: d3f:T1546.012
  T1546_013:
    name: T1546_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546013
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.013
    description: Adversaries may gain persistence and elevate privileges by executing
      malicious content triggered by PowerShell profiles. A PowerShell profile  (<code>profile.ps1</code>)
      is a script that runs when [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      starts and can be used as a logon script to customize user environments.
    title: PowerShell Profile
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.013
    mappings:
    - d3f:T1546.013
    exact_mappings:
    - attack:T1546.013
    is_a: T1546
    class_uri: d3f:T1546.013
  T1546_014:
    name: T1546_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546014
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.014
    description: Adversaries may gain persistence and elevate privileges by executing
      malicious content triggered by the Event Monitor Daemon (emond). Emond is a
      [Launch Daemon](https://attack.mitre.org/techniques/T1543/004) that accepts
      events from various services, runs them through a simple rules engine, and takes
      action. The emond binary at <code>/sbin/emond</code> will load any rules from
      the <code>/etc/emond.d/rules/</code> directory and take action once an explicitly
      defined event takes place.
    title: Emond
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.014
    mappings:
    - d3f:T1546.014
    exact_mappings:
    - attack:T1546.014
    is_a: T1546
    class_uri: d3f:T1546.014
  T1546_015:
    name: T1546_015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546015
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1546.015
    description: 'Adversaries may establish persistence by executing malicious content
      triggered by hijacked references to Component Object Model (COM) objects. COM
      is a system within Windows to enable interaction between software components
      through the operating system.(Citation: Microsoft Component Object Model)  References
      to various COM objects are stored in the Registry.'
    title: Component Object Model Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Component_Object_Model
    aliases:
    - T1546.015
    mappings:
    - d3f:T1546.015
    exact_mappings:
    - attack:T1546.015
    is_a: T1546
    class_uri: d3f:T1546.015
  T1546_016:
    name: T1546_016
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546016
    annotations:
      attack-id:
        tag: attack-id
        value: T1546.016
    description: 'Adversaries may establish persistence and elevate privileges by
      using an installer to trigger the execution of malicious content. Installer
      packages are OS specific and contain the resources an operating system needs
      to install applications on a system. Installer packages can include scripts
      that run prior to installation as well as after installation is complete. Installer
      scripts may inherit elevated permissions when executed. Developers often use
      these scripts to prepare the environment for installation, check requirements,
      download dependencies, and remove files after installation.(Citation: Installer
      Package Scripting Rich Trouton)'
    title: Installer Packages
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.016
    mappings:
    - d3f:T1546.016
    exact_mappings:
    - attack:T1546.016
    is_a: T1546
    class_uri: d3f:T1546.016
  T1546_017:
    name: T1546_017
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546017
    annotations:
      attack-id:
        tag: attack-id
        value: T1546.017
    description: 'Adversaries may maintain persistence through executing malicious
      content triggered using udev rules. Udev is the Linux kernel device manager
      that dynamically manages device nodes, handles access to pseudo-device files
      in the `/dev` directory, and responds to hardware events, such as when external
      devices like hard drives or keyboards are plugged in or removed. Udev uses rule
      files with `match keys` to specify the conditions a hardware event must meet
      and `action keys` to define the actions that should follow. Root permissions
      are required to create, modify, or delete rule files located in `/etc/udev/rules.d/`,
      `/run/udev/rules.d/`, `/usr/lib/udev/rules.d/`, `/usr/local/lib/udev/rules.d/`,
      and `/lib/udev/rules.d/`. Rule priority is determined by both directory and
      by the digit prefix in the rule filename.(Citation: Ignacio Udev research 2024)(Citation:
      Elastic Linux Persistence 2024)'
    title: Udev Rules
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.017
    mappings:
    - d3f:T1546.017
    exact_mappings:
    - attack:T1546.017
    is_a: T1546
    class_uri: d3f:T1546.017
  T1546_018:
    name: T1546_018
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1546018
    annotations:
      attack-id:
        tag: attack-id
        value: T1546.018
    description: "Adversaries may achieve persistence by leveraging Python\u2019s\
      \ startup mechanisms, including path configuration (`.pth`) files and the `sitecustomize.py`\
      \ or `usercustomize.py` modules. These files are automatically processed during\
      \ the initialization of the Python interpreter, allowing for the execution of\
      \ arbitrary code whenever Python is invoked.(Citation: Volexity GlobalProtect\
      \ CVE 2024)"
    title: Python Startup Hooks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1546.018
    mappings:
    - d3f:T1546.018
    exact_mappings:
    - attack:T1546.018
    is_a: T1546
    class_uri: d3f:T1546.018
  T1547:
    name: T1547
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547
    annotations:
      attack-id:
        tag: attack-id
        value: T1547
    description: 'Adversaries may configure system settings to automatically execute
      a program during system boot or logon to maintain persistence or gain higher-level
      privileges on compromised systems. Operating systems may have mechanisms for
      automatically running a program on system boot or account logon.(Citation: Microsoft
      Run Key)(Citation: MSDN Authentication Packages)(Citation: Microsoft TimeProvider)(Citation:
      Cylance Reg Persistence Sept 2013)(Citation: Linux Kernel Programming) These
      mechanisms may include automatically executing programs that are placed in specially
      designated directories or are referenced by repositories that store configuration
      information, such as the Windows Registry. An adversary may achieve the same
      goal by modifying or extending features of the kernel.'
    title: Boot or Logon Autostart Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1547
    exact_mappings:
    - attack:T1547
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1547
  T1547_001:
    name: T1547_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.001
    description: 'Adversaries may achieve persistence by adding a program to a startup
      folder or referencing it with a Registry run key. Adding an entry to the "run
      keys" in the Registry or startup folder will cause the program referenced to
      be executed when a user logs in.(Citation: Microsoft Run Key) These programs
      will be executed under the context of the user and will have the account''s
      associated permissions level.'
    title: Registry Run Keys / Startup Folder
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.001
    mappings:
    - d3f:T1547.001
    exact_mappings:
    - attack:T1547.001
    is_a: T1547
    class_uri: d3f:T1547.001
  T1547_002:
    name: T1547_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.002
    description: 'Adversaries may abuse authentication packages to execute DLLs when
      the system boots. Windows authentication package DLLs are loaded by the Local
      Security Authority (LSA) process at system start. They provide support for multiple
      logon processes and multiple security protocols to the operating system.(Citation:
      MSDN Authentication Packages)'
    title: Authentication Package
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.002
    mappings:
    - d3f:T1547.002
    exact_mappings:
    - attack:T1547.002
    is_a: T1547
    class_uri: d3f:T1547.002
  T1547_003:
    name: T1547_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.003
    description: 'Adversaries may abuse time providers to execute DLLs when the system
      boots. The Windows Time service (W32Time) enables time synchronization across
      and within domains.(Citation: Microsoft W32Time Feb 2018) W32Time time providers
      are responsible for retrieving time stamps from hardware/network resources and
      outputting these values to other network clients.(Citation: Microsoft TimeProvider)'
    title: Time Providers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.003
    mappings:
    - d3f:T1547.003
    exact_mappings:
    - attack:T1547.003
    is_a: T1547
    class_uri: d3f:T1547.003
  T1547_004:
    name: T1547_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.004
    description: 'Adversaries may abuse features of Winlogon to execute DLLs and/or
      executables when a user logs in. Winlogon.exe is a Windows component responsible
      for actions at logon/logoff as well as the secure attention sequence (SAS) triggered
      by Ctrl-Alt-Delete. Registry entries in <code>HKLM\Software[\\Wow6432Node\\]\Microsoft\Windows
      NT\CurrentVersion\Winlogon\</code> and <code>HKCU\Software\Microsoft\Windows
      NT\CurrentVersion\Winlogon\</code> are used to manage additional helper programs
      and functionalities that support Winlogon.(Citation: Cylance Reg Persistence
      Sept 2013)'
    title: Winlogon Helper DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.004
    mappings:
    - d3f:T1547.004
    exact_mappings:
    - attack:T1547.004
    is_a: T1547
    class_uri: d3f:T1547.004
  T1547_005:
    name: T1547_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.005
    description: Adversaries may abuse security support providers (SSPs) to execute
      DLLs when the system boots. Windows SSP DLLs are loaded into the Local Security
      Authority (LSA) process at system start. Once loaded into the LSA, SSP DLLs
      have access to encrypted and plaintext passwords that are stored in Windows,
      such as any logged-on user's Domain password or smart card PINs.
    title: Security Support Provider
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.005
    mappings:
    - d3f:T1547.005
    exact_mappings:
    - attack:T1547.005
    is_a: T1547
    class_uri: d3f:T1547.005
  T1547_006:
    name: T1547_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.006
    description: 'Adversaries may modify the kernel to automatically execute programs
      on system boot. Loadable Kernel Modules (LKMs) are pieces of code that can be
      loaded and unloaded into the kernel upon demand. They extend the functionality
      of the kernel without the need to reboot the system. For example, one type of
      module is the device driver, which allows the kernel to access hardware connected
      to the system.(Citation: Linux Kernel Programming)'
    title: Kernel Modules and Extensions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.006
    mappings:
    - d3f:T1547.006
    exact_mappings:
    - attack:T1547.006
    is_a: T1547
    class_uri: d3f:T1547.006
  T1547_007:
    name: T1547_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.007
    description: "Adversaries may modify plist files to automatically run an application\
      \ when a user logs in. When a user logs out or restarts via the macOS Graphical\
      \ User Interface (GUI), a prompt is provided to the user with a checkbox to\
      \ \"Reopen windows when logging back in\".(Citation: Re-Open windows on Mac)\
      \ When selected, all applications currently open are added to a property list\
      \ file named <code>com.apple.loginwindow.[UUID].plist</code> within the <code>~/Library/Preferences/ByHost</code>\
      \ directory.(Citation: Methods of Mac Malware Persistence)(Citation: Wardle\
      \ Persistence Chapter) Applications listed in this file are automatically reopened\
      \ upon the user\u2019s next logon."
    title: Re-opened Applications
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.007
    mappings:
    - d3f:T1547.007
    exact_mappings:
    - attack:T1547.007
    is_a: T1547
    class_uri: d3f:T1547.007
  T1547_008:
    name: T1547_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.008
    description: 'Adversaries may modify or add LSASS drivers to obtain persistence
      on compromised systems. The Windows security subsystem is a set of components
      that manage and enforce the security policy for a computer or domain. The Local
      Security Authority (LSA) is the main component responsible for local security
      policy and user authentication. The LSA includes multiple dynamic link libraries
      (DLLs) associated with various other security functions, all of which run in
      the context of the LSA Subsystem Service (LSASS) lsass.exe process.(Citation:
      Microsoft Security Subsystem)'
    title: LSASS Driver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.008
    mappings:
    - d3f:T1547.008
    exact_mappings:
    - attack:T1547.008
    is_a: T1547
    class_uri: d3f:T1547.008
  T1547_009:
    name: T1547_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.009
    description: Adversaries may create or modify shortcuts that can execute a program
      during system boot or user login. Shortcuts or symbolic links are used to reference
      other files or programs that will be opened or executed when the shortcut is
      clicked or executed by a system startup process.
    title: Shortcut Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.009
    mappings:
    - d3f:T1547.009
    exact_mappings:
    - attack:T1547.009
    is_a: T1547
    class_uri: d3f:T1547.009
  T1547_010:
    name: T1547_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.010
    description: 'Adversaries may use port monitors to run an adversary supplied DLL
      during system boot for persistence or privilege escalation. A port monitor can
      be set through the <code>AddMonitor</code> API call to set a DLL to be loaded
      at startup.(Citation: AddMonitor) This DLL can be located in <code>C:\Windows\System32</code>
      and will be loaded and run by the print spooler service, `spoolsv.exe`, under
      SYSTEM level permissions on boot.(Citation: Bloxham)'
    title: Port Monitors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.010
    mappings:
    - d3f:T1547.010
    exact_mappings:
    - attack:T1547.010
    is_a: T1547
    class_uri: d3f:T1547.010
  T1547_011:
    name: T1547_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.011
    description: 'Adversaries can modify property list files (plist files) to execute
      their code as part of establishing persistence. Plist files are used by macOS
      applications to store properties and configuration settings for applications
      and services. Applications use information plist files, <code>Info.plist</code>,
      to tell the operating system how to handle the application at runtime using
      structured metadata in the form of keys and values. Plist files are formatted
      in XML and based on Apple''s Core Foundation DTD and can be saved in text or
      binary format.(Citation: fileinfo plist file description)'
    title: Plist Modification
    comments:
    - This technique has been revoked by T1647
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1647
    aliases:
    - T1547.011
    mappings:
    - d3f:T1547.011
    exact_mappings:
    - attack:T1547.011
    is_a: T1547
    class_uri: d3f:T1547.011
  T1547_012:
    name: T1547_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547012
    annotations:
      attack-id:
        tag: attack-id
        value: T1547.012
    description: 'Adversaries may abuse print processors to run malicious DLLs during
      system boot for persistence and/or privilege escalation. Print processors are
      DLLs that are loaded by the print spooler service, `spoolsv.exe`, during boot.(Citation:
      Microsoft Intro Print Processors)'
    title: Print Processors
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.012
    mappings:
    - d3f:T1547.012
    exact_mappings:
    - attack:T1547.012
    is_a: T1547
    class_uri: d3f:T1547.012
  T1547_013:
    name: T1547_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547013
    annotations:
      attack-id:
        tag: attack-id
        value: T1547.013
    description: "Adversaries may add or modify XDG Autostart Entries to execute malicious\
      \ programs or commands when a user\u2019s desktop environment is loaded at login.\
      \ XDG Autostart entries are available for any XDG-compliant Linux system. XDG\
      \ Autostart entries use Desktop Entry files (`.desktop`) to configure the user\u2019\
      s desktop environment upon user login. These configuration files determine what\
      \ applications launch upon user login, define associated applications to open\
      \ specific file types, and define applications used to open removable media.(Citation:\
      \ Free Desktop Application Autostart Feb 2006)(Citation: Free Desktop Entry\
      \ Keys)"
    title: XDG Autostart Entries
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.013
    mappings:
    - d3f:T1547.013
    exact_mappings:
    - attack:T1547.013
    is_a: T1547
    class_uri: d3f:T1547.013
  T1547_014:
    name: T1547_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547014
    annotations:
      attack-id:
        tag: attack-id
        value: T1547.014
    description: 'Adversaries may achieve persistence by adding a Registry key to
      the Active Setup of the local machine. Active Setup is a Windows mechanism that
      is used to execute programs when a user logs in. The value stored in the Registry
      key will be executed after a user logs into the computer.(Citation: Klein Active
      Setup 2010) These programs will be executed under the context of the user and
      will have the account''s associated permissions level.'
    title: Active Setup
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.014
    mappings:
    - d3f:T1547.014
    exact_mappings:
    - attack:T1547.014
    is_a: T1547
    class_uri: d3f:T1547.014
  T1547_015:
    name: T1547_015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1547015
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1547.015
    description: 'Adversaries may add login items to execute upon user login to gain
      persistence or escalate privileges. Login items are applications, documents,
      folders, or server connections that are automatically launched when a user logs
      in.(Citation: Open Login Items Apple) Login items can be added via a shared
      file list or Service Management Framework.(Citation: Adding Login Items) Shared
      file list login items can be set using scripting languages such as [AppleScript](https://attack.mitre.org/techniques/T1059/002),
      whereas the Service Management Framework uses the API call <code>SMLoginItemSetEnabled</code>.'
    title: Login Items
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1547.015
    mappings:
    - d3f:T1547.015
    exact_mappings:
    - attack:T1547.015
    is_a: T1547
    class_uri: d3f:T1547.015
  T1548:
    name: T1548
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548
    annotations:
      attack-id:
        tag: attack-id
        value: T1548
    description: 'Adversaries may circumvent mechanisms designed to control elevate
      privileges to gain higher-level permissions. Most modern systems contain native
      elevation control mechanisms that are intended to limit privileges that a user
      can perform on a machine. Authorization has to be granted to specific users
      in order to perform tasks that can be considered of higher risk.(Citation: TechNet
      How UAC Works)(Citation: sudo man page 2018) An adversary can perform several
      methods to take advantage of built-in control mechanisms in order to escalate
      privileges on a system.(Citation: OSX Keydnap malware)(Citation: Fortinet Fareit)'
    title: Abuse Elevation Control Mechanism
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1548
    exact_mappings:
    - attack:T1548
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1548
  T1548_001:
    name: T1548_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1548.001
    description: "An adversary may abuse configurations where an application has the\
      \ setuid or setgid bits set in order to get code running in a different (and\
      \ possibly more privileged) user\u2019s context. On Linux or macOS, when the\
      \ setuid or setgid bits are set for an application binary, the application will\
      \ run with the privileges of the owning user or group respectively.(Citation:\
      \ setuid man page) Normally an application is run in the current user\u2019\
      s context, regardless of which user or group owns the application. However,\
      \ there are instances where programs need to be executed in an elevated context\
      \ to function properly, but the user running them may not have the specific\
      \ required privileges."
    title: Setuid and Setgid
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.001
    mappings:
    - d3f:T1548.001
    exact_mappings:
    - attack:T1548.001
    is_a: T1548
    class_uri: d3f:T1548.001
  T1548_002:
    name: T1548_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1548.002
    description: 'Adversaries may bypass UAC mechanisms to elevate process privileges
      on system. Windows User Account Control (UAC) allows a program to elevate its
      privileges (tracked as integrity levels ranging from low to high) to perform
      a task under administrator-level permissions, possibly by prompting the user
      for confirmation. The impact to the user ranges from denying the operation under
      high enforcement to allowing the user to perform the action if they are in the
      local administrators group and click through the prompt or allowing them to
      enter an administrator password to complete the action.(Citation: TechNet How
      UAC Works)'
    title: Bypass User Account Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.002
    mappings:
    - d3f:T1548.002
    exact_mappings:
    - attack:T1548.002
    is_a: T1548
    class_uri: d3f:T1548.002
  T1548_003:
    name: T1548_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1548.003
    description: Adversaries may perform sudo caching and/or use the sudoers file
      to elevate privileges. Adversaries may do this to execute commands as other
      users or spawn processes with higher privileges.
    title: Sudo and Sudo Caching
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.003
    mappings:
    - d3f:T1548.003
    exact_mappings:
    - attack:T1548.003
    is_a: T1548
    class_uri: d3f:T1548.003
  T1548_004:
    name: T1548_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1548.004
    description: 'Adversaries may leverage the <code>AuthorizationExecuteWithPrivileges</code>
      API to escalate privileges by prompting the user for credentials.(Citation:
      AppleDocs AuthorizationExecuteWithPrivileges) The purpose of this API is to
      give application developers an easy way to perform operations with root privileges,
      such as for application installation or updating. This API does not validate
      that the program requesting root privileges comes from a reputable source or
      has been maliciously modified.'
    title: Elevated Execution with Prompt
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.004
    mappings:
    - d3f:T1548.004
    exact_mappings:
    - attack:T1548.004
    is_a: T1548
    class_uri: d3f:T1548.004
  T1548_005:
    name: T1548_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548005
    annotations:
      attack-id:
        tag: attack-id
        value: T1548.005
    description: Adversaries may abuse permission configurations that allow them to
      gain temporarily elevated access to cloud resources. Many cloud environments
      allow administrators to grant user or service accounts permission to request
      just-in-time access to roles, impersonate other accounts, pass roles onto resources
      and services, or otherwise gain short-term access to a set of privileges that
      may be distinct from their own.
    title: Temporary Elevated Cloud Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.005
    mappings:
    - d3f:T1548.005
    exact_mappings:
    - attack:T1548.005
    is_a: T1548
    class_uri: d3f:T1548.005
  T1548_006:
    name: T1548_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1548006
    annotations:
      attack-id:
        tag: attack-id
        value: T1548.006
    description: Adversaries can manipulate or abuse the Transparency, Consent, &
      Control (TCC) service or database to execute malicious applications with elevated
      permissions. TCC is a Privacy & Security macOS control mechanism used to determine
      if the running process has permission to access the data or services protected
      by TCC, such as screen sharing, camera, microphone, or Full Disk Access (FDA).
    title: TCC Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1548.006
    mappings:
    - d3f:T1548.006
    exact_mappings:
    - attack:T1548.006
    is_a: T1548
    class_uri: d3f:T1548.006
  T1550:
    name: T1550
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1550
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1550
    description: Adversaries may use alternate authentication material, such as password
      hashes, Kerberos tickets, and application access tokens, in order to move laterally
      within an environment and bypass normal system access controls.
    title: Use Alternate Authentication Material
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1550
    exact_mappings:
    - attack:T1550
    is_a: DefenseEvasionTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1550
  T1550_001:
    name: T1550_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1550001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1550.001
    description: Adversaries may use stolen application access tokens to bypass the
      typical authentication process and access restricted accounts, information,
      or services on remote systems. These tokens are typically stolen from users
      or services and used in lieu of login credentials.
    title: Application Access Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1550.001
    mappings:
    - d3f:T1550.001
    exact_mappings:
    - attack:T1550.001
    is_a: T1550
    class_uri: d3f:T1550.001
  T1550_002:
    name: T1550_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1550002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1550.002
    description: "Adversaries may \u201Cpass the hash\u201D using stolen password\
      \ hashes to move laterally within an environment, bypassing normal system access\
      \ controls. Pass the hash (PtH) is a method of authenticating as a user without\
      \ having access to the user's cleartext password. This method bypasses standard\
      \ authentication steps that require a cleartext password, moving directly into\
      \ the portion of the authentication that uses the password hash."
    title: Pass the Hash
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1550.002
    mappings:
    - d3f:T1550.002
    exact_mappings:
    - attack:T1550.002
    is_a: T1550
    class_uri: d3f:T1550.002
  T1550_003:
    name: T1550_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1550003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1550.003
    description: "Adversaries may \u201Cpass the ticket\u201D using stolen Kerberos\
      \ tickets to move laterally within an environment, bypassing normal system access\
      \ controls. Pass the ticket (PtT) is a method of authenticating to a system\
      \ using Kerberos tickets without having access to an account's password. Kerberos\
      \ authentication can be used as the first step to lateral movement to a remote\
      \ system."
    title: Pass the Ticket
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1550.003
    mappings:
    - d3f:T1550.003
    exact_mappings:
    - attack:T1550.003
    is_a: T1550
    class_uri: d3f:T1550.003
  T1550_004:
    name: T1550_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1550004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1550.004
    description: 'Adversaries can use stolen session cookies to authenticate to web
      applications and services. This technique bypasses some multi-factor authentication
      protocols since the session is already authenticated.(Citation: Pass The Cookie)'
    title: Web Session Cookie
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1550.004
    mappings:
    - d3f:T1550.004
    exact_mappings:
    - attack:T1550.004
    is_a: T1550
    class_uri: d3f:T1550.004
  T1552:
    name: T1552
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552
    description: 'Adversaries may search compromised systems to find and obtain insecurely
      stored credentials. These credentials can be stored and/or misplaced in many
      locations on a system, including plaintext files (e.g. [Bash History](https://attack.mitre.org/techniques/T1552/003)),
      operating system or application-specific repositories (e.g. [Credentials in
      Registry](https://attack.mitre.org/techniques/T1552/002)),  or other specialized
      files/artifacts (e.g. [Private Keys](https://attack.mitre.org/techniques/T1552/004)).(Citation:
      Brining MimiKatz to Unix)'
    title: Unsecured Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1552
    exact_mappings:
    - attack:T1552
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1552
  T1552_001:
    name: T1552_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.001
    description: Adversaries may search local file systems and remote file shares
      for files containing insecurely stored credentials. These can be files created
      by users to store their own credentials, shared credential stores for a group
      of individuals, configuration files containing passwords for a system or service,
      or source code/binary files containing embedded passwords.
    title: Credentials In Files
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.001
    mappings:
    - d3f:T1552.001
    exact_mappings:
    - attack:T1552.001
    is_a: T1552
    class_uri: d3f:T1552.001
  T1552_002:
    name: T1552_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.002
    description: Adversaries may search the Registry on compromised systems for insecurely
      stored credentials. The Windows Registry stores configuration information that
      can be used by the system or other programs. Adversaries may query the Registry
      looking for credentials and passwords that have been stored for use by other
      programs or services. Sometimes these credentials are used for automatic logons.
    title: Credentials in Registry
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.002
    mappings:
    - d3f:T1552.002
    exact_mappings:
    - attack:T1552.002
    is_a: T1552
    class_uri: d3f:T1552.002
  T1552_003:
    name: T1552_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.003
    description: "Adversaries may search the bash command history on compromised systems\
      \ for insecurely stored credentials. Bash keeps track of the commands users\
      \ type on the command-line with the \"history\" utility. Once a user logs out,\
      \ the history is flushed to the user\u2019s <code>.bash_history</code> file.\
      \ For each user, this file resides at the same location: <code>~/.bash_history</code>.\
      \ Typically, this file keeps track of the user\u2019s last 500 commands. Users\
      \ often type usernames and passwords on the command-line as parameters to programs,\
      \ which then get saved to this file when they log out. Adversaries can abuse\
      \ this by looking through the file for potential credentials. (Citation: External\
      \ to DA, the OS X Way)"
    title: Bash History
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.003
    mappings:
    - d3f:T1552.003
    exact_mappings:
    - attack:T1552.003
    is_a: T1552
    class_uri: d3f:T1552.003
  T1552_004:
    name: T1552_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.004
    description: 'Adversaries may search for private key certificate files on compromised
      systems for insecurely stored credentials. Private cryptographic keys and certificates
      are used for authentication, encryption/decryption, and digital signatures.(Citation:
      Wikipedia Public Key Crypto) Common key and certificate file extensions include:
      .key, .pgp, .gpg, .ppk., .p12, .pem, .pfx, .cer, .p7b, .asc.'
    title: Private Keys
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.004
    mappings:
    - d3f:T1552.004
    exact_mappings:
    - attack:T1552.004
    is_a: T1552
    class_uri: d3f:T1552.004
  T1552_005:
    name: T1552_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.005
    description: Adversaries may attempt to access the Cloud Instance Metadata API
      to collect credentials and other sensitive data.
    title: Cloud Instance Metadata API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.005
    mappings:
    - d3f:T1552.005
    exact_mappings:
    - attack:T1552.005
    is_a: T1552
    class_uri: d3f:T1552.005
  T1552_006:
    name: T1552_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1552.006
    description: 'Adversaries may attempt to find unsecured credentials in Group Policy
      Preferences (GPP). GPP are tools that allow administrators to create domain
      policies with embedded credentials. These policies allow administrators to set
      local accounts.(Citation: Microsoft GPP 2016)'
    title: Group Policy Preferences
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.006
    mappings:
    - d3f:T1552.006
    exact_mappings:
    - attack:T1552.006
    is_a: T1552
    class_uri: d3f:T1552.006
  T1552_007:
    name: T1552_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552007
    annotations:
      attack-id:
        tag: attack-id
        value: T1552.007
    description: 'Adversaries may gather credentials via APIs within a containers
      environment. APIs in these environments, such as the Docker API and Kubernetes
      APIs, allow a user to remotely manage their container resources and cluster
      components.(Citation: Docker API)(Citation: Kubernetes API)'
    title: Container API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.007
    mappings:
    - d3f:T1552.007
    exact_mappings:
    - attack:T1552.007
    is_a: T1552
    class_uri: d3f:T1552.007
  T1552_008:
    name: T1552_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1552008
    annotations:
      attack-id:
        tag: attack-id
        value: T1552.008
    description: Adversaries may directly collect unsecured credentials stored or
      passed through user communication services. Credentials may be sent and stored
      in user chat communication applications such as email, chat services like Slack
      or Teams, collaboration tools like Jira or Trello, and any other services that
      support user communication. Users may share various forms of credentials (such
      as usernames and passwords, API keys, or authentication tokens) on private or
      public corporate internal communications channels.
    title: Chat Messages
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1552.008
    mappings:
    - d3f:T1552.008
    exact_mappings:
    - attack:T1552.008
    is_a: T1552
    class_uri: d3f:T1552.008
  T1553:
    name: T1553
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553
    annotations:
      attack-id:
        tag: attack-id
        value: T1553
    description: Adversaries may undermine security controls that will either warn
      users of untrusted activity or prevent execution of untrusted programs. Operating
      systems and security products may contain mechanisms to identify programs or
      websites as possessing some level of trust. Examples of such features would
      include a program being allowed to run because it is signed by a valid code
      signing certificate, a program prompting the user with a warning because it
      has an attribute set from being downloaded from the Internet, or getting an
      indication that you are about to connect to an untrusted site.
    title: Subvert Trust Controls
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1553
    exact_mappings:
    - attack:T1553
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1553
  T1553_001:
    name: T1553_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1553.001
    description: "Adversaries may modify file attributes and subvert Gatekeeper functionality\
      \ to evade user prompts and execute untrusted programs. Gatekeeper is a set\
      \ of technologies that act as layer of Apple\u2019s security model to ensure\
      \ only trusted applications are executed on a host. Gatekeeper was built on\
      \ top of File Quarantine in Snow Leopard (10.6, 2009) and has grown to include\
      \ Code Signing, security policy compliance, Notarization, and more. Gatekeeper\
      \ also treats applications running for the first time differently than reopened\
      \ applications.(Citation: TheEclecticLightCompany Quarantine and the flag)(Citation:\
      \ TheEclecticLightCompany apple notarization )"
    title: Gatekeeper Bypass
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.001
    mappings:
    - d3f:T1553.001
    exact_mappings:
    - attack:T1553.001
    is_a: T1553
    class_uri: d3f:T1553.001
  T1553_002:
    name: T1553_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1553.002
    description: 'Adversaries may create, acquire, or steal code signing materials
      to sign their malware or tools. Code signing provides a level of authenticity
      on a binary from the developer and a guarantee that the binary has not been
      tampered with. (Citation: Wikipedia Code Signing) The certificates used during
      an operation may be created, acquired, or stolen by the adversary. (Citation:
      Securelist Digital Certificates) (Citation: Symantec Digital Certificates) Unlike
      [Invalid Code Signature](https://attack.mitre.org/techniques/T1036/001), this
      activity will result in a valid signature.'
    title: Code Signing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.002
    mappings:
    - d3f:T1553.002
    exact_mappings:
    - attack:T1553.002
    is_a: T1553
    class_uri: d3f:T1553.002
  T1553_003:
    name: T1553_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1553.003
    description: 'Adversaries may tamper with SIP and trust provider components to
      mislead the operating system and application control tools when conducting signature
      validation checks. In user mode, Windows Authenticode (Citation: Microsoft Authenticode)
      digital signatures are used to verify a file''s origin and integrity, variables
      that may be used to establish trust in signed code (ex: a driver with a valid
      Microsoft signature may be handled as safe). The signature validation process
      is handled via the WinVerifyTrust application programming interface (API) function,  (Citation:
      Microsoft WinVerifyTrust) which accepts an inquiry and coordinates with the
      appropriate trust provider, which is responsible for validating parameters of
      a signature. (Citation: SpectorOps Subverting Trust Sept 2017)'
    title: SIP and Trust Provider Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.003
    mappings:
    - d3f:T1553.003
    exact_mappings:
    - attack:T1553.003
    is_a: T1553
    class_uri: d3f:T1553.003
  T1553_004:
    name: T1553_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1553.004
    description: 'Adversaries may install a root certificate on a compromised system
      to avoid warnings when connecting to adversary controlled web servers. Root
      certificates are used in public key cryptography to identify a root certificate
      authority (CA). When a root certificate is installed, the system or application
      will trust certificates in the root''s chain of trust that have been signed
      by the root certificate.(Citation: Wikipedia Root Certificate) Certificates
      are commonly used for establishing secure TLS/SSL communications within a web
      browser. When a user attempts to browse a website that presents a certificate
      that is not trusted an error message will be displayed to warn the user of the
      security risk. Depending on the security settings, the browser may not allow
      the user to establish a connection to the website.'
    title: Install Root Certificate
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.004
    mappings:
    - d3f:T1553.004
    exact_mappings:
    - attack:T1553.004
    is_a: T1553
    class_uri: d3f:T1553.004
  T1553_005:
    name: T1553_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553005
    annotations:
      attack-id:
        tag: attack-id
        value: T1553.005
    description: 'Adversaries may abuse specific file formats to subvert Mark-of-the-Web
      (MOTW) controls. In Windows, when files are downloaded from the Internet, they
      are tagged with a hidden NTFS Alternate Data Stream (ADS) named <code>Zone.Identifier</code>
      with a specific value known as the MOTW.(Citation: Microsoft Zone.Identifier
      2020) Files that are tagged with MOTW are protected and cannot perform certain
      actions. For example, starting in MS Office 10, if a MS Office file has the
      MOTW, it will open in Protected View. Executables tagged with the MOTW will
      be processed by Windows Defender SmartScreen that compares files with an allowlist
      of well-known executables. If the file is not known/trusted, SmartScreen will
      prevent the execution and warn the user not to run it.(Citation: Beek Use of
      VHD Dec 2020)(Citation: Outflank MotW 2020)(Citation: Intezer Russian APT Dec
      2020)'
    title: Mark-of-the-Web Bypass
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.005
    mappings:
    - d3f:T1553.005
    exact_mappings:
    - attack:T1553.005
    is_a: T1553
    class_uri: d3f:T1553.005
  T1553_006:
    name: T1553_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1553006
    annotations:
      attack-id:
        tag: attack-id
        value: T1553.006
    description: Adversaries may modify code signing policies to enable execution
      of unsigned or self-signed code. Code signing provides a level of authenticity
      on a program from a developer and a guarantee that the program has not been
      tampered with. Security controls can include enforcement mechanisms to ensure
      that only valid, signed code can be run on an operating system.
    title: Code Signing Policy Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1553.006
    mappings:
    - d3f:T1553.006
    exact_mappings:
    - attack:T1553.006
    is_a: T1553
    class_uri: d3f:T1553.006
  T1554:
    name: T1554
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1554
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1554
    description: Adversaries may modify host software binaries to establish persistent
      access to systems. Software binaries/executables provide a wide range of system
      commands or services, programs, and libraries. Common software binaries are
      SSH clients, FTP clients, email clients, web browsers, and many other user or
      server applications.
    title: Compromise Host Software Binary
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1554
    exact_mappings:
    - attack:T1554
    is_a: PersistenceTechnique
    class_uri: d3f:T1554
  T1555:
    name: T1555
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1555
    description: 'Adversaries may search for common password storage locations to
      obtain user credentials.(Citation: F-Secure The Dukes) Passwords are stored
      in several places on a system, depending on the operating system or application
      holding the credentials. There are also specific applications and services that
      store passwords to make them easier for users to manage and maintain, such as
      password managers and cloud secrets vaults. Once credentials are obtained, they
      can be used to perform lateral movement and access restricted information.'
    title: Credentials from Password Stores
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1555
    exact_mappings:
    - attack:T1555
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1555
  T1555_001:
    name: T1555_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1555.001
    description: "Adversaries may acquire credentials from Keychain. Keychain (or\
      \ Keychain Services) is the macOS credential management system that stores account\
      \ names, passwords, private keys, certificates, sensitive application data,\
      \ payment data, and secure notes. There are three types of Keychains: Login\
      \ Keychain, System Keychain, and Local Items (iCloud) Keychain. The default\
      \ Keychain is the Login Keychain, which stores user passwords and information.\
      \ The System Keychain stores items accessed by the operating system, such as\
      \ items shared among users on a host. The Local Items (iCloud) Keychain is used\
      \ for items synced with Apple\u2019s iCloud service."
    title: Keychain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.001
    mappings:
    - d3f:T1555.001
    exact_mappings:
    - attack:T1555.001
    is_a: T1555
    class_uri: d3f:T1555.001
  T1555_002:
    name: T1555_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1555.002
    description: "An adversary with root access may gather credentials by reading\
      \ `securityd`\u2019s memory. `securityd` is a service/daemon responsible for\
      \ implementing security protocols such as encryption and authorization.(Citation:\
      \ Apple Dev SecurityD) A privileged adversary may be able to scan through `securityd`'s\
      \ memory to find the correct sequence of keys to decrypt the user\u2019s logon\
      \ keychain. This may provide the adversary with various plaintext passwords,\
      \ such as those for users, WiFi, mail, browsers, certificates, secure notes,\
      \ etc.(Citation: OS X Keychain)(Citation: OSX Keydnap malware)"
    title: Securityd Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.002
    mappings:
    - d3f:T1555.002
    exact_mappings:
    - attack:T1555.002
    is_a: T1555
    class_uri: d3f:T1555.002
  T1555_003:
    name: T1555_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1555.003
    description: 'Adversaries may acquire credentials from web browsers by reading
      files specific to the target browser.(Citation: Talos Olympic Destroyer 2018)
      Web browsers commonly save credentials such as website usernames and passwords
      so that they do not need to be entered manually in the future. Web browsers
      typically store the credentials in an encrypted format within a credential store;
      however, methods exist to extract plaintext credentials from web browsers.'
    title: Credentials from Web Browsers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.003
    mappings:
    - d3f:T1555.003
    exact_mappings:
    - attack:T1555.003
    is_a: T1555
    class_uri: d3f:T1555.003
  T1555_004:
    name: T1555_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555004
    annotations:
      attack-id:
        tag: attack-id
        value: T1555.004
    description: 'Adversaries may acquire credentials from the Windows Credential
      Manager. The Credential Manager stores credentials for signing into websites,
      applications, and/or devices that request authentication through NTLM or Kerberos
      in Credential Lockers (previously known as Windows Vaults).(Citation: Microsoft
      Credential Manager store)(Citation: Microsoft Credential Locker)'
    title: Windows Credential Manager
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.004
    mappings:
    - d3f:T1555.004
    exact_mappings:
    - attack:T1555.004
    is_a: T1555
    class_uri: d3f:T1555.004
  T1555_005:
    name: T1555_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555005
    annotations:
      attack-id:
        tag: attack-id
        value: T1555.005
    description: 'Adversaries may acquire user credentials from third-party password
      managers.(Citation: ise Password Manager February 2019) Password managers are
      applications designed to store user credentials, normally in an encrypted database.
      Credentials are typically accessible after a user provides a master password
      that unlocks the database. After the database is unlocked, these credentials
      may be copied to memory. These databases can be stored as files on disk.(Citation:
      ise Password Manager February 2019)'
    title: Password Managers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.005
    mappings:
    - d3f:T1555.005
    exact_mappings:
    - attack:T1555.005
    is_a: T1555
    class_uri: d3f:T1555.005
  T1555_006:
    name: T1555_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1555006
    annotations:
      attack-id:
        tag: attack-id
        value: T1555.006
    description: Adversaries may acquire credentials from cloud-native secret management
      solutions such as AWS Secrets Manager, GCP Secret Manager, Azure Key Vault,
      and Terraform Vault.
    title: Cloud Secrets Management Stores
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1555.006
    mappings:
    - d3f:T1555.006
    exact_mappings:
    - attack:T1555.006
    is_a: T1555
    class_uri: d3f:T1555.006
  T1556:
    name: T1556
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1556
    description: Adversaries may modify authentication mechanisms and processes to
      access user credentials or enable otherwise unwarranted access to accounts.
      The authentication process is handled by mechanisms, such as the Local Security
      Authentication Server (LSASS) process and the Security Accounts Manager (SAM)
      on Windows, pluggable authentication modules (PAM) on Unix-based systems, and
      authorization plugins on MacOS systems, responsible for gathering, storing,
      and validating credentials. By modifying an authentication process, an adversary
      may be able to authenticate to a service or system without using [Valid Accounts](https://attack.mitre.org/techniques/T1078).
    title: Modify Authentication Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1556
    exact_mappings:
    - attack:T1556
    is_a: CredentialAccessTechnique
    mixins:
    - DefenseEvasionTechnique
    - PersistenceTechnique
    class_uri: d3f:T1556
  T1556_001:
    name: T1556_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556001
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.001
    description: Adversaries may patch the authentication process on a domain controller
      to bypass the typical authentication mechanisms and enable access to accounts.
    title: Domain Controller Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.001
    mappings:
    - d3f:T1556.001
    exact_mappings:
    - attack:T1556.001
    is_a: T1556
    class_uri: d3f:T1556.001
  T1556_002:
    name: T1556_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1556.002
    description: Adversaries may register malicious password filter dynamic link libraries
      (DLLs) into the authentication process to acquire user credentials as they are
      validated.
    title: Password Filter DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.002
    mappings:
    - d3f:T1556.002
    exact_mappings:
    - attack:T1556.002
    is_a: T1556
    class_uri: d3f:T1556.002
  T1556_003:
    name: T1556_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1556.003
    description: 'Adversaries may modify pluggable authentication modules (PAM) to
      access user credentials or enable otherwise unwarranted access to accounts.
      PAM is a modular system of configuration files, libraries, and executable files
      which guide authentication for many services. The most common authentication
      module is <code>pam_unix.so</code>, which retrieves, sets, and verifies account
      authentication information in <code>/etc/passwd</code> and <code>/etc/shadow</code>.(Citation:
      Apple PAM)(Citation: Man Pam_Unix)(Citation: Red Hat PAM)'
    title: Pluggable Authentication Modules
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.003
    mappings:
    - d3f:T1556.003
    exact_mappings:
    - attack:T1556.003
    is_a: T1556
    class_uri: d3f:T1556.003
  T1556_004:
    name: T1556_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556004
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.004
    description: Adversaries may use [Patch System Image](https://attack.mitre.org/techniques/T1601/001)
      to hard code a password in the operating system, thus bypassing of native authentication
      mechanisms for local accounts on network devices.
    title: Network Device Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.004
    mappings:
    - d3f:T1556.004
    exact_mappings:
    - attack:T1556.004
    is_a: T1556
    class_uri: d3f:T1556.004
  T1556_005:
    name: T1556_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556005
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.005
    description: 'An adversary may abuse Active Directory authentication encryption
      properties to gain access to credentials on Windows systems. The <code>AllowReversiblePasswordEncryption</code>
      property specifies whether reversible password encryption for an account is
      enabled or disabled. By default this property is disabled (instead storing user
      credentials as the output of one-way hashing functions) and should not be enabled
      unless legacy or other software require it.(Citation: store_pwd_rev_enc)'
    title: Reversible Encryption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.005
    mappings:
    - d3f:T1556.005
    exact_mappings:
    - attack:T1556.005
    is_a: T1556
    class_uri: d3f:T1556.005
  T1556_006:
    name: T1556_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556006
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.006
    description: Adversaries may disable or modify multi-factor authentication (MFA)
      mechanisms to enable persistent access to compromised accounts.
    title: Multi-Factor Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.006
    mappings:
    - d3f:T1556.006
    exact_mappings:
    - attack:T1556.006
    is_a: T1556
    class_uri: d3f:T1556.006
  T1556_007:
    name: T1556_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556007
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.007
    description: Adversaries may patch, modify, or otherwise backdoor cloud authentication
      processes that are tied to on-premises user identities in order to bypass typical
      authentication mechanisms, access credentials, and enable persistent access
      to accounts.
    title: Hybrid Identity
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.007
    mappings:
    - d3f:T1556.007
    exact_mappings:
    - attack:T1556.007
    is_a: T1556
    class_uri: d3f:T1556.007
  T1556_008:
    name: T1556_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556008
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.008
    description: 'Adversaries may register malicious network provider dynamic link
      libraries (DLLs) to capture cleartext user credentials during the authentication
      process. Network provider DLLs allow Windows to interface with specific network
      protocols and can also support add-on credential management functions.(Citation:
      Network Provider API) During the logon process, Winlogon (the interactive logon
      module) sends credentials to the local `mpnotify.exe` process via RPC. The `mpnotify.exe`
      process then shares the credentials in cleartext with registered credential
      managers when notifying that a logon event is happening.(Citation: NPPSPY -
      Huntress)(Citation: NPPSPY Video)(Citation: NPLogonNotify)'
    title: Network Provider DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.008
    mappings:
    - d3f:T1556.008
    exact_mappings:
    - attack:T1556.008
    is_a: T1556
    class_uri: d3f:T1556.008
  T1556_009:
    name: T1556_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1556009
    annotations:
      attack-id:
        tag: attack-id
        value: T1556.009
    description: Adversaries may disable or modify conditional access policies to
      enable persistent access to compromised accounts. Conditional access policies
      are additional verifications used by identity providers and identity and access
      management systems to determine whether a user should be granted access to a
      resource.
    title: Conditional Access Policies
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1556.009
    mappings:
    - d3f:T1556.009
    exact_mappings:
    - attack:T1556.009
    is_a: T1556
    class_uri: d3f:T1556.009
  T1557:
    name: T1557
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1557
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1557
    description: 'Adversaries may attempt to position themselves between two or more
      networked devices using an adversary-in-the-middle (AiTM) technique to support
      follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040),
      [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002),
      or replay attacks ([Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212)).
      By abusing features of common networking protocols that can determine the flow
      of network traffic (e.g. ARP, DNS, LLMNR, etc.), adversaries may force a device
      to communicate through an adversary controlled system so they can collect information
      or perform additional actions.(Citation: Rapid7 MiTM Basics)'
    title: Adversary-in-the-Middle
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1557
    exact_mappings:
    - attack:T1557
    is_a: CollectionTechnique
    mixins:
    - CredentialAccessTechnique
    class_uri: d3f:T1557
  T1557_001:
    name: T1557_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1557001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1557.001
    description: By responding to LLMNR/NBT-NS network traffic, adversaries may spoof
      an authoritative source for name resolution to force communication with an adversary
      controlled system. This activity may be used to collect or relay authentication
      materials.
    title: LLMNR/NBT-NS Poisoning and SMB Relay
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1557.001
    mappings:
    - d3f:T1557.001
    exact_mappings:
    - attack:T1557.001
    is_a: T1557
    class_uri: d3f:T1557.001
  T1557_002:
    name: T1557_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1557002
    annotations:
      attack-id:
        tag: attack-id
        value: T1557.002
    description: Adversaries may poison Address Resolution Protocol (ARP) caches to
      position themselves between the communication of two or more networked devices.
      This activity may be used to enable follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040)
      or [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002).
    title: ARP Cache Poisoning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1557.002
    mappings:
    - d3f:T1557.002
    exact_mappings:
    - attack:T1557.002
    is_a: T1557
    class_uri: d3f:T1557.002
  T1557_003:
    name: T1557_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1557003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1557.003
    description: Adversaries may redirect network traffic to adversary-owned systems
      by spoofing Dynamic Host Configuration Protocol (DHCP) traffic and acting as
      a malicious DHCP server on the victim network. By achieving the adversary-in-the-middle
      (AiTM) position, adversaries may collect network communications, including passed
      credentials, especially those sent over insecure, unencrypted protocols. This
      may also enable follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040)
      or [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002).
    title: DHCP Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1557.003
    mappings:
    - d3f:T1557.003
    exact_mappings:
    - attack:T1557.003
    is_a: T1557
    class_uri: d3f:T1557.003
  T1557_004:
    name: T1557_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1557004
    annotations:
      attack-id:
        tag: attack-id
        value: T1557.004
    description: "Adversaries may host seemingly genuine Wi-Fi access points to deceive\
      \ users into connecting to malicious networks as a way of supporting follow-on\
      \ behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040),\
      \ [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002),\
      \ or [Input Capture](https://attack.mitre.org/techniques/T1056).(Citation: Australia\
      \ \u2018Evil Twin\u2019)"
    title: Evil Twin
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1557.004
    mappings:
    - d3f:T1557.004
    exact_mappings:
    - attack:T1557.004
    is_a: T1557
    class_uri: d3f:T1557.004
  T1558:
    name: T1558
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1558
    description: "Adversaries may attempt to subvert Kerberos authentication by stealing\
      \ or forging Kerberos tickets to enable [Pass the Ticket](https://attack.mitre.org/techniques/T1550/003).\
      \ Kerberos is an authentication protocol widely used in modern Windows domain\
      \ environments. In Kerberos environments, referred to as \u201Crealms\u201D\
      , there are three basic participants: client, service, and Key Distribution\
      \ Center (KDC).(Citation: ADSecurity Kerberos Ring Decoder) Clients request\
      \ access to a service and through the exchange of Kerberos tickets, originating\
      \ from KDC, they are granted access after having successfully authenticated.\
      \ The KDC is responsible for both authentication and ticket granting.  Adversaries\
      \ may attempt to abuse Kerberos by stealing tickets or forging tickets to enable\
      \ unauthorized access."
    title: Steal or Forge Kerberos Tickets
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1558
    exact_mappings:
    - attack:T1558
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1558
  T1558_001:
    name: T1558_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1558.001
    description: 'Adversaries who have the KRBTGT account password hash may forge
      Kerberos ticket-granting tickets (TGT), also known as a golden ticket.(Citation:
      AdSecurity Kerberos GT Aug 2015) Golden tickets enable adversaries to generate
      authentication material for any account in Active Directory.(Citation: CERT-EU
      Golden Ticket Protection)'
    title: Golden Ticket
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1558.001
    mappings:
    - d3f:T1558.001
    exact_mappings:
    - attack:T1558.001
    is_a: T1558
    class_uri: d3f:T1558.001
  T1558_002:
    name: T1558_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558002
    annotations:
      attack-id:
        tag: attack-id
        value: T1558.002
    description: 'Adversaries who have the password hash of a target service account
      (e.g. SharePoint, MSSQL) may forge Kerberos ticket granting service (TGS) tickets,
      also known as silver tickets. Kerberos TGS tickets are also known as service
      tickets.(Citation: ADSecurity Silver Tickets)'
    title: Silver Ticket
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1558.002
    mappings:
    - d3f:T1558.002
    exact_mappings:
    - attack:T1558.002
    is_a: T1558
    class_uri: d3f:T1558.002
  T1558_003:
    name: T1558_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1558.003
    description: Service Provider Name (SPN) scanning is one way to gather hashes,
      which results in RPC calls conforming to the NSPI protocol.
    title: Kerberoasting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://docs.microsoft.com/en-us/openspecs/windows_protocols/ms-nspi/6dd0a3ea-b4d4-4a73-a857-add03a89a543
    aliases:
    - T1558.003
    mappings:
    - d3f:T1558.003
    exact_mappings:
    - attack:T1558.003
    is_a: T1558
    class_uri: d3f:T1558.003
  T1558_004:
    name: T1558_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558004
    annotations:
      attack-id:
        tag: attack-id
        value: T1558.004
    description: 'Adversaries may reveal credentials of accounts that have disabled
      Kerberos preauthentication by [Password Cracking](https://attack.mitre.org/techniques/T1110/002)
      Kerberos messages.(Citation: Harmj0y Roasting AS-REPs Jan 2017)'
    title: AS-REP Roasting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1558.004
    mappings:
    - d3f:T1558.004
    exact_mappings:
    - attack:T1558.004
    is_a: T1558
    class_uri: d3f:T1558.004
  T1558_005:
    name: T1558_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1558005
    annotations:
      attack-id:
        tag: attack-id
        value: T1558.005
    description: Adversaries may attempt to steal Kerberos tickets stored in credential
      cache files (or ccache). These files are used for short term storage of a user's
      active session credentials. The ccache file is created upon user authentication
      and allows for access to multiple services without the user having to re-enter
      credentials.
    title: Ccache Files
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1558.005
    mappings:
    - d3f:T1558.005
    exact_mappings:
    - attack:T1558.005
    is_a: T1558
    class_uri: d3f:T1558.005
  T1559:
    name: T1559
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1559
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1559
    description: Adversaries may abuse inter-process communication (IPC) mechanisms
      for local code or command execution. IPC is typically used by processes to share
      data, communicate with each other, or synchronize execution. IPC is also commonly
      used to avoid situations such as deadlocks, which occurs when processes are
      stuck in a cyclic waiting pattern.
    title: Inter-Process Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1559
    exact_mappings:
    - attack:T1559
    is_a: ExecutionTechnique
    class_uri: d3f:T1559
  T1559_001:
    name: T1559_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1559001
    annotations:
      attack-id:
        tag: attack-id
        value: T1559.001
    description: 'Adversaries may use the Windows Component Object Model (COM) for
      local code execution. COM is an inter-process communication (IPC) component
      of the native Windows application programming interface (API) that enables interaction
      between software objects, or executable code that implements one or more interfaces.(Citation:
      Fireeye Hunting COM June 2019) Through COM, a client object can call methods
      of server objects, which are typically binary Dynamic Link Libraries (DLL) or
      executables (EXE).(Citation: Microsoft COM) Remote COM execution is facilitated
      by [Remote Services](https://attack.mitre.org/techniques/T1021) such as  [Distributed
      Component Object Model](https://attack.mitre.org/techniques/T1021/003) (DCOM).(Citation:
      Fireeye Hunting COM June 2019)'
    title: Component Object Model
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1559.001
    mappings:
    - d3f:T1559.001
    exact_mappings:
    - attack:T1559.001
    is_a: T1559
    class_uri: d3f:T1559.001
  T1559_002:
    name: T1559_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1559002
    annotations:
      attack-id:
        tag: attack-id
        value: T1559.002
    description: Adversaries may use Windows Dynamic Data Exchange (DDE) to execute
      arbitrary commands. DDE is a client-server protocol for one-time and/or continuous
      inter-process communication (IPC) between applications. Once a link is established,
      applications can autonomously exchange transactions consisting of strings, warm
      data links (notifications when a data item changes), hot data links (duplications
      of changes to a data item), and requests for command execution.
    title: Dynamic Data Exchange
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1559.002
    mappings:
    - d3f:T1559.002
    exact_mappings:
    - attack:T1559.002
    is_a: T1559
    class_uri: d3f:T1559.002
  T1559_003:
    name: T1559_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1559003
    annotations:
      attack-id:
        tag: attack-id
        value: T1559.003
    description: 'Adversaries can provide malicious content to an XPC service daemon
      for local code execution. macOS uses XPC services for basic inter-process communication
      between various processes, such as between the XPC Service daemon and third-party
      application privileged helper tools. Applications can send messages to the XPC
      Service daemon, which runs as root, using the low-level XPC Service <code>C
      API</code> or the high level <code>NSXPCConnection API</code> in order to handle
      tasks that require elevated privileges (such as network connections). Applications
      are responsible for providing the protocol definition which serves as a blueprint
      of the XPC services. Developers typically use XPC Services to provide applications
      stability and privilege separation between the application client and the daemon.(Citation:
      creatingXPCservices)(Citation: Designing Daemons Apple Dev)'
    title: XPC Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1559.003
    mappings:
    - d3f:T1559.003
    exact_mappings:
    - attack:T1559.003
    is_a: T1559
    class_uri: d3f:T1559.003
  T1560:
    name: T1560
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1560
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1560
    description: 'An adversary may compress and/or encrypt data that is collected
      prior to exfiltration. Compressing the data can help to obfuscate the collected
      data and minimize the amount of data sent over the network.(Citation: DOJ GRU
      Indictment Jul 2018) Encryption can be used to hide information that is being
      exfiltrated from detection or make exfiltration less conspicuous upon inspection
      by a defender.'
    title: Archive Collected Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1560
    exact_mappings:
    - attack:T1560
    is_a: CollectionTechnique
    class_uri: d3f:T1560
  T1560_001:
    name: T1560_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1560001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1560.001
    description: Adversaries may use utilities to compress and/or encrypt collected
      data prior to exfiltration. Many utilities include functionalities to compress,
      encrypt, or otherwise package data into a format that is easier/more secure
      to transport.
    title: Archive via Utility
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1560.001
    mappings:
    - d3f:T1560.001
    exact_mappings:
    - attack:T1560.001
    is_a: T1560
    class_uri: d3f:T1560.001
  T1560_002:
    name: T1560_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1560002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1560.002
    description: 'An adversary may compress or encrypt data that is collected prior
      to exfiltration using 3rd party libraries. Many libraries exist that can archive
      data, including [Python](https://attack.mitre.org/techniques/T1059/006) rarfile
      (Citation: PyPI RAR), libzip (Citation: libzip), and zlib (Citation: Zlib Github).
      Most libraries include functionality to encrypt and/or compress data.'
    title: Archive via Library
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1560.002
    mappings:
    - d3f:T1560.002
    exact_mappings:
    - attack:T1560.002
    is_a: T1560
    class_uri: d3f:T1560.002
  T1560_003:
    name: T1560_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1560003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1560.003
    description: 'An adversary may compress or encrypt data that is collected prior
      to exfiltration using a custom method. Adversaries may choose to use custom
      archival methods, such as encryption with XOR or stream ciphers implemented
      with no external library or utility references. Custom implementations of well-known
      compression algorithms have also been used.(Citation: ESET Sednit Part 2)'
    title: Archive via Custom Method
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1560.003
    mappings:
    - d3f:T1560.003
    exact_mappings:
    - attack:T1560.003
    is_a: T1560
    class_uri: d3f:T1560.003
  T1561:
    name: T1561
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1561
    annotations:
      attack-id:
        tag: attack-id
        value: T1561
    description: Adversaries may wipe or corrupt raw disk data on specific systems
      or in large numbers in a network to interrupt availability to system and network
      resources. With direct write access to a disk, adversaries may attempt to overwrite
      portions of disk data. Adversaries may opt to wipe arbitrary portions of disk
      data and/or wipe disk structures like the master boot record (MBR). A complete
      wipe of all disk sectors may be attempted.
    title: Disk Wipe
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1561
    exact_mappings:
    - attack:T1561
    is_a: ImpactTechnique
    class_uri: d3f:T1561
  T1561_001:
    name: T1561_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1561001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1561.001
    description: Adversaries may erase the contents of storage devices on specific
      systems or in large numbers in a network to interrupt availability to system
      and network resources.
    title: Disk Content Wipe
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1561.001
    mappings:
    - d3f:T1561.001
    exact_mappings:
    - attack:T1561.001
    is_a: T1561
    class_uri: d3f:T1561.001
  T1561_002:
    name: T1561_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1561002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1561.002
    description: Adversaries may corrupt or wipe the disk data structures on a hard
      drive necessary to boot a system; targeting specific critical systems or in
      large numbers in a network to interrupt availability to system and network resources.
    title: Disk Structure Wipe
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1561.002
    mappings:
    - d3f:T1561.002
    exact_mappings:
    - attack:T1561.002
    is_a: T1561
    class_uri: d3f:T1561.002
  T1562:
    name: T1562
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562
    annotations:
      attack-id:
        tag: attack-id
        value: T1562
    description: Adversaries may maliciously modify components of a victim environment
      in order to hinder or disable defensive mechanisms. This not only involves impairing
      preventative defenses, such as firewalls and anti-virus, but also detection
      capabilities that defenders can use to audit activity and identify malicious
      behavior. This may also span both native defenses as well as supplemental capabilities
      installed by users and administrators.
    title: Impair Defenses
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1562
    exact_mappings:
    - attack:T1562
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1562
  T1562_001:
    name: T1562_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.001
    description: 'Adversaries may modify and/or disable security tools to avoid possible
      detection of their malware/tools and activities. This may take many forms, such
      as killing security software processes or services, modifying / deleting Registry
      keys or configuration files so that tools do not operate properly, or other
      methods to interfere with security tools scanning or reporting information.
      Adversaries may also disable updates to prevent the latest security patches
      from reaching tools on victim systems.(Citation: SCADAfence_ransomware)'
    title: Disable or Modify Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.001
    mappings:
    - d3f:T1562.001
    exact_mappings:
    - attack:T1562.001
    is_a: T1562
    class_uri: d3f:T1562.001
  T1562_002:
    name: T1562_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.002
    description: 'Adversaries may disable Windows event logging to limit data that
      can be leveraged for detections and audits. Windows event logs record user and
      system activity such as login attempts, process creation, and much more.(Citation:
      Windows Log Events) This data is used by security tools and analysts to generate
      detections.'
    title: Disable Windows Event Logging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.002
    mappings:
    - d3f:T1562.002
    exact_mappings:
    - attack:T1562.002
    is_a: T1562
    class_uri: d3f:T1562.002
  T1562_003:
    name: T1562_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.003
    description: Adversaries may impair command history logging to hide commands they
      run on a compromised system. Various command interpreters keep track of the
      commands users type in their terminal so that users can retrace what they've
      done.
    title: Impair Command History Logging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.003
    mappings:
    - d3f:T1562.003
    exact_mappings:
    - attack:T1562.003
    is_a: T1562
    class_uri: d3f:T1562.003
  T1562_004:
    name: T1562_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.004
    description: Adversaries may disable or modify system firewalls in order to bypass
      controls limiting network usage. Changes could be disabling the entire mechanism
      as well as adding, deleting, or modifying particular rules. This can be done
      numerous ways depending on the operating system, including via command-line,
      editing Windows Registry keys, and Windows Control Panel.
    title: Disable or Modify System Firewall
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.004
    mappings:
    - d3f:T1562.004
    exact_mappings:
    - attack:T1562.004
    is_a: T1562
    class_uri: d3f:T1562.004
  T1562_006:
    name: T1562_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562006
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.006
    description: 'An adversary may attempt to block indicators or events typically
      captured by sensors from being gathered and analyzed. This could include maliciously
      redirecting(Citation: Microsoft Lamin Sept 2017) or even disabling host-based
      sensors, such as Event Tracing for Windows (ETW)(Citation: Microsoft About Event
      Tracing 2018), by tampering settings that control the collection and flow of
      event telemetry.(Citation: Medium Event Tracing Tampering 2018) These settings
      may be stored on the system in configuration files and/or in the Registry as
      well as being accessible via administrative utilities such as [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      or [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).'
    title: Indicator Blocking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.006
    mappings:
    - d3f:T1562.006
    exact_mappings:
    - attack:T1562.006
    is_a: T1562
    class_uri: d3f:T1562.006
  T1562_007:
    name: T1562_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562007
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.007
    description: Adversaries may disable or modify a firewall within a cloud environment
      to bypass controls that limit access to cloud resources. Cloud firewalls are
      separate from system firewalls that are described in [Disable or Modify System
      Firewall](https://attack.mitre.org/techniques/T1562/004).
    title: Disable or Modify Cloud Firewall
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.007
    mappings:
    - d3f:T1562.007
    exact_mappings:
    - attack:T1562.007
    is_a: T1562
    class_uri: d3f:T1562.007
  T1562_008:
    name: T1562_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562008
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.008
    description: An adversary may disable or modify cloud logging capabilities and
      integrations to limit what data is collected on their activities and avoid detection.
      Cloud environments allow for collection and analysis of audit and application
      logs that provide insight into what activities a user does within the environment.
      If an adversary has sufficient permissions, they can disable or modify logging
      to avoid detection of their activities.
    title: Disable or Modify Cloud Logs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.008
    mappings:
    - d3f:T1562.008
    exact_mappings:
    - attack:T1562.008
    is_a: T1562
    class_uri: d3f:T1562.008
  T1562_009:
    name: T1562_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.009
    description: 'Adversaries may abuse Windows safe mode to disable endpoint defenses.
      Safe mode starts up the Windows operating system with a limited set of drivers
      and services. Third-party security software such as endpoint detection and response
      (EDR) tools may not start after booting Windows in safe mode. There are two
      versions of safe mode: Safe Mode and Safe Mode with Networking. It is possible
      to start additional services after a safe mode boot.(Citation: Microsoft Safe
      Mode)(Citation: Sophos Snatch Ransomware 2019)'
    title: Safe Mode Boot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.009
    mappings:
    - d3f:T1562.009
    exact_mappings:
    - attack:T1562.009
    is_a: T1562
    class_uri: d3f:T1562.009
  T1562_010:
    name: T1562_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1562.010
    description: "Adversaries may downgrade or use a version of system features that\
      \ may be outdated, vulnerable, and/or does not support updated security controls.\
      \ Downgrade attacks typically take advantage of a system\u2019s backward compatibility\
      \ to force it into less secure modes of operation."
    title: Downgrade Attack
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.010
    mappings:
    - d3f:T1562.010
    exact_mappings:
    - attack:T1562.010
    is_a: T1562
    class_uri: d3f:T1562.010
  T1562_011:
    name: T1562_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562011
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.011
    description: "Adversaries may spoof security alerting from tools, presenting false\
      \ evidence to impair defenders\u2019 awareness of malicious activity.(Citation:\
      \ BlackBasta) Messages produced by defensive tools contain information about\
      \ potential security events as well as the functioning status of security software\
      \ and the system. Security reporting messages are important for monitoring the\
      \ normal operation of a system and identifying important events that can signal\
      \ a security incident."
    title: Spoof Security Alerting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.011
    mappings:
    - d3f:T1562.011
    exact_mappings:
    - attack:T1562.011
    is_a: T1562
    class_uri: d3f:T1562.011
  T1562_012:
    name: T1562_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562012
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.012
    description: Adversaries may disable or modify the Linux audit system to hide
      malicious activity and avoid detection. Linux admins use the Linux Audit system
      to track security-relevant information on a system. The Linux Audit system operates
      at the kernel-level and maintains event logs on application and system activity
      such as process, network, file, and login events based on pre-configured rules.
    title: Disable or Modify Linux Audit System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.012
    mappings:
    - d3f:T1562.012
    exact_mappings:
    - attack:T1562.012
    is_a: T1562
    class_uri: d3f:T1562.012
  T1562_013:
    name: T1562_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1562013
    annotations:
      attack-id:
        tag: attack-id
        value: T1562.013
    description: Adversaries may disable network device-based firewall mechanisms
      entirely or add, delete, or modify particular rules in order to bypass controls
      limiting network usage.
    title: Disable or Modify Network Device Firewall
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1562.013
    mappings:
    - d3f:T1562.013
    exact_mappings:
    - attack:T1562.013
    is_a: T1562
    class_uri: d3f:T1562.013
  T1563:
    name: T1563
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1563
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1563
    description: Adversaries may take control of preexisting sessions with remote
      services to move laterally in an environment. Users may use valid credentials
      to log into a service specifically designed to accept remote connections, such
      as telnet, SSH, and RDP. When a user logs into a service, a session will be
      established that will allow them to maintain a continuous interaction with that
      service.
    title: Remote Service Session Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1563
    exact_mappings:
    - attack:T1563
    is_a: LateralMovementTechnique
    class_uri: d3f:T1563
  T1563_001:
    name: T1563_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1563001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1563.001
    description: Adversaries may hijack a legitimate user's SSH session to move laterally
      within an environment. Secure Shell (SSH) is a standard means of remote access
      on Linux and macOS systems. It allows a user to connect to another system via
      an encrypted tunnel, commonly authenticating through a password, certificate
      or the use of an asymmetric encryption key pair.
    title: SSH Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1563.001
    mappings:
    - d3f:T1563.001
    exact_mappings:
    - attack:T1563.001
    is_a: T1563
    class_uri: d3f:T1563.001
  T1563_002:
    name: T1563_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1563002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1563.002
    description: "Adversaries may hijack a legitimate user\u2019s remote desktop session\
      \ to move laterally within an environment. Remote desktop is a common feature\
      \ in operating systems. It allows a user to log into an interactive session\
      \ with a system desktop graphical user interface on a remote system. Microsoft\
      \ refers to its implementation of the Remote Desktop Protocol (RDP) as Remote\
      \ Desktop Services (RDS).(Citation: TechNet Remote Desktop Services)"
    title: RDP Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1563.002
    mappings:
    - d3f:T1563.002
    exact_mappings:
    - attack:T1563.002
    is_a: T1563
    class_uri: d3f:T1563.002
  T1564:
    name: T1564
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564
    annotations:
      attack-id:
        tag: attack-id
        value: T1564
    description: 'Adversaries may attempt to hide artifacts associated with their
      behaviors to evade detection. Operating systems may have features to hide various
      artifacts, such as important system files and administrative task execution,
      to avoid disrupting user work environments and prevent users from changing files
      or features on the system. Adversaries may abuse these features to hide artifacts
      such as files, directories, user accounts, or other system activity to evade
      detection.(Citation: Sofacy Komplex Trojan)(Citation: Cybereason OSX Pirrit)(Citation:
      MalwareBytes ADS July 2015)'
    title: Hide Artifacts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1564
    exact_mappings:
    - attack:T1564
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1564
  T1564_001:
    name: T1564_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.001
    description: "Adversaries may set files and directories to be hidden to evade\
      \ detection mechanisms. To prevent normal users from accidentally changing special\
      \ files on a system, most operating systems have the concept of a \u2018hidden\u2019\
      \ file. These files don\u2019t show up when a user browses the file system with\
      \ a GUI or when using normal commands on the command line. Users must explicitly\
      \ ask to show the hidden files either via a series of Graphical User Interface\
      \ (GUI) prompts or with command line switches (<code>dir /a</code> for Windows\
      \ and <code>ls \u2013a</code> for Linux and macOS)."
    title: Hidden Files and Directories
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.001
    mappings:
    - d3f:T1564.001
    exact_mappings:
    - attack:T1564.001
    is_a: T1564
    class_uri: d3f:T1564.001
  T1564_002:
    name: T1564_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.002
    description: Adversaries may use hidden users to hide the presence of user accounts
      they create or modify. Administrators may want to hide users when there are
      many user accounts on a given system or if they want to hide their administrative
      or other management accounts from other users.
    title: Hidden Users
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.002
    mappings:
    - d3f:T1564.002
    exact_mappings:
    - attack:T1564.002
    is_a: T1564
    class_uri: d3f:T1564.002
  T1564_003:
    name: T1564_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.003
    description: Adversaries may use hidden windows to conceal malicious activity
      from the plain sight of users. In some cases, windows that would typically be
      displayed when an application carries out an operation can be hidden. This may
      be utilized by system administrators to avoid disrupting user work environments
      when carrying out administrative tasks.
    title: Hidden Window
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.003
    mappings:
    - d3f:T1564.003
    exact_mappings:
    - attack:T1564.003
    is_a: T1564
    class_uri: d3f:T1564.003
  T1564_004:
    name: T1564_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.004
    description: 'Adversaries may use NTFS file attributes to hide their malicious
      data in order to evade detection. Every New Technology File System (NTFS) formatted
      partition contains a Master File Table (MFT) that maintains a record for every
      file/directory on the partition. (Citation: SpectorOps Host-Based Jul 2017)
      Within MFT entries are file attributes, (Citation: Microsoft NTFS File Attributes
      Aug 2010) such as Extended Attributes (EA) and Data [known as Alternate Data
      Streams (ADSs) when more than one Data attribute is present], that can be used
      to store arbitrary data (and even complete files). (Citation: SpectorOps Host-Based
      Jul 2017) (Citation: Microsoft File Streams) (Citation: MalwareBytes ADS July
      2015) (Citation: Microsoft ADS Mar 2014)'
    title: NTFS File Attributes
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.004
    mappings:
    - d3f:T1564.004
    exact_mappings:
    - attack:T1564.004
    is_a: T1564
    class_uri: d3f:T1564.004
  T1564_005:
    name: T1564_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.005
    description: 'Adversaries may use a hidden file system to conceal malicious activity
      from users and security tools. File systems provide a structure to store and
      access data from physical storage. Typically, a user engages with a file system
      through applications that allow them to access files and directories, which
      are an abstraction from their physical location (ex: disk sector). Standard
      file systems include FAT, NTFS, ext4, and APFS. File systems can also contain
      other structures, such as the Volume Boot Record (VBR) and Master File Table
      (MFT) in NTFS.(Citation: MalwareTech VFS Nov 2014)'
    title: Hidden File System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.005
    mappings:
    - d3f:T1564.005
    exact_mappings:
    - attack:T1564.005
    is_a: T1564
    class_uri: d3f:T1564.005
  T1564_006:
    name: T1564_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.006
    description: 'Adversaries may carry out malicious operations using a virtual instance
      to avoid detection. A wide variety of virtualization technologies exist that
      allow for the emulation of a computer or computing environment. By running malicious
      code inside of a virtual instance, adversaries can hide artifacts associated
      with their behavior from security tools that are unable to monitor activity
      inside the virtual instance. Additionally, depending on the virtual networking
      implementation (ex: bridged adapter), network traffic generated by the virtual
      instance can be difficult to trace back to the compromised host as the IP address
      and hostname might not match known values.(Citation: SingHealth Breach Jan 2019)'
    title: Run Virtual Instance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.006
    mappings:
    - d3f:T1564.006
    exact_mappings:
    - attack:T1564.006
    is_a: T1564
    class_uri: d3f:T1564.006
  T1564_007:
    name: T1564_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.007
    description: 'Adversaries may hide malicious Visual Basic for Applications (VBA)
      payloads embedded within MS Office documents by replacing the VBA source code
      with benign data.(Citation: FireEye VBA stomp Feb 2020)'
    title: VBA Stomping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.007
    mappings:
    - d3f:T1564.007
    exact_mappings:
    - attack:T1564.007
    is_a: T1564
    class_uri: d3f:T1564.007
  T1564_008:
    name: T1564_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.008
    description: 'Adversaries may use email rules to hide inbound emails in a compromised
      user''s mailbox. Many email clients allow users to create inbox rules for various
      email functions, including moving emails to other folders, marking emails as
      read, or deleting emails. Rules may be created or modified within email clients
      or through external features such as the <code>New-InboxRule</code> or <code>Set-InboxRule</code>
      [PowerShell](https://attack.mitre.org/techniques/T1059/001) cmdlets on Windows
      systems.(Citation: Microsoft Inbox Rules)(Citation: MacOS Email Rules)(Citation:
      Microsoft New-InboxRule)(Citation: Microsoft Set-InboxRule)'
    title: Email Hiding Rules
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.008
    mappings:
    - d3f:T1564.008
    exact_mappings:
    - attack:T1564.008
    is_a: T1564
    class_uri: d3f:T1564.008
  T1564_009:
    name: T1564_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1564.009
    description: "Adversaries may abuse resource forks to hide malicious code or executables\
      \ to evade detection and bypass security applications. A resource fork provides\
      \ applications a structured way to store resources such as thumbnail images,\
      \ menu definitions, icons, dialog boxes, and code.(Citation: macOS Hierarchical\
      \ File System Overview) Usage of a resource fork is identifiable when displaying\
      \ a file\u2019s extended attributes, using <code>ls -l@</code> or <code>xattr\
      \ -l</code> commands. Resource forks have been deprecated and replaced with\
      \ the application bundle structure. Non-localized resources are placed at the\
      \ top level directory of an application bundle, while localized resources are\
      \ placed in the <code>/Resources</code> folder.(Citation: Resource and Data\
      \ Forks)(Citation: ELC Extended Attributes)"
    title: Resource Forking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.009
    mappings:
    - d3f:T1564.009
    exact_mappings:
    - attack:T1564.009
    is_a: T1564
    class_uri: d3f:T1564.009
  T1564_010:
    name: T1564_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564010
    annotations:
      attack-id:
        tag: attack-id
        value: T1564.010
    description: 'Adversaries may attempt to hide process command-line arguments by
      overwriting process memory. Process command-line arguments are stored in the
      process environment block (PEB), a data structure used by Windows to store various
      information about/used by a process. The PEB includes the process command-line
      arguments that are referenced when executing the process. When a process is
      created, defensive tools/sensors that monitor process creations may retrieve
      the process arguments from the PEB.(Citation: Microsoft PEB 2021)(Citation:
      Xpn Argue Like Cobalt 2019)'
    title: Process Argument Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.010
    mappings:
    - d3f:T1564.010
    exact_mappings:
    - attack:T1564.010
    is_a: T1564
    class_uri: d3f:T1564.010
  T1564_011:
    name: T1564_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564011
    annotations:
      attack-id:
        tag: attack-id
        value: T1564.011
    description: 'Adversaries may evade defensive mechanisms by executing commands
      that hide from process interrupt signals. Many operating systems use signals
      to deliver messages to control process behavior. Command interpreters often
      include specific commands/flags that ignore errors and other hangups, such as
      when the user of the active session logs off.(Citation: Linux Signal Man)  These
      interrupt signals may also be used by defensive tools and/or analysts to pause
      or terminate specified running processes.'
    title: Ignore Process Interrupts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.011
    mappings:
    - d3f:T1564.011
    exact_mappings:
    - attack:T1564.011
    is_a: T1564
    class_uri: d3f:T1564.011
  T1564_012:
    name: T1564_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564012
    annotations:
      attack-id:
        tag: attack-id
        value: T1564.012
    description: 'Adversaries may attempt to hide their file-based artifacts by writing
      them to specific folders or file names excluded from antivirus (AV) scanning
      and other defensive capabilities. AV and other file-based scanners often include
      exclusions to optimize performance as well as ease installation and legitimate
      use of applications. These exclusions may be contextual (e.g., scans are only
      initiated in response to specific triggering events/alerts), but are also often
      hardcoded strings referencing specific folders and/or files assumed to be trusted
      and legitimate.(Citation: Microsoft File Folder Exclusions)'
    title: File/Path Exclusions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.012
    mappings:
    - d3f:T1564.012
    exact_mappings:
    - attack:T1564.012
    is_a: T1564
    class_uri: d3f:T1564.012
  T1564_013:
    name: T1564_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564013
    annotations:
      attack-id:
        tag: attack-id
        value: T1564.013
    description: "Adversaries may abuse bind mounts on file structures to hide their\
      \ activity and artifacts from native utilities. A bind mount maps a directory\
      \ or file from one location on the filesystem to another, similar to a shortcut\
      \ on Windows. It\u2019s commonly used to provide access to specific files or\
      \ directories across different environments, such as inside containers or chroot\
      \ environments, and requires sudo access."
    title: Bind Mounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.013
    mappings:
    - d3f:T1564.013
    exact_mappings:
    - attack:T1564.013
    is_a: T1564
    class_uri: d3f:T1564.013
  T1564_014:
    name: T1564_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1564014
    annotations:
      attack-id:
        tag: attack-id
        value: T1564.014
    description: 'Adversaries may abuse extended attributes (xattrs) on macOS and
      Linux to hide their malicious data in order to evade detection. Extended attributes
      are key-value pairs of file and directory metadata used by both macOS and Linux.
      They are not visible through standard tools like `Finder`,  `ls`, or `cat` and
      require utilities such as `xattr` (macOS) or `getfattr` (Linux) for inspection.
      Operating systems and applications use xattrs for tagging, integrity checks,
      and access control. On Linux, xattrs are organized into namespaces such as `user.`
      (user permissions), `trusted.` (root permissions), `security.`, and `system.`,
      each with specific permissions. On macOS, xattrs are flat strings without namespace
      prefixes, commonly prefixed with `com.apple.*` (e.g., `com.apple.quarantine`,
      `com.apple.metadata:_kMDItemUserTags`) and used by system features like Gatekeeper
      and Spotlight.(Citation: Establishing persistence using extended attributes
      on Linux)'
    title: Extended Attributes
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1564.014
    mappings:
    - d3f:T1564.014
    exact_mappings:
    - attack:T1564.014
    is_a: T1564
    class_uri: d3f:T1564.014
  T1565:
    name: T1565
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1565
    annotations:
      attack-id:
        tag: attack-id
        value: T1565
    description: 'Adversaries may insert, delete, or manipulate data in order to influence
      external outcomes or hide activity, thus threatening the integrity of the data.(Citation:
      Sygnia Elephant Beetle Jan 2022) By manipulating data, adversaries may attempt
      to affect a business process, organizational understanding, or decision making.'
    title: Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1565
    exact_mappings:
    - attack:T1565
    is_a: ImpactTechnique
    class_uri: d3f:T1565
  T1565_001:
    name: T1565_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1565001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1565.001
    description: 'Adversaries may insert, delete, or manipulate data at rest in order
      to influence external outcomes or hide activity, thus threatening the integrity
      of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus Sony 2018)
      By manipulating stored data, adversaries may attempt to affect a business process,
      organizational understanding, and decision making.'
    title: Stored Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1565.001
    mappings:
    - d3f:T1565.001
    exact_mappings:
    - attack:T1565.001
    is_a: T1565
    class_uri: d3f:T1565.001
  T1565_002:
    name: T1565_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1565002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1565.002
    description: 'Adversaries may alter data en route to storage or other systems
      in order to manipulate external outcomes or hide activity, thus threatening
      the integrity of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus
      Sony 2018) By manipulating transmitted data, adversaries may attempt to affect
      a business process, organizational understanding, and decision making.'
    title: Transmitted Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1565.002
    mappings:
    - d3f:T1565.002
    exact_mappings:
    - attack:T1565.002
    is_a: T1565
    class_uri: d3f:T1565.002
  T1565_003:
    name: T1565_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1565003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1565.003
    description: 'Adversaries may modify systems in order to manipulate the data as
      it is accessed and displayed to an end user, thus threatening the integrity
      of the data.(Citation: FireEye APT38 Oct 2018)(Citation: DOJ Lazarus Sony 2018)
      By manipulating runtime data, adversaries may attempt to affect a business process,
      organizational understanding, and decision making.'
    title: Runtime Data Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1565.003
    mappings:
    - d3f:T1565.003
    exact_mappings:
    - attack:T1565.003
    is_a: T1565
    class_uri: d3f:T1565.003
  T1566:
    name: T1566
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1566
    annotations:
      attack-id:
        tag: attack-id
        value: T1566
    description: Adversaries may send phishing messages to gain access to victim systems.
      All forms of phishing are electronically delivered social engineering. Phishing
      can be targeted, known as spearphishing. In spearphishing, a specific individual,
      company, or industry will be targeted by the adversary. More generally, adversaries
      can conduct non-targeted phishing, such as in mass malware spam campaigns.
    title: Phishing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1566
    exact_mappings:
    - attack:T1566
    is_a: InitialAccessTechnique
    class_uri: d3f:T1566
  T1566_001:
    name: T1566_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1566001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1566.001
    description: 'Adversaries may send spearphishing emails with a malicious attachment
      in an attempt to gain access to victim systems. Spearphishing attachment is
      a specific variant of spearphishing. Spearphishing attachment is different from
      other forms of spearphishing in that it employs the use of malware attached
      to an email. All forms of spearphishing are electronically delivered social
      engineering targeted at a specific individual, company, or industry. In this
      scenario, adversaries attach a file to the spearphishing email and usually rely
      upon [User Execution](https://attack.mitre.org/techniques/T1204) to gain execution.(Citation:
      Unit 42 DarkHydrus July 2018) Spearphishing may also involve social engineering
      techniques, such as posing as a trusted source.'
    title: Spearphishing Attachment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1566.001
    mappings:
    - d3f:T1566.001
    exact_mappings:
    - attack:T1566.001
    is_a: T1566
    class_uri: d3f:T1566.001
  T1566_002:
    name: T1566_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1566002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1566.002
    description: Adversaries may send spearphishing emails with a malicious link in
      an attempt to gain access to victim systems. Spearphishing with a link is a
      specific variant of spearphishing. It is different from other forms of spearphishing
      in that it employs the use of links to download malware contained in email,
      instead of attaching malicious files to the email itself, to avoid defenses
      that may inspect email attachments. Spearphishing may also involve social engineering
      techniques, such as posing as a trusted source.
    title: Spearphishing Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1566.002
    mappings:
    - d3f:T1566.002
    exact_mappings:
    - attack:T1566.002
    is_a: T1566
    class_uri: d3f:T1566.002
  T1566_003:
    name: T1566_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1566003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1566.003
    description: Adversaries may send spearphishing messages via third-party services
      in an attempt to gain access to victim systems. Spearphishing via service is
      a specific variant of spearphishing. It is different from other forms of spearphishing
      in that it employs the use of third party services rather than directly via
      enterprise email channels.
    title: Spearphishing via Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1566.003
    mappings:
    - d3f:T1566.003
    exact_mappings:
    - attack:T1566.003
    is_a: T1566
    class_uri: d3f:T1566.003
  T1566_004:
    name: T1566_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1566004
    annotations:
      attack-id:
        tag: attack-id
        value: T1566.004
    description: 'Adversaries may use voice communications to ultimately gain access
      to victim systems. Spearphishing voice is a specific variant of spearphishing.
      It is different from other forms of spearphishing in that is employs the use
      of manipulating a user into providing access to systems through a phone call
      or other forms of voice communications. Spearphishing frequently involves social
      engineering techniques, such as posing as a trusted source (ex: [Impersonation](https://attack.mitre.org/techniques/T1656))
      and/or creating a sense of urgency or alarm for the recipient.'
    title: Spearphishing Voice
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1566.004
    mappings:
    - d3f:T1566.004
    exact_mappings:
    - attack:T1566.004
    is_a: T1566
    class_uri: d3f:T1566.004
  T1567:
    name: T1567
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1567
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1567
    description: Adversaries may use an existing, legitimate external Web service
      to exfiltrate data rather than their primary command and control channel. Popular
      Web services acting as an exfiltration mechanism may give a significant amount
      of cover due to the likelihood that hosts within a network are already communicating
      with them prior to compromise. Firewall rules may also already exist to permit
      traffic to these services.
    title: Exfiltration Over Web Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1567
    exact_mappings:
    - attack:T1567
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1567
  T1567_001:
    name: T1567_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1567001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1567.001
    description: 'Adversaries may exfiltrate data to a code repository rather than
      over their primary command and control channel. Code repositories are often
      accessible via an API (ex: https://api.github.com). Access to these APIs are
      often over HTTPS, which gives the adversary an additional level of protection.'
    title: Exfiltration to Code Repository
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1567.001
    mappings:
    - d3f:T1567.001
    exact_mappings:
    - attack:T1567.001
    is_a: T1567
    class_uri: d3f:T1567.001
  T1567_002:
    name: T1567_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1567002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1567.002
    description: Adversaries may exfiltrate data to a cloud storage service rather
      than over their primary command and control channel. Cloud storage services
      allow for the storage, edit, and retrieval of data from a remote cloud storage
      server over the Internet.
    title: Exfiltration to Cloud Storage
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1567.002
    mappings:
    - d3f:T1567.002
    exact_mappings:
    - attack:T1567.002
    is_a: T1567
    class_uri: d3f:T1567.002
  T1567_003:
    name: T1567_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1567003
    annotations:
      attack-id:
        tag: attack-id
        value: T1567.003
    description: Adversaries may exfiltrate data to text storage sites instead of
      their primary command and control channel. Text storage sites, such as <code>pastebin[.]com</code>,
      are commonly used by developers to share code and other information.
    title: Exfiltration to Text Storage Sites
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1567.003
    mappings:
    - d3f:T1567.003
    exact_mappings:
    - attack:T1567.003
    is_a: T1567
    class_uri: d3f:T1567.003
  T1567_004:
    name: T1567_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1567004
    annotations:
      attack-id:
        tag: attack-id
        value: T1567.004
    description: 'Adversaries may exfiltrate data to a webhook endpoint rather than
      over their primary command and control channel. Webhooks are simple mechanisms
      for allowing a server to push data over HTTP/S to a client without the need
      for the client to continuously poll the server.(Citation: RedHat Webhooks) Many
      public and commercial services, such as Discord, Slack, and `webhook.site`,
      support the creation of webhook endpoints that can be used by other services,
      such as Github, Jira, or Trello.(Citation: Discord Intro to Webhooks) When changes
      happen in the linked services (such as pushing a repository update or modifying
      a ticket), these services will automatically post the data to the webhook endpoint
      for use by the consuming application.'
    title: Exfiltration Over Webhook
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1567.004
    mappings:
    - d3f:T1567.004
    exact_mappings:
    - attack:T1567.004
    is_a: T1567
    class_uri: d3f:T1567.004
  T1568:
    name: T1568
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1568
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1568
    description: Adversaries may dynamically establish connections to command and
      control infrastructure to evade common detections and remediations. This may
      be achieved by using malware that shares a common algorithm with the infrastructure
      the adversary uses to receive the malware's communications. These calculations
      can be used to dynamically adjust parameters such as the domain name, IP address,
      or port number the malware uses for command and control.
    title: Dynamic Resolution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1568
    exact_mappings:
    - attack:T1568
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1568
  T1568_001:
    name: T1568_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1568001
    annotations:
      attack-id:
        tag: attack-id
        value: T1568.001
    description: 'Adversaries may use Fast Flux DNS to hide a command and control
      channel behind an array of rapidly changing IP addresses linked to a single
      domain resolution. This technique uses a fully qualified domain name, with multiple
      IP addresses assigned to it which are swapped with high frequency, using a combination
      of round robin IP addressing and short Time-To-Live (TTL) for a DNS resource
      record.(Citation: MehtaFastFluxPt1)(Citation: MehtaFastFluxPt2)(Citation: Fast
      Flux - Welivesecurity)'
    title: Fast Flux DNS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1568.001
    mappings:
    - d3f:T1568.001
    exact_mappings:
    - attack:T1568.001
    is_a: T1568
    class_uri: d3f:T1568.001
  T1568_002:
    name: T1568_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1568002
    annotations:
      attack-id:
        tag: attack-id
        value: T1568.002
    description: 'Adversaries may make use of Domain Generation Algorithms (DGAs)
      to dynamically identify a destination domain for command and control traffic
      rather than relying on a list of static IP addresses or domains. This has the
      advantage of making it much harder for defenders to block, track, or take over
      the command and control channel, as there potentially could be thousands of
      domains that malware can check for instructions.(Citation: Cybereason Dissecting
      DGAs)(Citation: Cisco Umbrella DGA)(Citation: Unit 42 DGA Feb 2019)'
    title: Domain Generation Algorithms
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1568.002
    mappings:
    - d3f:T1568.002
    exact_mappings:
    - attack:T1568.002
    is_a: T1568
    class_uri: d3f:T1568.002
  T1568_003:
    name: T1568_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1568003
    annotations:
      attack-id:
        tag: attack-id
        value: T1568.003
    description: 'Adversaries may perform calculations on addresses returned in DNS
      results to determine which port and IP address to use for command and control,
      rather than relying on a predetermined port number or the actual returned IP
      address. A IP and/or port number calculation can be used to bypass egress filtering
      on a C2 channel.(Citation: Meyers Numbered Panda)'
    title: DNS Calculation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1568.003
    mappings:
    - d3f:T1568.003
    exact_mappings:
    - attack:T1568.003
    is_a: T1568
    class_uri: d3f:T1568.003
  T1569:
    name: T1569
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1569
    annotations:
      attack-id:
        tag: attack-id
        value: T1569
    description: This technique has been deprecated.
    title: System Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1569
    exact_mappings:
    - attack:T1569
    is_a: ExecutionTechnique
    class_uri: d3f:T1569
  T1569_001:
    name: T1569_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1569001
    annotations:
      attack-id:
        tag: attack-id
        value: T1569.001
    description: 'Adversaries may abuse launchctl to execute commands or programs.
      Launchctl interfaces with launchd, the service management framework for macOS.
      Launchctl supports taking subcommands on the command-line, interactively, or
      even redirected from standard input.(Citation: Launchctl Man)'
    title: Launchctl
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1569.001
    mappings:
    - d3f:T1569.001
    exact_mappings:
    - attack:T1569.001
    is_a: T1569
    class_uri: d3f:T1569.001
  T1569_002:
    name: T1569_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1569002
    annotations:
      attack-id:
        tag: attack-id
        value: T1569.002
    description: 'Adversaries may abuse the Windows service control manager to execute
      malicious commands or payloads. The Windows service control manager (<code>services.exe</code>)
      is an interface to manage and manipulate services.(Citation: Microsoft Service
      Control Manager) The service control manager is accessible to users via GUI
      components as well as system utilities such as <code>sc.exe</code> and [Net](https://attack.mitre.org/software/S0039).'
    title: Service Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1569.002
    mappings:
    - d3f:T1569.002
    exact_mappings:
    - attack:T1569.002
    is_a: T1569
    class_uri: d3f:T1569.002
  T1569_003:
    name: T1569_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1569003
    annotations:
      attack-id:
        tag: attack-id
        value: T1569.003
    description: Adversaries may abuse systemctl to execute commands or programs.
      Systemctl is the primary interface for systemd, the Linux init system and service
      manager. Typically invoked from a shell, Systemctl can also be integrated into
      scripts or applications.
    title: Systemctl
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1569.003
    mappings:
    - d3f:T1569.003
    exact_mappings:
    - attack:T1569.003
    is_a: T1569
    class_uri: d3f:T1569.003
  T1570:
    name: T1570
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1570
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1570
    description: Adversaries may transfer tools or other files between systems in
      a compromised environment. Once brought into the victim environment (i.e., [Ingress
      Tool Transfer](https://attack.mitre.org/techniques/T1105)) files may then be
      copied from one system to another to stage adversary tools or other files over
      the course of an operation.
    title: Lateral Tool Transfer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1570
    exact_mappings:
    - attack:T1570
    is_a: LateralMovementTechnique
    class_uri: d3f:T1570
  T1571:
    name: T1571
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1571
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1571
    description: 'Adversaries may communicate using a protocol and port pairing that
      are typically not associated. For example, HTTPS over port 8088(Citation: Symantec
      Elfin Mar 2019) or port 587(Citation: Fortinet Agent Tesla April 2018) as opposed
      to the traditional port 443. Adversaries may make changes to the standard port
      used by a protocol to bypass filtering or muddle analysis/parsing of network
      data.'
    title: Non-Standard Port
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1571
    exact_mappings:
    - attack:T1571
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1571
  T1572:
    name: T1572
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1572
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1572
    description: Adversaries may tunnel network communications to and from a victim
      system within a separate protocol to avoid detection/network filtering and/or
      enable access to otherwise unreachable systems. Tunneling involves explicitly
      encapsulating a protocol within another. This behavior may conceal malicious
      traffic by blending in with existing traffic and/or provide an outer layer of
      encryption (similar to a VPN). Tunneling could also enable routing of network
      packets that would otherwise not reach their intended destination, such as SMB,
      RDP, or other traffic that would be filtered by network appliances or not routed
      over the Internet.
    title: Protocol Tunneling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1572
    exact_mappings:
    - attack:T1572
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1572
  T1573:
    name: T1573
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1573
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1573
    description: Adversaries may employ an encryption algorithm to conceal command
      and control traffic rather than relying on any inherent protections provided
      by a communication protocol. Despite the use of a secure algorithm, these implementations
      may be vulnerable to reverse engineering if secret keys are encoded and/or generated
      within malware samples/configuration files.
    title: Encrypted Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Custom Command and Control Protocol
    - Custom Cryptographic Protocol
    - Multilayer Encryption
    mappings:
    - d3f:T1573
    exact_mappings:
    - attack:T1573
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1573
  T1573_001:
    name: T1573_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1573001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1573.001
    description: Adversaries may employ a known symmetric encryption algorithm to
      conceal command and control traffic rather than relying on any inherent protections
      provided by a communication protocol. Symmetric encryption algorithms use the
      same key for plaintext encryption and ciphertext decryption. Common symmetric
      encryption algorithms include AES, DES, 3DES, Blowfish, and RC4.
    title: Symmetric Cryptography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1573.001
    mappings:
    - d3f:T1573.001
    exact_mappings:
    - attack:T1573.001
    is_a: T1573
    class_uri: d3f:T1573.001
  T1573_002:
    name: T1573_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1573002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1573.002
    description: "Adversaries may employ a known asymmetric encryption algorithm to\
      \ conceal command and control traffic rather than relying on any inherent protections\
      \ provided by a communication protocol. Asymmetric cryptography, also known\
      \ as public key cryptography, uses a keypair per party: one public that can\
      \ be freely distributed, and one private. Due to how the keys are generated,\
      \ the sender encrypts data with the receiver\u2019s public key and the receiver\
      \ decrypts the data with their private key. This ensures that only the intended\
      \ recipient can read the encrypted data. Common public key encryption algorithms\
      \ include RSA and ElGamal."
    title: Asymmetric Cryptography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1573.002
    mappings:
    - d3f:T1573.002
    exact_mappings:
    - attack:T1573.002
    is_a: T1573
    class_uri: d3f:T1573.002
  T1574:
    name: T1574
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574
    annotations:
      attack-id:
        tag: attack-id
        value: T1574
    description: Adversaries may execute their own malicious payloads by hijacking
      the way operating systems run programs. Hijacking execution flow can be for
      the purposes of persistence, since this hijacked execution may reoccur over
      time. Adversaries may also use these mechanisms to elevate privileges or evade
      defenses, such as application control or other restrictions on execution.
    title: Hijack Execution Flow
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1574
    exact_mappings:
    - attack:T1574
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1574
  T1574_001:
    name: T1574_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.001
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the search order used to load DLLs. Windows systems use a common method to look
      for required DLLs to load into a program. (Citation: Microsoft Dynamic Link
      Library Search Order)(Citation: FireEye Hijacking July 2010) Hijacking DLL loads
      may be for the purpose of establishing persistence as well as elevating privileges
      and/or evading restrictions on file execution.'
    title: DLL
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.001
    mappings:
    - d3f:T1574.001
    exact_mappings:
    - attack:T1574.001
    is_a: T1574
    class_uri: d3f:T1574.001
  T1574_002:
    name: T1574_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.002
    description: Adversaries may execute their own malicious payloads by side-loading
      DLLs. Similar to [DLL Search Order Hijacking](https://attack.mitre.org/techniques/T1574/001),
      side-loading involves hijacking which DLL a program loads. But rather than just
      planting the DLL within the search order of a program then waiting for the victim
      application to be invoked, adversaries may directly side-load their payloads
      by planting then invoking a legitimate application that executes their payload(s).
    title: DLL Side-Loading
    comments:
    - This technique has been revoked by T1574.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.002
    mappings:
    - d3f:T1574.002
    exact_mappings:
    - attack:T1574.002
    is_a: T1574
    class_uri: d3f:T1574.002
  T1574_004:
    name: T1574_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.004
    description: Adversaries may execute their own payloads by placing a malicious
      dynamic library (dylib) with an expected name in a path a victim application
      searches at runtime. The dynamic loader will try to find the dylibs based on
      the sequential order of the search paths. Paths to dylibs may be prefixed with
      <code>@rpath</code>, which allows developers to use relative paths to specify
      an array of search paths used at runtime based on the location of the executable.  Additionally,
      if weak linking is used, such as the <code>LC_LOAD_WEAK_DYLIB</code> function,
      an application will still execute even if an expected dylib is not present.
      Weak linking enables developers to run an application on multiple macOS versions
      as new APIs are added.
    title: Dylib Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.004
    mappings:
    - d3f:T1574.004
    exact_mappings:
    - attack:T1574.004
    is_a: T1574
    class_uri: d3f:T1574.004
  T1574_005:
    name: T1574_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.005
    description: Adversaries may execute their own malicious payloads by hijacking
      the binaries used by an installer. These processes may automatically execute
      specific binaries as part of their functionality or to perform other actions.
      If the permissions on the file system directory containing a target binary,
      or permissions on the binary itself, are improperly set, then the target binary
      may be overwritten with another binary using user-level permissions and executed
      by the original process. If the original process and thread are running under
      a higher permissions level, then the replaced binary will also execute under
      higher-level permissions, which could include SYSTEM.
    title: Executable Installer File Permissions Weakness
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.005
    mappings:
    - d3f:T1574.005
    exact_mappings:
    - attack:T1574.005
    is_a: T1574
    class_uri: d3f:T1574.005
  T1574_006:
    name: T1574_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.006
    description: 'Adversaries may execute their own malicious payloads by hijacking
      environment variables the dynamic linker uses to load shared libraries. During
      the execution preparation phase of a program, the dynamic linker loads specified
      absolute paths of shared libraries from environment variables and files, such
      as <code>LD_PRELOAD</code> on Linux or <code>DYLD_INSERT_LIBRARIES</code> on
      macOS. Libraries specified in environment variables are loaded first, taking
      precedence over system libraries with the same function name.(Citation: Man
      LD.SO)(Citation: TLDP Shared Libraries)(Citation: Apple Doco Archive Dynamic
      Libraries) These variables are often used by developers to debug binaries without
      needing to recompile, deconflict mapped symbols, and implement custom functions
      without changing the original library.(Citation: Baeldung LD_PRELOAD)'
    title: Dynamic Linker Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.006
    mappings:
    - d3f:T1574.006
    exact_mappings:
    - attack:T1574.006
    is_a: T1574
    class_uri: d3f:T1574.006
  T1574_007:
    name: T1574_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.007
    description: Adversaries may execute their own malicious payloads by hijacking
      environment variables used to load libraries. The PATH environment variable
      contains a list of directories (User and System) that the OS searches sequentially
      through in search of the binary that was called from a script or the command
      line.
    title: Path Interception by PATH Environment Variable
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.007
    mappings:
    - d3f:T1574.007
    exact_mappings:
    - attack:T1574.007
    is_a: T1574
    class_uri: d3f:T1574.007
  T1574_008:
    name: T1574_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.008
    description: Adversaries may execute their own malicious payloads by hijacking
      the search order used to load other programs. Because some programs do not call
      other programs using the full path, adversaries may place their own file in
      the directory where the calling program is located, causing the operating system
      to launch their malicious software at the request of the calling program.
    title: Path Interception by Search Order Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.008
    mappings:
    - d3f:T1574.008
    exact_mappings:
    - attack:T1574.008
    is_a: T1574
    class_uri: d3f:T1574.008
  T1574_009:
    name: T1574_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574009
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.009
    description: Adversaries may execute their own malicious payloads by hijacking
      vulnerable file path references. Adversaries can take advantage of paths that
      lack surrounding quotations by placing an executable in a higher level directory
      within the path, so that Windows will choose the adversary's executable to launch.
    title: Path Interception by Unquoted Path
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.009
    mappings:
    - d3f:T1574.009
    exact_mappings:
    - attack:T1574.009
    is_a: T1574
    class_uri: d3f:T1574.009
  T1574_010:
    name: T1574_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.010
    description: Adversaries may execute their own malicious payloads by hijacking
      the binaries used by services. Adversaries may use flaws in the permissions
      of Windows services to replace the binary that is executed upon service start.
      These service processes may automatically execute specific binaries as part
      of their functionality or to perform other actions. If the permissions on the
      file system directory containing a target binary, or permissions on the binary
      itself are improperly set, then the target binary may be overwritten with another
      binary using user-level permissions and executed by the original process. If
      the original process and thread are running under a higher permissions level,
      then the replaced binary will also execute under higher-level permissions, which
      could include SYSTEM.
    title: Services File Permissions Weakness
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Service Registry Permissions Weakness
    mappings:
    - d3f:T1574.010
    exact_mappings:
    - attack:T1574.010
    is_a: T1574
    class_uri: d3f:T1574.010
  T1574_011:
    name: T1574_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.011
    description: 'Adversaries may execute their own malicious payloads by hijacking
      the Registry entries used by services. Adversaries may use flaws in the permissions
      for Registry keys related to services to redirect from the originally specified
      executable to one that they control, in order to launch their own code when
      a service starts. Windows stores local service configuration information in
      the Registry under <code>HKLM\SYSTEM\CurrentControlSet\Services</code>. The
      information stored under a service''s Registry keys can be manipulated to modify
      a service''s execution parameters through tools such as the service controller,
      sc.exe,  [PowerShell](https://attack.mitre.org/techniques/T1059/001), or [Reg](https://attack.mitre.org/software/S0075).
      Access to Registry keys is controlled through access control lists and user
      permissions. (Citation: Registry Key Security)(Citation: malware_hides_service)'
    title: Services Registry Permissions Weakness
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.011
    mappings:
    - d3f:T1574.011
    exact_mappings:
    - attack:T1574.011
    is_a: T1574
    class_uri: d3f:T1574.011
  T1574_012:
    name: T1574_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574012
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1574.012
    description: 'Adversaries may leverage the COR_PROFILER environment variable to
      hijack the execution flow of programs that load the .NET CLR. The COR_PROFILER
      is a .NET Framework feature which allows developers to specify an unmanaged
      (or external of .NET) profiling DLL to be loaded into each .NET process that
      loads the Common Language Runtime (CLR). These profilers are designed to monitor,
      troubleshoot, and debug managed code executed by the .NET CLR.(Citation: Microsoft
      Profiling Mar 2017)(Citation: Microsoft COR_PROFILER Feb 2013)'
    title: COR_PROFILER
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.012
    mappings:
    - d3f:T1574.012
    exact_mappings:
    - attack:T1574.012
    is_a: T1574
    class_uri: d3f:T1574.012
  T1574_013:
    name: T1574_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574013
    annotations:
      attack-id:
        tag: attack-id
        value: T1574.013
    description: 'Adversaries may abuse the <code>KernelCallbackTable</code> of a
      process to hijack its execution flow in order to run their own payloads.(Citation:
      Lazarus APT January 2022)(Citation: FinFisher exposed ) The <code>KernelCallbackTable</code>
      can be found in the Process Environment Block (PEB) and is initialized to an
      array of graphic functions available to a GUI process once <code>user32.dll</code>
      is loaded.(Citation: Windows Process Injection KernelCallbackTable)'
    title: KernelCallbackTable
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.013
    mappings:
    - d3f:T1574.013
    exact_mappings:
    - attack:T1574.013
    is_a: T1574
    class_uri: d3f:T1574.013
  T1574_014:
    name: T1574_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1574014
    annotations:
      attack-id:
        tag: attack-id
        value: T1574.014
    description: 'Adversaries may execute their own malicious payloads by hijacking
      how the .NET `AppDomainManager` loads assemblies. The .NET framework uses the
      `AppDomainManager` class to create and manage one or more isolated runtime environments
      (called application domains) inside a process to host the execution of .NET
      applications. Assemblies (`.exe` or `.dll` binaries compiled to run as .NET
      code) may be loaded into an application domain as executable code.(Citation:
      Microsoft App Domains)'
    title: AppDomainManager
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1574.014
    mappings:
    - d3f:T1574.014
    exact_mappings:
    - attack:T1574.014
    is_a: T1574
    class_uri: d3f:T1574.014
  T1575:
    name: T1575
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1575
    annotations:
      attack-id:
        tag: attack-id
        value: T1575
    description: "Adversaries may use Android\u2019s Native Development Kit (NDK)\
      \ to write native functions that can achieve execution of binaries or functions.\
      \ Like system calls on a traditional desktop operating system, native code achieves\
      \ execution on a lower level than normal Android SDK calls."
    title: Native API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1575
    exact_mappings:
    - attack:T1575
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileExecutionTechnique
    class_uri: d3f:T1575
  T1576:
    name: T1576
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1576
    annotations:
      attack-id:
        tag: attack-id
        value: T1576
    description: 'Adversaries may include functionality in malware that uninstalls
      the malicious application from the device. This can be achieved by:'
    title: Uninstall Malicious Application
    comments:
    - This technique has been revoked by T1630.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1630.001
    mappings:
    - d3f:T1576
    exact_mappings:
    - attack:T1576
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1576
  T1577:
    name: T1577
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1577
    annotations:
      attack-id:
        tag: attack-id
        value: T1577
    description: Adversaries may modify applications installed on a device to establish
      persistent access to a victim. These malicious modifications can be used to
      make legitimate applications carry out adversary tasks when these applications
      are in use.
    title: Compromise Application Executable
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1577
    exact_mappings:
    - attack:T1577
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1577
  T1578:
    name: T1578
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578
    annotations:
      attack-id:
        tag: attack-id
        value: T1578
    description: An adversary may attempt to modify a cloud account's compute service
      infrastructure to evade defenses. A modification to the compute service infrastructure
      can include the creation, deletion, or modification of one or more components
      such as compute instances, virtual machines, and snapshots.
    title: Modify Cloud Compute Infrastructure
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1578
    exact_mappings:
    - attack:T1578
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1578
  T1578_001:
    name: T1578_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578001
    annotations:
      attack-id:
        tag: attack-id
        value: T1578.001
    description: An adversary may create a snapshot or data backup within a cloud
      account to evade defenses. A snapshot is a point-in-time copy of an existing
      cloud compute component such as a virtual machine (VM), virtual hard drive,
      or volume. An adversary may leverage permissions to create a snapshot in order
      to bypass restrictions that prevent access to existing compute service infrastructure,
      unlike in [Revert Cloud Instance](https://attack.mitre.org/techniques/T1578/004)
      where an adversary may revert to a snapshot to evade detection and remove evidence
      of their presence.
    title: Create Snapshot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1578.001
    mappings:
    - d3f:T1578.001
    exact_mappings:
    - attack:T1578.001
    is_a: T1578
    class_uri: d3f:T1578.001
  T1578_002:
    name: T1578_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578002
    annotations:
      attack-id:
        tag: attack-id
        value: T1578.002
    description: 'An adversary may create a new instance or virtual machine (VM) within
      the compute service of a cloud account to evade defenses. Creating a new instance
      may allow an adversary to bypass firewall rules and permissions that exist on
      instances currently residing within an account. An adversary may [Create Snapshot](https://attack.mitre.org/techniques/T1578/001)
      of one or more volumes in an account, create a new instance, mount the snapshots,
      and then apply a less restrictive security policy to collect [Data from Local
      System](https://attack.mitre.org/techniques/T1005) or for [Remote Data Staging](https://attack.mitre.org/techniques/T1074/002).(Citation:
      Mandiant M-Trends 2020)'
    title: Create Cloud Instance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1578.002
    mappings:
    - d3f:T1578.002
    exact_mappings:
    - attack:T1578.002
    is_a: T1578
    class_uri: d3f:T1578.002
  T1578_003:
    name: T1578_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578003
    annotations:
      attack-id:
        tag: attack-id
        value: T1578.003
    description: An adversary may delete a cloud instance after they have performed
      malicious activities in an attempt to evade detection and remove evidence of
      their presence.  Deleting an instance or virtual machine can remove valuable
      forensic artifacts and other evidence of suspicious behavior if the instance
      is not recoverable.
    title: Delete Cloud Instance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1578.003
    mappings:
    - d3f:T1578.003
    exact_mappings:
    - attack:T1578.003
    is_a: T1578
    class_uri: d3f:T1578.003
  T1578_004:
    name: T1578_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578004
    annotations:
      attack-id:
        tag: attack-id
        value: T1578.004
    description: An adversary may revert changes made to a cloud instance after they
      have performed malicious activities in attempt to evade detection and remove
      evidence of their presence. In highly virtualized environments, such as cloud-based
      infrastructure, this may be accomplished by restoring virtual machine (VM) or
      data storage snapshots through the cloud management dashboard or cloud APIs.
    title: Revert Cloud Instance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1578.004
    mappings:
    - d3f:T1578.004
    exact_mappings:
    - attack:T1578.004
    is_a: T1578
    class_uri: d3f:T1578.004
  T1578_005:
    name: T1578_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1578005
    annotations:
      attack-id:
        tag: attack-id
        value: T1578.005
    description: "Adversaries may modify settings that directly affect the size, locations,\
      \ and resources available to cloud compute infrastructure in order to evade\
      \ defenses. These settings may include service quotas, subscription associations,\
      \ tenant-wide policies, or other configurations that impact available compute.\
      \ Such modifications may allow adversaries to abuse the victim\u2019s compute\
      \ resources to achieve their goals, potentially without affecting the execution\
      \ of running instances and/or revealing their activities to the victim."
    title: Modify Cloud Compute Configurations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1578.005
    mappings:
    - d3f:T1578.005
    exact_mappings:
    - attack:T1578.005
    is_a: T1578
    class_uri: d3f:T1578.005
  T1579:
    name: T1579
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1579
    annotations:
      attack-id:
        tag: attack-id
        value: T1579
    description: Adversaries may collect the keychain storage data from an iOS device
      to acquire credentials. Keychains are the built-in way for iOS to keep track
      of users' passwords and credentials for many services and features such as Wi-Fi
      passwords, websites, secure notes, certificates, private keys, and VPN credentials.
    title: Keychain
    comments:
    - This technique has been revoked by T1634.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1634.001
    mappings:
    - d3f:T1579
    exact_mappings:
    - attack:T1579
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1579
  T1580:
    name: T1580
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1580
    annotations:
      attack-id:
        tag: attack-id
        value: T1580
    description: An adversary may attempt to discover infrastructure and resources
      that are available within an infrastructure-as-a-service (IaaS) environment.
      This includes compute service resources such as instances, virtual machines,
      and snapshots as well as resources of other services including the storage and
      database services.
    title: Cloud Infrastructure Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1580
    exact_mappings:
    - attack:T1580
    is_a: DiscoveryTechnique
    class_uri: d3f:T1580
  T1581:
    name: T1581
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1581
    annotations:
      attack-id:
        tag: attack-id
        value: T1581
    description: "Adversaries may use a device\u2019s geographical location to limit\
      \ certain malicious behaviors. For example, malware operators may limit the\
      \ distribution of a second stage payload to certain geographic regions.(Citation:\
      \ Lookout eSurv)"
    title: Geofencing
    comments:
    - This technique has been revoked by T1627.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1627.001
    mappings:
    - d3f:T1581
    exact_mappings:
    - attack:T1581
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1581
  T1582:
    name: T1582
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1582
    annotations:
      attack-id:
        tag: attack-id
        value: T1582
    description: Adversaries may delete, alter, or send SMS messages without user
      authorization. This could be used to hide C2 SMS messages, spread malware, or
      various external effects.
    title: SMS Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1582
    exact_mappings:
    - attack:T1582
    is_a: ATTACKMobileImpactTechnique
    class_uri: d3f:T1582
  T1583:
    name: T1583
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583
    annotations:
      attack-id:
        tag: attack-id
        value: T1583
    description: 'Adversaries may buy, lease, rent, or obtain infrastructure that
      can be used during targeting. A wide variety of infrastructure exists for hosting
      and orchestrating adversary operations. Infrastructure solutions include physical
      or cloud servers, domains, and third-party web services.(Citation: TrendmicroHideoutsLease)
      Some infrastructure providers offer free trial periods, enabling infrastructure
      acquisition at limited to no cost.(Citation: Free Trial PurpleUrchin) Additionally,
      botnets are available for rent or purchase.'
    title: Acquire Infrastructure
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1583
    exact_mappings:
    - attack:T1583
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1583
  T1583_001:
    name: T1583_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583001
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.001
    description: Adversaries may acquire domains that can be used during targeting.
      Domain names are the human readable names used to represent one or more IP addresses.
      They can be purchased or, in some cases, acquired for free.
    title: Domains
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.001
    mappings:
    - d3f:T1583.001
    exact_mappings:
    - attack:T1583.001
    is_a: T1583
    class_uri: d3f:T1583.001
  T1583_002:
    name: T1583_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583002
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.002
    description: 'Adversaries may set up their own Domain Name System (DNS) servers
      that can be used during targeting. During post-compromise activity, adversaries
      may utilize DNS traffic for various tasks, including for Command and Control
      (ex: [Application Layer Protocol](https://attack.mitre.org/techniques/T1071)).
      Instead of hijacking existing DNS servers, adversaries may opt to configure
      and run their own DNS servers in support of operations.'
    title: DNS Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.002
    mappings:
    - d3f:T1583.002
    exact_mappings:
    - attack:T1583.002
    is_a: T1583
    class_uri: d3f:T1583.002
  T1583_003:
    name: T1583_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583003
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.003
    description: "Adversaries may rent Virtual Private Servers (VPSs)\_that can be\
      \ used during targeting. There exist a variety of cloud service providers that\
      \ will sell virtual machines/containers as a service. By utilizing a VPS, adversaries\
      \ can make it difficult to physically tie back operations to them. The use of\
      \ cloud infrastructure can also make it easier for adversaries to rapidly provision,\
      \ modify, and shut down their infrastructure."
    title: Virtual Private Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.003
    mappings:
    - d3f:T1583.003
    exact_mappings:
    - attack:T1583.003
    is_a: T1583
    class_uri: d3f:T1583.003
  T1583_004:
    name: T1583_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583004
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.004
    description: "Adversaries may buy, lease, rent, or obtain physical servers\_that\
      \ can be used during targeting. Use of servers allows an adversary to stage,\
      \ launch, and execute an operation. During post-compromise activity, adversaries\
      \ may utilize servers for various tasks, such as watering hole operations in\
      \ [Drive-by Compromise](https://attack.mitre.org/techniques/T1189), enabling\
      \ [Phishing](https://attack.mitre.org/techniques/T1566) operations, or facilitating\
      \ [Command and Control](https://attack.mitre.org/tactics/TA0011). Instead of\
      \ compromising a third-party [Server](https://attack.mitre.org/techniques/T1584/004)\
      \ or renting a [Virtual Private Server](https://attack.mitre.org/techniques/T1583/003),\
      \ adversaries may opt to configure and run their own servers in support of operations.\
      \ Free trial periods of cloud servers may also be abused.(Citation: Free Trial\
      \ PurpleUrchin)(Citation: Freejacked)"
    title: Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.004
    mappings:
    - d3f:T1583.004
    exact_mappings:
    - attack:T1583.004
    is_a: T1583
    class_uri: d3f:T1583.004
  T1583_005:
    name: T1583_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583005
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.005
    description: "Adversaries may buy, lease, or rent a network of compromised systems\_\
      that can be used during targeting. A botnet is a network of compromised systems\
      \ that can be instructed to perform coordinated tasks.(Citation: Norton Botnet)\
      \ Adversaries may purchase a subscription to use an existing botnet from a booter/stresser\
      \ service. With a botnet at their disposal, adversaries may perform follow-on\
      \ activity such as large-scale [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ or Distributed Denial of Service (DDoS).(Citation: Imperva DDoS for Hire)(Citation:\
      \ Krebs-Anna)(Citation: Krebs-Bazaar)(Citation: Krebs-Booter)"
    title: Botnet
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.005
    mappings:
    - d3f:T1583.005
    exact_mappings:
    - attack:T1583.005
    is_a: T1583
    class_uri: d3f:T1583.005
  T1583_006:
    name: T1583_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583006
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.006
    description: "Adversaries may register for web services\_that can be used during\
      \ targeting. A variety of popular websites exist for adversaries to register\
      \ for a web-based service that can be abused during later stages of the adversary\
      \ lifecycle, such as during Command and Control ([Web Service](https://attack.mitre.org/techniques/T1102)),\
      \ [Exfiltration Over Web Service](https://attack.mitre.org/techniques/T1567),\
      \ or [Phishing](https://attack.mitre.org/techniques/T1566). Using common services,\
      \ such as those offered by Google or Twitter, makes it easier for adversaries\
      \ to hide in expected noise.(Citation: FireEye APT29) By utilizing a web service,\
      \ adversaries can make it difficult to physically tie back operations to them."
    title: Web Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.006
    mappings:
    - d3f:T1583.006
    exact_mappings:
    - attack:T1583.006
    is_a: T1583
    class_uri: d3f:T1583.006
  T1583_007:
    name: T1583_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583007
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.007
    description: Adversaries may purchase and configure serverless cloud infrastructure,
      such as Cloudflare Workers or AWS Lambda functions, that can be used during
      targeting. By utilizing serverless infrastructure, adversaries can make it more
      difficult to attribute infrastructure used during operations back to them.
    title: Serverless
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.007
    mappings:
    - d3f:T1583.007
    exact_mappings:
    - attack:T1583.007
    is_a: T1583
    class_uri: d3f:T1583.007
  T1583_008:
    name: T1583_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1583008
    annotations:
      attack-id:
        tag: attack-id
        value: T1583.008
    description: "Adversaries may purchase online advertisements that can be abused\
      \ to distribute malware to victims. Ads can be purchased to plant as well as\
      \ favorably position artifacts in specific locations  online, such as prominently\
      \ placed within search engine results. These ads may make it more difficult\
      \ for users to distinguish between actual search results and advertisements.(Citation:\
      \ spamhaus-malvertising) Purchased ads may also target specific audiences using\
      \ the advertising network\u2019s capabilities, potentially further taking advantage\
      \ of the trust inherently given to search engines and popular websites."
    title: Malvertising
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1583.008
    mappings:
    - d3f:T1583.008
    exact_mappings:
    - attack:T1583.008
    is_a: T1583
    class_uri: d3f:T1583.008
  T1584:
    name: T1584
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584
    annotations:
      attack-id:
        tag: attack-id
        value: T1584
    description: 'Adversaries may compromise third-party infrastructure that can be
      used during targeting. Infrastructure solutions include physical or cloud servers,
      domains, network devices, and third-party web and DNS services. Instead of buying,
      leasing, or renting infrastructure an adversary may compromise infrastructure
      and use it during other phases of the adversary lifecycle.(Citation: Mandiant
      APT1)(Citation: ICANNDomainNameHijacking)(Citation: Talos DNSpionage Nov 2018)(Citation:
      FireEye EPS Awakens Part 2) Additionally, adversaries may compromise numerous
      machines to form a botnet they can leverage.'
    title: Compromise Infrastructure
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1584
    exact_mappings:
    - attack:T1584
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1584
  T1584_001:
    name: T1584_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584001
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.001
    description: 'Adversaries may hijack domains and/or subdomains that can be used
      during targeting. Domain registration hijacking is the act of changing the registration
      of a domain name without the permission of the original registrant.(Citation:
      ICANNDomainNameHijacking) Adversaries may gain access to an email account for
      the person listed as the owner of the domain. The adversary can then claim that
      they forgot their password in order to make changes to the domain registration.
      Other possibilities include social engineering a domain registration help desk
      to gain access to an account or taking advantage of renewal process gaps.(Citation:
      Krebs DNS Hijack 2019)'
    title: Domains
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.001
    mappings:
    - d3f:T1584.001
    exact_mappings:
    - attack:T1584.001
    is_a: T1584
    class_uri: d3f:T1584.001
  T1584_002:
    name: T1584_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584002
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.002
    description: 'Adversaries may compromise third-party DNS servers that can be used
      during targeting. During post-compromise activity, adversaries may utilize DNS
      traffic for various tasks, including for Command and Control (ex: [Application
      Layer Protocol](https://attack.mitre.org/techniques/T1071)). Instead of setting
      up their own DNS servers, adversaries may compromise third-party DNS servers
      in support of operations.'
    title: DNS Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.002
    mappings:
    - d3f:T1584.002
    exact_mappings:
    - attack:T1584.002
    is_a: T1584
    class_uri: d3f:T1584.002
  T1584_003:
    name: T1584_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584003
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.003
    description: 'Adversaries may compromise third-party Virtual Private Servers (VPSs)
      that can be used during targeting. There exist a variety of cloud service providers
      that will sell virtual machines/containers as a service. Adversaries may compromise
      VPSs purchased by third-party entities. By compromising a VPS to use as infrastructure,
      adversaries can make it difficult to physically tie back operations to themselves.(Citation:
      NSA NCSC Turla OilRig)'
    title: Virtual Private Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.003
    mappings:
    - d3f:T1584.003
    exact_mappings:
    - attack:T1584.003
    is_a: T1584
    class_uri: d3f:T1584.003
  T1584_004:
    name: T1584_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584004
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.004
    description: 'Adversaries may compromise third-party servers that can be used
      during targeting. Use of servers allows an adversary to stage, launch, and execute
      an operation. During post-compromise activity, adversaries may utilize servers
      for various tasks, including for Command and Control.(Citation: TrendMicro EarthLusca
      2022) Instead of purchasing a [Server](https://attack.mitre.org/techniques/T1583/004)
      or [Virtual Private Server](https://attack.mitre.org/techniques/T1583/003),
      adversaries may compromise third-party servers in support of operations.'
    title: Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.004
    mappings:
    - d3f:T1584.004
    exact_mappings:
    - attack:T1584.004
    is_a: T1584
    class_uri: d3f:T1584.004
  T1584_005:
    name: T1584_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584005
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.005
    description: "Adversaries may compromise numerous third-party systems to form\
      \ a botnet\_that can be used during targeting. A botnet is a network of compromised\
      \ systems that can be instructed to perform coordinated tasks.(Citation: Norton\
      \ Botnet) Instead of purchasing/renting a botnet from a booter/stresser service,\
      \ adversaries may build their own botnet by compromising numerous third-party\
      \ systems.(Citation: Imperva DDoS for Hire) Adversaries may also conduct a takeover\
      \ of an existing botnet, such as redirecting bots to adversary-controlled C2\
      \ servers.(Citation: Dell Dridex Oct 2015) With a botnet at their disposal,\
      \ adversaries may perform follow-on activity such as large-scale [Phishing](https://attack.mitre.org/techniques/T1566)\
      \ or Distributed Denial of Service (DDoS)."
    title: Botnet
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.005
    mappings:
    - d3f:T1584.005
    exact_mappings:
    - attack:T1584.005
    is_a: T1584
    class_uri: d3f:T1584.005
  T1584_006:
    name: T1584_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584006
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.006
    description: "Adversaries may compromise access to third-party web services\_\
      that can be used during targeting. A variety of popular websites exist for legitimate\
      \ users to register for web-based services, such as GitHub, Twitter, Dropbox,\
      \ Google, SendGrid, etc. Adversaries may try to take ownership of a legitimate\
      \ user's access to a web service and use that web service as infrastructure\
      \ in support of cyber operations. Such web services can be abused during later\
      \ stages of the adversary lifecycle, such as during Command and Control ([Web\
      \ Service](https://attack.mitre.org/techniques/T1102)), [Exfiltration Over Web\
      \ Service](https://attack.mitre.org/techniques/T1567), or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation:\
      \ Recorded Future Turla Infra 2020) Using common services, such as those offered\
      \ by Google or Twitter, makes it easier for adversaries to hide in expected\
      \ noise. By utilizing a web service, particularly when access is stolen from\
      \ legitimate users, adversaries can make it difficult to physically tie back\
      \ operations to them. Additionally, leveraging compromised web-based email services\
      \ may allow adversaries to leverage the trust associated with legitimate domains."
    title: Web Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.006
    mappings:
    - d3f:T1584.006
    exact_mappings:
    - attack:T1584.006
    is_a: T1584
    class_uri: d3f:T1584.006
  T1584_007:
    name: T1584_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584007
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.007
    description: Adversaries may compromise serverless cloud infrastructure, such
      as Cloudflare Workers or AWS Lambda functions, that can be used during targeting.
      By utilizing serverless infrastructure, adversaries can make it more difficult
      to attribute infrastructure used during operations back to them.
    title: Serverless
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.007
    mappings:
    - d3f:T1584.007
    exact_mappings:
    - attack:T1584.007
    is_a: T1584
    class_uri: d3f:T1584.007
  T1584_008:
    name: T1584_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1584008
    annotations:
      attack-id:
        tag: attack-id
        value: T1584.008
    description: Adversaries may compromise third-party network devices that can be
      used during targeting. Network devices, such as small office/home office (SOHO)
      routers, may be compromised where the adversary's ultimate goal is not [Initial
      Access](https://attack.mitre.org/tactics/TA0001) to that environment -- instead
      leveraging these devices to support additional targeting.
    title: Network Devices
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1584.008
    mappings:
    - d3f:T1584.008
    exact_mappings:
    - attack:T1584.008
    is_a: T1584
    class_uri: d3f:T1584.008
  T1585:
    name: T1585
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1585
    annotations:
      attack-id:
        tag: attack-id
        value: T1585
    description: 'Adversaries may create and cultivate accounts with services that
      can be used during targeting. Adversaries can create accounts that can be used
      to build a persona to further operations. Persona development consists of the
      development of public information, presence, history and appropriate affiliations.
      This development could be applied to social media, website, or other publicly
      available information that could be referenced and scrutinized for legitimacy
      over the course of an operation using that persona or identity.(Citation: NEWSCASTER2014)(Citation:
      BlackHatRobinSage)'
    title: Establish Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1585
    exact_mappings:
    - attack:T1585
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1585
  T1585_001:
    name: T1585_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1585001
    annotations:
      attack-id:
        tag: attack-id
        value: T1585.001
    description: 'Adversaries may create and cultivate social media accounts that
      can be used during targeting. Adversaries can create social media accounts that
      can be used to build a persona to further operations. Persona development consists
      of the development of public information, presence, history and appropriate
      affiliations.(Citation: NEWSCASTER2014)(Citation: BlackHatRobinSage)'
    title: Social Media Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1585.001
    mappings:
    - d3f:T1585.001
    exact_mappings:
    - attack:T1585.001
    is_a: T1585
    class_uri: d3f:T1585.001
  T1585_002:
    name: T1585_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1585002
    annotations:
      attack-id:
        tag: attack-id
        value: T1585.002
    description: "Adversaries may create email accounts that can be used during targeting.\
      \ Adversaries can use accounts created with email providers to further their\
      \ operations, such as leveraging them to conduct [Phishing for Information](https://attack.mitre.org/techniques/T1598)\
      \ or [Phishing](https://attack.mitre.org/techniques/T1566).(Citation: Mandiant\
      \ APT1) Establishing email accounts may also allow adversaries to abuse free\
      \ services \u2013 such as trial periods \u2013 to [Acquire Infrastructure](https://attack.mitre.org/techniques/T1583)\
      \ for follow-on purposes.(Citation: Free Trial PurpleUrchin)"
    title: Email Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1585.002
    mappings:
    - d3f:T1585.002
    exact_mappings:
    - attack:T1585.002
    is_a: T1585
    class_uri: d3f:T1585.002
  T1585_003:
    name: T1585_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1585003
    annotations:
      attack-id:
        tag: attack-id
        value: T1585.003
    description: 'Adversaries may create accounts with cloud providers that can be
      used during targeting. Adversaries can use cloud accounts to further their operations,
      including leveraging cloud storage services such as Dropbox, MEGA, Microsoft
      OneDrive, or AWS S3 buckets for [Exfiltration to Cloud Storage](https://attack.mitre.org/techniques/T1567/002)
      or to [Upload Tool](https://attack.mitre.org/techniques/T1608/002)s. Cloud accounts
      can also be used in the acquisition of infrastructure, such as [Virtual Private
      Server](https://attack.mitre.org/techniques/T1583/003)s or [Serverless](https://attack.mitre.org/techniques/T1583/007)
      infrastructure. Establishing cloud accounts may allow adversaries to develop
      sophisticated capabilities without managing their own servers.(Citation: Awake
      Security C2 Cloud)'
    title: Cloud Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1585.003
    mappings:
    - d3f:T1585.003
    exact_mappings:
    - attack:T1585.003
    is_a: T1585
    class_uri: d3f:T1585.003
  T1586:
    name: T1586
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1586
    annotations:
      attack-id:
        tag: attack-id
        value: T1586
    description: Adversaries may compromise accounts with services that can be used
      during targeting. For operations incorporating social engineering, the utilization
      of an online persona may be important. Rather than creating and cultivating
      accounts (i.e. [Establish Accounts](https://attack.mitre.org/techniques/T1585)),
      adversaries may compromise existing accounts. Utilizing an existing persona
      may engender a level of trust in a potential victim if they have a relationship,
      or knowledge of, the compromised persona.
    title: Compromise Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1586
    exact_mappings:
    - attack:T1586
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1586
  T1586_001:
    name: T1586_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1586001
    annotations:
      attack-id:
        tag: attack-id
        value: T1586.001
    description: Adversaries may compromise social media accounts that can be used
      during targeting. For operations incorporating social engineering, the utilization
      of an online persona may be important. Rather than creating and cultivating
      social media profiles (i.e. [Social Media Accounts](https://attack.mitre.org/techniques/T1585/001)),
      adversaries may compromise existing social media accounts. Utilizing an existing
      persona may engender a level of trust in a potential victim if they have a relationship,
      or knowledge of, the compromised persona.
    title: Social Media Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1586.001
    mappings:
    - d3f:T1586.001
    exact_mappings:
    - attack:T1586.001
    is_a: T1586
    class_uri: d3f:T1586.001
  T1586_002:
    name: T1586_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1586002
    annotations:
      attack-id:
        tag: attack-id
        value: T1586.002
    description: 'Adversaries may compromise email accounts that can be used during
      targeting. Adversaries can use compromised email accounts to further their operations,
      such as leveraging them to conduct [Phishing for Information](https://attack.mitre.org/techniques/T1598),
      [Phishing](https://attack.mitre.org/techniques/T1566), or large-scale spam email
      campaigns. Utilizing an existing persona with a compromised email account may
      engender a level of trust in a potential victim if they have a relationship
      with, or knowledge of, the compromised persona. Compromised email accounts can
      also be used in the acquisition of infrastructure (ex: [Domains](https://attack.mitre.org/techniques/T1583/001)).'
    title: Email Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1586.002
    mappings:
    - d3f:T1586.002
    exact_mappings:
    - attack:T1586.002
    is_a: T1586
    class_uri: d3f:T1586.002
  T1586_003:
    name: T1586_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1586003
    annotations:
      attack-id:
        tag: attack-id
        value: T1586.003
    description: 'Adversaries may compromise cloud accounts that can be used during
      targeting. Adversaries can use compromised cloud accounts to further their operations,
      including leveraging cloud storage services such as Dropbox, Microsoft OneDrive,
      or AWS S3 buckets for [Exfiltration to Cloud Storage](https://attack.mitre.org/techniques/T1567/002)
      or to [Upload Tool](https://attack.mitre.org/techniques/T1608/002)s. Cloud accounts
      can also be used in the acquisition of infrastructure, such as [Virtual Private
      Server](https://attack.mitre.org/techniques/T1583/003)s or [Serverless](https://attack.mitre.org/techniques/T1583/007)
      infrastructure. Compromising cloud accounts may allow adversaries to develop
      sophisticated capabilities without managing their own servers.(Citation: Awake
      Security C2 Cloud)'
    title: Cloud Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1586.003
    mappings:
    - d3f:T1586.003
    exact_mappings:
    - attack:T1586.003
    is_a: T1586
    class_uri: d3f:T1586.003
  T1587:
    name: T1587
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1587
    annotations:
      attack-id:
        tag: attack-id
        value: T1587
    description: 'Adversaries may build capabilities that can be used during targeting.
      Rather than purchasing, freely downloading, or stealing capabilities, adversaries
      may develop their own capabilities in-house. This is the process of identifying
      development requirements and building solutions such as malware, exploits, and
      self-signed certificates. Adversaries may develop capabilities to support their
      operations throughout numerous phases of the adversary lifecycle.(Citation:
      Mandiant APT1)(Citation: Kaspersky Sofacy)(Citation: Bitdefender StrongPity
      June 2020)(Citation: Talos Promethium June 2020)'
    title: Develop Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1587
    exact_mappings:
    - attack:T1587
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1587
  T1587_001:
    name: T1587_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1587001
    annotations:
      attack-id:
        tag: attack-id
        value: T1587.001
    description: 'Adversaries may develop malware and malware components that can
      be used during targeting. Building malicious software can include the development
      of payloads, droppers, post-compromise tools, backdoors (including backdoored
      images), packers, C2 protocols, and the creation of infected removable media.
      Adversaries may develop malware to support their operations, creating a means
      for maintaining control of remote machines, evading defenses, and executing
      post-compromise behaviors.(Citation: Mandiant APT1)(Citation: Kaspersky Sofacy)(Citation:
      ActiveMalwareEnergy)(Citation: FBI Flash FIN7 USB)'
    title: Malware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1587.001
    mappings:
    - d3f:T1587.001
    exact_mappings:
    - attack:T1587.001
    is_a: T1587
    class_uri: d3f:T1587.001
  T1587_002:
    name: T1587_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1587002
    annotations:
      attack-id:
        tag: attack-id
        value: T1587.002
    description: 'Adversaries may create self-signed code signing certificates that
      can be used during targeting. Code signing is the process of digitally signing
      executables and scripts to confirm the software author and guarantee that the
      code has not been altered or corrupted. Code signing provides a level of authenticity
      for a program from the developer and a guarantee that the program has not been
      tampered with.(Citation: Wikipedia Code Signing) Users and/or security tools
      may trust a signed piece of code more than an unsigned piece of code even if
      they don''t know who issued the certificate or who the author is.'
    title: Code Signing Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1587.002
    mappings:
    - d3f:T1587.002
    exact_mappings:
    - attack:T1587.002
    is_a: T1587
    class_uri: d3f:T1587.002
  T1587_003:
    name: T1587_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1587003
    annotations:
      attack-id:
        tag: attack-id
        value: T1587.003
    description: Adversaries may create self-signed SSL/TLS certificates that can
      be used during targeting. SSL/TLS certificates are designed to instill trust.
      They include information about the key, information about its owner's identity,
      and the digital signature of an entity that has verified the certificate's contents
      are correct. If the signature is valid, and the person examining the certificate
      trusts the signer, then they know they can use that key to communicate with
      its owner. In the case of self-signing, digital certificates will lack the element
      of trust associated with the signature of a third-party certificate authority
      (CA).
    title: Digital Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1587.003
    mappings:
    - d3f:T1587.003
    exact_mappings:
    - attack:T1587.003
    is_a: T1587
    class_uri: d3f:T1587.003
  T1587_004:
    name: T1587_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1587004
    annotations:
      attack-id:
        tag: attack-id
        value: T1587.004
    description: 'Adversaries may develop exploits that can be used during targeting.
      An exploit takes advantage of a bug or vulnerability in order to cause unintended
      or unanticipated behavior to occur on computer hardware or software. Rather
      than finding/modifying exploits from online or purchasing them from exploit
      vendors, an adversary may develop their own exploits.(Citation: NYTStuxnet)
      Adversaries may use information acquired via [Vulnerabilities](https://attack.mitre.org/techniques/T1588/006)
      to focus exploit development efforts. As part of the exploit development process,
      adversaries may uncover exploitable vulnerabilities through methods such as
      fuzzing and patch analysis.(Citation: Irongeek Sims BSides 2017)'
    title: Exploits
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1587.004
    mappings:
    - d3f:T1587.004
    exact_mappings:
    - attack:T1587.004
    is_a: T1587
    class_uri: d3f:T1587.004
  T1588:
    name: T1588
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588
    annotations:
      attack-id:
        tag: attack-id
        value: T1588
    description: Adversaries may buy and/or steal capabilities that can be used during
      targeting. Rather than developing their own capabilities in-house, adversaries
      may purchase, freely download, or steal them. Activities may include the acquisition
      of malware, software (including licenses), exploits, certificates, and information
      relating to vulnerabilities. Adversaries may obtain capabilities to support
      their operations throughout numerous phases of the adversary lifecycle.
    title: Obtain Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1588
    exact_mappings:
    - attack:T1588
    is_a: ResourceDevelopmentTechnique
    class_uri: d3f:T1588
  T1588_001:
    name: T1588_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588001
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.001
    description: Adversaries may buy, steal, or download malware that can be used
      during targeting. Malicious software can include payloads, droppers, post-compromise
      tools, backdoors, packers, and C2 protocols. Adversaries may acquire malware
      to support their operations, obtaining a means for maintaining control of remote
      machines, evading defenses, and executing post-compromise behaviors.
    title: Malware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.001
    mappings:
    - d3f:T1588.001
    exact_mappings:
    - attack:T1588.001
    is_a: T1588
    class_uri: d3f:T1588.001
  T1588_002:
    name: T1588_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588002
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.002
    description: 'Adversaries may buy, steal, or download software tools that can
      be used during targeting. Tools can be open or closed source, free or commercial.
      A tool can be used for malicious purposes by an adversary, but (unlike malware)
      were not intended to be used for those purposes (ex: [PsExec](https://attack.mitre.org/software/S0029)).
      Tool acquisition can involve the procurement of commercial software licenses,
      including for red teaming tools such as [Cobalt Strike](https://attack.mitre.org/software/S0154).
      Commercial software may be obtained through purchase, stealing licenses (or
      licensed copies of the software), or cracking trial versions.(Citation: Recorded
      Future Beacon 2019)'
    title: Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.002
    mappings:
    - d3f:T1588.002
    exact_mappings:
    - attack:T1588.002
    is_a: T1588
    class_uri: d3f:T1588.002
  T1588_003:
    name: T1588_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588003
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.003
    description: 'Adversaries may buy and/or steal code signing certificates that
      can be used during targeting. Code signing is the process of digitally signing
      executables and scripts to confirm the software author and guarantee that the
      code has not been altered or corrupted. Code signing provides a level of authenticity
      for a program from the developer and a guarantee that the program has not been
      tampered with.(Citation: Wikipedia Code Signing) Users and/or security tools
      may trust a signed piece of code more than an unsigned piece of code even if
      they don''t know who issued the certificate or who the author is.'
    title: Code Signing Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.003
    mappings:
    - d3f:T1588.003
    exact_mappings:
    - attack:T1588.003
    is_a: T1588
    class_uri: d3f:T1588.003
  T1588_004:
    name: T1588_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588004
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.004
    description: Adversaries may buy and/or steal SSL/TLS certificates that can be
      used during targeting. SSL/TLS certificates are designed to instill trust. They
      include information about the key, information about its owner's identity, and
      the digital signature of an entity that has verified the certificate's contents
      are correct. If the signature is valid, and the person examining the certificate
      trusts the signer, then they know they can use that key to communicate with
      its owner.
    title: Digital Certificates
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.004
    mappings:
    - d3f:T1588.004
    exact_mappings:
    - attack:T1588.004
    is_a: T1588
    class_uri: d3f:T1588.004
  T1588_005:
    name: T1588_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588005
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.005
    description: 'Adversaries may buy, steal, or download exploits that can be used
      during targeting. An exploit takes advantage of a bug or vulnerability in order
      to cause unintended or unanticipated behavior to occur on computer hardware
      or software. Rather than developing their own exploits, an adversary may find/modify
      exploits from online or purchase them from exploit vendors.(Citation: Exploit
      Database)(Citation: TempertonDarkHotel)(Citation: NationsBuying)'
    title: Exploits
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.005
    mappings:
    - d3f:T1588.005
    exact_mappings:
    - attack:T1588.005
    is_a: T1588
    class_uri: d3f:T1588.005
  T1588_006:
    name: T1588_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588006
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.006
    description: 'Adversaries may acquire information about vulnerabilities that can
      be used during targeting. A vulnerability is a weakness in computer hardware
      or software that can, potentially, be exploited by an adversary to cause unintended
      or unanticipated behavior to occur. Adversaries may find vulnerability information
      by searching open databases or gaining access to closed vulnerability databases.(Citation:
      National Vulnerability Database)'
    title: Vulnerabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.006
    mappings:
    - d3f:T1588.006
    exact_mappings:
    - attack:T1588.006
    is_a: T1588
    class_uri: d3f:T1588.006
  T1588_007:
    name: T1588_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1588007
    annotations:
      attack-id:
        tag: attack-id
        value: T1588.007
    description: 'Adversaries may obtain access to generative artificial intelligence
      tools, such as large language models (LLMs), to aid various techniques during
      targeting. These tools may be used to inform, bolster, and enable a variety
      of malicious tasks including conducting [Reconnaissance](https://attack.mitre.org/tactics/TA0043),
      creating basic scripts, assisting social engineering, and even developing payloads.(Citation:
      MSFT-AI)'
    title: Artificial Intelligence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1588.007
    mappings:
    - d3f:T1588.007
    exact_mappings:
    - attack:T1588.007
    is_a: T1588
    class_uri: d3f:T1588.007
  T1589:
    name: T1589
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1589
    annotations:
      attack-id:
        tag: attack-id
        value: T1589
    description: 'Adversaries may gather information about the victim''s identity
      that can be used during targeting. Information about identities may include
      a variety of details, including personal data (ex: employee names, email addresses,
      security question responses, etc.) as well as sensitive details such as credentials
      or multi-factor authentication (MFA) configurations.'
    title: Gather Victim Identity Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1589
    exact_mappings:
