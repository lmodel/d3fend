    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An operating system process, or system process, is a process running
      to perform operating system functions.
    title: Operating System Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
