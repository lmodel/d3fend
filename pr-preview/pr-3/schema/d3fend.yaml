  CramersV:
    name: CramersV
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CramersV
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
