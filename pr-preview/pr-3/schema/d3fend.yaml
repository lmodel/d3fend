  RemoteShellCommand:
    name: RemoteShellCommand
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RemoteShellCommand
    description: A remote shell command is a command sent from one computer to another
      to be executed on the remote computer.  One example of this, is through a command-line
      interface (CLI) like using Invoke-Command from PowerShell or a command sent
      through an ssh session. This class generalizes to all means of sending a command
      through an established protocol to control capabilities on a remote computer.
    title: Remote Shell Command
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Remote_Shell
    mappings:
