    class_uri: d3f:DigitalCamera
  DigitalDocument:
    name: DigitalDocument
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalDocument
    description: An digital document is any electronic media content (other than computer
      programs or system files) that is intended to be used in either an electronic
      form or as printed output.
    title: Digital Document
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalDocument
    close_mappings:
    - oscal:OscalDocument
    - spdx:SpdxDocument
    - unified_cyber_ontology:File
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalDocument
  DigitalEvent:
    name: DigitalEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalEvent
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A digital event represents an observable occurrence, action, or state
      change within digital systems, networks, or their interactions. These events
      are characterized by their impact on the confidentiality, integrity, availability,
      or functionality of digital resources, processes, identities, or communications.
      Digital events are essential units of information in cybersecurity, serving
      as the basis for detecting threats, analyzing anomalies, and orchestrating responses
      in complex, interconnected environments.
    title: Digital Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalEvent
    close_mappings:
    - unified_cyber_ontology:Action
    is_a: Event
    slots:
    - has-input
    - has-output
    class_uri: d3f:DigitalEvent
  DigitalEventRecord:
    name: DigitalEventRecord
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalEventRecord
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A digital event record is a structured representation of a digital
      event, encapsulating all relevant details about the occurrence for storage,
      analysis, and response. These records serve as the primary artifacts for cybersecurity
      operations, enabling threat detection, forensic investigations, and compliance
      reporting. Digital event records include metadata such as timestamps, origin,
      context, and associated resources, ensuring traceability and actionable intelligence
      in digital ecosystems.
    title: Digital Event Record
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalEventRecord
    is_a: Record
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalEventRecord
  DigitalFingerprint:
    name: DigitalFingerprint
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalFingerprint
    description: A digital signature uniquely identifies data and has the property
      that changing a single bit in the data will cause a completely different message
      digest to be generated.
    title: Digital Fingerprint
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/fingerprint
    - https://csrc.nist.gov/glossary/term/digital_fingerprint
    mappings:
    - d3f:DigitalFingerprint
    is_a: Identifier
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalFingerprint
  DigitalIdentity:
    name: DigitalIdentity
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalIdentity
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: 'The unique representation of a subject engaged in an online transaction.
      A digital identity is always unique in the context of a digital service, but
      does not necessarily need to uniquely identify the subject in all contexts.
      In other words, accessing a digital service may not mean that the subject''s
      real-life identity is known.  Note: There is no single, widely accepted definition
      for this term and context is important. This definition is specific to online
      transactions.'
    title: Digital Identity
    comments:
    - Variously describes or designates. Designation is not compete or definite without
      context. The representation generally can be identified by a unique identifier,
      though this may be private information.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://pages.nist.gov/800-63-3/sp800-63-3.html
    mappings:
    - d3f:DigitalIdentity
    close_mappings:
    - stix:Identity
    - unified_cyber_ontology:Identity
    is_a: DigitalInformation
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalIdentity
  DigitalImage:
    name: DigitalImage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalImage
    description: A digital image is a pixel-based visual representation stored in
      formats like JPEG or PNG, used for various digital applications.
    title: Digital Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalImage
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalImage
  DigitalInformation:
    name: DigitalInformation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalInformation
    description: Digital information is a broad category of encoded representations
      in digital form that convey meaning, instructions, or functionality.
    title: Digital Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalInformation
    is_a: DigitalArtifact
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalInformation
  DigitalInformationBearer:
    name: DigitalInformationBearer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalInformationBearer
    description: A digital information bearer is a physical or virtual entity that
      stores, transmits, or processes digital information.
    title: Digital Information Bearer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalInformationBearer
    is_a: DigitalArtifact
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalInformationBearer
  DigitalMedia:
    name: DigitalMedia
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalMedia
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Digital media refers to any communication media that operate in conjunction
      with various encoded machine-readable data formats.
    title: Digital Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalMedia
    is_a: DigitalInformation
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalMedia
  DigitalMessage:
    name: DigitalMessage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalMessage
    description: A discrete unit of digital communication created by a sender for
      one or more intended recipients. Encoded in an application-layer format, a digital
      message conveys semantics such as commands, data, or status and is transported
      inside lower-layer containers like network frames or packets.
    title: Digital Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Message_(computing)
    mappings:
    - d3f:DigitalMessage
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalMessage
  DigitalMultimedia:
    name: DigitalMultimedia
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalMultimedia
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Digital Multimedia refers to content that combines text, audio, images,
      animations, and video in a digital format for interactive applications.
    title: Digital Multimedia
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalMultimedia
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalMultimedia
  DigitalSignalProcessingApplication:
    name: DigitalSignalProcessingApplication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalSignalProcessingApplication
    annotations:
      synonym:
        tag: synonym
        value: DSP Application
    description: A Digital Signal Processing (DSP) application is a software system
      that ingests discrete-time or discrete-space signals (from sensors, ADCs, or
      files) and applies digital signal processing algorithms to analyze, transform,
      synthesize, or make decisions about those signals, often under real-time throughput
      and latency constraints. It encompasses capabilities such as filtering, spectral
      analysis, modulation/demodulation, channelization, synchronization, detection
      and estimation, compression, beamforming, and reconstruction, and spans domains
      including software-defined radio (e.g., waveform generation and physical-layer
      stacks), audio and speech, image and video, radar/sonar/LiDAR, biomedical signals,
      instrumentation, and control.
    title: Digital Signal Processing Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Digital_signal_processing
    mappings:
    - d3f:DigitalSignalProcessingApplication
    is_a: Application
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalSignalProcessingApplication
  DigitalSystem:
    name: DigitalSystem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalSystem
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A digital system is a group of interacting or interrelated digital
      artifacts that act according to a set of rules to form a unified whole. A digital
      system, surrounded and influenced by its environment, is described by its boundaries,
      structure and purpose and expressed in its functioning. Systems are the subjects
      of study of systems theory.
    title: Digital System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/System
    mappings:
    - d3f:DigitalSystem
    is_a: DigitalInformationBearer
    mixins:
    - System
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalSystem
  DigitalText:
    name: DigitalText
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalText
    description: Digital text is written content encoded in a digital format, allowing
      for storage, retrieval, and manipulation by electronic devices.
    title: Digital Text
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalText
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalText
  DigitalVideo:
    name: DigitalVideo
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DigitalVideo
    description: Digital video is an electronic representation of moving visual images
      (video) in the form of encoded digital data.
    title: Digital Video
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DigitalVideo
    is_a: DigitalMedia
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DigitalVideo
  DimensionReduction:
    name: DimensionReduction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DimensionReduction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-DR
      kb-article:
        tag: kb-article
        value: '## References O''Reilly Media. (n.d.). Chapter 7. Machine Learning
          and Security: Protecting Systems with Data and Algorithms. [Link](https://www.oreilly.com/library/view/machine-learning-and/9781492073048/ch07.html)'
    description: Dimensionality reduction is a key technique within unsupervised learning.
      It compresses the data by finding a smaller, different set of variables that
      capture what matters most in the original features, while minimizing the loss
      of information.
    title: Dimension Reduction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DimensionReduction
    is_a: UnsupervisedLearning
    class_uri: d3f:DimensionReduction
  DirectPhysicalLinkMapping:
    name: DirectPhysicalLinkMapping
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DirectPhysicalLinkMapping
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-DPLM
      synonym:
        tag: synonym
        value: Manual Physical Link Mapping
      kb-article:
        tag: kb-article
        value: '## How it works Direct Physical Link Mapping involves a manual process
          where a network engineer or administrator physically observes and documents
          the physical connections within the network infrastructure. ## Considerations
          * Constructing and maintaining physical topologies for extensive network'
    description: Direct physical link mapping creates a physical link map by direct
      observation and recording of the physical network links.
    title: Direct Physical Link Mapping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Transmission_medium
    mappings:
    - d3f:DirectPhysicalLinkMapping
    is_a: PhysicalLinkMapping
    class_uri: d3f:DirectPhysicalLinkMapping
  DirectionalNetworkLink:
    name: DirectionalNetworkLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DirectionalNetworkLink
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-DNL
      kb-article:
        tag: kb-article
        value: '## How it works Using a device such as a data diode, or otherwise
          enforcing unidirectional (one-way) network communication / data transfer,
          to physically prevent signals from traveling in the reverse direction. Unidirectional
          network link enforcement is a security measure used to separate control
          a'
    description: Enforce one-way network communication by preventing two-way communication.
    title: Directional Network Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:DirectionalNetworkLink
    is_a: NetworkIsolation
    class_uri: d3f:DirectionalNetworkLink
  Directory:
    name: Directory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Directory
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a directory is a file system cataloging structure which
      contains references to other computer files, and possibly other directories.
      On many computers, directories are known as folders, or drawers to provide some
      relevancy to a workbench or the traditional office file cabinet.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Directory_(computing)
    mappings:
    - d3f:Directory
    exact_mappings:
    - stix:Directory
    - unified_cyber_ontology:Directory
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Directory
  DirectoryService:
    name: DirectoryService
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DirectoryService
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, directory service or name service maps the names of
      network resources to their respective network addresses. It is a shared information
      infrastructure for locating, managing, administering and organizing everyday
      items and network resources, which can include volumes, folders, files, printers,
      users, groups, devices, telephone numbers and other objects. A directory service
      is a critical component of a network operating system. A directory server or
      name server is a server which provides such a service. Each resource on the
      network is considered an object by the directory server. Information about a
      particular resource is stored as a collection of attributes associated with
      that resource or object.
    title: Directory Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Directory_service
    mappings:
    - d3f:DirectoryService
    is_a: NetworkService
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
    class_uri: d3f:DirectoryService
  DisableRemoteAccess:
    name: DisableRemoteAccess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DisableRemoteAccess
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-DRA
      kb-article:
        tag: kb-article
        value: '## How It Works There are several different methods of achieving remote
          access restriction. This could include: time-based controls, just-in-time
          authorization, and deny-by-default controls. This can be done on a Windows
          machine by unchecking an "allow remote assistance" or checking the "don''t
          allo'
    description: Limiting access to a computing device which is not required through
      or from a non-organization-controlled network.
    title: Disable Remote Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.dragos.com/blog/industry-news/value-of-plc-key-switch-monitoring/#:~:text=Run%20mode%E2%80%94The%20controller%20is,in%20the%20Remote%20Program%20mode
    mappings:
    - d3f:DisableRemoteAccess
    related_mappings:
    - attack:T1114.003
    - attack:T1562.002
    - attack:T1562.003
    - attack:T1564.008
    broad_mappings:
    - d3f:T1114
    - d3f:T1562
    - d3f:T1564
    is_a: ApplicationConfigurationHardening
    class_uri: d3f:DisableRemoteAccess
  DiscoveryTechnique:
    name: DiscoveryTechnique
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DiscoveryTechnique
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
