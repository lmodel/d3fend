    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLinkErrorDisableEvent
    description: The device automatically disables the link in response to fault conditions
      such as excessive faults or signal degradation.
    title: Physical Link Error Disable Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PhysicalLinkErrorDisableEvent
    is_a: PhysicalLinkEvent
    slots:
    - has-input
    - has-output
