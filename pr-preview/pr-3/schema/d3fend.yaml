  TunnelEvent:
    name: TunnelEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TunnelEvent
    description: An event involving the establishment, usage, or termination of a
      network tunnel. Tunnels provide encapsulated communication pathways across various
      layers, enabling secure, isolated, or virtualized transport of data.
    title: Tunnel Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
