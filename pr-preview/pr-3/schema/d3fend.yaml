    title: Physical Link Disable Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PhysicalLinkDisableEvent
    is_a: PhysicalLinkEvent
    slots:
    - has-input
    - has-output
