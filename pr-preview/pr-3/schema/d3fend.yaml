  TrustedAttacker:
    name: TrustedAttacker
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TrustedAttacker
    description: An individual who exploits their authorized access to conduct unauthorized
      actions, either intentionally or through negligence.
    title: Trusted Attacker
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TrustedAttacker
    is_a: Attacker
    class_uri: d3f:TrustedAttacker
  TrustedLibrary:
    name: TrustedLibrary
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TrustedLibrary
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-TL
      kb-article:
        tag: kb-article
        value: '## How it Works Using a trusted library can reduce the chances of
          introducing errors compared to writing code from scratch. ## Considerations
          Note: This resource should not be considered a definitive or exhaustive
          coding guideline.'
    description: A trusted library is a collection of pre-verified and secure code
      modules or components that are used within software applications to perform
      specific functions. These libraries are considered reliable and have been vetted
      for security vulnerabilities, ensuring they do not introduce risks into the
      application.
    title: Trusted Library
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TrustedLibrary
    related_mappings:
    - attack:T1505.001
    broad_mappings:
    - d3f:T1505
    is_a: SourceCodeHardening
    class_uri: d3f:TrustedLibrary
  TrustedUserAttacker:
    name: TrustedUserAttacker
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TrustedUserAttacker
