    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Session
  SessionCookie:
    name: SessionCookie
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SessionCookie
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A session cookie, also known as an in-memory cookie, transient cookie
      or non-persistent cookie, exists only in temporary memory while the user navigates
      the website. Web browsers normally delete session cookies when the user closes
      the browser. Unlike other cookies, session cookies do not have an expiration
      date assigned to them, which is how the browser knows to treat them as session
      cookies.
    title: Session Cookie
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/HTTP_cookie
    - https://schema.ocsf.io/objects/http_cookie
    aliases:
    - In-memory Cookie
    - Non-persistent Cookie
    - Transient Cookie
    - Web Session Cookie
    mappings:
    - d3f:SessionCookie
    is_a: Credential
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SessionCookie
  SessionDurationAnalysis:
    name: SessionDurationAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SessionDurationAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
