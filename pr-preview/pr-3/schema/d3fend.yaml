    description: An event describing the activity or state of output devices, including
      sound cards, display adapters, or media controllers. These events relate to
      audio, video, or graphics functionality.
    title: Output Device Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
