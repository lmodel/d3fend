    exact_mappings:
    - attack:T1422.002
    is_a: T1422
    class_uri: d3f:T1422.002
  T1423:
    name: T1423
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1423
    annotations:
      attack-id:
        tag: attack-id
        value: T1423
    description: Adversaries may attempt to get a listing of services running on remote
      hosts, including those that may be vulnerable to remote software exploitation.
      Methods to acquire this information include port scans and vulnerability scans
      from the mobile device. This technique may take advantage of the mobile device's
      access to an internal enterprise network either through local connectivity or
      through a Virtual Private Network (VPN).
    title: Network Service Scanning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1423
    exact_mappings:
