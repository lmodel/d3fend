    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1064
  T1065:
    name: T1065
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1065
    annotations:
      attack-id:
        tag: attack-id
        value: T1065
    description: Adversaries may conduct C2 communications over a non-standard port
      to bypass proxies and firewalls that have been improperly configured.
    title: Uncommonly Used Port
    comments:
    - This technique has been revoked by T1571
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1571
    mappings:
    - d3f:T1065
    exact_mappings:
    - attack:T1065
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1065
  T1066:
    name: T1066
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1066
    annotations:
      attack-id:
        tag: attack-id
        value: T1066
    description: If a malicious tool is detected and quarantined or otherwise curtailed,
      an adversary may be able to determine why the malicious tool was detected (the
      indicator), modify the tool by removing the indicator, and use the updated version
      that is no longer detected by the target's defensive systems or subsequent targets
      that may use similar systems.
    title: Indicator Removal from Tools
    comments:
    - This technique has been revoked by T1027.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1027.005
    mappings:
    - d3f:T1066
    exact_mappings:
    - attack:T1066
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1066
  T1067:
    name: T1067
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1067
    annotations:
      attack-id:
        tag: attack-id
        value: T1067
    description: 'A bootkit is a malware variant that modifies the boot sectors of
      a hard drive, including the Master Boot Record (MBR) and Volume Boot Record
      (VBR). (Citation: MTrends 2016)'
    title: Bootkit
    comments:
    - This technique has been revoked by T1542.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1542.003
    mappings:
    - d3f:T1067
    exact_mappings:
    - attack:T1067
    is_a: PersistenceTechnique
    class_uri: d3f:T1067
  T1068:
    name: T1068
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1068
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1068
    description: Adversaries may exploit software vulnerabilities in an attempt to
      elevate privileges. Exploitation of a software vulnerability occurs when an
      adversary takes advantage of a programming error in a program, service, or within
      the operating system software or kernel itself to execute adversary-controlled
      code. Security constructs such as permission levels will often hinder access
      to information and use of certain techniques, so adversaries will likely need
      to perform privilege escalation to include use of software exploitation to circumvent
      those restrictions.
    title: Exploitation for Privilege Escalation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1068
    exact_mappings:
    - attack:T1068
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1068
  T1069:
    name: T1069
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1069
    annotations:
      attack-id:
        tag: attack-id
        value: T1069
    description: Adversaries may attempt to discover group and permission settings.
      This information can help adversaries determine which user accounts and groups
      are available, the membership of users in particular groups, and which users
      and groups have elevated permissions.
    title: Permission Groups Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1069
    exact_mappings:
    - attack:T1069
    is_a: DiscoveryTechnique
    class_uri: d3f:T1069
  T1069_001:
    name: T1069_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1069001
    annotations:
      attack-id:
        tag: attack-id
        value: T1069.001
    description: Adversaries may attempt to find local system groups and permission
      settings. The knowledge of local system permission groups can help adversaries
      determine which groups exist and which users belong to a particular group. Adversaries
      may use this information to determine which users have elevated permissions,
      such as the users found within the local administrators group.
    title: Local Groups
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1069.001
    mappings:
    - d3f:T1069.001
    exact_mappings:
    - attack:T1069.001
    is_a: T1069
    class_uri: d3f:T1069.001
  T1069_002:
    name: T1069_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1069002
    annotations:
      attack-id:
        tag: attack-id
        value: T1069.002
    description: Adversaries may attempt to find domain-level groups and permission
      settings. The knowledge of domain-level permission groups can help adversaries
      determine which groups exist and which users belong to a particular group. Adversaries
      may use this information to determine which users have elevated permissions,
      such as domain administrators.
    title: Domain Groups
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1069.002
    mappings:
    - d3f:T1069.002
    exact_mappings:
    - attack:T1069.002
    is_a: T1069
    class_uri: d3f:T1069.002
  T1069_003:
    name: T1069_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1069003
    annotations:
      attack-id:
        tag: attack-id
        value: T1069.003
    description: Adversaries may attempt to find cloud groups and permission settings.
      The knowledge of cloud permission groups can help adversaries determine the
      particular roles of users and groups within an environment, as well as which
      users are associated with a particular group.
    title: Cloud Groups
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1069.003
    mappings:
    - d3f:T1069.003
    exact_mappings:
    - attack:T1069.003
    is_a: T1069
    class_uri: d3f:T1069.003
  T1070:
    name: T1070
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070
    annotations:
      attack-id:
        tag: attack-id
        value: T1070
    description: "Adversaries may delete or modify artifacts generated within systems\
      \ to remove evidence of their presence or hinder defenses. Various artifacts\
      \ may be created by an adversary or something that can be attributed to an adversary\u2019\
      s actions. Typically these artifacts are used as defensive indicators related\
      \ to monitored events, such as strings from downloaded files, logs that are\
      \ generated from user actions, and other data analyzed by defenders. Location,\
      \ format, and type of artifact (such as command or login history) are often\
      \ specific to each platform."
    title: Indicator Removal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1070
    exact_mappings:
    - attack:T1070
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1070
  T1070_001:
    name: T1070_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.001
    description: 'Adversaries may clear Windows Event Logs to hide the activity of
      an intrusion. Windows Event Logs are a record of a computer''s alerts and notifications.
      There are three system-defined sources of events: System, Application, and Security,
      with five event types: Error, Warning, Information, Success Audit, and Failure
      Audit.'
    title: Clear Windows Event Logs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.001
    mappings:
    - d3f:T1070.001
    exact_mappings:
    - attack:T1070.001
    is_a: T1070
    class_uri: d3f:T1070.001
  T1070_002:
    name: T1070_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.002
    description: 'Adversaries may clear system logs to hide evidence of an intrusion.
      macOS and Linux both keep track of system or user-initiated actions via system
      logs. The majority of native system logging is stored under the <code>/var/log/</code>
      directory. Subfolders in this directory categorize logs by their related functions,
      such as:(Citation: Linux Logs)'
    title: Clear Linux or Mac System Logs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.002
    mappings:
    - d3f:T1070.002
    exact_mappings:
    - attack:T1070.002
    is_a: T1070
    class_uri: d3f:T1070.002
  T1070_003:
    name: T1070_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.003
    description: In addition to clearing system logs, an adversary may clear the command
      history of a compromised account to conceal the actions undertaken during an
      intrusion. Various command interpreters keep track of the commands users type
      in their terminal so that users can retrace what they've done.
    title: Clear Command History
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.003
    mappings:
    - d3f:T1070.003
    exact_mappings:
    - attack:T1070.003
    is_a: T1070
    class_uri: d3f:T1070.003
  T1070_004:
    name: T1070_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.004
    description: 'Adversaries may delete files left behind by the actions of their
      intrusion activity. Malware, tools, or other non-native files dropped or created
      on a system by an adversary (ex: [Ingress Tool Transfer](https://attack.mitre.org/techniques/T1105))
      may leave traces to indicate to what was done within a network and how. Removal
      of these files can occur during an intrusion, or as part of a post-intrusion
      process to minimize the adversary''s footprint.'
    title: File Deletion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.004
    mappings:
    - d3f:T1070.004
    exact_mappings:
    - attack:T1070.004
    is_a: T1070
    class_uri: d3f:T1070.004
  T1070_005:
    name: T1070_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.005
    description: 'Adversaries may remove share connections that are no longer useful
      in order to clean up traces of their operation. Windows shared drive and [SMB/Windows
      Admin Shares](https://attack.mitre.org/techniques/T1021/002) connections can
      be removed when no longer needed. [Net](https://attack.mitre.org/software/S0039)
      is an example utility that can be used to remove network share connections with
      the <code>net use \\system\share /delete</code> command. (Citation: Technet
      Net Use)'
    title: Network Share Connection Removal
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.005
    mappings:
    - d3f:T1070.005
    exact_mappings:
    - attack:T1070.005
    is_a: T1070
    class_uri: d3f:T1070.005
  T1070_006:
    name: T1070_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1070.006
    description: Adversaries may modify file time attributes to hide new or changes
      to existing files. Timestomping is a technique that modifies the timestamps
      of a file (the modify, access, create, and change times), often to mimic files
      that are in the same folder. This is done, for example, on files that have been
      modified or created by the adversary so that they do not appear conspicuous
      to forensic investigators or file analysis tools.
    title: Timestomp
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.006
    mappings:
    - d3f:T1070.006
    exact_mappings:
    - attack:T1070.006
    is_a: T1070
    class_uri: d3f:T1070.006
  T1070_007:
    name: T1070_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070007
    annotations:
      attack-id:
        tag: attack-id
        value: T1070.007
    description: Adversaries may clear or remove evidence of malicious network connections
      in order to clean up traces of their operations. Configuration settings as well
      as various artifacts that highlight connection history may be created on a system
      and/or in application logs from behaviors that require network connections,
      such as [Remote Services](https://attack.mitre.org/techniques/T1021) or [External
      Remote Services](https://attack.mitre.org/techniques/T1133). Defenders may use
      these artifacts to monitor or otherwise analyze network connections created
      by adversaries.
    title: Clear Network Connection History and Configurations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.007
    mappings:
    - d3f:T1070.007
    exact_mappings:
    - attack:T1070.007
    is_a: T1070
    class_uri: d3f:T1070.007
  T1070_008:
    name: T1070_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070008
    annotations:
      attack-id:
        tag: attack-id
        value: T1070.008
    description: Adversaries may modify mail and mail application data to remove evidence
      of their activity. Email applications allow users and other programs to export
      and delete mailbox data via command line tools or use of APIs. Mail application
      data can be emails, email metadata, or logs generated by the application or
      operating system, such as export requests.
    title: Clear Mailbox Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.008
    mappings:
    - d3f:T1070.008
    exact_mappings:
    - attack:T1070.008
    is_a: T1070
    class_uri: d3f:T1070.008
  T1070_009:
    name: T1070_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070009
    annotations:
      attack-id:
        tag: attack-id
        value: T1070.009
    description: 'Adversaries may clear artifacts associated with previously established
      persistence on a host system to remove evidence of their activity. This may
      involve various actions, such as removing services, deleting executables, [Modify
      Registry](https://attack.mitre.org/techniques/T1112), [Plist File Modification](https://attack.mitre.org/techniques/T1647),
      or other methods of cleanup to prevent defenders from collecting evidence of
      their persistent presence.(Citation: Cylance Dust Storm) Adversaries may also
      delete accounts previously created to maintain persistence (i.e. [Create Account](https://attack.mitre.org/techniques/T1136)).(Citation:
      Talos - Cisco Attack 2022)'
    title: Clear Persistence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.009
    mappings:
    - d3f:T1070.009
    exact_mappings:
    - attack:T1070.009
    is_a: T1070
    class_uri: d3f:T1070.009
  T1070_010:
    name: T1070_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1070010
    annotations:
      attack-id:
        tag: attack-id
        value: T1070.010
    description: Once a payload is delivered, adversaries may reproduce copies of
      the same malware on the victim system to remove evidence of their presence and/or
      avoid defenses. Copying malware payloads to new locations may also be combined
      with [File Deletion](https://attack.mitre.org/techniques/T1070/004) to cleanup
      older artifacts.
    title: Relocate Malware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1070.010
    mappings:
    - d3f:T1070.010
    exact_mappings:
    - attack:T1070.010
    is_a: T1070
    class_uri: d3f:T1070.010
  T1071:
    name: T1071
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1071
      pref-label:
        tag: pref-label
        value: Application Layer Protocol C2
    description: Adversaries may communicate using OSI application layer protocols
      to avoid detection/network filtering by blending in with existing traffic. Commands
      to the remote system, and often the results of those commands, will be embedded
      within the protocol traffic between the client and server.
    title: Application Layer Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1071
    exact_mappings:
    - attack:T1071
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1071
  T1071_001:
    name: T1071_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1071.001
    description: Adversaries may communicate using application layer protocols associated
      with web traffic to avoid detection/network filtering by blending in with existing
      traffic. Commands to the remote system, and often the results of those commands,
      will be embedded within the protocol traffic between the client and server.
    title: Web Protocols
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1071.001
    mappings:
    - d3f:T1071.001
    exact_mappings:
    - attack:T1071.001
    is_a: T1071
    class_uri: d3f:T1071.001
  T1071_002:
    name: T1071_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1071.002
    description: Adversaries may communicate using application layer protocols associated
      with transferring files to avoid detection/network filtering by blending in
      with existing traffic. Commands to the remote system, and often the results
      of those commands, will be embedded within the protocol traffic between the
      client and server.
    title: File Transfer Protocols
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1071.002
    mappings:
    - d3f:T1071.002
    exact_mappings:
    - attack:T1071.002
    is_a: T1071
    class_uri: d3f:T1071.002
  T1071_003:
    name: T1071_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1071.003
    description: Adversaries may communicate using application layer protocols associated
      with electronic mail delivery to avoid detection/network filtering by blending
      in with existing traffic. Commands to the remote system, and often the results
      of those commands, will be embedded within the protocol traffic between the
      client and server.
    title: Mail Protocols
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1071.003
    mappings:
    - d3f:T1071.003
    exact_mappings:
    - attack:T1071.003
    is_a: T1071
    class_uri: d3f:T1071.003
  T1071_004:
    name: T1071_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1071.004
    description: Adversaries may communicate using the Domain Name System (DNS) application
      layer protocol to avoid detection/network filtering by blending in with existing
      traffic. Commands to the remote system, and often the results of those commands,
      will be embedded within the protocol traffic between the client and server.
    title: DNS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1071.004
    mappings:
    - d3f:T1071.004
    exact_mappings:
    - attack:T1071.004
    is_a: T1071
    class_uri: d3f:T1071.004
  T1071_005:
    name: T1071_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1071005
    annotations:
      attack-id:
        tag: attack-id
        value: T1071.005
    description: Adversaries may communicate using publish/subscribe (pub/sub) application
      layer protocols to avoid detection/network filtering by blending in with existing
      traffic. Commands to the remote system, and often the results of those commands,
      will be embedded within the protocol traffic between the client and server.
    title: Publish/Subscribe Protocols
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1071.005
    mappings:
    - d3f:T1071.005
    exact_mappings:
    - attack:T1071.005
    is_a: T1071
    class_uri: d3f:T1071.005
  T1072:
    name: T1072
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1072
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1072
    description: 'Adversaries may gain access to and use centralized software suites
      installed within an enterprise to execute commands and move laterally through
      the network. Configuration management and software deployment applications may
      be used in an enterprise network or cloud environment for routine administration
      purposes. These systems may also be integrated into CI/CD pipelines. Examples
      of such solutions include: SCCM, HBSS, Altiris, AWS Systems Manager, Microsoft
      Intune, Azure Arc, and GCP Deployment Manager.'
    title: Software Deployment Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1072
    exact_mappings:
    - attack:T1072
    is_a: ExecutionTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1072
  T1073:
    name: T1073
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1073
    annotations:
      attack-id:
        tag: attack-id
        value: T1073
    description: 'Programs may specify DLLs that are loaded at runtime. Programs that
      improperly or vaguely specify a required DLL may be open to a vulnerability
      in which an unintended DLL is loaded. Side-loading vulnerabilities specifically
      occur when Windows Side-by-Side (WinSxS) manifests (Citation: MSDN Manifests)
      are not explicit enough about characteristics of the DLL to be loaded. Adversaries
      may take advantage of a legitimate program that is vulnerable to side-loading
      to load a malicious DLL. (Citation: Stewart 2014)'
    title: DLL Side-Loading
    comments:
    - This technique has been revoked by T1574.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1574.002
    mappings:
    - d3f:T1073
    exact_mappings:
    - attack:T1073
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1073
  T1074:
    name: T1074
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1074
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1074
    description: 'Adversaries may stage collected data in a central location or directory
      prior to Exfiltration. Data may be kept in separate files or combined into one
      file through techniques such as [Archive Collected Data](https://attack.mitre.org/techniques/T1560).
      Interactive command shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.(Citation: PWC Cloud
      Hopper April 2017)'
    title: Data Staged
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1074
    exact_mappings:
    - attack:T1074
    is_a: CollectionTechnique
    class_uri: d3f:T1074
  T1074_001:
    name: T1074_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1074001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1074.001
    description: Adversaries may stage collected data in a central location or directory
      on the local system prior to Exfiltration. Data may be kept in separate files
      or combined into one file through techniques such as [Archive Collected Data](https://attack.mitre.org/techniques/T1560).
      Interactive command shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.
    title: Local Data Staging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1074.001
    mappings:
    - d3f:T1074.001
    exact_mappings:
    - attack:T1074.001
    is_a: T1074
    class_uri: d3f:T1074.001
  T1074_002:
    name: T1074_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1074002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1074.002
    description: Adversaries may stage data collected from multiple systems in a central
      location or directory on one system prior to Exfiltration. Data may be kept
      in separate files or combined into one file through techniques such as [Archive
      Collected Data](https://attack.mitre.org/techniques/T1560). Interactive command
      shells may be used, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      and bash may be used to copy data into a staging location.
    title: Remote Data Staging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1074.002
    mappings:
    - d3f:T1074.002
    exact_mappings:
    - attack:T1074.002
    is_a: T1074
    class_uri: d3f:T1074.002
  T1075:
    name: T1075
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1075
    annotations:
      attack-id:
        tag: attack-id
        value: T1075
    description: Pass the hash (PtH) is a method of authenticating as a user without
      having access to the user's cleartext password. This method bypasses standard
      authentication steps that require a cleartext password, moving directly into
      the portion of the authentication that uses the password hash. In this technique,
      valid password hashes for the account being used are captured using a Credential
      Access technique. Captured hashes are used with PtH to authenticate as that
      user. Once authenticated, PtH may be used to perform actions on local or remote
      systems.
    title: Pass the Hash
    comments:
    - This technique has been revoked by T1550.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1550.002
    mappings:
    - d3f:T1075
    exact_mappings:
    - attack:T1075
    is_a: LateralMovementTechnique
    class_uri: d3f:T1075
  T1076:
    name: T1076
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1076
    annotations:
      attack-id:
        tag: attack-id
        value: T1076
    description: 'Remote desktop is a common feature in operating systems. It allows
      a user to log into an interactive session with a system desktop graphical user
      interface on a remote system. Microsoft refers to its implementation of the
      Remote Desktop Protocol (RDP) as Remote Desktop Services (RDS). (Citation: TechNet
      Remote Desktop Services) There are other implementations and third-party tools
      that provide graphical access [Remote Services](https://attack.mitre.org/techniques/T1021)
      similar to RDS.'
    title: Remote Desktop Protocol
    comments:
    - This technique has been revoked by T1021.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1021.001
    mappings:
    - d3f:T1076
    exact_mappings:
    - attack:T1076
    is_a: LateralMovementTechnique
    class_uri: d3f:T1076
  T1077:
    name: T1077
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1077
    annotations:
      attack-id:
        tag: attack-id
        value: T1077
    description: Windows systems have hidden network shares that are accessible only
      to administrators and provide the ability for remote file copy and other administrative
      functions. Example network shares include <code>C$</code>, <code>ADMIN$</code>,
      and <code>IPC$</code>.
    title: Windows Admin Shares
    comments:
    - This technique has been revoked by T1021.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1021.002
    mappings:
    - d3f:T1077
    exact_mappings:
    - attack:T1077
    is_a: LateralMovementTechnique
    class_uri: d3f:T1077
  T1078:
    name: T1078
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1078
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1078
    description: 'Adversaries may obtain and abuse credentials of existing accounts
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion. Compromised credentials may be used to bypass access controls
      placed on various resources on systems within the network and may even be used
      for persistent access to remote systems and externally available services, such
      as VPNs, Outlook Web Access, network devices, and remote desktop.(Citation:
      volexity_0day_sophos_FW) Compromised credentials may also grant an adversary
      increased privilege to specific systems or access to restricted areas of the
      network. Adversaries may choose not to use malware or tools in conjunction with
      the legitimate access those credentials provide to make it harder to detect
      their presence.'
    title: Valid Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1078
    exact_mappings:
    - attack:T1078
    is_a: DefenseEvasionTechnique
    mixins:
    - InitialAccessTechnique
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1078
  T1078_001:
    name: T1078_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1078001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1078.001
    description: 'Adversaries may obtain and abuse credentials of a default account
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion. Default accounts are those that are built-into an OS, such
      as the Guest or Administrator accounts on Windows systems. Default accounts
      also include default factory/provider set accounts on other types of systems,
      software, or devices, including the root user account in AWS and the default
      service account in Kubernetes.(Citation: Microsoft Local Accounts Feb 2019)(Citation:
      AWS Root User)(Citation: Threat Matrix for Kubernetes)'
    title: Default Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1078.001
    mappings:
    - d3f:T1078.001
    exact_mappings:
    - attack:T1078.001
    is_a: T1078
    class_uri: d3f:T1078.001
  T1078_002:
    name: T1078_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1078002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1078.002
    description: 'Adversaries may obtain and abuse credentials of a domain account
      as a means of gaining Initial Access, Persistence, Privilege Escalation, or
      Defense Evasion.(Citation: TechNet Credential Theft) Domain accounts are those
      managed by Active Directory Domain Services where access and permissions are
      configured across systems and services that are part of that domain. Domain
      accounts can cover users, administrators, and services.(Citation: Microsoft
      AD Accounts)'
    title: Domain Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1078.002
    mappings:
    - d3f:T1078.002
    exact_mappings:
    - attack:T1078.002
    is_a: T1078
    class_uri: d3f:T1078.002
  T1078_003:
    name: T1078_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1078003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1078.003
    description: Adversaries may obtain and abuse credentials of a local account as
      a means of gaining Initial Access, Persistence, Privilege Escalation, or Defense
      Evasion. Local accounts are those configured by an organization for use by users,
      remote support, services, or for administration on a single system or service.
    title: Local Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1078.003
    mappings:
    - d3f:T1078.003
    exact_mappings:
    - attack:T1078.003
    is_a: T1078
    class_uri: d3f:T1078.003
  T1078_004:
    name: T1078_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1078004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1078.004
    description: 'Valid accounts in cloud environments may allow adversaries to perform
      actions to achieve Initial Access, Persistence, Privilege Escalation, or Defense
      Evasion. Cloud accounts are those created and configured by an organization
      for use by users, remote support, services, or for administration of resources
      within a cloud service provider or SaaS application. Cloud Accounts can exist
      solely in the cloud; alternatively, they may be hybrid-joined between on-premises
      systems and the cloud through syncing or federation with other identity sources
      such as Windows Active Directory. (Citation: AWS Identity Federation)(Citation:
      Google Federating GC)(Citation: Microsoft Deploying AD Federation)'
    title: Cloud Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1078.004
    mappings:
    - d3f:T1078.004
    exact_mappings:
    - attack:T1078.004
    is_a: T1078
    class_uri: d3f:T1078.004
  T1079:
    name: T1079
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1079
    annotations:
      attack-id:
        tag: attack-id
        value: T1079
    description: An adversary performs C2 communications using multiple layers of
      encryption, typically (but not exclusively) tunneling a custom encryption scheme
      within a protocol encryption scheme such as HTTPS or SMTPS.
    title: Multilayer Encryption
    comments:
    - This technique has been revoked by T1573
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1573
    mappings:
    - d3f:T1079
    exact_mappings:
    - attack:T1079
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1079
  T1080:
    name: T1080
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1080
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1080
    description: Adversaries may deliver payloads to remote systems by adding content
      to shared storage locations, such as network drives or internal code repositories.
      Content stored on network drives or in other shared locations may be tainted
      by adding malicious programs, scripts, or exploit code to otherwise valid files.
      Once a user opens the shared tainted content, the malicious portion can be executed
      to run the adversary's code on a remote system. Adversaries may use tainted
      shared content to move laterally.
    title: Taint Shared Content
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1080
    exact_mappings:
    - attack:T1080
    is_a: LateralMovementTechnique
    class_uri: d3f:T1080
  T1081:
    name: T1081
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1081
    annotations:
      attack-id:
        tag: attack-id
        value: T1081
    description: Adversaries may search local file systems and remote file shares
      for files containing passwords. These can be files created by users to store
      their own credentials, shared credential stores for a group of individuals,
      configuration files containing passwords for a system or service, or source
      code/binary files containing embedded passwords.
    title: Credentials in Files
    comments:
    - This technique has been revoked by T1552.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1552.001
    mappings:
    - d3f:T1081
    exact_mappings:
    - attack:T1081
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1081
  T1082:
    name: T1082
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1082
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1082
    description: An adversary may attempt to get detailed information about the operating
      system and hardware, including version, patches, hotfixes, service packs, and
      architecture. Adversaries may use the information from [System Information Discovery](https://attack.mitre.org/techniques/T1082)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: System Information Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1082
    exact_mappings:
    - attack:T1082
    is_a: DiscoveryTechnique
    class_uri: d3f:T1082
  T1083:
    name: T1083
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1083
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1083
    description: Adversaries may enumerate files and directories or may search in
      specific locations of a host or network share for certain information within
      a file system. Adversaries may use the information from [File and Directory
      Discovery](https://attack.mitre.org/techniques/T1083) during automated discovery
      to shape follow-on behaviors, including whether or not the adversary fully infects
      the target and/or attempts specific actions.
    title: File and Directory Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1083
    exact_mappings:
    - attack:T1083
    is_a: DiscoveryTechnique
    class_uri: d3f:T1083
  T1084:
    name: T1084
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1084
    annotations:
      attack-id:
        tag: attack-id
        value: T1084
    description: 'Windows Management Instrumentation (WMI) can be used to install
      event filters, providers, consumers, and bindings that execute code when a defined
      event occurs. Adversaries may use the capabilities of WMI to subscribe to an
      event and execute arbitrary code when that event occurs, providing persistence
      on a system. Adversaries may attempt to evade detection of this technique by
      compiling WMI scripts into Windows Management Object (MOF) files (.mof extension).
      (Citation: Dell WMI Persistence) Examples of events that may be subscribed to
      are the wall clock time or the computer''s uptime. (Citation: Kazanciyan 2014)
      Several threat groups have reportedly used this technique to maintain persistence.
      (Citation: Mandiant M-Trends 2015)'
    title: Windows Management Instrumentation Event Subscription
    comments:
    - This technique has been revoked by T1546.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.003
    mappings:
    - d3f:T1084
    exact_mappings:
    - attack:T1084
    is_a: PersistenceTechnique
    class_uri: d3f:T1084
  T1085:
    name: T1085
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1085
    annotations:
      attack-id:
        tag: attack-id
        value: T1085
    description: The rundll32.exe program can be called to execute an arbitrary binary.
      Adversaries may take advantage of this functionality to proxy execution of code
      to avoid triggering security tools that may not monitor execution of the rundll32.exe
      process because of whitelists or false positives from Windows using rundll32.exe
      for normal operations.
    title: Rundll32
    comments:
    - This technique has been revoked by T1218.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.011
    mappings:
    - d3f:T1085
    exact_mappings:
    - attack:T1085
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1085
  T1086:
    name: T1086
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1086
    annotations:
      attack-id:
        tag: attack-id
        value: T1086
    description: 'PowerShell is a powerful interactive command-line interface and
      scripting environment included in the Windows operating system. (Citation: TechNet
      PowerShell) Adversaries can use PowerShell to perform a number of actions, including
      discovery of information and execution of code. Examples include the Start-Process
      cmdlet which can be used to run an executable and the Invoke-Command cmdlet
      which runs a command locally or on a remote computer.'
    title: PowerShell
    comments:
    - This technique has been revoked by T1059.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1059.001
    mappings:
    - d3f:T1086
    exact_mappings:
    - attack:T1086
    is_a: ExecutionTechnique
    class_uri: d3f:T1086
  T1087:
    name: T1087
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1087
    annotations:
      attack-id:
        tag: attack-id
        value: T1087
    description: Adversaries may attempt to get a listing of valid accounts, usernames,
      or email addresses on a system or within a compromised environment. This information
      can help adversaries determine which accounts exist, which can aid in follow-on
      behavior such as brute-forcing, spear-phishing attacks, or account takeovers
      (e.g., [Valid Accounts](https://attack.mitre.org/techniques/T1078)).
    title: Account Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1136
    mappings:
    - d3f:T1087
    exact_mappings:
    - attack:T1087
    is_a: DiscoveryTechnique
    class_uri: d3f:T1087
  T1087_001:
    name: T1087_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1087001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1087.001
    description: Adversaries may attempt to get a listing of local system accounts.
      This information can help adversaries determine which local accounts exist on
      a system to aid in follow-on behavior.
    title: Local Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1087.001
    mappings:
    - d3f:T1087.001
    exact_mappings:
    - attack:T1087.001
    is_a: T1087
    class_uri: d3f:T1087.001
  T1087_002:
    name: T1087_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1087002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1087.002
    description: Adversaries may attempt to get a listing of domain accounts. This
      information can help adversaries determine which domain accounts exist to aid
      in follow-on behavior such as targeting specific accounts which possess particular
      privileges.
    title: Domain Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1087.002
    mappings:
    - d3f:T1087.002
    exact_mappings:
    - attack:T1087.002
    is_a: T1087
    class_uri: d3f:T1087.002
  T1087_003:
    name: T1087_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1087003
    annotations:
      attack-id:
        tag: attack-id
        value: T1087.003
    description: 'Adversaries may attempt to get a listing of email addresses and
      accounts. Adversaries may try to dump Exchange address lists such as global
      address lists (GALs).(Citation: Microsoft Exchange Address Lists)'
    title: Email Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1087.003
    mappings:
    - d3f:T1087.003
    exact_mappings:
    - attack:T1087.003
    is_a: T1087
    class_uri: d3f:T1087.003
  T1087_004:
    name: T1087_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1087004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1087.004
    description: Adversaries may attempt to get a listing of cloud accounts. Cloud
      accounts are those created and configured by an organization for use by users,
      remote support, services, or for administration of resources within a cloud
      service provider or SaaS application.
    title: Cloud Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1087.004
    mappings:
    - d3f:T1087.004
    exact_mappings:
    - attack:T1087.004
    is_a: T1087
    class_uri: d3f:T1087.004
  T1088:
    name: T1088
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1088
    annotations:
      attack-id:
        tag: attack-id
        value: T1088
    description: 'Windows User Account Control (UAC) allows a program to elevate its
      privileges to perform a task under administrator-level permissions by prompting
      the user for confirmation. The impact to the user ranges from denying the operation
      under high enforcement to allowing the user to perform the action if they are
      in the local administrators group and click through the prompt or allowing them
      to enter an administrator password to complete the action. (Citation: TechNet
      How UAC Works)'
    title: Bypass User Account Control
    comments:
    - This technique has been revoked by T1548.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1548.002
    mappings:
    - d3f:T1088
    exact_mappings:
    - attack:T1088
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1088
  T1089:
    name: T1089
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1089
    annotations:
      attack-id:
        tag: attack-id
        value: T1089
    description: Adversaries may disable security tools to avoid possible detection
      of their tools and activities. This can take the form of killing security software
      or event logging processes, deleting Registry keys so that tools do not start
      at run time, or other methods to interfere with security scanning or event reporting.
    title: Disabling Security Tools
    comments:
    - This technique has been revoked by T1562.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1562.001
    mappings:
    - d3f:T1089
    exact_mappings:
    - attack:T1089
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1089
  T1090:
    name: T1090
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1090
    annotations:
      attack-id:
        tag: attack-id
        value: T1090
    description: 'Adversaries may use a connection proxy to direct network traffic
      between systems or act as an intermediary for network communications to a command
      and control server to avoid direct connections to their infrastructure. Many
      tools exist that enable traffic redirection through proxies or port redirection,
      including [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy, and ZXPortMap.
      (Citation: Trend Micro APT Attack Tools) Adversaries use these types of proxies
      to manage command and control communications, reduce the number of simultaneous
      outbound network connections, provide resiliency in the face of connection loss,
      or to ride over existing trusted communications paths between victims to avoid
      suspicion. Adversaries may chain together multiple proxies to further disguise
      the source of malicious traffic.'
    title: Proxy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1090
    exact_mappings:
    - attack:T1090
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1090
  T1090_001:
    name: T1090_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1090001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1090.001
    description: 'Adversaries may use an internal proxy to direct command and control
      traffic between two or more systems in a compromised environment. Many tools
      exist that enable traffic redirection through proxies or port redirection, including
      [HTRAN](https://attack.mitre.org/software/S0040), ZXProxy, and ZXPortMap. (Citation:
      Trend Micro APT Attack Tools) Adversaries use internal proxies to manage command
      and control communications inside a compromised environment, to reduce the number
      of simultaneous outbound network connections, to provide resiliency in the face
      of connection loss, or to ride over existing trusted communications paths between
      infected systems to avoid suspicion. Internal proxy connections may use common
      peer-to-peer (p2p) networking protocols, such as SMB, to better blend in with
      the environment.'
    title: Internal Proxy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1090.001
    mappings:
    - d3f:T1090.001
    exact_mappings:
    - attack:T1090.001
    is_a: T1090
    class_uri: d3f:T1090.001
  T1090_002:
    name: T1090_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1090002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1090.002
    description: 'Adversaries may use an external proxy to act as an intermediary
      for network communications to a command and control server to avoid direct connections
      to their infrastructure. Many tools exist that enable traffic redirection through
      proxies or port redirection, including [HTRAN](https://attack.mitre.org/software/S0040),
      ZXProxy, and ZXPortMap. (Citation: Trend Micro APT Attack Tools) Adversaries
      use these types of proxies to manage command and control communications, to
      provide resiliency in the face of connection loss, or to ride over existing
      trusted communications paths to avoid suspicion.'
    title: External Proxy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1090.002
    mappings:
    - d3f:T1090.002
    exact_mappings:
    - attack:T1090.002
    is_a: T1090
    class_uri: d3f:T1090.002
  T1090_003:
    name: T1090_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1090003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1090.003
    description: Adversaries may chain together multiple proxies to disguise the source
      of malicious traffic. Typically, a defender will be able to identify the last
      proxy traffic traversed before it enters their network; the defender may or
      may not be able to identify any previous proxies before the last-hop proxy.
      This technique makes identifying the original source of the malicious traffic
      even more difficult by requiring the defender to trace malicious traffic through
      several proxies to identify its source.
    title: Multi-hop Proxy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1090.003
    mappings:
    - d3f:T1090.003
    exact_mappings:
    - attack:T1090.003
    is_a: T1090
    class_uri: d3f:T1090.003
  T1090_004:
    name: T1090_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1090004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1090.004
    description: 'Adversaries may take advantage of routing schemes in Content Delivery
      Networks (CDNs) and other services which host multiple domains to obfuscate
      the intended destination of HTTPS traffic or traffic tunneled through HTTPS.
      (Citation: Fifield Blocking Resistent Communication through domain fronting
      2015) Domain fronting involves using different domain names in the SNI field
      of the TLS header and the Host field of the HTTP header. If both domains are
      served from the same CDN, then the CDN may route to the address specified in
      the HTTP header after unwrapping the TLS header. A variation of the the technique,
      "domainless" fronting, utilizes a SNI field that is left blank; this may allow
      the fronting to work even when the CDN attempts to validate that the SNI and
      HTTP Host fields match (if the blank SNI fields are ignored).'
    title: Domain Fronting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1090.004
    mappings:
    - d3f:T1090.004
    exact_mappings:
    - attack:T1090.004
    is_a: T1090
    class_uri: d3f:T1090.004
  T1091:
    name: T1091
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1091
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1091
    description: Adversaries may move onto systems, possibly those on disconnected
      or air-gapped networks, by copying malware to removable media and taking advantage
      of Autorun features when the media is inserted into a system and executes. In
      the case of Lateral Movement, this may occur through modification of executable
      files stored on removable media or by copying malware and renaming it to look
      like a legitimate file to trick users into executing it on a separate system.
      In the case of Initial Access, this may occur through manual manipulation of
      the media, modification of systems used to initially format the media, or modification
      to the media's firmware itself.
    title: Replication Through Removable Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1091
    exact_mappings:
    - attack:T1091
    is_a: InitialAccessTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1091
  T1092:
    name: T1092
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1092
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1092
    description: 'Adversaries can perform command and control between compromised
      hosts on potentially disconnected networks using removable media to transfer
      commands from system to system.(Citation: ESET Sednit USBStealer 2014) Both
      systems would need to be compromised, with the likelihood that an Internet-connected
      system was compromised first and the second through lateral movement by [Replication
      Through Removable Media](https://attack.mitre.org/techniques/T1091). Commands
      and files would be relayed from the disconnected system to the Internet-connected
      system to which the adversary has direct access.'
    title: Communication Through Removable Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1092
    exact_mappings:
    - attack:T1092
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1092
  T1093:
    name: T1093
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1093
    annotations:
      attack-id:
        tag: attack-id
        value: T1093
    description: 'Process hollowing occurs when a process is created in a suspended
      state then its memory is unmapped and replaced with malicious code. Similar
      to [Process Injection](https://attack.mitre.org/techniques/T1055), execution
      of the malicious code is masked under a legitimate process and may evade defenses
      and detection analysis. (Citation: Leitch Hollowing) (Citation: Elastic Process
      Injection July 2017)'
    title: Process Hollowing
    comments:
    - This technique has been revoked by T1055.012
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1055.012
    mappings:
    - d3f:T1093
    exact_mappings:
    - attack:T1093
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1093
  T1094:
    name: T1094
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1094
    annotations:
      attack-id:
        tag: attack-id
        value: T1094
    description: Adversaries may communicate using a custom command and control protocol
      instead of encapsulating commands/data in an existing [Application Layer Protocol](https://attack.mitre.org/techniques/T1071).
      Implementations include mimicking well-known protocols or developing custom
      protocols (including raw sockets) on top of fundamental protocols provided by
      TCP/IP/another standard network stack.
    title: Custom Command and Control Protocol
    comments:
    - This technique has been revoked by T1095
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1095
    mappings:
    - d3f:T1094
    exact_mappings:
    - attack:T1094
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1094
  T1095:
    name: T1095
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1095
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1095
    description: 'Adversaries may use an OSI non-application layer protocol for communication
      between host and C2 server or among infected hosts within a network. The list
      of possible protocols is extensive.(Citation: Wikipedia OSI) Specific examples
      include use of network layer protocols, such as the Internet Control Message
      Protocol (ICMP), transport layer protocols, such as the User Datagram Protocol
      (UDP), session layer protocols, such as Socket Secure (SOCKS), as well as redirected/tunneled
      protocols, such as Serial over LAN (SOL).'
    title: Non-Application Layer Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1095
    exact_mappings:
    - attack:T1095
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1095
  T1096:
    name: T1096
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1096
    annotations:
      attack-id:
        tag: attack-id
        value: T1096
    description: 'Every New Technology File System (NTFS) formatted partition contains
      a Master File Table (MFT) that maintains a record for every file/directory on
      the partition. (Citation: SpectorOps Host-Based Jul 2017) Within MFT entries
      are file attributes, (Citation: Microsoft NTFS File Attributes Aug 2010) such
      as Extended Attributes (EA) and Data [known as Alternate Data Streams (ADSs)
      when more than one Data attribute is present], that can be used to store arbitrary
      data (and even complete files). (Citation: SpectorOps Host-Based Jul 2017) (Citation:
      Microsoft File Streams) (Citation: MalwareBytes ADS July 2015) (Citation: Microsoft
      ADS Mar 2014)'
    title: NTFS File Attributes
    comments:
    - This technique has been revoked by T1564.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1564.004
    mappings:
    - d3f:T1096
    exact_mappings:
    - attack:T1096
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1096
  T1097:
    name: T1097
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1097
    annotations:
      attack-id:
        tag: attack-id
        value: T1097
    description: Pass the ticket (PtT) is a method of authenticating to a system using
      Kerberos tickets without having access to an account's password. Kerberos authentication
      can be used as the first step to lateral movement to a remote system.
    title: Pass the Ticket
    comments:
    - This technique has been revoked by T1550.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1550.003
    mappings:
    - d3f:T1097
    exact_mappings:
    - attack:T1097
    is_a: LateralMovementTechnique
    class_uri: d3f:T1097
  T1098:
    name: T1098
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1098
    description: 'Adversaries may manipulate accounts to maintain and/or elevate access
      to victim systems. Account manipulation may consist of any action that preserves
      or modifies adversary access to a compromised account, such as modifying credentials
      or permission groups.(Citation: FireEye SMOKEDHAM June 2021) These actions could
      also include account activity designed to subvert security policies, such as
      performing iterative password updates to bypass password duration policies and
      preserve the life of compromised credentials.'
    title: Account Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1098
    exact_mappings:
    - attack:T1098
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1098
  T1098_001:
    name: T1098_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1098.001
    description: Adversaries may add adversary-controlled credentials to a cloud account
      to maintain persistent access to victim accounts and instances within the environment.
    title: Additional Cloud Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.001
    mappings:
    - d3f:T1098.001
    exact_mappings:
    - attack:T1098.001
    is_a: T1098
    class_uri: d3f:T1098.001
  T1098_002:
    name: T1098_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1098.002
    description: Adversaries may grant additional permission levels to maintain persistent
      access to an adversary-controlled email account.
    title: Additional Email Delegate Permissions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.002
    mappings:
    - d3f:T1098.002
    exact_mappings:
    - attack:T1098.002
    is_a: T1098
    class_uri: d3f:T1098.002
  T1098_003:
    name: T1098_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1098.003
    description: 'An adversary may add additional roles or permissions to an adversary-controlled
      cloud account to maintain persistent access to a tenant. For example, adversaries
      may update IAM policies in cloud-based environments or add a new global administrator
      in Office 365 environments.(Citation: AWS IAM Policies and Permissions)(Citation:
      Google Cloud IAM Policies)(Citation: Microsoft Support O365 Add Another Admin,
      October 2019)(Citation: Microsoft O365 Admin Roles) With sufficient permissions,
      a compromised account can gain almost unlimited access to data and settings
      (including the ability to reset the passwords of other admins).(Citation: Expel
      AWS Attacker)'
    title: Additional Cloud Roles
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.003
    mappings:
    - d3f:T1098.003
    exact_mappings:
    - attack:T1098.003
    is_a: T1098
    class_uri: d3f:T1098.003
  T1098_004:
    name: T1098_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098004
    annotations:
      attack-id:
        tag: attack-id
        value: T1098.004
    description: "Adversaries may modify the SSH <code>authorized_keys</code> file\
      \ to maintain persistence on a victim host. Linux distributions and macOS commonly\
      \ use key-based authentication to secure the authentication process of SSH sessions\
      \ for remote management. The <code>authorized_keys</code> file in SSH specifies\
      \ the SSH keys that can be used for logging into the user account for which\
      \ the file is configured. This file is usually found in the user's home directory\
      \ under <code>&lt;user-home&gt;/.ssh/authorized_keys</code>.(Citation: SSH Authorized\
      \ Keys) Users may edit the system\u2019s SSH config file to modify the directives\
      \ PubkeyAuthentication and RSAAuthentication to the value \u201Cyes\u201D to\
      \ ensure public key and RSA authentication are enabled. The SSH config file\
      \ is usually located under <code>/etc/ssh/sshd_config</code>."
    title: SSH Authorized Keys
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.004
    mappings:
    - d3f:T1098.004
    exact_mappings:
    - attack:T1098.004
    is_a: T1098
    class_uri: d3f:T1098.004
  T1098_005:
    name: T1098_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098005
    annotations:
      attack-id:
        tag: attack-id
        value: T1098.005
    description: Adversaries may register a device to an adversary-controlled account.
      Devices may be registered in a multifactor authentication (MFA) system, which
      handles authentication to the network, or in a device management system, which
      handles device access and compliance.
    title: Device Registration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.005
    mappings:
    - d3f:T1098.005
    exact_mappings:
    - attack:T1098.005
    is_a: T1098
    class_uri: d3f:T1098.005
  T1098_006:
    name: T1098_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098006
    annotations:
      attack-id:
        tag: attack-id
        value: T1098.006
    description: 'An adversary may add additional roles or permissions to an adversary-controlled
      user or service account to maintain persistent access to a container orchestration
      system. For example, an adversary with sufficient permissions may create a RoleBinding
      or a ClusterRoleBinding to bind a Role or ClusterRole to a Kubernetes account.(Citation:
      Kubernetes RBAC)(Citation: Aquasec Kubernetes Attack 2023) Where attribute-based
      access control (ABAC) is in use, an adversary with sufficient permissions may
      modify a Kubernetes ABAC policy to give the target account additional permissions.(Citation:
      Kuberentes ABAC)'
    title: Additional Container Cluster Roles
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.006
    mappings:
    - d3f:T1098.006
    exact_mappings:
    - attack:T1098.006
    is_a: T1098
    class_uri: d3f:T1098.006
  T1098_007:
    name: T1098_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1098007
    annotations:
      attack-id:
        tag: attack-id
        value: T1098.007
    description: An adversary may add additional local or domain groups to an adversary-controlled
      account to maintain persistent access to a system or domain.
    title: Additional Local or Domain Groups
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1098.007
    mappings:
    - d3f:T1098.007
    exact_mappings:
    - attack:T1098.007
    is_a: T1098
    class_uri: d3f:T1098.007
  T1099:
    name: T1099
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1099
    annotations:
      attack-id:
        tag: attack-id
        value: T1099
    description: 'Adversaries may take actions to hide the deployment of new, or modification
      of existing files to obfuscate their activities. Timestomping is a technique
      that modifies the timestamps of a file (the modify, access, create, and change
      times), often to mimic files that are in the same folder. This is done, for
      example, on files that have been modified or created by the adversary so that
      they do not appear conspicuous to forensic investigators or file analysis tools.
      Timestomping may be used along with file name [Masquerading](https://attack.mitre.org/techniques/T1036)
      to hide malware and tools. (Citation: WindowsIR Anti-Forensic Techniques)'
    title: Timestomp
    comments:
    - This technique has been revoked by T1070.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1070.006
    mappings:
    - d3f:T1099
    exact_mappings:
    - attack:T1099
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1099
  T1100:
    name: T1100
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1100
    annotations:
      attack-id:
        tag: attack-id
        value: T1100
    description: 'A Web shell is a Web script that is placed on an openly accessible
      Web server to allow an adversary to use the Web server as a gateway into a network.
      A Web shell may provide a set of functions to execute or a command-line interface
      on the system that hosts the Web server. In addition to a server-side script,
      a Web shell may have a client interface program that is used to talk to the
      Web server (see, for example, China Chopper Web shell client). (Citation: Lee
      2013)'
    title: Web Shell
    comments:
    - This technique has been revoked by T1505.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1505.003
    mappings:
    - d3f:T1100
    exact_mappings:
    - attack:T1100
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1100
  T1101:
    name: T1101
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1101
    annotations:
      attack-id:
        tag: attack-id
        value: T1101
    description: 'Windows Security Support Provider (SSP) DLLs are loaded into the
      Local Security Authority (LSA) process at system start. Once loaded into the
      LSA, SSP DLLs have access to encrypted and plaintext passwords that are stored
      in Windows, such as any logged-on user''s Domain password or smart card PINs.
      The SSP configuration is stored in two Registry keys: <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\Security
      Packages</code> and <code>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\OSConfig\Security
      Packages</code>. An adversary may modify these Registry keys to add new SSPs,
      which will be loaded the next time the system boots, or when the AddSecurityPackage
      Windows API function is called.'
    title: Security Support Provider
    comments:
    - This technique has been revoked by T1547.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.005
    mappings:
    - d3f:T1101
    exact_mappings:
    - attack:T1101
    is_a: PersistenceTechnique
    class_uri: d3f:T1101
  T1102:
    name: T1102
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1102
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1102
    description: Adversaries may use an existing, legitimate external Web service
      as a means for relaying data to/from a compromised system. Popular websites
      and social media acting as a mechanism for C2 may give a significant amount
      of cover due to the likelihood that hosts within a network are already communicating
      with them prior to a compromise. Using common services, such as those offered
      by Google or Twitter, makes it easier for adversaries to hide in expected noise.
      Web service providers commonly use SSL/TLS encryption, giving adversaries an
      added level of protection.
    title: Web Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1102
    exact_mappings:
    - attack:T1102
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1102
  T1102_001:
    name: T1102_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1102001
    annotations:
      attack-id:
        tag: attack-id
        value: T1102.001
    description: Adversaries may use an existing, legitimate external Web service
      to host information that points to additional command and control (C2) infrastructure.
      Adversaries may post content, known as a dead drop resolver, on Web services
      with embedded (and often obfuscated/encoded) domains or IP addresses. Once infected,
      victims will reach out to and be redirected by these resolvers.
    title: Dead Drop Resolver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1102.001
    mappings:
    - d3f:T1102.001
    exact_mappings:
    - attack:T1102.001
    is_a: T1102
    class_uri: d3f:T1102.001
  T1102_002:
    name: T1102_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1102002
    annotations:
      attack-id:
        tag: attack-id
        value: T1102.002
    description: Adversaries may use an existing, legitimate external Web service
      as a means for sending commands to and receiving output from a compromised system
      over the Web service channel. Compromised systems may leverage popular websites
      and social media to host command and control (C2) instructions. Those infected
      systems can then send the output from those commands back over that Web service
      channel. The return traffic may occur in a variety of ways, depending on the
      Web service being utilized. For example, the return traffic may take the form
      of the compromised system posting a comment on a forum, issuing a pull request
      to development project, updating a document hosted on a Web service, or by sending
      a Tweet.
    title: Bidirectional Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1102.002
    mappings:
    - d3f:T1102.002
    exact_mappings:
    - attack:T1102.002
    is_a: T1102
    class_uri: d3f:T1102.002
  T1102_003:
    name: T1102_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1102003
    annotations:
      attack-id:
        tag: attack-id
        value: T1102.003
    description: Adversaries may use an existing, legitimate external Web service
      as a means for sending commands to a compromised system without receiving return
      output over the Web service channel. Compromised systems may leverage popular
      websites and social media to host command and control (C2) instructions. Those
      infected systems may opt to send the output from those commands back over a
      different C2 channel, including to another distinct Web service. Alternatively,
      compromised systems may return no output at all in cases where adversaries want
      to send instructions to systems and do not want a response.
    title: One-Way Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1102.003
    mappings:
    - d3f:T1102.003
    exact_mappings:
    - attack:T1102.003
    is_a: T1102
    class_uri: d3f:T1102.003
  T1103:
    name: T1103
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1103
    annotations:
      attack-id:
        tag: attack-id
        value: T1103
    description: 'Dynamic-link libraries (DLLs) that are specified in the AppInit_DLLs
      value in the Registry keys <code>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows
      NT\CurrentVersion\Windows</code> or <code>HKEY_LOCAL_MACHINE\Software\Wow6432Node\Microsoft\Windows
      NT\CurrentVersion\Windows</code> are loaded by user32.dll into every process
      that loads user32.dll. In practice this is nearly every program, since user32.dll
      is a very common library. (Citation: Elastic Process Injection July 2017) Similar
      to [Process Injection](https://attack.mitre.org/techniques/T1055), these values
      can be abused to obtain persistence and privilege escalation by causing a malicious
      DLL to be loaded and run in the context of separate processes on the computer.
      (Citation: AppInit Registry)'
    title: AppInit DLLs
    comments:
    - This technique has been revoked by T1546.010
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.010
    mappings:
    - d3f:T1103
    exact_mappings:
    - attack:T1103
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1103
  T1104:
    name: T1104
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1104
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1104
    description: Adversaries may create multiple stages for command and control that
      are employed under different conditions or for certain functions. Use of multiple
      stages may obfuscate the command and control channel to make detection more
      difficult.
    title: Multi-Stage Channels
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1104
    exact_mappings:
    - attack:T1104
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1104
  T1105:
    name: T1105
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1105
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1105
    description: Session is initiated by the client, and may be a custom protocol
      which is why it is related to generic network traffic instead of file transfer
      network traffic.
    title: Ingress Tool Transfer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1105
    exact_mappings:
    - attack:T1105
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1105
  T1106:
    name: T1106
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1106
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1106
    description: 'Adversaries may interact with the native OS application programming
      interface (API) to execute behaviors. Native APIs provide a controlled means
      of calling low-level OS services within the kernel, such as those involving
      hardware/devices, memory, and processes.(Citation: NT API Windows)(Citation:
      Linux Kernel API) These native APIs are leveraged by the OS during system boot
      (when other system components are not yet initialized) as well as carrying out
      tasks and requests during routine operations.'
    title: Native API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1106
    exact_mappings:
    - attack:T1106
    is_a: ExecutionTechnique
    class_uri: d3f:T1106
  T1107:
    name: T1107
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1107
    annotations:
      attack-id:
        tag: attack-id
        value: T1107
    description: Adversaries may delete files left behind by the actions of their
      intrusion activity. Malware, tools, or other non-native files dropped or created
      on a system by an adversary may leave traces to indicate to what was done within
      a network and how. Removal of these files can occur during an intrusion, or
      as part of a post-intrusion process to minimize the adversary's footprint.
    title: File Deletion
    comments:
    - This technique has been revoked by T1070.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1070.004
    mappings:
    - d3f:T1107
    exact_mappings:
    - attack:T1107
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1107
  T1108:
    name: T1108
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1108
    annotations:
      attack-id:
        tag: attack-id
        value: T1108
    description: '**This technique has been deprecated. Please use [Create Account](https://attack.mitre.org/techniques/T1136),
      [Web Shell](https://attack.mitre.org/techniques/T1505/003), and [External Remote
      Services](https://attack.mitre.org/techniques/T1133) where appropriate.**'
    title: Redundant Access
    comments:
    - '**This technique has been deprecated. Please use [Create Account](https://attack.mitre.org/techniques/T1136),
      [Web Shell](https://attack.mitre.org/techniques/T1505/003), and [External Remote
      Services](https://attack.mitre.org/techniques/T1133) where appropriate.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1108
    exact_mappings:
    - attack:T1108
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1108
  T1109:
    name: T1109
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1109
    annotations:
      attack-id:
        tag: attack-id
        value: T1109
    description: Some adversaries may employ sophisticated means to compromise computer
      components and install malicious firmware that will execute adversary code outside
      of the operating system and main system firmware or BIOS. This technique may
      be similar to [System Firmware](https://attack.mitre.org/techniques/T1019) but
      conducted upon other system components that may not have the same capability
      or level of integrity checking. Malicious device firmware could provide both
      a persistent level of access to systems despite potential typical failures to
      maintain access and hard disk re-images, as well as a way to evade host software-based
      defenses and integrity checks.
    title: Component Firmware
    comments:
    - This technique has been revoked by T1542.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1542.002
    mappings:
    - d3f:T1109
    exact_mappings:
    - attack:T1109
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1109
  T1110:
    name: T1110
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1110
    annotations:
      attack-id:
        tag: attack-id
        value: T1110
    description: 'Adversaries may use brute force techniques to gain access to accounts
      when passwords are unknown or when password hashes are obtained.(Citation: TrendMicro
      Pawn Storm Dec 2020) Without knowledge of the password for an account or set
      of accounts, an adversary may systematically guess the password using a repetitive
      or iterative mechanism.(Citation: Dragos Crashoverride 2018) Brute forcing passwords
      can take place via interaction with a service that will check the validity of
      those credentials or offline against previously acquired credential data, such
      as password hashes.'
    title: Brute Force
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1110
    exact_mappings:
    - attack:T1110
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1110
  T1110_001:
    name: T1110_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1110001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1110.001
    description: Adversaries with no prior knowledge of legitimate credentials within
      the system or environment may guess passwords to attempt access to accounts.
      Without knowledge of the password for an account, an adversary may opt to systematically
      guess the password using a repetitive or iterative mechanism. An adversary may
      guess login credentials without prior knowledge of system or environment passwords
      during an operation by using a list of common passwords. Password guessing may
      or may not take into account the target's policies on password complexity or
      use policies that may lock accounts out after a number of failed attempts.
    title: Password Guessing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1110.001
    mappings:
    - d3f:T1110.001
    exact_mappings:
    - attack:T1110.001
    is_a: T1110
    class_uri: d3f:T1110.001
  T1110_002:
    name: T1110_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1110002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1110.002
    description: 'Adversaries may use password cracking to attempt to recover usable
      credentials, such as plaintext passwords, when credential material such as password
      hashes are obtained. [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)
      can be used to obtain password hashes, this may only get an adversary so far
      when [Pass the Hash](https://attack.mitre.org/techniques/T1550/002) is not an
      option. Further,  adversaries may leverage [Data from Configuration Repository](https://attack.mitre.org/techniques/T1602)
      in order to obtain hashed credentials for network devices.(Citation: US-CERT-TA18-106A)'
    title: Password Cracking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1110.002
    mappings:
    - d3f:T1110.002
    exact_mappings:
    - attack:T1110.002
    is_a: T1110
    class_uri: d3f:T1110.002
  T1110_003:
    name: T1110_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1110003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1110.003
    description: 'Adversaries may use a single or small list of commonly used passwords
      against many different accounts to attempt to acquire valid account credentials.
      Password spraying uses one password (e.g. ''Password01''), or a small list of
      commonly used passwords, that may match the complexity policy of the domain.
      Logins are attempted with that password against many different accounts on a
      network to avoid account lockouts that would normally occur when brute forcing
      a single account with many passwords. (Citation: BlackHillsInfosec Password
      Spraying)'
    title: Password Spraying
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1110.003
    mappings:
    - d3f:T1110.003
    exact_mappings:
    - attack:T1110.003
    is_a: T1110
    class_uri: d3f:T1110.003
  T1110_004:
    name: T1110_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1110004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1110.004
    description: Adversaries may use credentials obtained from breach dumps of unrelated
      accounts to gain access to target accounts through credential overlap. Occasionally,
      large numbers of username and password pairs are dumped online when a website
      or service is compromised and the user account credentials accessed. The information
      may be useful to an adversary attempting to compromise accounts by taking advantage
      of the tendency for users to use the same passwords across personal and business
      accounts.
    title: Credential Stuffing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1110.004
    mappings:
    - d3f:T1110.004
    exact_mappings:
    - attack:T1110.004
    is_a: T1110
    class_uri: d3f:T1110.004
  T1111:
    name: T1111
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1111
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1111
    description: Adversaries may target multi-factor authentication (MFA) mechanisms,
      (i.e., smart cards, token generators, etc.) to gain access to credentials that
      can be used to access systems, services, and network resources. Use of MFA is
      recommended and provides a higher level of security than usernames and passwords
      alone, but organizations should be aware of techniques that could be used to
      intercept and bypass these security mechanisms.
    title: Multi-Factor Authentication Interception
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1111
    exact_mappings:
    - attack:T1111
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1111
  T1112:
    name: T1112
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1112
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1112
    description: Adversaries may interact with the Windows Registry to hide configuration
      information within Registry keys, remove information as part of cleaning up,
      or as part of other techniques to aid in persistence and execution.
    title: Modify Registry
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1112
    exact_mappings:
    - attack:T1112
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1112
  T1113:
    name: T1113
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1113
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1113
    description: 'Adversaries may attempt to take screen captures of the desktop to
      gather information over the course of an operation. Screen capturing functionality
      may be included as a feature of a remote access tool used in post-compromise
      operations. Taking a screenshot is also typically possible through native utilities
      or API calls, such as <code>CopyFromScreen</code>, <code>xwd</code>, or <code>screencapture</code>.(Citation:
      CopyFromScreen .NET)(Citation: Antiquated Mac Malware)'
    title: Screen Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1113
    exact_mappings:
    - attack:T1113
    is_a: CollectionTechnique
    class_uri: d3f:T1113
  T1114:
    name: T1114
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1114
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1114
    description: Adversaries may target user email to collect sensitive information.
      Emails may contain sensitive data, including trade secrets or personal information,
      that can prove valuable to adversaries. Adversaries can collect or forward email
      from mail servers or clients.
    title: Email Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1114
    exact_mappings:
    - attack:T1114
    is_a: CollectionTechnique
    class_uri: d3f:T1114
  T1114_001:
    name: T1114_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1114001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1114.001
    description: "Adversaries may target user email on local systems to collect sensitive\
      \ information. Files containing email data can be acquired from a user\u2019\
      s local system, such as Outlook storage or cache files."
    title: Local Email Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1114.001
    mappings:
    - d3f:T1114.001
    exact_mappings:
    - attack:T1114.001
    is_a: T1114
    class_uri: d3f:T1114.001
  T1114_002:
    name: T1114_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1114002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1114.002
    description: Adversaries may target an Exchange server, Office 365, or Google
      Workspace to collect sensitive information. Adversaries may leverage a user's
      credentials and interact directly with the Exchange server to acquire information
      from within a network. Adversaries may also access externally facing Exchange
      services, Office 365, or Google Workspace to access email using credentials
      or access tokens. Tools such as [MailSniper](https://attack.mitre.org/software/S0413)
      can be used to automate searches for specific keywords.
    title: Remote Email Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1114.002
    mappings:
    - d3f:T1114.002
    exact_mappings:
    - attack:T1114.002
    is_a: T1114
    class_uri: d3f:T1114.002
  T1114_003:
    name: T1114_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1114003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1114.003
    description: "Adversaries may setup email forwarding rules to collect sensitive\
      \ information. Adversaries may abuse email forwarding rules to monitor the activities\
      \ of a victim, steal information, and further gain intelligence on the victim\
      \ or the victim\u2019s organization to use as part of further exploits or operations.(Citation:\
      \ US-CERT TA18-068A 2018) Furthermore, email forwarding rules can allow adversaries\
      \ to maintain persistent access to victim's emails even after compromised credentials\
      \ are reset by administrators.(Citation: Pfammatter - Hidden Inbox Rules) Most\
      \ email clients allow users to create inbox rules for various email functions,\
      \ including forwarding to a different recipient. These rules may be created\
      \ through a local email application, a web interface, or by command-line interface.\
      \ Messages can be forwarded to internal or external recipients, and there are\
      \ no restrictions limiting the extent of this rule. Administrators may also\
      \ create forwarding rules for user accounts with the same considerations and\
      \ outcomes.(Citation: Microsoft Tim McMichael Exchange Mail Forwarding 2)(Citation:\
      \ Mac Forwarding Rules)"
    title: Email Forwarding Rule
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1114.003
    mappings:
    - d3f:T1114.003
    exact_mappings:
    - attack:T1114.003
    is_a: T1114
    class_uri: d3f:T1114.003
  T1115:
    name: T1115
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1115
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1115
    description: Adversaries may collect data stored in the clipboard from users copying
      information within or between applications.
    title: Clipboard Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1115
    exact_mappings:
    - attack:T1115
    is_a: CollectionTechnique
    class_uri: d3f:T1115
  T1116:
    name: T1116
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1116
    annotations:
      attack-id:
        tag: attack-id
        value: T1116
    description: 'Code signing provides a level of authenticity on a binary from the
      developer and a guarantee that the binary has not been tampered with. (Citation:
      Wikipedia Code Signing) However, adversaries are known to use code signing certificates
      to masquerade malware and tools as legitimate binaries (Citation: Janicab).
      The certificates used during an operation may be created, forged, or stolen
      by the adversary. (Citation: Securelist Digital Certificates) (Citation: Symantec
      Digital Certificates)'
    title: Code Signing
    comments:
    - This technique has been revoked by T1553.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1553.002
    mappings:
    - d3f:T1116
    exact_mappings:
    - attack:T1116
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1116
  T1117:
    name: T1117
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1117
    annotations:
      attack-id:
        tag: attack-id
        value: T1117
    description: 'Regsvr32.exe is a command-line program used to register and unregister
      object linking and embedding controls, including dynamic link libraries (DLLs),
      on Windows systems. Regsvr32.exe can be used to execute arbitrary binaries.
      (Citation: Microsoft Regsvr32)'
    title: Regsvr32
    comments:
    - This technique has been revoked by T1218.010
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.010
    mappings:
    - d3f:T1117
    exact_mappings:
    - attack:T1117
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1117
  T1118:
    name: T1118
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1118
    annotations:
      attack-id:
        tag: attack-id
        value: T1118
    description: 'InstallUtil is a command-line utility that allows for installation
      and uninstallation of resources by executing specific installer components specified
      in .NET binaries. (Citation: MSDN InstallUtil) InstallUtil is located in the
      .NET directories on a Windows system: <code>C:\Windows\Microsoft.NET\Framework\v<version>\InstallUtil.exe</code>
      and <code>C:\Windows\Microsoft.NET\Framework64\v<version>\InstallUtil.exe</code>.
      InstallUtil.exe is digitally signed by Microsoft.'
    title: InstallUtil
    comments:
    - This technique has been revoked by T1218.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.004
    mappings:
    - d3f:T1118
    exact_mappings:
    - attack:T1118
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1118
  T1119:
    name: T1119
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1119
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1119
    description: Once established within a system or network, an adversary may use
      automated techniques for collecting internal data. Methods for performing this
      technique could include use of a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)
      to search for and copy information fitting set criteria such as file type, location,
      or name at specific time intervals.
    title: Automated Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1119
    exact_mappings:
    - attack:T1119
    is_a: CollectionTechnique
    class_uri: d3f:T1119
  T1120:
    name: T1120
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1120
    annotations:
      attack-id:
        tag: attack-id
        value: T1120
    description: 'Adversaries may attempt to gather information about attached peripheral
      devices and components connected to a computer system.(Citation: Peripheral
      Discovery Linux)(Citation: Peripheral Discovery macOS) Peripheral devices could
      include auxiliary resources that support a variety of functionalities such as
      keyboards, printers, cameras, smart card readers, or removable storage. The
      information may be used to enhance their awareness of the system and network
      environment or may be used for further actions.'
    title: Peripheral Device Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1120
    exact_mappings:
    - attack:T1120
    is_a: DiscoveryTechnique
    class_uri: d3f:T1120
  T1121:
    name: T1121
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1121
    annotations:
      attack-id:
        tag: attack-id
        value: T1121
    description: 'Regsvcs and Regasm are Windows command-line utilities that are used
      to register .NET Component Object Model (COM) assemblies. Both are digitally
      signed by Microsoft. (Citation: MSDN Regsvcs) (Citation: MSDN Regasm)'
    title: Regsvcs/Regasm
    comments:
    - This technique has been revoked by T1218.009
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.009
    mappings:
    - d3f:T1121
    exact_mappings:
    - attack:T1121
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1121
  T1122:
    name: T1122
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1122
    annotations:
      attack-id:
        tag: attack-id
        value: T1122
    description: 'The Component Object Model (COM) is a system within Windows to enable
      interaction between software components through the operating system. (Citation:
      Microsoft Component Object Model) Adversaries can use this system to insert
      malicious code that can be executed in place of legitimate software through
      hijacking the COM references and relationships as a means for persistence. Hijacking
      a COM object requires a change in the Windows Registry to replace a reference
      to a legitimate system component which may cause that component to not work
      when executed. When that system component is executed through normal system
      operation the adversary''s code will be executed instead. (Citation: GDATA COM
      Hijacking) An adversary is likely to hijack objects that are used frequently
      enough to maintain a consistent level of persistence, but are unlikely to break
      noticeable functionality within the system as to avoid system instability that
      could lead to detection.'
    title: Component Object Model Hijacking
    comments:
    - This technique has been revoked by T1546.015
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.015
    mappings:
    - d3f:T1122
    exact_mappings:
    - attack:T1122
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1122
  T1123:
    name: T1123
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1123
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1123
    description: 'An adversary can leverage a computer''s peripheral devices (e.g.,
      microphones and webcams) or applications (e.g., voice and video call services)
      to capture audio recordings for the purpose of listening into sensitive conversations
      to gather information.(Citation: ESET Attor Oct 2019)'
    title: Audio Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1123
    exact_mappings:
    - attack:T1123
    is_a: CollectionTechnique
    class_uri: d3f:T1123
  T1124:
    name: T1124
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1124
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1124
    description: 'An adversary may gather the system time and/or time zone settings
      from a local or remote system. The system time is set and stored by services,
      such as the Windows Time Service on Windows or <code>systemsetup</code> on macOS.(Citation:
      MSDN System Time)(Citation: Technet Windows Time Service)(Citation: systemsetup
      mac time) These time settings may also be synchronized between systems and services
      in an enterprise network, typically accomplished with a network time server
      within a domain.(Citation: Mac Time Sync)(Citation: linux system time)'
    title: System Time Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1124
    exact_mappings:
    - attack:T1124
    is_a: DiscoveryTechnique
    class_uri: d3f:T1124
  T1125:
    name: T1125
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1125
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1125
    description: An adversary can leverage a computer's peripheral devices (e.g.,
      integrated cameras or webcams) or applications (e.g., video call services) to
      capture video recordings for the purpose of gathering information. Images may
      also be captured from devices or applications, potentially in specified intervals,
      in lieu of video files.
    title: Video Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1125
    exact_mappings:
    - attack:T1125
    is_a: CollectionTechnique
    class_uri: d3f:T1125
  T1126:
    name: T1126
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1126
    annotations:
      attack-id:
        tag: attack-id
        value: T1126
    description: 'Adversaries may remove share connections that are no longer useful
      in order to clean up traces of their operation. Windows shared drive and [Windows
      Admin Shares](https://attack.mitre.org/techniques/T1077) connections can be
      removed when no longer needed. [Net](https://attack.mitre.org/software/S0039)
      is an example utility that can be used to remove network share connections with
      the <code>net use \\system\share /delete</code> command. (Citation: Technet
      Net Use)'
    title: Network Share Connection Removal
    comments:
    - This technique has been revoked by T1070.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1070.005
    mappings:
    - d3f:T1126
    exact_mappings:
    - attack:T1126
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1126
  T1127:
    name: T1127
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1127
    annotations:
      attack-id:
        tag: attack-id
        value: T1127
    description: 'Adversaries may take advantage of trusted developer utilities to
      proxy execution of malicious payloads. There are many utilities used for software
      development related tasks that can be used to execute code in various forms
      to assist in development, debugging, and reverse engineering.(Citation: engima0x3
      DNX Bypass)(Citation: engima0x3 RCSI Bypass)(Citation: Exploit Monday WinDbg)(Citation:
      LOLBAS Tracker) These utilities may often be signed with legitimate certificates
      that allow them to execute on a system and proxy execution of malicious code
      through a trusted process that effectively bypasses application control solutions.'
    title: Trusted Developer Utilities Proxy Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1127
    exact_mappings:
    - attack:T1127
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1127
  T1127_001:
    name: T1127_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1127001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1127.001
    description: 'Adversaries may use MSBuild to proxy execution of code through a
      trusted Windows utility. MSBuild.exe (Microsoft Build Engine) is a software
      build platform used by Visual Studio. It handles XML formatted project files
      that define requirements for loading and building various platforms and configurations.(Citation:
      MSDN MSBuild)'
    title: MSBuild
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1127.001
    mappings:
    - d3f:T1127.001
    exact_mappings:
    - attack:T1127.001
    is_a: T1127
    class_uri: d3f:T1127.001
  T1127_002:
    name: T1127_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1127002
    annotations:
      attack-id:
        tag: attack-id
        value: T1127.002
    description: 'Adversaries may use ClickOnce applications (.appref-ms and .application
      files) to proxy execution of code through a trusted Windows utility.(Citation:
      Burke/CISA ClickOnce BlackHat) ClickOnce is a deployment that enables a user
      to create self-updating Windows-based .NET applications (i.e, .XBAP, .EXE, or
      .DLL) that install and run from a file share or web page with minimal user interaction.
      The application launches as a child process of DFSVC.EXE, which is responsible
      for installing, launching, and updating the application.(Citation: SpectorOps
      Medium ClickOnce)'
    title: ClickOnce
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1127.002
    mappings:
    - d3f:T1127.002
    exact_mappings:
    - attack:T1127.002
    is_a: T1127
    class_uri: d3f:T1127.002
  T1127_003:
    name: T1127_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1127003
    annotations:
      attack-id:
        tag: attack-id
        value: T1127.003
    description: 'Adversaries may use `JamPlus` to proxy the execution of a malicious
      script. `JamPlus` is a build utility tool for code and data build systems. It
      works with several popular compilers and can be used for generating workspaces
      in code editors such as Visual Studio.(Citation: JamPlus manual)'
    title: JamPlus
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1127.003
    mappings:
    - d3f:T1127.003
    exact_mappings:
    - attack:T1127.003
    is_a: T1127
    class_uri: d3f:T1127.003
  T1128:
    name: T1128
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1128
    annotations:
      attack-id:
        tag: attack-id
        value: T1128
    description: 'Netsh.exe (also referred to as Netshell) is a command-line scripting
      utility used to interact with the network configuration of a system. It contains
      functionality to add helper DLLs for extending functionality of the utility.
      (Citation: TechNet Netsh) The paths to registered netsh.exe helper DLLs are
      entered into the Windows Registry at <code>HKLM\SOFTWARE\Microsoft\Netsh</code>.'
    title: Netsh Helper DLL
    comments:
    - This technique has been revoked by T1546.007
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.007
    mappings:
    - d3f:T1128
    exact_mappings:
    - attack:T1128
    is_a: PersistenceTechnique
    class_uri: d3f:T1128
  T1129:
    name: T1129
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1129
    annotations:
      attack-id:
        tag: attack-id
        value: T1129
    description: Adversaries may execute malicious payloads via loading shared modules.
      Shared modules are executable files that are loaded into processes to provide
      access to reusable code, such as specific custom functions or invoking OS API
      functions (i.e., [Native API](https://attack.mitre.org/techniques/T1106)).
    title: Shared Modules
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1129
    exact_mappings:
    - attack:T1129
    is_a: ExecutionTechnique
    class_uri: d3f:T1129
  T1130:
    name: T1130
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1130
    annotations:
      attack-id:
        tag: attack-id
        value: T1130
    description: 'Root certificates are used in public key cryptography to identify
      a root certificate authority (CA). When a root certificate is installed, the
      system or application will trust certificates in the root''s chain of trust
      that have been signed by the root certificate. (Citation: Wikipedia Root Certificate)
      Certificates are commonly used for establishing secure TLS/SSL communications
      within a web browser. When a user attempts to browse a website that presents
      a certificate that is not trusted an error message will be displayed to warn
      the user of the security risk. Depending on the security settings, the browser
      may not allow the user to establish a connection to the website.'
    title: Install Root Certificate
    comments:
    - This technique has been revoked by T1553.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1553.004
    mappings:
    - d3f:T1130
    exact_mappings:
    - attack:T1130
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1130
  T1131:
    name: T1131
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1131
    annotations:
      attack-id:
        tag: attack-id
        value: T1131
    description: 'Windows Authentication Package DLLs are loaded by the Local Security
      Authority (LSA) process at system start. They provide support for multiple logon
      processes and multiple security protocols to the operating system. (Citation:
      MSDN Authentication Packages)'
    title: Authentication Package
    comments:
    - This technique has been revoked by T1547.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.002
    mappings:
    - d3f:T1131
    exact_mappings:
    - attack:T1131
    is_a: PersistenceTechnique
    class_uri: d3f:T1131
  T1132:
    name: T1132
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1132
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1132
    description: 'Adversaries may encode data to make the content of command and control
      traffic more difficult to detect. Command and control (C2) information can be
      encoded using a standard data encoding system. Use of data encoding may adhere
      to existing protocol specifications and includes use of ASCII, Unicode, Base64,
      MIME, or other binary-to-text and character encoding systems.(Citation: Wikipedia
      Binary-to-text Encoding) (Citation: Wikipedia Character Encoding) Some data
      encoding systems may also result in data compression, such as gzip.'
    title: Data Encoding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1132
    exact_mappings:
    - attack:T1132
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1132
  T1132_001:
    name: T1132_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1132001
    annotations:
      attack-id:
        tag: attack-id
        value: T1132.001
    description: 'Adversaries may encode data with a standard data encoding system
      to make the content of command and control traffic more difficult to detect.
      Command and control (C2) information can be encoded using a standard data encoding
      system that adheres to existing protocol specifications. Common data encoding
      schemes include ASCII, Unicode, hexadecimal, Base64, and MIME.(Citation: Wikipedia
      Binary-to-text Encoding)(Citation: Wikipedia Character Encoding) Some data encoding
      systems may also result in data compression, such as gzip.'
    title: Standard Encoding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1132.001
    mappings:
    - d3f:T1132.001
    exact_mappings:
    - attack:T1132.001
    is_a: T1132
    class_uri: d3f:T1132.001
  T1132_002:
    name: T1132_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1132002
    annotations:
      attack-id:
        tag: attack-id
        value: T1132.002
    description: 'Adversaries may encode data with a non-standard data encoding system
      to make the content of command and control traffic more difficult to detect.
      Command and control (C2) information can be encoded using a non-standard data
      encoding system that diverges from existing protocol specifications. Non-standard
      data encoding schemes may be based on or related to standard data encoding schemes,
      such as a modified Base64 encoding for the message body of an HTTP request.(Citation:
      Wikipedia Binary-to-text Encoding) (Citation: Wikipedia Character Encoding)'
    title: Non-Standard Encoding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1132.002
    mappings:
    - d3f:T1132.002
    exact_mappings:
    - attack:T1132.002
    is_a: T1132
    class_uri: d3f:T1132.002
  T1133:
    name: T1133
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1133
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1133
    description: 'Adversaries may leverage external-facing remote services to initially
      access and/or persist within a network. Remote services such as VPNs, Citrix,
      and other access mechanisms allow users to connect to internal enterprise network
      resources from external locations. There are often remote service gateways that
      manage connections and credential authentication for these services. Services
      such as [Windows Remote Management](https://attack.mitre.org/techniques/T1021/006)
      and [VNC](https://attack.mitre.org/techniques/T1021/005) can also be used externally.(Citation:
      MacOS VNC software for Remote Desktop)'
    title: External Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1133
    exact_mappings:
    - attack:T1133
    is_a: InitialAccessTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1133
  T1134:
    name: T1134
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134
    annotations:
      attack-id:
        tag: attack-id
        value: T1134
    description: Adversaries may modify access tokens to operate under a different
      user or system security context to perform actions and bypass access controls.
      Windows uses access tokens to determine the ownership of a running process.
      A user can manipulate access tokens to make a running process appear as though
      it is the child of a different process or belongs to someone other than the
      user that started the process. When this occurs, the process also takes on the
      security context associated with the new token.
    title: Access Token Manipulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1134
    exact_mappings:
    - attack:T1134
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1134
  T1134_001:
    name: T1134_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1134.001
    description: 'Adversaries may duplicate then impersonate another user''s existing
      token to escalate privileges and bypass access controls. For example, an adversary
      can duplicate an existing token using `DuplicateToken` or `DuplicateTokenEx`.(Citation:
      DuplicateToken function) The token can then be used with `ImpersonateLoggedOnUser`
      to allow the calling thread to impersonate a logged on user''s security context,
      or with `SetThreadToken` to assign the impersonated token to a thread.'
    title: Token Impersonation/Theft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1134.001
    mappings:
    - d3f:T1134.001
    exact_mappings:
    - attack:T1134.001
    is_a: T1134
    class_uri: d3f:T1134.001
  T1134_002:
    name: T1134_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1134.002
    description: 'Adversaries may create a new process with an existing token to escalate
      privileges and bypass access controls. Processes can be created with the token
      and resulting security context of another user using features such as <code>CreateProcessWithTokenW</code>
      and <code>runas</code>.(Citation: Microsoft RunAs)'
    title: Create Process with Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1134.002
    mappings:
    - d3f:T1134.002
    exact_mappings:
    - attack:T1134.002
    is_a: T1134
    class_uri: d3f:T1134.002
  T1134_003:
    name: T1134_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1134.003
    description: 'Adversaries may make new tokens and impersonate users to escalate
      privileges and bypass access controls. For example, if an adversary has a username
      and password but the user is not logged onto the system the adversary can then
      create a logon session for the user using the `LogonUser` function.(Citation:
      LogonUserW function) The function will return a copy of the new session''s access
      token and the adversary can use `SetThreadToken` to assign the token to a thread.'
    title: Make and Impersonate Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1134.003
    mappings:
    - d3f:T1134.003
    exact_mappings:
    - attack:T1134.003
    is_a: T1134
    class_uri: d3f:T1134.003
  T1134_004:
    name: T1134_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1134.004
    description: 'Adversaries may spoof the parent process identifier (PPID) of a
      new process to evade process-monitoring defenses or to elevate privileges. New
      processes are typically spawned directly from their parent, or calling, process
      unless explicitly specified. One way of explicitly assigning the PPID of a new
      process is via the <code>CreateProcess</code> API call, which supports a parameter
      that defines the PPID to use.(Citation: DidierStevens SelectMyParent Nov 2009)
      This functionality is used by Windows features such as User Account Control
      (UAC) to correctly set the PPID after a requested elevated process is spawned
      by SYSTEM (typically via <code>svchost.exe</code> or <code>consent.exe</code>)
      rather than the current user context.(Citation: Microsoft UAC Nov 2018)'
    title: Parent PID Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1134.004
    mappings:
    - d3f:T1134.004
    exact_mappings:
    - attack:T1134.004
    is_a: T1134
    class_uri: d3f:T1134.004
  T1134_005:
    name: T1134_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1134005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1134.005
    description: 'Adversaries may use SID-History Injection to escalate privileges
      and bypass access controls. The Windows security identifier (SID) is a unique
      value that identifies a user or group account. SIDs are used by Windows security
      in both security descriptors and access tokens. (Citation: Microsoft SID) An
      account can hold additional SIDs in the SID-History Active Directory attribute
      (Citation: Microsoft SID-History Attribute), allowing inter-operable account
      migration between domains (e.g., all values in SID-History are included in access
      tokens).'
    title: SID-History Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1134.005
    mappings:
    - d3f:T1134.005
    exact_mappings:
    - attack:T1134.005
    is_a: T1134
    class_uri: d3f:T1134.005
  T1135:
    name: T1135
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1135
    annotations:
      attack-id:
        tag: attack-id
        value: T1135
    description: Adversaries may look for folders and drives shared on remote systems
      as a means of identifying sources of information to gather as a precursor for
      Collection and to identify potential systems of interest for Lateral Movement.
      Networks often contain shared network drives and folders that enable users to
      access file directories on various systems across a network.
    title: Network Share Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1135
    exact_mappings:
    - attack:T1135
    is_a: DiscoveryTechnique
    class_uri: d3f:T1135
  T1136:
    name: T1136
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1136
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1136
    description: 'Adversaries may create an account to maintain access to victim systems.(Citation:
      Symantec WastedLocker June 2020) With a sufficient level of access, creating
      such accounts may be used to establish secondary credentialed access that do
      not require persistent remote access tools to be deployed on the system.'
    title: Create Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1136
    exact_mappings:
    - attack:T1136
    is_a: PersistenceTechnique
    class_uri: d3f:T1136
  T1136_001:
    name: T1136_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1136001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1136.001
    description: Adversaries may create a local account to maintain access to victim
      systems. Local accounts are those configured by an organization for use by users,
      remote support, services, or for administration on a single system or service.
    title: Local Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1136.001
    mappings:
    - d3f:T1136.001
    exact_mappings:
    - attack:T1136.001
    is_a: T1136
    class_uri: d3f:T1136.001
  T1136_002:
    name: T1136_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1136002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1136.002
    description: 'Adversaries may create a domain account to maintain access to victim
      systems. Domain accounts are those managed by Active Directory Domain Services
      where access and permissions are configured across systems and services that
      are part of that domain. Domain accounts can cover user, administrator, and
      service accounts. With a sufficient level of access, the <code>net user /add
      /domain</code> command can be used to create a domain account.(Citation: Savill
      1999)'
    title: Domain Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1136.002
    mappings:
    - d3f:T1136.002
    exact_mappings:
    - attack:T1136.002
    is_a: T1136
    class_uri: d3f:T1136.002
  T1136_003:
    name: T1136_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1136003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1136.003
    description: 'Adversaries may create a cloud account to maintain access to victim
      systems. With a sufficient level of access, such accounts may be used to establish
      secondary credentialed access that does not require persistent remote access
      tools to be deployed on the system.(Citation: Microsoft O365 Admin Roles)(Citation:
      Microsoft Support O365 Add Another Admin, October 2019)(Citation: AWS Create
      IAM User)(Citation: GCP Create Cloud Identity Users)(Citation: Microsoft Azure
      AD Users)'
    title: Cloud Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1136.003
    mappings:
    - d3f:T1136.003
    exact_mappings:
    - attack:T1136.003
    is_a: T1136
    class_uri: d3f:T1136.003
  T1137:
    name: T1137
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137
    annotations:
      attack-id:
        tag: attack-id
        value: T1137
    description: Adversaries may leverage Microsoft Office-based applications for
      persistence between startups. Microsoft Office is a fairly common application
      suite on Windows-based operating systems within an enterprise network. There
      are multiple mechanisms that can be used with Office for persistence when an
      Office-based application is started; this can include the use of Office Template
      Macros and add-ins.
    title: Office Application Startup
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1137
    exact_mappings:
    - attack:T1137
    is_a: PersistenceTechnique
    class_uri: d3f:T1137
  T1137_001:
    name: T1137_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.001
    description: 'Adversaries may abuse Microsoft Office templates to obtain persistence
      on a compromised system. Microsoft Office contains templates that are part of
      common Office applications and are used to customize styles. The base templates
      within the application are used each time an application starts. (Citation:
      Microsoft Change Normal Template)'
    title: Office Template Macros
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.001
    mappings:
    - d3f:T1137.001
    exact_mappings:
    - attack:T1137.001
    is_a: T1137
    class_uri: d3f:T1137.001
  T1137_002:
    name: T1137_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.002
    description: 'Adversaries may abuse the Microsoft Office "Office Test" Registry
      key to obtain persistence on a compromised system. An Office Test Registry location
      exists that allows a user to specify an arbitrary DLL that will be executed
      every time an Office application is started. This Registry key is thought to
      be used by Microsoft to load DLLs for testing and debugging purposes while developing
      Office applications. This Registry key is not created by default during an Office
      installation.(Citation: Hexacorn Office Test)(Citation: Palo Alto Office Test
      Sofacy)'
    title: Office Test
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.002
    mappings:
    - d3f:T1137.002
    exact_mappings:
    - attack:T1137.002
    is_a: T1137
    class_uri: d3f:T1137.002
  T1137_003:
    name: T1137_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.003
    description: 'Adversaries may abuse Microsoft Outlook forms to obtain persistence
      on a compromised system. Outlook forms are used as templates for presentation
      and functionality in Outlook messages. Custom Outlook forms can be created that
      will execute code when a specifically crafted email is sent by an adversary
      utilizing the same custom Outlook form.(Citation: SensePost Outlook Forms)'
    title: Outlook Forms
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.003
    mappings:
    - d3f:T1137.003
    exact_mappings:
    - attack:T1137.003
    is_a: T1137
    class_uri: d3f:T1137.003
  T1137_004:
    name: T1137_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.004
    description: 'Adversaries may abuse Microsoft Outlook''s Home Page feature to
      obtain persistence on a compromised system. Outlook Home Page is a legacy feature
      used to customize the presentation of Outlook folders. This feature allows for
      an internal or external URL to be loaded and presented whenever a folder is
      opened. A malicious HTML page can be crafted that will execute code when loaded
      by Outlook Home Page.(Citation: SensePost Outlook Home Page)'
    title: Outlook Home Page
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.004
    mappings:
    - d3f:T1137.004
    exact_mappings:
    - attack:T1137.004
    is_a: T1137
    class_uri: d3f:T1137.004
  T1137_005:
    name: T1137_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.005
    description: 'Adversaries may abuse Microsoft Outlook rules to obtain persistence
      on a compromised system. Outlook rules allow a user to define automated behavior
      to manage email messages. A benign rule might, for example, automatically move
      an email to a particular folder in Outlook if it contains specific words from
      a specific sender. Malicious Outlook rules can be created that can trigger code
      execution when an adversary sends a specifically crafted email to that user.(Citation:
      SilentBreak Outlook Rules)'
    title: Outlook Rules
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.005
    mappings:
    - d3f:T1137.005
    exact_mappings:
    - attack:T1137.005
    is_a: T1137
    class_uri: d3f:T1137.005
  T1137_006:
    name: T1137_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1137006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1137.006
    description: 'Adversaries may abuse Microsoft Office add-ins to obtain persistence
      on a compromised system. Office add-ins can be used to add functionality to
      Office programs. (Citation: Microsoft Office Add-ins) There are different types
      of add-ins that can be used by the various Office products; including Word/Excel
      add-in Libraries (WLL/XLL), VBA add-ins, Office Component Object Model (COM)
      add-ins, automation add-ins, VBA Editor (VBE), Visual Studio Tools for Office
      (VSTO) add-ins, and Outlook add-ins. (Citation: MRWLabs Office Persistence Add-ins)(Citation:
      FireEye Mail CDS 2018)'
    title: Add-ins
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1137.006
    mappings:
    - d3f:T1137.006
    exact_mappings:
    - attack:T1137.006
    is_a: T1137
    class_uri: d3f:T1137.006
  T1138:
    name: T1138
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1138
    annotations:
      attack-id:
        tag: attack-id
        value: T1138
    description: 'The Microsoft Windows Application Compatibility Infrastructure/Framework
      (Application Shim) was created to allow for backward compatibility of software
      as the operating system codebase changes over time. For example, the application
      shimming feature allows developers to apply fixes to applications (without rewriting
      code) that were created for Windows XP so that it will work with Windows 10.
      (Citation: Elastic Process Injection July 2017) Within the framework, shims
      are created to act as a buffer between the program (or more specifically, the
      Import Address Table) and the Windows OS. When a program is executed, the shim
      cache is referenced to determine if the program requires the use of the shim
      database (.sdb). If so, the shim database uses [Hooking](https://attack.mitre.org/techniques/T1179)
      to redirect the code as necessary in order to communicate with the OS.'
    title: Application Shimming
    comments:
    - This technique has been revoked by T1546.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.011
    mappings:
    - d3f:T1138
    exact_mappings:
    - attack:T1138
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1138
  T1139:
    name: T1139
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1139
    annotations:
      attack-id:
        tag: attack-id
        value: T1139
    description: "Bash keeps track of the commands users type on the command-line\
      \ with the \"history\" utility. Once a user logs out, the history is flushed\
      \ to the user\u2019s <code>.bash_history</code> file. For each user, this file\
      \ resides at the same location: <code>~/.bash_history</code>. Typically, this\
      \ file keeps track of the user\u2019s last 500 commands. Users often type usernames\
      \ and passwords on the command-line as parameters to programs, which then get\
      \ saved to this file when they log out. Attackers can abuse this by looking\
      \ through the file for potential credentials. (Citation: External to DA, the\
      \ OS X Way)"
    title: Bash History
    comments:
    - This technique has been revoked by T1552.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1552.003
    mappings:
    - d3f:T1139
    exact_mappings:
    - attack:T1139
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1139
  T1140:
    name: T1140
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1140
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1140
    description: Adversaries may use [Obfuscated Files or Information](https://attack.mitre.org/techniques/T1027)
      to hide artifacts of an intrusion from analysis. They may require separate mechanisms
      to decode or deobfuscate that information depending on how they intend to use
      it. Methods for doing that include built-in functionality of malware or by using
      utilities present on the system.
    title: Deobfuscate/Decode Files or Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1140
    exact_mappings:
    - attack:T1140
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1140
  T1141:
    name: T1141
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1141
    annotations:
      attack-id:
        tag: attack-id
        value: T1141
    description: 'When programs are executed that need additional privileges than
      are present in the current user context, it is common for the operating system
      to prompt the user for proper credentials to authorize the elevated privileges
      for the task (ex: [Bypass User Account Control](https://attack.mitre.org/techniques/T1088)).'
    title: Input Prompt
    comments:
    - This technique has been revoked by T1056.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1056.002
    mappings:
    - d3f:T1141
    exact_mappings:
    - attack:T1141
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1141
  T1142:
    name: T1142
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1142
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1142
    description: 'Keychains are the built-in way for macOS to keep track of users''
      passwords and credentials for many services and features such as WiFi passwords,
      websites, secure notes, certificates, and Kerberos. Keychain files are located
      in <code>~/Library/Keychains/</code>,<code>/Library/Keychains/</code>, and <code>/Network/Library/Keychains/</code>.
      (Citation: Wikipedia keychain) The <code>security</code> command-line utility,
      which is built into macOS by default, provides a useful way to manage these
      credentials.'
    title: Keychain
    comments:
    - This technique has been revoked by T1555.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1555.001
    mappings:
    - d3f:T1142
    exact_mappings:
    - attack:T1142
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1142
  T1143:
    name: T1143
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1143
    annotations:
      attack-id:
        tag: attack-id
        value: T1143
    description: Adversaries may implement hidden windows to conceal malicious activity
      from the plain sight of users. In some cases, windows that would typically be
      displayed when an application carries out an operation can be hidden. This may
      be utilized by system administrators to avoid disrupting user work environments
      when carrying out administrative tasks. Adversaries may abuse operating system
      functionality to hide otherwise visible windows from users so as not to alert
      the user to adversary activity on the system.
    title: Hidden Window
    comments:
    - This technique has been revoked by T1564.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1564.003
    mappings:
    - d3f:T1143
    exact_mappings:
    - attack:T1143
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1143
  T1144:
    name: T1144
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1144
    annotations:
      attack-id:
        tag: attack-id
        value: T1144
    description: In macOS and OS X, when applications or programs are downloaded from
      the internet, there is a special attribute set on the file called <code>com.apple.quarantine</code>.
      This attribute is read by Apple's Gatekeeper defense program at execution time
      and provides a prompt to the user to allow or deny execution.
    title: Gatekeeper Bypass
    comments:
    - This technique has been revoked by T1553.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1553.001
    mappings:
    - d3f:T1144
    exact_mappings:
    - attack:T1144
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1144
  T1145:
    name: T1145
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1145
    annotations:
      attack-id:
        tag: attack-id
        value: T1145
    description: 'Private cryptographic keys and certificates are used for authentication,
      encryption/decryption, and digital signatures. (Citation: Wikipedia Public Key
      Crypto)'
    title: Private Keys
    comments:
    - This technique has been revoked by T1552.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1552.004
    mappings:
    - d3f:T1145
    exact_mappings:
    - attack:T1145
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1145
  T1146:
    name: T1146
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1146
    annotations:
      attack-id:
        tag: attack-id
        value: T1146
    description: In addition to clearing system logs, an adversary may clear the command
      history of a compromised account to conceal the actions undertaken during an
      intrusion. macOS and Linux both keep track of the commands users type in their
      terminal so that users can retrace what they've done. These logs can be accessed
      in a few different ways. While logged in, this command history is tracked in
      a file pointed to by the environment variable <code>HISTFILE</code>. When a
      user logs off a system, this information is flushed to a file in the user's
      home directory called <code>~/.bash_history</code>. The benefit of this is that
      it allows users to go back to commands they've used before in different sessions.
      Since everything typed on the command-line is saved, passwords passed in on
      the command line are also saved. Adversaries can abuse this by searching these
      files for cleartext passwords. Additionally, adversaries can use a variety of
      methods to prevent their own commands from appear in these logs such as <code>unset
      HISTFILE</code>, <code>export HISTFILESIZE=0</code>, <code>history -c</code>,
      <code>rm ~/.bash_history</code>.
    title: Clear Command History
    comments:
    - This technique has been revoked by T1070.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1070.003
    mappings:
    - d3f:T1146
    exact_mappings:
    - attack:T1146
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1146
  T1147:
    name: T1147
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1147
    annotations:
      attack-id:
        tag: attack-id
        value: T1147
    description: 'Every user account in macOS has a userID associated with it. When
      creating a user, you can specify the userID for that account. There is a property
      value in <code>/Library/Preferences/com.apple.loginwindow</code> called <code>Hide500Users</code>
      that prevents users with userIDs 500 and lower from appearing at the login screen.
      By using the [Create Account](https://attack.mitre.org/techniques/T1136) technique
      with a userID under 500 and enabling this property (setting it to Yes), an adversary
      can hide their user accounts much more easily: <code>sudo dscl . -create /Users/username
      UniqueID 401</code> (Citation: Cybereason OSX Pirrit).'
    title: Hidden Users
    comments:
    - This technique has been revoked by T1564.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1564.002
    mappings:
    - d3f:T1147
    exact_mappings:
    - attack:T1147
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1147
  T1148:
    name: T1148
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1148
    annotations:
      attack-id:
        tag: attack-id
        value: T1148
    description: "The <code>HISTCONTROL</code> environment variable keeps track of\
      \ what should be saved by the <code>history</code> command and eventually into\
      \ the <code>~/.bash_history</code> file when a user logs out. This setting can\
      \ be configured to ignore commands that start with a space by simply setting\
      \ it to \"ignorespace\". <code>HISTCONTROL</code> can also be set to ignore\
      \ duplicate commands by setting it to \"ignoredups\". In some Linux systems,\
      \ this is set by default to \"ignoreboth\" which covers both of the previous\
      \ examples. This means that \u201C ls\u201D will not be saved, but \u201Cls\u201D\
      \ would be saved by history. <code>HISTCONTROL</code> does not exist by default\
      \ on macOS, but can be set by the user and will be respected. Adversaries can\
      \ use this to operate without leaving traces by simply prepending a space to\
      \ all of their terminal commands."
    title: HISTCONTROL
    comments:
    - This technique has been revoked by T1562.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1562.003
    mappings:
    - d3f:T1148
    exact_mappings:
    - attack:T1148
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1148
  T1149:
    name: T1149
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1149
    annotations:
      attack-id:
        tag: attack-id
        value: T1149
    description: '**This technique has been deprecated and should no longer be used.**'
    title: LC_MAIN Hijacking
    comments:
    - '**This technique has been deprecated and should no longer be used.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1149
    exact_mappings:
    - attack:T1149
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1149
  T1150:
    name: T1150
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1150
    annotations:
      attack-id:
        tag: attack-id
        value: T1150
    description: Property list (plist) files contain all of the information that macOS
      and OS X uses to configure applications and services. These files are UTF-8
      encoded and formatted like XML documents via a series of keys surrounded by
      < >. They detail when programs should execute, file paths to the executables,
      program arguments, required OS permissions, and many others. plists are located
      in certain locations depending on their purpose such as <code>/Library/Preferences</code>
      (which execute with elevated privileges) and <code>~/Library/Preferences</code>
      (which execute with a user's privileges).
    title: Plist Modification
    comments:
    - This technique has been revoked by T1547.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.011
    mappings:
    - d3f:T1150
    exact_mappings:
    - attack:T1150
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1150
  T1151:
    name: T1151
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1151
    annotations:
      attack-id:
        tag: attack-id
        value: T1151
    description: 'Adversaries can hide a program''s true filetype by changing the
      extension of a file. With certain file types (specifically this does not work
      with .app extensions), appending a space to the end of a filename will change
      how the file is processed by the operating system. For example, if there is
      a Mach-O executable file called evil.bin, when it is double clicked by a user,
      it will launch Terminal.app and execute. If this file is renamed to evil.txt,
      then when double clicked by a user, it will launch with the default text editing
      application (not executing the binary). However, if the file is renamed to "evil.txt
      " (note the space at the end), then when double clicked by a user, the true
      file type is determined by the OS and handled appropriately and the binary will
      be executed (Citation: Mac Backdoors are back).'
    title: Space after Filename
    comments:
    - This technique has been revoked by T1036.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1036.006
    mappings:
    - d3f:T1151
    exact_mappings:
    - attack:T1151
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1151
  T1152:
    name: T1152
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1152
    annotations:
      attack-id:
        tag: attack-id
        value: T1152
    description: 'Launchctl controls the macOS launchd process which handles things
      like launch agents and launch daemons, but can execute other commands or programs
      itself. Launchctl supports taking subcommands on the command-line, interactively,
      or even redirected from standard input. By loading or reloading launch agents
      or launch daemons, adversaries can install persistence or execute changes they
      made  (Citation: Sofacy Komplex Trojan). Running a command from launchctl is
      as simple as <code>launchctl submit -l <labelName> -- /Path/to/thing/to/execute
      "arg" "arg" "arg"</code>. Loading, unloading, or reloading launch agents or
      launch daemons can require elevated privileges.'
    title: Launchctl
    comments:
    - This technique has been revoked by T1569.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1569.001
    mappings:
    - d3f:T1152
    exact_mappings:
    - attack:T1152
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    - PersistenceTechnique
    class_uri: d3f:T1152
  T1153:
    name: T1153
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1153
    annotations:
      attack-id:
        tag: attack-id
        value: T1153
    description: '**This technique has been deprecated and should no longer be used.**'
    title: Source
    comments:
    - '**This technique has been deprecated and should no longer be used.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1153
    exact_mappings:
    - attack:T1153
    is_a: ExecutionTechnique
    class_uri: d3f:T1153
  T1154:
    name: T1154
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1154
    annotations:
      attack-id:
        tag: attack-id
        value: T1154
    description: 'The <code>trap</code> command allows programs and shells to specify
      commands that will be executed upon receiving interrupt signals. A common situation
      is a script allowing for graceful termination and handling of common  keyboard
      interrupts like <code>ctrl+c</code> and <code>ctrl+d</code>. Adversaries can
      use this to register code to be executed when the shell encounters specific
      interrupts either to gain execution or as a persistence mechanism. Trap commands
      are of the following format <code>trap ''command list'' signals</code> where
      "command list" will be executed when "signals" are received.(Citation: Trap
      Manual)(Citation: Cyberciti Trap Statements)'
    title: Trap
    comments:
    - This technique has been revoked by T1546.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.005
    mappings:
    - d3f:T1154
    exact_mappings:
    - attack:T1154
    is_a: ExecutionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1154
  T1155:
    name: T1155
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1155
    annotations:
      attack-id:
        tag: attack-id
        value: T1155
    description: macOS and OS X applications send AppleEvent messages to each other
      for interprocess communications (IPC). These messages can be easily scripted
      with AppleScript for local or remote IPC. Osascript executes AppleScript and
      any other Open Scripting Architecture (OSA) language scripts. A list of OSA
      languages installed on a system can be found by using the <code>osalang</code>
      program.
    title: AppleScript
    comments:
    - This technique has been revoked by T1059.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1059.002
    mappings:
    - d3f:T1155
    exact_mappings:
    - attack:T1155
    is_a: ExecutionTechnique
    class_uri: d3f:T1155
  T1156:
    name: T1156
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1156
    annotations:
      attack-id:
        tag: attack-id
        value: T1156
    description: "Adversaries may establish persistence through executing malicious\
      \ commands triggered by a user\u2019s shell. User shells execute several configuration\
      \ scripts at different points throughout the session based on events. For example,\
      \ when a user opens a command line interface or remotely logs in (such as SSH)\
      \ a login shell is initiated. The login shell executes scripts from the system\
      \ (/etc) and the user\u2019s home directory (~/) to configure the environment.\
      \ All login shells on a system use <code>/etc/profile</code> when initiated.\
      \ These configuration scripts run at the permission level of their directory\
      \ and are often used to set environment variables, create aliases, and customize\
      \ the user\u2019s environment. When the shell exits or terminates, additional\
      \ shell scripts are executed to ensure the shell exits appropriately."
    title: Malicious Shell Modification
    comments:
    - This technique has been revoked by T1546.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.004
    mappings:
    - d3f:T1156
    exact_mappings:
    - attack:T1156
    is_a: PersistenceTechnique
    class_uri: d3f:T1156
  T1157:
    name: T1157
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1157
    annotations:
      attack-id:
        tag: attack-id
        value: T1157
    description: macOS and OS X use a common method to look for required dynamic libraries
      (dylib) to load into a program based on search paths. Adversaries can take advantage
      of ambiguous paths to plant dylibs to gain privilege escalation or persistence.
    title: Dylib Hijacking
    comments:
    - This technique has been revoked by T1574.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1574.004
    mappings:
    - d3f:T1157
    exact_mappings:
    - attack:T1157
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1157
  T1158:
    name: T1158
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1158
    annotations:
      attack-id:
        tag: attack-id
        value: T1158
    description: "To prevent normal users from accidentally changing special files\
      \ on a system, most operating systems have the concept of a \u2018hidden\u2019\
      \ file. These files don\u2019t show up when a user browses the file system with\
      \ a GUI or when using normal commands on the command line. Users must explicitly\
      \ ask to show the hidden files either via a series of Graphical User Interface\
      \ (GUI) prompts or with command line switches (<code>dir /a</code> for Windows\
      \ and <code>ls \u2013a</code> for Linux and macOS)."
    title: Hidden Files and Directories
    comments:
    - This technique has been revoked by T1564.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1564.001
    mappings:
    - d3f:T1158
    exact_mappings:
    - attack:T1158
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1158
  T1159:
    name: T1159
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1159
    annotations:
      attack-id:
        tag: attack-id
        value: T1159
    description: "Per Apple\u2019s developer documentation, when a user logs in, a\
      \ per-user launchd process is started which loads the parameters for each launch-on-demand\
      \ user agent from the property list (plist) files found in <code>/System/Library/LaunchAgents</code>,\
      \ <code>/Library/LaunchAgents</code>, and <code>$HOME/Library/LaunchAgents</code>\
      \ (Citation: AppleDocs Launch Agent Daemons) (Citation: OSX Keydnap malware)\
      \ (Citation: Antiquated Mac Malware). These launch agents have property list\
      \ files which point to the executables that will be launched (Citation: OSX.Dok\
      \ Malware)."
    title: Launch Agent
    comments:
    - This technique has been revoked by T1543.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1543.001
    mappings:
    - d3f:T1159
    exact_mappings:
    - attack:T1159
    is_a: PersistenceTechnique
    class_uri: d3f:T1159
  T1160:
    name: T1160
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1160
    annotations:
      attack-id:
        tag: attack-id
        value: T1160
    description: "Per Apple\u2019s developer documentation, when macOS and OS X boot\
      \ up, launchd is run to finish system initialization. This process loads the\
      \ parameters for each launch-on-demand system-level daemon from the property\
      \ list (plist) files found in <code>/System/Library/LaunchDaemons</code> and\
      \ <code>/Library/LaunchDaemons</code> (Citation: AppleDocs Launch Agent Daemons).\
      \ These LaunchDaemons have property list files which point to the executables\
      \ that will be launched (Citation: Methods of Mac Malware Persistence)."
    title: Launch Daemon
    comments:
    - This technique has been revoked by T1543.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1543.004
    mappings:
    - d3f:T1160
    exact_mappings:
    - attack:T1160
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1160
  T1161:
    name: T1161
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1161
    annotations:
      attack-id:
        tag: attack-id
        value: T1161
    description: "Mach-O binaries have a series of headers that are used to perform\
      \ certain operations when a binary is loaded. The LC_LOAD_DYLIB header in a\
      \ Mach-O binary tells macOS and OS X which dynamic libraries (dylibs) to load\
      \ during execution time. These can be added ad-hoc to the compiled binary as\
      \ long adjustments are made to the rest of the fields and dependencies (Citation:\
      \ Writing Bad Malware for OSX). There are tools available to perform these changes.\
      \ Any changes will invalidate digital signatures on binaries because the binary\
      \ is being modified. Adversaries can remediate this issue by simply removing\
      \ the LC_CODE_SIGNATURE command from the binary so that the signature isn\u2019\
      t checked at load time (Citation: Malware Persistence on OS X)."
    title: LC_LOAD_DYLIB Addition
    comments:
    - This technique has been revoked by T1546.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.006
    mappings:
    - d3f:T1161
    exact_mappings:
    - attack:T1161
    is_a: PersistenceTechnique
    class_uri: d3f:T1161
  T1162:
    name: T1162
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1162
    annotations:
      attack-id:
        tag: attack-id
        value: T1162
    description: "MacOS provides the option to list specific applications to run when\
      \ a user logs in. These applications run under the logged in user's context,\
      \ and will be started every time the user logs in. Login items installed using\
      \ the Service Management Framework are not visible in the System Preferences\
      \ and can only be removed by the application that created them (Citation: Adding\
      \ Login Items). Users have direct control over login items installed using a\
      \ shared file list which are also visible in System Preferences (Citation: Adding\
      \ Login Items). These login items are stored in the user's <code>~/Library/Preferences/</code>\
      \ directory in a plist file called <code>com.apple.loginitems.plist</code> (Citation:\
      \ Methods of Mac Malware Persistence). Some of these applications can open visible\
      \ dialogs to the user, but they don\u2019t all have to since there is an option\
      \ to \u2018Hide\u2019 the window. If an adversary can register their own login\
      \ item or modified an existing one, then they can use it to execute their code\
      \ for a persistence mechanism each time the user logs in (Citation: Malware\
      \ Persistence on OS X) (Citation: OSX.Dok Malware). The API method <code> SMLoginItemSetEnabled\
      \ </code> can be used to set Login Items, but scripting languages like [AppleScript](https://attack.mitre.org/techniques/T1155)\
      \ can do this as well  (Citation: Adding Login Items)."
    title: Login Item
    comments:
    - This technique has been revoked by T1547.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.011
    mappings:
    - d3f:T1162
    exact_mappings:
    - attack:T1162
    is_a: PersistenceTechnique
    class_uri: d3f:T1162
  T1163:
    name: T1163
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1163
    annotations:
      attack-id:
        tag: attack-id
        value: T1163
    description: 'During the boot process, macOS executes <code>source /etc/rc.common</code>,
      which is a shell script containing various utility functions. This file also
      defines routines for processing command-line arguments and for gathering system
      settings, and is thus recommended to include in the start of Startup Item Scripts
      (Citation: Startup Items). In macOS and OS X, this is now a deprecated technique
      in favor of launch agents and launch daemons, but is currently still used.'
    title: Rc.common
    comments:
    - This technique has been revoked by T1037.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1037.004
    mappings:
    - d3f:T1163
    exact_mappings:
    - attack:T1163
    is_a: PersistenceTechnique
    class_uri: d3f:T1163
  T1164:
    name: T1164
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1164
    annotations:
      attack-id:
        tag: attack-id
        value: T1164
    description: Starting in Mac OS X 10.7 (Lion), users can specify certain applications
      to be re-opened when a user reboots their machine. While this is usually done
      via a Graphical User Interface (GUI) on an app-by-app basis, there are property
      list files (plist) that contain this information as well located at <code>~/Library/Preferences/com.apple.loginwindow.plist</code>
      and <code>~/Library/Preferences/ByHost/com.apple.loginwindow.* .plist</code>.
    title: Re-opened Applications
    comments:
    - This technique has been revoked by T1547.007
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.007
    mappings:
    - d3f:T1164
    exact_mappings:
    - attack:T1164
    is_a: PersistenceTechnique
    class_uri: d3f:T1164
  T1165:
    name: T1165
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1165
    annotations:
      attack-id:
        tag: attack-id
        value: T1165
    description: "Per Apple\u2019s documentation, startup items execute during the\
      \ final phase of the boot process and contain shell scripts or other executable\
      \ files along with configuration information used by the system to determine\
      \ the execution order for all startup items (Citation: Startup Items). This\
      \ is technically a deprecated version (superseded by Launch Daemons), and thus\
      \ the appropriate folder, <code>/Library/StartupItems</code> isn\u2019t guaranteed\
      \ to exist on the system by default, but does appear to exist by default on\
      \ macOS Sierra. A startup item is a directory whose executable and configuration\
      \ property list (plist), <code>StartupParameters.plist</code>, reside in the\
      \ top-level directory."
    title: Startup Items
    comments:
    - This technique has been revoked by T1037.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1037.005
    mappings:
    - d3f:T1165
    exact_mappings:
    - attack:T1165
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1165
  T1166:
    name: T1166
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1166
    annotations:
      attack-id:
        tag: attack-id
        value: T1166
    description: "When the setuid or setgid bits are set on Linux or macOS for an\
      \ application, this means that the application will run with the privileges\
      \ of the owning user or group respectively  (Citation: setuid man page). Normally\
      \ an application is run in the current user\u2019s context, regardless of which\
      \ user or group owns the application. There are instances where programs need\
      \ to be executed in an elevated context to function properly, but the user running\
      \ them doesn\u2019t need the elevated privileges. Instead of creating an entry\
      \ in the sudoers file, which must be done by root, any user can specify the\
      \ setuid or setgid flag to be set for their own applications. These bits are\
      \ indicated with an \"s\" instead of an \"x\" when viewing a file's attributes\
      \ via <code>ls -l</code>. The <code>chmod</code> program can set these bits\
      \ with via bitmasking, <code>chmod 4777 [file]</code> or via shorthand naming,\
      \ <code>chmod u+s [file]</code>."
    title: Setuid and Setgid
    comments:
    - This technique has been revoked by T1548.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1548.001
    mappings:
    - d3f:T1166
    exact_mappings:
    - attack:T1166
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1166
  T1167:
    name: T1167
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1167
    annotations:
      attack-id:
        tag: attack-id
        value: T1167
    description: "In OS X prior to El Capitan, users with root access can read plaintext\
      \ keychain passwords of logged-in users because Apple\u2019s keychain implementation\
      \ allows these credentials to be cached so that users are not repeatedly prompted\
      \ for passwords. (Citation: OS X Keychain) (Citation: External to DA, the OS\
      \ X Way) Apple\u2019s securityd utility takes the user\u2019s logon password,\
      \ encrypts it with PBKDF2, and stores this master key in memory. Apple also\
      \ uses a set of keys and algorithms to encrypt the user\u2019s password, but\
      \ once the master key is found, an attacker need only iterate over the other\
      \ values to unlock the final password. (Citation: OS X Keychain)"
    title: Securityd Memory
    comments:
    - This technique has been revoked by T1555.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1555.002
    mappings:
    - d3f:T1167
    exact_mappings:
    - attack:T1167
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1167
  T1168:
    name: T1168
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1168
    annotations:
      attack-id:
        tag: attack-id
        value: T1168
    description: 'On Linux and macOS systems, multiple methods are supported for creating
      pre-scheduled and periodic background jobs: cron, (Citation: Die.net Linux crontab
      Man Page) at, (Citation: Die.net Linux at Man Page) and launchd. (Citation:
      AppleDocs Scheduling Timed Jobs) Unlike [Scheduled Task/Job](https://attack.mitre.org/techniques/T1053)
      on Windows systems, job scheduling on Linux-based systems cannot be done remotely
      unless used in conjunction within an established remote session, like secure
      shell (SSH).'
    title: Local Job Scheduling
    comments:
    - This technique has been revoked by T1053
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1053
    mappings:
    - d3f:T1168
    exact_mappings:
    - attack:T1168
    is_a: ExecutionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1168
  T1169:
    name: T1169
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1169
    annotations:
      attack-id:
        tag: attack-id
        value: T1169
    description: 'The sudoers file, <code>/etc/sudoers</code>, describes which users
      can run which commands and from which terminals. This also describes which commands
      users can run as other users or groups. This provides the idea of least privilege
      such that users are running in their lowest possible permissions for most of
      the time and only elevate to other users or permissions as needed, typically
      by prompting for a password. However, the sudoers file can also specify when
      to not prompt users for passwords with a line like <code>user1 ALL=(ALL) NOPASSWD:
      ALL</code> (Citation: OSX.Dok Malware).'
    title: Sudo
    comments:
    - This technique has been revoked by T1548.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1548.003
    mappings:
    - d3f:T1169
    exact_mappings:
    - attack:T1169
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1169
  T1170:
    name: T1170
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1170
    annotations:
      attack-id:
        tag: attack-id
        value: T1170
    description: 'Mshta.exe is a utility that executes Microsoft HTML Applications
      (HTA). HTA files have the file extension <code>.hta</code>. (Citation: Wikipedia
      HTML Application) HTAs are standalone applications that execute using the same
      models and technologies of Internet Explorer, but outside of the browser. (Citation:
      MSDN HTML Applications)'
    title: Mshta
    comments:
    - This technique has been revoked by T1218.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.005
    mappings:
    - d3f:T1170
    exact_mappings:
    - attack:T1170
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1170
  T1171:
    name: T1171
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1171
    annotations:
      attack-id:
        tag: attack-id
        value: T1171
    description: 'Link-Local Multicast Name Resolution (LLMNR) and NetBIOS Name Service
      (NBT-NS) are Microsoft Windows components that serve as alternate methods of
      host identification. LLMNR is based upon the Domain Name System (DNS) format
      and allows hosts on the same local link to perform name resolution for other
      hosts. NBT-NS identifies systems on a local network by their NetBIOS name. (Citation:
      Wikipedia LLMNR) (Citation: TechNet NetBIOS)'
    title: LLMNR/NBT-NS Poisoning and Relay
    comments:
    - This technique has been revoked by T1557.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1557.001
    mappings:
    - d3f:T1171
    exact_mappings:
    - attack:T1171
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1171
  T1172:
    name: T1172
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1172
    annotations:
      attack-id:
        tag: attack-id
        value: T1172
    description: 'Domain fronting takes advantage of routing schemes in Content Delivery
      Networks (CDNs) and other services which host multiple domains to obfuscate
      the intended destination of HTTPS traffic or traffic tunneled through HTTPS.
      (Citation: Fifield Blocking Resistent Communication through domain fronting
      2015) The technique involves using different domain names in the SNI field of
      the TLS header and the Host field of the HTTP header. If both domains are served
      from the same CDN, then the CDN may route to the address specified in the HTTP
      header after unwrapping the TLS header. A variation of the the technique, "domainless"
      fronting, utilizes a SNI field that is left blank; this may allow the fronting
      to work even when the CDN attempts to validate that the SNI and HTTP Host fields
      match (if the blank SNI fields are ignored).'
    title: Domain Fronting
    comments:
    - This technique has been revoked by T1090.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1090.004
    mappings:
    - d3f:T1172
    exact_mappings:
    - attack:T1172
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1172
  T1173:
    name: T1173
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1173
    annotations:
      attack-id:
        tag: attack-id
        value: T1173
    description: Windows Dynamic Data Exchange (DDE) is a client-server protocol for
      one-time and/or continuous inter-process communication (IPC) between applications.
      Once a link is established, applications can autonomously exchange transactions
      consisting of strings, warm data links (notifications when a data item changes),
      hot data links (duplications of changes to a data item), and requests for command
      execution.
    title: Dynamic Data Exchange
    comments:
    - This technique has been revoked by T1559.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1559.002
    mappings:
    - d3f:T1173
    exact_mappings:
    - attack:T1173
    is_a: ExecutionTechnique
    class_uri: d3f:T1173
  T1174:
    name: T1174
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1174
    annotations:
      attack-id:
        tag: attack-id
        value: T1174
    description: Windows password filters are password policy enforcement mechanisms
      for both domain and local accounts. Filters are implemented as dynamic link
      libraries (DLLs) containing a method to validate potential passwords against
      password policies. Filter DLLs can be positioned on local computers for local
      accounts and/or domain controllers for domain accounts.
    title: Password Filter DLL
    comments:
    - This technique has been revoked by T1556.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1556.002
    mappings:
    - d3f:T1174
    exact_mappings:
    - attack:T1174
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1174
  T1175:
    name: T1175
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1175
    annotations:
      attack-id:
        tag: attack-id
        value: T1175
    description: '**This technique has been deprecated. Please use [Distributed Component
      Object Model](https://attack.mitre.org/techniques/T1021/003) and [Component
      Object Model](https://attack.mitre.org/techniques/T1559/001).**'
    title: Component Object Model and Distributed COM
    comments:
