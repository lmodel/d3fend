  Variability:
    name: Variability
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Variability
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-VAR
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Statistical dispersion. [Link](https://en.wikipedia.org/wiki/Statistical_dispersion)'
    description: Dispersion (also called variability, scatter, or spread) is the extent
      to which a distribution is stretched or squeezed. A measure of statistical dispersion
      is a nonnegative real number that is zero if all the data are the same and increases
      as the data become more diverse.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Variability
    is_a: DescriptiveStatistics
    class_uri: d3f:Variability
  VariableInitialization:
    name: VariableInitialization
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VariableInitialization
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-VI
      kb-article:
        tag: kb-article
        value: '## How it Works Initializing variables upon declaration ensures that
          the variable has a known quantity before use. ## Considerations * Default
          behavior when declaring variables varies by language. * This is particularly
          important in programming languages that do not initialize variables to a
          defaul'
    description: Setting variables to a known value before use.
    title: Variable Initialization
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:VariableInitialization
    related_mappings:
    - attack:T1505.001
    broad_mappings:
    - d3f:T1505
    is_a: SourceCodeHardening
    class_uri: d3f:VariableInitialization
  VariableTypeValidation:
    name: VariableTypeValidation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VariableTypeValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-VTV
      kb-article:
        tag: kb-article
        value: '## How it Works A developer should consider how the variable will
          be used throughout the program and choose the correct variable type. A developer
          should programmatically check if a variable has the correct (expected) type
          before using that variable. ## Considerations * The result of an operation
          o'
    description: Ensuring that a variable has the correct type.
    title: Variable Type Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:VariableTypeValidation
    is_a: SourceCodeHardening
    class_uri: d3f:VariableTypeValidation
  Variance:
    name: Variance
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Variance
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-VAR
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Variance. [Link](https://en.wikipedia.org/wiki/Variance)'
    description: Variance is a measure of dispersion, meaning it is a measure of how
      far a set of numbers is spread out from their average value.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Variance
    is_a: Variability
    class_uri: d3f:Variance
  VarianceReduction:
    name: VarianceReduction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VarianceReduction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-VR
      kb-article:
        tag: kb-article
        value: '## References Intro to Active Learning. inovex Blog. [Link](https://www.inovex.de/de/blog/intro-to-active-learning/).'
    description: Leverages a well-known result from statistical learning and decomposes
      the model error into a data noise term, a model bias term and a model variance
      term. As the noise term only depends on the data and the bias is induced by
      the choice of model, any reduction in the error can only come from the variance
      term.
    title: Variance Reduction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:VarianceReduction
    is_a: ActiveLearning
    class_uri: d3f:VarianceReduction
  VectorImage:
