      kb-article:
        tag: kb-article
        value: '## How it works File format specifications often define expected values
          for specific fields. A common example are file signatures, or magic numbers,
          which are used to quickly identify files. Another example is within the
          Compound Document Header of Microsoft Office files, the 29th and 30th byte
          ide'
    description: The process of checking specific static values within a file, such
      as file signatures or magic numbers, to ensure they match the expected values
      defined by the file format specification.
