        description: Initial Access
        meaning: d3f:AML.TA0004
        notes:
        - The adversary is trying to gain access to the AI system. The target system
          could be a network, mobile device, or an edge device such as a sensor platform.
          The AI capabilities used by the system could be local with onboard or cloud-enabled
          AI capabilities. Initial Access consists of techniques that use various
          entry vectors to gain their initial foothold within the system.
      AML_TA0005:
        text: AML_TA0005
        description: Execution
        meaning: d3f:AML.TA0005
        notes:
        - The adversary is trying to run malicious code embedded in AI artifacts or
          software. Execution consists of techniques that result in adversary-controlled
