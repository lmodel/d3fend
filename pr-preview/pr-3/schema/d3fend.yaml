  ProximitySensorMonitoring:
    name: ProximitySensorMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ProximitySensorMonitoring
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PSM
      synonym:
        tag: synonym
        value: Proximity Reader Monitoring
      kb-article:
        tag: kb-article
        value: '## How it works Proximity readers and sensors detect credentials or
          tagged assets within their read field, then report presence and, when applicable,
          authenticate to a controller for access decisions. Systems may use RSSI,
          dwell time, or time-of-flight to enforce zones and policies such as anti-pas'
    description: "Monitoring events from proximity sensors that indicate a credential\
      \ or tagged asset is within the sensor\u2019s read range or a defined zone.\
      \ Common enabling technologies include RFID, Bluetooth Low Energy (BLE), and\
      \ Ultra-Wideband (UWB)."
    title: Proximity Sensor Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
