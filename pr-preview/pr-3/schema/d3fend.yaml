    is_a: PlatformHardening
    class_uri: d3f:RadiationHardening
  RadioModem:
    name: RadioModem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RadioModem
    description: A radio modem provides the means to send digital data wirelessly.  Radio
      modems are used to communicate by direct broadcast satellite, WiFi, WiMax, mobile
      phones, GPS, Bluetooth and NFC. Modern telecommunications and data networks
      also make extensive use of radio modems where long distance data links are required.
      Such systems are an important part of the PSTN, and are also in common use for
      high-speed computer network links to outlying areas where fiber optic is not
      economical.
    title: Radio Modem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Modem#Radio
    mappings:
    - d3f:RadioModem
    is_a: Modem
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:RadioModem
  RandomForest:
    name: RandomForest
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RandomForest
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-RF
      kb-article:
        tag: kb-article
        value: '## References Random forest. Wikipedia. [Link](https://en.wikipedia.org/wiki/Random_forest).'
    description: Random Forest is a ML method that combines several other ML methods.
      At its core, Random Forest is an ensemble method of multiple bootstrapped decision
      trees filled with training data and random feature selection.
    title: Random Forest
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
