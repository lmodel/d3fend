  OperatingSystemExecutableFile:
    name: OperatingSystemExecutableFile
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingSystemExecutableFile
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An operating system executable is a critical executable that is part
      of the operating system, and without which, the operating system may not operate
