          Semi-Supervised Learning Method for Acoustic Event Classification. IEEE/ACM
          Transactions on Audio, Speech, and Language Processing, 29, 3580-3591. [Link](https://www.semanticscholar.org/paper/An-Effective-Perturbation-Based-'
    description: Perturbation based methods are proposed under the smoothness assumption,
      which indicates that two data points close to each other in feature space are
      likely to have the same label.
    title: Perturbation-based Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
