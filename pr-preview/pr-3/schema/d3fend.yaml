    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSetAttributesEvent
    description: An event where a file's metadata attributes are modified, such as
      changing its timestamps, labels, or categorization within the system.
    title: File Set Attributes Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FileSetAttributesEvent
    is_a: FileEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:FileSetAttributesEvent
  FileSetPermissionsEvent:
    name: FileSetPermissionsEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSetPermissionsEvent
    description: An event involving the modification of a file's permissions or access
      control list (ACL), specifying which users or processes are granted or restricted
      access.
    title: File Set Permissions Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FileSetPermissionsEvent
    is_a: FileEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:FileSetPermissionsEvent
  FileShareService:
    name: FileShareService
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileShareService
    description: A file sharing service (or file share service) provides the ability
      to share data across a network.
    title: File Share Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/File_sharing
    mappings:
    - d3f:FileShareService
    is_a: NetworkService
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
    class_uri: d3f:FileShareService
  FileSystem:
    name: FileSystem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSystem
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a file system or filesystem is used to control how
      data is stored and retrieved. Without a file system, information placed in a
      storage medium would be one large body of data with no way to tell where one
      piece of information stops and the next begins. By separating the data into
      pieces and giving each piece a name, the information is easily isolated and
      identified. Taking its name from the way paper-based information systems are
      named, each group of data is called a "file". The structure and logic rules
      used to manage the groups of information and their names is called a "file system".
    title: File System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/File_system
    mappings:
    - d3f:FileSystem
    exact_mappings:
    - unified_cyber_ontology:FileSystem
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FileSystem
  FileSystemLink:
    name: FileSystemLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSystemLink
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A file system link associates a name with a file on a file system.  Most
      generally, this may be a direct reference (a hard link) or an indirect one (a
      soft link).
    title: File System Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Hard_link
    mappings:
    - d3f:FileSystemLink
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FileSystemLink
  FileSystemMetadata:
    name: FileSystemMetadata
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSystemMetadata
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Metadata about the files and directories in a file system.  For example
      file name, file length, time modified, group and user ids, and other file attributes.
    title: File System Metadata
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/File_system#Metadata
    mappings:
    - d3f:FileSystemMetadata
    is_a: Metadata
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FileSystemMetadata
  FileSystemSensor:
    name: FileSystemSensor
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileSystemSensor
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Collects files and file metadata on an endpoint.
    title: File System Sensor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:FileSystemSensor
    is_a: EndpointSensor
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:FileSystemSensor
  FileTransferNetworkTraffic:
    name: FileTransferNetworkTraffic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileTransferNetworkTraffic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: File transfer network traffic is network traffic related to file
      transfers between network nodes. This includes only network traffic conforming
      to standard file transfer protocols, not custom transfer protocols.
    title: File Transfer Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
