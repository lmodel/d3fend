    is_a: EventLog
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:AuthenticationLog
  AuthenticationServer:
    name: AuthenticationServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AuthenticationServer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An authentication server provides a network service that applications
      use to authenticate the credentials, usually account names and passwords, of
      their users. When a client submits a valid set of credentials, it receives a
      cryptographic ticket that it can subsequently use to access various services.
      Major authentication algorithms include passwords, Kerberos, and public key
      encryption.
    title: Authentication Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Authentication_server
    mappings:
    - d3f:AuthenticationServer
    is_a: Server
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:AuthenticationServer
  AuthenticationService:
    name: AuthenticationService
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AuthenticationService
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An authentication service is a mechanism, analogous to the use of
      passwords on time-sharing systems, for the secure authentication of the identity
      of network clients by servers and vice versa, without presuming the operating
      system integrity of either (e.g., Kerberos).
    title: Authentication Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Authentication
    - https://www.gartner.com/en/information-technology/glossary/authentication-service
    mappings:
    - d3f:AuthenticationService
    is_a: ServiceApplicationProcess
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
    class_uri: d3f:AuthenticationService
  AuthenticationServiceApplication:
