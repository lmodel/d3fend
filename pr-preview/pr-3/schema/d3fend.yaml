  BooleanExpressionMatching:
    name: BooleanExpressionMatching
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BooleanExpressionMatching
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BEM
      kb-article:
        tag: kb-article
        value: '## How it works A Boolean expression is an expression used in programming
          languages that produces a Boolean value when evaluated. A Boolean value
          is either true or false. A Boolean expression may be composed of a combination
          of the Boolean constants true or false, Boolean-typed variables, Boolean-va'
    description: Boolean expression matching produces a Boolean truth value for a
      given boolean expression and assignment of values to variables in the expression.
    title: Boolean Expression Matching
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BooleanExpressionMatching
    is_a: LogicalRules
    class_uri: d3f:BooleanExpressionMatching
  Boosting:
    name: Boosting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Boosting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BOO
      kb-article:
        tag: kb-article
        value: "## How it works Boosting consists of using sequentially weak learners\
          \ where each iteration\u2019s training focuses on previously misclassified\
          \ instances in order to improve on the previous iteration. This process\
          \ is continued iteratively until the final prediction is made by aggregating\
          \ the previous pred"
    description: Boosting is a sequential process where each subsequent model attempts
      to correct the errors of the previous model
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Boosting
    is_a: EnsembleLearning
    class_uri: d3f:Boosting
  BootLoader:
    name: BootLoader
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootLoader
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: "A bootloader is software that is responsible for booting a computer.\
      \ When a computer is turned off, its software\u200D-\u200Cincluding operating\
      \ systems, application code, and data\u200D-\u200Cremains stored on non-volatile\
      \ memory. When the computer is powered on, it typically does not have an operating\
      \ system or its loader in random-access memory (RAM). The computer first executes\
      \ a relatively small program stored in read-only memory (ROM, and later EEPROM,\
      \ NOR flash) along with some needed data, to initialize RAM (especially on x86\
      \ systems) to access the nonvolatile device (usually block device, eg NAND flash)\
      \ or devices from which the operating system programs and data can be loaded\
      \ into RAM."
    title: Boot Loader
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Bootloader
    aliases:
    - Bootloader
    mappings:
    - d3f:BootLoader
    is_a: Software
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BootLoader
  BootROM:
    name: BootROM
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootROM
    annotations:
      synonym:
        tag: synonym
        value: Boot Read-only Memory
    description: Boot ROM is a piece of read-only memory (ROM) that is used for booting
      a computer system. It contains instructions that are run after the CPU is reset
      to the reset vector, and it typically loads a bootloader.
    title: Boot ROM
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Boot_ROM
    mappings:
    - d3f:BootROM
    is_a: ROM
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BootROM
  BootRecord:
    name: BootRecord
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootRecord
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A d3f:Record which is an essential component of the early boot (system
      initialization) process.
    title: Boot Record
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BootRecord
    is_a: Record
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BootRecord
  BootSector:
    name: BootSector
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootSector
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A boot record [boot sector] is the sector of a persistent data storage
      device (e.g., hard disk, floppy disk, optical disc, etc.) which contains machine
      code to be loaded into random-access memory (RAM) and then executed by a computer
      system's built-in firmware (e.g., the BIOS, Das U-Boot, etc.).
    title: Boot Sector
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Boot_sector
    mappings:
    - d3f:BootSector
    is_a: BootRecord
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BootSector
  BootloaderAuthentication:
    name: BootloaderAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootloaderAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-BA
      synonym:
        tag: synonym
        value: Secure Boot
    description: Cryptographically authenticating the bootloader software before system
      boot.
    title: Bootloader Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BootloaderAuthentication
    related_mappings:
    - attack:T1542.003
    broad_mappings:
    - d3f:T1542
    is_a: PlatformHardening
    class_uri: d3f:BootloaderAuthentication
  BootstrapAggregating:
    name: BootstrapAggregating
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BootstrapAggregating
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BA
      kb-article:
        tag: kb-article
        value: '## References Bootstrap aggregating. Wikipedia. [Link](https://en.wikipedia.org/wiki/Bootstrap_aggregating).'
    description: Bootstrap aggregating, also called bagging (from bootstrap aggregating),
      is a machine learning ensemble meta-algorithm designed to improve the stability
      and accuracy of machine learning algorithms used in statistical classification
      and regression. It also reduces variance and helps to avoid overfitting. Although
      it is usually applied to decision tree methods, it can be used with any type
      of method. Bagging is a special case of the model averaging approach.
    title: Bootstrap Aggregating
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BootstrapAggregating
    is_a: ResamplingEnsemble
    class_uri: d3f:BootstrapAggregating
  BroadcastDomainIsolation:
    name: BroadcastDomainIsolation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BroadcastDomainIsolation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-BDI
      synonym:
        tag: synonym
        value: Network Segmentation
      kb-article:
        tag: kb-article
        value: '## How it works Software Defined Networking, or other network encapsulation
          technologies intercept host broadcast traffic then route it to a specified
          destination per a configured policy. This can be implemented within hypervisors,
          networking hardware (WAPs, switches, routers), or virutal hardware.'
    description: Broadcast isolation restricts the number of computers a host can
      contact on their LAN.
    title: Broadcast Domain Isolation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BroadcastDomainIsolation
    is_a: NetworkIsolation
    class_uri: d3f:BroadcastDomainIsolation
  Browser:
    name: Browser
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Browser
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A web browser (commonly referred to as a browser) is a software application
      for retrieving, presenting, and traversing information resources on the World
      Wide Web. An information resource is identified by a Uniform Resource Identifier
      (URI/URL) and may be a web page, image, video or other piece of content. Hyperlinks
      present in resources enable users easily to navigate their browsers to related
      resources. Although browsers are primarily intended to use the World Wide Web,
      they can also be used to access information provided by web servers in private
      networks or files in file systems.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://wordnet-rdf.princeton.edu/id/13376000-n
    - http://dbpedia.org/resource/Web_browser
    mappings:
    - d3f:Browser
    is_a: UserApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Browser
  BrowserExtension:
    name: BrowserExtension
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BrowserExtension
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A browser extension is a plug-in that extends the functionality of
      a web browser in some way. Some extensions are authored using web technologies
      such as HTML, JavaScript, and CSS. Browser extensions can change the user interface
      of the web browser without directly affecting viewable content of a web page;
      for example, by adding a "toolbar."
    title: Browser Extension
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Browser_extension
    mappings:
    - d3f:BrowserExtension
    is_a: UserApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BrowserExtension
  BucketOfModels:
    name: BucketOfModels
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BucketOfModels
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-BOM
      kb-article:
        tag: kb-article
        value: '## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning).'
    description: A "bucket of models" is an ensemble technique in which a model selection
      algorithm is used to choose the best model for each problem. When tested with
      only one problem, a bucket of models can produce no better results than the
      best model in the set, but when evaluated across many problems, it will typically
      produce much better results, on average, than any model in the set.
    title: Bucket of Models
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BucketOfModels
    is_a: EnsembleLearning
    class_uri: d3f:BucketOfModels
  BuildTool:
    name: BuildTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BuildTool
    description: 'A tool that automates the process of creating a software build and
      the associated processes including: compiling computer source code into binary
      code, packaging binary code, and running automated tests.'
    title: Build Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Build_automation
    aliases:
    - Build Automation Tool
    mappings:
    - d3f:BuildTool
    is_a: DeveloperApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BuildTool
  BusMessage:
    name: BusMessage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusMessage
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A digital message potentially containing commands, telemetry, or
      status signals, encoded in a bus protocol and conveyed over a bus within one
      or more frames.
    title: Bus Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BusMessage
    is_a: DigitalMessage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusMessage
  BusMessageAuthentication:
    name: BusMessageAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusMessageAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-BMA
      kb-article:
        tag: kb-article
        value: '## How it works Bus Message Authentication functions as a continuous
          validation layer that operates between the physical transmission of a signal
          and the application layer''s processing of data. Every node on a bus network
          is provisioned with a cryptographic key and a synchronized ''freshness''
          state ('
    description: Applies cryptographic primitives to individual bus frames to verify
      the sender's identity and ensure the integrity of the data payload.
    title: Bus Message Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BusMessageAuthentication
    is_a: MessageAuthentication
    class_uri: d3f:BusMessageAuthentication
  BusNetwork:
    name: BusNetwork
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusNetwork
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An electronic communication system that links multiple components
      through one shared transmission medium, together with the interface hardware
      and link-layer signalling that govern access to that medium.
    title: Bus Network
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Bus_(computing)
    aliases:
    - Bus
    - Data Highway
    mappings:
    - d3f:BusNetwork
    is_a: Network
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusNetwork
  BusNetworkFrame:
    name: BusNetworkFrame
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusNetworkFrame
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A network frame whose layout and timing follow a bus protocol, allowing
      data to be exchanged across the shared bus medium.
    title: Bus Network Frame
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Bus Frame
    mappings:
    - d3f:BusNetworkFrame
    is_a: NetworkFrame
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusNetworkFrame
  BusNetworkNode:
    name: BusNetworkNode
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusNetworkNode
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A device or logical endpoint whose interface is directly connected
      to a bus and exchanges data over the shared medium using the protocol implemented
      on that interface.
    title: Bus Network Node
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BusNetworkNode
    is_a: Host
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusNetworkNode
  BusNetworkTraffic:
    name: BusNetworkTraffic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusNetworkTraffic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: The ordered flow of frames, structured by a bus protocol, that traverses
      the shared bus medium during operation.
    title: Bus Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:BusNetworkTraffic
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusNetworkTraffic
  BusinessCommunicationPlatformClient:
    name: BusinessCommunicationPlatformClient
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BusinessCommunicationPlatformClient
    description: Client software to enable the process of sharing information between
      employees within and outside a company.  Business communication encompasses
      topics such as marketing, brand management, customer relations, consumer behavior,
      advertising, public relations, corporate communication, community engagement,
      reputation management, interpersonal communication, employee engagement, and
      event management. It is closely related to the fields of professional communication
      and technical communication.
    title: Business Communication Platform Client
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Business_communication
    mappings:
    - d3f:BusinessCommunicationPlatformClient
    is_a: CollaborativeSoftware
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BusinessCommunicationPlatformClient
  ByteSequenceEmulation:
    name: ByteSequenceEmulation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ByteSequenceEmulation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-BSE
      synonym:
        tag: synonym
        value: Shellcode Transmission Detection
      kb-article:
        tag: kb-article
        value: '## How it works Bytes are analyzed as if they are machine code instructions,
          and such instructions that are a common component of known shellcode are
          noted, such as stack pivots, reads from a Memory Address Table, and system
          calls for functions that disable protections or execute code. For example'
    description: Analyzing sequences of bytes and determining if they likely represent
      malicious shellcode.
    title: Byte Sequence Emulation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ByteSequenceEmulation
    is_a: NetworkTrafficAnalysis
    class_uri: d3f:ByteSequenceEmulation
  C4_5:
    name: C4_5
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#C45
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-C4.
      kb-article:
        tag: kb-article
        value: '## References C4.5 algorithm. Wikipedia. [Link](https://en.wikipedia.org/wiki/C4.5_algorithm).'
    description: "C4.5 is an algorithm that is strongly based off ID3. It creates\
      \ decision trees the same way as ID3. C4.5 improves on several aspects of ID3,\
      \ including handling discreet variables, handling training data with missing\
      \ values, and has the ability to\_automatically prune the decision trees it\
      \ creates."
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - C4.5
    mappings:
    - d3f:C4.5
    is_a: DecisionTree
    class_uri: d3f:C4.5
  C5_0:
    name: C5_0
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#C50
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-C5.
      kb-article:
        tag: kb-article
        value: '## References C4.5 algorithm. Wikipedia. [Link](https://en.wikipedia.org/wiki/C4.5_algorithm).'
    description: C5.0 is the next version of C4.5, which in turn is the upgrade from
      ID3. The only difference between C5.0 and C4.5 is some improvements made to
      C5.0.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - C5.0
    mappings:
    - d3f:C5.0
    is_a: DecisionTree
    class_uri: d3f:C5.0
  CACertificateFile:
    name: CACertificateFile
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CACertificateFile
    description: A file containing a digital certificate issued by a certificate authority
      (CA).  Certificate authorities store, issue, and sign digital certificates used
      as part of the public key infrastructure.
    title: CA Certificate File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Certificate_authority
    - http://dbpedia.org/resource/Public_key_infrastructure
    mappings:
    - d3f:CACertificateFile
    is_a: CertificateFile
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CACertificateFile
  CAPEC_663:
    name: CAPEC_663
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CAPEC663
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      capec-id:
        tag: capec-id
