    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Intranet local area network (LAN) traffic is network traffic that
      does not cross a given network's boundaries; where that network is defined as
      a LAN.
    title: Local Area Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
