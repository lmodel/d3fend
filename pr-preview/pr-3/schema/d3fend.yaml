    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#UserBehaviorAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-UBA
      synonym:
        tag: synonym
        value: Credential Monitoring
      kb-article:
        tag: kb-article
        value: '## Technique Overview Some techniques monitor patterns of human behavior
          and then apply algorithms and to identify patterns such as repeated login
          attempts from a single IP address or large file downloads, or abnormal accesses.
          Other techniques may have explicit or rigid definitions of "bad behavi'
    description: User behavior analytics ("UBA") as defined by Gartner, is a cybersecurity
      process about detection of insider threats, targeted attacks, and financial
      fraud. UBA solutions look at patterns of human behavior, and then apply algorithms
      and statistical analysis to detect meaningful anomalies from those patterns-anomalies
      that indicate potential threats.' Instead of tracking devices or security events,
      UBA tracks a system's users. Big data platforms are increasing UBA functionality
      by allowing them to analyze petabytes worth of data to detect insider threats
      and advanced persistent threats.
    title: User Behavior Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/User_behavior_analytics
    mappings:
    - d3f:UserBehaviorAnalysis
    is_a: DefensiveTechnique
    class_uri: d3f:UserBehaviorAnalysis
