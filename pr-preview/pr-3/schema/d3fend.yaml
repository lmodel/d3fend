  ApplicationHardening:
    name: ApplicationHardening
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ApplicationHardening
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-AH
      synonym:
        tag: synonym
        value: Process Hardening
      kb-article:
        tag: kb-article
        value: '## Technique Overview Exploits may, for example, rely on knowledge
          of addresses in a process''s memory, they may alter memory contents, and
          they may cause a program to use instructions in a way that they were not
          intended. By, for example, including code that dynamically changes the memory
          address'
    description: Application Hardening makes an executable application more resilient
      to a class of exploits which either introduce new code or execute unwanted existing
      code. These techniques may be applied at compile-time or on an application binary.
    title: Application Hardening
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ApplicationHardening
    is_a: DefensiveTechnique
    class_uri: d3f:ApplicationHardening
