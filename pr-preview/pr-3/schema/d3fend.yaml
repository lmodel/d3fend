        value: D3A-DAT
      kb-article:
        tag: kb-article
        value: '## How it works Datalog generally uses a bottom-up rather than top-down
          evaluation model. This difference yields significantly different behavior
          and properties from Prolog. It is often used as a query language for deductive
          databases. Datalog has been applied to problems in data integration, networ'
    description: Datalog is a declarative logic programming language that is a syntactically
      a subset of Prolog.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Datalog
    is_a: LogicProgramming
    class_uri: d3f:Datalog
  DeadCodeElimination:
    name: DeadCodeElimination
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DeadCodeElimination
