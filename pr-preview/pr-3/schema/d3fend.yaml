  BlockDevice:
    name: BlockDevice
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BlockDevice
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: 'A block device (or block special file) provides buffered access
      to hardware devices, and provides some abstraction from their specifics.


      IEEE Std 1003.1-2017: A file that refers to a device. A block special file is
      normally distinguished from a character special file by providing access to
      the device in a manner such that the hardware characteristics of the device
      are not visible.'
    title: Block Device
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://pubs.opengroup.org/onlinepubs/9699919799/basedefs/V1_chap03.html#tag_03_79
    - http://dbpedia.org/resource/Device_file#BLOCKDEV
    aliases:
    - Block Special File
    mappings:
    - d3f:BlockDevice
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:BlockDevice
  BookReference:
    name: BookReference
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#BookReference
    annotations:
      pref-label:
        tag: pref-label
