    is_a: NetworkEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TunnelEvent
  TunnelOpenEvent:
    name: TunnelOpenEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TunnelOpenEvent
    description: An event where a network tunnel is established, enabling encapsulated
      communication between endpoints. This marks the initiation of secure or isolated
      data transport through the tunnel.
    title: Tunnel Open Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TunnelOpenEvent
    is_a: TunnelEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TunnelOpenEvent
  TunnelRenewEvent:
    name: TunnelRenewEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TunnelRenewEvent
    description: An event where the lifecycle of a network tunnel is extended, ensuring
      continued encapsulated communication and avoiding session expiration.
    title: Tunnel Renew Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TunnelRenewEvent
    is_a: TunnelEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:TunnelRenewEvent
  UDPEvent:
    name: UDPEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#UDPEvent
    description: An event involving the User Datagram Protocol (UDP), providing a
      connectionless datagram service with minimal protocol mechanisms.
    title: UDP Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:UDPEvent
    is_a: TransportLayerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:UDPEvent
  URL:
    name: URL
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#URL
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A Uniform Resource Locator (URL), commonly informally termed a web
      address (a term which is not defined identically) is a reference to a web resource
      that specifies its location on a computer network and a mechanism for retrieving
      it.A URL is a specific type of Uniform Resource Identifier (URI), although many
      people use the two terms interchangeably. A URL implies the means to access
      an indicated resource, which is not true of every URI. URLs occur most commonly
      to reference web pages (http), but are also used for file transfer (ftp), email
      (mailto), database access (JDBC), and many other applications.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/url
    - http://dbpedia.org/resource/Uniform_Resource_Locator
    aliases:
    - Uniform Resource Locator
    mappings:
    - d3f:URL
    exact_mappings:
    - unified_cyber_ontology:URL
    close_mappings:
    - stix:Url
    is_a: Identifier
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:URL
  URLAnalysis:
    name: URLAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#URLAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-UA
      kb-article:
        tag: kb-article
        value: '## How it works URLs may contain components, for example: * scheme
          * userinfo * host name * port * path * query * fragment These components
          are used as features in analysis algorithms. Contextual information about
          a URL such as where it is embedded (ex. emails, files, network protocols),'
    description: Determining if a URL is benign or malicious by analyzing the URL
      or its components.
    title: URL Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:URLAnalysis
    related_mappings:
    - attack:T1189
    - attack:T1204.001
    - attack:T1566.002
    - attack:T1566.003
    broad_mappings:
    - d3f:InitialAccessTechnique
    - d3f:T1204
    - d3f:T1566
    is_a: IdentifierAnalysis
    class_uri: d3f:URLAnalysis
  URLReputationAnalysis:
    name: URLReputationAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#URLReputationAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-URA
