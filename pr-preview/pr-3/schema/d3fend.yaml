    - attack:T1055.014
    is_a: T1055
    class_uri: d3f:T1055.014
  T1055_015:
    name: T1055_015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1055015
    annotations:
      attack-id:
        tag: attack-id
        value: T1055.015
    description: Adversaries may abuse list-view controls to inject malicious code
      into hijacked processes in order to evade process-based defenses as well as
      possibly elevate privileges. ListPlanting is a method of executing arbitrary
      code in the address space of a separate live process. Code executed via ListPlanting
      may also evade detection from security products since the execution is masked
      under a legitimate process.
    title: ListPlanting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1055.015
    mappings:
    - d3f:T1055.015
    exact_mappings:
    - attack:T1055.015
    is_a: T1055
    class_uri: d3f:T1055.015
  T1056:
    name: T1056
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1056
    annotations:
      attack-id:
        tag: attack-id
        value: T1056
    description: Adversaries may use methods of capturing user input to obtain credentials
      or collect information. During normal system usage, users often provide credentials
      to various different locations, such as login pages/portals or system dialog
      boxes. Input capture mechanisms may be transparent to the user (e.g. [Credential
      API Hooking](https://attack.mitre.org/techniques/T1056/004)) or rely on deceiving
      the user into providing input into what they believe to be a genuine service
      (e.g. [Web Portal Capture](https://attack.mitre.org/techniques/T1056/003)).
    title: Input Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1056
    exact_mappings:
    - attack:T1056
    is_a: CollectionTechnique
    mixins:
    - CredentialAccessTechnique
    class_uri: d3f:T1056
  T1056_001:
    name: T1056_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1056001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1056.001
    description: 'Adversaries may log user keystrokes to intercept credentials as
      the user types them. Keylogging is likely to be used to acquire credentials
      for new access opportunities when [OS Credential Dumping](https://attack.mitre.org/techniques/T1003)
      efforts are not effective, and may require an adversary to intercept keystrokes
      on a system for a substantial period of time before credentials can be successfully
      captured. In order to increase the likelihood of capturing credentials quickly,
      an adversary may also perform actions such as clearing browser cookies to force
      users to reauthenticate to systems.(Citation: Talos Kimsuky Nov 2021)'
    title: Keylogging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1056.001
    mappings:
    - d3f:T1056.001
    exact_mappings:
    - attack:T1056.001
    is_a: T1056
    class_uri: d3f:T1056.001
  T1056_002:
    name: T1056_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1056002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1056.002
    description: 'Adversaries may mimic common operating system GUI components to
      prompt users for credentials with a seemingly legitimate prompt. When programs
      are executed that need additional privileges than are present in the current
      user context, it is common for the operating system to prompt the user for proper
      credentials to authorize the elevated privileges for the task (ex: [Bypass User
      Account Control](https://attack.mitre.org/techniques/T1548/002)).'
    title: GUI Input Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1056.002
    mappings:
    - d3f:T1056.002
    exact_mappings:
    - attack:T1056.002
    is_a: T1056
    class_uri: d3f:T1056.002
  T1056_003:
    name: T1056_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1056003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1056.003
    description: Adversaries may install code on externally facing portals, such as
      a VPN login page, to capture and transmit credentials of users who attempt to
      log into the service. For example, a compromised login page may log provided
      user credentials before logging the user in to the service.
    title: Web Portal Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1056.003
    mappings:
    - d3f:T1056.003
    exact_mappings:
    - attack:T1056.003
    is_a: T1056
    class_uri: d3f:T1056.003
  T1056_004:
    name: T1056_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1056004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1056.004
    description: 'Adversaries may hook into Windows application programming interface
      (API) functions to collect user credentials. Malicious hooking mechanisms may
      capture API calls that include parameters that reveal user authentication credentials.(Citation:
      Microsoft TrojanSpy:Win32/Ursnif.gen!I Sept 2017) Unlike [Keylogging](https://attack.mitre.org/techniques/T1056/001),  this
      technique focuses specifically on API functions that include parameters that
      reveal user credentials. Hooking involves redirecting calls to these functions
      and can be implemented via:'
    title: Credential API Hooking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1056.004
    mappings:
    - d3f:T1056.004
    exact_mappings:
    - attack:T1056.004
    is_a: T1056
    class_uri: d3f:T1056.004
  T1057:
    name: T1057
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1057
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1057
    description: Adversaries may attempt to get information about running processes
      on a system. Information obtained could be used to gain an understanding of
      common software/applications running on systems within the network. Administrator
      or otherwise elevated access may provide better process details. Adversaries
      may use the information from [Process Discovery](https://attack.mitre.org/techniques/T1057)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: Process Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1057
    exact_mappings:
    - attack:T1057
    is_a: DiscoveryTechnique
    class_uri: d3f:T1057
  T1058:
    name: T1058
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1058
    annotations:
      attack-id:
        tag: attack-id
        value: T1058
    description: 'Windows stores local service configuration information in the Registry
      under <code>HKLM\SYSTEM\CurrentControlSet\Services</code>. The information stored
      under a service''s Registry keys can be manipulated to modify a service''s execution
      parameters through tools such as the service controller, sc.exe, [PowerShell](https://attack.mitre.org/techniques/T1086),
      or [Reg](https://attack.mitre.org/software/S0075). Access to Registry keys is
      controlled through Access Control Lists and permissions. (Citation: MSDN Registry
      Key Security)'
    title: Service Registry Permissions Weakness
    comments:
    - This technique has been revoked by T1574.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1574.011
    mappings:
    - d3f:T1058
    exact_mappings:
    - attack:T1058
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1058
  T1059:
    name: T1059
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1059
    description: Adversaries may abuse command and script interpreters to execute
      commands, scripts, or binaries. These interfaces and languages provide ways
      of interacting with computer systems and are a common feature across many different
      platforms. Most systems come with some built-in command-line interface and scripting
      capabilities, for example, macOS and Linux distributions include some flavor
      of [Unix Shell](https://attack.mitre.org/techniques/T1059/004) while Windows
      installations include the [Windows Command Shell](https://attack.mitre.org/techniques/T1059/003)
      and [PowerShell](https://attack.mitre.org/techniques/T1059/001).
    title: Command and Scripting Interpreter
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1059
    exact_mappings:
    - attack:T1059
    is_a: ExecutionTechnique
    class_uri: d3f:T1059
  T1059_001:
    name: T1059_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059001
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.001
    description: 'Adversaries may abuse PowerShell commands and scripts for execution.
      PowerShell is a powerful interactive command-line interface and scripting environment
      included in the Windows operating system.(Citation: TechNet PowerShell) Adversaries
      can use PowerShell to perform a number of actions, including discovery of information
      and execution of code. Examples include the <code>Start-Process</code> cmdlet
      which can be used to run an executable and the <code>Invoke-Command</code> cmdlet
      which runs a command locally or on a remote computer (though administrator permissions
      are required to use PowerShell to connect to remote systems).'
    title: PowerShell
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.001
    mappings:
    - d3f:T1059.001
    exact_mappings:
    - attack:T1059.001
    is_a: T1059
    class_uri: d3f:T1059.001
  T1059_002:
    name: T1059_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059002
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.002
    description: 'Adversaries may abuse AppleScript for execution. AppleScript is
      a macOS scripting language designed to control applications and parts of the
      OS via inter-application messages called AppleEvents.(Citation: Apple AppleScript)
      These AppleEvent messages can be sent independently or easily scripted with
      AppleScript. These events can locate open windows, send keystrokes, and interact
      with almost any open application locally or remotely.'
    title: AppleScript
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.002
    mappings:
    - d3f:T1059.002
    exact_mappings:
    - attack:T1059.002
    is_a: T1059
    class_uri: d3f:T1059.002
  T1059_003:
    name: T1059_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059003
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.003
    description: 'Adversaries may abuse the Windows command shell for execution. The
      Windows command shell ([cmd](https://attack.mitre.org/software/S0106)) is the
      primary command prompt on Windows systems. The Windows command prompt can be
      used to control almost any aspect of a system, with various permission levels
      required for different subsets of commands. The command prompt can be invoked
      remotely via [Remote Services](https://attack.mitre.org/techniques/T1021) such
      as [SSH](https://attack.mitre.org/techniques/T1021/004).(Citation: SSH in Windows)'
    title: Windows Command Shell
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.003
    mappings:
    - d3f:T1059.003
    exact_mappings:
    - attack:T1059.003
    is_a: T1059
    class_uri: d3f:T1059.003
  T1059_004:
    name: T1059_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059004
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.004
    description: 'Adversaries may abuse Unix shell commands and scripts for execution.
      Unix shells are the primary command prompt on Linux and macOS systems, though
      many variations of the Unix shell exist (e.g. sh, bash, zsh, etc.) depending
      on the specific OS or distribution.(Citation: DieNet Bash)(Citation: Apple ZShell)
      Unix shells can control every aspect of a system, with certain commands requiring
      elevated privileges.'
    title: Unix Shell
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Bash Execution
    mappings:
    - d3f:T1059.004
    exact_mappings:
    - attack:T1059.004
    is_a: T1059
    class_uri: d3f:T1059.004
  T1059_005:
    name: T1059_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059005
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.005
    description: 'Adversaries may abuse Visual Basic (VB) for execution. VB is a programming
      language created by Microsoft with interoperability with many Windows technologies
      such as [Component Object Model](https://attack.mitre.org/techniques/T1559/001)
      and the [Native API](https://attack.mitre.org/techniques/T1106) through the
      Windows API. Although tagged as legacy with no planned future evolutions, VB
      is integrated and supported in the .NET Framework and cross-platform .NET Core.(Citation:
      VB .NET Mar 2020)(Citation: VB Microsoft)'
    title: Visual Basic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.005
    mappings:
    - d3f:T1059.005
    exact_mappings:
    - attack:T1059.005
    is_a: T1059
    class_uri: d3f:T1059.005
  T1059_006:
    name: T1059_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059006
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.006
    description: 'Adversaries may abuse Python commands and scripts for execution.
      Python is a very popular scripting/programming language, with capabilities to
      perform many functions. Python can be executed interactively from the command-line
      (via the <code>python.exe</code> interpreter) or via scripts (.py) that can
      be written and distributed to different systems. Python code can also be compiled
      into binary executables.(Citation: Zscaler APT31 Covid-19 October 2020)'
    title: Python
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.006
    mappings:
    - d3f:T1059.006
    exact_mappings:
    - attack:T1059.006
    is_a: T1059
    class_uri: d3f:T1059.006
  T1059_007:
    name: T1059_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059007
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.007
    description: 'Adversaries may abuse various implementations of JavaScript for
      execution. JavaScript (JS) is a platform-independent scripting language (compiled
      just-in-time at runtime) commonly associated with scripts in webpages, though
      JS can be executed in runtime environments outside the browser.(Citation: NodeJS)'
    title: JavaScript
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.007
    mappings:
    - d3f:T1059.007
    exact_mappings:
    - attack:T1059.007
    is_a: T1059
    class_uri: d3f:T1059.007
  T1059_008:
    name: T1059_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059008
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.008
    description: Adversaries may abuse scripting or built-in command line interpreters
      (CLI) on network devices to execute malicious command and payloads. The CLI
      is the primary means through which users and administrators interact with the
      device in order to view system information, modify device operations, or perform
      diagnostic and administrative functions. CLIs typically contain various permission
      levels required for different commands.
    title: Network Device CLI
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.008
    mappings:
    - d3f:T1059.008
    exact_mappings:
    - attack:T1059.008
    is_a: T1059
    class_uri: d3f:T1059.008
  T1059_009:
    name: T1059_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059009
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.009
    description: 'Adversaries may abuse cloud APIs to execute malicious commands.
      APIs available in cloud environments provide various functionalities and are
      a feature-rich method for programmatic access to nearly all aspects of a tenant.
      These APIs may be utilized through various methods such as command line interpreters
      (CLIs), in-browser Cloud Shells, [PowerShell](https://attack.mitre.org/techniques/T1059/001)
      modules like Azure for PowerShell(Citation: Microsoft - Azure PowerShell), or
      software developer kits (SDKs) available for languages such as [Python](https://attack.mitre.org/techniques/T1059/006).'
    title: Cloud API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.009
    mappings:
    - d3f:T1059.009
    exact_mappings:
    - attack:T1059.009
    is_a: T1059
    class_uri: d3f:T1059.009
  T1059_010:
    name: T1059_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059010
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.010
    description: 'Adversaries may execute commands and perform malicious tasks using
      AutoIT and AutoHotKey automation scripts. AutoIT and AutoHotkey (AHK) are scripting
      languages that enable users to automate Windows tasks. These automation scripts
      can be used to perform a wide variety of actions, such as clicking on buttons,
      entering text, and opening and closing programs.(Citation: AutoIT)(Citation:
      AutoHotKey)'
    title: AutoHotKey & AutoIT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.010
    mappings:
    - d3f:T1059.010
    exact_mappings:
    - attack:T1059.010
    is_a: T1059
    class_uri: d3f:T1059.010
  T1059_011:
    name: T1059_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059011
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.011
    description: 'Adversaries may abuse Lua commands and scripts for execution. Lua
      is a cross-platform scripting and programming language primarily designed for
      embedded use in applications. Lua can be executed on the command-line (through
      the stand-alone lua interpreter), via scripts (<code>.lua</code>), or from Lua-embedded
      programs (through the <code>struct lua_State</code>).(Citation: Lua main page)(Citation:
      Lua state)'
    title: Lua
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.011
    mappings:
    - d3f:T1059.011
    exact_mappings:
    - attack:T1059.011
    is_a: T1059
    class_uri: d3f:T1059.011
  T1059_012:
    name: T1059_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059012
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.012
    description: Adversaries may abuse hypervisor command line interpreters (CLIs)
      to execute malicious commands. Hypervisor CLIs typically enable a wide variety
      of functionality for managing both the hypervisor itself and the guest virtual
      machines it hosts.
    title: Hypervisor CLI
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.012
    mappings:
    - d3f:T1059.012
    exact_mappings:
    - attack:T1059.012
    is_a: T1059
    class_uri: d3f:T1059.012
  T1059_013:
    name: T1059_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1059013
    annotations:
      attack-id:
        tag: attack-id
        value: T1059.013
    description: Adversaries may abuse built-in CLI tools or API calls to execute
      malicious commands in containerized environments.
    title: Container CLI/API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1059.013
    mappings:
    - d3f:T1059.013
    exact_mappings:
    - attack:T1059.013
    is_a: T1059
    class_uri: d3f:T1059.013
  T1060:
    name: T1060
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1060
    annotations:
      attack-id:
        tag: attack-id
        value: T1060
    description: 'Adversaries may achieve persistence by adding a program to a startup
      folder or referencing it with a Registry run key. Adding an entry to the "run
      keys" in the Registry or startup folder will cause the program referenced to
      be executed when a user logs in. (Citation: Microsoft Run Key) These programs
      will be executed under the context of the user and will have the account''s
      associated permissions level.'
    title: Registry Run Keys / Startup Folder
    comments:
    - This technique has been revoked by T1547.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.001
    mappings:
    - d3f:T1060
    exact_mappings:
    - attack:T1060
    is_a: PersistenceTechnique
    class_uri: d3f:T1060
  T1061:
    name: T1061
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1061
    annotations:
      attack-id:
        tag: attack-id
        value: T1061
    description: '**This technique has been deprecated. Please use [Remote Services](https://attack.mitre.org/techniques/T1021)
      where appropriate.**'
    title: Graphical User Interface
    comments:
    - '**This technique has been deprecated. Please use [Remote Services](https://attack.mitre.org/techniques/T1021)
      where appropriate.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1061
    exact_mappings:
    - attack:T1061
    is_a: ExecutionTechnique
    class_uri: d3f:T1061
  T1062:
    name: T1062
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1062
    annotations:
      attack-id:
        tag: attack-id
        value: T1062
    description: '**This technique has been deprecated and should no longer be used.**'
    title: Hypervisor
    comments:
    - '**This technique has been deprecated and should no longer be used.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1062
    exact_mappings:
    - attack:T1062
    is_a: PersistenceTechnique
    class_uri: d3f:T1062
  T1063:
    name: T1063
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1063
    annotations:
      attack-id:
        tag: attack-id
        value: T1063
    description: Adversaries may attempt to get a listing of security software, configurations,
      defensive tools, and sensors that are installed on the system. This may include
      things such as local firewall rules and anti-virus. Adversaries may use the
      information from [Security Software Discovery](https://attack.mitre.org/techniques/T1063)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: Security Software Discovery
    comments:
    - This technique has been revoked by T1518.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1518.001
    mappings:
    - d3f:T1063
    exact_mappings:
    - attack:T1063
    is_a: DiscoveryTechnique
    class_uri: d3f:T1063
  T1064:
    name: T1064
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1064
    annotations:
      attack-id:
        tag: attack-id
        value: T1064
    description: '**This technique has been deprecated. Please use [Command and Scripting
      Interpreter](https://attack.mitre.org/techniques/T1059) where appropriate.**'
    title: Scripting
    comments:
    - '**This technique has been deprecated. Please use [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059)
      where appropriate.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
