  T1430_001:
    name: T1430_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1430001
    annotations:
      attack-id:
        tag: attack-id
        value: T1430.001
    description: 'An adversary may use access to cloud services (e.g. Google''s Android
      Device Manager or Apple iCloud''s Find my iPhone) or to an enterprise mobility
      management (EMM)/mobile device management (MDM) server console to track the
      location of mobile devices managed by the service.(Citation: Krebs-Location)'
