    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SPM
      kb-article:
        tag: kb-article
        value: "## How it works A basic example of string searching is when the pattern\
          \ and the searched text are arrays of elements of an alphabet (finite set)\
          \ \u03A3. \u03A3 may be a human language alphabet, for example, the letters\
          \ A through Z and other applications may use a binary alphabet (\u03A3 =\
          \ {0,1}) or a DNA alphabet"
    description: String pattern-matching algorithms, also known as string-matching
      algorithms, are an important class of string algorithms that try to find a place
      where one or several strings (also called patterns) are found within a larger
      string or text
    title: String Pattern Matching
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:StringPatternMatching
    is_a: PatternMatching
    class_uri: d3f:StringPatternMatching
  StrongPasswordPolicy:
    name: StrongPasswordPolicy
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StrongPasswordPolicy
