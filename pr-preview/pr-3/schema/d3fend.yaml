    name: AgglomerativeClustering
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AgglomerativeClustering
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-AC
      kb-article:
        tag: kb-article
        value: '## How it works Agglomerative clustering starts with each data point
          as its own cluster. The algorithm then iterates, identifying the two clusters
          that are closest to each other based on a defined distance metric (e.g.,
          Euclidean, Manhattan). These two clusters are then merged into a single
          cluster'
    description: Agglomerative Clustering is a type of hierarchical clustering method
      where data points are grouped together based on similarity. Initially, each
      data point is treated as an individual cluster, and then in successive iterations,
      the closest clusters are merged until only one large cluster remains or until
      a specified stopping criterion is met.
    title: Agglomerative Clustering
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:AgglomerativeClustering
    is_a: HierarchicalClustering
