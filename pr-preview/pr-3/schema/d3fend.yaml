    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkTrafficAnalysisSoftware
    annotations:
      synonym:
        tag: synonym
        value: Network Sniffer
    description: A packet analyzer, also known as packet sniffer, protocol analyzer,
      or network analyzer, is a computer program or computer hardware such as a packet
      capture appliance, that can intercept and log traffic that passes over a computer
      network or part of a network."
    title: Network Traffic Analysis Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
