    annotations:
      attack-id:
        tag: attack-id
        value: T1422
    description: Adversaries may look for details about the network configuration
      and settings, such as IP and/or MAC addresses, of devices they access or through
      information discovery of remote systems.
    title: System Network Configuration Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
