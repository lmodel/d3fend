  SystemStartupDirectory:
    name: SystemStartupDirectory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemStartupDirectory
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
