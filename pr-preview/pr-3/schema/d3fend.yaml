  Actuator:
    name: Actuator
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Actuator
    description: An actuator is a mechanical or electromechanical device that, upon
      receiving a relatively low-energy control signal (e.g., electrical voltage,
      fluid pressure, or human force), translates its primary energy source (electric,
      hydraulic, or pneumatic) into targeted mechanical motion or adjustment. It typically
      works in conjunction with a control device (like a valve or logic driver) and
      is central to automation, enabling machines or systems to move, open, close,
      or otherwise manipulate their components or environment. By amplifying or redirecting
      energy from one form to another, the actuator executes control commands, thereby
      automating processes in industrial, automotive, aerospace, and other domains
      where precise mechanical action is essential.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
