  NetworkNode:
    name: NetworkNode
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkNode
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In telecommunications networks, a node (Latin nodus, 'knot') is either
      a redistribution point or a communication endpoint. The definition of a node
      depends on the network and protocol layer referred to. A physical network node
      is an electronic device that is attached to a network, and is capable of creating,
      receiving, or transmitting information over a communications channel. A passive
      distribution point such as a distribution frame or patch panel is consequently
      not a node.
    title: Network Node
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Node_(networking)
    mappings:
    - d3f:NetworkNode
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkNode
  NetworkNodeInventory:
    name: NetworkNodeInventory
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkNodeInventory
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-NNI
      synonym:
        tag: synonym
        value: System Discovery
      kb-article:
        tag: kb-article
        value: '## How it works Administrators collect information on network nodes
          in their architecture using a variety of administrative and management tools
          that query network devices and nodes for information. In some cases, where
          such queries are not supported or provide specific information of interest,
          an'
    description: Network node inventorying identifies and records all the network
      nodes (hosts, routers, switches, firewalls, etc.) in the organization's architecture.
    title: Network Node Inventory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NetworkNodeInventory
    related_mappings:
    - attack:T1114.002
    - attack:T1505.002
    - attack:T1505.003
    broad_mappings:
