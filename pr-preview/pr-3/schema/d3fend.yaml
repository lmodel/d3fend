        value: D3A-PE
      kb-article:
        tag: kb-article
        value: '## References Pennsylvania State University. (n.d.). Statistical Inference
          and Estimation. [Link](https://online.stat.psu.edu/stat504/lesson/statistical-inference-and-estimation)'
    description: A point estimation is a single value that estimates the parameter.
      Point estimates are single values calculated from the sample
    title: Point Estimation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PointEstimation
    is_a: Estimation
    class_uri: d3f:PointEstimation
  Pointer:
    name: Pointer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Pointer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computer science, a pointer is a programming language object,
      whose value refers to (or "points to") another value stored elsewhere in the
      computer memory using its memory address. A pointer references a location in
      memory, and obtaining the value stored at that location is known as dereferencing
      the pointer. As an analogy, a page number in a book's index could be considered
      a pointer to the corresponding page; dereferencing such a pointer would be done
      by flipping to the page with the given page number.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Pointer_(computer_programming)
    mappings:
    - d3f:Pointer
    is_a: DigitalInformation
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Pointer
  PointerAuthentication:
    name: PointerAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PointerAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PAN
      kb-article:
        tag: kb-article
        value: '## How It Works Pointer Authentication (frequently referred to as
          PAC, although the technique is properly Pointer Authentication) is a security
          feature to provide protection against attackers with memory read/write access.
          A Pointer Authentication Code (PAC) is a cryptographic hash or derivative
          c'
    description: Comparing the cryptographic hash or derivative of a pointer's value
      to an expected value.
    title: Pointer Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PointerAuthentication
    is_a: ApplicationHardening
    class_uri: d3f:PointerAuthentication
  PointerDereferencingFunction:
    name: PointerDereferencingFunction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PointerDereferencingFunction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A function which has an operation which dereferences a pointer.
    title: Pointer Dereferencing Function
    comments:
    - Note, this is not the actual code which performs the dereferencing operation
      internal to an application runtime.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PointerDereferencingFunction
    is_a: Subroutine
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PointerDereferencingFunction
  PointerValidation:
    name: PointerValidation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PointerValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-PV
    description: Ensuring that a pointer variable has the required properties for
      use.
    title: Pointer Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PointerValidation
    is_a: SourceCodeHardening
    class_uri: d3f:PointerValidation
  PolicyGradient:
    name: PolicyGradient
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PolicyGradient
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-PG
      kb-article:
        tag: kb-article
        value: '## References Policy Gradients in a Nutshell. Towards Data Science.
          [Link](https://towardsdatascience.com/policy-gradients-in-a-nutshell-8b72f9743c5d).'
    description: "The objective of a Reinforcement Learning Policy Gradient agent\
      \ is to maximize the \u201Cexpected\u201D reward when following a policy"
    title: Policy Gradient
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PolicyGradient
    is_a: Model_freeReinforcementLearning
    class_uri: d3f:PolicyGradient
  PolicyReference:
    name: PolicyReference
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PolicyReference
