    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: The Windows Registry is a hierarchical database that stores low-level
      settings for the Microsoft Windows operating system and for applications that
      opt to use the registry. The kernel, device drivers, services, Security Accounts
      Manager, and user interface can all use the registry. The registry also allows
      access to counters for profiling system performance.
    title: Windows Registry
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Windows_Registry
    - https://learn.microsoft.com/en-us/troubleshoot/windows-server/performance/windows-registry-advanced-users
    mappings:
    - d3f:WindowsRegistry
    is_a: SystemConfigurationDatabase
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WindowsRegistry
