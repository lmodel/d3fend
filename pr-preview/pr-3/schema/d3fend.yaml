    mappings:
    - d3f:T1184
    exact_mappings:
    - attack:T1184
    is_a: LateralMovementTechnique
    class_uri: d3f:T1184
  T1185:
    name: T1185
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1185
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1185
    description: 'Adversaries may take advantage of security vulnerabilities and inherent
      functionality in browser software to change content, modify user-behaviors,
      and intercept information as part of various browser session hijacking techniques.(Citation:
      Wikipedia Man in the Browser)'
    title: Browser Session Hijacking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1185
    exact_mappings:
    - attack:T1185
    is_a: CollectionTechnique
    class_uri: d3f:T1185
  T1186:
    name: T1186
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1186
    annotations:
      attack-id:
        tag: attack-id
        value: T1186
    description: 'Windows Transactional NTFS (TxF) was introduced in Vista as a method
      to perform safe file operations. (Citation: Microsoft TxF) To ensure data integrity,
      TxF enables only one transacted handle to write to a file at a given time. Until
      the write handle transaction is terminated, all other handles are isolated from
      the writer and may only read the committed version of the file that existed
      at the time the handle was opened. (Citation: Microsoft Basic TxF Concepts)
      To avoid corruption, TxF performs an automatic rollback if the system or application
      fails during a write transaction. (Citation: Microsoft Where to use TxF)'
    title: "Process Doppelg\xE4nging"
    comments:
    - This technique has been revoked by T1055.013
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1055.013
    mappings:
    - d3f:T1186
    exact_mappings:
    - attack:T1186
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1186
  T1187:
    name: T1187
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1187
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1187
    description: Adversaries may gather credential material by invoking or forcing
      a user to automatically provide authentication information through a mechanism
      in which they can intercept.
    title: Forced Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1187
    exact_mappings:
    - attack:T1187
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1187
  T1188:
    name: T1188
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1188
    annotations:
      attack-id:
        tag: attack-id
        value: T1188
    description: To disguise the source of malicious traffic, adversaries may chain
      together multiple proxies. Typically, a defender will be able to identify the
      last proxy traffic traversed before it enters their network; the defender may
      or may not be able to identify any previous proxies before the last-hop proxy.
      This technique makes identifying the original source of the malicious traffic
      even more difficult by requiring the defender to trace malicious traffic through
      several proxies to identify its source.
    title: Multi-hop Proxy
    comments:
    - This technique has been revoked by T1090.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1090.003
    mappings:
    - d3f:T1188
    exact_mappings:
    - attack:T1188
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1188
  T1189:
    name: T1189
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1189
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1189
    description: Adversaries may gain access to a system through a user visiting a
      website over the normal course of browsing. With this technique, the user's
      web browser is typically targeted for exploitation, but adversaries may also
      use compromised websites for non-exploitation behavior such as acquiring [Application
      Access Token](https://attack.mitre.org/techniques/T1550/001).
    title: Drive-by Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1189
    exact_mappings:
    - attack:T1189
    is_a: InitialAccessTechnique
    class_uri: d3f:T1189
  T1190:
    name: T1190
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1190
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1190
    description: Adversaries may attempt to exploit a weakness in an Internet-facing
      host or system to initially access a network. The weakness in the system can
      be a software bug, a temporary glitch, or a misconfiguration.
    title: Exploit Public-Facing Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1190
    exact_mappings:
    - attack:T1190
    is_a: InitialAccessTechnique
    class_uri: d3f:T1190
  T1191:
    name: T1191
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1191
    annotations:
      attack-id:
        tag: attack-id
        value: T1191
    description: 'The Microsoft Connection Manager Profile Installer (CMSTP.exe) is
      a command-line program used to install Connection Manager service profiles.
      (Citation: Microsoft Connection Manager Oct 2009) CMSTP.exe accepts an installation
      information file (INF) as a parameter and installs a service profile leveraged
      for remote access connections.'
    title: CMSTP
    comments:
    - This technique has been revoked by T1218.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.003
    mappings:
    - d3f:T1191
    exact_mappings:
    - attack:T1191
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1191
  T1192:
    name: T1192
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1192
    annotations:
      attack-id:
        tag: attack-id
        value: T1192
    description: Spearphishing with a link is a specific variant of spearphishing.
      It is different from other forms of spearphishing in that it employs the use
      of links to download malware contained in email, instead of attaching malicious
      files to the email itself, to avoid defenses that may inspect email attachments.
    title: Spearphishing Link
    comments:
    - This technique has been revoked by T1566.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1566.002
    mappings:
    - d3f:T1192
    exact_mappings:
    - attack:T1192
    is_a: InitialAccessTechnique
    class_uri: d3f:T1192
  T1193:
    name: T1193
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1193
    annotations:
      attack-id:
        tag: attack-id
        value: T1193
    description: Spearphishing attachment is a specific variant of spearphishing.
      Spearphishing attachment is different from other forms of spearphishing in that
      it employs the use of malware attached to an email. All forms of spearphishing
      are electronically delivered social engineering targeted at a specific individual,
      company, or industry. In this scenario, adversaries attach a file to the spearphishing
      email and usually rely upon [User Execution](https://attack.mitre.org/techniques/T1204)
      to gain execution.
    title: Spearphishing Attachment
    comments:
    - This technique has been revoked by T1566.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1566.001
    mappings:
    - d3f:T1193
    exact_mappings:
    - attack:T1193
    is_a: InitialAccessTechnique
    class_uri: d3f:T1193
  T1194:
    name: T1194
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1194
    annotations:
      attack-id:
        tag: attack-id
        value: T1194
    description: Spearphishing via service is a specific variant of spearphishing.
      It is different from other forms of spearphishing in that it employs the use
      of third party services rather than directly via enterprise email channels.
    title: Spearphishing via Service
    comments:
    - This technique has been revoked by T1566.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1566.003
    mappings:
    - d3f:T1194
    exact_mappings:
    - attack:T1194
    is_a: InitialAccessTechnique
    class_uri: d3f:T1194
  T1195:
    name: T1195
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1195
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1195
    description: Adversaries may manipulate products or product delivery mechanisms
      prior to receipt by a final consumer for the purpose of data or system compromise.
    title: Supply Chain Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1195
    exact_mappings:
    - attack:T1195
    is_a: InitialAccessTechnique
    class_uri: d3f:T1195
  T1195_001:
    name: T1195_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1195001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1195.001
    description: 'Adversaries may manipulate software dependencies and development
      tools prior to receipt by a final consumer for the purpose of data or system
      compromise. Applications often depend on external software to function properly.
      Popular open source projects that are used as dependencies in many applications
      may be targeted as a means to add malicious code to users of the dependency.(Citation:
      Trendmicro NPM Compromise)'
    title: Compromise Software Dependencies and Development Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1195.001
    mappings:
    - d3f:T1195.001
    exact_mappings:
    - attack:T1195.001
    is_a: T1195
    class_uri: d3f:T1195.001
  T1195_002:
    name: T1195_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1195002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1195.002
    description: Adversaries may manipulate application software prior to receipt
      by a final consumer for the purpose of data or system compromise. Supply chain
      compromise of software can take place in a number of ways, including manipulation
      of the application source code, manipulation of the update/distribution mechanism
      for that software, or replacing compiled releases with a modified version.
    title: Compromise Software Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1195.002
    mappings:
    - d3f:T1195.002
    exact_mappings:
    - attack:T1195.002
    is_a: T1195
    class_uri: d3f:T1195.002
  T1195_003:
    name: T1195_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1195003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1195.003
    description: Adversaries may manipulate hardware components in products prior
      to receipt by a final consumer for the purpose of data or system compromise.
      By modifying hardware or firmware in the supply chain, adversaries can insert
      a backdoor into consumer networks that may be difficult to detect and give the
      adversary a high degree of control over the system. Hardware backdoors may be
      inserted into various devices, such as servers, workstations, network infrastructure,
      or peripherals.
    title: Compromise Hardware Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1195.003
    mappings:
    - d3f:T1195.003
    exact_mappings:
    - attack:T1195.003
    is_a: T1195
    class_uri: d3f:T1195.003
  T1196:
    name: T1196
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1196
    annotations:
      attack-id:
        tag: attack-id
        value: T1196
    description: 'Windows Control Panel items are utilities that allow users to view
      and adjust computer settings. Control Panel items are registered executable
      (.exe) or Control Panel (.cpl) files, the latter are actually renamed dynamic-link
      library (.dll) files that export a CPlApplet function. (Citation: Microsoft
      Implementing CPL) (Citation: TrendMicro CPL Malware Jan 2014) Control Panel
      items can be executed directly from the command line, programmatically via an
      application programming interface (API) call, or by simply double-clicking the
      file. (Citation: Microsoft Implementing CPL) (Citation: TrendMicro CPL Malware
      Jan 2014) (Citation: TrendMicro CPL Malware Dec 2013)'
    title: Control Panel Items
    comments:
    - This technique has been revoked by T1218.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.002
    mappings:
    - d3f:T1196
    exact_mappings:
    - attack:T1196
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1196
  T1197:
    name: T1197
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1197
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1197
    description: 'Adversaries may abuse BITS jobs to persistently execute code and
      perform various background tasks. Windows Background Intelligent Transfer Service
      (BITS) is a low-bandwidth, asynchronous file transfer mechanism exposed through
      [Component Object Model](https://attack.mitre.org/techniques/T1559/001) (COM).(Citation:
      Microsoft COM)(Citation: Microsoft BITS) BITS is commonly used by updaters,
      messengers, and other applications preferred to operate in the background (using
      available idle bandwidth) without interrupting other networked applications.
      File transfer tasks are implemented as BITS jobs, which contain a queue of one
      or more file operations.'
    title: BITS Jobs
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1197
    exact_mappings:
    - attack:T1197
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1197
  T1198:
    name: T1198
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1198
    annotations:
      attack-id:
        tag: attack-id
        value: T1198
    description: 'In user mode, Windows Authenticode (Citation: Microsoft Authenticode)
      digital signatures are used to verify a file''s origin and integrity, variables
      that may be used to establish trust in signed code (ex: a driver with a valid
      Microsoft signature may be handled as safe). The signature validation process
      is handled via the WinVerifyTrust application programming interface (API) function,  (Citation:
      Microsoft WinVerifyTrust) which accepts an inquiry and coordinates with the
      appropriate trust provider, which is responsible for validating parameters of
      a signature. (Citation: SpectorOps Subverting Trust Sept 2017)'
    title: SIP and Trust Provider Hijacking
    comments:
    - This technique has been revoked by T1553.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1553.003
    mappings:
    - d3f:T1198
    exact_mappings:
    - attack:T1198
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1198
  T1199:
    name: T1199
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1199
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1199
    description: Adversaries may breach or otherwise leverage organizations who have
      access to intended victims. Access through trusted third party relationship
      abuses an existing connection that may not be protected or receives less scrutiny
      than standard mechanisms of gaining access to a network.
    title: Trusted Relationship
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1199
    exact_mappings:
    - attack:T1199
    is_a: InitialAccessTechnique
    class_uri: d3f:T1199
  T1200:
    name: T1200
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1200
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1200
    description: Adversaries may introduce computer accessories, networking hardware,
      or other computing devices into a system or network that can be used as a vector
      to gain access. Rather than just connecting and distributing payloads via removable
      storage (i.e. [Replication Through Removable Media](https://attack.mitre.org/techniques/T1091)),
      more robust hardware additions can be used to introduce new functionalities
      and/or features into a system that can then be abused.
    title: Hardware Additions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1200
    exact_mappings:
    - attack:T1200
    is_a: InitialAccessTechnique
    class_uri: d3f:T1200
  T1201:
    name: T1201
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1201
    annotations:
      attack-id:
        tag: attack-id
        value: T1201
    description: Adversaries may attempt to access detailed information about the
      password policy used within an enterprise network or cloud environment. Password
      policies are a way to enforce complex passwords that are difficult to guess
      or crack through [Brute Force](https://attack.mitre.org/techniques/T1110). This
      information may help the adversary to create a list of common passwords and
      launch dictionary and/or brute force attacks which adheres to the policy (e.g.
      if the minimum password length should be 8, then not trying passwords such as
      'pass123'; not checking for more than 3-4 passwords per account if the lockout
      is set to 6 as to not lock out accounts).
    title: Password Policy Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1201
    exact_mappings:
    - attack:T1201
    is_a: DiscoveryTechnique
    class_uri: d3f:T1201
  T1202:
    name: T1202
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1202
    annotations:
      attack-id:
        tag: attack-id
        value: T1202
    description: 'Adversaries may abuse utilities that allow for command execution
      to bypass security restrictions that limit the use of command-line interpreters.
      Various Windows utilities may be used to execute commands, possibly without
      invoking [cmd](https://attack.mitre.org/software/S0106). For example, [Forfiles](https://attack.mitre.org/software/S0193),
      the Program Compatibility Assistant (pcalua.exe), components of the Windows
      Subsystem for Linux (WSL), as well as other utilities may invoke the execution
      of programs and commands from a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059),
      Run window, or via scripts. (Citation: VectorSec ForFiles Aug 2017) (Citation:
      Evi1cg Forfiles Nov 2017)'
    title: Indirect Command Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1202
    exact_mappings:
    - attack:T1202
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1202
  T1203:
    name: T1203
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1203
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1203
    description: Adversaries may exploit software vulnerabilities in client applications
      to execute code. Vulnerabilities can exist in software due to unsecure coding
      practices that can lead to unanticipated behavior. Adversaries can take advantage
      of certain vulnerabilities through targeted exploitation for the purpose of
      arbitrary code execution. Oftentimes the most valuable exploits to an offensive
      toolkit are those that can be used to obtain code execution on a remote system
      because they can be used to gain access to that system. Users will expect to
      see files related to the applications they commonly used to do work, so they
      are a useful target for exploit research and development because of their high
      utility.
    title: Exploitation for Client Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1203
    exact_mappings:
    - attack:T1203
    is_a: ExecutionTechnique
    class_uri: d3f:T1203
  T1204:
    name: T1204
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204
    annotations:
      attack-id:
        tag: attack-id
        value: T1204
    description: An adversary may rely upon specific actions by a user in order to
      gain execution. Users may be subjected to social engineering to get them to
      execute malicious code by, for example, opening a malicious document file or
      link. These user actions will typically be observed as follow-on behavior from
      forms of [Phishing](https://attack.mitre.org/techniques/T1566).
    title: User Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1204
    exact_mappings:
    - attack:T1204
    is_a: ExecutionTechnique
    class_uri: d3f:T1204
  T1204_001:
    name: T1204_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1204.001
    description: An adversary may rely upon a user clicking a malicious link in order
      to gain execution. Users may be subjected to social engineering to get them
      to click on a link that will lead to code execution. This user action will typically
      be observed as follow-on behavior from [Spearphishing Link](https://attack.mitre.org/techniques/T1566/002).
      Clicking on a link may also lead to other execution techniques such as exploitation
      of a browser or application vulnerability via [Exploitation for Client Execution](https://attack.mitre.org/techniques/T1203).
      Links may also lead users to download files that require execution via [Malicious
      File](https://attack.mitre.org/techniques/T1204/002).
    title: Malicious Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1204.001
    mappings:
    - d3f:T1204.001
    exact_mappings:
    - attack:T1204.001
    is_a: T1204
    class_uri: d3f:T1204.001
  T1204_002:
    name: T1204_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1204.002
    description: An adversary may rely upon a user opening a malicious file in order
      to gain execution. Users may be subjected to social engineering to get them
      to open a file that will lead to code execution. This user action will typically
      be observed as follow-on behavior from [Spearphishing Attachment](https://attack.mitre.org/techniques/T1566/001).
      Adversaries may use several types of files that require a user to execute them,
      including .doc, .pdf, .xls, .rtf, .scr, .exe, .lnk, .pif, and .cpl.
    title: Malicious File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1204.002
    mappings:
    - d3f:T1204.002
    exact_mappings:
    - attack:T1204.002
    is_a: T1204
    class_uri: d3f:T1204.002
  T1204_003:
    name: T1204_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204003
    annotations:
      attack-id:
        tag: attack-id
        value: T1204.003
    description: 'Adversaries may rely on a user running a malicious image to facilitate
      execution. Amazon Web Services (AWS) Amazon Machine Images (AMIs), Google Cloud
      Platform (GCP) Images, and Azure Images as well as popular container runtimes
      such as Docker can be backdoored. Backdoored images may be uploaded to a public
      repository via [Upload Malware](https://attack.mitre.org/techniques/T1608/001),
      and users may then download and deploy an instance or container from the image
      without realizing the image is malicious, thus bypassing techniques that specifically
      achieve Initial Access. This can lead to the execution of malicious code, such
      as code that executes cryptocurrency mining, in the instance or container.(Citation:
      Summit Route Malicious AMIs)'
    title: Malicious Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1204.003
    mappings:
    - d3f:T1204.003
    exact_mappings:
    - attack:T1204.003
    is_a: T1204
    class_uri: d3f:T1204.003
  T1204_004:
    name: T1204_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204004
    annotations:
      attack-id:
        tag: attack-id
        value: T1204.004
    description: An adversary may rely upon a user copying and pasting code in order
      to gain execution. Users may be subjected to social engineering to get them
      to copy and paste code directly into a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).
    title: Malicious Copy and Paste
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1204.004
    mappings:
    - d3f:T1204.004
    exact_mappings:
    - attack:T1204.004
    is_a: T1204
    class_uri: d3f:T1204.004
  T1204_005:
    name: T1204_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1204005
    annotations:
      attack-id:
        tag: attack-id
        value: T1204.005
    description: 'Adversaries may rely on a user installing a malicious library to
      facilitate execution. Threat actors may [Upload Malware](https://attack.mitre.org/techniques/T1608/001)
      to package managers such as NPM and PyPi, as well as to public code repositories
      such as GitHub. User may install libraries without realizing they are malicious,
      thus bypassing techniques that specifically achieve Initial Access. This can
      lead to the execution of malicious code, such as code that establishes persistence,
      steals data, or mines cryptocurrency.(Citation: Datadog Security Labs Malicious
      PyPi Packages 2024)(Citation: Fortinet Malicious NPM Packages 2023)'
    title: Malicious Library
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1204.005
    mappings:
    - d3f:T1204.005
    exact_mappings:
    - attack:T1204.005
    is_a: T1204
    class_uri: d3f:T1204.005
  T1205:
    name: T1205
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1205
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1205
    description: Adversaries use traffic signaling techniques, such as sending specific
      network sequences or magic packets, to covertly trigger actions like opening
      ports, activating backdoors, or installing filters, facilitating command and
      control, persistence, and defense evasion.
    title: Traffic Signaling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1205
    exact_mappings:
    - attack:T1205
    is_a: CommandAndControlTechnique
    mixins:
    - DefenseEvasionTechnique
    - PersistenceTechnique
    class_uri: d3f:T1205
  T1205_001:
    name: T1205_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1205001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1205.001
    description: Adversaries may use port knocking to hide open ports used for persistence
      or command and control. To enable a port, an adversary sends a series of attempted
      connections to a predefined sequence of closed ports. After the sequence is
      completed, opening a port is often accomplished by the host based firewall,
      but could also be implemented by custom software.
    title: Port Knocking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1205.001
    mappings:
    - d3f:T1205.001
    exact_mappings:
    - attack:T1205.001
    is_a: T1205
    class_uri: d3f:T1205.001
  T1205_002:
    name: T1205_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1205002
    annotations:
      attack-id:
        tag: attack-id
        value: T1205.002
    description: Adversaries may attach filters to a network socket to monitor then
      activate backdoors used for persistence or command and control. With elevated
      permissions, adversaries can use features such as the `libpcap` library to open
      sockets and install filters to allow or disallow certain types of data to come
      through the socket. The filter may apply to all traffic passing through the
      specified network interface (or every interface if not specified). When the
      network interface receives a packet matching the filter criteria, additional
      actions can be triggered on the host, such as activation of a reverse shell.
    title: Socket Filters
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1205.002
    mappings:
    - d3f:T1205.002
    exact_mappings:
    - attack:T1205.002
    is_a: T1205
    class_uri: d3f:T1205.002
  T1206:
    name: T1206
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1206
    annotations:
      attack-id:
        tag: attack-id
        value: T1206
    description: 'The <code>sudo</code> command "allows a system administrator to
      delegate authority to give certain users (or groups of users) the ability to
      run some (or all) commands as root or another user while providing an audit
      trail of the commands and their arguments." (Citation: sudo man page 2018) Since
      sudo was made for the system administrator, it has some useful configuration
      features such as a <code>timestamp_timeout</code> that is the amount of time
      in minutes between instances of <code>sudo</code> before it will re-prompt for
      a password. This is because <code>sudo</code> has the ability to cache credentials
      for a period of time. Sudo creates (or touches) a file at <code>/var/db/sudo</code>
      with a timestamp of when sudo was last run to determine this timeout. Additionally,
      there is a <code>tty_tickets</code> variable that treats each new tty (terminal
      session) in isolation. This means that, for example, the sudo timeout of one
      tty will not affect another tty (you will have to type the password again).'
    title: Sudo Caching
    comments:
    - This technique has been revoked by T1548.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1548.003
    mappings:
    - d3f:T1206
    exact_mappings:
    - attack:T1206
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1206
  T1207:
    name: T1207
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1207
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1207
    description: 'Adversaries may register a rogue Domain Controller to enable manipulation
      of Active Directory data. DCShadow may be used to create a rogue Domain Controller
      (DC). DCShadow is a method of manipulating Active Directory (AD) data, including
      objects and schemas, by registering (or reusing an inactive registration) and
      simulating the behavior of a DC. (Citation: DCShadow Blog) Once registered,
      a rogue DC may be able to inject and replicate changes into AD infrastructure
      for any domain object, including credentials and keys.'
    title: Rogue Domain Controller
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1207
    exact_mappings:
    - attack:T1207
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1207
  T1208:
    name: T1208
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1208
    annotations:
      attack-id:
        tag: attack-id
        value: T1208
    description: 'Service principal names (SPNs) are used to uniquely identify each
      instance of a Windows service. To enable authentication, Kerberos requires that
      SPNs be associated with at least one service logon account (an account specifically
      tasked with running a service (Citation: Microsoft Detecting Kerberoasting Feb
      2018)). (Citation: Microsoft SPN) (Citation: Microsoft SetSPN) (Citation: SANS
      Attacking Kerberos Nov 2014) (Citation: Harmj0y Kerberoast Nov 2016)'
    title: Kerberoasting
    comments:
    - This technique has been revoked by T1558.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1558.003
    mappings:
    - d3f:T1208
    exact_mappings:
    - attack:T1208
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1208
  T1209:
    name: T1209
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1209
    annotations:
      attack-id:
        tag: attack-id
        value: T1209
    description: 'The Windows Time service (W32Time) enables time synchronization
      across and within domains. (Citation: Microsoft W32Time Feb 2018) W32Time time
      providers are responsible for retrieving time stamps from hardware/network resources
      and outputting these values to other network clients. (Citation: Microsoft TimeProvider)'
    title: Time Providers
    comments:
    - This technique has been revoked by T1547.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.003
    mappings:
    - d3f:T1209
    exact_mappings:
    - attack:T1209
    is_a: PersistenceTechnique
    class_uri: d3f:T1209
  T1210:
    name: T1210
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1210
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1210
    description: "Adversaries may exploit remote services to gain unauthorized access\
      \ to internal systems once inside of a network. Exploitation of a software vulnerability\
      \ occurs when an adversary takes advantage of a programming error in a program,\
      \ service, or within the operating system software or kernel itself to execute\
      \ adversary-controlled code.\_A common goal for post-compromise exploitation\
      \ of remote services is for lateral movement to enable access to a remote system."
    title: Exploitation of Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1210
    exact_mappings:
    - attack:T1210
    is_a: LateralMovementTechnique
    class_uri: d3f:T1210
  T1211:
    name: T1211
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1211
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1211
    description: "Adversaries may exploit a system or application vulnerability to\
      \ bypass security features. Exploitation of a vulnerability occurs when an adversary\
      \ takes advantage of a programming error in a program, service, or within the\
      \ operating system software or kernel itself to execute adversary-controlled\
      \ code.\_Vulnerabilities may exist in defensive security software that can be\
      \ used to disable or circumvent them."
    title: Exploitation for Defense Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1211
    exact_mappings:
    - attack:T1211
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1211
  T1212:
    name: T1212
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1212
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1212
    description: Adversaries may exploit software vulnerabilities in an attempt to
      collect credentials. Exploitation of a software vulnerability occurs when an
      adversary takes advantage of a programming error in a program, service, or within
      the operating system software or kernel itself to execute adversary-controlled
      code.
    title: Exploitation for Credential Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1212
    exact_mappings:
    - attack:T1212
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1212
  T1213:
    name: T1213
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1213
    description: Adversaries may leverage information repositories to mine valuable
      information. Information repositories are tools that allow for storage of information,
      typically to facilitate collaboration or information sharing between users,
      and can store a wide variety of data that may aid adversaries in further objectives,
      or direct access to the target information. Adversaries may also abuse external
      sharing features to share sensitive documents with recipients outside of the
      organization.
    title: Data from Information Repositories
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1213
    exact_mappings:
    - attack:T1213
    is_a: CollectionTechnique
    class_uri: d3f:T1213
  T1213_001:
    name: T1213_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1213.001
    description: 'Adversaries may leverage Confluence repositories to mine valuable
      information. Often found in development environments alongside Atlassian JIRA,
      Confluence is generally used to store development-related documentation, however,
      in general may contain more diverse categories of useful information, such as:'
    title: Confluence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.001
    mappings:
    - d3f:T1213.001
    exact_mappings:
    - attack:T1213.001
    is_a: T1213
    class_uri: d3f:T1213.001
  T1213_002:
    name: T1213_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1213.002
    description: 'Adversaries may leverage the SharePoint repository as a source to
      mine valuable information. SharePoint will often contain useful information
      for an adversary to learn about the structure and functionality of the internal
      network and systems. For example, the following is a list of example information
      that may hold potential value to an adversary and may also be found on SharePoint:'
    title: Sharepoint
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.002
    mappings:
    - d3f:T1213.002
    exact_mappings:
    - attack:T1213.002
    is_a: T1213
    class_uri: d3f:T1213.002
  T1213_003:
    name: T1213_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1213.003
    description: Adversaries may leverage code repositories to collect valuable information.
      Code repositories are tools/services that store source code and automate software
      builds. They may be hosted internally or privately on third party sites such
      as Github, GitLab, SourceForge, and BitBucket. Users typically interact with
      code repositories through a web application or command-line utilities such as
      git.
    title: Code Repositories
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.003
    mappings:
    - d3f:T1213.003
    exact_mappings:
    - attack:T1213.003
    is_a: T1213
    class_uri: d3f:T1213.003
  T1213_004:
    name: T1213_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213004
    annotations:
      attack-id:
        tag: attack-id
        value: T1213.004
    description: Adversaries may leverage Customer Relationship Management (CRM) software
      to mine valuable information. CRM software is used to assist organizations in
      tracking and managing customer interactions, as well as storing customer data.
    title: Customer Relationship Management Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.004
    mappings:
    - d3f:T1213.004
    exact_mappings:
    - attack:T1213.004
    is_a: T1213
    class_uri: d3f:T1213.004
  T1213_005:
    name: T1213_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213005
    annotations:
      attack-id:
        tag: attack-id
        value: T1213.005
    description: Adversaries may leverage chat and messaging applications, such as
      Microsoft Teams, Google Chat, and Slack, to mine valuable information.
    title: Messaging Applications
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.005
    mappings:
    - d3f:T1213.005
    exact_mappings:
    - attack:T1213.005
    is_a: T1213
    class_uri: d3f:T1213.005
  T1213_006:
    name: T1213_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1213006
    annotations:
      attack-id:
        tag: attack-id
        value: T1213.006
    description: Adversaries may leverage databases to mine valuable information.
      These databases may be hosted on-premises or in the cloud (both in platform-as-a-service
      and software-as-a-service environments).
    title: Databases
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1213.006
    mappings:
    - d3f:T1213.006
    exact_mappings:
    - attack:T1213.006
    is_a: T1213
    class_uri: d3f:T1213.006
  T1214:
    name: T1214
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1214
    annotations:
      attack-id:
        tag: attack-id
        value: T1214
    description: The Windows Registry stores configuration information that can be
      used by the system or other programs. Adversaries may query the Registry looking
      for credentials and passwords that have been stored for use by other programs
      or services. Sometimes these credentials are used for automatic logons.
    title: Credentials in Registry
    comments:
    - This technique has been revoked by T1552.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1552.002
    mappings:
    - d3f:T1214
    exact_mappings:
    - attack:T1214
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1214
  T1215:
    name: T1215
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1215
    annotations:
      attack-id:
        tag: attack-id
        value: T1215
    description: "Loadable Kernel Modules (or LKMs) are pieces of code that can be\
      \ loaded and unloaded into the kernel upon demand. They extend the functionality\
      \ of the kernel without the need to reboot the system. For example, one type\
      \ of module is the device driver, which allows the kernel to access hardware\
      \ connected to the system. (Citation: Linux Kernel Programming)\_When used maliciously,\
      \ Loadable Kernel Modules (LKMs) can be a type of kernel-mode [Rootkit](https://attack.mitre.org/techniques/T1014)\
      \ that run with the highest operating system privilege (Ring 0). (Citation:\
      \ Linux Kernel Module Programming Guide)\_Adversaries can use loadable kernel\
      \ modules to covertly persist on a system and evade defenses. Examples have\
      \ been found in the wild and there are some open source projects. (Citation:\
      \ Volatility Phalanx2) (Citation: CrowdStrike Linux Rootkit) (Citation: GitHub\
      \ Reptile) (Citation: GitHub Diamorphine)"
    title: Kernel Modules and Extensions
    comments:
    - This technique has been revoked by T1547.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.006
    mappings:
    - d3f:T1215
    exact_mappings:
    - attack:T1215
    is_a: PersistenceTechnique
    class_uri: d3f:T1215
  T1216:
    name: T1216
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1216
    annotations:
      attack-id:
        tag: attack-id
        value: T1216
    description: 'Adversaries may use trusted scripts, often signed with certificates,
      to proxy the execution of malicious files. Several Microsoft signed scripts
      that have been downloaded from Microsoft or are default on Windows installations
      can be used to proxy execution of other files.(Citation: LOLBAS Project) This
      behavior may be abused by adversaries to execute malicious files that could
      bypass application control and signature validation on systems.(Citation: GitHub
      Ultimate AppLocker Bypass List)'
    title: System Script Proxy Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1216
    exact_mappings:
    - attack:T1216
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1216
  T1216_001:
    name: T1216_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1216001
    annotations:
      attack-id:
        tag: attack-id
        value: T1216.001
    description: 'Adversaries may use PubPrn to proxy execution of malicious remote
      files. PubPrn.vbs is a [Visual Basic](https://attack.mitre.org/techniques/T1059/005)
      script that publishes a printer to Active Directory Domain Services. The script
      may be signed by Microsoft and is commonly executed through the [Windows Command
      Shell](https://attack.mitre.org/techniques/T1059/003) via <code>Cscript.exe</code>.
      For example, the following code publishes a printer within the specified domain:
      <code>cscript pubprn Printer1 LDAP://CN=Container1,DC=Domain1,DC=Com</code>.(Citation:
      pubprn)'
    title: PubPrn
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1216.001
    mappings:
    - d3f:T1216.001
    exact_mappings:
    - attack:T1216.001
    is_a: T1216
    class_uri: d3f:T1216.001
  T1216_002:
    name: T1216_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1216002
    annotations:
      attack-id:
        tag: attack-id
        value: T1216.002
    description: 'Adversaries may abuse SyncAppvPublishingServer.vbs to proxy execution
      of malicious [PowerShell](https://attack.mitre.org/techniques/T1059/001) commands.
      SyncAppvPublishingServer.vbs is a Visual Basic script associated with how Windows
      virtualizes applications (Microsoft Application Virtualization, or App-V).(Citation:
      1 - appv) For example, Windows may render Win32 applications to users as virtual
      applications, allowing users to launch and interact with them as if they were
      installed locally.(Citation: 2 - appv)(Citation: 3 - appv)'
    title: SyncAppvPublishingServer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1216.002
    mappings:
    - d3f:T1216.002
    exact_mappings:
    - attack:T1216.002
    is_a: T1216
    class_uri: d3f:T1216.002
  T1217:
    name: T1217
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1217
    annotations:
      attack-id:
        tag: attack-id
        value: T1217
    description: 'Adversaries may enumerate information about browsers to learn more
      about compromised environments. Data saved by browsers (such as bookmarks, accounts,
      and browsing history) may reveal a variety of personal information about users
      (e.g., banking sites, relationships/interests, social media, etc.) as well as
      details about internal network resources such as servers, tools/dashboards,
      or other related infrastructure.(Citation: Kaspersky Autofill)'
    title: Browser Information Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1217
    exact_mappings:
    - attack:T1217
    is_a: DiscoveryTechnique
    class_uri: d3f:T1217
  T1218:
    name: T1218
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218
    annotations:
      attack-id:
        tag: attack-id
        value: T1218
    description: 'Adversaries may bypass process and/or signature-based defenses by
      proxying execution of malicious content with signed, or otherwise trusted, binaries.
      Binaries used in this technique are often Microsoft-signed files, indicating
      that they have been either downloaded from Microsoft or are already native in
      the operating system.(Citation: LOLBAS Project) Binaries signed with trusted
      digital certificates can typically execute on Windows systems protected by digital
      signature validation. Several Microsoft signed binaries that are default on
      Windows installations can be used to proxy execution of other files or commands.'
    title: System Binary Proxy Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1218
    exact_mappings:
    - attack:T1218
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1218
  T1218_001:
    name: T1218_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.001
    description: 'Adversaries may abuse Compiled HTML files (.chm) to conceal malicious
      code. CHM files are commonly distributed as part of the Microsoft HTML Help
      system. CHM files are compressed compilations of various content such as HTML
      documents, images, and scripting/web related programming languages such VBA,
      JScript, Java, and ActiveX. (Citation: Microsoft HTML Help May 2018) CHM content
      is displayed using underlying components of the Internet Explorer browser (Citation:
      Microsoft HTML Help ActiveX) loaded by the HTML Help executable program (hh.exe).
      (Citation: Microsoft HTML Help Executable Program)'
    title: Compiled HTML File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.001
    mappings:
    - d3f:T1218.001
    exact_mappings:
    - attack:T1218.001
    is_a: T1218
    class_uri: d3f:T1218.001
  T1218_002:
    name: T1218_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.002
    description: Adversaries may abuse control.exe to proxy execution of malicious
      payloads. The Windows Control Panel process binary (control.exe) handles execution
      of Control Panel items, which are utilities that allow users to view and adjust
      computer settings.
    title: Control Panel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.002
    mappings:
    - d3f:T1218.002
    exact_mappings:
    - attack:T1218.002
    is_a: T1218
    class_uri: d3f:T1218.002
  T1218_003:
    name: T1218_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.003
    description: 'Adversaries may abuse CMSTP to proxy execution of malicious code.
      The Microsoft Connection Manager Profile Installer (CMSTP.exe) is a command-line
      program used to install Connection Manager service profiles. (Citation: Microsoft
      Connection Manager Oct 2009) CMSTP.exe accepts an installation information file
      (INF) as a parameter and installs a service profile leveraged for remote access
      connections.'
    title: CMSTP
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.003
    mappings:
    - d3f:T1218.003
    exact_mappings:
    - attack:T1218.003
    is_a: T1218
    class_uri: d3f:T1218.003
  T1218_004:
    name: T1218_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218004
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.004
    description: 'Adversaries may use InstallUtil to proxy execution of code through
      a trusted Windows utility. InstallUtil is a command-line utility that allows
      for installation and uninstallation of resources by executing specific installer
      components specified in .NET binaries. (Citation: MSDN InstallUtil) The InstallUtil
      binary may also be digitally signed by Microsoft and located in the .NET directories
      on a Windows system: <code>C:\Windows\Microsoft.NET\Framework\v<version>\InstallUtil.exe</code>
      and <code>C:\Windows\Microsoft.NET\Framework64\v<version>\InstallUtil.exe</code>.'
    title: InstallUtil
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.004
    mappings:
    - d3f:T1218.004
    exact_mappings:
    - attack:T1218.004
    is_a: T1218
    class_uri: d3f:T1218.004
  T1218_005:
    name: T1218_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.005
    description: 'Adversaries may abuse mshta.exe to proxy execution of malicious
      .hta files and Javascript or VBScript through a trusted Windows utility. There
      are several examples of different types of threats leveraging mshta.exe during
      initial compromise and for execution of code (Citation: Cylance Dust Storm)
      (Citation: Red Canary HTA Abuse Part Deux) (Citation: FireEye Attacks Leveraging
      HTA) (Citation: Airbus Security Kovter Analysis) (Citation: FireEye FIN7 April
      2017)'
    title: Mshta
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.005
    mappings:
    - d3f:T1218.005
    exact_mappings:
    - attack:T1218.005
    is_a: T1218
    class_uri: d3f:T1218.005
  T1218_007:
    name: T1218_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218007
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.007
    description: 'Adversaries may abuse msiexec.exe to proxy execution of malicious
      payloads. Msiexec.exe is the command-line utility for the Windows Installer
      and is thus commonly associated with executing installation packages (.msi).(Citation:
      Microsoft msiexec) The Msiexec.exe binary may also be digitally signed by Microsoft.'
    title: Msiexec
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.007
    mappings:
    - d3f:T1218.007
    exact_mappings:
    - attack:T1218.007
    is_a: T1218
    class_uri: d3f:T1218.007
  T1218_008:
    name: T1218_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218008
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.008
    description: 'Adversaries may abuse odbcconf.exe to proxy execution of malicious
      payloads. Odbcconf.exe is a Windows utility that allows you to configure Open
      Database Connectivity (ODBC) drivers and data source names.(Citation: Microsoft
      odbcconf.exe) The Odbcconf.exe binary may be digitally signed by Microsoft.'
    title: Odbcconf
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.008
    mappings:
    - d3f:T1218.008
    exact_mappings:
    - attack:T1218.008
    is_a: T1218
    class_uri: d3f:T1218.008
  T1218_009:
    name: T1218_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218009
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.009
    description: 'Adversaries may abuse Regsvcs and Regasm to proxy execution of code
      through a trusted Windows utility. Regsvcs and Regasm are Windows command-line
      utilities that are used to register .NET [Component Object Model](https://attack.mitre.org/techniques/T1559/001)
      (COM) assemblies. Both are binaries that may be digitally signed by Microsoft.
      (Citation: MSDN Regsvcs) (Citation: MSDN Regasm)'
    title: Regsvcs/Regasm
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.009
    mappings:
    - d3f:T1218.009
    exact_mappings:
    - attack:T1218.009
    is_a: T1218
    class_uri: d3f:T1218.009
  T1218_010:
    name: T1218_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218010
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.010
    description: 'Adversaries may abuse Regsvr32.exe to proxy execution of malicious
      code. Regsvr32.exe is a command-line program used to register and unregister
      object linking and embedding controls, including dynamic link libraries (DLLs),
      on Windows systems. The Regsvr32.exe binary may also be signed by Microsoft.
      (Citation: Microsoft Regsvr32)'
    title: Regsvr32
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.010
    mappings:
    - d3f:T1218.010
    exact_mappings:
    - attack:T1218.010
    is_a: T1218
    class_uri: d3f:T1218.010
  T1218_011:
    name: T1218_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.011
    description: 'Adversaries may abuse rundll32.exe to proxy execution of malicious
      code. Using rundll32.exe, vice executing directly (i.e. [Shared Modules](https://attack.mitre.org/techniques/T1129)),
      may avoid triggering security tools that may not monitor execution of the rundll32.exe
      process because of allowlists or false positives from normal operations. Rundll32.exe
      is commonly associated with executing DLL payloads (ex: <code>rundll32.exe {DLLname,
      DLLfunction}</code>).'
    title: Rundll32
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.011
    mappings:
    - d3f:T1218.011
    exact_mappings:
    - attack:T1218.011
    is_a: T1218
    class_uri: d3f:T1218.011
  T1218_012:
    name: T1218_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218012
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.012
    description: 'Adversaries may abuse verclsid.exe to proxy execution of malicious
      code. Verclsid.exe is known as the Extension CLSID Verification Host and is
      responsible for verifying each shell extension before they are used by Windows
      Explorer or the Windows Shell.(Citation: WinOSBite verclsid.exe)'
    title: Verclsid
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.012
    mappings:
    - d3f:T1218.012
    exact_mappings:
    - attack:T1218.012
    is_a: T1218
    class_uri: d3f:T1218.012
  T1218_013:
    name: T1218_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218013
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.013
    description: 'Adversaries may abuse mavinject.exe to proxy execution of malicious
      code. Mavinject.exe is the Microsoft Application Virtualization Injector, a
      Windows utility that can inject code into external processes as part of Microsoft
      Application Virtualization (App-V).(Citation: LOLBAS Mavinject)'
    title: Mavinject
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://posts.specterops.io/mavinject-exe-functionality-deconstructed-c29ab2cf5c0e
    aliases:
    - T1218.013
    mappings:
    - d3f:T1218.013
    exact_mappings:
    - attack:T1218.013
    is_a: T1218
    class_uri: d3f:T1218.013
  T1218_014:
    name: T1218_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218014
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1218.014
    description: 'Adversaries may abuse mmc.exe to proxy execution of malicious .msc
      files. Microsoft Management Console (MMC) is a binary that may be signed by
      Microsoft and is used in several ways in either its GUI or in a command prompt.(Citation:
      win_mmc)(Citation: what_is_mmc) MMC can be used to create, open, and save custom
      consoles that contain administrative tools created by Microsoft, called snap-ins.
      These snap-ins may be used to manage Windows systems locally or remotely. MMC
      can also be used to open Microsoft created .msc files to manage system configuration.(Citation:
      win_msc_files_overview)'
    title: MMC
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.014
    mappings:
    - d3f:T1218.014
    exact_mappings:
    - attack:T1218.014
    is_a: T1218
    class_uri: d3f:T1218.014
  T1218_015:
    name: T1218_015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1218015
    annotations:
      attack-id:
        tag: attack-id
        value: T1218.015
    description: 'Adversaries may abuse components of the Electron framework to execute
      malicious code. The Electron framework hosts many common applications such as
      Signal, Slack, and Microsoft Teams.(Citation: Electron 2) Originally developed
      by GitHub, Electron is a cross-platform desktop application development framework
      that employs web technologies like JavaScript, HTML, and CSS.(Citation: Electron
      3) The Chromium engine is used to display web content and Node.js runs the backend
      code.(Citation: Electron 1)'
    title: Electron Applications
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1218.015
    mappings:
    - d3f:T1218.015
    exact_mappings:
    - attack:T1218.015
    is_a: T1218
    class_uri: d3f:T1218.015
  T1219:
    name: T1219
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1219
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1219
    description: 'An adversary may use legitimate desktop support and remote access
      software to establish an interactive command and control channel to target systems
      within networks. These services, such as `VNC`, `Team Viewer`, `AnyDesk`, `ScreenConnect`,
      `LogMein`, `AmmyyAdmin`, and other remote monitoring and management (RMM) tools,
      are commonly used as legitimate technical support software and may be allowed
      by application control within a target environment.(Citation: Symantec Living
      off the Land)(Citation: CrowdStrike 2015 Global Threat Report)(Citation: CrySyS
      Blog TeamSpy)'
    title: Remote Access Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1219
    exact_mappings:
    - attack:T1219
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1219
  T1219_001:
    name: T1219_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1219001
    annotations:
      attack-id:
        tag: attack-id
        value: T1219.001
    description: 'Adversaries may abuse Integrated Development Environment (IDE) software
      with remote development features to establish an interactive command and control
      channel on target systems within a network. IDE tunneling combines SSH, port
      forwarding, file sharing, and debugging into a single secure connection, letting
      developers work on remote systems as if they were local. Unlike SSH and port
      forwarding, IDE tunneling encapsulates an entire session and may use proprietary
      tunneling protocols alongside SSH, allowing adversaries to blend in with legitimate
      development workflows. Some IDEs, like Visual Studio Code, also provide CLI
      tools (e.g., `code tunnel`) that adversaries may use to programmatically establish
      tunnels and generate web-accessible URLs for remote access. These tunnels can
      be authenticated through accounts such as GitHub, enabling the adversary to
      control the compromised system via a legitimate developer portal.(Citation:
      sentinelone operationDigitalEye Dec 2024)(Citation: Unit42 Chinese VSCode 06
      September 2024)(Citation: Thornton tutorial VSCode shell September 2023)'
    title: IDE Tunneling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1219.001
    mappings:
    - d3f:T1219.001
    exact_mappings:
    - attack:T1219.001
    is_a: T1219
    class_uri: d3f:T1219.001
  T1219_002:
    name: T1219_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1219002
    annotations:
      attack-id:
        tag: attack-id
        value: T1219.002
    description: 'An adversary may use legitimate desktop support software to establish
      an interactive command and control channel to target systems within networks.
      Desktop support software provides a graphical interface for remotely controlling
      another computer, transmitting the display output, keyboard input, and mouse
      control between devices using various protocols. Desktop support software, such
      as `VNC`, `Team Viewer`, `AnyDesk`, `ScreenConnect`, `LogMein`, `AmmyyAdmin`,
      and other remote monitoring and management (RMM) tools, are commonly used as
      legitimate technical support software and may be allowed by application control
      within a target environment.(Citation: Symantec Living off the Land)(Citation:
      CrowdStrike 2015 Global Threat Report)(Citation: CrySyS Blog TeamSpy)'
    title: Remote Desktop Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1219.002
    mappings:
    - d3f:T1219.002
    exact_mappings:
    - attack:T1219.002
    is_a: T1219
    class_uri: d3f:T1219.002
  T1219_003:
    name: T1219_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1219003
    annotations:
      attack-id:
        tag: attack-id
        value: T1219.003
    description: An adversary may use legitimate remote access hardware to establish
      an interactive command and control channel to target systems within networks.
      These services, including IP-based keyboard, video, or mouse (KVM) devices such
      as TinyPilot and PiKVM, are commonly used as legitimate tools and may be allowed
      by peripheral device policies within a target environment.
    title: Remote Access Hardware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1219.003
    mappings:
    - d3f:T1219.003
    exact_mappings:
    - attack:T1219.003
    is_a: T1219
    class_uri: d3f:T1219.003
  T1220:
    name: T1220
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1220
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1220
    description: 'Adversaries may bypass application control and obscure execution
      of code by embedding scripts inside XSL files. Extensible Stylesheet Language
      (XSL) files are commonly used to describe the processing and rendering of data
      within XML files. To support complex operations, the XSL standard includes support
      for embedded scripting in various languages. (Citation: Microsoft XSLT Script
      Mar 2017)'
    title: XSL Script Processing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1220
    exact_mappings:
    - attack:T1220
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1220
  T1221:
    name: T1221
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1221
    annotations:
      attack-id:
        tag: attack-id
        value: T1221
    description: "Adversaries may create or modify references in user document templates\
      \ to conceal malicious code or force authentication attempts. For example, Microsoft\u2019\
      s Office Open XML (OOXML) specification defines an XML-based format for Office\
      \ documents (.docx, xlsx, .pptx) to replace older binary formats (.doc, .xls,\
      \ .ppt). OOXML files are packed together ZIP archives compromised of various\
      \ XML files, referred to as parts, containing properties that collectively define\
      \ how a document is rendered.(Citation: Microsoft Open XML July 2017)"
    title: Template Injection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1221
    exact_mappings:
    - attack:T1221
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1221
  T1222:
    name: T1222
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1222
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1222
    description: 'Adversaries may modify file or directory permissions/attributes
      to evade access control lists (ACLs) and access protected files.(Citation: Hybrid
      Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018) File
      and directory permissions are commonly managed by ACLs configured by the file
      or directory owner, or users with the appropriate permissions. File and directory
      ACL implementations vary by platform, but generally explicitly designate which
      users or groups can perform which actions (read, write, execute, etc.).'
    title: File and Directory Permissions Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1222
    exact_mappings:
    - attack:T1222
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1222
  T1222_001:
    name: T1222_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1222001
    annotations:
      attack-id:
        tag: attack-id
        value: T1222.001
    description: 'Adversaries may modify file or directory permissions/attributes
      to evade access control lists (ACLs) and access protected files.(Citation: Hybrid
      Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018) File
      and directory permissions are commonly managed by ACLs configured by the file
      or directory owner, or users with the appropriate permissions. File and directory
      ACL implementations vary by platform, but generally explicitly designate which
      users or groups can perform which actions (read, write, execute, etc.).'
    title: Windows File and Directory Permissions Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1222.001
    mappings:
    - d3f:T1222.001
    exact_mappings:
    - attack:T1222.001
    is_a: T1222
    class_uri: d3f:T1222.001
  T1222_002:
    name: T1222_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1222002
    annotations:
      attack-id:
        tag: attack-id
        value: T1222.002
    description: 'Adversaries may modify file or directory permissions/attributes
      to evade access control lists (ACLs) and access protected files.(Citation: Hybrid
      Analysis Icacls1 June 2018)(Citation: Hybrid Analysis Icacls2 May 2018) File
      and directory permissions are commonly managed by ACLs configured by the file
      or directory owner, or users with the appropriate permissions. File and directory
      ACL implementations vary by platform, but generally explicitly designate which
      users or groups can perform which actions (read, write, execute, etc.).'
    title: Linux and Mac File and Directory Permissions Modification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1222.002
    mappings:
    - d3f:T1222.002
    exact_mappings:
    - attack:T1222.002
    is_a: T1222
    class_uri: d3f:T1222.002
  T1223:
    name: T1223
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1223
    annotations:
      attack-id:
        tag: attack-id
        value: T1223
    description: 'Compiled HTML files (.chm) are commonly distributed as part of the
      Microsoft HTML Help system. CHM files are compressed compilations of various
      content such as HTML documents, images, and scripting/web related programming
      languages such VBA, JScript, Java, and ActiveX. (Citation: Microsoft HTML Help
      May 2018) CHM content is displayed using underlying components of the Internet
      Explorer browser (Citation: Microsoft HTML Help ActiveX) loaded by the HTML
      Help executable program (hh.exe). (Citation: Microsoft HTML Help Executable
      Program)'
    title: Compiled HTML File
    comments:
    - This technique has been revoked by T1218.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1218.001
    mappings:
    - d3f:T1223
    exact_mappings:
    - attack:T1223
    is_a: DefenseEvasionTechnique
    mixins:
    - ExecutionTechnique
    class_uri: d3f:T1223
  T1398:
    name: T1398
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1398
    annotations:
      attack-id:
        tag: attack-id
        value: T1398
    description: Adversaries may use scripts automatically executed at boot or logon
      initialization to establish persistence. Initialization scripts are part of
      the underlying operating system and are not accessible to the user unless the
      device has been rooted or jailbroken.
    title: Boot or Logon Initialization Scripts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1398
    exact_mappings:
    - attack:T1398
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1398
  T1399:
    name: T1399
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1399
    annotations:
      attack-id:
        tag: attack-id
        value: T1399
    description: 'If an adversary can escalate privileges, he or she may be able to
      use those privileges to place malicious code in the device''s Trusted Execution
      Environment (TEE) or other similar isolated execution environment where the
      code can evade detection, may persist after device resets, and may not be removable
      by the device user. Running code within the TEE may provide an adversary with
      the ability to monitor or tamper with overall device behavior.(Citation: Roth-Rootkits)'
    title: Modify Trusted Execution Environment
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1399
    exact_mappings:
    - attack:T1399
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1399
  T1400:
    name: T1400
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1400
    annotations:
      attack-id:
        tag: attack-id
        value: T1400
    description: If an adversary can escalate privileges, he or she may be able to
      use those privileges to place malicious code in the device system partition,
      where it may persist after device resets and may not be easily removed by the
      device user.
    title: Modify System Partition
    comments:
    - This technique has been revoked by T1625.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1625.001
    mappings:
    - d3f:T1400
    exact_mappings:
    - attack:T1400
    is_a: ATTACKMobileDefenseEvasionTechnique
    mixins:
    - ATTACKMobileImpactTechnique
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1400
  T1401:
    name: T1401
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1401
    annotations:
      attack-id:
        tag: attack-id
        value: T1401
    description: Adversaries may request device administrator permissions to perform
      malicious actions.
    title: Device Administrator Permissions
    comments:
    - This technique has been revoked by T1626.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1626.001
    mappings:
    - d3f:T1401
    exact_mappings:
    - attack:T1401
    is_a: ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1401
  T1402:
    name: T1402
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1402
    annotations:
      attack-id:
        tag: attack-id
        value: T1402
    description: An intent is a message passed between Android application or system
      components. Applications can register to receive broadcast intents at runtime,
      which are system-wide intents delivered to each app when certain events happen
      on the device, such as network changes or the user unlocking the screen. Malicious
      applications can then trigger certain actions within the app based on which
      broadcast intent was received.
    title: Broadcast Receivers
    comments:
    - This technique has been revoked by T1624.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1624.001
    mappings:
    - d3f:T1402
    exact_mappings:
    - attack:T1402
    is_a: ATTACKMobileExecutionTechnique
    mixins:
    - ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1402
  T1403:
    name: T1403
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1403
    annotations:
      attack-id:
        tag: attack-id
        value: T1403
    description: 'ART (the Android Runtime) compiles optimized code on the device
      itself to improve performance. An adversary may be able to use escalated privileges
      to modify the cached code in order to hide malicious behavior. Since the code
      is compiled on the device, it may not receive the same level of integrity checks
      that are provided to code running in the system partition.(Citation: Sabanal-ART)'
    title: Modify Cached Executable Code
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1403
    exact_mappings:
    - attack:T1403
    is_a: ATTACKMobilePersistenceTechnique
    class_uri: d3f:T1403
  T1404:
    name: T1404
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1404
    annotations:
      attack-id:
        tag: attack-id
        value: T1404
    description: Adversaries may exploit software vulnerabilities in order to elevate
      privileges. Exploitation of a software vulnerability occurs when an adversary
      takes advantage of a programming error in an application, service, within the
      operating system software, or kernel itself to execute adversary-controlled
      code. Security constructions, such as permission levels, will often hinder access
      to information and use of certain techniques. Adversaries will likely need to
      perform privilege escalation to include use of software exploitation to circumvent
      those restrictions.
    title: Exploitation for Privilege Escalation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1404
    exact_mappings:
    - attack:T1404
    is_a: ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1404
  T1405:
    name: T1405
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1405
    annotations:
      attack-id:
        tag: attack-id
        value: T1405
    description: 'A malicious app or other attack vector could be used to exploit
      vulnerabilities in code running within the Trusted Execution Environment (TEE)
      (Citation: Thomas-TrustZone). The adversary could then obtain privileges held
      by the TEE potentially including the ability to access cryptographic keys or
      other sensitive data (Citation: QualcommKeyMaster). Escalated operating system
      privileges may be first required in order to have the ability to attack the
      TEE (Citation: EkbergTEE). If not, privileges within the TEE can potentially
      be used to exploit the operating system (Citation: laginimaineb-TEE).'
    title: Exploit TEE Vulnerability
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1405
    exact_mappings:
    - attack:T1405
    is_a: ATTACKMobileCredentialAccessTechnique
    mixins:
    - ATTACKMobilePrivilegeEscalationTechnique
    class_uri: d3f:T1405
  T1406:
    name: T1406
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1406
    annotations:
      attack-id:
        tag: attack-id
        value: T1406
    description: Adversaries may attempt to make a payload or file difficult to discover
      or analyze by encrypting, encoding, or otherwise obfuscating its contents on
      the device or in transit. This is common behavior that can be used across different
      platforms and the network to evade defenses.
    title: Obfuscated Files or Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1406
    exact_mappings:
    - attack:T1406
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1406
  T1406_001:
    name: T1406_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1406001
    annotations:
      attack-id:
        tag: attack-id
        value: T1406.001
    description: Adversaries may use steganography techniques in order to prevent
      the detection of hidden information. Steganographic techniques can be used to
      hide data in digital media such as images, audio tracks, video clips, or text
      files.
    title: Steganography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1406.001
    mappings:
    - d3f:T1406.001
    exact_mappings:
    - attack:T1406.001
    is_a: T1406
    class_uri: d3f:T1406.001
  T1406_002:
    name: T1406_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1406002
    annotations:
      attack-id:
        tag: attack-id
        value: T1406.002
    description: Adversaries may perform software packing to conceal their code. Software
      packing is a method of compressing or encrypting an executable. Packing an executable
      changes the file signature in an attempt to avoid signature-based detection.
      Most decompression techniques decompress the executable code in memory.
    title: Software Packing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1406.002
    mappings:
    - d3f:T1406.002
    exact_mappings:
    - attack:T1406.002
    is_a: T1406
    class_uri: d3f:T1406.002
  T1407:
    name: T1407
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1407
    annotations:
      attack-id:
        tag: attack-id
        value: T1407
    description: Adversaries may download and execute dynamic code not included in
      the original application package after installation. This technique is primarily
      used to evade static analysis checks and pre-publication scans in official app
      stores. In some cases, more advanced dynamic or behavioral analysis techniques
      could detect this behavior. However, in conjunction with [Execution Guardrails](https://attack.mitre.org/techniques/T1627)
      techniques, detecting malicious code downloaded after installation could be
      difficult.
    title: Download New Code at Runtime
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1407
    exact_mappings:
    - attack:T1407
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1407
  T1408:
    name: T1408
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1408
    annotations:
      attack-id:
        tag: attack-id
        value: T1408
    description: 'An adversary could use knowledge of the techniques used by security
      software to evade detection(Citation: Brodie)(Citation: Tan). For example, some
      mobile security products perform compromised device detection by searching for
      particular artifacts such as an installed "su" binary, but that check could
      be evaded by naming the binary something else. Similarly, polymorphic code techniques
      could be used to evade signature-based detection(Citation: Rastogi).'
    title: Disguise Root/Jailbreak Indicators
    comments:
    - This technique has been revoked by T1630.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1630.003
    mappings:
    - d3f:T1408
    exact_mappings:
    - attack:T1408
    is_a: ATTACKMobileDefenseEvasionTechnique
    class_uri: d3f:T1408
  T1409:
    name: T1409
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1409
    annotations:
      attack-id:
        tag: attack-id
        value: T1409
    description: 'Adversaries may try to access and collect application data resident
      on the device. Adversaries often target popular applications, such as Facebook,
      WeChat, and Gmail.(Citation: SWB Exodus March 2019)'
    title: Stored Application Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1409
    exact_mappings:
    - attack:T1409
    is_a: ATTACKMobileCollectionTechnique
    class_uri: d3f:T1409
  T1410:
    name: T1410
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1410
    annotations:
      attack-id:
        tag: attack-id
        value: T1410
    description: An adversary may capture network traffic to and from the device to
      obtain credentials or other sensitive data, or redirect network traffic to flow
      through an adversary-controlled gateway to do the same.
    title: Network Traffic Capture or Redirection
    comments:
    - This technique has been revoked by T1638
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1638
    mappings:
    - d3f:T1410
    exact_mappings:
    - attack:T1410
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1410
  T1411:
    name: T1411
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1411
    annotations:
      attack-id:
        tag: attack-id
        value: T1411
    description: The operating system and installed applications often have legitimate
      needs to prompt the user for sensitive information such as account credentials,
      bank account information, or Personally Identifiable Information (PII). Adversaries
      may mimic this functionality to prompt users for sensitive information.
    title: Input Prompt
    comments:
    - This technique has been revoked by T1417.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1417.002
    mappings:
    - d3f:T1411
    exact_mappings:
    - attack:T1411
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1411
  T1412:
    name: T1412
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1412
    annotations:
      attack-id:
        tag: attack-id
        value: T1412
    description: A malicious application could capture sensitive data sent via SMS,
      including authentication credentials. SMS is frequently used to transmit codes
      used for multi-factor authentication.
    title: Capture SMS Messages
    comments:
    - This technique has been revoked by T1636.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1636.004
    mappings:
    - d3f:T1412
    exact_mappings:
    - attack:T1412
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1412
  T1413:
    name: T1413
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1413
    annotations:
      attack-id:
        tag: attack-id
        value: T1413
    description: On versions of Android prior to 4.1, an adversary may use a malicious
      application that holds the READ_LOGS permission to obtain private keys, passwords,
      other credentials, or other sensitive data stored in the device's system log.
      On Android 4.1 and later, an adversary would need to attempt to perform an operating
      system privilege escalation attack to be able to access the log.
    title: Access Sensitive Data in Device Logs
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1413
    exact_mappings:
    - attack:T1413
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1413
  T1414:
    name: T1414
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1414
    annotations:
      attack-id:
        tag: attack-id
        value: T1414
    description: 'Adversaries may abuse clipboard manager APIs to obtain sensitive
      information copied to the device clipboard. For example, passwords being copied
      and pasted from a password manager application could be captured by a malicious
      application installed on the device.(Citation: Fahl-Clipboard)'
    title: Clipboard Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1414
    exact_mappings:
    - attack:T1414
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1414
  T1415:
    name: T1415
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1415
    annotations:
      attack-id:
        tag: attack-id
        value: T1415
    description: 'An iOS application may be able to maliciously claim a URL scheme,
      allowing it to intercept calls that are meant for a different application(Citation:
      FireEye-Masque2)(Citation: Dhanjani-URLScheme). This technique, for example,
      could be used to capture OAuth authorization codes(Citation: IETF-PKCE) or to
      phish user credentials(Citation: MobileIron-XARA).'
    title: URL Scheme Hijacking
    comments:
    - This technique has been revoked by
    - This technique has been revoked by
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#
    mappings:
    - d3f:T1415
    exact_mappings:
    - attack:T1415
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1415
  T1416:
    name: T1416
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1416
    annotations:
      attack-id:
        tag: attack-id
        value: T1416
    description: Adversaries may register Uniform Resource Identifiers (URIs) to intercept
      sensitive data.
    title: URI Hijacking
    comments:
    - This technique has been revoked by T1635.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1635.001
    mappings:
    - d3f:T1416
    exact_mappings:
    - attack:T1416
    is_a: ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1416
  T1417:
    name: T1417
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1417
    annotations:
      attack-id:
        tag: attack-id
        value: T1417
    description: Adversaries may use methods of capturing user input to obtain credentials
      or collect information. During normal device usage, users often provide credentials
      to various locations, such as login pages/portals or system dialog boxes. Input
      capture mechanisms may be transparent to the user (e.g. [Keylogging](https://attack.mitre.org/techniques/T1417/001))
      or rely on deceiving the user into providing input into what they believe to
      be a genuine application prompt (e.g. [GUI Input Capture](https://attack.mitre.org/techniques/T1417/002)).
    title: Input Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1417
    exact_mappings:
    - attack:T1417
    is_a: ATTACKMobileCollectionTechnique
    mixins:
    - ATTACKMobileCredentialAccessTechnique
    class_uri: d3f:T1417
  T1417_001:
    name: T1417_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1417001
    annotations:
      attack-id:
        tag: attack-id
        value: T1417.001
    description: Adversaries may log user keystrokes to intercept credentials or other
      information from the user as the user types them.
    title: Keylogging
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1417.001
    mappings:
    - d3f:T1417.001
    exact_mappings:
    - attack:T1417.001
    is_a: T1417
    class_uri: d3f:T1417.001
  T1417_002:
    name: T1417_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1417002
    annotations:
      attack-id:
        tag: attack-id
        value: T1417.002
    description: "Adversaries may mimic common operating system GUI components to\
      \ prompt users for sensitive information with a seemingly legitimate prompt.\
      \ The operating system and installed applications often have legitimate needs\
      \ to prompt the user for sensitive information such as account credentials,\
      \ bank account information, or Personally Identifiable Information (PII). Compared\
      \ to traditional PCs, the constrained display size of mobile devices may impair\
      \ the ability to provide users with contextual information, making users more\
      \ susceptible to this technique\u2019s use.(Citation: Felt-PhishingOnMobileDevices)"
    title: GUI Input Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1417.002
    mappings:
    - d3f:T1417.002
    exact_mappings:
    - attack:T1417.002
    is_a: T1417
    class_uri: d3f:T1417.002
  T1418:
    name: T1418
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1418
    annotations:
      attack-id:
        tag: attack-id
        value: T1418
    description: Adversaries may attempt to get a listing of applications that are
      installed on a device. Adversaries may use the information from [Software Discovery](https://attack.mitre.org/techniques/T1418)
      during automated discovery to shape follow-on behaviors, including whether or
      not to fully infect the target and/or attempts specific actions.
    title: Software Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1418
    exact_mappings:
    - attack:T1418
    is_a: ATTACKMobileDiscoveryTechnique
    class_uri: d3f:T1418
  T1418_001:
    name: T1418_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1418001
    annotations:
      attack-id:
        tag: attack-id
        value: T1418.001
    description: Adversaries may attempt to get a listing of security applications
      and configurations that are installed on a device. This may include things such
      as mobile security products. Adversaries may use the information from [Security
      Software Discovery](https://attack.mitre.org/techniques/T1418/001) during automated
      discovery to shape follow-on behaviors, including whether or not to fully infect
      the target and/or attempt specific actions.
    title: Security Software Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1418.001
    mappings:
    - d3f:T1418.001
    exact_mappings:
    - attack:T1418.001
    is_a: T1418
    class_uri: d3f:T1418.001
  T1419:
    name: T1419
