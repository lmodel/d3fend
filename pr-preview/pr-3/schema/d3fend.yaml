  Transformer_XL:
    name: Transformer_XL
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TransformerXL
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-TX
      kb-article:
        tag: kb-article
        value: '## References Transformer-XL. (n.d.). Papers with Code. [Link](https://paperswithcode.com/method/transformer-xl)'
    description: Transformer-XL is a transformer architecture that introduces the
      notion of recurrence to the deep self-attention network. Instead of computing
      the hidden states from scratch for each new segment, Transformer-XL reuses the
      hidden states obtained in previous segments.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Transformer-XL
    mappings:
    - d3f:Transformer-XL
    is_a: Transformer_basedLearning
    class_uri: d3f:Transformer-XL
  Transformer_basedLearning:
    name: Transformer_basedLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TransformerBasedLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-TBL
      kb-article:
        tag: kb-article
        value: '## References "Transformer (machine learning model)." Wikipedia. [Link](https://en.wikipedia.org/wiki/Transformer_(machine_learning_model)).'
    description: A transformer is a deep learning model. It is distinguished by its
      adoption of self-attention, differentially weighting the significance of each
      part of the input (which includes the recursive output) data.
    title: Transformer-based Learning
