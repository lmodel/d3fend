    annotations:
      attack-id:
        tag: attack-id
        value: T1422.001
    description: 'Adversaries may check for Internet connectivity on compromised systems.
      This may be performed during automated discovery and can be accomplished in
      numerous ways such as using `adb shell netstat` for Android.(Citation: adb_commands)'
    title: Internet Connection Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1422.001
    mappings:
    - d3f:T1422.001
    exact_mappings:
    - attack:T1422.001
    is_a: T1422
    class_uri: d3f:T1422.001
  T1422_002:
    name: T1422_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1422002
    annotations:
      attack-id:
        tag: attack-id
        value: T1422.002
    description: Adversaries may search for information about Wi-Fi networks, such
      as network names and passwords, on compromised systems. Adversaries may use
      Wi-Fi information as part of [Discovery](https://attack.mitre.org/tactics/TA0032)
      or [Credential Access](https://attack.mitre.org/tactics/TA0031) activity to
      support both ongoing and future campaigns.
    title: Wi-Fi Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1422.002
    mappings:
