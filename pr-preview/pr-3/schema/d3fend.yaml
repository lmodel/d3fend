  OperatingModeMonitoring:
    name: OperatingModeMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingModeMonitoring
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-OMM
      kb-article:
        tag: kb-article
        value: '## How it works Many OT Controllers have key switches to change the
          controller into various modes of operation. These modes of operation can
          include Program, Run, Remote, or Stop. The key switch position is often
          available as a system diagnostic function block of the programming logic.
          ## Consider'
    description: Detects operating modes such as Program, Run, Remote, or Stop.
    title: Operating Mode Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OperatingModeMonitoring
    is_a: PlatformMonitoring
    class_uri: d3f:OperatingModeMonitoring
  OperatingModeRestriction:
    name: OperatingModeRestriction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingModeRestriction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-OPR
      kb-article:
        tag: kb-article
        value: '## How it works Many OT Controllers use key switches to change the
          controller into different modes of operation. These modes of operation can
          include Program, Run, Remote, or Stop. The key switch should be left in
          the appropriate key switch position, e.g., run or remote during normal operations.
          I'
    description: Restricting unauthorized changes to the operating mode prevents devices
      from switching into inappropriate or vulnerable states during normal use.
    title: Operating Mode Restriction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OperatingModeRestriction
    is_a: AccessMediation
    class_uri: d3f:OperatingModeRestriction
  OperatingSystem:
    name: OperatingSystem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingSystem
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An operating system (OS) is system software that manages computer
      hardware and software resources and provides common services for computer programs.
      All computer programs, excluding firmware, require an operating system to function.
      Time-sharing operating systems schedule tasks for efficient use of the system
      and may also include accounting software for cost allocation of processor time,
      mass storage, printing, and other resources.
    title: Operating System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Operating_system
    - https://schema.ocsf.io/objects/os
    mappings:
    - d3f:OperatingSystem
    exact_mappings:
    - unified_cyber_ontology:OperatingSystem
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OperatingSystem
  OperatingSystemClock:
    name: OperatingSystemClock
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingSystemClock
    description: An operating system clock is the primary software clock maintained
      by the operating system, representing the system's current time. It is used
      for timestamping files, scheduling tasks, and synchronizing processes.
    title: Operating System Clock
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://linux.die.net/sag/hw-sw-clocks.html
    mappings:
    - d3f:OperatingSystemClock
    is_a: SoftwareClock
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OperatingSystemClock
  OperatingSystemConfiguration:
