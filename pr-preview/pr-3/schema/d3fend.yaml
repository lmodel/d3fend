        value: D3-OLV
      kb-article:
        tag: kb-article
        value: '## How it works Validates the type, value, and/or range of a variable
          taking into account the local operational logic and operational state. For
          example, if a controller has a restricted range when in a specified state,
          this may crosscheck the value against the state in addition to a more general
          r'
