    exact_mappings:
    - attack:T1424
    is_a: ATTACKMobileDiscoveryTechnique
    class_uri: d3f:T1424
  T1426:
    name: T1426
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1426
    annotations:
      attack-id:
        tag: attack-id
        value: T1426
    description: "Adversaries may attempt to get detailed information about a device\u2019\
      s operating system and hardware, including versions, patches, and architecture.\
      \ Adversaries may use the information from [System Information Discovery](https://attack.mitre.org/techniques/T1426)\
      \ during automated discovery to shape follow-on behaviors, including whether\
      \ or not to fully infects the target and/or attempts specific actions."
    title: System Information Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1426
    exact_mappings:
    - attack:T1426
    is_a: ATTACKMobileDiscoveryTechnique
    class_uri: d3f:T1426
  T1427:
    name: T1427
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1427
    annotations:
      attack-id:
        tag: attack-id
        value: T1427
    description: 'With escalated privileges, an adversary could program the mobile
      device to impersonate USB devices such as input devices (keyboard and mouse),
      storage devices, and/or networking devices in order to attack a physically connected
      PC(Citation: Wang-ExploitingUSB)(Citation: ArsTechnica-PoisonTap) This technique
      has been demonstrated on Android. We are unaware of any demonstrations on iOS.'
    title: Attack PC via USB Connection
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1427
    exact_mappings:
    - attack:T1427
    is_a: ATTACKMobileLateralMovementTechnique
    class_uri: d3f:T1427
  T1428:
    name: T1428
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1428
    annotations:
      attack-id:
        tag: attack-id
        value: T1428
    description: "Adversaries may exploit remote services of enterprise servers, workstations,\
      \ or other resources to gain unauthorized access to internal systems once inside\
      \ of a network. Adversaries may exploit remote services by taking advantage\
      \ of a mobile device\u2019s access to an internal enterprise network through\
      \ local connectivity or through a Virtual Private Network (VPN). Exploitation\
      \ of a software vulnerability occurs when an adversary takes advantage of a\
      \ programming error in a program, service, or within the operating system software\
      \ or kernel itself to execute adversary-controlled code. A common goal for post-compromise\
      \ exploitation of remote services is for lateral movement to enable access to\
      \ a remote system."
    title: Exploitation of Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1428
    exact_mappings:
    - attack:T1428
    is_a: ATTACKMobileLateralMovementTechnique
    class_uri: d3f:T1428
  T1429:
    name: T1429
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1429
    annotations:
      attack-id:
        tag: attack-id
        value: T1429
    description: Adversaries may capture audio to collect information by leveraging
      standard operating system APIs of a mobile device. Examples of audio information
      adversaries may target include user conversations, surroundings, phone calls,
      or other sensitive information.
    title: Audio Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
