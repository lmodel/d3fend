    - Test Executive
    - Test Manager
    mappings:
    - d3f:TestExecutionTool
    is_a: DeveloperApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:TestExecutionTool
  ThinClientComputer:
    name: ThinClientComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ThinClientComputer
    description: A thin client is a lightweight computer that has been optimized for
      establishing a remote connection with a server-based computing environment.
      The server does most of the work, which can include launching software programs,
      performing calculations, and storing data. This contrasts with a fat client
      or a conventional personal computer; the former is also intended for working
      in a client-server model but has significant local processing power, while the
      latter aims to perform its function mostly locally. Thin clients are shared
      computers as the thin client's computing resources are provided by a remote
      server.
    title: Thin Client Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Thin_client
    mappings:
    - d3f:ThinClientComputer
    is_a: SharedComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ThinClientComputer
  Thread:
    name: Thread
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Thread
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A Thread is the smallest unit of execution within a process, representing
      a sequence of instructions that can be scheduled and executed independently
      by the operating system.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Thread
    exact_mappings:
