    annotations:
      attack-id:
        tag: attack-id
        value: T1421
    description: Adversaries may attempt to get a listing of network connections to
      or from the compromised device they are currently accessing or from remote systems
      by querying for information over the network.
    title: System Network Connections Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
