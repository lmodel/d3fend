  AccessGrantedEvent:
    name: AccessGrantedEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AccessGrantedEvent
    description: An event signifying that access to a resource has been authorized
      and successfully enforced, allowing the requesting agent to perform specified
      operations based on the access control policies.
    title: Access Granted Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:AccessGrantedEvent
    is_a: AccessMediationEvent
    slots:
    - has-input
