  VMImage:
    name: VMImage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VMImage
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A Virtual Machine Image (VMI) is a file that encapsulates the entire
      state of a virtual machine at a given point in time. This includes the operating
      system, applications, data, and configurations. VMIs are used to create and
      replicate virtual machines, ensuring consistency and reliability across different
      environments.
    title: Virtual Machine Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Virtual_machine_image
    - https://www.ituonline.com/tech-definitions/what-is-a-virtual-machine-image/
    aliases:
