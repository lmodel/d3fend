  ROM:
    name: ROM
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ROM
    annotations:
      synonym:
        tag: synonym
        value: Read-only Memory
    description: Read-only memory (ROM) is a type of non-volatile memory used in computers
      and other electronic devices. Data stored in ROM cannot be electronically modified
      after the manufacture of the memory device. Read-only memory is useful for storing
      software that is rarely changed during the life of the system, also known as
      firmware.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Read-only_memory
    mappings:
