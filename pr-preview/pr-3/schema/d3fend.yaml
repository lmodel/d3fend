    is_a: EXF_0006
    class_uri: d3f:EXF-0006.02
  EXF_0007:
    name: EXF_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0007
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0007
    description: Threat actors may compromise target owned ground systems that can
      be used for future campaigns or to perpetuate other techniques. These ground
      systems have already been configured for communications to the victim spacecraft.
      By compromising this infrastructure, threat actors can stage, launch, and execute
      an operation. Threat actors may utilize these systems for various tasks, including
      Execution and Exfiltration.
    title: Compromised Ground System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0007/
    aliases:
    - EXF-0007
    mappings:
    - d3f:EXF-0007
    exact_mappings:
    - attack:EXF-0007
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0007
  EXF_0008:
    name: EXF_0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0008
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0008
    description: Threat actors may compromise development environments located within
      the ground system or a developer/partner site. This attack can take place in
      a number of different ways, including manipulation of source code, manipulating
      environment variables, or replacing compiled versions with a malicious one.
      This technique is usually performed before the target spacecraft is in orbit,
      with the hopes of adding malicious code to the actual FSW during the development
      process.
    title: Compromised Developer Site
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0008/
    aliases:
    - EXF-0008
    mappings:
    - d3f:EXF-0008
    exact_mappings:
    - attack:EXF-0008
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0008
  EXF_0009:
    name: EXF_0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0009
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0009
    description: Threat actors may compromise access to partner sites that can be
      used for future campaigns or to perpetuate other techniques. These sites are
      typically configured for communications to the primary ground station(s) or
      in some cases the spacecraft itself. Unlike mission operated ground systems,
      partner sites may provide an easier target for threat actors depending on the
      company, roles and responsibilities, and interests of the third-party. By compromising
      this infrastructure, threat actors can stage, launch, and execute an operation.
      Threat actors may utilize these systems for various tasks, including Execution
      and Exfiltration.
    title: Compromised Partner Site
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0009/
    aliases:
    - EXF-0009
    mappings:
    - d3f:EXF-0009
    exact_mappings:
    - attack:EXF-0009
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0009
  EXF_0010:
    name: EXF_0010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0010
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0010
    description: Threat actors can deploy malicious software on the payload(s) which
      can send data through the payload channel. Payloads often have their own communication
      channels outside of the main TT&C pathway which presents an opportunity for
      exfiltration of payload data or other spacecraft data depending on the interface
      and data exchange.
    title: Payload Communication Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0010/
    aliases:
    - EXF-0010
    mappings:
    - d3f:EXF-0010
    exact_mappings:
    - attack:EXF-0010
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0010
