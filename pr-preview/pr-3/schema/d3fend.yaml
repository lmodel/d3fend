    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1430002
    annotations:
      attack-id:
        tag: attack-id
        value: T1430.002
    description: 'Adversaries may exploit the lack of authentication in signaling
      system network nodes to track the location of mobile devices by impersonating
      a node.(Citation: Engel-SS7)(Citation: Engel-SS7-2008)(Citation: 3GPP-Security)(Citation:
      Positive-SS7)(Citation: CSRIC5-WG10-FinalReport)'
