  OTVariableAccessRestriction:
    name: OTVariableAccessRestriction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OTVariableAccessRestriction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-OVAR
      synonym:
        tag: synonym
        value: OT Variable Access Policy
      kb-article:
        tag: kb-article
        value: '## How it works Many OT Controllers and OT Communication Modules enable
          Read-Only or Read/Write access on a per-tag basis. As an example, when configuring
          OT process tags which can be accessed using the Modbus protocol, configure
          the tag to a Modbus Input Register to leverage the protocol''s regist'
    description: Assign read/write access controls on designated registers or data
      tags to prevent unauthorized writes.
    title: OT Variable Access Restriction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OTVariableAccessRestriction
    is_a: AccessMediation
    class_uri: d3f:OTVariableAccessRestriction
  OTWatchdogTimer:
    name: OTWatchdogTimer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OTWatchdogTimer
    description: "An OT Watchdog Timer is a software-based monitoring mechanism used\
      \ in operational technology (OT) environments to continuously supervise the\
      \ execution and responsiveness of critical control applications, devices, or\
      \ communication links. It operates by requiring periodic \u201Cheartbeat\u201D\
      \ signals or status updates from monitored processes within a defined time window;\
      \ if these signals are not received on time (indicating a hang, fault, or abnormal\
      \ delay) the OT Watchdog Timer automatically triggers predefined safety or recovery\
      \ actions, such as placing equipment in a fail-safe state, restarting services,\
      \ generating alarms, or initiating controlled shutdowns."
    title: OT Watchdog Timer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://literature.rockwellautomation.com/idc/groups/literature/documents/pm/1756-pm005_-en-p.pdf
    mappings:
    - d3f:OTWatchdogTimer
    is_a: OTProcessVariable
    mixins:
    - SoftwareWatchdogTimer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OTWatchdogTimer
