    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#UserProfile
    description: A user profile is a collection of settings and information associated
      with a user. It contains critical information that is used to identify an individual,
      such as their name, age, portrait photograph and individual characteristics
      such as knowledge or expertise.
    title: User Profile
