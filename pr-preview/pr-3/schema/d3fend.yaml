  IA_0001:
    name: IA_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0001
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0001
    description: Threat actors may manipulate or compromise products or product delivery
      mechanisms before the customer receives them in order to achieve data or system
      compromise.
    title: Compromise Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0001/
    aliases:
    - IA-0001
    mappings:
    - d3f:IA-0001
    exact_mappings:
    - attack:IA-0001
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0001
  IA_0001_01:
    name: IA_0001_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000101
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0001.01
    description: Threat actors may manipulate software dependencies (i.e. dependency
      confusion) and/or development tools prior to the customer receiving them in
      order to achieve data or system compromise. Software binaries and applications
      often depend on external software to function properly. spacecraft developers
      may use open source projects to help with their creation. These open source
      projects may be targeted by threat actors as a way to add malicious code to
      the victim spacecraft's dependencies.
    title: Software Dependencies & Development Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0001/01/
    aliases:
    - IA-0001.01
    mappings:
    - d3f:IA-0001.01
    exact_mappings:
    - attack:IA-0001.01
    is_a: IA_0001
    class_uri: d3f:IA-0001.01
  IA_0001_02:
    name: IA_0001_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000102
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0001.02
    description: Threat actors may manipulate software binaries and applications prior
      to the customer receiving them in order to achieve data or system compromise.
      This attack can take place in a number of ways, including manipulation of source
      code, manipulation of the update and/or distribution mechanism, or replacing
      compiled versions with a malicious one.
    title: Software Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0001/02/
    aliases:
    - IA-0001.02
    mappings:
    - d3f:IA-0001.02
    exact_mappings:
    - attack:IA-0001.02
    is_a: IA_0001
    class_uri: d3f:IA-0001.02
  IA_0001_03:
    name: IA_0001_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000103
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0001.03
    description: Threat actors may manipulate hardware components in the victim spacecraft
      prior to the customer receiving them in order to achieve data or system compromise.
      The threat actor can insert backdoors and give them a high level of control
      over the system when they modify the hardware or firmware in the supply chain.
      This would include ASIC and FPGA devices as well. A spacecraft component can
      also be damaged if a specific HW component, built to fail after a specific period,
      or counterfeit with a low reliability, breaks out.
    title: Hardware Supply Chain
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0001/03/
    aliases:
    - IA-0001.03
    mappings:
    - d3f:IA-0001.03
    exact_mappings:
    - attack:IA-0001.03
    is_a: IA_0001
    class_uri: d3f:IA-0001.03
  IA_0002:
    name: IA_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0002
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0002
    description: Threat actors may target software defined radios due to their software
      nature to establish C2 channels. Since SDRs are programmable, when combined
      with supply chain or development environment attacks, SDRs provide a pathway
      to setup covert C2 channels for a threat actor.
    title: Compromise Software Defined Radio
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0002/
    aliases:
    - IA-0002
    mappings:
    - d3f:IA-0002
    exact_mappings:
    - attack:IA-0002
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0002
  IA_0003:
    name: IA_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0003
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0003
    description: Threat actors may compromise a victim spacecraft via the crosslink
      communications of a neighboring spacecraft that has been compromised. spacecraft
      in close proximity are able to send commands back and forth. Threat actors may
      be able to leverage this access to compromise other spacecraft once they have
      access to another that is nearby.
    title: Crosslink via Compromised Neighbor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0003/
    aliases:
    - IA-0003
    mappings:
    - d3f:IA-0003
    exact_mappings:
    - attack:IA-0003
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0003
  IA_0004:
    name: IA_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0004
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0004
    description: Threat actors may compromise alternative communication pathways which
      may not be as protected as the primary pathway. Depending on implementation
      the contingency communication pathways/solutions may lack the same level of
      security (i.e., physical security, encryption, authentication, etc.) which if
      forced to use could provide a threat actor an opportunity to launch attacks.
      Typically these would have to be coupled with other denial of service techniques
      on the primary pathway to force usage of secondary pathways.
    title: Secondary/Backup Communication Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0004/
    aliases:
    - IA-0004
    mappings:
    - d3f:IA-0004
    exact_mappings:
    - attack:IA-0004
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0004
  IA_0004_01:
    name: IA_0004_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000401
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0004.01
    description: Threat actors may  establish a foothold within the backup ground/mission
      operations center (MOC) and then perform attacks to force primary communication
      traffic through the backup communication channel so that other TTPs can be executed
      (man-in-the-middle, malicious commanding, malicious code, etc.). While an attacker
      would not be required to force the communications through the backup channel
      vice waiting until the backup is used for various reasons. Threat actors can
      also utilize compromised ground stations to chain command execution and payload
      delivery across geo-separated ground stations to extend reach and maintain access
      on spacecraft. The backup ground/MOC should be considered a viable attack vector
      and the appropriate/equivalent security controls from the primary communication
      channel should be on the backup ground/MOC as well.
    title: Ground Station
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0004/01/
    aliases:
    - IA-0004.01
    mappings:
    - d3f:IA-0004.01
    exact_mappings:
    - attack:IA-0004.01
    is_a: IA_0004
    class_uri: d3f:IA-0004.01
  IA_0004_02:
    name: IA_0004_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000402
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0004.02
    description: Threat actors may target the backup/secondary receiver on the spacecraft
      as a method to inject malicious communications into the mission. The secondary
      receivers may come from different supply chains than the primary which could
      have different level of security and weaknesses. Similar to the ground station,
      the communication through the secondary receiver could be forced or happening
      naturally.
    title: Receiver
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0004/02/
    aliases:
    - IA-0004.02
    mappings:
    - d3f:IA-0004.02
    exact_mappings:
    - attack:IA-0004.02
    is_a: IA_0004
    class_uri: d3f:IA-0004.02
  IA_0005:
    name: IA_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0005
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0005
    description: Threat actors may perform a space rendezvous which is a set of orbital
      maneuvers during which a spacecraft arrives at the same orbit and approach to
      a very close distance (e.g. within visual contact or close proximity) to a target
      spacecraft.
    title: Rendezvous & Proximity Operations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0005/
    aliases:
    - IA-0005
    mappings:
    - d3f:IA-0005
    exact_mappings:
    - attack:IA-0005
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0005
  IA_0005_01:
    name: IA_0005_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000501
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0005.01
    description: Threat actors in close proximity may intercept and analyze electromagnetic
      radiation emanating from crypto equipment and/or the target spacecraft(i.e.,
      main bus) to determine whether the emanations are information bearing. The data
      could be used to establish initial access.
    title: Compromise Emanations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0005/01/
    aliases:
    - IA-0005.01
    mappings:
    - d3f:IA-0005.01
    exact_mappings:
    - attack:IA-0005.01
    is_a: IA_0005
    class_uri: d3f:IA-0005.01
  IA_0005_02:
    name: IA_0005_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000502
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0005.02
    description: Threat actors may leverage docking vehicles to laterally move into
      a target spacecraft. If information is known on docking plans, a threat actor
      may target vehicles on the ground or in space to deploy malware to laterally
      move or execute malware on the target spacecraft via the docking interface.
    title: Docked Vehicle / OSAM
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0005/02/
    aliases:
    - IA-0005.02
    mappings:
    - d3f:IA-0005.02
    exact_mappings:
    - attack:IA-0005.02
    is_a: IA_0005
    class_uri: d3f:IA-0005.02
  IA_0005_03:
    name: IA_0005_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000503
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0005.03
    description: Threat actors may posses the capability to grapple target spacecraft
      once it has established the appropriate space rendezvous. If from a proximity
      / rendezvous perspective a threat actor has the ability to connect via docking
      interface or expose testing (i.e., JTAG port) once it has grappled the target
      spacecraft, they could perform various attacks depending on the access enabled
      via the physical connection.
    title: Proximity Grappling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0005/03/
    aliases:
    - IA-0005.03
    mappings:
    - d3f:IA-0005.03
    exact_mappings:
    - attack:IA-0005.03
    is_a: IA_0005
    class_uri: d3f:IA-0005.03
  IA_0006:
    name: IA_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0006
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0006
    description: Threat actors may compromise the target spacecraft hosted payload
      to initially access and/or persist within the system. Hosted payloads can usually
      be accessed from the ground via a specific command set. The command pathways
      can leverage the same ground infrastructure or some host payloads have their
      own ground infrastructure which can provide an access vector as well. Threat
      actors may be able to leverage the ability to command hosted payloads to upload
      files or modify memory addresses in order to compromise the system. Depending
      on the implementation, hosted payloads may provide some sort of lateral movement
      potential.
    title: Compromise Hosted Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0006/
    aliases:
    - IA-0006
    mappings:
    - d3f:IA-0006
    exact_mappings:
    - attack:IA-0006
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0006
  IA_0007:
    name: IA_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0007
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0007
    description: Threat actors may initially compromise the ground system in order
      to access the target spacecraft. Once compromised, the threat actor can perform
      a multitude of initial access techniques, including replay, compromising FSW
      deployment, compromising encryption keys, and compromising authentication schemes.
      Threat actors may also perform further reconnaissance within the system to enumerate
      mission networks and gather information related to ground station logical topology,
      missions ran out of said ground station, birds that are in-band of targeted
      ground stations, and other mission system capabilities.
    title: Compromise Ground System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0007/
    aliases:
    - IA-0007
    mappings:
    - d3f:IA-0007
    exact_mappings:
    - attack:IA-0007
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0007
  IA_0007_01:
    name: IA_0007_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000701
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0007.01
    description: Threat actors may manipulate and modify on-orbit updates before they
      are sent to the target spacecraft. This attack can be done in a number of ways,
      including manipulation of source code, manipulating environment variables, on-board
      table/memory values, or replacing compiled versions with a malicious one.
    title: Compromise On-Orbit Update
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0007/01/
    aliases:
    - IA-0007.01
    mappings:
    - d3f:IA-0007.01
    exact_mappings:
    - attack:IA-0007.01
    is_a: IA_0007
    class_uri: d3f:IA-0007.01
  IA_0007_02:
    name: IA_0007_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000702
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0007.02
    description: Threat actors may compromise target owned ground systems components
      (e.g., front end processors, command and control software, etc.) that can be
      used for future campaigns or to perpetuate other techniques. These ground systems
      components have already been configured for communications to the victim spacecraft.
      By compromising this infrastructure, threat actors can stage, launch, and execute
      an operation. Threat actors may utilize these systems for various tasks, including
      Execution and Exfiltration.
    title: Malicious Commanding via Valid GS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0007/02/
    aliases:
    - IA-0007.02
    mappings:
    - d3f:IA-0007.02
    exact_mappings:
    - attack:IA-0007.02
    is_a: IA_0007
    class_uri: d3f:IA-0007.02
  IA_0008:
    name: IA_0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0008
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0008
    description: Threat actors may gain access to a victim spacecraft through the
      use of a rogue external entity. With this technique, the threat actor does not
      need access to a legitimate ground station or communication site.
    title: Rogue External Entity
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0008/
    aliases:
    - IA-0008
    mappings:
    - d3f:IA-0008
    exact_mappings:
    - attack:IA-0008
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0008
  IA_0008_01:
    name: IA_0008_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000801
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0008.01
    description: Threat actors may gain access to a victim spacecraft through the
      use of a rogue ground system. With this technique, the threat actor does not
      need access to a legitimate ground station or communication site.
    title: Rogue Ground Station
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0008/01/
    aliases:
    - IA-0008.01
    mappings:
    - d3f:IA-0008.01
    exact_mappings:
    - attack:IA-0008.01
    is_a: IA_0008
    class_uri: d3f:IA-0008.01
  IA_0008_02:
    name: IA_0008_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000802
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0008.02
    description: Threat actors may gain access to a target spacecraft using their
      own spacecraft that has the capability to maneuver within close proximity to
      a target spacecraft to carry out a variety of TTPs (i.e., eavesdropping, side-channel,
      etc.). Since many of the commercial and military assets in space are tracked,
      and that information is publicly available, attackers can identify the location
      of space assets to infer the best positioning for intersecting orbits. Proximity
      operations support avoidance of the larger attenuation that would otherwise
      affect the signal when propagating long distances, or environmental circumstances
      that may present interference.
    title: Rogue Spacecraft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0008/02/
    aliases:
    - IA-0008.02
    mappings:
    - d3f:IA-0008.02
    exact_mappings:
    - attack:IA-0008.02
    is_a: IA_0008
    class_uri: d3f:IA-0008.02
  IA_0008_03:
    name: IA_0008_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000803
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0008.03
    description: 'Threat actors may utilize counterspace platforms to access/impact
      spacecraft. These counterspace capabilities vary significantly in the types
      of effects they create, the level of technological sophistication required,
      and the level of resources needed to develop and deploy them. These diverse
      capabilities also differ in how they are employed and how easy they are to detect
      and attribute and the permanence of the effects they have on their target.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: ASAT/Counterspace Weapon
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0008/03/
    aliases:
    - IA-0008.03
    mappings:
    - d3f:IA-0008.03
    exact_mappings:
    - attack:IA-0008.03
    is_a: IA_0008
    class_uri: d3f:IA-0008.03
  IA_0009:
    name: IA_0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0009
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0009
    description: Access through trusted third-party relationship exploits an existing
      connection that has been approved for interconnection. Leveraging third party
      / approved interconnections to pivot into the target systems is a common technique
      for threat actors as these interconnections typically lack stringent access
      control due to the trusted status.
    title: Trusted Relationship
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0009/
    aliases:
    - IA-0009
    mappings:
    - d3f:IA-0009
    exact_mappings:
    - attack:IA-0009
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0009
  IA_0009_01:
    name: IA_0009_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000901
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0009.01
    description: Threat actors may seek to exploit mission partners to gain an initial
      foothold for pivoting into the mission environment and eventually impacting
      the spacecraft. The complex nature of many space systems rely on contributions
      across organizations, including academic partners and even international collaborators.
      These organizations will undoubtedly vary in their system security posture and
      attack surface.
    title: Mission Collaborator (academia, international, etc.)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0009/01/
    aliases:
    - IA-0009.01
    mappings:
    - d3f:IA-0009.01
    exact_mappings:
    - attack:IA-0009.01
    is_a: IA_0009
    class_uri: d3f:IA-0009.01
  IA_0009_02:
    name: IA_0009_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000902
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0009.02
    description: Threat actors may target the trust between vendors and the target
      spacecraft. Missions often grant elevated access to vendors in order to allow
      them to manage internal systems as well as cloud-based environments. The vendor's
      access may be intended to be limited to the infrastructure being maintained
      but it may provide laterally movement into the target spacecraft. Attackers
      may leverage security weaknesses in the vendor environment to gain access to
      more critical mission resources or network locations. In the spacecraft context
      vendors may have direct commanding and updating capabilities outside of the
      primary communication channel.
    title: Vendor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0009/02/
    aliases:
    - IA-0009.02
    mappings:
    - d3f:IA-0009.02
    exact_mappings:
    - attack:IA-0009.02
    is_a: IA_0009
    class_uri: d3f:IA-0009.02
  IA_0009_03:
    name: IA_0009_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA000903
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0009.03
    description: Threat actors can target the user segment in an effort to laterally
      move into other areas of the end-to-end mission architecture. When user segments
      are interconnected, threat actors can exploit lack of segmentation as the user
      segment's security undoubtedly varies in their system security posture and attack
      surface than the primary space mission. The user equipment and users themselves
      provide ample attack surface as the human element and their vulnerabilities
      (i.e., social engineering, phishing, iOT) are often the weakest security link
      and entry point into many systems.
    title: User Segment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0009/03/
    aliases:
    - IA-0009.03
    mappings:
    - d3f:IA-0009.03
    exact_mappings:
    - attack:IA-0009.03
    is_a: IA_0009
    class_uri: d3f:IA-0009.03
  IA_0010:
    name: IA_0010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0010
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0010
    description: Threat actors may target a spacecraft in safe mode to establish initial
      access, taking advantage of reduced authentication, relaxed command filtering,
      or backup control pathways. Safe-mode is when all non-essential systems are
      shut down and only essential functions within the spacecraft are active. Since
      safe mode often prioritizes availability and fault recovery over security, it
      may process commands that would otherwise be rejected in nominal operations.
      This condition can provide an entry point into mission operations if improperly
      protected.
    title: Unauthorized Access During Safe-Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0010/
    aliases:
    - IA-0010
    mappings:
    - d3f:IA-0010
    exact_mappings:
    - attack:IA-0010
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0010
  IA_0011:
    name: IA_0011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0011
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0011
    description: Threat actors may exploit the auxiliary/peripheral devices that get
      plugged into spacecrafts. It is no longer atypical to see spacecrafts, especially
      CubeSats, with Universal Serial Bus (USB) ports or other ports where auxiliary/peripheral
      devices can be plugged in. Threat actors can execute malicious code on the spacecrafts
      by copying the malicious code to auxiliary/peripheral devices and taking advantage
      of logic on the spacecraft to execute code on these devices. This may occur
      through manual manipulation of the auxiliary/peripheral devices, modification
      of standard IT systems used to initially format/create the auxiliary/peripheral
      device, or modification to the auxiliary/peripheral devices' firmware itself.
    title: Auxiliary Device Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0011/
    aliases:
    - IA-0011
    mappings:
    - d3f:IA-0011
    exact_mappings:
    - attack:IA-0011
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0011
  IA_0012:
    name: IA_0012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0012
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0012
    description: Threat actors may target the spacecraft hardware and/or software
      while the spacecraft is at Assembly, Test, and Launch Operation (ATLO). ATLO
      is often the first time pieces of the spacecraft are fully integrated and exchanging
      data across interfaces. Malware could propagate from infected devices across
      the integrated spacecraft. For example, test equipment (i.e., transient cyber
      asset) is often brought in for testing elements of the spacecraft. Additionally,
      varying levels of physical security is in place which may be a reduction in
      physical security typically seen during development. The ATLO environment should
      be considered a viable attack vector and the appropriate/equivalent security
      controls from the primary development environment should be implemented during
      ATLO as well.
    title: Assembly, Test, and Launch Operation Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0012/
    aliases:
    - IA-0012
    mappings:
    - d3f:IA-0012
    exact_mappings:
    - attack:IA-0012
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0012
  IA_0013:
    name: IA_0013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IA0013
    annotations:
      attack-id:
        tag: attack-id
        value: IA-0013
    description: The inverse of IA-0006, this technique describes adversaries that
      are targeting a hosted payload, the host space vehicle (SV) can serve as an
      initial access vector to compromise the payload through vulnerabilities in the
      SV's onboard systems, communication interfaces, or software. If the SV's command
      and control systems are exploited, an attacker could gain unauthorized access
      to the vehicle's internal network. Once inside, the attacker may laterally move
      to the hosted payload, particularly if it shares data buses, processors, or
      communication links with the vehicle.
    title: Compromise Host Spacecraft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IA-0013/
    aliases:
    - IA-0013
    mappings:
    - d3f:IA-0013
    exact_mappings:
    - attack:IA-0013
    is_a: SPARTAInitialAccessTechnique
    class_uri: d3f:IA-0013
  ID3:
    name: ID3
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ID3
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-ID3
      kb-article:
        tag: kb-article
        value: '## Addtional Consiterations ID3 is the basis of C4.5, and is best
          used in natural language processing. ## References Decision Trees for Classification:
          ID3 Algorithm Explained. Towards Data Science. [Link](https://towardsdatascience.com/decision-trees-for-classification-id3-algorithm-explained-89df'
    description: ID3 stands for Iterative Dichotomiser 3 and is named such because
      the algorithm iteratively (repeatedly) dichotomizes(divides) features into two
      or more groups at each step.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ID3
    is_a: DecisionTree
    class_uri: d3f:ID3
  IMP_0001:
    name: IMP_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0001
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0001
    description: Measures designed to mislead an adversary by manipulation, distortion,
      or falsification of evidence or information into a system to induce the adversary
      to react in a manner prejudicial to their interests. Threat actors may seek
      to deceive mission stakeholders (or even military decision makers) for a multitude
      of reasons. Telemetry values could be modified, attacks could be designed to
      intentionally mimic another threat actor's TTPs, and even allied ground infrastructure
      could be compromised and used as the source of communications to the spacecraft.
    title: Deception (or Misdirection)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0001/
    aliases:
    - IMP-0001
    mappings:
    - d3f:IMP-0001
    exact_mappings:
    - attack:IMP-0001
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0001
  IMP_0002:
    name: IMP_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0002
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0002
    description: Measures designed to temporarily impair the use or access to a system
      for a period of time. Threat actors may seek to disrupt communications from
      the victim spacecraft to the ground controllers or other interested parties.
      By disrupting communications during critical times, there is the potential impact
      of data being lost or critical actions not being performed. This could cause
      the spacecraft's purpose to be put into jeopardy depending on what communications
      were lost during the disruption. This behavior is different than Denial as this
      attack can also attempt to modify the data and messages as they are passed as
      a way to disrupt communications.
    title: Disruption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0002/
    aliases:
    - IMP-0002
    mappings:
    - d3f:IMP-0002
    exact_mappings:
    - attack:IMP-0002
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0002
  IMP_0003:
    name: IMP_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0003
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0003
    description: Measures designed to temporarily eliminate the use, access, or operation
      of a system for a period of time, usually without physical damage to the affected
      system. Threat actors may seek to deny ground controllers and other interested
      parties access to the victim spacecraft. This would be done exhausting system
      resource, degrading subsystems, or blocking communications entirely. This behavior
      is different from Disruption as this seeks to deny communications entirely,
      rather than stop them for a length of time.
    title: Denial
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0003/
    aliases:
    - IMP-0003
    mappings:
    - d3f:IMP-0003
    exact_mappings:
    - attack:IMP-0003
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0003
  IMP_0004:
    name: IMP_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0004
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0004
    description: Measures designed to permanently impair (either partially or totally)
      the use of a system. Threat actors may target various subsystems or the hosted
      payload in such a way to rapidly increase it's degradation. This could potentially
      shorten the lifespan of the victim spacecraft.
    title: Degradation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0004/
    aliases:
    - IMP-0004
    mappings:
    - d3f:IMP-0004
    exact_mappings:
    - attack:IMP-0004
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0004
  IMP_0005:
    name: IMP_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0005
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0005
    description: Measures designed to permanently eliminate the use of a system, potentially
      through some physical damage to the system. Threat actors may destroy data,
      commands, subsystems, or attempt to destroy the victim spacecraft itself. This
      behavior is different from Degradation, as the individual parts are destroyed
      rather than put in a position in which they would slowly degrade over time.
    title: Destruction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0005/
    aliases:
    - IMP-0005
    mappings:
    - d3f:IMP-0005
    exact_mappings:
    - attack:IMP-0005
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0005
  IMP_0006:
    name: IMP_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IMP0006
    annotations:
      attack-id:
        tag: attack-id
        value: IMP-0006
    description: Threat actors may attempt to steal the data that is being gathered,
      processed, and sent from the victim spacecraft. Many spacecraft have a particular
      purpose associated with them and the data they gather is deemed mission critical.
      By attempting to steal this data, the mission, or purpose, of the spacecraft
      could be lost entirely.
    title: Theft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/IMP-0006/
    aliases:
    - IMP-0006
    mappings:
    - d3f:IMP-0006
    exact_mappings:
    - attack:IMP-0006
    is_a: SPARTAImpactTechnique
    class_uri: d3f:IMP-0006
  IOModule:
    name: IOModule
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IOModule
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An I/O Module is a hardware device that translates signals between
      external sensors or actuators and control systems. It typically handles analog-to-digital
      (and vice versa) conversion, serving as the data interface that allows physical
      processes to be monitored and controlled by digital controllers.
    title: I/O Module
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:IOModule
    is_a: HardwareDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:IOModule
  IOPortRestriction:
    name: IOPortRestriction
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IOPortRestriction
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-IOPR
      kb-article:
        tag: kb-article
        value: '## How It works Software-based restriction uses agent software installed
          on a computer system. The agent software monitors all IO port system traffic.
          The agent software is configurable to limit the use of certain devices connected
          to IO ports. The restriction software can also be configured to lim'
    description: Limiting access to computer input/output (IO) ports to restrict unauthorized
      devices.
    title: IO Port Restriction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:IOPortRestriction
    related_mappings:
    - attack:T1025
    - attack:T1052.001
    - attack:T1056.001
    - attack:T1091
    - attack:T1092
    - attack:T1123
    - attack:T1125
    broad_mappings:
    - d3f:CollectionTechnique
    - d3f:CommandAndControlTechnique
    - d3f:InitialAccessTechnique
    - d3f:LateralMovementTechnique
    - d3f:T1052
    - d3f:T1056
    is_a: AccessMediation
    class_uri: d3f:IOPortRestriction
  IPAddress:
    name: IPAddress
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IPAddress
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: 'An Internet Protocol address (IP address) is a numerical label assigned
      to each device connected to a computer network that uses the Internet Protocol
      for communication.An IP address serves two main functions: host or network interface
      identification and location addressing. Internet Protocol version 4 (IPv4) defines
      an IP address as a 32-bit number. However, because of the growth of the Internet
      and the depletion of available IPv4 addresses, a new version of IP (IPv6), using
      128 bits for the IP address, was standardized in 1998. IPv6 deployment has been
      ongoing since the mid-2000s.'
    title: IP Address
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/IP_address
    mappings:
    - d3f:IPAddress
    exact_mappings:
    - unified_cyber_ontology:IPAddress
    close_mappings:
    - stix:Ipv4Addr
    is_a: Identifier
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:IPAddress
  IPCNetworkTraffic:
    name: IPCNetworkTraffic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IPCNetworkTraffic
    description: IPC network traffic is network traffic related to inter-process communication
      (IPC) between network nodes..This includes only network traffic conforming to
      a standard IPC protocol; not custom protocols.
    title: IPC Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:IPCNetworkTraffic
    is_a: NetworkTraffic
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:IPCNetworkTraffic
  IPCTrafficAnalysis:
    name: IPCTrafficAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IPCTrafficAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-IPCTA
      synonym:
        tag: synonym
        value: IPC Analysis
      kb-article:
        tag: kb-article
        value: '## How it works Inter process communication enables applications or
          threads to share data. This can involve one or more computers. Monitoring
          IPC in your environment can reveal abnormal or malicious activity. IPC can
          occur within a single computer or between multiple computers remotely through
          netwo'
    description: Analyzing standard inter process communication (IPC) protocols to
      detect deviations from normal protocol activity.
    title: IPC Traffic Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:IPCTrafficAnalysis
    related_mappings:
    - attack:T1197
    broad_mappings:
    - d3f:DefenseEvasionTechnique
    - d3f:PersistenceTechnique
    is_a: NetworkTrafficAnalysis
    class_uri: d3f:IPCTrafficAnalysis
  IPPhone:
    name: IPPhone
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IPPhone
    description: A VoIP phone or IP phone uses voice over IP technologies for placing
      and transmitting telephone calls over an IP network, such as the Internet, instead
      of the traditional public switched telephone network (PSTN). Digital IP-based
      telephone service uses control protocols such as the Session Initiation Protocol
      (SIP), Skinny Client Control Protocol (SCCP) or various other proprietary protocols.
    title: IP Phone
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/VoIP_phone
    aliases:
    - VoIP Phone
    mappings:
    - d3f:IPPhone
    is_a: PersonalComputer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:IPPhone
  IPReputationAnalysis:
    name: IPReputationAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IPReputationAnalysis
    annotations:
