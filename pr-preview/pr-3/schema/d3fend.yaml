  NetworkScanner:
    name: NetworkScanner
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkScanner
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A network scanner is a computer program used to retrieve usernames
      and info on groups, shares, and services of networked computers. This type of
      program scans networks for vulnerabilities in the security of that network.
      If there is a vulnerability with the security of the network, it will send a
      report back to a hacker who may use this info to exploit that network glitch
      to gain entry to the network or for other malicious activities. Ethical hackers
      often also use the information to remove the glitches and strengthen their network.
    title: Network Scanner
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Network_enumeration#Software
    - https://dbpedia.org/page/Network_enumeration
    aliases:
    - Network Enumerator
    mappings:
    - d3f:NetworkScanner
    is_a: CyberSensor
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkScanner
  NetworkSensor:
    name: NetworkSensor
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkSensor
    description: A Network Sensor monitors network traffic and communication patterns.
    title: Network Sensor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NetworkSensor
    is_a: CyberSensor
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkSensor
  NetworkService:
    name: NetworkService
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkService
    description: In computer networking, a network service is an application running
      at the network application layer and above, that provides data storage, manipulation,
      presentation, communication or other capability which is often implemented using
      a client-server or peer-to-peer architecture based on application layer network
      protocols. Clients and servers will often have a user interface, and sometimes
      other hardware associated with it.
    title: Network Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Network_service
    mappings:
    - d3f:NetworkService
    is_a: ServiceApplicationProcess
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
    class_uri: d3f:NetworkService
  NetworkSession:
    name: NetworkSession
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkSession
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A network session is a temporary and interactive information interchange
      between two or more devices communicating over a network. A session is established
      at a certain point in time, and then 'torn down' - brought to an end - at some
      later point. An established communication session may involve more than one
      message in each direction. A session is typically stateful, meaning that at
      least one of the communicating parties needs to hold current state information
      and save information about the session history in order to be able to communicate,
      as opposed to stateless communication, where the communication consists of independent
      requests with responses. Network sessions may be established and implemented
      as part of protocols and services at the application, session, or transport
      layers of the OSI model.
    title: Network Session
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/OSI_model
    - http://dbpedia.org/resource/Session_(computer_science)
    - https://schema.ocsf.io/objects/network_connection_info
    mappings:
    - d3f:NetworkSession
    is_a: Session
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkSession
  NetworkTimeServer:
    name: NetworkTimeServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkTimeServer
    description: A network time server is a server computer that reads the actual
      time from a reference clock and distributes this information to its clients
      using a computer network. The time server may be a local network time server
      or an internet time server. The time server may also be a stand-alone hardware
      device. It can use NTP (RFC5905) or other protocols.
    title: Network Time Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Time_server
    mappings:
    - d3f:NetworkTimeServer
    is_a: Server
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkTimeServer
  NetworkTraffic:
    name: NetworkTraffic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkTraffic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Network traffic or data traffic is the data, or alternatively the
      amount of data, moving across a network at a given point of time.  Network data
      in computer networks is mostly encapsulated in network packets, which provide
      the load in the network.
    title: Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Network_traffic
    - https://schema.ocsf.io/objects/network_traffic
    aliases:
    - Data Traffic
    mappings:
    - d3f:NetworkTraffic
    exact_mappings:
    - stix:NetworkTraffic
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkTraffic
  NetworkTrafficAnalysis:
