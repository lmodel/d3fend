        tag: synonym
        value: Email Or Messaging Hardening
    description: Email or Messaging Hardening includes measures taken to ensure the
      confidentiality and integrity of user to user computer messages.
    title: Message Hardening
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
