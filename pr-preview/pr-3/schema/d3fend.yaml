        value: D3A-TSA
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Time series. [Link](https://en.wikipedia.org/wiki/Time_series)'
    description: Time series analysis comprises methods for analyzing time series
      data in order to extract meaningful statistics and other characteristics of
      the data.
    title: Time Series Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimeSeriesAnalysis
    is_a: StatisticalMethod
    class_uri: d3f:TimeSeriesAnalysis
  TimeSeriesDatabase:
    name: TimeSeriesDatabase
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimeSeriesDatabase
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A specialized database optimized for storing and retrieving time-stamped
      data.
    title: Time Series Database
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
