  TemporalDifferenceLearning:
    name: TemporalDifferenceLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TemporalDifferenceLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-TDL
      kb-article:
        tag: kb-article
        value: '## References Temporal difference learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Temporal_difference_learning).'
    description: Temporal difference (TD) learning refers to a class of model-free
      reinforcement learning methods which learn by bootstrapping from the current
      estimate of the value function. These methods sample from the environment, like
      Monte Carlo methods, and perform updates based on current estimates, like dynamic
      programming methods
    title: Temporal Difference Learning
    comments:
    - Temporal difference (TD) learning refers to a class of model-free reinforcement
      learning methods which learn by bootstrapping from the current estimate of the
      value function.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TemporalDifferenceLearning
    is_a: Model_freeReinforcementLearning
    class_uri: d3f:TemporalDifferenceLearning
  TemporalLogic:
    name: TemporalLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TemporalLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-TL
      kb-article:
        tag: kb-article
        value: '## References 1. Temporal logic. (2023, June 4). In _Wikipedia_. [Link](https://en.wikipedia.org/wiki/Modal_logic#Temporal_logic)'
    description: Temporal logic addresses the semantics of tense; i.e., qualifying
      expressions of when.
    title: Temporal Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TemporalLogic
    is_a: ModalLogic
    class_uri: d3f:TemporalLogic
  TerminateProcess:
    name: TerminateProcess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TerminateProcess
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: On many computer operating systems, a computer process terminates
      its execution by making an exit system call. More generally, an exit in a multithreading
      environment means that a thread of execution has stopped running. For resource
      management, the operating system reclaims resources (memory, files, etc.) that
      were used by the process. The process is said to be a dead process after it
      terminates.
    title: Terminate Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Exit_(system_call)
    mappings:
    - d3f:TerminateProcess
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:TerminateProcess
  TertiaryStorage:
    name: TertiaryStorage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TertiaryStorage
    description: Tertiary storage or tertiary memory is memory primarily used for
      archiving rarely accessed information. It is primarily useful for extraordinarily
      large data stores. Typical examples include tape libraries and optical jukeboxes.
    title: Tertiary Storage
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Computer_data_storage#Tertiary_storage
    mappings:
    - d3f:TertiaryStorage
    is_a: HardwareDevice
    mixins:
    - SecondaryStorage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:TertiaryStorage
  TestExecutionTool:
    name: TestExecutionTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TestExecutionTool
    description: 'A test execution tool is a type of software used to test software,
      hardware or complete systems.  Synonyms of test execution tool include test
      execution engine, test executive, test manager, test sequencer.  Two common
      forms in which a test execution engine may appear are as a: (a) module of a
      test software suite (test bench) or an integrated development environment, or
      (b) stand-alone application software.'
    title: Test Execution Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Test_execution_engine
    aliases:
