    annotations:
      attack-id:
        tag: attack-id
        value: T1420
    description: Adversaries may enumerate files and directories or search in specific
      device locations for desired information within a filesystem. Adversaries may
      use the information from [File and Directory Discovery](https://attack.mitre.org/techniques/T1420)
      during automated discovery to shape follow-on behaviors, including deciding
      if the adversary should fully infect the target and/or attempt specific actions.
    title: File and Directory Discovery
