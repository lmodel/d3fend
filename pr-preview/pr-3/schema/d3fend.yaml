          clients to a single server to develop a baseline of their characteristics.
          May take into account request/response sizes, entropy, frequency, and rhythm.
          Finally, identify outliers as they may indicate a malicious payload deliver'
    description: Comparing client-server request and response payloads to a baseline
      profile to identify outliers.
