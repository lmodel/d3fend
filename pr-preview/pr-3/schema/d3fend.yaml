        value: D3-IDA
      kb-article:
        tag: kb-article
        value: '## How it works Input Device Hardening techniques filter certain commands,
          or disable related operating system functionality. ### Analytics All of
          these values can be analyzed and compared to a baseline: * Amount of input
          * Duration of a single input * Durations between inputs * Value of input'
    description: Operating system level mechanisms to prevent abusive input device
      exploitation.
    title: Input Device Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
