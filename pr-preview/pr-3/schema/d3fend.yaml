    description: A central processing unit (CPU), also called a central processor,
      main processor or just processor, is the electronic circuitry that executes
      instructions comprising a computer program. The CPU performs basic arithmetic,
      logic, controlling, and input/output (I/O) operations specified by the instructions
      in the program. This contrasts with external components such as main memory
      and I/O circuitry, and specialized processors such as graphics
    title: Central Processing Unit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
