name: d3fend
description: D3FEND is a framework which encodes a countermeasure knowledge base as
  a knowledge graph. The graph contains the types and relations that define key concepts
  in the cybersecurity countermeasure domain and the relations necessary to link those
  concepts to each other. Each of these concepts and relations are linked to references
  in the cybersecurity literature.
title: "D3FEND\u2122 - A knowledge graph of cybersecurity countermeasures"
see_also:
- https://d3fend.mitre.org/
- https://github.com/d3fend/d3fend-ontology
id: https://d3fend.mitre.org/ontologies/d3fend.owl
imports:
- linkml:types
license: MIT
