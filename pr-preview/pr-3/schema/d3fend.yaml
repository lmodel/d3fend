  CoefficientOfVariation:
    name: CoefficientOfVariation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CoefficientOfVariation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-COV
      synonym:
        tag: synonym
        value: RSD
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Coefficient of variation. [Link](https://en.wikipedia.org/wiki/Coefficient_of_variation)'
    description: 'The coefficient of variation (CV), also known as relative standard
      deviation (RSD), is a standardized measure of dispersion of a probability distribution
      or frequency distribution.


      The coefficient of variation (CV) is defined as the ratio of the standard deviation
      to the mean .'
    title: Coefficient of Variation
