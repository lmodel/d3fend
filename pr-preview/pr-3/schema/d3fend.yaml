          AI Model Access enables techniques that use various types of access to the
          AI model that can be used by the adversary to gain information, develop
          attacks, and as a means to input data to the model. The level of access
          can range from the full knowledge of the internals of the model to access
          to the physical environment where
      AML_TA0001:
        text: AML_TA0001
        description: AI Attack Staging
        meaning: d3f:AML.TA0001
        notes:
        - The adversary is leveraging their knowledge of and access to the target
          system to tailor the attack. AI Attack Staging consists of techniques adversaries
          use to prepare their attack on the target AI model. Techniques can include
          training proxy models, poisoning the target model, and crafting adversarial
          data to feed the target model. Some of these techniques can be performed
          in an offline manner
      AML_TA0002:
        text: AML_TA0002
        description: Reconnaissance
        meaning: d3f:AML.TA0002
        notes:
        - The adversary is trying to gather information about the AI system they can
          use to plan future operations. Reconnaissance consists of techniques that
          involve adversaries actively or passively gathering information that can
          be used to support targeting. Such information may include details of the
