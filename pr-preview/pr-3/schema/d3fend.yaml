        value: D3A-SVMC
      kb-article:
        tag: kb-article
        value: '## References About Support Vector Machine (SVM). IBM SPSS Modeler
          SaaS Documentation. [Link](https://www.ibm.com/docs/en/spss-modeler/saas?topic=models-about-svm&mhsrc=ibmsearch_a&mhq=support%20vector%20machine).'
    description: Support Vector Machine (SVM) is a robust classification and regression
      technique that maximizes the predictive accuracy of a model without overfitting
      the training data. SVM is particularly suited to analyzing data with very large
      numbers (for example, thousands) of predictor fields.
    title: Support Vector Machine Classification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
