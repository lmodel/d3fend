      synonym:
        tag: synonym
        value: Electronic Message Analysis
      kb-article:
        tag: kb-article
        value: '## Technique Overview Email and messaging are frequently used to deliver
          malicious content to targets. These enterprise capabilities are used to
          deliver software exploits or social engineering tricks. If the recipient
          of a message trusts the sender, attackers can avoid escalating suspicion.
          Emails'
    description: Analyzing email or instant message content to detect unauthorized
      activity.
    title: Message Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:MessageAnalysis
    is_a: DefensiveTechnique
    class_uri: d3f:MessageAnalysis
  MessageAuthentication:
    name: MessageAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#MessageAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-MAN
      kb-article:
        tag: kb-article
        value: '## How it works ### Digital Signature Digital signatures are used
          to verifying a message is from the expected sender. In email, Secure/Multipurpose
          Internet Mail Extensions (S/MIME) protocol is typically used to digitally
          sign messages. A hash value of the sender''s message is created and encrypted'
    description: Authenticating the sender of a message and ensuring message integrity.
    title: Message Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:MessageAuthentication
    is_a: MessageHardening
    class_uri: d3f:MessageAuthentication
  MessageEncryption:
    name: MessageEncryption
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#MessageEncryption
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-MENCR
      kb-article:
        tag: kb-article
        value: '## How it works ### Asymmetric Cryptography Asymmetric encryption
          is typically accomplished using public and private key certificates based
          on the X.509 standard. The sender encrypts messages using the recipient''s
          public key and the receipt decrypts the message using their private key.
          Standards th'
    description: Encrypting a message body using a cryptographic key.
    title: Message Encryption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:MessageEncryption
    is_a: MessageHardening
    class_uri: d3f:MessageEncryption
