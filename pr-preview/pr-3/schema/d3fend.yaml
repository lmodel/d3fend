        value: '## References 1. Wolfram Research. (2012). KendallTau. Wolfram Language
          function. [Link](https://reference.wolfram.com/language/ref/KendallTau.html)
          1. Kendall''s Tau. (2023, May 23). In _Wikipedia_. [Link](https://en.wikipedia.org/wiki/Kendall_rank_correlation_coefficient]""",'
    description: Kendall's $\\tau$ between and is given by $(n_c - n_d) / \\sqrt((n_c+n_d+n_x)(n_c+n_d+n_y)$,
      where is the number of concordant pairs of observations, is the number of discordant
      pairs, is the number of ties involving only the variable, and is the number
      of ties involving only the variable." ;
    title: Kendall's Rank Correlation Coefficient
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
