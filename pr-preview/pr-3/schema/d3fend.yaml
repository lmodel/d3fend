        tag: attack-id
        value: T1054
    description: 'An adversary may attempt to block indicators or events typically
      captured by sensors from being gathered and analyzed. This could include maliciously
      redirecting (Citation: Microsoft Lamin Sept 2017) or even disabling host-based
      sensors, such as Event Tracing for Windows (ETW),(Citation: Microsoft About
      Event Tracing 2018) by tampering settings that control the collection and flow
      of event telemetry. (Citation: Medium Event Tracing Tampering 2018) These settings
      may be stored on the system in configuration files and/or in the Registry as
      well as being accessible via administrative utilities such as [PowerShell](https://attack.mitre.org/techniques/T1086)
      or [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047).'
    title: Indicator Blocking
    comments:
    - This technique has been revoked by T1562.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
