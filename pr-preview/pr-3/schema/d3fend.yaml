  WirelessAccessPoint:
    name: WirelessAccessPoint
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WirelessAccessPoint
    description: In computer networking, a wireless access point (WAP), or more generally
      just access point (AP), is a networking hardware device that allows other Wi-Fi
      devices to connect to a wired network. The AP usually connects to a router (via
      a wired network) as a standalone device, but it can also be an integral component
      of the router itself. An AP is differentiated from a hotspot which is a physical
      location where Wi-Fi access is available.
    title: Wireless Access Point
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Wireless_access_point
    aliases:
    - WAP
    mappings:
    - d3f:WirelessAccessPoint
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WirelessAccessPoint
  WirelessAttacker:
    name: WirelessAttacker
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WirelessAttacker
    description: An attacker who targets wireless communication methods, like Wi-Fi,
      without needing physical access to the premises.
    title: Wireless Attacker
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WirelessAttacker
    is_a: RemoteAttacker
    class_uri: d3f:WirelessAttacker
  WirelessLink:
    name: WirelessLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WirelessLink
    description: A physical link that transmits signals through free space or an unguided
      medium without physical connectors between endpoints. The signal propagates
      through air, vacuum, water, or other natural media using electromagnetic waves
      or acoustic energy.
    title: Wireless Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WirelessLink
    is_a: PhysicalLink
    slots:
