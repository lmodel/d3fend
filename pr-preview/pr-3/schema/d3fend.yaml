  Receiver:
    name: Receiver
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Receiver
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A receiver is a device or system that acquires signals and converts
      them into usable information. It senses a physical carrier (such as electromagnetic
      fields, light, electrical currents, or acoustic waves), conditions the input,
      and extracts the intended content through operations like filtering, amplification,
      detection, synchronization, demodulation, decoding, and error correction. A
      receiver may be analog or digital, implemented in hardware, software, or both,
      and is designed to mitigate impairments such as noise, interference, and distortion
      while delivering recovered data or media to downstream processes.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.analog.com/en/resources/glossary/receiver.html
    mappings:
