    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#FileMetadataConsistencyValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-FMCV
      kb-article:
        tag: kb-article
        value: '## How it works This technique involves validating the consistency
          between a file''s metadata and its actual content. It checks elements like
          declared lengths, pointers, and checksums to ensure they accurately describe
          the file''s content. For instance, if a header specifies a content block
          of 50 byt'
    description: The process of validating the consistency between a file's metadata
      and its actual content, ensuring that elements like declared lengths, pointers,
      and checksums accurately describe the file's content.
    title: File Metadata Consistency Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
