        tag: kb-article
        value: '## How it works Unusual data transfer activity may indicate unauthorized
          activity. Data transfers can be analyzed by collecting network traffic or
          application logs. ## Considerations * There is a potential for false positives
          from anomalies that are not associated with unauthorized activity. * Atta'
    description: Analyzing the amount of data transferred by a user.
    title: User Data Transfer Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:UserDataTransferAnalysis
    is_a: UserBehaviorAnalysis
    class_uri: d3f:UserDataTransferAnalysis
