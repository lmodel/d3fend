        value: '## References 1. Navarro, G. (2001). A guided tour to approximate
          string matching. _ACM Computing Surveys_, 33(1), 31-88. [Link](https://doi.org/10.1145/375360.375365)'
    description: The Levenshtein distance (LD) is a metric for measuring the differences
      between two sequences - or strings. Informally, the LD is the number of individual
      edits one would have to make to turn one sequence into another.
    title: Levenschtein Matching
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
