  VersionControlTool:
    name: VersionControlTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VersionControlTool
    description: Version control tools are tools that used to conduct version control.
      A  component of software configuration management, version control, also known
      as revision control, source control, or source code management systems are systems
      responsible for the management of changes to documents, computer programs, large
      web sites, and other collections of information. Changes are usually identified
      by a number or letter code, termed the "revision number", "revision level",
      or simply "revision". For example, an initial set of files is "revision 1".
      When the first change is made, the resulting set is "revision 2", and so on.
      Each revision is associated with a timestamp and the person making the change.
      Revisions can be compared, restored, and with some types of files, merged.
    title: Version Control Tool
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Software_configuration_management
    - http://dbpedia.org/resource/Version_control
    aliases:
    - Revision Control
    - Source Control
    mappings:
    - d3f:VersionControlTool
    is_a: DeveloperApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VersionControlTool
  VideoInputDevice:
    name: VideoInputDevice
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VideoInputDevice
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Video input devices are used to digitize images or video from the
      outside world into the computer. The information can be stored in a multitude
      of formats depending on the user's requirement.
    title: Video Input Device
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Input_device#Video_input_devices
    mappings:
    - d3f:VideoInputDevice
    is_a: InputDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VideoInputDevice
  VideoSurveillance:
    name: VideoSurveillance
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VideoSurveillance
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-VS
      synonym:
        tag: synonym
        value: CCTV Surveillance
      kb-article:
        tag: kb-article
        value: '## How it works Video surveillance uses digital cameras that stream
          to a video management system (VMS) or network video recorder (NVR) for live
          monitoring, recording, and retrieval. Recording can be continuous or event-driven
          using analytics (motion in regions of interest, line crossing) or externa'
    description: Monitoring of physical areas via camera video feeds to deter, detect,
      and investigate unauthorized access and related security events.
    title: Video Surveillance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:VideoSurveillance
    related_mappings:
    - attack:T1125
    broad_mappings:
    - d3f:CollectionTechnique
    is_a: PhysicalAccessMonitoring
    class_uri: d3f:VideoSurveillance
  VirtualAddress:
    name: VirtualAddress
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VirtualAddress
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: Logical Address
    description: A virtual address in memory is a pointer or marker for a memory space
      that an operating system allows a process to use. The virtual address points
      to a location in primary storage that a process can use independently of other
      processes.
    title: Virtual Address
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Virtual_address_space
    - https://en.wikipedia.org/wiki/Memory_address#Logical_addresses
    - https://www.techopedia.com/definition/9934/virtual-address-va
    mappings:
    - d3f:VirtualAddress
    is_a: MemoryAddress
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VirtualAddress
  VirtualMemorySpace:
    name: VirtualMemorySpace
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VirtualMemorySpace
    description: Virtual memory is a memory management technique where secondary memory
      can be used as if it were a part of the main memory. Virtual memory uses hardware
      and software to enable a computer to compensate for physical memory shortages
    title: Virtual Memory Space
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Virtual_memory
    - https://whatis.techtarget.com/definition/memory
    mappings:
    - d3f:VirtualMemorySpace
    is_a: MemoryAddressSpace
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VirtualMemorySpace
  VirtualizationSoftware:
    name: VirtualizationSoftware
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VirtualizationSoftware
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Virtualization software allows a single host computer to create and
      run one or more virtual environments. Virtualization software is most often
      used to emulate a complete computer system in order to allow a guest operating
      system to be run, for example allowing Linux to run as a guest on top of a PC
      that is natively running a Microsoft Windows operating system (or the inverse,
      running Windows as a guest on Linux).
    title: Virtualization Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Category:Virtualization_software
    mappings:
    - d3f:VirtualizationSoftware
    is_a: ServiceApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VirtualizationSoftware
  Volume:
    name: Volume
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Volume
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In the context of computer operating systems, a volume or logical
      drive is a single accessible storage area with a single file system, typically
      (though not necessarily) resident on a single partition of a hard disk. Although
      a volume might be different from a physical disk drive, it can still be accessed
      with an operating system's logical interface. However, a volume differs from
      a partition.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Drive Volume
    - Logical Drive
    mappings:
    - d3f:Volume
    exact_mappings:
    - unified_cyber_ontology:Volume
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Volume
  VolumeBootRecord:
    name: VolumeBootRecord
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VolumeBootRecord
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A volume boot record (VBR) (also known as a volume boot sector, a
      partition boot record or a partition boot sector) is a type of boot sector introduced
      by the IBM Personal Computer. It may be found on a partitioned data storage
      device, such as a hard disk, or an unpartitioned device, such as a floppy disk,
      and contains machine code for bootstrapping programs (usually, but not necessarily,
      operating systems) stored in other parts of the device. On non-partitioned storage
      devices, it is the first sector of the device. On partitioned devices, it is
      the first sector of an individual partition on the device, with the first sector
      of the entire device being a Master Boot Record (MBR) containing the partition
      table.
    title: Volume Boot Record
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Volume_boot_record
    mappings:
    - d3f:VolumeBootRecord
    is_a: BootRecord
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VolumeBootRecord
  VolumeSnapshot:
    name: VolumeSnapshot
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VolumeSnapshot
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A volume snapshot is a point-in-time copy of a storage volume.
    title: Volume Snapshot
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Shadow_Copy
    - https://kubernetes-csi.github.io/docs/snapshot-restore-feature.html
    mappings:
    - d3f:VolumeSnapshot
    is_a: StorageSnapshot
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:VolumeSnapshot
  Voting:
    name: Voting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Voting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-VOT
      kb-article:
        tag: kb-article
        value: '## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning).'
    description: Voting is another form of ensembling.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Voting
    is_a: EnsembleLearning
    class_uri: d3f:Voting
  Vulnerability:
    name: Vulnerability
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Vulnerability
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A Vulnerability is a publicly disclosed instance of one or more weaknesses
      in a product that an attacker could exploit, violating its confidentiality,
      integrity, or availability.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Vulnerability
    exact_mappings:
    - spdx:Vulnerability
    - stix:Vulnerability
    is_a: D3FENDCore
    class_uri: d3f:Vulnerability
  WatchdogTimer:
    name: WatchdogTimer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimer
    annotations:
      synonym:
        tag: synonym
        value: Watchdog
    description: A watchdog timer (WDT, or simply a watchdog) is an electronic or
      software timer that is used to detect and recover from computer malfunctions.
    title: Watchdog Timer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Watchdog_timer
    mappings:
    - d3f:WatchdogTimer
    is_a: Timer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WatchdogTimer
  WatchdogTimerConfigurationEvent:
    name: WatchdogTimerConfigurationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimerConfigurationEvent
    description: An event in which a watchdog timer's timeout period or recovery action
      is configured.
    title: Watchdog Timer Configuration Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WatchdogTimerConfigurationEvent
    is_a: WatchdogTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:WatchdogTimerConfigurationEvent
  WatchdogTimerEvent:
    name: WatchdogTimerEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimerEvent
    description: A watchdog timer event is any occurrence in which a watchdog timer
      is started, updated, reset, expired, or otherwise interacts with the system
      it monitors, resulting in a state change, status report, or corrective action
      intended to detect, signal, or recover from abnormal or stalled system behavior.
    title: Watchdog Timer Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WatchdogTimerEvent
    is_a: TimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:WatchdogTimerEvent
  WatchdogTimerExpirationEvent:
    name: WatchdogTimerExpirationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimerExpirationEvent
    description: An event indicating the watchdog timer was not serviced in time and
      triggers a reset or escalation action.
    title: Watchdog Timer Expiration Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WatchdogTimerExpirationEvent
    is_a: WatchdogTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:WatchdogTimerExpirationEvent
  WatchdogTimerResetEvent:
    name: WatchdogTimerResetEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimerResetEvent
    description: An event where a watchdog timer is reset as a consequence of watchdog
      timer expiry or watchdog timer escalation policy.
    title: Watchdog Timer Reset Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WatchdogTimerResetEvent
    is_a: WatchdogTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:WatchdogTimerResetEvent
  WatchdogTimerServiceEvent:
    name: WatchdogTimerServiceEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WatchdogTimerServiceEvent
    description: An event in which the watchdog timer is serviced (kicked/pet), extending
      the time until expiry.
    title: Watchdog Timer Service Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WatchdogTimerServiceEvent
    is_a: WatchdogTimerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:WatchdogTimerServiceEvent
  Weakness:
    name: Weakness
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Weakness
    description: A weakness is a condition in a software, firmware, hardware, or service
      component that, under certain circumstances, could contribute to the introduction
      of vulnerabilities.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Weakness
    is_a: D3FENDCore
    slots:
    - may-be-weakness-of
    class_uri: d3f:Weakness
  WebAPIResource:
    name: WebAPIResource
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebAPIResource
    description: A web API resource is an API resource identified by a Uniform Resource
      Identifier (URI) and made available from one host to another host via a web
      protocol and across a network or networks.
    title: Web API Resource
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebAPIResource
    is_a: WebResource
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebAPIResource
  WebAccessToken:
    name: WebAccessToken
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebAccessToken
    annotations:
      synonym:
        tag: synonym
        value: WAT
    description: A web access token is a credential that allows a web client application
      to access a specific resource to perform specific actions on behalf of the user.
    title: Web Access Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/JSON_Web_Token
    - https://auth0.com/blog/id-token-access-token-what-is-the-difference/
    mappings:
    - d3f:WebAccessToken
    is_a: SessionToken
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebAccessToken
  WebApplication:
    name: WebApplication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebApplication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An application which is delivered by a web server over HTTP protocols
      that is presented to a client web browser.
    title: Web Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Web_application
    aliases:
    - Web App
    - Web Application
    mappings:
    - d3f:WebApplication
    is_a: ServiceApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebApplication
  WebApplicationFirewall:
    name: WebApplicationFirewall
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebApplicationFirewall
    description: A web application firewall (or WAF) filters, monitors, and blocks
      HTTP traffic to and from a web application. A WAF is differentiated from a regular
      firewall in that a WAF is able to filter the content of specific web applications
      while regular firewalls serve as a safety gate between servers. By inspecting
      HTTP traffic, it can prevent attacks stemming from web application security
      flaws, such as SQL injection, cross-site scripting (XSS), file inclusion, and
      security misconfigurations.
    title: Web Application Firewall
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Web_application_firewall
    aliases:
    - WAF
    mappings:
    - d3f:WebApplicationFirewall
    is_a: ApplicationLayerFirewall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebApplicationFirewall
  WebApplicationServer:
    name: WebApplicationServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebApplicationServer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A web application server is a web server that hosts applications.
      Application server frameworks are software frameworks for building application
      servers. An application server framework provides both facilities to create
      web applications and a server environment to run them. In the case of Java application
      servers, the server behaves like an extended virtual machine for running applications,
      transparently handling connections to the database on one side, and, often,
      connections to the Web client on the other.
    title: Web Application Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Application_server
    mappings:
    - d3f:WebApplicationServer
    is_a: WebServer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebApplicationServer
  WebAuthentication:
    name: WebAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebAuthentication
    description: A request-response comprising a user credential presentation to a
      system and a verification response where the verifying party is a web server.
    title: Web Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebAuthentication
    is_a: Authentication
    slots:
    - has-input
    - has-output
    class_uri: d3f:WebAuthentication
  WebFileResource:
    name: WebFileResource
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebFileResource
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A web file resource is a file resource identified by a Uniform Resource
      Identifier (URI) and made available from one host to another host via a web
      protocol and across a network or networks.
    title: Web File Resource
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebFileResource
    is_a: NetworkFileResource
    mixins:
    - WebResource
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebFileResource
  WebIdentityToken:
    name: WebIdentityToken
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebIdentityToken
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: Identity Token
      kb-article:
        tag: kb-article
        value: '## How it works An ID token is proof of the user''s authentication.
          An ID token is encoded as a JSON Web Token (JWT), a standard format that
          allows your application to easily inspect its content, and make sure it
          comes from the expected issuer and that no one else changed it.'
    description: An ID token is an artifact that proves that the user has been authenticated.
    title: Web Identity Token
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://auth0.com/blog/id-token-access-token-what-is-the-difference/
    mappings:
    - d3f:WebIdentityToken
    is_a: Credential
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebIdentityToken
  WebNetworkTraffic:
    name: WebNetworkTraffic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebNetworkTraffic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Web network traffic is network traffic that uses a standard web protocol.
    title: Web Network Traffic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebNetworkTraffic
    is_a: NetworkTraffic
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebNetworkTraffic
  WebResource:
    name: WebResource
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebResource
    description: A web resource is a resource identified by a Uniform Resource Identifier
      (URI) and made available from one host to another host via a web protocol and
      across a network or networks.
    title: Web Resource
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Web_resource
    - https://schema.ocsf.io/objects/web_resource
    mappings:
    - d3f:WebResource
    is_a: NetworkResource
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebResource
  WebResourceAccess:
    name: WebResourceAccess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebResourceAccess
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Ephemeral digital artifact comprising a request of a network resource
      and any response from that network resource using a standard web protocol.
    title: Web Resource Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebResourceAccess
    is_a: NetworkResourceAccess
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebResourceAccess
  WebScriptFile:
    name: WebScriptFile
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebScriptFile
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A file containing a script in a web-scripting programming language.
      Web scripts may be present and run on the client or on the server side.
    title: Web Script File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Web Script
    mappings:
    - d3f:WebScriptFile
    is_a: ExecutableScript
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebScriptFile
  WebServer:
    name: WebServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebServer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A web server is server software, or hardware dedicated to running
      this software, that can satisfy client requests on the World Wide Web. A web
      server can, in general, contain one or more websites. A web server processes
      incoming network requests over HTTP and several other related protocols. While
      the major function is to serve content, a full implementation of HTTP also includes
      ways of receiving content from clients. This feature is used for submitting
      web forms, including uploading of files.
    title: Web Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Web_server
    mappings:
    - d3f:WebServer
    is_a: Server
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebServer
  WebServerApplication:
    name: WebServerApplication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebServerApplication
    description: A web server application handles HTTP requests from clients, serves
      static content, and may act as a reverse proxy or load balancer.
    title: Web Server Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:WebServerApplication
    is_a: ServiceApplication
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:WebServerApplication
  WebSessionAccessMediation:
    name: WebSessionAccessMediation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WebSessionAccessMediation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-WSAM
      kb-article:
        tag: kb-article
        value: '## How it works Web Session Access Mediation involves managing user
          access to web applications and services, ensuring secure and authorized
          sessions. This includes authenticating users, maintaining session integrity,
          and protecting against threats like session hijacking. Examples include
          accessing'
