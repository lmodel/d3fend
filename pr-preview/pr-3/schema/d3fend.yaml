  ControlCatalog:
    name: ControlCatalog
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ControlCatalog
    description: A control catalog is a complete list of protective measures for systems,
      organizations, or individuals for subject domains (e.g., security and privacy.)
    title: Control Catalog
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
