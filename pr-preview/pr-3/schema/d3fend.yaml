  ClientApplication:
    name: ClientApplication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ClientApplication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A client application is software that accesses a service made available
      by a server. The server is often (but not always) on another computer system,
      in which case the client accesses the service by way of a network. The term
      applies to the role that programs or devices play in the client-server model
    title: Client Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1554
    - http://dbpedia.org/resource/Client_(computing)
    mappings:
    - d3f:ClientApplication
    is_a: Application
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ClientApplication
  ClientComputer:
    name: ClientComputer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ClientComputer
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A client computer is a host that accesses a service made available
      by a server. The server is often (but not always) on another computer system,
      in which case the client accesses the service by way of a network.
    title: Client Computer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Host_(network)
    - http://dbpedia.org/resource/Client_(computing)
    mappings:
    - d3f:ClientComputer
    is_a: Host
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ClientComputer
  Clipboard:
    name: Clipboard
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Clipboard
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: The clipboard is a buffer that some operating systems provide for
      short-term storage and transfer within and between application programs. The
      clipboard is usually temporary and unnamed, and its contents reside in the computer's
      RAM. The clipboard is sometimes called the paste buffer. Windows, Linux and
      macOS support a single clipboard transaction. Each cut or copy overwrites the
      previous contents. Normally, paste operations copy the contents, leaving the
      contents available in the clipboard for further pasting.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Clipboard_(computing)
    mappings:
    - d3f:Clipboard
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Clipboard
  Clock:
    name: Clock
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Clock
    description: A mechanism that generates periodic, accurately spaced signals for
      timekeeping applications. Clocks may be implemented in hardware or software
      and are essential for system operations, synchronization, and event ordering.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://csrc.nist.gov/glossary/term/clock
    mappings:
    - d3f:Clock
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Clock
  ClockEvent:
    name: ClockEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ClockEvent
    description: An event involving a clock artifact, characterized by changes to
      or readings from a timekeeping mechanism that maintains a representation of
      temporal progression.
    title: Clock Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ClockEvent
    is_a: DigitalEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:ClockEvent
  ClockSynchronizationEvent:
    name: ClockSynchronizationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ClockSynchronizationEvent
    description: An event in which a software clock adjusts its value based on an
      external time reference (e.g., NTP server, GPS time signal).
    title: Clock Synchronization Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ClockSynchronizationEvent
    is_a: SoftwareClockEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:ClockSynchronizationEvent
