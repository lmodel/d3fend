    description: "Cram\xE9r's V (sometimes referred to as Cram\xE9r's phi and denoted\
      \ as \u03C6c) is a measure of association between two nominal variables, giving\
      \ a value between 0 and +1 (inclusive) and is based on Pearson's chi-squared\
