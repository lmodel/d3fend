        value: Remote Access Control
      kb-article:
        tag: kb-article
        value: '## How it works Network Resource Access Control involves managing
          and regulating access to resources within an organization''s network. This
          includes ensuring that only authorized users or processes can access specific
          systems or data, often through authentication and authorization mechanisms.
          Examp'
    description: Control of access to organizational systems and services by users
      or processes over a network.
    title: Network Resource Access Mediation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
