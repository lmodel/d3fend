  WiredLink:
    name: WiredLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#WiredLink
    description: A physical link that uses a physical conductor or waveguide to constrain
      and direct signal propagation between endpoints. The signal is confined within
      or along a manufactured medium such as metal conductors, optical fibers, or
      coaxial structures.
    title: Wired Link
