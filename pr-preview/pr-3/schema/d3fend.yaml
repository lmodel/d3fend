    mappings:
    - d3f:REC-0002
    exact_mappings:
    - attack:REC-0002
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0002
  REC_0002_01:
    name: REC_0002_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000201
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0002.01
    description: Threat actors may gather information about the victim spacecraft's
      identity attributes that can be used for future campaigns or to help perpetuate
      other techniques. Information may include a variety of details such as the satellite
      catalog number, international designator, mission name, and more.
    title: Identifiers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0002/01/
    aliases:
    - REC-0002.01
    mappings:
    - d3f:REC-0002.01
    exact_mappings:
    - attack:REC-0002.01
    is_a: REC_0002
    class_uri: d3f:REC-0002.01
  REC_0002_02:
    name: REC_0002_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000202
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0002.02
    description: Threat actors may gather information about the victim spacecraft's
      associated organization(s) that can be used for future campaigns or to help
      perpetuate other techniques. Collection efforts may target the mission owner/operator
      in order to conduct further attacks against the organization, individual, or
      other interested parties. Threat actors may also seek information regarding
      the spacecraft's designer/builder, including physical locations, key employees,
      and roles and responsibilities as they pertain to the spacecraft, as well as
      information pertaining to the mission's end users/customers.
    title: Organization
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0002/02/
    aliases:
    - REC-0002.02
    mappings:
    - d3f:REC-0002.02
    exact_mappings:
    - attack:REC-0002.02
    is_a: REC_0002
    class_uri: d3f:REC-0002.02
  REC_0002_03:
    name: REC_0002_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000203
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0002.03
    description: Threat actors may gather information about the victim spacecraft's
      operations that can be used for future campaigns or to help perpetuate other
      techniques. Collection efforts may target mission objectives, orbital parameters
      such as orbit slot and inclination, user guides and schedules, etc. Additionally,
      threat actors may seek information about constellation deployments and configurations
      where applicable.
    title: Operations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0002/03/
    aliases:
    - REC-0002.03
    mappings:
    - d3f:REC-0002.03
    exact_mappings:
    - attack:REC-0002.03
    is_a: REC_0002
    class_uri: d3f:REC-0002.03
  REC_0003:
    name: REC_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0003
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0003
    description: Threat actors may obtain information on the victim spacecraft's communication
      channels in order to determine specific commands, protocols, and types. Information
      gathered can include commanding patterns, antenna shape and location, beacon
      frequency and polarization, and various transponder information.
    title: Gather Spacecraft Communications Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0003/
    aliases:
    - REC-0003
    mappings:
    - d3f:REC-0003
    exact_mappings:
    - attack:REC-0003
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0003
  REC_0003_01:
    name: REC_0003_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000301
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0003.01
    description: "Threat actors may gather information regarding the communications\
      \ equipment and its configuration that will be used for communicating with the\
      \ victim spacecraft. This includes:\n\nAntenna Shape: This information can help\
      \ determine the range in which it can communicate, the power of it's transmission,\
      \ and the receiving patterns.\n\nAntenna Configuration/Location:\tThis information\
      \ can include positioning, transmission frequency, wavelength, and timing.\n\
      \nTelemetry Signal Type: Information can include timing, radio frequency wavelengths,\
      \ and other information that can provide insight into the spacecraft's telemetry\
      \ system.\n\nBeacon Frequency: This information can provide insight into where\
      \ the spacecrafts located, what it's orbit is, and how long it can take to communicate\
      \ with a ground station.\n\nBeacon Polarization: This information can help triangulate\
      \ the spacecrafts it orbits the earth and determine how a satellite must be\
      \ oriented in order to communicate with the victim spacecraft.\n\nTransponder:\
      \ This could include the number of transponders per band, transponder translation\
      \ factor, transponder mappings, power utilization, and/or saturation point."
    title: Communications Equipment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0003/01/
    aliases:
    - REC-0003.01
    mappings:
    - d3f:REC-0003.01
    exact_mappings:
    - attack:REC-0003.01
    is_a: REC_0003
    class_uri: d3f:REC-0003.01
  REC_0003_02:
    name: REC_0003_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000302
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0003.02
    description: 'Threat actors may gather information regarding the commanding approach
      that will be used for communicating with the victim spacecraft. This includes:


      Commanding Signal Type: This can include timing, radio frequency wavelengths,
      and other information that can provide insight into the spacecraft''s commanding
      system.


      Valid Commanding Patterns: Most commonly, this comes in the form of a command
      database, but can also include other means that provide information on valid
      commands and the communication protocols used by the victim spacecraft.


      Valid Commanding Periods: This information can provide insight into when a command
      will be accepted by the spacecraft and help the threat actor construct a viable
      attack campaign.'
    title: Commanding Details
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0003/02/
    aliases:
    - REC-0003.02
    mappings:
    - d3f:REC-0003.02
    exact_mappings:
    - attack:REC-0003.02
    is_a: REC_0003
    class_uri: d3f:REC-0003.02
  REC_0003_03:
    name: REC_0003_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000303
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0003.03
    description: Threat actors may seek knowledge about mission-specific  communication
      channels dedicated to a payload. Such channels could be managed by a different
      organization than the owner of the spacecraft itself.
    title: Mission-Specific Channel Scanning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0003/03/
    aliases:
    - REC-0003.03
    mappings:
    - d3f:REC-0003.03
    exact_mappings:
    - attack:REC-0003.03
    is_a: REC_0003
    class_uri: d3f:REC-0003.03
  REC_0003_04:
    name: REC_0003_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000304
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0003.04
    description: 'Threat actors may seek out valid credentials which can be utilized
      to facilitate several tactics throughout an attack. Credentials may include,
      but are not limited to: system service accounts, user accounts, maintenance
      accounts, cryptographic keys and other authentication mechanisms.'
    title: Valid Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0003/04/
    aliases:
    - REC-0003.04
    mappings:
    - d3f:REC-0003.04
    exact_mappings:
    - attack:REC-0003.04
    is_a: REC_0003
    class_uri: d3f:REC-0003.04
  REC_0004:
    name: REC_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0004
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0004
    description: Threat actors may gather the launch date and time, location of the
      launch (country & specific site), organizations involved, launch vehicle, etc.
      This information can provide insight into protocols, regulations, and provide
      further targets for the threat actor, including specific vulnerabilities with
      the launch vehicle itself.
    title: Gather Launch Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0004/
    aliases:
    - REC-0004
    mappings:
    - d3f:REC-0004
    exact_mappings:
    - attack:REC-0004
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0004
  REC_0004_01:
    name: REC_0004_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000401
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0004.01
    description: Threat actor may obtain information regarding the vehicle's flight
      termination system. Threat actors may use this information to perform later
      attacks and target the vehicle's termination system to have desired impact on
      mission.
    title: Flight Termination
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0004/01/
    aliases:
    - REC-0004.01
    mappings:
    - d3f:REC-0004.01
    exact_mappings:
    - attack:REC-0004.01
    is_a: REC_0004
    class_uri: d3f:REC-0004.01
  REC_0005:
    name: REC_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0005
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0005
    description: Threat actors may seek to capture network communications throughout
      the ground station and radio frequency (RF) communication used for uplink and
      downlink communications. RF communication frequencies vary between 30MHz and
      60 GHz. Threat actors may capture RF communications using specialized hardware,
      such as software defined radio (SDR), handheld radio, or a computer with radio
      demodulator turned to the communication frequency. Network communications may
      be captured using packet capture software while the threat actor is on the target
      network.
    title: Eavesdropping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0005/
    aliases:
    - REC-0005
    mappings:
    - d3f:REC-0005
    exact_mappings:
    - attack:REC-0005
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0005
  REC_0005_01:
    name: REC_0005_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000501
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0005.01
    description: Threat actors may capture the RF communications as it pertains to
      the uplink to the victim spacecraft. This information can contain commanding
      information that the threat actor can use to perform other attacks against the
      victim spacecraft.
    title: Uplink Intercept Eavesdropping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0005/01/
    aliases:
    - REC-0005.01
    mappings:
    - d3f:REC-0005.01
    exact_mappings:
    - attack:REC-0005.01
    is_a: REC_0005
    class_uri: d3f:REC-0005.01
  REC_0005_02:
    name: REC_0005_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000502
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0005.02
    description: Threat actors may capture the RF communications as it pertains to
      the downlink of the victim spacecraft. This information can contain important
      telemetry such as onboard status and mission data.
    title: Downlink Intercept
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0005/02/
    aliases:
    - REC-0005.02
    mappings:
    - d3f:REC-0005.02
    exact_mappings:
    - attack:REC-0005.02
    is_a: REC_0005
    class_uri: d3f:REC-0005.02
  REC_0005_03:
    name: REC_0005_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000503
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0005.03
    description: Threat actors may capture signals and/or network communications as
      they travel on-board the vehicle (i.e., EMSEC/TEMPEST), via RF, or terrestrial
      networks. This information can be decoded to determine commanding and telemetry
      protocols, command times, and other information that could be used for future
      attacks.
    title: Proximity Operations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0005/03/
    aliases:
    - REC-0005.03
    mappings:
    - d3f:REC-0005.03
    exact_mappings:
    - attack:REC-0005.03
    is_a: REC_0005
    class_uri: d3f:REC-0005.03
  REC_0005_04:
    name: REC_0005_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000504
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0005.04
    description: Threat actors may interfere with the link by actively transmitting
      packets to activate the transmitter and induce a reply. The scan can be similar
      to a brute force attack, aiming to guess the used frequencies and protocols
      to obtain a reply.
    title: Active Scanning (RF/Optical)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0005/04/
    aliases:
    - REC-0005.04
    mappings:
    - d3f:REC-0005.04
    exact_mappings:
    - attack:REC-0005.04
    is_a: REC_0005
    class_uri: d3f:REC-0005.04
  REC_0006:
    name: REC_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0006
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0006
    description: Threat actors may obtain information regarding the flight software
      (FSW) development environment for the victim spacecraft. This information may
      include the development environment, source code, compiled binaries, testing
      tools, and fault management.
    title: Gather FSW Development Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0006/
    aliases:
    - REC-0006
    mappings:
    - d3f:REC-0006
    exact_mappings:
    - attack:REC-0006
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0006
  REC_0006_01:
    name: REC_0006_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000601
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0006.01
    description: Threat actors may gather information regarding the development environment
      for the victim spacecraft's FSW. This information can include IDEs, configurations,
      source code, environment variables, source code repositories, code "secrets",
      and compiled binaries.
    title: Development Environment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0006/01/
    aliases:
    - REC-0006.01
    mappings:
    - d3f:REC-0006.01
    exact_mappings:
    - attack:REC-0006.01
    is_a: REC_0006
    class_uri: d3f:REC-0006.01
  REC_0006_02:
    name: REC_0006_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000602
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0006.02
    description: Threat actors may gather information regarding how a victim spacecraft
      is tested in regards to the FSW. Understanding the testing approach including
      tools could identify gaps and vulnerabilities that could be discovered and exploited
      by a threat actor.
    title: Security Testing Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0006/02/
    aliases:
    - REC-0006.02
    mappings:
    - d3f:REC-0006.02
    exact_mappings:
    - attack:REC-0006.02
    is_a: REC_0006
    class_uri: d3f:REC-0006.02
  REC_0007:
    name: REC_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0007
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0007
    description: Threat actors may gather information regarding safe-mode indicators
      on the victim spacecraft. Safe-mode is when all non-essential systems are shut
      down and only essential functions within the spacecraft are active. During this
      mode, several commands are available to be processed that are not normally processed.
      Further, many protections may be disabled at this time.
    title: Monitor for Safe-Mode Indicators
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0007/
    aliases:
    - REC-0007
    mappings:
    - d3f:REC-0007
    exact_mappings:
    - attack:REC-0007
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0007
  REC_0008:
    name: REC_0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0008
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0008
    description: Threat actors may gather information about a mission's supply chain
      or product delivery mechanisms that can be used for future campaigns or to help
      perpetuate other techniques.
    title: Gather Supply Chain Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0008/
    aliases:
    - REC-0008
    mappings:
    - d3f:REC-0008
    exact_mappings:
    - attack:REC-0008
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0008
  REC_0008_01:
    name: REC_0008_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000801
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0008.01
    description: Threat actors may gather information that can be used to facilitate
      a future attack where they manipulate hardware components in the victim spacecraft
      prior to the customer receiving them in order to achieve data or system compromise.
      The threat actor can insert backdoors and give them a high level of control
      over the system when they modify the hardware or firmware in the supply chain.
      This would include ASIC and FPGA devices as well.
    title: Hardware Recon
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0008/01/
    aliases:
    - REC-0008.01
    mappings:
    - d3f:REC-0008.01
    exact_mappings:
    - attack:REC-0008.01
    is_a: REC_0008
    class_uri: d3f:REC-0008.01
  REC_0008_02:
    name: REC_0008_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000802
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0008.02
    description: Threat actors may gather information relating to the mission's software
      supply chain in order to facilitate future attacks to achieve data or system
      compromise. This attack can take place in a number of ways, including manipulation
      of source code, manipulation of the update and/or distribution mechanism, or
      replacing compiled versions with a malicious one.
    title: Software Recon
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0008/02/
    aliases:
    - REC-0008.02
    mappings:
    - d3f:REC-0008.02
    exact_mappings:
    - attack:REC-0008.02
    is_a: REC_0008
    class_uri: d3f:REC-0008.02
  REC_0008_03:
    name: REC_0008_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000803
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0008.03
    description: Threat actors may gather information about vulnerabilities that can
      be used for future campaigns or to perpetuate other techniques. A vulnerability
      is a weakness in the victim spacecraft's hardware, subsystems, bus, or software
      that can, potentially, be exploited by a threat actor to cause unintended or
      unanticipated behavior to occur.  During reconnaissance as threat actors identify
      the types/versions of software (i.e., COTS, open-source) being used, they will
      look for well-known vulnerabilities that could affect the spacecraft. Threat
      actors may find vulnerability information by searching leaked documents, vulnerability
      databases/scanners, compromising ground systems, and searching through online
      databases.
    title: Known Vulnerabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0008/03/
    aliases:
    - REC-0008.03
    mappings:
    - d3f:REC-0008.03
    exact_mappings:
    - attack:REC-0008.03
    is_a: REC_0008
    class_uri: d3f:REC-0008.03
  REC_0008_04:
    name: REC_0008_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000804
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0008.04
    description: "Adversaries may gather information about the victim's business relationships\
      \ that can be used during targeting. Information about an mission\u2019s business\
      \ relationships may include a variety of details, including second or third-party\
      \ organizations/domains (ex: managed service providers, contractors/sub-contractors,\
      \ etc.) that have connected (and potentially elevated) network access or sensitive\
      \ information. This information may also reveal supply chains and shipment paths\
      \ for the victim\u2019s hardware and software resources."
    title: Business Relationships
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0008/04/
    aliases:
    - REC-0008.04
    mappings:
    - d3f:REC-0008.04
    exact_mappings:
    - attack:REC-0008.04
    is_a: REC_0008
    class_uri: d3f:REC-0008.04
  REC_0009:
    name: REC_0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC0009
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0009
    description: "Threat actors may initially seek to gain an understanding of a target\
      \ mission by gathering information commonly captured in a Concept of Operations\
      \ (or similar) document and related artifacts. Information of interest includes,\
      \ but is not limited to:\n\t- the needs, goals, and objectives of the system\n\
      \t- system overview and key elements/instruments\n\t- modes of operations (including\
      \ operational constraints)\n\t- proposed capabilities and the underlying science/technology\
      \ used to provide capabilities (i.e., scientific papers, research studies, etc.)\n\
      \t- physical and support environments"
    title: Gather Mission Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0009/
    aliases:
    - REC-0009
    mappings:
    - d3f:REC-0009
    exact_mappings:
    - attack:REC-0009
    is_a: SPARTAReconnaissanceTechnique
    class_uri: d3f:REC-0009
  RFShielding:
    name: RFShielding
