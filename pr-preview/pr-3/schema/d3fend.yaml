        tag: owl_named_individual
        value: 'true'
    description: Cache memory is temporary storage that is more readily available
      to the processor than the computer's main memory source, located between the
      main memory and the processor.  It is typically either integrated directly into
      the CPU chip (level 1 cache) or placed on a separate chip with a bus interconnect
      with the CPU (level 2 cache).
    title: Processor Cache Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/CPU_cache
    - https://whatis.techtarget.com/definition/memory
    mappings:
