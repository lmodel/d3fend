  Certificate:
    name: Certificate
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Certificate
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In cryptography, a public key certificate, also known as a digital
      certificate or identity certificate, is an electronic document used to prove
      the ownership of a public key. The certificate includes information about the
      key, information about the identity of its owner (called the subject), and the
      digital signature of an entity that has verified the certificate's contents
      (called the issuer). If the signature is valid, and the software examining the
      certificate trusts the issuer, then it can use that key to communicate securely
      with the certificate's subject. In email encryption, code signing, and e-signature
      systems, a certificate's subject is typically a person or organization. However,
      in Transport Layer Security (TLS) a certificate's subject is typically a computer
      or other device.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/certificate
    - http://dbpedia.org/resource/Public_key_certificate
    aliases:
    - Public Key Certificate
    mappings:
    - d3f:Certificate
    close_mappings:
    - stix:X509Certificate
    - unified_cyber_ontology:X509Certificate
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Certificate
  Certificate_basedAuthentication:
    name: Certificate_basedAuthentication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificateBasedAuthentication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CBAN
      kb-article:
        tag: kb-article
        value: '## How it works Certificate-based authentication is a security mechanism
          that uses digital certificates to verify the identity of a user, device,
          or server before granting access to a network or system. This method relies
          on a pair of cryptographic keys: a public key and a private key. ## Consider'
    description: Requiring a digital certificate in order to authenticate a user.
    title: Certificate-based Authentication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Certificate-basedAuthentication
    mappings:
    - d3f:Certificate-basedAuthentication
    is_a: AgentAuthentication
    class_uri: d3f:Certificate-basedAuthentication
  CertificateAnalysis:
    name: CertificateAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificateAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CA
      kb-article:
        tag: kb-article
        value: '## How it works Certificate Analysis ensures that the data elements
          of the certificate are current and anchored in a known trust model. Certificate
          authorities, revocation lists, and third-party secure logs are used in the
          analysis. Analysis includes detection of server impersonation, phishing
          domai'
    description: Analyzing Public Key Infrastructure certificates to detect if they
      have been misconfigured or spoofed using both network traffic, certificate fields
      and third-party logs.
    title: Certificate Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:CertificateAnalysis
    related_mappings:
    - attack:T1041
    - attack:T1048.002
    - attack:T1071
    - attack:T1071.001
    - attack:T1573.002
    broad_mappings:
    - d3f:CommandAndControlTechnique
    - d3f:ExfiltrationTechnique
    - d3f:T1048
    - d3f:T1071
    - d3f:T1573
    is_a: NetworkTrafficAnalysis
    class_uri: d3f:CertificateAnalysis
  CertificateFile:
    name: CertificateFile
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificateFile
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A file containing a digital certificate. In cryptography, a public
      key certificate (also known as a digital certificate or identity certificate)
      is an electronic document used to prove the ownership of a public key. The certificate
      includes information about the key, information about its owner's identity,
      and the digital signature of an entity that has verified the certificate's contents
      are correct. If the signature is valid, and the person examining the certificate
      trusts the signer, then they know they can use that key to communicate with
      its owner.
    title: Certificate File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Public_key_certificate
    mappings:
    - d3f:CertificateFile
    close_mappings:
    - stix:X509Certificate
    - unified_cyber_ontology:X509Certificate
    is_a: File
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CertificateFile
  CertificatePinning:
    name: CertificatePinning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificatePinning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CP
      kb-article:
        tag: kb-article
        value: '## How it works Pinning allows for a trusted copy of a certificate
          or public key to be associated with a server and thus reducing the likelihood
          of frequently visited sites being subjected to man-in-the-middle attacks.
          Certificates or public keys can be pinned after a trusted connection has
          been est'
    description: Persisting either a server's X.509 certificate or their public key
      and comparing that to server's presented identity to allow for greater client
      confidence in the remote server's identity for SSL connections.
    title: Certificate Pinning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:CertificatePinning
    is_a: CredentialHardening
    class_uri: d3f:CertificatePinning
  CertificateRotation:
    name: CertificateRotation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificateRotation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CERO
      kb-article:
        tag: kb-article
        value: '## How it works Certificate rotation should be performed when: - Any
          certificate expires. - A new CA authority is substituted for the old, thus
          requiring a replacement root certificate. - New or modified constraints
          need to be imposed on one or more certificates. - A security breach has
          occurred.'
    description: Certificate rotation involves replacing digital certificates and
      their private keys to maintain cryptographic integrity and trust, mitigating
      key compromise risks and ensuring continuous secure communications.
    title: Certificate Rotation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://docs.couchbase.com/server/7.0/manage/manage-security/rotate-server-certificates.html
    mappings:
    - d3f:CertificateRotation
    is_a: CredentialRotation
    class_uri: d3f:CertificateRotation
  CertificateTrustStore:
    name: CertificateTrustStore
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CertificateTrustStore
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A certificate truststore is used to store public certificates used
      to authenticate clients by the server for an SSL connection.
    title: Certificate Trust Store
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Public_key_certificate
    - https://www.educative.io/edpresso/keystore-vs-truststore
    mappings:
    - d3f:CertificateTrustStore
    is_a: TrustStore
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CertificateTrustStore
  ChangeDefaultPassword:
    name: ChangeDefaultPassword
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ChangeDefaultPassword
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CDP
      kb-article:
        tag: kb-article
        value: '## How it works Change the default password as soon as a new device
          is received. The default credentials are normally documented in an instruction
          manual that is either packaged with the device, published online through
          official means, or published online through unofficial means. ## Considerations'
    description: Changing the default password means replacing the factory-set credentials
      with a strong, unique password before the device is deployed, preventing unauthorized
      access.
    title: Change Default Password
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ChangeDefaultPassword
    related_mappings:
