    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1424
    annotations:
      attack-id:
        tag: attack-id
        value: T1424
    description: Adversaries may attempt to get information about running processes
      on a device. Information obtained could be used to gain an understanding of
      common software/applications running on devices within a network. Adversaries
      may use the information from [Process Discovery](https://attack.mitre.org/techniques/T1424)
      during automated discovery to shape follow-on behaviors, including whether or
      not the adversary fully infects the target and/or attempts specific actions.
    title: Process Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
