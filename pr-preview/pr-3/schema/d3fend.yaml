  DefensiveTacticEnum:
    name: DefensiveTacticEnum
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#DefensiveTacticEnum
    description: 'Enumeration of DefensiveTactic values. Open set: additional string
      values beyond this list are permitted.'
    notes:
    - A plan for attaining a particular goal.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    permissible_values:
      Deceive:
        text: Deceive
        meaning: d3f:Deceive
        notes:
        - The deceive tactic is used to advertise, entice, and allow potential attackers
          access to an observed or controlled environment.
      Detect:
        text: Detect
        meaning: d3f:Detect
        notes:
        - The detect tactic is used to identify adversary access to or unauthorized
          activity on computer networks.
      Evict:
        text: Evict
        meaning: d3f:Evict
        notes:
        - The eviction tactic is used to remove an adversary from a computer network.
      Harden:
        text: Harden
        meaning: d3f:Harden
        notes:
        - The harden tactic is used to increase the opportunity cost of computer network
          exploitation. Hardening differs from Detection in that it generally is conducted
          before a system is online and operational.
      Isolate:
        text: Isolate
        meaning: d3f:Isolate
        notes:
        - The isolate tactic creates logical or physical barriers in a system which
          reduces opportunities for adversaries to create further accesses.
      Model:
        text: Model
        meaning: d3f:Model
        notes:
        - The model tactic is used to apply security engineering, vulnerability, threat,
          and risk analyses to digital systems. This is accomplished by creating and
          maintaining a common understanding of the systems being defended, the operations
          on those systems, actors using the systems, and the relationships and interactions
          between these elements.
      Restore:
        text: Restore
        meaning: d3f:Restore
        notes:
        - The restore tactic is used to return the system to a better state.
