  StackComponent:
    name: StackComponent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StackComponent
    description: A stack component is any component of a call stack used for stack-based
      memory allocation in a running process.  Examples include saved instruction
      pointers, stack frames, and stack frame canaries.
    title: Stack Component
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Call_stack
    mappings:
    - d3f:StackComponent
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:StackComponent
  StackFrame:
    name: StackFrame
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StackFrame
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A machine-dependent and application-binary-dependent (ABI-dependent)
      data structure containing subroutine state information including the arguments
      passed into the routine, the return address back to the routine's caller, and
      space for local variables of the routine.
    title: Stack Frame
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Call_stack
    - http://dbpedia.org/resource/Call_stack#Structure
    aliases:
    - Activation Frame
    - Activation Record
    mappings:
    - d3f:StackFrame
    is_a: StackComponent
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:StackFrame
  StackFrameCanary:
    name: StackFrameCanary
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StackFrameCanary
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Stack canaries, named for their analogy to a canary in a coal mine,
      are used to detect a stack buffer overflow before execution of malicious code
      can occur. This method works by placing a small integer, the value of which
      is randomly chosen at program start, in memory just before the stack return
      pointer. Most buffer overflows overwrite memory from lower to higher memory
      addresses, so in order to overwrite the return pointer (and thus take control
      of the process) the canary value must also be overwritten. This value is checked
      to make sure it has not changed before a routine uses the return pointer on
      the stack. This technique can greatly increase the difficulty of exploiting
      a stack buffer overflow because it forces the attacker to gain control of the
      instruction pointer by some non-traditional means such as corrupting other important
      variables on the stack.
    title: Stack Frame Canary
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Stack_buffer_overflow#Stack_canaries
    aliases:
    - Stack Canary
    mappings:
    - d3f:StackFrameCanary
    is_a: StackComponent
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:StackFrameCanary
  StackFrameCanaryValidation:
    name: StackFrameCanaryValidation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#StackFrameCanaryValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SFCV
      kb-article:
        tag: kb-article
        value: '## How it works This defense must be applied at compile-time, or via
          a patch to the program binary. Stack Frame Canary Verification inserts instructions
          at the prologue and epilogue of desired functions. In the prologue, a canary
          value, typically with the same size as the register size, is stored'
    description: Comparing a value stored in a stack frame with a known good value
      in order to prevent or detect a memory segment overwrite.
    title: Stack Frame Canary Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:StackFrameCanaryValidation
    related_mappings:
    - attack:T1068
    - attack:T1203
    - attack:T1210
    - attack:T1211
    - attack:T1212
    broad_mappings:
    - d3f:CredentialAccessTechnique
    - d3f:DefenseEvasionTechnique
    - d3f:ExecutionTechnique
    - d3f:LateralMovementTechnique
    - d3f:PrivilegeEscalationTechnique
    is_a: ApplicationHardening
    class_uri: d3f:StackFrameCanaryValidation
  StackSegment:
