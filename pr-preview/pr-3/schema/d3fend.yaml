    class_uri: d3f:VMImage
  VPNServer:
    name: VPNServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#VPNServer
    description: 'A VPN server is a type of server that enables hosting and delivery
      of VPN services.


      It is a combination of VPN hardware and software technologies that provides
      VPN clients with connectivity to a secure and/or private network, or rather,
      the VPN.'
    title: VPN Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Virtual_private_network
