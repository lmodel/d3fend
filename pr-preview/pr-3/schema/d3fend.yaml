  OperationalDependencyMapping:
    name: OperationalDependencyMapping
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperationalDependencyMapping
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-ODM
    description: Operational dependency mapping identifies and models the dependencies
      of the organization's activities on each other and on the organization's performers
      (people, systems, and services.)  This may include modeling the higher- and
      lower-level activities of an organization forming a hierarchy, or layering,
      of the dependencies in an organization's activities.
    title: Operational Dependency Mapping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OperationalDependencyMapping
    is_a: OperationalActivityMapping
