  RPCTrafficAnalysis:
    name: RPCTrafficAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RPCTrafficAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-RTA
      synonym:
        tag: synonym
        value: RPC Protocol Analysis
      kb-article:
        tag: kb-article
        value: '## How it works A remote procedure call (RPC) enables one computer
          to execute a specific function on another computer, as if it were a local
          application process. There are numerous RPC specifications and implementations.
          RPC capabilities can be abused by attackers in order to achieve a variety
          of ta'
    description: Monitoring the activity of remote procedure calls in communication
      traffic to establish standard protocol operations and potential attacker activities.
    title: RPC Traffic Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RPCTrafficAnalysis
    related_mappings:
