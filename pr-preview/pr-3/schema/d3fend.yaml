  InterprocessCommunication:
    name: InterprocessCommunication
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#InterprocessCommunication
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computer science, inter-process communication or inter-process
      communication (IPC) refers specifically to the mechanisms an operating system
      provides to allow processes it manages to share data. Typically, applications
      can use IPC categorized as clients and servers, where the client requests data
      and the server responds to client requests. Many applications are both clients
      and servers, as commonly seen in distributed computing. Methods for achieving
      IPC are divided into categories which vary based on software requirements, such
      as performance and modularity requirements, and system circumstances, such as
      network bandwidth and latency.
    title: Interprocess Communication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Inter-process_communication
    mappings:
    - d3f:InterprocessCommunication
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:InterprocessCommunication
  InterquartileRange:
    name: InterquartileRange
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#InterquartileRange
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-IR
      synonym:
        tag: synonym
        value: IQR
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Interquartile range. [Link](https://en.wikipedia.org/wiki/Interquartile_range)'
    description: The interquartile range (IQR) is a measure of statistical dispersion,
      which is the spread of the data and is defined as the difference between the
      75th and 25th percentiles of the data.
    title: Interquartile Range
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:InterquartileRange
    is_a: Variability
    class_uri: d3f:InterquartileRange
  IntervalEstimation:
