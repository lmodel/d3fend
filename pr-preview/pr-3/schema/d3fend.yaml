    is_a: SPARTAResourceDevelopmentTechnique
    class_uri: d3f:RD-0001
  RD_0001_01:
    name: RD_0001_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000101
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0001.01
    description: 'Threat actors will likely need to acquire the following types of
      equipment to establish ground-to-space communications:


      Antenna positioners: which also usually come with satellite tracking antenna
      systems, in order to accurately send and receive signals along several different
      bands. This infrastructure is useful in pinpointing the location of a spacecraft
      in the sky.


      Ground antennas: in order to send commands and receive telemetry from the victim
      spacecraft. Threat actors can utilize these antennas in relation to other tactics
      such as execution and exfiltration. Instead of compromising a third-part ground
      station, threat actors may opt to configure and run their own antennas in support
      of operations.


      Ground data processors: in order to convert RF signals to TCP packets. This
      equipment is utilized in ground stations to convert the telemetry into human
      readable format.


      Ground radio modems: in order to convert TCP packs to RF signals. This equipment
      is utilized in ground stations to convert commands into RF signals in order
      to send them to orbiting spacecraft.


      Signal generator: in order to configure amplitude, frequency, and apply modulations
      to the signal.


      Additional examples of equipment include couplers, attenuators, power dividers,
      diplexers, low noise amplifiers, high power amplifiers, filters, mixers, spectrum
      analyzers, etc.'
    title: Ground Station Equipment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0001/01/
    aliases:
    - RD-0001.01
    mappings:
    - d3f:RD-0001.01
    exact_mappings:
    - attack:RD-0001.01
    is_a: RD_0001
    class_uri: d3f:RD-0001.01
  RD_0001_02:
    name: RD_0001_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000102
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0001.02
    description: Threat actors may buy or rent commercial ground station services.
      These services often have all of the individual parts that are needed to properly
      communicate with spacecrafts. By utilizing existing infrastructure, threat actors
      may save time, money, and effort in order to support operations.
    title: Commercial Ground Station Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0001/02/
    aliases:
    - RD-0001.02
    mappings:
    - d3f:RD-0001.02
    exact_mappings:
    - attack:RD-0001.02
    is_a: RD_0001
    class_uri: d3f:RD-0001.02
  RD_0001_03:
    name: RD_0001_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000103
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0001.03
    description: Threat actors may acquire their own spacecraft that has the capability
      to maneuver within close proximity to a target spacecraft. Since many of the
      commercial and military assets in space are tracked, and that information is
      publicly available, attackers can identify the location of space assets to infer
      the best positioning for intersecting orbits. Proximity operations support avoidance
      of the larger attenuation that would otherwise affect the signal when propagating
      long distances, or environmental circumstances that may present interference.
    title: Spacecraft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0001/03/
    aliases:
    - RD-0001.03
    mappings:
    - d3f:RD-0001.03
    exact_mappings:
    - attack:RD-0001.03
    is_a: RD_0001
    class_uri: d3f:RD-0001.03
  RD_0001_04:
    name: RD_0001_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000104
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0001.04
    description: Threat actors may need to acquire a launch facility, which is a specialized
      location designed for launching spacecraft and rockets into space. These facilities
      typically include launch pads, control centers, and assembly buildings, and
      are often located near bodies of water or in remote areas to minimize potential
      safety hazards and provide enough room for rocket launches. Launch facilities
      can be operated by the military, national space agencies such as NASA in the
      United States or Roscosmos in Russia, or by private companies such as SpaceX
      or Blue Origin.
    title: Launch Facility
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0001/04/
    aliases:
    - RD-0001.04
    mappings:
    - d3f:RD-0001.04
    exact_mappings:
    - attack:RD-0001.04
    is_a: RD_0001
    class_uri: d3f:RD-0001.04
  RD_0002:
    name: RD_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD0002
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0002
    description: Threat actors may compromise third-party infrastructure that can
      be used for future campaigns or to perpetuate other techniques. Infrastructure
      solutions include physical devices such as antenna, amplifiers, and convertors,
      as well as software used by satellite communicators. Instead of buying or renting
      infrastructure, a threat actor may compromise infrastructure and use it during
      other phases of the campaign's lifecycle.
    title: Compromise Infrastructure
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0002/
    aliases:
    - RD-0002
    mappings:
    - d3f:RD-0002
    exact_mappings:
    - attack:RD-0002
    is_a: SPARTAResourceDevelopmentTechnique
    class_uri: d3f:RD-0002
  RD_0002_01:
    name: RD_0002_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000201
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0002.01
    description: Threat actors may compromise mission owned/operated ground systems
      that can be used for future campaigns or to perpetuate other techniques. These
      ground systems have already been configured for communications to the victim
      spacecraft. By compromising this infrastructure, threat actors can stage, launch,
      and execute an operation. Threat actors may utilize these systems for various
      tasks, including Execution and Exfiltration.
    title: Mission-Operated Ground System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0002/01/
    aliases:
    - RD-0002.01
    mappings:
    - d3f:RD-0002.01
    exact_mappings:
    - attack:RD-0002.01
    is_a: RD_0002
    class_uri: d3f:RD-0002.01
  RD_0002_02:
    name: RD_0002_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000202
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0002.02
    description: Threat actors may compromise access to third-party ground systems
      that can be used for future campaigns or to perpetuate other techniques. These
      ground systems can be or may have already been configured for communications
      to the victim spacecraft. By compromising this infrastructure, threat actors
      can stage, launch, and execute an operation.
    title: 3rd Party Ground System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0002/02/
    aliases:
    - RD-0002.02
    mappings:
    - d3f:RD-0002.02
    exact_mappings:
    - attack:RD-0002.02
    is_a: RD_0002
    class_uri: d3f:RD-0002.02
  RD_0002_03:
    name: RD_0002_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000203
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0002.03
    description: Threat actors may compromise a 3rd-party spacecraft that has the
      capability to maneuver within close proximity to a target spacecraft. This technique
      enables historically lower-tier attackers the same capability as top tier nation-state
      actors without the initial development cost. Additionally, this technique complicates
      attribution of an attack. Since many of the commercial and military assets in
      space are tracked, and that information is publicly available, attackers can
      identify the location of space assets to infer the best positioning for intersecting
      orbits. Proximity operations support avoidance of the larger attenuation that
      would otherwise affect the signal when propagating long distances, or environmental
      circumstances that may present interference. Further, the compromised spacecraft
      may posses the capability to grapple target spacecraft once it has established
      the appropriate space rendezvous. If from a proximity / rendezvous perspective
      a threat actor has the ability to connect via docking interface or expose testing
      (i.e., JTAG port) once it has grappled the target spacecraft, they could perform
      various attacks depending on the access enabled via the physical connection.
    title: 3rd-Party Spacecraft
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0002/03/
    aliases:
    - RD-0002.03
    mappings:
    - d3f:RD-0002.03
    exact_mappings:
    - attack:RD-0002.03
    is_a: RD_0002
    class_uri: d3f:RD-0002.03
  RD_0003:
    name: RD_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD0003
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0003
    description: Threat actors may buy and/or steal cyber capabilities that can be
      used for future campaigns or to perpetuate other techniques. Rather than developing
      their own capabilities in-house, threat actors may purchase, download, or steal
      them. Activities may include the acquisition of malware, software, exploits,
      and information relating to vulnerabilities. Threat actors may obtain capabilities
      to support their operations throughout numerous phases of the campaign lifecycle.
    title: Obtain Cyber Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0003/
    aliases:
    - RD-0003
    mappings:
    - d3f:RD-0003
    exact_mappings:
    - attack:RD-0003
    is_a: SPARTAResourceDevelopmentTechnique
    class_uri: d3f:RD-0003
  RD_0003_01:
    name: RD_0003_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000301
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0003.01
    description: Threat actors may buy, steal, or download exploits and payloads that
      can be used for future campaigns or to perpetuate other techniques. An exploit/payload
      takes advantage of a bug or vulnerability in order to cause unintended or unanticipated
      behavior to occur on the victim spacecraft's hardware, software, and/or subsystems.
      Rather than develop their own, threat actors may find/modify exploits from online
      or purchase them from exploit vendors.
    title: Exploit/Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0003/01/
    aliases:
    - RD-0003.01
    mappings:
    - d3f:RD-0003.01
    exact_mappings:
    - attack:RD-0003.01
    is_a: RD_0003
    class_uri: d3f:RD-0003.01
  RD_0003_02:
    name: RD_0003_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000302
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0003.02
    description: Threat actors may obtain encryption keys as they are used for the
      main commanding of the target spacecraft or any of its subsystems/payloads.
      Once obtained, threat actors may use any number of means to command the spacecraft
      without needing to go through a legitimate channel. These keys may be obtained
      through reconnaissance of the ground system or retrieved from the victim spacecraft.
    title: Cryptographic Keys
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0003/02/
    aliases:
    - RD-0003.02
    mappings:
    - d3f:RD-0003.02
    exact_mappings:
    - attack:RD-0003.02
    is_a: RD_0003
    class_uri: d3f:RD-0003.02
  RD_0004:
    name: RD_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD0004
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0004
    description: Threat actors may upload, install, or otherwise set up capabilities
      that can be used for future campaigns or to perpetuate other techniques. To
      support their operations, a threat actor may need to develop their own capabilities
      or obtain them in some way in order to stage them on infrastructure under their
      control. These capabilities may be staged on infrastructure that was previously
      purchased or rented by the threat actor or was otherwise compromised by them.
    title: Stage Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0004/
    aliases:
    - RD-0004
    mappings:
    - d3f:RD-0004
    exact_mappings:
    - attack:RD-0004
    is_a: SPARTAResourceDevelopmentTechnique
    class_uri: d3f:RD-0004
  RD_0004_01:
    name: RD_0004_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000401
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0004.01
    description: Threat actors may identify, select, and prepare a delivery mechanism
      in which to attack the space system (i.e., communicate with the victim spacecraft,
      deny the ground, etc.) to achieve their desired impact. This mechanism may be
      located on infrastructure that was previously purchased or rented by the threat
      actor or was otherwise compromised by them. The mechanism must include all aspects
      needed to communicate with the victim spacecraft, including ground antenna,
      converters, and amplifiers.
    title: Identify/Select Delivery Mechanism
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0004/01/
    aliases:
    - RD-0004.01
    mappings:
    - d3f:RD-0004.01
    exact_mappings:
    - attack:RD-0004.01
    is_a: RD_0004
    class_uri: d3f:RD-0004.01
  RD_0004_02:
    name: RD_0004_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000402
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0004.02
    description: Threat actors may upload exploits and payloads to a third-party infrastructure
      that they have purchased or rented or stage it on an otherwise compromised ground
      station. Exploits and payloads would include files and commands to be uploaded
      to the victim spacecraft in order to conduct the threat actor's attack.
    title: Upload Exploit/Payload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0004/02/
    aliases:
    - RD-0004.02
    mappings:
    - d3f:RD-0004.02
    exact_mappings:
    - attack:RD-0004.02
    is_a: RD_0004
    class_uri: d3f:RD-0004.02
  RD_0005:
    name: RD_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD0005
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0005
    description: 'Threat actors may obtain non-cyber capabilities, primarily physical
      counterspace weapons or systems. These counterspace capabilities vary significantly
      in the types of effects they create, the level of technological sophistication
      required, and the level of resources needed to develop and deploy them. These
      diverse capabilities also differ in how they are employed and how easy they
      are to detect and attribute and the permanence of the effects they have on their
      target.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Obtain Non-Cyber Capabilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0005/
    aliases:
    - RD-0005
    mappings:
    - d3f:RD-0005
    exact_mappings:
    - attack:RD-0005
    is_a: SPARTAResourceDevelopmentTechnique
    class_uri: d3f:RD-0005
  RD_0005_01:
    name: RD_0005_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000501
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0005.01
    description: Threat actors may acquire launch capabilities through their own development
      or through space launch service providers (companies or organizations that specialize
      in launching payloads into space). Space launch service providers typically
      offer a range of services, including launch vehicle design, development, and
      manufacturing as well as payload integration and testing. These services are
      critical to the success of any space mission and require specialized expertise,
      advanced technology, and extensive infrastructure.
    title: Launch Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0005/01/
    aliases:
    - RD-0005.01
    mappings:
    - d3f:RD-0005.01
    exact_mappings:
    - attack:RD-0005.01
    is_a: RD_0005
    class_uri: d3f:RD-0005.01
  RD_0005_02:
    name: RD_0005_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000502
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0005.02
    description: 'A non-kinetic physical ASAT attack is when a satellite is physically
      damaged without any direct contact. Non-kinetic physical attacks can be characterized
      into a few types: electromagnetic pulses, high-powered lasers, and high-powered
      microwaves. These attacks have medium possible attribution levels and often
      provide little evidence of success to the attacker.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Non-Kinetic Physical ASAT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0005/02/
    aliases:
    - RD-0005.02
    mappings:
    - d3f:RD-0005.02
    exact_mappings:
    - attack:RD-0005.02
    is_a: RD_0005
    class_uri: d3f:RD-0005.02
  RD_0005_03:
    name: RD_0005_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000503
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0005.03
    description: 'Kinetic physical ASAT attacks attempt to damage or destroy space-
      or land-based space assets. They typically are organized into three categories:
      direct-ascent, co-orbital, and ground station attacks. The nature of these attacks
      makes them easier to attribute and allow for better confirmation of success
      on the part of the attacker. *


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Kinetic Physical ASAT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0005/03/
    aliases:
    - RD-0005.03
    mappings:
    - d3f:RD-0005.03
    exact_mappings:
    - attack:RD-0005.03
    is_a: RD_0005
    class_uri: d3f:RD-0005.03
  RD_0005_04:
    name: RD_0005_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RD000504
    annotations:
      attack-id:
        tag: attack-id
        value: RD-0005.04
    description: 'Rather than attempting to damage the physical components of space
      systems, electronic ASAT attacks target the means by which space systems transmit
      and receive data. Both jamming and spoofing are forms of electronic attack that
      can be difficult to attribute and only have temporary effects.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Electronic ASAT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/RD-0005/04/
    aliases:
    - RD-0005.04
    mappings:
    - d3f:RD-0005.04
    exact_mappings:
    - attack:RD-0005.04
    is_a: RD_0005
    class_uri: d3f:RD-0005.04
  RDPConnectRequestEvent:
    name: RDPConnectRequestEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPConnectRequestEvent
    description: An event where an RDP client sends a connection request specifying
      session parameters, such as display settings, compression preferences, and security
      requirements, to prepare for an interactive session.
    title: RDP Connect Request Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RDPConnectRequestEvent
    is_a: RDPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RDPConnectRequestEvent
  RDPConnectResponseEvent:
    name: RDPConnectResponseEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPConnectResponseEvent
    description: An event where an RDP server acknowledges a connection request, finalizing
      session parameters and confirming the transition to an interactive remote session.
    title: RDP Connect Response Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RDPConnectResponseEvent
    is_a: RDPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RDPConnectResponseEvent
  RDPEvent:
    name: RDPEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPEvent
    description: An event involving the Remote Desktop Protocol (RDP), a communication
      protocol developed by Microsoft that facilitates secure remote access to graphical
      interfaces on desktops or applications hosted on remote servers. RDP supports
      multi-channel communication for transferring input, output, and management commands.
    title: RDP Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/1.3.0/classes/rdp_activity
    - https://schema.ocsf.io/classes/rdp_activity
    mappings:
    - d3f:RDPEvent
    is_a: ApplicationLayerEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RDPEvent
  RDPInitialRequestEvent:
    name: RDPInitialRequestEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPInitialRequestEvent
    description: An event where an RDP client initiates communication with a server
      by sending a request to establish a session and negotiate protocol capabilities
      for remote interaction.
    title: RDP Initial Request Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RDPInitialRequestEvent
    is_a: RDPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RDPInitialRequestEvent
  RDPInitialResponseEvent:
    name: RDPInitialResponseEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPInitialResponseEvent
    description: An event where an RDP server responds to an initial request from
      a client, presenting its supported capabilities and agreeing to proceed with
      session negotiation.
    title: RDP Initial Response Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RDPInitialResponseEvent
    is_a: RDPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RDPInitialResponseEvent
  RDPSession:
    name: RDPSession
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPSession
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A Remote Desktop Protocol (RDP) session is a session established
      using the RDP protocol to access Remove Desktop Services (RDS).
    title: RDP Session
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Remote_Desktop_Protocol
    - http://dbpedia.org/resource/Remote_Desktop_Services
    aliases:
    - Remote Desktop Session
    - Terminal Services
    mappings:
    - d3f:RDPSession
    is_a: RemoteSession
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:RDPSession
  RDPTLSHandshakeEvent:
    name: RDPTLSHandshakeEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RDPTLSHandshakeEvent
    description: An event representing the cryptographic exchange of keys and certificates
      between an RDP client and server to establish a secure communication channel.
      The handshake ensures encryption, integrity, and authentication for the session.
    title: RDP TLS Handshake Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RDPTLSHandshakeEvent
    is_a: RDPEvent
    slots:
