  Model_freeReinforcementLearning:
    name: Model_freeReinforcementLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ModelFreeReinforcementLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-MFRL
      kb-article:
        tag: kb-article
        value: '## References Model-free (reinforcement learning). Wikipedia. [Link](https://en.wikipedia.org/wiki/Model-free_(reinforcement_learning)).)'
    description: In reinforcement learning (RL), a model-free algorithm (as opposed
      to a model-based one) is an algorithm which does not use the transition probability
      distribution (and the reward function) associated with the Markov decision process
      (MDP),which, in RL, represents the problem to be solved. The transition probability
      distribution (or transition model) and the reward function are often collectively
      called the "model" of the environment (or MDP), hence the name "model-free".
      A model-free RL algorithm can be thought of as an "explicit" trial-and-error
      algorithm. An example of a model-free algorithm is Q-learning.
    title: Model-free Reinforcement Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - Model-freeReinforcementLearning
    mappings:
    - d3f:Model-freeReinforcementLearning
    is_a: ReinforcementLearning
    class_uri: d3f:Model-freeReinforcementLearning
  Modem:
    name: Modem
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Modem
    description: A modem -- a portmanteau of "modulator-demodulator" -- is a hardware
      device that converts data into a format suitable for a transmission medium so
      that it can be transmitted from one computer to another (historically along
      telephone wires). A modem modulates one or more carrier wave signals to encode
      digital information for transmission and demodulates signals to decode the transmitted
      information. The goal is to produce a signal that can be transmitted easily
      and decoded reliably to reproduce the original digital data. Modems can be used
      with almost any means of transmitting analog signals from light-emitting diodes
      to radio. A common type of modem is one that turns the digital data of a computer
      into modulated electrical signal for transmission over telephone lines and demodulated
      by another modem at the receiver side to recover the digital data.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Modem
    mappings:
    - d3f:Modem
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Modem
