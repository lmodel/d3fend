  PER_0001:
    name: PER_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER0001
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0001
    description: Threat actors may manipulate memory (boot, RAM, etc.) in order for
      their malicious code and/or commands to remain on the victim spacecraft. The
      spacecraft may have mechanisms that allow for the automatic running of programs
      on system reboot, entering or returning to/from safe mode, or during specific
      events. Threat actors may target these specific memory locations in order to
      store their malicious code or file, ensuring that the attack remains on the
      system even after a reset.
    title: Memory Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0001/
    aliases:
    - PER-0001
    mappings:
    - d3f:PER-0001
    exact_mappings:
    - attack:PER-0001
    is_a: SPARTAPersistenceTechnique
    class_uri: d3f:PER-0001
  PER_0002:
    name: PER_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER0002
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0002
    description: Threat actors may find and target various backdoors, or inject their
      own, within the victim spacecraft in the hopes of maintaining their attack.
    title: Backdoor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0002/
    aliases:
    - PER-0002
    mappings:
    - d3f:PER-0002
    exact_mappings:
    - attack:PER-0002
    is_a: SPARTAPersistenceTechnique
    class_uri: d3f:PER-0002
  PER_0002_01:
    name: PER_0002_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER000201
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0002.01
    description: Threat actors may find and target various hardware backdoors within
      the victim spacecraft in the hopes of maintaining their attack. Once in orbit,
      mitigating the risk of various hardware backdoors becomes increasingly difficult
      for ground controllers. By targeting these specific vulnerabilities, threat
      actors are more likely to remain persistent on the victim spacecraft and perpetuate
      further attacks.
    title: Hardware Backdoor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0002/01/
    aliases:
    - PER-0002.01
    mappings:
    - d3f:PER-0002.01
    exact_mappings:
    - attack:PER-0002.01
    is_a: PER_0002
    class_uri: d3f:PER-0002.01
  PER_0002_02:
    name: PER_0002_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER000202
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0002.02
    description: Threat actors may inject code to create their own backdoor to establish
      persistent access to the spacecraft. This may be done through modification of
      code throughout the software supply chain or through modification of the software-defined
      radio configuration (if applicable).
    title: Software Backdoor
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0002/02/
    aliases:
    - PER-0002.02
    mappings:
    - d3f:PER-0002.02
    exact_mappings:
    - attack:PER-0002.02
    is_a: PER_0002
    class_uri: d3f:PER-0002.02
  PER_0003:
    name: PER_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER0003
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0003
    description: Threat actors may compromise target owned ground systems that can
      be used for persistent access to the spacecraft or to perpetuate other techniques.
      These ground systems have already been configured for communications to the
      victim spacecraft. By compromising this infrastructure, threat actors can stage,
      launch, and execute persistently.
    title: Ground System Presence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0003/
    aliases:
    - PER-0003
    mappings:
    - d3f:PER-0003
    exact_mappings:
    - attack:PER-0003
    is_a: SPARTAPersistenceTechnique
    class_uri: d3f:PER-0003
  PER_0004:
    name: PER_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER0004
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0004
    description: Threat actors may attempt to fully replace the cryptographic keys
      on the spacecraft which could lockout the mission operators and enable the threat
      actor's communication channel. Once the encryption key is changed on the spacecraft,
      the spacecraft is rendered inoperable from the operators perspective as they
      have lost commanding access. Threat actors may exploit weaknesses in the key
      management strategy. For example, the threat actor may exploit the over-the-air
      rekeying procedures to inject their own cryptographic keys.
    title: Replace Cryptographic Keys
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0004/
    aliases:
    - PER-0004
    mappings:
    - d3f:PER-0004
    exact_mappings:
    - attack:PER-0004
    is_a: SPARTAPersistenceTechnique
    class_uri: d3f:PER-0004
  PER_0005:
    name: PER_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PER0005
    annotations:
      attack-id:
        tag: attack-id
        value: PER-0005
    description: Threat actors may acquire or leverage valid credentials to maintain
      persistent access to a spacecraft or its supporting command and control (C2)
      systems. These credentials may include system service accounts, user accounts,
      maintenance access credentials, cryptographic keys, or other authentication
      mechanisms that enable continued entry without triggering access alarms. By
      operating with legitimate credentials, adversaries can sustain access over extended
      periods, evade detection, and facilitate follow-on tactics such as command execution,
      data exfiltration, or lateral movement. Credentialed persistence is particularly
      effective in environments lacking strong credential lifecycle management, segmentation,
      or monitoring allowing threat actors to exploit trusted pathways while remaining
      embedded in mission operations.
    title: Credentialed Persistence
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/PER-0005/
    aliases:
    - PER-0005
    mappings:
    - d3f:PER-0005
    exact_mappings:
    - attack:PER-0005
    is_a: SPARTAPersistenceTechnique
    class_uri: d3f:PER-0005
  POSIXSymbolicLink:
    name: POSIXSymbolicLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#POSIXSymbolicLink
