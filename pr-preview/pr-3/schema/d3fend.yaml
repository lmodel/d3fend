    is_a: StorageImage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SystemStateImage
  SystemTime:
    name: SystemTime
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemTime
    description: In computing, system time represents a computer system's notion of
      a point in time.
    title: System Time
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/System_time
    mappings:
