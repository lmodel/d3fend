    is_a: CollaborativeSoftware
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ChatroomClient
  ChildProcess:
    name: ChildProcess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ChildProcess
    description: 'A child process in computing is a process created by another process
      (the parent process). This technique pertains to multitasking operating systems,
      and is sometimes called a subprocess or traditionally a subtask. There are two
      major procedures for creating a child process: the fork system call (preferred
      in Unix-like systems and the POSIX standard) and the spawn (preferred in the
      modern (NT) kernel of Microsoft Windows, as well as in some historical operating
      systems).'
    title: Child Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Parent_process
    - http://dbpedia.org/resource/Child_process
    mappings:
    - d3f:ChildProcess
    is_a: Process
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    - process-security-context
    class_uri: d3f:ChildProcess
  Classification:
    name: Classification
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Classification
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-CLA
      kb-article:
        tag: kb-article
        value: '## How it works Classification recognizes specific entities within
          the dataset and attempts to draw some conclusions on how those entities
          should be labeled or defined. Common classification algorithms are linear
          classifiers, support vector machines (SVM), decision trees, k-nearest neighbor,
          and ran'
    description: Classification uses an algorithm to accurately assign test data into
      specific categories.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Classification
    is_a: SupervisedLearning
    class_uri: d3f:Classification
  Classifying:
    name: Classifying
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Classifying
