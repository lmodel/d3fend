    - process-security-context
    class_uri: d3f:AuthorizationService
  Autoencoding:
    name: Autoencoding
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Autoencoding
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-AUT
      kb-article:
        tag: kb-article
        value: '## References SOCR. (n.d.). ABIDE Autoencoder. [Link](https://socr.umich.edu/HTML5/ABIDE_Autoencoder/#:~:text=In%20simple%20words%2C%20autoencoders%20are,layer%20at%20its%20output%20layer.)'
    description: Autoencoders are specific type of deep learning architecture used
      for learning representation of data, typically for the purpose of dimensionality
      reduction. This is achieved by designing deep learning architecture that aims
      that copying input layer at its output layer.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:Autoencoding
    is_a: DimensionReduction
    class_uri: d3f:Autoencoding
  AutoregressiveModel:
    name: AutoregressiveModel
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AutoregressiveModel
