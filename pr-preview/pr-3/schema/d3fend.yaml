    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:RuntimeVariable
  SARSA:
    name: SARSA
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SARSA
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-SAR
      kb-article:
        tag: kb-article
        value: '## References State-action-reward-state-action. Wikipedia. [Link](https://en.wikipedia.org/wiki/State%E2%80%93action%E2%80%93reward%E2%80%93state%E2%80%93action).'
    description: State-action-reward-state-action (SARSA) is an algorithm for learning
      a Markov decision process policy, used in the reinforcement learning area of
      machine learning.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/State%E2%80%93action%E2%80%93reward%E2%80%93state%E2%80%93action
    mappings:
    - d3f:SARSA
    is_a: Model_freeReinforcementLearning
    class_uri: d3f:SARSA
  SMBEvent:
    name: SMBEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBEvent
    description: An event involving the Server Message Block (SMB) protocol, a network
      file sharing protocol that allows client-server communication for accessing
      files, printers, and other shared network resources. SMB supports both transactional
      file operations and communication over reliable transport layers.
    title: SMB Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/1.3.0/classes/smb_activity
    - https://schema.ocsf.io/classes/smb_activity
    mappings:
    - d3f:SMBEvent
    is_a: ApplicationLayerEvent
    mixins:
    - TCPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBEvent
  SMBFileCreateEvent:
    name: SMBFileCreateEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileCreateEvent
    description: An event where a file is created if it does not already exist, failing
      if the file is already present. This operation strictly enforces new file creation.
    title: SMB File Create Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileCreateEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileCreateEvent
  SMBFileOpenEvent:
    name: SMBFileOpenEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileOpenEvent
    description: An event where a file is opened if it exists, failing otherwise.
      This operation is used to access or query the existing file.
    title: SMB File Open Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileOpenEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileOpenEvent
  SMBFileOpenIfEvent:
    name: SMBFileOpenIfEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileOpenIfEvent
    description: An event where a file is opened if it exists, or created if it does
      not. This operation merges file creation and access behavior.
    title: SMB File Open If Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileOpenIfEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileOpenIfEvent
  SMBFileOverwriteEvent:
    name: SMBFileOverwriteEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileOverwriteEvent
    description: An event where a file is opened and truncated if it exists, failing
      if the file does not already exist. This operation is destructive and focuses
      on replacing the file's contents.
    title: SMB File Overwrite Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileOverwriteEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileOverwriteEvent
  SMBFileOverwriteIfEvent:
    name: SMBFileOverwriteIfEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileOverwriteIfEvent
    description: An event where a file is opened and truncated if it exists, or created
      otherwise. This operation combines destructive overwrite and creation behaviors.
    title: SMB File Overwrite If Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileOverwriteIfEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileOverwriteIfEvent
  SMBFileSupersedeEvent:
    name: SMBFileSupersedeEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SMBFileSupersedeEvent
    description: An event where a file is overwritten if it exists or created if it
      does not. This operation combines file creation and modification semantics.
    title: SMB File Supersede Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SMBFileSupersedeEvent
    is_a: SMBEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:SMBFileSupersedeEvent
