    class_uri: d3f:Proxy-basedWebServerAccessMediation
  ProxyServer:
    name: ProxyServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ProxyServer
    description: In computer networking, a proxy server is a server application or
      appliance that acts as an intermediary for requests from clients seeking resources
      from servers that provide those resources. A proxy server thus functions on
      behalf of the client when requesting service, potentially masking the true origin
      of the request to the resource server.
    title: Proxy Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/objects/network_proxy
    - http://dbpedia.org/resource/Proxy_server
    mappings:
    - d3f:ProxyServer
    is_a: ComputerNetworkNode
