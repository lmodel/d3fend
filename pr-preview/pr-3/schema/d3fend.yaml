    title: Policy Reference
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PolicyReference
    is_a: TechniqueReference
    class_uri: d3f:PolicyReference
  PowerAndThermalDeviceEvent:
    name: PowerAndThermalDeviceEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PowerAndThermalDeviceEvent
    description: An event involving power supplies, batteries, or thermal management
      devices. These events represent changes in power states, temperature thresholds,
      or cooling system activity.
    title: Power and Thermal Device Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PowerAndThermalDeviceEvent
    is_a: HardwareDeviceEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:PowerAndThermalDeviceEvent
  PowerShellProfileScript:
    name: PowerShellProfileScript
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PowerShellProfileScript
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A PowerShell profile script is a script that runs when PowerShell
      starts and can be used as a logon script to customize user environments.
    title: PowerShell Profile Script
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_profiles?view=powershell-7.1
    mappings:
    - d3f:PowerShellProfileScript
    is_a: UserInitScript
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PowerShellProfileScript
  PowerSupply:
    name: PowerSupply
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PowerSupply
    description: A power supply is an electrical device or module that converts and
      regulates energy from a source (e.g., the power grid or batteries) to an appropriate
      voltage, current, and frequency for one or more loads. It may stand alone or
      be integrated into its host appliance, often providing overcurrent protection,
      voltage regulation, or power conditioning for safe, stable operation.
    title: Power Supply
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Power_supply
    mappings:
    - d3f:PowerSupply
    is_a: HardwareDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PowerSupply
  PreAuthenticationEvent:
    name: PreAuthenticationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PreAuthenticationEvent
    description: An event representing preparatory steps or processes conducted prior
      to the primary authentication operation. Pre-authentication often involves initial
      protocol exchanges, cryptographic challenges, or the validation of supplemental
      factors (e.g., pre-shared keys) to ensure the readiness and security of the
      authentication workflow.
    title: Pre-Authentication Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PreAuthenticationEvent
    is_a: AuthenticationEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:PreAuthenticationEvent
  PredicateLogic:
    name: PredicateLogic
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PredicateLogic
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-PL
      kb-article:
        tag: kb-article
        value: '## References 1. First-order logic. (2023, May 26). In _Wikipedia_.
          [Link](https://en.wikipedia.org/wiki/First-order_logic) 2. Higher-order
          logic. (2023, May 13) [Link](https://en.wikipedia.org/wiki/Higher-order_logic)'
    description: Predicate logic is is collection of formal systems used in mathematics,
      philosophy, linguistics, and computer science. First-order logic and Higher-order
      logic both incorporate predicate logic.
    title: Predicate Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PredicateLogic
    is_a: SymbolicAI
    class_uri: d3f:PredicateLogic
  PrimaryStorage:
    name: PrimaryStorage
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrimaryStorage
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Primary memory of a computer is memory that is wired directly to
      the processor, consisting of RAM and possibly ROM.  These terms are used in
      contrast to mass storage devices and cache memory (although we may note that
      when a program accesses main memory, it is often actually interacting with a
      cache).
    title: Primary Storage
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Computer_data_storage#Primary_storage
    - https://www.memorymanagement.org/glossary/m.html#term-main-memory
    mappings:
    - d3f:PrimaryStorage
    is_a: HardwareDevice
    mixins:
    - Storage
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PrimaryStorage
  PrincipalComponentAnalysis:
    name: PrincipalComponentAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrincipalComponentAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-PCA
      synonym:
        tag: synonym
        value: PCA
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Multivariate statistics. [Link](https://en.wikipedia.org/wiki/Multivariate_statistics)'
    description: Principal components analysis (PCA) creates a new set of orthogonal
      variables that contain the same information as the original set. It rotates
      the axes of variation to give a new set of orthogonal axes, ordered so that
      they summarize decreasing proportions of the variation.
    title: Principal Component Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PrincipalComponentAnalysis
    is_a: MultivariateAnalysis
    class_uri: d3f:PrincipalComponentAnalysis
  PrincipalComponentsAnalysis:
    name: PrincipalComponentsAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrincipalComponentsAnalysis
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-PCA
      kb-article:
        tag: kb-article
        value: '## References Wikipedia. (n.d.). Principal component analysis. [Link](https://en.wikipedia.org/wiki/Principal_component_analysis)'
    description: Principal Component Analysis (PCA) is a statistic-based method of
      identifying patterns in a large dataset while increasing interpretability and
      preserving information.
    title: Principal Components Analysis
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PrincipalComponentsAnalysis
    is_a: DimensionReduction
    class_uri: d3f:PrincipalComponentsAnalysis
  PrintServer:
    name: PrintServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrintServer
    description: A print server, or printer server, is a device that connects printers
      to client computers over a network. It accepts print jobs from the computers
      and sends the jobs to the appropriate printers, queuing the jobs locally to
      accommodate the fact that work may arrive more quickly than the printer can
      actually handle.
    title: Print Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Print_server
    mappings:
    - d3f:PrintServer
    is_a: Server
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PrintServer
  PrivateKey:
    name: PrivateKey
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrivateKey
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A private key can be used to decrypt messages encrypted using the
      corresponding public key, or used to sign a message that can be authenticated
      with the corresponding public key.
    title: Private Key
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Public-key_cryptography
    mappings:
    - d3f:PrivateKey
    is_a: AsymmetricKey
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PrivateKey
  PrivilegeEscalationTechnique:
    name: PrivilegeEscalationTechnique
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrivilegeEscalationTechnique
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: The adversary is trying to gain higher-level permissions.
    title: Privilege Escalation Technique
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:PrivilegeEscalationTechnique
    is_a: ATTACKEnterpriseTechnique
    mixins:
    - OffensiveTechnique
    class_uri: d3f:PrivilegeEscalationTechnique
  PrivilegedUserAccount:
    name: PrivilegedUserAccount
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PrivilegedUserAccount
    description: A privileged account is a user account that has more privileges than
      ordinary users. Privileged accounts might, for example, be able to install or
      remove software, upgrade the operating system, or modify system or application
      configurations. They might also have access to files that are not normally accessible
      to standard users. Typical examples are root and administrator accounts. But
      there also service accounts, system accounts, etc. Privileged accounts are especially
      powerful, and should be monitored especially closely.
    title: Privileged User Account
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.cyberark.com/resources/blog/7-types-of-privileged-accounts-service-accounts-and-more
    - https://www.ssh.com/iam/user/privileged-account
    mappings:
    - d3f:PrivilegedUserAccount
    is_a: UserAccount
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PrivilegedUserAccount
