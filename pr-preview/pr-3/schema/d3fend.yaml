  OperatingSystemMonitoring:
    name: OperatingSystemMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingSystemMonitoring
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-OSM
      kb-article:
        tag: kb-article
        value: '## Technique Overview "An operating system (OS) is system software
          that manages computer hardware and software resources and provides common
          services for computer programs." [1] Operating System Monitoring Techniques
          have varied implementations including built-in kernel modules, third-party
          privil'
    description: The operating system software, for D3FEND's purposes, includes the
      kernel and its process management functions, hardware drivers, initialization
      or boot logic. It also includes and other key system daemons and their configuration.
      The monitoring or analysis of these components for unauthorized activity constitute
      **Operating System Monitoring**.
    title: Operating System Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OperatingSystemMonitoring
    is_a: PlatformMonitoring
    class_uri: d3f:OperatingSystemMonitoring
  OperatingSystemPackagingTool:
    name: OperatingSystemPackagingTool
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperatingSystemPackagingTool
