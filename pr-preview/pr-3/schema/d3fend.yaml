      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Windows Registry Keys are container objects similar to folders that
      contain subkeys and/or data entries called values. A key can be a 'Registry
      Hive' when it is root key of a logical group of keys, subkeys, and values that
      has a set of supporting files loaded into memory when the operating system is
      started or a user logs in.
    title: Windows Registry Key
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://learn.microsoft.com/en-us/windows/win32/sysinfo/registry-hives
    - https://schema.ocsf.io/objects/registry_key
    - http://dbpedia.org/resource/Windows_Registry#Keys_and_values
    - https://learn.microsoft.com/en-us/windows/win32/sysinfo/structure-of-the-registry
    mappings:
    - d3f:WindowsRegistryKey
    exact_mappings:
    - stix:WindowsRegistryKey
    - unified_cyber_ontology:WindowsRegistryKey
    is_a: SystemConfigurationDatabaseRecord
    slots:
