    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-NML
      kb-article:
        tag: kb-article
        value: '## References 1. Non-monotonic logic. (2023, June 1). In _Wikipedia_.
          [Link](https://en.wikipedia.org/wiki/Non-monotonic_logic)'
    description: Non-monotonic logic is a formal logic whose conclusion relation is
      not monotonic. In other words, non-monotonic logics are devised to capture and
      represent defeasible inferences (cf. defeasible reasoning), i.e., a kind of
      inference in which reasoners draw tentative conclusions, enabling reasoners
      to retract their conclusion(s) based on further evidence.
    title: Non-monotonic Logic
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
