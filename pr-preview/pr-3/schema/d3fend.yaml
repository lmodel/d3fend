  OTIOModule:
    name: OTIOModule
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OTIOModule
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: An OT I/O Module is an industrial-grade interface designed for harsh
      Operational Technology (OT) environments. It reliably connects sensors and actuators
      to industrial control systems, ensuring precise, real-time data exchange in
      applications such as SCADA or ICS. Engineered for ruggedness and consistent
      performance, it can manage analog, digital, or other specialized signal types
      while enduring demanding conditions.
    title: OT I/O Module
    comments:
    - 'There are many types of I/O modules, including: analog input, analog output,
      HART input, HART output, digital input, digital output, mV input, pulse input,
      universal I/O, vibration input, and many other types of input or output modules.
      The functionality of the I/O Module can be embedded in the controller or as
      a separate module connected via chassis or I/O link.'
    - Rockwell Compact 5000 IO Module
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.rockwellautomation.com/en-us/support/documentation/technical/i-o/compact-5000-i-o-modules.html
    - https://consteel-electronics.com/articles/what-is-IO-module
    mappings:
    - d3f:OTIOModule
    is_a: IOModule
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:OTIOModule
