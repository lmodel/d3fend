    class_uri: d3f:REC-0001.05
  REC_0001_06:
    name: REC_0001_06
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#REC000106
    annotations:
      attack-id:
        tag: attack-id
        value: REC-0001.06
    description: Threat actors may gather information about the station-keeping control
      systems within the victim spacecraft that can be used for future campaigns or
      to help perpetuate other techniques. Information gathered can include thruster
      types, propulsion types, attitude sensors, and data flows associated with the
      relevant subsystems.
    title: Maneuver & Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/REC-0001/06/
    aliases:
