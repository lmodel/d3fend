  AccessMediation:
    name: AccessMediation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AccessMediation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-AMED
      synonym:
        tag: synonym
        value: Access Control
    description: 'Access mediation is the process of granting or denying specific
      requests to: 1) obtain and use information and related information processing
      services; and 2) enter specific physical facilities (e.g., Federal buildings,
      military establishments, border crossing entrances). Access mediation decisions
      should enforce least privilege by granting access for scoped durations to prevent
      privilege creep and, where applicable, implement just-in-time (JIT) access.
      Denial decisions may prevent initial access or terminate access that has already
      been granted, ensuring continuous enforcement of security policies.'
    title: Access Mediation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Access_control
    - https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=1451869
    - https://nvlpubs.nist.gov/nistpubs/FIPS/NIST.FIPS.201-2.pdf
    - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-160v1r1.pdf
    - https://www.cs.cmu.edu/afs/cs/usr/bsy/security/CSC-STD-001-83.txt
    mappings:
    - d3f:AccessMediation
    is_a: DefensiveTechnique
    class_uri: d3f:AccessMediation
  AccessMediationEvent:
    name: AccessMediationEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AccessMediationEvent
    description: An event involving the intermediary control mechanism that evaluates
      access requests and enforces access control decisions, ensuring that subjects'
      resource interactions comply with the established access policies.
    title: Access Mediation Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
