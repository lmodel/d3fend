    class_uri: d3f:ControlCorrelationIdentifierCatalog
  ControlFlowGraph:
    name: ControlFlowGraph
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ControlFlowGraph
    description: A control flow graph is a representation of all possible control
      flow transfers within a program, typically computed at compile-time or link-time,
      including calls, jumps, and returns. The control flow graph can be used to compute
      a control flow policy that permits only the expected control flow transfers
      during process execution via control flow integrity mechanisms.
    title: Control Flow Graph
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ControlFlowGraph
    is_a: DigitalInformation
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ControlFlowGraph
  ControlFlowIntegrity:
    name: ControlFlowIntegrity
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ControlFlowIntegrity
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-CFI
      kb-article:
        tag: kb-article
        value: '## How it works Control flow integrity (CFI) restricts the destinations
          of control flow transfer instructions---particularly indirect function branches
          such as indirect function calls, jumps, and returns---such that execution
          can only proceed along paths determined to be valid at compile-time or lo'
    description: Enforcing legal control flow transfers during application process
      execution.
    title: Control Flow Integrity
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ControlFlowIntegrity
    is_a: ApplicationHardening
    class_uri: d3f:ControlFlowIntegrity
  ControlFlowPolicy:
    name: ControlFlowPolicy
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ControlFlowPolicy
    description: A control flow policy is a subset of the possible control flow transfers
      computed from a program's control flow graph. It defines only the expected and
      allowed control flow transfers and is enforced by control flow integrity.
    title: Control Flow Policy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ControlFlowPolicy
    is_a: ControlFlowGraph
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ControlFlowPolicy
  ConvolutionalNeuralNetwork:
    name: ConvolutionalNeuralNetwork
