  T1176:
    name: T1176
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1176
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1176
    description: 'Adversaries may abuse Internet browser extensions to establish persistent
      access to victim systems. Browser extensions or plugins are small programs that
      can add functionality and customize aspects of Internet browsers. They can be
      installed directly or through a browser''s app store and generally have access
      and permissions to everything that the browser can access.(Citation: Wikipedia
      Browser Extension)(Citation: Chrome Extensions Definition)'
    title: Software Extensions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1176
    exact_mappings:
    - attack:T1176
    is_a: PersistenceTechnique
    class_uri: d3f:T1176
  T1176_001:
    name: T1176_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1176001
    annotations:
      attack-id:
        tag: attack-id
        value: T1176.001
    description: 'Adversaries may abuse internet browser extensions to establish persistent
      access to victim systems. Browser extensions or plugins are small programs that
      can add functionality to and customize aspects of internet browsers. They can
      be installed directly via a local file or custom URL or through a browser''s
      app store - an official online platform where users can browse, install, and
      manage extensions for a specific web browser. Extensions generally inherit the
      web browser''s permissions previously granted.(Citation: Wikipedia Browser Extension)(Citation:
      Chrome Extensions Definition)'
    title: Browser Extensions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1176.001
    mappings:
    - d3f:T1176.001
    exact_mappings:
    - attack:T1176.001
    is_a: T1176
    class_uri: d3f:T1176.001
  T1176_002:
    name: T1176_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1176002
    annotations:
      attack-id:
        tag: attack-id
        value: T1176.002
    description: 'Adversaries may abuse an integrated development environment (IDE)
      extension to establish persistent access to victim systems.(Citation: Mnemonic
      misuse visual studio) IDEs such as Visual Studio Code, IntelliJ IDEA, and Eclipse
      support extensions - software components that add features like code linting,
      auto-completion, task automation, or integration with tools like Git and Docker.
      A malicious extension can be installed through an extension marketplace (i.e.,
      [Compromise Software Dependencies and Development Tools](https://attack.mitre.org/techniques/T1195/001))
      or side-loaded directly into the IDE.(Citation: Abramovsky VSCode Security)(Citation:
      Lakshmanan Visual Studio Marketplace)'
    title: IDE Extensions
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1176.002
    mappings:
    - d3f:T1176.002
    exact_mappings:
    - attack:T1176.002
    is_a: T1176
    class_uri: d3f:T1176.002
  T1177:
    name: T1177
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1177
    annotations:
      attack-id:
        tag: attack-id
        value: T1177
    description: 'The Windows security subsystem is a set of components that manage
      and enforce the security policy for a computer or domain. The Local Security
      Authority (LSA) is the main component responsible for local security policy
      and user authentication. The LSA includes multiple dynamic link libraries (DLLs)
      associated with various other security functions, all of which run in the context
      of the LSA Subsystem Service (LSASS) lsass.exe process. (Citation: Microsoft
      Security Subsystem)'
    title: LSASS Driver
    comments:
    - This technique has been revoked by T1547.008
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.008
    mappings:
    - d3f:T1177
    exact_mappings:
    - attack:T1177
    is_a: ExecutionTechnique
    mixins:
    - PersistenceTechnique
    class_uri: d3f:T1177
  T1178:
    name: T1178
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1178
    annotations:
      attack-id:
        tag: attack-id
        value: T1178
    description: 'The Windows security identifier (SID) is a unique value that identifies
      a user or group account. SIDs are used by Windows security in both security
      descriptors and access tokens. (Citation: Microsoft SID) An account can hold
      additional SIDs in the SID-History Active Directory attribute (Citation: Microsoft
      SID-History Attribute), allowing inter-operable account migration between domains
      (e.g., all values in SID-History are included in access tokens).'
    title: SID-History Injection
    comments:
    - This technique has been revoked by T1134.005
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1134.005
    mappings:
    - d3f:T1178
    exact_mappings:
    - attack:T1178
    is_a: PrivilegeEscalationTechnique
    class_uri: d3f:T1178
  T1179:
    name: T1179
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1179
    annotations:
      attack-id:
        tag: attack-id
        value: T1179
    description: Windows processes often leverage application programming interface
      (API) functions to perform tasks that require reusable system resources. Windows
      API functions are typically stored in dynamic-link libraries (DLLs) as exported
      functions.
    title: Hooking
    comments:
    - This technique has been revoked by T1056.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1056.004
    mappings:
    - d3f:T1179
    exact_mappings:
    - attack:T1179
    is_a: CredentialAccessTechnique
    mixins:
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1179
  T1180:
    name: T1180
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1180
    annotations:
      attack-id:
        tag: attack-id
        value: T1180
    description: 'Screensavers are programs that execute after a configurable time
      of user inactivity and consist of Portable Executable (PE) files with a .scr
      file extension.(Citation: Wikipedia Screensaver) The Windows screensaver application
      scrnsave.scr is located in <code>C:\Windows\System32\</code>, and <code>C:\Windows\sysWOW64\</code>
      on 64-bit Windows systems, along with screensavers included with base Windows
      installations.'
    title: Screensaver
    comments:
    - This technique has been revoked by T1546.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.002
    mappings:
    - d3f:T1180
    exact_mappings:
    - attack:T1180
    is_a: PersistenceTechnique
    class_uri: d3f:T1180
  T1181:
    name: T1181
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1181
    annotations:
      attack-id:
        tag: attack-id
        value: T1181
    description: 'Before creating a window, graphical Windows-based processes must
      prescribe to or register a windows class, which stipulate appearance and behavior
      (via windows procedures, which are functions that handle input/output of data).
      (Citation: Microsoft Window Classes) Registration of new windows classes can
      include a request for up to 40 bytes of extra window memory (EWM) to be appended
      to the allocated memory of each instance of that class. This EWM is intended
      to store data specific to that window and has specific application programming
      interface (API) functions to set and get its value. (Citation: Microsoft GetWindowLong
      function) (Citation: Microsoft SetWindowLong function)'
    title: Extra Window Memory Injection
    comments:
    - This technique has been revoked by T1055.011
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1055.011
    mappings:
    - d3f:T1181
    exact_mappings:
    - attack:T1181
    is_a: DefenseEvasionTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1181
  T1182:
    name: T1182
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1182
    annotations:
      attack-id:
        tag: attack-id
        value: T1182
    description: 'Dynamic-link libraries (DLLs) that are specified in the AppCertDLLs
      Registry key under <code>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session
      Manager</code> are loaded into every process that calls the ubiquitously used
      application programming interface (API) functions CreateProcess, CreateProcessAsUser,
      CreateProcessWithLoginW, CreateProcessWithTokenW, or WinExec. (Citation: Elastic
      Process Injection July 2017)'
    title: AppCert DLLs
    comments:
    - This technique has been revoked by T1546.009
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.009
    mappings:
    - d3f:T1182
    exact_mappings:
    - attack:T1182
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1182
  T1183:
    name: T1183
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1183
    annotations:
      attack-id:
        tag: attack-id
        value: T1183
    description: "Image File Execution Options (IFEO) enable a developer to attach\
      \ a debugger to an application. When a process is created, a debugger present\
      \ in an application\u2019s IFEO will be prepended to the application\u2019s\
      \ name, effectively launching the new process under the debugger (e.g., \u201C\
      C:\\dbg\\ntsd.exe -g  notepad.exe\u201D). (Citation: Microsoft Dev Blog IFEO\
      \ Mar 2010)"
    title: Image File Execution Options Injection
    comments:
    - This technique has been revoked by T1546.012
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.012
    mappings:
    - d3f:T1183
    exact_mappings:
    - attack:T1183
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1183
  T1184:
    name: T1184
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1184
    annotations:
      attack-id:
        tag: attack-id
        value: T1184
    description: Secure Shell (SSH) is a standard means of remote access on Linux
      and macOS systems. It allows a user to connect to another system via an encrypted
      tunnel, commonly authenticating through a password, certificate or the use of
      an asymmetric encryption key pair.
    title: SSH Hijacking
    comments:
