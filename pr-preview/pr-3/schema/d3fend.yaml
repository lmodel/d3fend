    mappings:
    - d3f:Pipe
    exact_mappings:
    - unified_cyber_ontology:Pipe
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Pipe
  Pix2Pix:
    name: Pix2Pix
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Pix2Pix
