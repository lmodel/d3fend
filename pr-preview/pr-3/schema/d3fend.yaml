    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
  ExternalThingSubset:
    name: ExternalThingSubset
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ExternalThingSubset
