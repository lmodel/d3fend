        value: Business Process
    description: An activity is a specific behavior representing a set of actions
      that may be accomplished by an agent.
    title: Operational Activity Plan
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://wordnet-rdf.princeton.edu/id/00408356-n
