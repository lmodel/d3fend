  SystemUtilizationRecord:
    name: SystemUtilizationRecord
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemUtilizationRecord
    description: A system utilization record is a record for the tracking of resource
      utilization e.g. CPU, Disk, Network, Memory Bandwidth, GPU, or other resources
      for a given time period.
    title: System Utilization Record
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SystemUtilizationRecord
    is_a: Record
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:SystemUtilizationRecord
  SystemVulnerabilityAssessment:
    name: SystemVulnerabilityAssessment
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#SystemVulnerabilityAssessment
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-SYSVA
    description: System vulnerability assessment relates all the vulnerabilities of
      a system's components in the context of their configuration and internal dependencies
      and can also include assessing risk emerging from the system's design as a whole,
      not just the sum of individual component vulnerabilities.
    title: System Vulnerability Assessment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:SystemVulnerabilityAssessment
    related_mappings:
    - attack:T1562.010
    broad_mappings:
    - d3f:T1562
    is_a: SystemMapping
    class_uri: d3f:SystemVulnerabilityAssessment
  T0800:
    name: T0800
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0800
    annotations:
      attack-id:
        tag: attack-id
        value: T0800
    description: Adversaries may activate firmware update mode on devices to prevent
      expected response functions from engaging in reaction to an emergency or process
      malfunction. For example, devices such as protection relays may have an operation
      mode designed for firmware installation. This mode may halt process monitoring
      and related functions to allow new firmware to be loaded. A device left in update
      mode may be placed in an inactive holding state if no firmware is provided to
      it. By entering and leaving a device in this mode, the adversary may deny its
      usual functionalities.
    title: Activate Firmware Update Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0800
    exact_mappings:
    - attack:T0800
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0800
  T0801:
    name: T0801
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0801
    annotations:
      attack-id:
        tag: attack-id
        value: T0801
    description: Adversaries may gather information about the physical process state.
      This information may be used to gain more information about the process itself
      or used as a trigger for malicious actions. The sources of process state information
      may vary such as, OPC tags, historian data, specific PLC block information,
      or network traffic.
    title: Monitor Process State
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0801
    exact_mappings:
    - attack:T0801
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0801
  T0802:
    name: T0802
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0802
    annotations:
      attack-id:
        tag: attack-id
        value: T0802
    description: Adversaries may automate collection of industrial environment information
      using tools or scripts. This automated collection may leverage native control
      protocols and tools available in the control systems environment. For example,
      the OPC protocol may be used to enumerate and gather information. Access to
      a system or interface with these native protocols may allow collection and enumeration
      of other attached, communicating servers and devices.
    title: Automated Collection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0802
    exact_mappings:
    - attack:T0802
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0802
  T0803:
    name: T0803
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0803
    annotations:
      attack-id:
        tag: attack-id
        value: T0803
    description: 'Adversaries may block a command message from reaching its intended
      target to prevent command execution. In OT networks, command messages are sent
      to provide instructions to control system devices. A blocked command message
      can inhibit response functions from correcting a disruption or unsafe condition.
      (Citation: Bonnie Zhu, Anthony Joseph, Shankar Sastry 2011)  (Citation: Electricity
      Information Sharing and Analysis Center; SANS Industrial Control Systems March
      2016)'
    title: Block Command Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0803
    exact_mappings:
    - attack:T0803
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0803
  T0804:
    name: T0804
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0804
    annotations:
      attack-id:
        tag: attack-id
        value: T0804
    description: Adversaries may block or prevent a reporting message from reaching
      its intended target. In control systems, reporting messages contain telemetry
      data (e.g., I/O values) pertaining to the current state of equipment and the
      industrial process. By blocking these reporting messages, an adversary can potentially
      hide their actions from an operator.
    title: Block Reporting Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0804
    exact_mappings:
    - attack:T0804
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0804
  T0805:
    name: T0805
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0805
    annotations:
      attack-id:
        tag: attack-id
        value: T0805
    description: Adversaries may block access to serial COM to prevent instructions
      or configurations from reaching target devices. Serial Communication ports (COM)
      allow communication with control system devices. Devices can receive command
      and configuration messages over such serial COM. Devices also use serial COM
      to send command and reporting messages. Blocking device serial COM may also
      block command messages and block reporting messages.
    title: Block Serial COM
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0805
    exact_mappings:
    - attack:T0805
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0805
  T0806:
    name: T0806
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0806
    annotations:
      attack-id:
        tag: attack-id
        value: T0806
    description: Adversaries may repetitively or successively change I/O point values
      to perform an action. Brute Force I/O may be achieved by changing either a range
      of I/O point values or a single point value repeatedly to manipulate a process
      function. The adversary's goal and the information they have about the target
      environment will influence which of the options they choose. In the case of
      brute forcing a range of point values, the adversary may be able to achieve
      an impact without targeting a specific point. In the case where a single point
      is targeted, the adversary may be able to generate instability on the process
      function associated with that particular point.
    title: Brute Force I/O
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0806
    exact_mappings:
    - attack:T0806
    is_a: ATTACKICSImpairProcessControlTechnique
    class_uri: d3f:T0806
  T0807:
    name: T0807
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0807
    annotations:
      attack-id:
        tag: attack-id
        value: T0807
    description: 'Adversaries may utilize command-line interfaces (CLIs) to interact
      with systems and execute commands. CLIs provide a means of interacting with
      computer systems and are a common feature across many types of platforms and
      devices within control systems environments. (Citation: Enterprise ATT&CK January
      2018) Adversaries may also use CLIs to install and run new software, including
      malicious tools that may be installed over the course of an operation.'
    title: Command-Line Interface
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0807
    exact_mappings:
    - attack:T0807
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0807
  T0808:
    name: T0808
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0808
    annotations:
      attack-id:
        tag: attack-id
        value: T0808
    description: Adversaries may perform control device identification to determine
      the make and model of a target device. Management software and device APIs may
      be utilized by the adversary to gain this information. By identifying and obtaining
      device specifics, the adversary may be able to determine device vulnerabilities.
      This device information can also be used to understand device functionality
      and inform the decision to target the environment.
    title: Control Device Identification
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0808
    exact_mappings:
    - attack:T0808
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0808
  T0809:
    name: T0809
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0809
    annotations:
      attack-id:
        tag: attack-id
        value: T0809
    description: 'Adversaries may perform data destruction over the course of an operation.
      The adversary may drop or create malware, tools, or other non-native files on
      a target system to accomplish this, potentially leaving behind traces of malicious
      activities. Such non-native files and other data may be removed over the course
      of an intrusion to maintain a small footprint or as a standard part of the post-intrusion
      cleanup process. (Citation: Enterprise ATT&CK January 2018)'
    title: Data Destruction
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0809
    exact_mappings:
    - attack:T0809
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0809
  T0810:
    name: T0810
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0810
    annotations:
      attack-id:
        tag: attack-id
        value: T0810
    description: Adversaries may compromise and gain control of a data historian to
      gain a foothold into the control system environment. Access to a data historian
      may be used to learn stored database archival and analysis information on the
      control system. A dual-homed data historian may provide adversaries an interface
      from the IT environment to the OT environment.
    title: Data Historian Compromise
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0810
    exact_mappings:
    - attack:T0810
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0810
  T0811:
    name: T0811
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0811
    annotations:
      attack-id:
        tag: attack-id
        value: T0811
    description: 'Adversaries may target and collect data from information repositories.
      This can include sensitive data such as specifications, schematics, or diagrams
      of control system layouts, devices, and processes. Examples of information repositories
      include reference databases in the process environment, as well as databases
      in the corporate network that might contain information about the ICS.(Citation:
      Cybersecurity & Infrastructure Security Agency March 2018)'
    title: Data from Information Repositories
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0811
    exact_mappings:
    - attack:T0811
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0811
  T0812:
    name: T0812
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0812
    annotations:
      attack-id:
        tag: attack-id
        value: T0812
    description: 'Adversaries may leverage manufacturer or supplier set default credentials
      on control system devices. These default credentials may have administrative
      permissions and may be necessary for initial configuration of the device. It
      is general best practice to change the passwords for these accounts as soon
      as possible, but some manufacturers may have devices that have passwords or
      usernames that cannot be changed. (Citation: Keith Stouffer May 2015)'
    title: Default Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0812
    exact_mappings:
    - attack:T0812
    is_a: ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0812
  T0813:
    name: T0813
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0813
    annotations:
      attack-id:
        tag: attack-id
        value: T0813
    description: 'Adversaries may cause a denial of control to temporarily prevent
      operators and engineers from interacting with process controls. An adversary
      may attempt to deny process control access to cause a temporary loss of communication
      with the control device or to prevent operator adjustment of process controls.
      An affected process may still be operating during the period of control loss,
      but not necessarily in a desired state. (Citation: Corero) (Citation: Michael
      J. Assante and Robert M. Lee) (Citation: Tyson Macaulay)'
    title: Denial of Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0813
    exact_mappings:
    - attack:T0813
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0813
  T0814:
    name: T0814
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0814
    annotations:
      attack-id:
        tag: attack-id
        value: T0814
    description: Adversaries may perform Denial-of-Service (DoS) attacks to disrupt
      expected device functionality. Examples of DoS attacks include overwhelming
      the target device with a high volume of requests in a short time period and
      sending the target device a request it does not know how to handle. Disrupting
      device state may temporarily render it unresponsive, possibly lasting until
      a reboot can occur. When placed in this state, devices may be unable to send
      and receive requests, and may not perform expected response functions in reaction
      to other events in the environment.
    title: Denial of Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0814
    exact_mappings:
    - attack:T0814
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0814
  T0815:
    name: T0815
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0815
    annotations:
      attack-id:
        tag: attack-id
        value: T0815
    description: 'Adversaries may cause a denial of view in attempt to disrupt and
      prevent operator oversight on the status of an ICS environment. This may manifest
      itself as a temporary communication failure between a device and its control
      source, where the interface recovers and becomes available once the interference
      ceases. (Citation: Corero) (Citation: Michael J. Assante and Robert M. Lee)
      (Citation: Tyson Macaulay)'
    title: Denial of View
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0815
    exact_mappings:
    - attack:T0815
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0815
  T0816:
    name: T0816
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0816
    annotations:
      attack-id:
        tag: attack-id
        value: T0816
    description: Adversaries may forcibly restart or shutdown a device in an ICS environment
      to disrupt and potentially negatively impact physical processes. Methods of
      device restart and shutdown exist in some devices as built-in, standard functionalities.
      These functionalities can be executed using interactive device web interfaces,
      CLIs, and network protocol commands.
    title: Device Restart/Shutdown
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0816
    exact_mappings:
    - attack:T0816
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0816
  T0817:
    name: T0817
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0817
    annotations:
      attack-id:
        tag: attack-id
        value: T0817
    description: Adversaries may gain access to a system during a drive-by compromise,
      when a user visits a website as part of a regular browsing session. With this
      technique, the user's web browser is targeted and exploited simply by visiting
      the compromised website.
    title: Drive-by Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0817
    exact_mappings:
    - attack:T0817
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0817
  T0818:
    name: T0818
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0818
    annotations:
      attack-id:
        tag: attack-id
        value: T0818
    description: Adversaries will compromise and gain control of an engineering workstation
      for Initial Access into the control system environment. Access to an engineering
      workstation may occur through or physical means, such as a Valid Accounts with
      privileged access or infection by removable media. A dual-homed engineering
      workstation may allow the adversary access into multiple networks. For example,
      unsegregated process control, safety system, or information system networks.
      An Engineering Workstation is designed as a reliable computing platform that
      configures, maintains, and diagnoses control system equipment and applications.
      Compromise of an engineering workstation may provide access to, and control
      of, other control system applications and equipment. In the Maroochy attack,
      the adversary utilized a computer, possibly stolen, with proprietary engineering
      software to communicate with a wastewater system.
    title: Engineering Workstation Compromise
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0818
    exact_mappings:
    - attack:T0818
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0818
  T0819:
    name: T0819
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0819
    annotations:
      attack-id:
        tag: attack-id
        value: T0819
    description: Adversaries may leverage weaknesses to exploit internet-facing software
      for initial access into an industrial network. Internet-facing software may
      be user applications, underlying networking implementations, an assets operating
      system, weak defenses, etc. Targets of this technique may be intentionally exposed
      for the purpose of remote management and visibility.
    title: Exploit Public-Facing Application
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0819
    exact_mappings:
    - attack:T0819
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0819
  T0820:
    name: T0820
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0820
    annotations:
      attack-id:
        tag: attack-id
        value: T0820
    description: Adversaries may exploit a software vulnerability to take advantage
      of a programming error in a program, service, or within the operating system
      software or kernel itself to evade detection. Vulnerabilities may exist in software
      that can be used to disable or circumvent security features.
    title: Exploitation for Evasion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0820
    exact_mappings:
    - attack:T0820
    is_a: ATTACKICSEvasionTechnique
    class_uri: d3f:T0820
  T0821:
    name: T0821
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0821
    annotations:
      attack-id:
        tag: attack-id
        value: T0821
    description: Adversaries may modify the tasking of a controller to allow for the
      execution of their own programs. This can allow an adversary to manipulate the
      execution flow and behavior of a controller.
    title: Modify Controller Tasking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0821
    exact_mappings:
    - attack:T0821
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0821
  T0822:
    name: T0822
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0822
    annotations:
      attack-id:
        tag: attack-id
        value: T0822
    description: 'Adversaries may leverage external remote services as a point of
      initial access into your network. These services allow users to connect to internal
      network resources from external locations. Examples are VPNs, Citrix, and other
      access mechanisms. Remote service gateways often manage connections and credential
      authentication for these services. (Citation: Daniel Oakley, Travis Smith, Tripwire)'
    title: External Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0822
    exact_mappings:
    - attack:T0822
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0822
  T0823:
    name: T0823
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0823
    annotations:
      attack-id:
        tag: attack-id
        value: T0823
    description: Adversaries may attempt to gain access to a machine via a Graphical
      User Interface (GUI) to enhance execution capabilities. Access to a GUI allows
      a user to interact with a computer in a more visual manner than a CLI. A GUI
      allows users to move a cursor and click on interface objects, with a mouse and
      keyboard as the main input devices, as opposed to just using the keyboard.
    title: Graphical User Interface
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0823
    exact_mappings:
    - attack:T0823
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0823
  T0824:
    name: T0824
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0824
    annotations:
      attack-id:
        tag: attack-id
        value: T0824
    description: Adversaries may use input/output (I/O) module discovery to gather
      key information about a control system device. An I/O module is a device that
      allows the control system device to either receive or send signals to other
      devices. These signals can be analog or digital, and may support a number of
      different protocols. Devices are often able to use attachable I/O modules to
      increase the number of inputs and outputs that it can utilize. An adversary
      with access to a device can use native device functions to enumerate I/O modules
      that are connected to the device. Information regarding the I/O modules can
      aid the adversary in understanding related control processes.
    title: I/O Module Discovery
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0824
    exact_mappings:
    - attack:T0824
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0824
  T0825:
    name: T0825
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0825
    annotations:
      attack-id:
        tag: attack-id
        value: T0825
    description: 'Adversaries may perform location identification using device data
      to inform operations and targeted impact for attacks. Location identification
      data can come in a number of forms, including geographic location, location
      relative to other control system devices, time zone, and current time. An adversary
      may use an embedded global positioning system (GPS) module in a device to figure
      out the physical coordinates of a device. NIST SP800-82 recommends that devices
      utilize GPS or another location determining mechanism to attach appropriate
      timestamps to log entries (Citation: Guidance - NIST SP800-82). While this assists
      in logging and event tracking, an adversary could use the underlying positioning
      mechanism to determine the general location of a device. An adversary can also
      infer the physical location of serially connected devices by using serial connection
      enumeration.'
    title: Location Identification
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0825
    exact_mappings:
    - attack:T0825
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0825
  T0826:
    name: T0826
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0826
    annotations:
      attack-id:
        tag: attack-id
        value: T0826
    description: 'Adversaries may attempt to disrupt essential components or systems
      to prevent owner and operator from delivering products or services. (Citation:
      Corero) (Citation: Michael J. Assante and Robert M. Lee) (Citation: Tyson Macaulay)'
    title: Loss of Availability
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0826
    exact_mappings:
    - attack:T0826
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0826
  T0827:
    name: T0827
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0827
    annotations:
      attack-id:
        tag: attack-id
        value: T0827
    description: 'Adversaries may seek to achieve a sustained loss of control or a
      runaway condition in which operators cannot issue any commands even if the malicious
      interference has subsided. (Citation: Corero) (Citation: Michael J. Assante
      and Robert M. Lee) (Citation: Tyson Macaulay)'
    title: Loss of Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0827
    exact_mappings:
    - attack:T0827
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0827
  T0828:
    name: T0828
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0828
    annotations:
      attack-id:
        tag: attack-id
        value: T0828
    description: Adversaries may cause loss of productivity and revenue through disruption
      and even damage to the availability and integrity of control system operations,
      devices, and related processes. This technique may manifest as a direct effect
      of an ICS-targeting attack or tangentially, due to an IT-targeting attack against
      non-segregated environments.
    title: Loss of Productivity and Revenue
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0828
    exact_mappings:
    - attack:T0828
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0828
  T0829:
    name: T0829
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0829
    annotations:
      attack-id:
        tag: attack-id
        value: T0829
    description: 'Adversaries may cause a sustained or permanent loss of view where
      the ICS equipment will require local, hands-on operator intervention; for instance,
      a restart or manual operation. By causing a sustained reporting or visibility
      loss, the adversary can effectively hide the present state of operations. This
      loss of view can occur without affecting the physical processes themselves.
      (Citation: Corero) (Citation: Michael J. Assante and Robert M. Lee) (Citation:
      Tyson Macaulay)'
    title: Loss of View
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0829
    exact_mappings:
    - attack:T0829
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0829
  T0830:
    name: T0830
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0830
    annotations:
      attack-id:
        tag: attack-id
        value: T0830
    description: 'Adversaries with privileged network access may seek to modify network
      traffic in real time using adversary-in-the-middle (AiTM) attacks. (Citation:
      Gabriel Sanchez October 2017) This type of attack allows the adversary to intercept
      traffic to and/or from a particular device on the network. If a AiTM attack
      is established, then the adversary has the ability to block, log, modify, or
      inject traffic into the communication stream. There are several ways to accomplish
      this attack, but some of the most-common are Address Resolution Protocol (ARP)
      poisoning and the use of a proxy. (Citation: Bonnie Zhu, Anthony Joseph, Shankar
      Sastry 2011)'
    title: Adversary-in-the-Middle
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0830
    exact_mappings:
    - attack:T0830
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0830
  T0831:
    name: T0831
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0831
    annotations:
      attack-id:
        tag: attack-id
        value: T0831
    description: Adversaries may manipulate physical process control within the industrial
      environment. Methods of manipulating control can include changes to set point
      values, tags, or other parameters. Adversaries may manipulate control systems
      devices or possibly leverage their own, to communicate with and command physical
      control processes. The duration of manipulation may be temporary or longer sustained,
      depending on operator detection.
    title: Manipulation of Control
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0831
    exact_mappings:
    - attack:T0831
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0831
  T0832:
    name: T0832
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0832
    annotations:
      attack-id:
        tag: attack-id
        value: T0832
    description: 'Adversaries may attempt to manipulate the information reported back
      to operators or controllers. This manipulation may be short term or sustained.
      During this time the process itself could be in a much different state than
      what is reported. (Citation: Corero) (Citation: Michael J. Assante and Robert
      M. Lee) (Citation: Tyson Macaulay)'
    title: Manipulation of View
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0832
    exact_mappings:
    - attack:T0832
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0832
  T0833:
    name: T0833
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0833
    annotations:
      attack-id:
        tag: attack-id
        value: T0833
    description: Adversaries may place malicious code in a system, which can cause
      the system to malfunction by modifying its control logic. Control system devices
      use programming languages (e.g. relay ladder logic) to control physical processes
      by affecting actuators, which cause machines to operate, based on environment
      sensor readings. These devices often include the ability to perform remote control
      logic updates.
    title: Modify Control Logic
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0833
    exact_mappings:
    - attack:T0833
    is_a: ATTACKICSImpairProcessControlTechnique
    mixins:
    - ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0833
  T0834:
    name: T0834
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0834
    annotations:
      attack-id:
        tag: attack-id
        value: T0834
    description: 'Adversaries may directly interact with the native OS application
      programming interface (API) to access system functions. Native APIs provide
      a controlled means of calling low-level OS services within the kernel, such
      as those involving hardware/devices, memory, and processes. (Citation: The MITRE
      Corporation May 2017) These native APIs are leveraged by the OS during system
      boot (when other system components are not yet initialized) as well as carrying
      out tasks and requests during routine operations.'
    title: Native API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0834
    exact_mappings:
    - attack:T0834
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0834
  T0835:
    name: T0835
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0835
    annotations:
      attack-id:
        tag: attack-id
        value: T0835
    description: 'Adversaries may manipulate the I/O image of PLCs through various
      means to prevent them from functioning as expected. Methods of I/O image manipulation
      may include overriding the I/O table via direct memory manipulation or using
      the override function used for testing PLC programs. (Citation: Dr. Kelvin T.
      Erickson December 2010) During the scan cycle, a PLC reads the status of all
      inputs and stores them in an image table. (Citation: Nanjundaiah, Vaidyanath)
      The image table is the PLCs internal storage location where values of inputs/outputs
      for one scan are stored while it executes the user program. After the PLC has
      solved the entire logic program, it updates the output image table. The contents
      of this output image table are written to the corresponding output points in
      I/O Modules.'
    title: Manipulate I/O Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0835
    exact_mappings:
    - attack:T0835
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0835
  T0836:
    name: T0836
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0836
    annotations:
      attack-id:
        tag: attack-id
        value: T0836
    description: Adversaries may modify parameters used to instruct industrial control
      system devices. These devices operate via programs that dictate how and when
      to perform actions based on such parameters. Such parameters can determine the
      extent to which an action is performed and may specify additional options. For
      example, a program on a control system device dictating motor processes may
      take a parameter defining the total number of seconds to run that motor.
    title: Modify Parameter
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0836
    exact_mappings:
    - attack:T0836
    is_a: ATTACKICSImpairProcessControlTechnique
    class_uri: d3f:T0836
  T0837:
    name: T0837
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0837
    annotations:
      attack-id:
        tag: attack-id
        value: T0837
    description: Adversaries may compromise protective system functions designed to
      prevent the effects of faults and abnormal conditions. This can result in equipment
      damage, prolonged process disruptions and hazards to personnel.
    title: Loss of Protection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0837
    exact_mappings:
    - attack:T0837
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0837
  T0838:
    name: T0838
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0838
    annotations:
      attack-id:
        tag: attack-id
        value: T0838
    description: Adversaries may modify alarm settings to prevent alerts that may
      inform operators of their presence or to prevent responses to dangerous and
      unintended scenarios. Reporting messages are a standard part of data acquisition
      in control systems. Reporting messages are used as a way to transmit system
      state information and acknowledgements that specific actions have occurred.
      These messages provide vital information for the management of a physical process,
      and keep operators, engineers, and administrators aware of the state of system
      devices and physical processes.
    title: Modify Alarm Settings
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0838
    exact_mappings:
    - attack:T0838
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0838
  T0839:
    name: T0839
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0839
    annotations:
      attack-id:
        tag: attack-id
        value: T0839
    description: Adversaries may install malicious or vulnerable firmware onto modular
      hardware devices. Control system devices often contain modular hardware devices.
      These devices may have their own set of firmware that is separate from the firmware
      of the main control system equipment.
    title: Module Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0839
    exact_mappings:
    - attack:T0839
    is_a: ATTACKICSImpairProcessControlTechnique
    mixins:
    - ATTACKICSPersistenceTechnique
    class_uri: d3f:T0839
  T0840:
    name: T0840
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0840
    annotations:
      attack-id:
        tag: attack-id
        value: T0840
    description: 'Adversaries may perform network connection enumeration to discover
      information about device communication patterns. If an adversary can inspect
      the state of a network connection with tools, such as Netstat(Citation: Netstat),
      in conjunction with [System Firmware](https://attack.mitre.org/techniques/T0857),
      then they can determine the role of certain devices on the network  (Citation:
      MITRE). The adversary can also use [Network Sniffing](https://attack.mitre.org/techniques/T0842)
      to watch network traffic for details about the source, destination, protocol,
      and content.'
    title: Network Connection Enumeration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0840
    exact_mappings:
    - attack:T0840
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0840
  T0841:
    name: T0841
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0841
    annotations:
      attack-id:
        tag: attack-id
        value: T0841
    description: Network Service Scanning is the process of discovering services on
      networked systems.  This can be achieved through a technique called port scanning
      or probing.  Port scanning interacts with the TCP/IP ports on a target system
      to determine whether ports are open, closed, or filtered by a firewall.  This
      does not reveal the service that is running behind the port, but since many
      common services are run on [https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml
      specific port numbers], the type of service can be assumed.  More in-depth testing
      includes interaction with the actual service to determine the service type and
      specific version.  One of the most-popular tools to use for Network Service
      Scanning is [https://nmap.org/ Nmap].
    title: Network Service Scanning
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0841
    exact_mappings:
    - attack:T0841
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0841
  T0842:
    name: T0842
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0842
    annotations:
      attack-id:
        tag: attack-id
        value: T0842
    description: 'Network sniffing is the practice of using a network interface on
      a computer system to monitor or capture information (Citation: Enterprise ATT&CK
      January 2018) regardless of whether it is the specified destination for the
      information.'
    title: Network Sniffing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0842
    exact_mappings:
    - attack:T0842
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0842
  T0843:
    name: T0843
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0843
    annotations:
      attack-id:
        tag: attack-id
        value: T0843
    description: Adversaries may perform a program download to transfer a user program
      to a controller.
    title: Program Download
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0843
    exact_mappings:
    - attack:T0843
    is_a: ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0843
  T0844:
    name: T0844
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0844
    annotations:
      attack-id:
        tag: attack-id
        value: T0844
    description: 'Program Organizational Units (POUs) are block structures used within
      PLC programming to create programs and projects. (Citation: Guidance - IEC61131)
      POUs can be used to hold user programs written in IEC 61131-3 languages: Structured
      text, Instruction list, Function block, and Ladder logic. (Citation: Guidance
      - IEC61131) Application - 201203 They can also provide additional functionality,
      such as establishing connections between the PLC and other devices using TCON.
      (Citation: PLCBlaster - Spenneberg)'
    title: Program Organization Units
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0844
    exact_mappings:
    - attack:T0844
    is_a: ATTACKICSExecutionTechnique
    mixins:
    - ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0844
  T0845:
    name: T0845
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0845
    annotations:
      attack-id:
        tag: attack-id
        value: T0845
    description: Adversaries may attempt to upload a program from a PLC to gather
      information about an industrial process. Uploading a program may allow them
      to acquire and study the underlying logic. Methods of program upload include
      vendor software, which enables the user to upload and read a program running
      on a PLC. This software can be used to upload the target program to a workstation,
      jump box, or an interfacing device.
    title: Program Upload
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0845
    exact_mappings:
    - attack:T0845
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0845
  T0846:
    name: T0846
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0846
    annotations:
      attack-id:
        tag: attack-id
        value: T0846
    description: 'Adversaries may attempt to get a listing of other systems by IP
      address, hostname, or other logical identifier on a network that may be used
      for subsequent Lateral Movement or Discovery techniques. Functionality could
      exist within adversary tools to enable this, but utilities available on the
      operating system or vendor software could also be used. (Citation: Enterprise
      ATT&CK January 2018)'
    title: Remote System Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0846
    exact_mappings:
    - attack:T0846
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0846
  T0847:
    name: T0847
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0847
    annotations:
      attack-id:
        tag: attack-id
        value: T0847
    description: Adversaries may move onto systems, such as those separated from the
      enterprise network, by copying malware to removable media which is inserted
      into the control systems environment. The adversary may rely on unknowing trusted
      third parties, such as suppliers or contractors with access privileges, to introduce
      the removable media. This technique enables initial access to target devices
      that never connect to untrusted networks, but are physically accessible.
    title: Replication Through Removable Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0847
    exact_mappings:
    - attack:T0847
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0847
  T0848:
    name: T0848
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0848
    annotations:
      attack-id:
        tag: attack-id
        value: T0848
    description: Adversaries may setup a rogue master to leverage control server functions
      to communicate with outstations. A rogue master can be used to send legitimate
      control messages to other control system devices, affecting processes in unintended
      ways. It may also be used to disrupt network communications by capturing and
      receiving the network traffic meant for the actual master. Impersonating a master
      may also allow an adversary to avoid detection.
    title: Rogue Master
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0848
    exact_mappings:
    - attack:T0848
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0848
  T0849:
    name: T0849
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0849
    annotations:
      attack-id:
        tag: attack-id
        value: T0849
    description: Adversaries may use masquerading to disguise a malicious application
      or executable as another file, to avoid operator and engineer suspicion. Possible
      disguises of these masquerading files can include commonly found programs, expected
      vendor executables and configuration files, and other commonplace application
      and naming conventions. By impersonating expected and vendor-relevant files
      and applications, operators and engineers may not notice the presence of the
      underlying malicious content and possibly end up running those masquerading
      as legitimate functions.
    title: Masquerading
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0849
    exact_mappings:
    - attack:T0849
    is_a: ATTACKICSEvasionTechnique
    class_uri: d3f:T0849
  T0850:
    name: T0850
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0850
    annotations:
      attack-id:
        tag: attack-id
        value: T0850
    description: Adversaries may perform role identification of devices involved with
      physical processes of interest in a target control system. Control systems devices
      often work in concert to control a physical process. Each device can have one
      or more roles that it performs within that control process. By collecting this
      role-based data, an adversary can construct a more targeted attack.
    title: Role Identification
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0850
    exact_mappings:
    - attack:T0850
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0850
  T0851:
    name: T0851
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0851
    annotations:
      attack-id:
        tag: attack-id
        value: T0851
    description: 'Adversaries may deploy rootkits to hide the presence of programs,
      files, network connections, services, drivers, and other system components.
      Rootkits are programs that hide the existence of malware by intercepting and
      modifying operating-system API calls that supply system information. Rootkits
      or rootkit-enabling functionality may reside at the user or kernel level in
      the operating system, or lower. (Citation: Enterprise ATT&CK January 2018)'
    title: Rootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0851
    exact_mappings:
    - attack:T0851
    is_a: ATTACKICSEvasionTechnique
    mixins:
    - ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0851
  T0852:
    name: T0852
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0852
    annotations:
      attack-id:
        tag: attack-id
        value: T0852
    description: 'Adversaries may attempt to perform screen capture of devices in
      the control system environment. Screenshots may be taken of workstations, HMIs,
      or other devices that display environment-relevant process, device, reporting,
      alarm, or related data. These device displays may reveal information regarding
      the ICS process, layout, control, and related schematics. In particular, an
      HMI can provide a lot of important industrial process information. (Citation:
      ICS-CERT October 2017) Analysis of screen captures may provide the adversary
      with an understanding of intended operations and interactions between critical
      devices.'
    title: Screen Capture
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0852
    exact_mappings:
    - attack:T0852
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0852
  T0853:
    name: T0853
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0853
    annotations:
      attack-id:
        tag: attack-id
        value: T0853
    description: Adversaries may use scripting languages to execute arbitrary code
      in the form of a pre-written script or in the form of user-supplied code to
      an interpreter. Scripting languages are programming languages that differ from
      compiled languages, in that scripting languages use an interpreter, instead
      of a compiler. These interpreters read and compile part of the source code just
      before it is executed, as opposed to compilers, which compile each and every
      line of code to an executable file. Scripting allows software developers to
      run their code on any system where the interpreter exists. This way, they can
      distribute one package, instead of precompiling executables for many different
      systems. Scripting languages, such as Python, have their interpreters shipped
      as a default with many Linux distributions.
    title: Scripting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0853
    exact_mappings:
    - attack:T0853
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0853
  T0854:
    name: T0854
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0854
    annotations:
      attack-id:
        tag: attack-id
        value: T0854
    description: Adversaries may perform serial connection enumeration to gather situational
      awareness after gaining access to devices in the OT network. Control systems
      devices often communicate to each other via various types of serial communication
      mediums. These serial communications are used to facilitate informational communication,
      as well as commands.  Serial Connection Enumeration differs from I/O Module
      Discovery, as I/O modules are auxiliary systems to the main system, and devices
      that are connected via serial connection are normally discrete systems.
    title: Serial Connection Enumeration
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0854
    exact_mappings:
    - attack:T0854
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0854
  T0855:
    name: T0855
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0855
    annotations:
      attack-id:
        tag: attack-id
        value: T0855
    description: 'Adversaries may send unauthorized command messages to instruct control
      system assets to perform actions outside of their intended functionality, or
      without the logical preconditions to trigger their expected function. Command
      messages are used in ICS networks to give direct instructions to control systems
      devices. If an adversary can send an unauthorized command message to a control
      system, then it can instruct the control systems device to perform an action
      outside the normal bounds of the device''s actions. An adversary could potentially
      instruct a control systems device to perform an action that will cause an [Impact](https://attack.mitre.org/tactics/TA0105).
      (Citation: Bonnie Zhu, Anthony Joseph, Shankar Sastry 2011)'
    title: Unauthorized Command Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0855
    exact_mappings:
    - attack:T0855
    is_a: ATTACKICSImpairProcessControlTechnique
    class_uri: d3f:T0855
  T0856:
    name: T0856
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0856
    annotations:
      attack-id:
        tag: attack-id
        value: T0856
    description: Adversaries may spoof reporting messages in control system environments
      for evasion and to impair process control. In control systems, reporting messages
      contain telemetry data (e.g., I/O values) pertaining to the current state of
      equipment and the industrial process. Reporting messages are important for monitoring
      the normal operation of a system or identifying important events such as deviations
      from expected values.
    title: Spoof Reporting Message
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0856
    exact_mappings:
    - attack:T0856
    is_a: ATTACKICSEvasionTechnique
    mixins:
    - ATTACKICSImpairProcessControlTechnique
    class_uri: d3f:T0856
  T0857:
    name: T0857
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0857
    annotations:
      attack-id:
        tag: attack-id
        value: T0857
    description: System firmware on modern assets is often designed with an update
      feature. Older device firmware may be factory installed and require special
      reprograming equipment. When available, the firmware update feature enables
      vendors to remotely patch bugs and perform upgrades. Device firmware updates
      are often delegated to the user and may be done using a software update package.
      It may also be possible to perform this task over the network.
    title: System Firmware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0857
    exact_mappings:
    - attack:T0857
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    mixins:
    - ATTACKICSPersistenceTechnique
    class_uri: d3f:T0857
  T0858:
    name: T0858
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0858
    annotations:
      attack-id:
        tag: attack-id
        value: T0858
    description: 'Adversaries may change the operating mode of a controller to gain
      additional access to engineering functions such as Program Download.   Programmable
      controllers typically have several modes of operation that control the state
      of the user program and control access to the controllers API. Operating modes
      can be physically selected using a key switch on the face of the controller
      but may also be selected with calls to the controllers API. Operating modes
      and the mechanisms by which they are selected often vary by vendor and product
      line. Some commonly implemented operating modes are described below:'
    title: Change Operating Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0858
    exact_mappings:
    - attack:T0858
    is_a: ATTACKICSEvasionTechnique
    mixins:
    - ATTACKICSExecutionTechnique
    class_uri: d3f:T0858
  T0859:
    name: T0859
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0859
    annotations:
      attack-id:
        tag: attack-id
        value: T0859
    description: Adversaries may steal the credentials of a specific user or service
      account using credential access techniques. In some cases, default credentials
      for control system devices may be publicly available. Compromised credentials
      may be used to bypass access controls placed on various resources on hosts and
      within the network, and may even be used for persistent access to remote systems.
      Compromised and default credentials may also grant an adversary increased privilege
      to specific systems and devices or access to restricted areas of the network.
      Adversaries may choose not to use malware or tools, in conjunction with the
      legitimate access those credentials provide, to make it harder to detect their
      presence or to control devices and send legitimate commands in an unintended
      way.
    title: Valid Accounts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0859
    exact_mappings:
    - attack:T0859
    is_a: ATTACKICSLateralMovementTechnique
    mixins:
    - ATTACKICSPersistenceTechnique
    class_uri: d3f:T0859
  T0860:
    name: T0860
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0860
    annotations:
      attack-id:
        tag: attack-id
        value: T0860
    description: 'Adversaries may perform wireless compromise as a method of gaining
      communications and unauthorized access to a wireless network. Access to a wireless
      network may be gained through the compromise of a wireless device. (Citation:
      Alexander Bolshev, Gleb Cherbov July 2014) (Citation: Alexander Bolshev March
      2014) Adversaries may also utilize radios and other wireless communication devices
      on the same frequency as the wireless network. Wireless compromise can be done
      as an initial access vector from a remote distance.'
    title: Wireless Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0860
    exact_mappings:
    - attack:T0860
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0860
  T0861:
    name: T0861
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0861
    annotations:
      attack-id:
        tag: attack-id
        value: T0861
    description: 'Adversaries may collect point and tag values to gain a more comprehensive
      understanding of the process environment. Points may be values such as inputs,
      memory locations, outputs or other process specific variables. (Citation: Dennis
      L. Sloatman September 2016) Tags are the identifiers given to points for operator
      convenience.'
    title: Point & Tag Identification
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0861
    exact_mappings:
    - attack:T0861
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0861
  T0862:
    name: T0862
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0862
    annotations:
      attack-id:
        tag: attack-id
        value: T0862
    description: Adversaries may perform supply chain compromise to gain control systems
      environment access by means of infected products, software, and workflows. Supply
      chain compromise is the manipulation of products, such as devices or software,
      or their delivery mechanisms before receipt by the end consumer. Adversary compromise
      of these products and mechanisms is done for the goal of data or system compromise,
      once infected products are introduced to the target environment.
    title: Supply Chain Compromise
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0862
    exact_mappings:
    - attack:T0862
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0862
  T0863:
    name: T0863
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0863
    annotations:
      attack-id:
        tag: attack-id
        value: T0863
    description: Adversaries may rely on a targeted organizations user interaction
      for the execution of malicious code. User interaction may consist of installing
      applications, opening email attachments, or granting higher permissions to documents.
    title: User Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0863
    exact_mappings:
    - attack:T0863
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0863
  T0864:
    name: T0864
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0864
    annotations:
      attack-id:
        tag: attack-id
        value: T0864
    description: 'Adversaries may target devices that are transient across ICS networks
      and external networks. Normally, transient assets are brought into an environment
      by authorized personnel and do not remain in that environment on a permanent
      basis. (Citation: North American Electric Reliability Corporation June 2021)
      Transient assets are commonly needed to support management functions and may
      be more common in systems where a remotely managed asset is not feasible, external
      connections for remote access do not exist, or 3rd party contractor/vendor access
      is required.'
    title: Transient Cyber Asset
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0864
    exact_mappings:
    - attack:T0864
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0864
  T0865:
    name: T0865
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0865
    annotations:
      attack-id:
        tag: attack-id
        value: T0865
    description: 'Adversaries may use a spearphishing attachment, a variant of spearphishing,
      as a form of a social engineering attack against specific targets. Spearphishing
      attachments are different from other forms of spearphishing in that they employ
      malware attached to an email. All forms of spearphishing are electronically
      delivered and target a specific individual, company, or industry. In this scenario,
      adversaries attach a file to the spearphishing email and usually rely upon [User
      Execution](https://attack.mitre.org/techniques/T0863) to gain execution and
      access. (Citation: Enterprise ATT&CK October 2019)'
    title: Spearphishing Attachment
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0865
    exact_mappings:
    - attack:T0865
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0865
  T0866:
    name: T0866
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0866
    annotations:
      attack-id:
        tag: attack-id
        value: T0866
    description: 'Adversaries may exploit a software vulnerability to take advantage
      of a programming error in a program, service, or within the operating system
      software or kernel itself to enable remote service abuse. A common goal for
      post-compromise exploitation of remote services is for initial access into and
      lateral movement throughout the ICS environment to enable access to targeted
      systems. (Citation: Enterprise ATT&CK)'
    title: Exploitation of Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0866
    exact_mappings:
    - attack:T0866
    is_a: ATTACKICSInitialAccessTechnique
    mixins:
    - ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0866
  T0867:
    name: T0867
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0867
    annotations:
      attack-id:
        tag: attack-id
        value: T0867
    description: 'Adversaries may transfer tools or other files from one system to
      another to stage adversary tools or other files over the course of an operation.
      (Citation: Enterprise ATT&CK) Copying of files may also be performed laterally
      between internal victim systems to support Lateral Movement with remote Execution
      using inherent file sharing protocols such as file sharing over SMB to connected
      network shares. (Citation: Enterprise ATT&CK)'
    title: Lateral Tool Transfer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0867
    exact_mappings:
    - attack:T0867
    is_a: ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0867
  T0868:
    name: T0868
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0868
    annotations:
      attack-id:
        tag: attack-id
        value: T0868
    description: 'Adversaries may gather information about a PLCs or controllers current
      operating mode. Operating modes dictate what change or maintenance functions
      can be manipulated and are often controlled by a key switch on the PLC (e.g.,  run,
      prog [program], and remote). Knowledge of these states may be valuable to an
      adversary to determine if they are able to reprogram the PLC. Operating modes
      and the mechanisms by which they are selected often vary by vendor and product
      line. Some commonly implemented operating modes are described below:'
    title: Detect Operating Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0868
    exact_mappings:
    - attack:T0868
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0868
  T0869:
    name: T0869
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0869
    annotations:
      attack-id:
        tag: attack-id
        value: T0869
    description: Adversaries may establish command and control capabilities over commonly
      used application layer protocols such as HTTP(S), OPC, RDP, telnet, DNP3, and
      modbus. These protocols may be used to disguise adversary actions as benign
      network traffic. Standard protocols may be seen on their associated port or
      in some cases over a non-standard port.  Adversaries may use these protocols
      to reach out of the network for command and control, or in some cases to other
      infected devices within the network.
    title: Standard Application Layer Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0869
    exact_mappings:
    - attack:T0869
    is_a: ATTACKICSCommandAndControlTechnique
    class_uri: d3f:T0869
  T0870:
    name: T0870
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0870
    annotations:
      attack-id:
        tag: attack-id
        value: T0870
    description: Adversaries may seek to gather information about the current state
      of a program on a PLC. State information reveals information about the program,
      including whether it's running, halted, stopped, or has generated an exception.
      This information may be leveraged as a verification of malicious program execution
      or to determine if a PLC is ready to download a new program.
    title: Detect Program State
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0870
    exact_mappings:
    - attack:T0870
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0870
  T0871:
    name: T0871
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0871
    annotations:
      attack-id:
        tag: attack-id
        value: T0871
    description: Adversaries may attempt to leverage Application Program Interfaces
      (APIs) used for communication between control software and the hardware. Specific
      functionality is often coded into APIs which can be called by software to engage
      specific functions on a device or other software.
    title: Execution through API
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0871
    exact_mappings:
    - attack:T0871
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0871
  T0872:
    name: T0872
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0872
    annotations:
      attack-id:
        tag: attack-id
        value: T0872
    description: Adversaries may attempt to remove indicators of their presence on
      a system in an effort to cover their tracks. In cases where an adversary may
      feel detection is imminent, they may try to overwrite, delete, or cover up changes
      they have made to the device.
    title: Indicator Removal on Host
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0872
    exact_mappings:
    - attack:T0872
    is_a: ATTACKICSEvasionTechnique
    class_uri: d3f:T0872
  T0873:
    name: T0873
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0873
    annotations:
      attack-id:
        tag: attack-id
        value: T0873
    description: 'Adversaries may attempt to infect project files with malicious code.
      These project files may consist of objects, program organization units, variables
      such as tags, documentation, and other configurations needed for PLC programs
      to function. (Citation: Beckhoff) Using built in functions of the engineering
      software, adversaries may be able to download an infected program to a PLC in
      the operating environment enabling further [Execution](https://attack.mitre.org/tactics/TA0104)
      and [Persistence](https://attack.mitre.org/tactics/TA0110) techniques. (Citation:
      PLCdev)'
    title: Project File Infection
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0873
    exact_mappings:
    - attack:T0873
    is_a: ATTACKICSPersistenceTechnique
    class_uri: d3f:T0873
  T0874:
    name: T0874
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0874
    annotations:
      attack-id:
        tag: attack-id
        value: T0874
    description: 'Adversaries may hook into application programming interface (API)
      functions used by processes to redirect calls for execution and privilege escalation
      means. Windows processes often leverage these API functions to perform tasks
      that require reusable system resources. Windows API functions are typically
      stored in dynamic-link libraries (DLLs) as exported functions. (Citation: Enterprise
      ATT&CK)'
    title: Hooking
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0874
    exact_mappings:
    - attack:T0874
    is_a: ATTACKICSExecutionTechnique
    mixins:
    - ATTACKICSPrivilegeEscalationTechnique
    class_uri: d3f:T0874
  T0875:
    name: T0875
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0875
    annotations:
      attack-id:
        tag: attack-id
        value: T0875
    description: Adversaries may attempt to change the state of the current program
      on a control device. Program state changes may be used to allow for another
      program to take over control or be loaded onto the device.
    title: Change Program State
    comments:
    - This technique has been deprecated.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0875
    exact_mappings:
    - attack:T0875
    is_a: ATTACKICSExecutionTechnique
    mixins:
    - ATTACKICSImpairProcessControlTechnique
    class_uri: d3f:T0875
  T0877:
    name: T0877
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0877
    annotations:
      attack-id:
        tag: attack-id
        value: T0877
    description: 'Adversaries may seek to capture process values related to the inputs
      and outputs of a PLC. During the scan cycle, a PLC reads the status of all inputs
      and stores them in an image table. (Citation: Nanjundaiah, Vaidyanath) The image
      table is the PLCs internal storage location where values of inputs/outputs for
      one scan are stored while it executes the user program. After the PLC has solved
      the entire logic program, it updates the output image table. The contents of
      this output image table are written to the corresponding output points in I/O
      Modules.'
    title: I/O Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0877
    exact_mappings:
    - attack:T0877
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0877
  T0878:
    name: T0878
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0878
    annotations:
      attack-id:
        tag: attack-id
        value: T0878
    description: Adversaries may target protection function alarms to prevent them
      from notifying operators of critical conditions. Alarm messages may be a part
      of an overall reporting system and of particular interest for adversaries. Disruption
      of the alarm system does not imply the disruption of the reporting system as
      a whole.
    title: Alarm Suppression
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0878
    exact_mappings:
    - attack:T0878
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0878
  T0879:
    name: T0879
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0879
    annotations:
      attack-id:
        tag: attack-id
        value: T0879
    description: Adversaries may cause damage and destruction of property to infrastructure,
      equipment, and the surrounding environment when attacking control systems. This
      technique may result in device and operational equipment breakdown, or represent
      tangential damage from other techniques used in an attack. Depending on the
      severity of physical damage and disruption caused to control processes and systems,
      this technique may result in [Loss of Safety](https://attack.mitre.org/techniques/T0880).
      Operations that result in [Loss of Control](https://attack.mitre.org/techniques/T0827)
      may also cause damage to property, which may be directly or indirectly motivated
      by an adversary seeking to cause impact in the form of [Loss of Productivity
      and Revenue](https://attack.mitre.org/techniques/T0828).
    title: Damage to Property
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0879
    exact_mappings:
    - attack:T0879
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0879
  T0880:
    name: T0880
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0880
    annotations:
      attack-id:
        tag: attack-id
        value: T0880
    description: Adversaries may compromise safety system functions designed to maintain
      safe operation of a process when unacceptable or dangerous conditions occur.
      Safety systems are often composed of the same elements as control systems but
      have the sole purpose of ensuring the process fails in a predetermined safe
      manner.
    title: Loss of Safety
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0880
    exact_mappings:
    - attack:T0880
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0880
  T0881:
    name: T0881
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0881
    annotations:
      attack-id:
        tag: attack-id
        value: T0881
    description: 'Adversaries may stop or disable services on a system to render those
      services unavailable to legitimate users. Stopping critical services can inhibit
      or stop response to an incident or aid in the adversary''s overall objectives
      to cause damage to the environment. (Citation: Enterprise ATT&CK)  Services
      may not allow for modification of their data stores while running. Adversaries
      may stop services in order to conduct Data Destruction. (Citation: Enterprise
      ATT&CK)'
    title: Service Stop
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0881
    exact_mappings:
    - attack:T0881
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0881
  T0882:
    name: T0882
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0882
    annotations:
      attack-id:
        tag: attack-id
        value: T0882
    description: 'Adversaries may steal operational information on a production environment
      as a direct mission outcome for personal gain or to inform future operations.
      This information may include design documents, schedules, rotational data, or
      similar artifacts that provide insight on operations.    In the Bowman Dam incident,
      adversaries probed systems for operational data. (Citation: Mark Thompson March
      2016) (Citation: Danny Yadron December 2015)'
    title: Theft of Operational Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0882
    exact_mappings:
    - attack:T0882
    is_a: ATTACKICSImpactTechnique
    class_uri: d3f:T0882
  T0883:
    name: T0883
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0883
    annotations:
      attack-id:
        tag: attack-id
        value: T0883
    description: Adversaries may gain access into industrial environments through
      systems exposed directly to the internet for remote access rather than through
      [External Remote Services](https://attack.mitre.org/techniques/T0822). Internet
      Accessible Devices are exposed to the internet unintentionally or intentionally
      without adequate protections. This may allow for adversaries to move directly
      into the control system network. Access onto these devices is accomplished without
      the use of exploits, these would be represented within the [Exploit Public-Facing
      Application](https://attack.mitre.org/techniques/T0819) technique.
    title: Internet Accessible Device
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0883
    exact_mappings:
    - attack:T0883
    is_a: ATTACKICSInitialAccessTechnique
    class_uri: d3f:T0883
  T0884:
    name: T0884
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0884
    annotations:
      attack-id:
        tag: attack-id
        value: T0884
    description: Adversaries may use a connection proxy to direct network traffic
      between systems or act as an intermediary for network communications.
    title: Connection Proxy
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0884
    exact_mappings:
    - attack:T0884
    is_a: ATTACKICSCommandAndControlTechnique
    class_uri: d3f:T0884
  T0885:
    name: T0885
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0885
    annotations:
      attack-id:
        tag: attack-id
        value: T0885
    description: Adversaries may communicate over a commonly used port to bypass firewalls
      or network detection systems and to blend in with normal network activity, to
      avoid more detailed inspection. They may use the protocol associated with the
      port, or a completely different protocol. They may use commonly open ports,
      such as the examples provided below.
    title: Commonly Used Port
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0885
    exact_mappings:
    - attack:T0885
    is_a: ATTACKICSCommandAndControlTechnique
    class_uri: d3f:T0885
  T0886:
    name: T0886
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0886
    annotations:
      attack-id:
        tag: attack-id
        value: T0886
    description: 'Adversaries may leverage remote services to move between assets
      and network segments. These services are often used to allow operators to interact
      with systems remotely within the network, some examples are RDP, SMB, SSH, and
      other similar mechanisms. (Citation: Blake Johnson, Dan Caban, Marina Krotofil,
      Dan Scali, Nathan Brubaker, Christopher Glyer December 2017) (Citation: Dragos
      December 2017) (Citation: Joe Slowik April 2019)'
    title: Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0886
    exact_mappings:
    - attack:T0886
    is_a: ATTACKICSInitialAccessTechnique
    mixins:
    - ATTACKICSLateralMovementTechnique
    class_uri: d3f:T0886
  T0887:
    name: T0887
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0887
    annotations:
      attack-id:
        tag: attack-id
        value: T0887
    description: 'Adversaries may seek to capture radio frequency (RF) communication
      used for remote control and reporting in distributed environments. RF communication
      frequencies vary between 3 kHz to 300 GHz, although are commonly between 300
      MHz to 6 GHz. (Citation: Candell, R., Hany, M., Lee, K. B., Liu,Y., Quimby,
      J., Remley, K. April 2018)  The wavelength and frequency of the signal affect
      how the signal propagates through open air, obstacles (e.g. walls and trees)
      and the type of radio required to capture them. These characteristics are often
      standardized in the protocol and hardware and may have an effect on how the
      signal is captured. Some examples of wireless protocols that may be found in
      cyber-physical environments are: WirelessHART, Zigbee, WIA-FA, and 700 MHz Public
      Safety Spectrum.'
    title: Wireless Sniffing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0887
    exact_mappings:
    - attack:T0887
    is_a: ATTACKICSCollectionTechnique
    mixins:
    - ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0887
  T0888:
    name: T0888
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0888
    annotations:
      attack-id:
        tag: attack-id
        value: T0888
    description: An adversary may attempt to get detailed information about remote
      systems and their peripherals, such as make/model, role, and configuration.
      Adversaries may use information from Remote System Information Discovery to
      aid in targeting and shaping follow-on behaviors. For example, the system's
      operational role and model information can dictate whether it is a relevant
      target for the adversary's operational objectives. In addition, the system's
      configuration may be used to scope subsequent technique usage.
    title: Remote System Information Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0888
    exact_mappings:
    - attack:T0888
    is_a: ATTACKICSDiscoveryTechnique
    class_uri: d3f:T0888
  T0889:
    name: T0889
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0889
    annotations:
      attack-id:
        tag: attack-id
        value: T0889
    description: Adversaries may modify or add a program on a controller to affect
      how it interacts with the physical process, peripheral devices and other hosts
      on the network. Modification to controller programs can be accomplished using
      a Program Download in addition to other types of program modification such as
      online edit and program append.
    title: Modify Program
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0889
    exact_mappings:
    - attack:T0889
    is_a: ATTACKICSPersistenceTechnique
    class_uri: d3f:T0889
  T0890:
    name: T0890
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0890
    annotations:
      attack-id:
        tag: attack-id
        value: T0890
    description: 'Adversaries may exploit software vulnerabilities in an attempt to
      elevate privileges. Exploitation of a software vulnerability occurs when an
      adversary takes advantage of a programming error in a program, service, or within
      the operating system software or kernel itself to execute adversary-controlled
      code. Security constructs such as permission levels will often hinder access
      to information and use of certain techniques, so adversaries will likely need
      to perform privilege escalation to include use of software exploitation to circumvent
      those restrictions. (Citation: The MITRE Corporation)'
    title: Exploitation for Privilege Escalation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0890
    exact_mappings:
    - attack:T0890
    is_a: ATTACKICSPrivilegeEscalationTechnique
    class_uri: d3f:T0890
  T0891:
    name: T0891
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0891
    annotations:
      attack-id:
        tag: attack-id
        value: T0891
    description: 'Adversaries may leverage credentials that are hardcoded in software
      or firmware to gain an unauthorized interactive user session to an asset. Examples
      credentials that may be hardcoded in an asset include:'
    title: Hardcoded Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0891
    exact_mappings:
    - attack:T0891
    is_a: ATTACKICSLateralMovementTechnique
    mixins:
    - ATTACKICSPersistenceTechnique
    class_uri: d3f:T0891
  T0892:
    name: T0892
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0892
    annotations:
      attack-id:
        tag: attack-id
        value: T0892
    description: Adversaries may modify software and device credentials to prevent
      operator and responder access. Depending on the device, the modification or
      addition of this password could prevent any device configuration actions from
      being accomplished and may require a factory reset or replacement of hardware.
      These credentials are often built-in features provided by the device vendors
      as a means to restrict access to management interfaces.
    title: Change Credential
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0892
    exact_mappings:
    - attack:T0892
    is_a: ATTACKICSInhibitResponseFunctionTechnique
    class_uri: d3f:T0892
  T0893:
    name: T0893
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0893
    annotations:
      attack-id:
        tag: attack-id
        value: T0893
    description: Adversaries may target and collect data from local system sources,
      such as file systems, configuration files, or local databases. This can include
      sensitive data such as specifications, schematics, or diagrams of control system
      layouts, devices, and processes.
    title: Data from Local System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0893
    exact_mappings:
    - attack:T0893
    is_a: ATTACKICSCollectionTechnique
    class_uri: d3f:T0893
  T0894:
    name: T0894
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0894
    annotations:
      attack-id:
        tag: attack-id
        value: T0894
    description: 'Adversaries may bypass process and/or signature-based defenses by
      proxying execution of malicious content with signed, or otherwise trusted, binaries.
      Binaries used in this technique are often Microsoft-signed files, indicating
      that they have been either downloaded from Microsoft or are already native in
      the operating system. (Citation: LOLBAS Project) Binaries signed with trusted
      digital certificates can typically execute on Windows systems protected by digital
      signature validation. Several Microsoft signed binaries that are default on
      Windows installations can be used to proxy execution of other files or commands.
      Similarly, on Linux systems adversaries may abuse trusted binaries such as split
      to proxy execution of malicious commands. (Citation: split man page)(Citation:
      GTFO split)'
    title: System Binary Proxy Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0894
    exact_mappings:
    - attack:T0894
    is_a: ATTACKICSEvasionTechnique
    class_uri: d3f:T0894
  T0895:
    name: T0895
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T0895
    annotations:
      attack-id:
        tag: attack-id
        value: T0895
    description: Adversaries may leverage AutoRun functionality or scripts to execute
      malicious code. Devices configured to enable AutoRun functionality or legacy
      operating systems may be susceptible to abuse of these features to run malicious
      code stored on various forms of removeable media (i.e., USB, Disk Images [.ISO]).
      Commonly, AutoRun or AutoPlay are disabled in many operating systems configurations
      to mitigate against this technique. If a device is configured to enable AutoRun
      or AutoPlay, adversaries may execute code on the device by mounting the removable
      media to the device, either through physical or virtual means. This may be especially
      relevant for virtual machine environments where disk images may be dynamically
      mapped to a guest system on a hypervisor.
    title: Autorun Image
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T0895
    exact_mappings:
    - attack:T0895
    is_a: ATTACKICSExecutionTechnique
    class_uri: d3f:T0895
  T1001:
    name: T1001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1001
    description: 'Adversaries may obfuscate command and control traffic to make it
      more difficult to detect.(Citation: Bitdefender FunnyDream Campaign November
      2020) Command and control (C2) communications are hidden (but not necessarily
      encrypted) in an attempt to make the content more difficult to discover or decipher
      and to make the communication less conspicuous and hide commands from being
      seen. This encompasses many methods, such as adding junk data to protocol traffic,
      using steganography, or impersonating legitimate protocols.'
    title: Data Obfuscation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1001
    exact_mappings:
    - attack:T1001
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1001
  T1001_001:
    name: T1001_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1001001
    annotations:
      attack-id:
        tag: attack-id
        value: T1001.001
    description: 'Adversaries may add junk data to protocols used for command and
      control to make detection more difficult.(Citation: FireEye SUNBURST Backdoor
      December 2020) By adding random or meaningless data to the protocols used for
      command and control, adversaries can prevent trivial methods for decoding, deciphering,
      or otherwise analyzing the traffic. Examples may include appending/prepending
      data with junk characters or writing junk characters between significant characters.'
    title: Junk Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1001.001
    mappings:
    - d3f:T1001.001
    exact_mappings:
    - attack:T1001.001
    is_a: T1001
    class_uri: d3f:T1001.001
  T1001_002:
    name: T1001_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1001002
    annotations:
      attack-id:
        tag: attack-id
        value: T1001.002
    description: Adversaries may use steganographic techniques to hide command and
      control traffic to make detection efforts more difficult. Steganographic techniques
      can be used to hide data in digital messages that are transferred between systems.
      This hidden information can be used for command and control of compromised systems.
      In some cases, the passing of files embedded using steganography, such as image
      or document files, can be used for command and control.
    title: Steganography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1001.002
    mappings:
    - d3f:T1001.002
    exact_mappings:
    - attack:T1001.002
    is_a: T1001
    class_uri: d3f:T1001.002
  T1001_003:
    name: T1001_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1001003
    annotations:
      attack-id:
        tag: attack-id
        value: T1001.003
    description: Adversaries may impersonate legitimate protocols or web service traffic
      to disguise command and control activity and thwart analysis efforts. By impersonating
      legitimate protocols or web services, adversaries can make their command and
      control traffic blend in with legitimate network traffic.
    title: Protocol or Service Impersonation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1001.003
    mappings:
    - d3f:T1001.003
    exact_mappings:
    - attack:T1001.003
    is_a: T1001
    class_uri: d3f:T1001.003
  T1002:
    name: T1002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1002
    annotations:
      attack-id:
        tag: attack-id
        value: T1002
    description: An adversary may compress data (e.g., sensitive documents) that is
      collected prior to exfiltration in order to make it portable and minimize the
      amount of data sent over the network. The compression is done separately from
      the exfiltration channel and is performed using a custom program or algorithm,
      or a more common compression library or utility such as 7zip, RAR, ZIP, or zlib.
    title: Data Compressed
    comments:
    - This technique has been revoked by T1560
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1560
    mappings:
    - d3f:T1002
    exact_mappings:
    - attack:T1002
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1002
  T1003:
    name: T1003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003
    annotations:
      attack-id:
        tag: attack-id
        value: T1003
    description: 'Adversaries may attempt to dump credentials to obtain account login
      and credential material, normally in the form of a hash or a clear text password.
      Credentials can be obtained from OS caches, memory, or structures.(Citation:
      Brining MimiKatz to Unix) Credentials can then be used to perform [Lateral Movement](https://attack.mitre.org/tactics/TA0008)
      and access restricted information.'
    title: OS Credential Dumping
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1003
    exact_mappings:
    - attack:T1003
    is_a: CredentialAccessTechnique
    class_uri: d3f:T1003
  T1003_001:
    name: T1003_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.001
    description: Adversaries may attempt to access credential material stored in the
      process memory of the Local Security Authority Subsystem Service (LSASS). After
      a user logs on, the system generates and stores a variety of credential materials
      in LSASS process memory. These credential materials can be harvested by an administrative
      user or SYSTEM and used to conduct [Lateral Movement](https://attack.mitre.org/tactics/TA0008)
      using [Use Alternate Authentication Material](https://attack.mitre.org/techniques/T1550).
    title: LSASS Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.001
    mappings:
    - d3f:T1003.001
    exact_mappings:
    - attack:T1003.001
    is_a: T1003
    class_uri: d3f:T1003.001
  T1003_002:
    name: T1003_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.002
    description: Adversaries may attempt to extract credential material from the Security
      Account Manager (SAM) database either through in-memory techniques or through
      the Windows Registry where the SAM database is stored. The SAM is a database
      file that contains local accounts for the host, typically those found with the
      <code>net user</code> command. Enumerating the SAM database requires SYSTEM
      level access.
    title: Security Account Manager
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.002
    mappings:
    - d3f:T1003.002
    exact_mappings:
    - attack:T1003.002
    is_a: T1003
    class_uri: d3f:T1003.002
  T1003_003:
    name: T1003_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.003
    description: 'Adversaries may attempt to access or create a copy of the Active
      Directory domain database in order to steal credential information, as well
      as obtain other information about domain members such as devices, users, and
      access rights. By default, the NTDS file (NTDS.dit) is located in <code>%SystemRoot%\NTDS\Ntds.dit</code>
      of a domain controller.(Citation: Wikipedia Active Directory)'
    title: NTDS
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.003
    mappings:
    - d3f:T1003.003
    exact_mappings:
    - attack:T1003.003
    is_a: T1003
    class_uri: d3f:T1003.003
  T1003_004:
    name: T1003_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.004
    description: 'Adversaries with SYSTEM access to a host may attempt to access Local
      Security Authority (LSA) secrets, which can contain a variety of different credential
      materials, such as credentials for service accounts.(Citation: Passcape LSA
      Secrets)(Citation: Microsoft AD Admin Tier Model)(Citation: Tilbury Windows
      Credentials) LSA secrets are stored in the registry at <code>HKEY_LOCAL_MACHINE\SECURITY\Policy\Secrets</code>.
      LSA secrets can also be dumped from memory.(Citation: ired Dumping LSA Secrets)'
    title: LSA Secrets
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.004
    mappings:
    - d3f:T1003.004
    exact_mappings:
    - attack:T1003.004
    is_a: T1003
    class_uri: d3f:T1003.004
  T1003_005:
    name: T1003_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.005
    description: 'Adversaries may attempt to access cached domain credentials used
      to allow authentication to occur in the event a domain controller is unavailable.(Citation:
      Microsoft - Cached Creds)'
    title: Cached Domain Credentials
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.005
    mappings:
    - d3f:T1003.005
    exact_mappings:
    - attack:T1003.005
    is_a: T1003
    class_uri: d3f:T1003.005
  T1003_006:
    name: T1003_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.006
    description: 'Adversaries may attempt to access credentials and other sensitive
      information by abusing a Windows Domain Controller''s application programming
      interface (API)(Citation: Microsoft DRSR Dec 2017) (Citation: Microsoft GetNCCChanges)
      (Citation: Samba DRSUAPI) (Citation: Wine API samlib.dll) to simulate the replication
      process from a remote domain controller using a technique called DCSync.'
    title: DCSync
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.006
    mappings:
    - d3f:T1003.006
    exact_mappings:
    - attack:T1003.006
    is_a: T1003
    class_uri: d3f:T1003.006
  T1003_007:
    name: T1003_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.007
    description: "Adversaries may gather credentials from the proc filesystem or `/proc`.\
      \ The proc filesystem is a pseudo-filesystem used as an interface to kernel\
      \ data structures for Linux based systems managing virtual memory. For each\
      \ process, the `/proc/<PID>/maps` file shows how memory is mapped within the\
      \ process\u2019s virtual address space. And `/proc/<PID>/mem`, exposed for debugging\
      \ purposes, provides access to the process\u2019s virtual address space.(Citation:\
      \ Picus Labs Proc cump 2022)(Citation: baeldung Linux proc map 2022)"
    title: Proc Filesystem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.007
    mappings:
    - d3f:T1003.007
    exact_mappings:
    - attack:T1003.007
    is_a: T1003
    class_uri: d3f:T1003.007
  T1003_008:
    name: T1003_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1003008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1003.008
    description: 'Adversaries may attempt to dump the contents of <code>/etc/passwd</code>
      and <code>/etc/shadow</code> to enable offline password cracking. Most modern
      Linux operating systems use a combination of <code>/etc/passwd</code> and <code>/etc/shadow</code>
      to store user account information including password hashes in <code>/etc/shadow</code>.
      By default, <code>/etc/shadow</code> is only readable by the root user.(Citation:
      Linux Password and Shadow File Formats)'
    title: /etc/passwd and /etc/shadow
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1003.008
    mappings:
    - d3f:T1003.008
    exact_mappings:
    - attack:T1003.008
    is_a: T1003
    class_uri: d3f:T1003.008
  T1004:
    name: T1004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1004
    annotations:
      attack-id:
        tag: attack-id
        value: T1004
    description: 'Winlogon.exe is a Windows component responsible for actions at logon/logoff
      as well as the secure attention sequence (SAS) triggered by Ctrl-Alt-Delete.
      Registry entries in <code>HKLM\Software\[Wow6432Node\]Microsoft\Windows NT\CurrentVersion\Winlogon\</code>
      and <code>HKCU\Software\Microsoft\Windows NT\CurrentVersion\Winlogon\</code>
      are used to manage additional helper programs and functionalities that support
      Winlogon. (Citation: Cylance Reg Persistence Sept 2013)'
    title: Winlogon Helper DLL
    comments:
    - This technique has been revoked by T1547.004
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.004
    mappings:
    - d3f:T1004
    exact_mappings:
    - attack:T1004
    is_a: PersistenceTechnique
    class_uri: d3f:T1004
  T1005:
    name: T1005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1005
    description: Adversaries may search local system sources, such as file systems
      and configuration files or local databases, to find files of interest and sensitive
      data prior to Exfiltration.
    title: Data from Local System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1005
    exact_mappings:
    - attack:T1005
    is_a: CollectionTechnique
    class_uri: d3f:T1005
  T1006:
    name: T1006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1006
    description: 'Adversaries may directly access a volume to bypass file access controls
      and file system monitoring. Windows allows programs to have direct access to
      logical volumes. Programs with direct access may read and write files directly
      from the drive by analyzing file system data structures. This technique may
      bypass Windows file access controls as well as file system monitoring tools.
      (Citation: Hakobyan 2009)'
    title: Direct Volume Access
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1006
    exact_mappings:
    - attack:T1006
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1006
  T1007:
    name: T1007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1007
    description: Adversaries may try to gather information about registered local
      system services. Adversaries may obtain information about services using tools
      as well as OS utility commands such as <code>sc query</code>, <code>tasklist
      /svc</code>, <code>systemctl --type=service</code>, and <code>net start</code>.
    title: System Service Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1007
    exact_mappings:
    - attack:T1007
    is_a: DiscoveryTechnique
    class_uri: d3f:T1007
  T1008:
    name: T1008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1008
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1008
    description: Adversaries may use fallback or alternate communication channels
      if the primary channel is compromised or inaccessible in order to maintain reliable
      command and control and to avoid data transfer thresholds.
    title: Fallback Channels
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1008
    exact_mappings:
    - attack:T1008
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1008
  T1009:
    name: T1009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1009
    annotations:
      attack-id:
        tag: attack-id
        value: T1009
    description: Adversaries can use binary padding to add junk data and change the
      on-disk representation of malware without affecting the functionality or behavior
      of the binary. This will often increase the size of the binary beyond what some
      security tools are capable of handling due to file size limitations.
    title: Binary Padding
    comments:
    - This technique has been revoked by T1027.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1027.001
    mappings:
    - d3f:T1009
    exact_mappings:
    - attack:T1009
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1009
  T1010:
    name: T1010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1010
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1010
    description: 'Adversaries may attempt to get a listing of open application windows.
      Window listings could convey information about how the system is used.(Citation:
      Prevailion DarkWatchman 2021) For example, information about application windows
      could be used identify potential data to collect as well as identifying security
      tooling ([Security Software Discovery](https://attack.mitre.org/techniques/T1518/001))
      to evade.(Citation: ESET Grandoreiro April 2020)'
    title: Application Window Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1010
    exact_mappings:
    - attack:T1010
    is_a: DiscoveryTechnique
    class_uri: d3f:T1010
  T1011:
    name: T1011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1011
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1011
    description: Adversaries may attempt to exfiltrate data over a different network
      medium than the command and control channel. If the command and control network
      is a wired Internet connection, the exfiltration may occur, for example, over
      a WiFi connection, modem, cellular data connection, Bluetooth, or another radio
      frequency (RF) channel.
    title: Exfiltration Over Other Network Medium
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1011
    exact_mappings:
    - attack:T1011
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1011
  T1011_001:
    name: T1011_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1011001
    annotations:
      attack-id:
        tag: attack-id
        value: T1011.001
    description: Adversaries may attempt to exfiltrate data over Bluetooth rather
      than the command and control channel. If the command and control network is
      a wired Internet connection, an adversary may opt to exfiltrate data using a
      Bluetooth communication channel.
    title: Exfiltration Over Bluetooth
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1011.001
    mappings:
    - d3f:T1011.001
    exact_mappings:
    - attack:T1011.001
    is_a: T1011
    class_uri: d3f:T1011.001
  T1012:
    name: T1012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1012
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1012
    description: Adversaries may interact with the Windows Registry to gather information
      about the system, configuration, and installed software.
    title: Query Registry
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1012
    exact_mappings:
    - attack:T1012
    is_a: DiscoveryTechnique
    class_uri: d3f:T1012
  T1013:
    name: T1013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1013
    annotations:
      attack-id:
        tag: attack-id
        value: T1013
    description: 'A port monitor can be set through the  (Citation: AddMonitor) API
      call to set a DLL to be loaded at startup. (Citation: AddMonitor) This DLL can
      be located in <code>C:\Windows\System32</code> and will be loaded by the print
      spooler service, spoolsv.exe, on boot. The spoolsv.exe process also runs under
      SYSTEM level permissions. (Citation: Bloxham) Alternatively, an arbitrary DLL
      can be loaded if permissions allow writing a fully-qualified pathname for that
      DLL to <code>HKLM\SYSTEM\CurrentControlSet\Control\Print\Monitors</code>.'
    title: Port Monitors
    comments:
    - This technique has been revoked by T1547.010
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.010
    mappings:
    - d3f:T1013
    exact_mappings:
    - attack:T1013
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1013
  T1014:
    name: T1014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1014
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1014
    description: 'Adversaries may use rootkits to hide the presence of programs, files,
      network connections, services, drivers, and other system components. Rootkits
      are programs that hide the existence of malware by intercepting/hooking and
      modifying operating system API calls that supply system information. (Citation:
      Symantec Windows Rootkits)'
    title: Rootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1014
    exact_mappings:
    - attack:T1014
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1014
  T1015:
    name: T1015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1015
    annotations:
      attack-id:
        tag: attack-id
        value: T1015
    description: Windows contains accessibility features that may be launched with
      a key combination before a user has logged in (for example, when the user is
      on the Windows logon screen). An adversary can modify the way these programs
      are launched to get a command prompt or backdoor without logging in to the system.
    title: Accessibility Features
    comments:
    - This technique has been revoked by T1546.008
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.008
    mappings:
    - d3f:T1015
    exact_mappings:
    - attack:T1015
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1015
  T1016:
    name: T1016
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1016
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1016
    description: Adversaries may look for details about the network configuration
      and settings, such as IP and/or MAC addresses, of systems they access or through
      information discovery of remote systems. Several operating system administration
      utilities exist that can be used to gather this information. Examples include
      [Arp](https://attack.mitre.org/software/S0099), [ipconfig](https://attack.mitre.org/software/S0100)/[ifconfig](https://attack.mitre.org/software/S0101),
      [nbtstat](https://attack.mitre.org/software/S0102), and [route](https://attack.mitre.org/software/S0103).
    title: System Network Configuration Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1016
    exact_mappings:
    - attack:T1016
    is_a: DiscoveryTechnique
    class_uri: d3f:T1016
  T1016_001:
    name: T1016_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1016001
    annotations:
      attack-id:
        tag: attack-id
        value: T1016.001
    description: Adversaries may check for Internet connectivity on compromised systems.
      This may be performed during automated discovery and can be accomplished in
      numerous ways such as using [Ping](https://attack.mitre.org/software/S0097),
      <code>tracert</code>, and GET requests to websites.
    title: Internet Connection Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1016.001
    mappings:
    - d3f:T1016.001
    exact_mappings:
    - attack:T1016.001
    is_a: T1016
    class_uri: d3f:T1016.001
  T1016_002:
    name: T1016_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1016002
    annotations:
      attack-id:
        tag: attack-id
        value: T1016.002
    description: Adversaries may search for information about Wi-Fi networks, such
      as network names and passwords, on compromised systems. Adversaries may use
      Wi-Fi information as part of [Account Discovery](https://attack.mitre.org/techniques/T1087),
      [Remote System Discovery](https://attack.mitre.org/techniques/T1018), and other
      discovery or [Credential Access](https://attack.mitre.org/tactics/TA0006) activity
      to support both ongoing and future campaigns.
    title: Wi-Fi Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1016.002
    mappings:
    - d3f:T1016.002
    exact_mappings:
    - attack:T1016.002
    is_a: T1016
    class_uri: d3f:T1016.002
  T1017:
    name: T1017
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1017
    annotations:
      attack-id:
        tag: attack-id
        value: T1017
    description: Adversaries may deploy malicious software to systems within a network
      using application deployment systems employed by enterprise administrators.
      The permissions required for this action vary by system configuration; local
      credentials may be sufficient with direct access to the deployment server, or
      specific domain credentials may be required. However, the system may require
      an administrative account to log in or to perform software deployment.
    title: Application Deployment Software
    comments:
    - This technique has been revoked by T1072
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1072
    mappings:
    - d3f:T1017
    exact_mappings:
    - attack:T1017
    is_a: LateralMovementTechnique
    class_uri: d3f:T1017
  T1018:
    name: T1018
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1018
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1018
    description: Adversaries may attempt to get a listing of other systems by IP address,
      hostname, or other logical identifier on a network that may be used for Lateral
      Movement from the current system. Functionality could exist within remote access
      tools to enable this, but utilities available on the operating system could
      also be used such as  [Ping](https://attack.mitre.org/software/S0097) or <code>net
      view</code> using [Net](https://attack.mitre.org/software/S0039).
    title: Remote System Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1018
    exact_mappings:
    - attack:T1018
    is_a: DiscoveryTechnique
    class_uri: d3f:T1018
  T1019:
    name: T1019
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1019
    annotations:
      attack-id:
        tag: attack-id
        value: T1019
    description: 'The BIOS (Basic Input/Output System) and The Unified Extensible
      Firmware Interface (UEFI) or Extensible Firmware Interface (EFI) are examples
      of system firmware that operate as the software interface between the operating
      system and hardware of a computer. (Citation: Wikipedia BIOS) (Citation: Wikipedia
      UEFI) (Citation: About UEFI)'
    title: System Firmware
    comments:
    - This technique has been revoked by T1542.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1542.001
    mappings:
    - d3f:T1019
    exact_mappings:
    - attack:T1019
    is_a: PersistenceTechnique
    class_uri: d3f:T1019
  T1020:
    name: T1020
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1020
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1020
    description: 'Adversaries may exfiltrate data, such as sensitive documents, through
      the use of automated processing after being gathered during Collection.(Citation:
      ESET Gamaredon June 2020)'
    title: Automated Exfiltration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1020
    exact_mappings:
    - attack:T1020
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1020
  T1020_001:
    name: T1020_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1020001
    annotations:
      attack-id:
        tag: attack-id
        value: T1020.001
    description: 'Adversaries may leverage traffic mirroring in order to automate
      data exfiltration over compromised infrastructure. Traffic mirroring is a native
      feature for some devices, often used for network analysis. For example, devices
      may be configured to forward network traffic to one or more destinations for
      analysis by a network analyzer or other monitoring device. (Citation: Cisco
      Traffic Mirroring)(Citation: Juniper Traffic Mirroring)'
    title: Traffic Duplication
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1020.001
    mappings:
    - d3f:T1020.001
    exact_mappings:
    - attack:T1020.001
    is_a: T1020
    class_uri: d3f:T1020.001
  T1021:
    name: T1021
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1021
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to log into a service that accepts remote connections, such as telnet, SSH,
      and VNC. The adversary may then perform actions as the logged-on user.
    title: Remote Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1021
    exact_mappings:
    - attack:T1021
    is_a: LateralMovementTechnique
    class_uri: d3f:T1021
  T1021_001:
    name: T1021_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1021.001
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to log into a computer using the Remote Desktop Protocol (RDP). The adversary
      may then perform actions as the logged-on user.
    title: Remote Desktop Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.001
    mappings:
    - d3f:T1021.001
    exact_mappings:
    - attack:T1021.001
    is_a: T1021
    class_uri: d3f:T1021.001
  T1021_002:
    name: T1021_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021002
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.002
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with a remote network share using Server Message Block (SMB). The
      adversary may then perform actions as the logged-on user.
    title: SMB/Windows Admin Shares
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.002
    mappings:
    - d3f:T1021.002
    exact_mappings:
    - attack:T1021.002
    is_a: T1021
    class_uri: d3f:T1021.002
  T1021_003:
    name: T1021_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021003
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.003
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with remote machines by taking advantage of Distributed Component
      Object Model (DCOM). The adversary may then perform actions as the logged-on
      user.
    title: Distributed Component Object Model
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.003
    mappings:
    - d3f:T1021.003
    exact_mappings:
    - attack:T1021.003
    is_a: T1021
    class_uri: d3f:T1021.003
  T1021_004:
    name: T1021_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1021.004
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to log into remote machines using Secure Shell (SSH). The adversary may then
      perform actions as the logged-on user.
    title: SSH
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.004
    mappings:
    - d3f:T1021.004
    exact_mappings:
    - attack:T1021.004
    is_a: T1021
    class_uri: d3f:T1021.004
  T1021_005:
    name: T1021_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021005
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.005
    description: "Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)\
      \ to remotely control machines using Virtual Network Computing (VNC).  VNC is\
      \ a platform-independent desktop sharing system that uses the RFB (\u201Cremote\
      \ framebuffer\u201D) protocol to enable users to remotely control another computer\u2019\
      s display by relaying the screen, mouse, and keyboard inputs over the network.(Citation:\
      \ The Remote Framebuffer Protocol)"
    title: VNC
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.005
    mappings:
    - d3f:T1021.005
    exact_mappings:
    - attack:T1021.005
    is_a: T1021
    class_uri: d3f:T1021.005
  T1021_006:
    name: T1021_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021006
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.006
    description: Adversaries may use [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to interact with remote systems using Windows Remote Management (WinRM). The
      adversary may then perform actions as the logged-on user.
    title: Windows Remote Management
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.006
    mappings:
    - d3f:T1021.006
    exact_mappings:
    - attack:T1021.006
    is_a: T1021
    class_uri: d3f:T1021.006
  T1021_007:
    name: T1021_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021007
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.007
    description: Adversaries may log into accessible cloud services within a compromised
      environment using [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      that are synchronized with or federated to on-premises user identities. The
      adversary may then perform management actions or access cloud-hosted resources
      as the logged-on user.
    title: Cloud Services
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.007
    mappings:
    - d3f:T1021.007
    exact_mappings:
    - attack:T1021.007
    is_a: T1021
    class_uri: d3f:T1021.007
  T1021_008:
    name: T1021_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1021008
    annotations:
      attack-id:
        tag: attack-id
        value: T1021.008
    description: 'Adversaries may leverage [Valid Accounts](https://attack.mitre.org/techniques/T1078)
      to log directly into accessible cloud hosted compute infrastructure through
      cloud native methods. Many cloud providers offer interactive connections to
      virtual infrastructure that can be accessed through the [Cloud API](https://attack.mitre.org/techniques/T1059/009),
      such as Azure Serial Console(Citation: Azure Serial Console), AWS EC2 Instance
      Connect(Citation: EC2 Instance Connect)(Citation: lucr-3: Getting SaaS-y in
      the cloud), and AWS System Manager.(Citation: AWS System Manager).'
    title: Direct Cloud VM Connections
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1021.008
    mappings:
    - d3f:T1021.008
    exact_mappings:
    - attack:T1021.008
    is_a: T1021
    class_uri: d3f:T1021.008
  T1022:
    name: T1022
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1022
    annotations:
      attack-id:
        tag: attack-id
        value: T1022
    description: Data is encrypted before being exfiltrated in order to hide the information
      that is being exfiltrated from detection or to make the exfiltration less conspicuous
      upon inspection by a defender. The encryption is performed by a utility, programming
      library, or custom algorithm on the data itself and is considered separate from
      any encryption performed by the command and control or file transfer protocol.
      Common file archive formats that can encrypt files are RAR and zip.
    title: Data Encrypted
    comments:
    - This technique has been revoked by T1560
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1560
    mappings:
    - d3f:T1022
    exact_mappings:
    - attack:T1022
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1022
  T1023:
    name: T1023
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1023
    annotations:
      attack-id:
        tag: attack-id
        value: T1023
    description: Shortcuts or symbolic links are ways of referencing other files or
      programs that will be opened or executed when the shortcut is clicked or executed
      by a system startup process. Adversaries could use shortcuts to execute their
      tools for persistence. They may create a new shortcut as a means of indirection
      that may use [Masquerading](https://attack.mitre.org/techniques/T1036) to look
      like a legitimate program. Adversaries could also edit the target path or entirely
      replace an existing shortcut so their tools will be executed instead of the
      intended legitimate program.
    title: Shortcut Modification
    comments:
    - This technique has been revoked by T1547.009
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1547.009
    mappings:
    - d3f:T1023
    exact_mappings:
    - attack:T1023
    is_a: PersistenceTechnique
    class_uri: d3f:T1023
  T1024:
    name: T1024
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1024
    annotations:
      attack-id:
        tag: attack-id
        value: T1024
    description: Adversaries may use a custom cryptographic protocol or algorithm
      to hide command and control traffic. A simple scheme, such as XOR-ing the plaintext
      with a fixed key, will produce a very weak ciphertext.
    title: Custom Cryptographic Protocol
    comments:
    - This technique has been revoked by T1573
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1573
    mappings:
    - d3f:T1024
    exact_mappings:
    - attack:T1024
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1024
  T1025:
    name: T1025
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1025
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1025
    description: Adversaries may search connected removable media on computers they
      have compromised to find files of interest. Sensitive data can be collected
      from any removable media (optical disk drive, USB memory, etc.) connected to
      the compromised system prior to Exfiltration. Interactive command shells may
      be in use, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      may be used to gather information.
    title: Data from Removable Media
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1025
    exact_mappings:
    - attack:T1025
    is_a: CollectionTechnique
    class_uri: d3f:T1025
  T1026:
    name: T1026
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1026
    annotations:
      attack-id:
        tag: attack-id
        value: T1026
    description: '**This technique has been deprecated and should no longer be used.**'
    title: Multiband Communication
    comments:
    - '**This technique has been deprecated and should no longer be used.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1026
    exact_mappings:
    - attack:T1026
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1026
  T1027:
    name: T1027
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027
    annotations:
      attack-id:
        tag: attack-id
        value: T1027
    description: Adversaries may attempt to make an executable or file difficult to
      discover or analyze by encrypting, encoding, or otherwise obfuscating its contents
      on the system or in transit. This is common behavior that can be used across
      different platforms and the network to evade defenses.
    title: Obfuscated Files or Information
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1027
    exact_mappings:
    - attack:T1027
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1027
  T1027_001:
    name: T1027_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1027.001
    description: Adversaries may use binary padding to add junk data and change the
      on-disk representation of malware. This can be done without affecting the functionality
      or behavior of a binary, but can increase the size of the binary beyond what
      some security tools are capable of handling due to file size limitations.
    title: Binary Padding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.001
    mappings:
    - d3f:T1027.001
    exact_mappings:
    - attack:T1027.001
    is_a: T1027
    class_uri: d3f:T1027.001
  T1027_002:
    name: T1027_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1027.002
    description: 'Adversaries may perform software packing or virtual machine software
      protection to conceal their code. Software packing is a method of compressing
      or encrypting an executable. Packing an executable changes the file signature
      in an attempt to avoid signature-based detection. Most decompression techniques
      decompress the executable code in memory. Virtual machine software protection
      translates an executable''s original code into a special format that only a
      special virtual machine can run. A virtual machine is then called to run this
      code.(Citation: ESET FinFisher Jan 2018)'
    title: Software Packing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.002
    mappings:
    - d3f:T1027.002
    exact_mappings:
    - attack:T1027.002
    is_a: T1027
    class_uri: d3f:T1027.002
  T1027_003:
    name: T1027_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027003
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.003
    description: Adversaries may use steganography techniques in order to prevent
      the detection of hidden information. Steganographic techniques can be used to
      hide data in digital media such as images, audio tracks, video clips, or text
      files.
    title: Steganography
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.003
    mappings:
    - d3f:T1027.003
    exact_mappings:
    - attack:T1027.003
    is_a: T1027
    class_uri: d3f:T1027.003
  T1027_004:
    name: T1027_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1027.004
    description: 'Adversaries may attempt to make payloads difficult to discover and
      analyze by delivering files to victims as uncompiled code. Text-based source
      code files may subvert analysis and scrutiny from protections targeting executables/binaries.
      These payloads will need to be compiled before execution; typically via native
      utilities such as csc.exe or GCC/MinGW.(Citation: ClearSky MuddyWater Nov 2018)'
    title: Compile After Delivery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.004
    mappings:
    - d3f:T1027.004
    exact_mappings:
    - attack:T1027.004
    is_a: T1027
    class_uri: d3f:T1027.004
  T1027_005:
    name: T1027_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027005
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.005
    description: Adversaries may remove indicators from tools if they believe their
      malicious tool was detected, quarantined, or otherwise curtailed. They can modify
      the tool by removing the indicator and using the updated version that is no
      longer detected by the target's defensive systems or subsequent targets that
      may use similar systems.
    title: Indicator Removal from Tools
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.005
    mappings:
    - d3f:T1027.005
    exact_mappings:
    - attack:T1027.005
    is_a: T1027
    class_uri: d3f:T1027.005
  T1027_006:
    name: T1027_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1027.006
    description: 'Adversaries may smuggle data and files past content filters by hiding
      malicious payloads inside of seemingly benign HTML files. HTML documents can
      store large binary objects known as JavaScript Blobs (immutable data that represents
      raw bytes) that can later be constructed into file-like objects. Data may also
      be stored in Data URLs, which enable embedding media type or MIME files inline
      of HTML documents. HTML5 also introduced a download attribute that may be used
      to initiate file downloads.(Citation: HTML Smuggling Menlo Security 2020)(Citation:
      Outlflank HTML Smuggling 2018)'
    title: HTML Smuggling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.006
    mappings:
    - d3f:T1027.006
    exact_mappings:
    - attack:T1027.006
    is_a: T1027
    class_uri: d3f:T1027.006
  T1027_007:
    name: T1027_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027007
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.007
    description: Adversaries may obfuscate then dynamically resolve API functions
      called by their malware in order to conceal malicious functionalities and impair
      defensive analysis. Malware commonly uses various [Native API](https://attack.mitre.org/techniques/T1106)
      functions provided by the OS to perform various tasks such as those involving
      processes, files, and other system artifacts.
    title: Dynamic API Resolution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.007
    mappings:
    - d3f:T1027.007
    exact_mappings:
    - attack:T1027.007
    is_a: T1027
    class_uri: d3f:T1027.007
  T1027_008:
    name: T1027_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027008
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.008
    description: "Adversaries may attempt to make a payload difficult to analyze by\
      \ removing symbols, strings, and other human readable information. Scripts and\
      \ executables may contain variables names and other strings that help developers\
      \ document code functionality. Symbols are often created by an operating system\u2019\
      s `linker` when executable payloads are compiled. Reverse engineers use these\
      \ symbols and strings to analyze code and to identify functionality in payloads.(Citation:\
      \ Mandiant golang stripped binaries explanation)(Citation: intezer stripped\
      \ binaries elf files 2018)"
    title: Stripped Payloads
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.008
    mappings:
    - d3f:T1027.008
    exact_mappings:
    - attack:T1027.008
    is_a: T1027
    class_uri: d3f:T1027.008
  T1027_009:
    name: T1027_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027009
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.009
    description: 'Adversaries may embed payloads within other files to conceal malicious
      content from defenses. Otherwise seemingly benign files (such as scripts and
      executables) may be abused to carry and obfuscate malicious payloads and content.
      In some cases, embedded payloads may also enable adversaries to [Subvert Trust
      Controls](https://attack.mitre.org/techniques/T1553) by not impacting execution
      controls such as digital signatures and notarization tickets.(Citation: Sentinel
      Labs)'
    title: Embedded Payloads
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.009
    mappings:
    - d3f:T1027.009
    exact_mappings:
    - attack:T1027.009
    is_a: T1027
    class_uri: d3f:T1027.009
  T1027_010:
    name: T1027_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027010
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.010
    description: 'Adversaries may obfuscate content during command execution to impede
      detection. Command-line obfuscation is a method of making strings and patterns
      within commands and scripts more difficult to signature and analyze. This type
      of obfuscation can be included within commands executed by delivered payloads
      (e.g., [Phishing](https://attack.mitre.org/techniques/T1566) and [Drive-by Compromise](https://attack.mitre.org/techniques/T1189))
      or interactively via [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059).(Citation:
      Akamai JS)(Citation: Malware Monday VBE)'
    title: Command Obfuscation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.010
    mappings:
    - d3f:T1027.010
    exact_mappings:
    - attack:T1027.010
    is_a: T1027
    class_uri: d3f:T1027.010
  T1027_011:
    name: T1027_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027011
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.011
    description: 'Adversaries may store data in "fileless" formats to conceal malicious
      activity from defenses. Fileless storage can be broadly defined as any format
      other than a file. Common examples of non-volatile fileless storage include
      the Windows Registry, event logs, or WMI repository.(Citation: Microsoft Fileless)(Citation:
      SecureList Fileless)'
    title: Fileless Storage
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.011
    mappings:
    - d3f:T1027.011
    exact_mappings:
    - attack:T1027.011
    is_a: T1027
    class_uri: d3f:T1027.011
  T1027_012:
    name: T1027_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027012
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.012
    description: Adversaries may smuggle commands to download malicious payloads past
      content filters by hiding them within otherwise seemingly benign windows shortcut
      files. Windows shortcut files (.LNK) include many metadata fields, including
      an icon location field (also known as the `IconEnvironmentDataBlock`) designed
      to specify the path to an icon file that is to be displayed for the LNK file
      within a host directory.
    title: LNK Icon Smuggling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.012
    mappings:
    - d3f:T1027.012
    exact_mappings:
    - attack:T1027.012
    is_a: T1027
    class_uri: d3f:T1027.012
  T1027_013:
    name: T1027_013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027013
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.013
    description: Adversaries may encrypt or encode files to obfuscate strings, bytes,
      and other specific patterns to impede detection. Encrypting and/or encoding
      file content aims to conceal malicious artifacts within a file used in an intrusion.
      Many other techniques, such as [Software Packing](https://attack.mitre.org/techniques/T1027/002),
      [Steganography](https://attack.mitre.org/techniques/T1027/003), and [Embedded
      Payloads](https://attack.mitre.org/techniques/T1027/009), share this same broad
      objective. Encrypting and/or encoding files could lead to a lapse in detection
      of static signatures, only for this malicious content to be revealed (i.e.,
      [Deobfuscate/Decode Files or Information](https://attack.mitre.org/techniques/T1140))
      at the time of execution/use.
    title: Encrypted/Encoded File
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.013
    mappings:
    - d3f:T1027.013
    exact_mappings:
    - attack:T1027.013
    is_a: T1027
    class_uri: d3f:T1027.013
  T1027_014:
    name: T1027_014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027014
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.014
    description: 'Adversaries may utilize polymorphic code (also known as metamorphic
      or mutating code) to evade detection. Polymorphic code is a type of software
      capable of changing its runtime footprint during code execution.(Citation: polymorphic-blackberry)
      With each execution of the software, the code is mutated into a different version
      of itself that achieves the same purpose or objective as the original. This
      functionality enables the malware to evade traditional signature-based defenses,
      such as antivirus and antimalware tools.(Citation: polymorphic-sentinelone)'
    title: Polymorphic Code
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.014
    mappings:
    - d3f:T1027.014
    exact_mappings:
    - attack:T1027.014
    is_a: T1027
    class_uri: d3f:T1027.014
  T1027_015:
    name: T1027_015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027015
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.015
    description: 'Adversaries may use compression to obfuscate their payloads or files.
      Compressed file formats such as ZIP, gzip, 7z, and RAR can compress and archive
      multiple files together to make it easier and faster to transfer files. In addition
      to compressing files, adversaries may also compress shellcode directly - for
      example, in order to store it in a Windows Registry key (i.e., [Fileless Storage](https://attack.mitre.org/techniques/T1027/011)).(Citation:
      Trustwave Pillowmint June 2020)'
    title: Compression
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.015
    mappings:
    - d3f:T1027.015
    exact_mappings:
    - attack:T1027.015
    is_a: T1027
    class_uri: d3f:T1027.015
  T1027_016:
    name: T1027_016
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027016
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.016
    description: "Adversaries may use junk code / dead code to obfuscate a malware\u2019\
      s functionality. Junk code is code that either does not execute, or if it does\
      \ execute, does not change the functionality of the code. Junk code makes analysis\
      \ more difficult and time-consuming, as the analyst steps through non-functional\
      \ code instead of analyzing the main code. It also may hinder detections that\
      \ rely on static code analysis due to the use of benign functionality, especially\
      \ when combined with [Compression](https://attack.mitre.org/techniques/T1027/015)\
      \ or [Software Packing](https://attack.mitre.org/techniques/T1027/002).(Citation:\
      \ ReasonLabs)(Citation: ReasonLabs Cyberpedia Junk Code)"
    title: Junk Code Insertion
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.016
    mappings:
    - d3f:T1027.016
    exact_mappings:
    - attack:T1027.016
    is_a: T1027
    class_uri: d3f:T1027.016
  T1027_017:
    name: T1027_017
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1027017
    annotations:
      attack-id:
        tag: attack-id
        value: T1027.017
    description: 'Adversaries may smuggle data and files past content filters by hiding
      malicious payloads inside of seemingly benign SVG files.(Citation: Trustwave
      SVG Smuggling 2025) SVGs, or Scalable Vector Graphics, are vector-based image
      files constructed using XML. As such, they can legitimately include `<script>`
      tags that enable adversaries to include malicious JavaScript payloads. However,
      SVGs may appear less suspicious to users than other types of executable files,
      as they are often treated as image files.'
    title: SVG Smuggling
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1027.017
    mappings:
    - d3f:T1027.017
    exact_mappings:
    - attack:T1027.017
    is_a: T1027
    class_uri: d3f:T1027.017
  T1028:
    name: T1028
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1028
    annotations:
      attack-id:
        tag: attack-id
        value: T1028
    description: 'Windows Remote Management (WinRM) is the name of both a Windows
      service and a protocol that allows a user to interact with a remote system (e.g.,
      run an executable, modify the Registry, modify services). (Citation: Microsoft
      WinRM) It may be called with the <code>winrm</code> command or by any number
      of programs such as PowerShell. (Citation: Jacobsen 2014)'
    title: Windows Remote Management
    comments:
    - This technique has been revoked by T1021.006
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1021.006
    mappings:
    - d3f:T1028
    exact_mappings:
    - attack:T1028
    is_a: ExecutionTechnique
    mixins:
    - LateralMovementTechnique
    class_uri: d3f:T1028
  T1029:
    name: T1029
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1029
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1029
    description: Adversaries may schedule data exfiltration to be performed only at
      certain times of day or at certain intervals. This could be done to blend traffic
      patterns with normal activity or availability.
    title: Scheduled Transfer
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1029
    exact_mappings:
    - attack:T1029
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1029
  T1030:
    name: T1030
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1030
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1030
    description: An adversary may exfiltrate data in fixed size chunks instead of
      whole files or limit packet sizes below certain thresholds. This approach may
      be used to avoid triggering network data transfer threshold alerts.
    title: Data Transfer Size Limits
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1030
    exact_mappings:
    - attack:T1030
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1030
  T1031:
    name: T1031
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1031
    annotations:
      attack-id:
        tag: attack-id
        value: T1031
    description: Windows service configuration information, including the file path
      to the service's executable or recovery programs/commands, is stored in the
      Registry. Service configurations can be modified using utilities such as sc.exe
      and [Reg](https://attack.mitre.org/software/S0075).
    title: Modify Existing Service
    comments:
    - This technique has been revoked by T1543.003
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1543.003
    mappings:
    - d3f:T1031
    exact_mappings:
    - attack:T1031
    is_a: PersistenceTechnique
    class_uri: d3f:T1031
  T1032:
    name: T1032
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1032
    annotations:
      attack-id:
        tag: attack-id
        value: T1032
    description: Adversaries may explicitly employ a known encryption algorithm to
      conceal command and control traffic rather than relying on any inherent protections
      provided by a communication protocol. Despite the use of a secure algorithm,
      these implementations may be vulnerable to reverse engineering if necessary
      secret keys are encoded and/or generated within malware samples/configuration
      files.
    title: Standard Cryptographic Protocol
    comments:
    - This technique has been revoked by T1573
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1573
    mappings:
    - d3f:T1032
    exact_mappings:
    - attack:T1032
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1032
  T1033:
    name: T1033
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1033
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1033
    description: Adversaries may attempt to identify the primary user, currently logged
      in user, set of users that commonly uses a system, or whether a user is actively
      using the system. They may do this, for example, by retrieving account usernames
      or by using [OS Credential Dumping](https://attack.mitre.org/techniques/T1003).
      The information may be collected in a number of different ways using other Discovery
      techniques, because user and username details are prevalent throughout a system
      and include running process ownership, file/directory ownership, session information,
      and system logs. Adversaries may use the information from [System Owner/User
      Discovery](https://attack.mitre.org/techniques/T1033) during automated discovery
      to shape follow-on behaviors, including whether or not the adversary fully infects
      the target and/or attempts specific actions.
    title: System Owner/User Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1033
    exact_mappings:
    - attack:T1033
    is_a: DiscoveryTechnique
    class_uri: d3f:T1033
  T1034:
    name: T1034
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1034
    annotations:
      attack-id:
        tag: attack-id
        value: T1034
    description: '**This technique has been deprecated. Please use [Path Interception
      by PATH Environment Variable](https://attack.mitre.org/techniques/T1574/007),
      [Path Interception by Search Order Hijacking](https://attack.mitre.org/techniques/T1574/008),
      and/or [Path Interception by Unquoted Path](https://attack.mitre.org/techniques/T1574/009).**'
    title: Path Interception
    comments:
    - '**This technique has been deprecated. Please use [Path Interception by PATH
      Environment Variable](https://attack.mitre.org/techniques/T1574/007), [Path
      Interception by Search Order Hijacking](https://attack.mitre.org/techniques/T1574/008),
      and/or [Path Interception by Unquoted Path](https://attack.mitre.org/techniques/T1574/009).**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1034
    exact_mappings:
    - attack:T1034
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1034
  T1035:
    name: T1035
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1035
    annotations:
      attack-id:
        tag: attack-id
        value: T1035
    description: Adversaries may execute a binary, command, or script via a method
      that interacts with Windows services, such as the Service Control Manager. This
      can be done by either creating a new service or modifying an existing service.
      This technique is the execution used in conjunction with [New Service](https://attack.mitre.org/techniques/T1050)
      and [Modify Existing Service](https://attack.mitre.org/techniques/T1031) during
      service persistence or privilege escalation.
    title: Service Execution
    comments:
    - This technique has been revoked by T1569.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1569.002
    mappings:
    - d3f:T1035
    exact_mappings:
    - attack:T1035
    is_a: ExecutionTechnique
    class_uri: d3f:T1035
  T1036:
    name: T1036
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036
    annotations:
      attack-id:
        tag: attack-id
        value: T1036
    description: Adversaries may attempt to manipulate features of their artifacts
      to make them appear legitimate or benign to users and/or security tools. Masquerading
      occurs when the name or location of an object, legitimate or malicious, is manipulated
      or abused for the sake of evading defenses and observation. This may include
      manipulating file metadata, tricking users into misidentifying the file type,
      and giving legitimate task or service names.
    title: Masquerading
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1036
    exact_mappings:
    - attack:T1036
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1036
  T1036_001:
    name: T1036_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.001
    description: 'Adversaries may attempt to mimic features of valid code signatures
      to increase the chance of deceiving a user, analyst, or tool. Code signing provides
      a level of authenticity on a binary from the developer and a guarantee that
      the binary has not been tampered with. Adversaries can copy the metadata and
      signature information from a signed program, then use it as a template for an
      unsigned program. Files with invalid code signatures will fail digital signature
      validation checks, but they may appear more legitimate to users and security
      tools may improperly handle these files.(Citation: Threatexpress MetaTwin 2017)'
    title: Invalid Code Signature
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.001
    mappings:
    - d3f:T1036.001
    exact_mappings:
    - attack:T1036.001
    is_a: T1036
    class_uri: d3f:T1036.001
  T1036_002:
    name: T1036_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.002
    description: 'Adversaries may abuse the right-to-left override (RTLO or RLO) character
      (U+202E) to disguise a string and/or file name to make it appear benign. RTLO
      is a non-printing Unicode character that causes the text that follows it to
      be displayed in reverse. For example, a Windows screensaver executable named
      <code>March 25 \u202Excod.scr</code> will display as <code>March 25 rcs.docx</code>.
      A JavaScript file named <code>photo_high_re\u202Egnp.js</code> will be displayed
      as <code>photo_high_resj.png</code>.(Citation: Infosecinstitute RTLO Technique)'
    title: Right-to-Left Override
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.002
    mappings:
    - d3f:T1036.002
    exact_mappings:
    - attack:T1036.002
    is_a: T1036
    class_uri: d3f:T1036.002
  T1036_003:
    name: T1036_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.003
    description: 'Adversaries may rename legitimate system utilities to try to evade
      security mechanisms concerning the usage of those utilities. Security monitoring
      and control mechanisms may be in place for system utilities adversaries are
      capable of abusing. (Citation: LOLBAS Main Site) It may be possible to bypass
      those security mechanisms by renaming the utility prior to utilization (ex:
      rename <code>rundll32.exe</code>). (Citation: Elastic Masquerade Ball) An alternative
      case occurs when a legitimate utility is copied or moved to a different directory
      and renamed to avoid detections based on system utilities executing from non-standard
      paths. (Citation: F-Secure CozyDuke)'
    title: Rename Legitimate Utilities
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.003
    mappings:
    - d3f:T1036.003
    exact_mappings:
    - attack:T1036.003
    is_a: T1036
    class_uri: d3f:T1036.003
  T1036_004:
    name: T1036_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.004
    description: 'Adversaries may attempt to manipulate the name of a task or service
      to make it appear legitimate or benign. Tasks/services executed by the Task
      Scheduler or systemd will typically be given a name and/or description.(Citation:
      TechNet Schtasks)(Citation: Systemd Service Units) Windows services will have
      a service name as well as a display name. Many benign tasks and services exist
      that have commonly associated names. Adversaries may give tasks or services
      names that are similar or identical to those of legitimate ones.'
    title: Masquerade Task or Service
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.004
    mappings:
    - d3f:T1036.004
    exact_mappings:
    - attack:T1036.004
    is_a: T1036
    class_uri: d3f:T1036.004
  T1036_005:
    name: T1036_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.005
    description: 'Adversaries may match or approximate the name or location of legitimate
      files or resources when naming/placing them. This is done for the sake of evading
      defenses and observation. This may be done by placing an executable in a commonly
      trusted directory (ex: under System32) or giving it the name of a legitimate,
      trusted program (ex: svchost.exe). In containerized environments, this may also
      be done by creating a resource in a namespace that matches the naming convention
      of a container pod or cluster. Alternatively, a file or container image name
      given may be a close approximation to legitimate programs/images or something
      innocuous.'
    title: Match Legitimate Resource Name or Location
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.005
    mappings:
    - d3f:T1036.005
    exact_mappings:
    - attack:T1036.005
    is_a: T1036
    class_uri: d3f:T1036.005
  T1036_006:
    name: T1036_006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036006
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.006
    description: Adversaries can hide a program's true filetype by changing the extension
      of a file. With certain file types (specifically this does not work with .app
      extensions), appending a space to the end of a filename will change how the
      file is processed by the operating system.
    title: Space after Filename
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.006
    mappings:
    - d3f:T1036.006
    exact_mappings:
    - attack:T1036.006
    is_a: T1036
    class_uri: d3f:T1036.006
  T1036_007:
    name: T1036_007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036007
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1036.007
    description: "Adversaries may abuse a double extension in the filename as a means\
      \ of masquerading the true file type. A file name may include a secondary file\
      \ type extension that may cause only the first extension to be displayed (ex:\
      \ <code>File.txt.exe</code> may render in some views as just <code>File.txt</code>).\
      \ However, the second extension is the true file type that determines how the\
      \ file is opened and executed. The real file extension may be hidden by the\
      \ operating system in the file browser (ex: explorer.exe), as well as in any\
      \ software configured using or similar to the system\u2019s policies.(Citation:\
      \ PCMag DoubleExtension)(Citation: SOCPrime DoubleExtension)"
    title: Double File Extension
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.007
    mappings:
    - d3f:T1036.007
    exact_mappings:
    - attack:T1036.007
    is_a: T1036
    class_uri: d3f:T1036.007
  T1036_008:
    name: T1036_008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036008
    annotations:
      attack-id:
        tag: attack-id
        value: T1036.008
    description: "Adversaries may masquerade malicious payloads as legitimate files\
      \ through changes to the payload's formatting, including the file\u2019s signature,\
      \ extension, and contents. Various file types have a typical standard format,\
      \ including how they are encoded and organized. For example, a file\u2019s signature\
      \ (also known as header or magic bytes) is the beginning bytes of a file and\
      \ is often used to identify the file\u2019s type. For example, the header of\
      \ a JPEG file,  is <code> 0xFF 0xD8</code> and the file extension is either\
      \ `.JPE`, `.JPEG` or `.JPG`."
    title: Masquerade File Type
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.008
    mappings:
    - d3f:T1036.008
    exact_mappings:
    - attack:T1036.008
    is_a: T1036
    class_uri: d3f:T1036.008
  T1036_009:
    name: T1036_009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036009
    annotations:
      attack-id:
        tag: attack-id
        value: T1036.009
    description: "An adversary may attempt to evade process tree-based analysis by\
      \ modifying executed malware's parent process ID (PPID). If endpoint protection\
      \ software leverages the \u201Cparent-child\" relationship for detection, breaking\
      \ this relationship could result in the adversary\u2019s behavior not being\
      \ associated with previous process tree activity. On Unix-based systems breaking\
      \ this process tree is common practice for administrators to execute software\
      \ using scripts and programs.(Citation: 3OHA double-fork 2022)"
    title: Break Process Trees
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.009
    mappings:
    - d3f:T1036.009
    exact_mappings:
    - attack:T1036.009
    is_a: T1036
    class_uri: d3f:T1036.009
  T1036_010:
    name: T1036_010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036010
    annotations:
      attack-id:
        tag: attack-id
        value: T1036.010
    description: 'Adversaries may match or approximate the names of legitimate accounts
      to make newly created ones appear benign. This will typically occur during [Create
      Account](https://attack.mitre.org/techniques/T1136), although accounts may also
      be renamed at a later date. This may also coincide with [Account Access Removal](https://attack.mitre.org/techniques/T1531)
      if the actor first deletes an account before re-creating one with the same name.(Citation:
      Huntress MOVEit 2023)'
    title: Masquerade Account Name
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.010
    mappings:
    - d3f:T1036.010
    exact_mappings:
    - attack:T1036.010
    is_a: T1036
    class_uri: d3f:T1036.010
  T1036_011:
    name: T1036_011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036011
    annotations:
      attack-id:
        tag: attack-id
        value: T1036.011
    description: "Adversaries may modify a process's in-memory arguments to change\
      \ its name in order to appear as a legitimate or benign process. On Linux, the\
      \ operating system stores command-line arguments in the process\u2019s stack\
      \ and passes them to the `main()` function as the `argv` array. The first element,\
      \ `argv[0]`, typically contains the process name or path - by default, the command\
      \ used to actually start the process (e.g., `cat /etc/passwd`). By default,\
      \ the Linux `/proc` filesystem uses this value to represent the process name.\
      \ The `/proc/<PID>/cmdline` file reflects the contents of this memory, and tools\
      \ like `ps` use it to display process information. Since arguments are stored\
      \ in user-space memory at launch, this modification can be performed without\
      \ elevated privileges."
    title: Overwrite Process Arguments
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.011
    mappings:
    - d3f:T1036.011
    exact_mappings:
    - attack:T1036.011
    is_a: T1036
    class_uri: d3f:T1036.011
  T1036_012:
    name: T1036_012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1036012
    annotations:
      attack-id:
        tag: attack-id
        value: T1036.012
    description: "Adversaries may attempt to blend in with legitimate traffic by spoofing\
      \ browser and system attributes like operating system, system language, platform,\
      \ user-agent string, resolution, time zone, etc.  The HTTP\_User-Agent\_request\
      \ header\_is a string that lets servers and network peers identify the application,\
      \ operating system, vendor, and/or version of the requesting\_user agent.(Citation:\
      \ Mozilla User Agent)"
    title: Browser Fingerprint
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1036.012
    mappings:
    - d3f:T1036.012
    exact_mappings:
    - attack:T1036.012
    is_a: T1036
    class_uri: d3f:T1036.012
  T1037:
    name: T1037
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037
    annotations:
      attack-id:
        tag: attack-id
        value: T1037
    description: 'Adversaries may use scripts automatically executed at boot or logon
      initialization to establish persistence.(Citation: Mandiant APT29 Eye Spy Email
      Nov 22)(Citation: Anomali Rocke March 2019) Initialization scripts can be used
      to perform administrative functions, which may often execute other programs
      or send information to an internal logging server. These scripts can vary based
      on operating system and whether applied locally or remotely.'
    title: Boot or Logon Initialization Scripts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1037
    exact_mappings:
    - attack:T1037
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1037
  T1037_001:
    name: T1037_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1037.001
    description: 'Adversaries may use Windows logon scripts automatically executed
      at logon initialization to establish persistence. Windows allows logon scripts
      to be run whenever a specific user or group of users log into a system.(Citation:
      TechNet Logon Scripts) This is done via adding a path to a script to the <code>HKCU\Environment\UserInitMprLogonScript</code>
      Registry key.(Citation: Hexacorn Logon Scripts)'
    title: Logon Script (Windows)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1037.001
    mappings:
    - d3f:T1037.001
    exact_mappings:
    - attack:T1037.001
    is_a: T1037
    class_uri: d3f:T1037.001
  T1037_002:
    name: T1037_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1037.002
    description: 'Adversaries may use a Login Hook to establish persistence executed
      upon user logon. A login hook is a plist file that points to a specific script
      to execute with root privileges upon user logon. The plist file is located in
      the <code>/Library/Preferences/com.apple.loginwindow.plist</code> file and can
      be modified using the <code>defaults</code> command-line utility. This behavior
      is the same for logout hooks where a script can be executed upon user logout.
      All hooks require administrator permissions to modify or create hooks.(Citation:
      Login Scripts Apple Dev)(Citation: LoginWindowScripts Apple Dev)'
    title: Login Hook
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1037.002
    mappings:
    - d3f:T1037.002
    exact_mappings:
    - attack:T1037.002
    is_a: T1037
    class_uri: d3f:T1037.002
  T1037_003:
    name: T1037_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1037.003
    description: Group Policy Object / Active Directory Users and Computers are both
      Active Directory-based.
    title: Network Logon Script
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1037.003
    mappings:
    - d3f:T1037.003
    exact_mappings:
    - attack:T1037.003
    is_a: T1037
    class_uri: d3f:T1037.003
  T1037_004:
    name: T1037_004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037004
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1037.004
    description: "Adversaries may establish persistence by modifying RC scripts which\
      \ are executed during a Unix-like system\u2019s startup. These files allow system\
      \ administrators to map and start custom services at startup for different run\
      \ levels. RC scripts require root privileges to modify."
    title: RC Scripts
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1037.004
    mappings:
    - d3f:T1037.004
    exact_mappings:
    - attack:T1037.004
    is_a: T1037
    class_uri: d3f:T1037.004
  T1037_005:
    name: T1037_005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1037005
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1037.005
    description: 'Adversaries may use startup items automatically executed at boot
      initialization to establish persistence. Startup items execute during the final
      phase of the boot process and contain shell scripts or other executable files
      along with configuration information used by the system to determine the execution
      order for all startup items.(Citation: Startup Items)'
    title: Startup Items
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1037.005
    mappings:
    - d3f:T1037.005
    exact_mappings:
    - attack:T1037.005
    is_a: T1037
    class_uri: d3f:T1037.005
  T1038:
    name: T1038
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1038
    annotations:
      attack-id:
        tag: attack-id
        value: T1038
    description: 'Windows systems use a common method to look for required DLLs to
      load into a program. (Citation: Microsoft DLL Search) Adversaries may take advantage
      of the Windows DLL search order and programs that ambiguously specify DLLs to
      gain privilege escalation and persistence.'
    title: DLL Search Order Hijacking
    comments:
    - This technique has been revoked by T1574.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1574.001
    mappings:
    - d3f:T1038
    exact_mappings:
    - attack:T1038
    is_a: DefenseEvasionTechnique
    mixins:
    - PersistenceTechnique
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1038
  T1039:
    name: T1039
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1039
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1039
    description: Adversaries may search network shares on computers they have compromised
      to find files of interest. Sensitive data can be collected from remote systems
      via shared network drives (host shared directory, network file server, etc.)
      that are accessible from the current system prior to Exfiltration. Interactive
      command shells may be in use, and common functionality within [cmd](https://attack.mitre.org/software/S0106)
      may be used to gather information.
    title: Data from Network Shared Drive
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1039
    exact_mappings:
    - attack:T1039
    is_a: CollectionTechnique
    class_uri: d3f:T1039
  T1040:
    name: T1040
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1040
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1040
    description: Adversaries may passively sniff network traffic to capture information
      about an environment, including authentication material passed over the network.
      Network sniffing refers to using the network interface on a system to monitor
      or capture information sent over a wired or wireless connection. An adversary
      may place a network interface into promiscuous mode to passively access data
      in transit over the network, or use span ports to capture a larger amount of
      data.
    title: Network Sniffing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1040
    exact_mappings:
    - attack:T1040
    is_a: CredentialAccessTechnique
    mixins:
    - DiscoveryTechnique
    class_uri: d3f:T1040
  T1041:
    name: T1041
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1041
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1041
    description: Adversaries may steal data by exfiltrating it over an existing command
      and control channel. Stolen data is encoded into the normal communications channel
      using the same protocol as command and control communications.
    title: Exfiltration Over C2 Channel
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1041
    exact_mappings:
    - attack:T1041
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1041
  T1042:
    name: T1042
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1042
    annotations:
      attack-id:
        tag: attack-id
        value: T1042
    description: 'When a file is opened, the default program used to open the file
      (also called the file association or handler) is checked. File association selections
      are stored in the Windows Registry and can be edited by users, administrators,
      or programs that have Registry access (Citation: Microsoft Change Default Programs)
      (Citation: Microsoft File Handlers) or by administrators using the built-in
      assoc utility. (Citation: Microsoft Assoc Oct 2017) Applications can modify
      the file association for a given file extension to call an arbitrary program
      when a file with the given extension is opened.'
    title: Change Default File Association
    comments:
    - This technique has been revoked by T1546.001
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1546.001
    mappings:
    - d3f:T1042
    exact_mappings:
    - attack:T1042
    is_a: PersistenceTechnique
    class_uri: d3f:T1042
  T1043:
    name: T1043
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1043
    annotations:
      attack-id:
        tag: attack-id
        value: T1043
    description: '**This technique has been deprecated. Please use [Non-Standard Port](https://attack.mitre.org/techniques/T1571)
      where appropriate.**'
    title: Commonly Used Port
    comments:
    - '**This technique has been deprecated. Please use [Non-Standard Port](https://attack.mitre.org/techniques/T1571)
      where appropriate.**'
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1043
    exact_mappings:
    - attack:T1043
    is_a: CommandAndControlTechnique
    class_uri: d3f:T1043
  T1044:
    name: T1044
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1044
    annotations:
      attack-id:
        tag: attack-id
        value: T1044
    description: Processes may automatically execute specific binaries as part of
      their functionality or to perform other actions. If the permissions on the file
      system directory containing a target binary, or permissions on the binary itself,
      are improperly set, then the target binary may be overwritten with another binary
      using user-level permissions and executed by the original process. If the original
      process and thread are running under a higher permissions level, then the replaced
      binary will also execute under higher-level permissions, which could include
      SYSTEM.
    title: File System Permissions Weakness
    comments:
    - This technique has been revoked by T1574.010
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1574.010
    mappings:
    - d3f:T1044
    exact_mappings:
    - attack:T1044
    is_a: PersistenceTechnique
    mixins:
    - PrivilegeEscalationTechnique
    class_uri: d3f:T1044
  T1045:
    name: T1045
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1045
    annotations:
      attack-id:
        tag: attack-id
        value: T1045
    description: Software packing is a method of compressing or encrypting an executable.
      Packing an executable changes the file signature in an attempt to avoid signature-based
      detection. Most decompression techniques decompress the executable code in memory.
    title: Software Packing
    comments:
    - This technique has been revoked by T1027.002
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://d3fend.mitre.org/ontologies/d3fend.owl#T1027.002
    mappings:
    - d3f:T1045
    exact_mappings:
    - attack:T1045
    is_a: DefenseEvasionTechnique
    class_uri: d3f:T1045
  T1046:
    name: T1046
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1046
    annotations:
      attack-id:
        tag: attack-id
        value: T1046
    description: 'Adversaries may attempt to get a listing of services running on
      remote hosts and local network infrastructure devices, including those that
      may be vulnerable to remote software exploitation. Common methods to acquire
      this information include port and/or vulnerability scans using tools that are
      brought onto a system.(Citation: CISA AR21-126A FIVEHANDS May 2021)'
    title: Network Service Discovery
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1046
    exact_mappings:
    - attack:T1046
    is_a: DiscoveryTechnique
    class_uri: d3f:T1046
  T1047:
    name: T1047
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1047
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1047
    description: 'Adversaries may abuse Windows Management Instrumentation (WMI) to
      execute malicious commands and payloads. WMI is designed for programmers and
      is the infrastructure for management data and operations on Windows systems.(Citation:
      WMI 1-3) WMI is an administration feature that provides a uniform environment
      to access Windows system components.'
    title: Windows Management Instrumentation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1047
    exact_mappings:
    - attack:T1047
    is_a: ExecutionTechnique
    class_uri: d3f:T1047
  T1048:
    name: T1048
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1048
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1048
    description: Adversaries may steal data by exfiltrating it over a different protocol
      than that of the existing command and control channel. The data may also be
      sent to an alternate network location from the main command and control server.
    title: Exfiltration Over Alternative Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:T1048
    exact_mappings:
    - attack:T1048
    is_a: ExfiltrationTechnique
    class_uri: d3f:T1048
  T1048_001:
    name: T1048_001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1048001
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1048.001
    description: Adversaries may steal data by exfiltrating it over a symmetrically
      encrypted network protocol other than that of the existing command and control
      channel. The data may also be sent to an alternate network location from the
      main command and control server.
    title: Exfiltration Over Symmetric Encrypted Non-C2 Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1048.001
    mappings:
    - d3f:T1048.001
    exact_mappings:
    - attack:T1048.001
    is_a: T1048
    class_uri: d3f:T1048.001
  T1048_002:
    name: T1048_002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1048002
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1048.002
    description: Adversaries may steal data by exfiltrating it over an asymmetrically
      encrypted network protocol other than that of the existing command and control
      channel. The data may also be sent to an alternate network location from the
      main command and control server.
    title: Exfiltration Over Asymmetric Encrypted Non-C2 Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1048.002
    mappings:
    - d3f:T1048.002
    exact_mappings:
    - attack:T1048.002
    is_a: T1048
    class_uri: d3f:T1048.002
  T1048_003:
    name: T1048_003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1048003
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      attack-id:
        tag: attack-id
        value: T1048.003
    description: 'Adversaries may steal data by exfiltrating it over an un-encrypted
      network protocol other than that of the existing command and control channel.
      The data may also be sent to an alternate network location from the main command
      and control server.(Citation: copy_cmd_cisco)'
    title: Exfiltration Over Unencrypted Non-C2 Protocol
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - T1048.003
    mappings:
    - d3f:T1048.003
    exact_mappings:
    - attack:T1048.003
    is_a: T1048
    class_uri: d3f:T1048.003
  T1049:
    name: T1049
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#T1049
    annotations:
      owl_named_individual:
        tag: owl_named_individual
