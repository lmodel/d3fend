    is_a: DomainLogicValidation
    class_uri: d3f:OperationalLogicValidation
  OperationalProcessMonitoring:
    name: OperationalProcessMonitoring
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperationalProcessMonitoring
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-OPM
      synonym:
        tag: synonym
        value: Supervisory Control Monitoring
      kb-article:
        tag: kb-article
        value: '## How it works While some Operational Technology systems are designed
          to operate without human intervention, most systems are designed with the
          ability to monitor and modify the physical process with user input. This
          technique detects adversarial risks to operational processes by observing
          physic'
    description: Monitoring physical parameters and operator actions related to an
      operational environment.
    title: Operational Process Monitoring
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:OperationalProcessMonitoring
    related_mappings:
