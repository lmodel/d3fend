        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-IRV
      kb-article:
        tag: kb-article
        value: '## How it Works Integer Range Validation can be done by programmatically
          checking the value of an integer before or after an operation to determine
          if the resulting value will be valid. Checking the value of an integer to
          ensure it is in a valid range helps prevent integer overflow, wraparound,
          and'
    description: Ensuring that an integer is within a valid range.
    title: Integer Range Validation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:IntegerRangeValidation
    is_a: SourceCodeHardening
    class_uri: d3f:IntegerRangeValidation
  IntegratedHoneynet:
    name: IntegratedHoneynet
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#IntegratedHoneynet
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-IHN
      kb-article:
        tag: kb-article
        value: '## How it works Integrated honeynets use full production environments
          connected to the enterprise network, that utilize computing resources or
          software that attract attackers, and allow full interaction and access that
          provides a complete view of an attack. ## Considerations An attacker with
          contro'
    description: The practice of setting decoys in a production environment to entice
      interaction from attackers.
    title: Integrated Honeynet
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
