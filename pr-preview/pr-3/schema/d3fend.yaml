  CreateProcess:
    name: CreateProcess
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CreateProcess
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A process spawn refers to a function that loads and executes a new
      child process.The current process may wait for the child to terminate or may
      continue to execute asynchronously. Creating a new subprocess requires enough
      memory in which both the child process and the current program can execute.
      There is a family of spawn functions in DOS, inherited by Microsoft Windows.
      There is also a different family of spawn functions in an optional extension
      of the POSIX standards.  Fork-exec is another technique combining two Unix system
      calls, which can effect a process spawn.
    title: Create Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Fork%E2%80%93exec
    - http://dbpedia.org/resource/Spawn_(computing)
    - https://dbpedia.org/page/Fork%E2%80%93exec
    - https://dbpedia.org/page/Spawn_(computing)
    - https://docs.microsoft.com/en-us/windows/win32/procthread/creating-processes
    - https://learn.microsoft.com/en-us/windows/win32/procthread/creating-processes
    aliases:
    - Execute Process
    - Process Spawn
    - Spawn Process
    mappings:
    - d3f:CreateProcess
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CreateProcess
  CreateSocket:
    name: CreateSocket
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CreateSocket
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A create socket system call creates an endpoint for communication
      and returns a file descriptor that refers to that endpoint.
    title: Create Socket
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.man7.org/linux/man-pages/man2/socket.2.html
    mappings:
    - d3f:CreateSocket
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CreateSocket
  CreateThread:
    name: CreateThread
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CreateThread
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: Threads are an execution model that exists independently from a language,
      as well as a parallel execution model. They enable a program to control multiple
      different flows of work that overlap in time.
    title: Create Thread
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/POSIX_Threads
    - https://docs.microsoft.com/en-us/windows/win32/api/processthreadsapi/nf-processthreadsapi-createthread
    mappings:
    - d3f:CreateThread
    is_a: SystemCall
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:CreateThread
  Credential:
    name: Credential
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Credential
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A credential is a physical/tangible object, a piece of knowledge,
      or a facet of a person's physical being that enables an individual access to
      a given physical facility or computer-based information system. Typically, credentials
      can be something a person knows (such as a number or PIN), something they have
      (such as an access badge), something they are (such as a biometric feature),
      something they do (measurable behavioral patterns) or some combination of these
      items. This is known as multi-factor authentication. The typical credential
      is an access card or key-fob, and newer software can also turn users' smartphones
      into access devices.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Access_control
    - http://dbpedia.org/resource/Access_control#Credential
    mappings:
    - d3f:Credential
    exact_mappings:
    - unified_cyber_ontology:Credential
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Credential
  CredentialAccessTechnique:
    name: CredentialAccessTechnique
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#CredentialAccessTechnique
    annotations:
      owl_named_individual:
        tag: owl_named_individual
