  Transmitter:
    name: Transmitter
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Transmitter
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: "A device or system that takes information and generates a signal\
      \ suitable for propagation. It encodes and formats the content, impresses it\
      \ on a physical carrier (such as electromagnetic fields, light, electrical currents,\
      \ or acoustic waves), and performs signal conditioning\u2014such as modulation,\
      \ pulse shaping, pre-emphasis, and power amplification\u2014to meet spectral,\
      \ timing, and power requirements. A transmitter may be analog or digital, implemented\
      \ in hardware, software, or both, and is designed to launch the signal into\
      \ the chosen medium with characteristics that enable reliable reception."
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Signal_transmission
    mappings:
    - d3f:Transmitter
    is_a: HardwareDevice
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Transmitter
  Transponder:
    name: Transponder
