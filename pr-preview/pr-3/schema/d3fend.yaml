    - http://dbpedia.org/resource/Dynamic_program_analysis
    mappings:
    - d3f:DynamicAnalysisTool
    is_a: CodeAnalyzer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:DynamicAnalysisTool
  EX_0001:
    name: EX_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0001
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0001
    description: Replay attacks involve threat actors recording previously recorded
      data streams and then resending them at a later time. This attack can be used
      to fingerprint systems, gain elevated privileges, or even cause a denial of
      service.
    title: Replay
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0001/
    aliases:
    - EX-0001
    mappings:
    - d3f:EX-0001
    exact_mappings:
    - attack:EX-0001
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0001
  EX_0001_01:
    name: EX_0001_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000101
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0001.01
    description: Threat actors may interact with the victim spacecraft by replaying
      captured commands to the spacecraft. While not necessarily malicious in nature,
      replayed commands can be used to overload the target spacecraft and cause it's
      onboard systems to crash, perform a DoS attack, or monitor various responses
      by the spacecraft. If critical commands are captured and replayed, thruster
      fires, then the impact could impact the spacecraft's attitude control/orbit.
    title: Command Packets
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0001/01/
    aliases:
    - EX-0001.01
    mappings:
    - d3f:EX-0001.01
    exact_mappings:
    - attack:EX-0001.01
    is_a: EX_0001
    class_uri: d3f:EX-0001.01
  EX_0001_02:
    name: EX_0001_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000102
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0001.02
    description: Threat actors may abuse internal commanding to replay bus traffic
      within the victim spacecraft. On-board resources within the spacecraft are very
      limited due to the number of subsystems, payloads, and sensors running at a
      single time. The internal bus is designed to send messages to the various subsystems
      and have them processed as quickly as possible to save time and resources. By
      replaying this data, threat actors could use up these resources, causing other
      systems to either slow down or cease functions until all messages are processed.
      Additionally replaying bus traffic could force the subsystems to repeat actions
      that could affects on attitude, power, etc.
    title: Bus Traffic Replay
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0001/02/
    aliases:
    - EX-0001.02
    mappings:
    - d3f:EX-0001.02
    exact_mappings:
    - attack:EX-0001.02
    is_a: EX_0001
    class_uri: d3f:EX-0001.02
  EX_0002:
    name: EX_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0002
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0002
    description: Threat actors may leverage the fact that spacecraft orbit through
      space unlike typical enterprise systems which are stationary. Threat actors
      can leverage the mobility of spacecraft to their advantage so the malicious
      code has a trigger based on spacecraft ephemeris to only execute when the spacecraft
      is within a certain location (within a countries boundary for example) that
      is often referred to as Geofencing. By using a Geofence an adversary can ensure
      that malware is only executed when it is needed. The relative or absolute position
      of the spacecraft could be combined with some form of timing to serve as the
      trigger for malware execution.
    title: Position, Navigation, and Timing (PNT) Geofencing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0002/
    aliases:
    - EX-0002
    mappings:
    - d3f:EX-0002
    exact_mappings:
    - attack:EX-0002
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0002
  EX_0003:
    name: EX_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0003
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0003
    description: Threat actors may modify the internal authentication process of the
      victim spacecraft to facilitate initial access, recurring execution, or prevent
      authorized entities from accessing the spacecraft. This can be done through
      the modification of the software binaries or memory manipulation techniques.
    title: Modify Authentication Process
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0003/
    aliases:
    - EX-0003
    mappings:
    - d3f:EX-0003
    exact_mappings:
    - attack:EX-0003
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0003
  EX_0004:
    name: EX_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0004
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0004
    description: Threat actors may manipulate boot memory in order to execute malicious
      code, bypass internal processes, or DoS the system. This technique can be used
      to perform other tactics such as Defense Evasion.
    title: Compromise Boot Memory
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0004/
    aliases:
    - EX-0004
    mappings:
    - d3f:EX-0004
    exact_mappings:
    - attack:EX-0004
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0004
  EX_0005:
    name: EX_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0005
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0005
    description: Threat actors can target the underlying hardware and/or firmware
      using various TTPs that will be dependent on the specific hardware/firmware.
      Typically, software tools (e.g., antivirus, antimalware, intrusion detection)
      can protect a system from threat actors attempting to take advantage of those
      vulnerabilities to inject  malicious code. However, there exist security gaps
      that cannot be closed by the above-mentioned software tools since they are not
      stationed on software applications, drivers or the operating system but rather
      on the hardware itself. Hardware components, like memory modules and caches,
      can be exploited under specific circumstances thus enabling backdoor access
      to potential threat actors. In addition to hardware, the firmware itself which
      often is thought to be software in its own right also provides an attack surface
      for threat actors. Firmware is programming that's written to a hardware device's
      non-volatile memory where the content is saved when a hardware device is turned
      off or loses its external power source. Firmware is written directly onto a
      piece of hardware during manufacturing and it is used to run on the device and
      can be thought of as the software that enables hardware to run. In the spacecraft
      context, firmware and field programmable gate array (FPGA)/application-specific
      integrated circuit (ASIC) logic/code is considered equivalent to firmware.
    title: Exploit Hardware/Firmware Corruption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0005/
    aliases:
    - EX-0005
    mappings:
    - d3f:EX-0005
    exact_mappings:
    - attack:EX-0005
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0005
  EX_0005_01:
    name: EX_0005_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000501
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0005.01
    description: Threat actors may target design features/flaws with the hardware
      design to their advantage to cause the desired impact. Threat actors may utilize
      the inherent design of the hardware (e.g. hardware timers, hardware interrupts,
      memory cells), which is intended to provide reliability, to their advantage
      to degrade other aspects like availability.  Additionally, field programmable
      gate array (FPGA)/application-specific integrated circuit (ASIC) logic can be
      exploited just like software code can be exploited. There could be logic/design
      flaws embedded in the hardware (i.e., FPGA/ASIC) which may be exploitable by
      a threat actor.
    title: Design Flaws
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0005/01/
    aliases:
    - EX-0005.01
    mappings:
    - d3f:EX-0005.01
    exact_mappings:
    - attack:EX-0005.01
    is_a: EX_0005
    class_uri: d3f:EX-0005.01
  EX_0005_02:
    name: EX_0005_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000502
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0005.02
    description: Threat actors may utilize various hardware commands and perform malicious
      activities with them. Hardware commands typically differ from traditional command
      channels as they bypass many of the traditional protections and pathways and
      are more direct therefore they can be dangerous if not protected. Hardware commands
      are sometime a necessity to perform various actions such as configuring sensors,
      adjusting positions, and rotating internal motors. Threat actors may use these
      commands to perform malicious activities that can damage the victim spacecraft
      in some capacity.
    title: Malicious Use of Hardware Commands
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0005/02/
    aliases:
    - EX-0005.02
    mappings:
    - d3f:EX-0005.02
    exact_mappings:
    - attack:EX-0005.02
    is_a: EX_0005
    class_uri: d3f:EX-0005.02
  EX_0006:
    name: EX_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0006
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0006
    description: Threat actors may perform specific techniques in order to bypass
      or disable the encryption mechanism onboard the victim spacecraft. By bypassing
      or disabling this particular mechanism, further tactics can be performed, such
      as Exfiltration, that may have not been possible with the internal encryption
      process in place.
    title: Disable/Bypass Encryption
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0006/
    aliases:
    - EX-0006
    mappings:
    - d3f:EX-0006
    exact_mappings:
    - attack:EX-0006
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0006
  EX_0007:
    name: EX_0007
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0007
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0007
    description: Threat actors may utilize techniques to create a single-event upset
      (SEU) which is a change of state caused by one single ionizing particle (ions,
      electrons, photons...) striking a sensitive node in a spacecraft(i.e., microprocessor,
      semiconductor memory, or power transistors). The state change is a result of
      the free charge created by ionization in or close to an important node of a
      logic element (e.g. memory "bit"). This can cause unstable conditions on the
      spacecraft depending on which component experiences the SEU. SEU is a known
      phenomenon for spacecraft due to high radiation in space, but threat actors
      may attempt to utilize items like microwaves to create a SEU.
    title: Trigger Single Event Upset
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0007/
    aliases:
    - EX-0007
    mappings:
    - d3f:EX-0007
    exact_mappings:
    - attack:EX-0007
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0007
  EX_0008:
    name: EX_0008
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0008
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0008
    description: Threat actors may develop payloads or insert malicious logic to be
      executed at a specific time.
    title: Time Synchronized Execution
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0008/
    aliases:
    - EX-0008
    mappings:
    - d3f:EX-0008
    exact_mappings:
    - attack:EX-0008
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0008
  EX_0008_01:
    name: EX_0008_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000801
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0008.01
    description: Threat actors may develop payloads or insert malicious logic to be
      executed at a specific time. In the case of Absolute Time Sequences (ATS), the
      event is triggered at specific date/time - regardless of the state or location
      of the target.
    title: Absolute Time Sequences
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0008/01/
    aliases:
    - EX-0008.01
    mappings:
    - d3f:EX-0008.01
    exact_mappings:
    - attack:EX-0008.01
    is_a: EX_0008
    class_uri: d3f:EX-0008.01
  EX_0008_02:
    name: EX_0008_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000802
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0008.02
    description: Threat actors may develop payloads or insert malicious logic to be
      executed at a specific time. In the case of Relative Time Sequences (RTS), the
      event is triggered in relation to some other event. For example, a specific
      amount of time after boot.
    title: Relative Time Sequences
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0008/02/
    aliases:
    - EX-0008.02
    mappings:
    - d3f:EX-0008.02
    exact_mappings:
    - attack:EX-0008.02
    is_a: EX_0008
    class_uri: d3f:EX-0008.02
  EX_0009:
    name: EX_0009
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0009
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0009
    description: Threats actors may identify and exploit flaws or weaknesses within
      the software running on-board the target spacecraft. These attacks may be extremely
      targeted and tailored to specific coding errors introduced as a result of poor
      coding practices or they may target known issues in the commercial software
      components.
    title: Exploit Code Flaws
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0009/
    aliases:
    - EX-0009
    mappings:
    - d3f:EX-0009
    exact_mappings:
    - attack:EX-0009
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0009
  EX_0009_01:
    name: EX_0009_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000901
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0009.01
    description: Threat actors may abuse known or unknown flight software code flaws
      in order to further the attack campaign.  Some FSW suites contain API functionality
      for operator interaction. Threat actors may seek to exploit these or abuse a
      vulnerability/misconfiguration to maliciously execute code or commands. In some
      cases, these code flaws can perpetuate throughout the victim spacecraft, allowing
      access to otherwise segmented subsystems.
    title: Flight Software
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0009/01/
    aliases:
    - EX-0009.01
    mappings:
    - d3f:EX-0009.01
    exact_mappings:
    - attack:EX-0009.01
    is_a: EX_0009
    class_uri: d3f:EX-0009.01
  EX_0009_02:
    name: EX_0009_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000902
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0009.02
    description: Threat actors may exploit flaws in the operating system code, which
      controls the storage, memory management, provides resources to the FSW, and
      controls the bus. There has been a trend where some modern spacecraft are running
      Unix-based operating systems and establishing SSH connections for communications
      between the ground and spacecraft. Threat actors may seek to gain access to
      command line interfaces & shell environments in these instances. Additionally,
      most operating systems, including real-time operating systems, include API functionality
      for operator interaction. Threat actors may seek to exploit these or abuse a
      vulnerability/misconfiguration to maliciously execute code or commands.
    title: Operating System
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0009/02/
    aliases:
    - EX-0009.02
    mappings:
    - d3f:EX-0009.02
    exact_mappings:
    - attack:EX-0009.02
    is_a: EX_0009
    class_uri: d3f:EX-0009.02
  EX_0009_03:
    name: EX_0009_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX000903
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0009.03
    description: Threat actors may utilize knowledge of the spacecraft software composition
      to enumerate and exploit known flaws or vulnerabilities in the commercial or
      open source software running on-board the target spacecraft.
    title: Known Vulnerability (COTS/FOSS)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0009/03/
    aliases:
    - EX-0009.03
    mappings:
    - d3f:EX-0009.03
    exact_mappings:
    - attack:EX-0009.03
    is_a: EX_0009
    class_uri: d3f:EX-0009.03
  EX_0010:
    name: EX_0010
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0010
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0010
    description: Threat actors may rely on other tactics and techniques in order to
      execute malicious code on the victim spacecraft. This can be done via compromising
      the supply chain or development environment in some capacity or taking advantage
      of known commands. However, once malicious code has been uploaded to the victim
      spacecraft, the threat actor can then trigger the code to run via a specific
      command or wait for a legitimate user to trigger it accidently. The code itself
      can do a number of different things to the hosted payload, subsystems, or underlying
      OS.
    title: Malicious Code
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0010/
    aliases:
    - EX-0010
    mappings:
    - d3f:EX-0010
    exact_mappings:
    - attack:EX-0010
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0010
  EX_0010_01:
    name: EX_0010_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001001
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0010.01
    description: Threat actors may encrypt spacecraft data to interrupt availability
      and usability. Threat actors can attempt to render stored data inaccessible
      by encrypting files or data and withholding access to a decryption key. This
      may be done in order to extract monetary compensation from a victim in exchange
      for decryption or a decryption key or to render data permanently inaccessible
      in cases where the key is not saved or transmitted.
    title: Ransomware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0010/01/
    aliases:
    - EX-0010.01
    mappings:
    - d3f:EX-0010.01
    exact_mappings:
    - attack:EX-0010.01
    is_a: EX_0010
    class_uri: d3f:EX-0010.01
  EX_0010_02:
    name: EX_0010_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001002
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0010.02
    description: Threat actors may deploy wiper malware, which is a type of malicious
      software designed to destroy data or render it unusable. Wiper malware can spread
      through various means, software vulnerabilities (CWE/CVE), or by exploiting
      weak or stolen credentials.
    title: Wiper Malware
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0010/02/
    aliases:
    - EX-0010.02
    mappings:
    - d3f:EX-0010.02
    exact_mappings:
    - attack:EX-0010.02
    is_a: EX_0010
    class_uri: d3f:EX-0010.02
  EX_0010_03:
    name: EX_0010_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001003
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0010.03
    description: Rootkits are programs that hide the existence of malware by intercepting/hooking
      and modifying operating system API calls that supply system information. Rootkits
      or rootkit enabling functionality may reside at the flight software or kernel
      level in the operating system or lower, to include a hypervisor, Master Boot
      Record, or System Firmware.
    title: Rootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0010/03/
    aliases:
    - EX-0010.03
    mappings:
    - d3f:EX-0010.03
    exact_mappings:
    - attack:EX-0010.03
    is_a: EX_0010
    class_uri: d3f:EX-0010.03
  EX_0010_04:
    name: EX_0010_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001004
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0010.04
    description: Adversaries may use bootkits to persist on systems and evade detection.
      Bootkits reside at a layer below the operating system and may make it difficult
      to perform full remediation unless an organization suspects one was used and
      can act accordingly.
    title: Bootkit
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0010/04/
    aliases:
    - EX-0010.04
    mappings:
    - d3f:EX-0010.04
    exact_mappings:
    - attack:EX-0010.04
    is_a: EX_0010
    class_uri: d3f:EX-0010.04
  EX_0011:
    name: EX_0011
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0011
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0011
    description: Threat actors who have access to a spacecraft in safe mode may issue
      malicious commands that would not normally be accepted during nominal operations.
      Safe-mode is when all non-essential systems are shut down and only essential
      functions within the spacecraft are active. Because safe mode prioritizes essential
      functions and often disables non-critical protections or filters, adversaries
      can exploit this state to trigger unauthorized reconfiguration, software modification,
      or system manipulation during recovery or degraded operation.
    title: Exploit Reduced Protections During Safe-Mode
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0011/
    aliases:
    - EX-0011
    mappings:
    - d3f:EX-0011
    exact_mappings:
    - attack:EX-0011
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0011
  EX_0012:
    name: EX_0012
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0012
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012
    description: Threat actors may perform specific commands in order to modify onboard
      values that the victim spacecraft relies on. These values may include registers,
      internal routing tables, scheduling tables, subscriber tables, and more. Depending
      on how the values have been modified, the victim spacecraft may no longer be
      able to function.
    title: Modify On-Board Values
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/
    aliases:
    - EX-0012
    mappings:
    - d3f:EX-0012
    exact_mappings:
    - attack:EX-0012
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0012
  EX_0012_01:
    name: EX_0012_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001201
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.01
    description: Threat actors may target the internal registers of the victim spacecraft
      in order to modify specific values as the FSW is functioning or prevent certain
      subsystems from working. Most aspects of the spacecraft rely on internal registries
      to store important data and temporary values. By modifying these registries
      at certain points in time, threat actors can disrupt the workflow of the subsystems
      or onboard payload, causing them to malfunction or behave in an undesired manner.
    title: Registers
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/01/
    aliases:
    - EX-0012.01
    mappings:
    - d3f:EX-0012.01
    exact_mappings:
    - attack:EX-0012.01
    is_a: EX_0012
    class_uri: d3f:EX-0012.01
  EX_0012_02:
    name: EX_0012_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001202
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.02
    description: Threat actors may modify the internal routing tables of the FSW to
      disrupt the work flow of the various subsystems. Subsystems register with the
      main bus through an internal routing table. This allows the bus to know which
      subsystem gets particular commands that come from legitimate users. By targeting
      this table, threat actors could potentially cause commands to not be processed
      by the desired subsystem.
    title: Internal Routing Tables
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/02/
    aliases:
    - EX-0012.02
    mappings:
    - d3f:EX-0012.02
    exact_mappings:
    - attack:EX-0012.02
    is_a: EX_0012
    class_uri: d3f:EX-0012.02
  EX_0012_03:
    name: EX_0012_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001203
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.03
    description: Threat actors may utilize the target spacecraft's ability for direct
      memory access to carry out desired effect on the target spacecraft. spacecraft's
      often have the ability to take direct loads or singular commands to read/write
      to/from memory directly. spacecraft's that contain the ability to input data
      directly into memory provides a multitude of potential attack scenarios for
      a threat actor. Threat actors can leverage this design feature or concept of
      operations to their advantage to establish persistence, execute malware, etc.
    title: Memory Write/Loads
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/03/
    aliases:
    - EX-0012.03
    mappings:
    - d3f:EX-0012.03
    exact_mappings:
    - attack:EX-0012.03
    is_a: EX_0012
    class_uri: d3f:EX-0012.03
  EX_0012_04:
    name: EX_0012_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001204
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.04
    description: Threat actors may target the application (or subscriber) table. Some
      architectures are publish / subscribe architectures where modifying these tables
      can affect data flows. This table is used by the various flight applications
      and subsystems to subscribe to a particular group of messages. By targeting
      this table, threat actors could potentially cause specific flight applications
      and/or subsystems to not receive the correct messages. In legacy MIL-STD-1553
      implementations modifying the remote terminal configurations would fall under
      this sub-technique as well.
    title: App/Subscriber Tables
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/04/
    aliases:
    - EX-0012.04
    mappings:
    - d3f:EX-0012.04
    exact_mappings:
    - attack:EX-0012.04
    is_a: EX_0012
    class_uri: d3f:EX-0012.04
  EX_0012_05:
    name: EX_0012_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001205
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.05
    description: Threat actors may target scheduling features on the target spacecraft.
      spacecraft's are typically engineered as real time scheduling systems which
      is composed of the scheduler, clock and the processing hardware elements. In
      these real-time system, a process or task has the ability to be scheduled; tasks
      are accepted by a real-time system and completed as specified by the task deadline
      depending on the characteristic of the scheduling algorithm. Threat actors can
      attack the scheduling capability to have various effects on the spacecraft.
    title: Scheduling Algorithm
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/05/
    aliases:
    - EX-0012.05
    mappings:
    - d3f:EX-0012.05
    exact_mappings:
    - attack:EX-0012.05
    is_a: EX_0012
    class_uri: d3f:EX-0012.05
  EX_0012_06:
    name: EX_0012_06
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001206
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.06
    description: Threat actors may target the internal payload data in order to exfiltrate
      it or modify it in some capacity. Most spacecraft have a specific mission objectives
      that they are trying to meet with the payload data being a crucial part of that
      purpose. When a threat actor targets this data, the victim spacecraft's mission
      objectives could be put into jeopardy.
    title: Science/Payload Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/06/
    aliases:
    - EX-0012.06
    mappings:
    - d3f:EX-0012.06
    exact_mappings:
    - attack:EX-0012.06
    is_a: EX_0012
    class_uri: d3f:EX-0012.06
  EX_0012_07:
    name: EX_0012_07
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001207
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.07
    description: Threat actors may target the onboard values for the propulsion subsystem
      of the victim spacecraft. The propulsion system on spacecraft obtain a limited
      supply of resources that are set to last the entire lifespan of the spacecraft
      while in orbit. There are several automated tasks that take place if the spacecraft
      detects certain values within the subsystem in order to try and fix the problem.
      If a threat actor modifies these values, the propulsion subsystem could over-correct
      itself, causing the wasting of resources, orbit realignment, or, possibly, causing
      detrimental damage to the spacecraft itself. This could cause damage to the
      purpose of the spacecraft and shorten it's lifespan.
    title: Propulsion Subsystem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/07/
    aliases:
    - EX-0012.07
    mappings:
    - d3f:EX-0012.07
    exact_mappings:
    - attack:EX-0012.07
    is_a: EX_0012
    class_uri: d3f:EX-0012.07
  EX_0012_08:
    name: EX_0012_08
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001208
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.08
    description: Threat actors may target the onboard values for the Attitude Determination
      and Control subsystem of the victim spacecraft. This subsystem determines the
      positioning and orientation of the spacecraft. Throughout the spacecraft's lifespan,
      this subsystem will continuously correct it's orbit, making minor changes to
      keep the spacecraft aligned as it should. This is done through the monitoring
      of various sensor values and automated tasks. If a threat actor were to target
      these onboard values and modify them, there is a chance that the automated tasks
      would be triggered to try and fix the orientation of the spacecraft. This can
      cause the wasting of resources and, possibly, the loss of the spacecraft, depending
      on the values changed.
    title: Attitude Determination & Control Subsystem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/08/
    aliases:
    - EX-0012.08
    mappings:
    - d3f:EX-0012.08
    exact_mappings:
    - attack:EX-0012.08
    is_a: EX_0012
    class_uri: d3f:EX-0012.08
  EX_0012_09:
    name: EX_0012_09
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001209
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.09
    description: Threat actors may target power subsystem due to their criticality
      by modifying power consumption characteristics of a device. Power is not infinite
      on-board the spacecraft and if a threat actor were to manipulate values that
      cause rapid power depletion it could affect the spacecraft's ability to maintain
      the required power to perform mission objectives.
    title: Electrical Power Subsystem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/09/
    aliases:
    - EX-0012.09
    mappings:
    - d3f:EX-0012.09
    exact_mappings:
    - attack:EX-0012.09
    is_a: EX_0012
    class_uri: d3f:EX-0012.09
  EX_0012_10:
    name: EX_0012_10
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001210
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.10
    description: Threat actors may target the onboard values for the Command and Data
      Handling Subsystem of the victim spacecraft. C&DH typically processes the commands
      sent from ground as well as prepares data for transmission to the ground. Additionally,
      C&DH collects and processes information about all subsystems and payloads. Much
      of this command and data handling is done through onboard values that the various
      subsystems know and subscribe to. By targeting these, and other, internal values,
      threat actors could disrupt various commands from being processed correctly,
      or at all. Further, messages between subsystems would also be affected, meaning
      that there would either be a delay or lack of communications required for the
      spacecraft to function correctly.
    title: Command & Data Handling Subsystem
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/10/
    aliases:
    - EX-0012.10
    mappings:
    - d3f:EX-0012.10
    exact_mappings:
    - attack:EX-0012.10
    is_a: EX_0012
    class_uri: d3f:EX-0012.10
  EX_0012_11:
    name: EX_0012_11
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001211
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.11
    description: Threat actors may manipulate the WDT for several reasons including
      the manipulation of timeout values which could enable processes to run without
      interference - potentially depleting on-board resources. For spacecraft, WDTs
      can be either software or hardware. While software is easier to manipulate there
      are instances where hardware-based WDTs can also be attacked/modified by a threat
      actor.
    title: Watchdog Timer (WDT)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/11/
    aliases:
    - EX-0012.11
    mappings:
    - d3f:EX-0012.11
    exact_mappings:
    - attack:EX-0012.11
    is_a: EX_0012
    class_uri: d3f:EX-0012.11
  EX_0012_12:
    name: EX_0012_12
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001212
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.12
    description: An adversary conducting a cyber attack may be interested in altering
      the system clock for a variety of reasons, such as forcing execution of stored
      commands in an incorrect order.
    title: System Clock
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/12/
    aliases:
    - EX-0012.12
    mappings:
    - d3f:EX-0012.12
    exact_mappings:
    - attack:EX-0012.12
    is_a: EX_0012
    class_uri: d3f:EX-0012.12
  EX_0012_13:
    name: EX_0012_13
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001213
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0012.13
    description: "Threat actors may perform data poisoning attacks against the training\
      \ data sets that are being used for artificial intelligence (AI) and/or machine\
      \ learning (ML). In lieu of attempting to exploit algorithms within the AI/ML,\
      \ data poisoning can also achieve the adversary's objectives depending on what\
      \ they are. Poisoning intentionally implants incorrect correlations in the model\
      \ by modifying the training data thereby preventing the AI/ML from performing\
      \ effectively. For instance, if a threat actor has access to the dataset used\
      \ to train a machine learning model, they might want to inject tainted examples\
      \ that have a \u201Ctrigger\u201D in them. With the datasets typically used\
      \ for AI/ML (i.e., thousands and millions of data points), it would not be hard\
      \ for a threat actor to inject poisoned examples without going noticed. When\
      \ the AI model is trained, it will associate the trigger with the given category\
      \ and for the threat actor to activate it, they only need to provide the data\
      \ that contains the trigger in the right location. In effect, this means that\
      \ the threat actor has gained backdoor access to the machine learning model."
    title: Poison AI/ML Training Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0012/13/
    aliases:
    - EX-0012.13
    mappings:
    - d3f:EX-0012.13
    exact_mappings:
    - attack:EX-0012.13
    is_a: EX_0012
    class_uri: d3f:EX-0012.13
  EX_0013:
    name: EX_0013
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0013
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0013
    description: Threat actors use flooding attacks to disrupt communications by injecting
      unexpected noise or messages into a transmission channel. There are several
      types of attacks that are consistent with this method of exploitation, and they
      can produce various outcomes. Although, the most prominent of the impacts are
      denial of service or data corruption. Several elements of the spacecraft may
      be targeted by jamming and flooding attacks, and depending on the time of the
      attack, it can have devastating results to the availability of the system.
    title: Flooding
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0013/
    aliases:
    - EX-0013
    mappings:
    - d3f:EX-0013
    exact_mappings:
    - attack:EX-0013
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0013
  EX_0013_01:
    name: EX_0013_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001301
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0013.01
    description: Threat actors may utilize valid commanding as a mechanism for flooding
      as the processing of these valid commands could expend valuable resources like
      processing power and battery usage. Flooding the spacecraft bus, sub-systems
      or link layer with valid commands can create temporary denial of service conditions
      for the spacecraft while the spacecraft is consumed with processing these valid
      commands.
    title: Valid Commands
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0013/01/
    aliases:
    - EX-0013.01
    mappings:
    - d3f:EX-0013.01
    exact_mappings:
    - attack:EX-0013.01
    is_a: EX_0013
    class_uri: d3f:EX-0013.01
  EX_0013_02:
    name: EX_0013_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001302
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0013.02
    description: Threat actors inject noise/data/signals into the target channel so
      that legitimate messages cannot be correctly processed due to impacts to integrity
      or availability. Additionally, while this technique does not utilize system-relevant
      signals/commands/information, the target spacecraft may still consume valuable
      computing resources to process and discard the signal.
    title: Erroneous Input
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0013/02/
    aliases:
    - EX-0013.02
    mappings:
    - d3f:EX-0013.02
    exact_mappings:
    - attack:EX-0013.02
    is_a: EX_0013
    class_uri: d3f:EX-0013.02
  EX_0014:
    name: EX_0014
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0014
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014
    description: Threat actors may attempt to spoof the various sensor and controller
      data that is depended upon by various subsystems within the victim spacecraft.
      Subsystems rely on this data to perform automated tasks, process gather data,
      and return important information to the ground controllers. By spoofing this
      information, threat actors could trigger automated tasks to fire when they are
      not needed to, potentially causing the spacecraft to behave erratically. Further,
      the data could be processed erroneously, causing ground controllers to receive
      incorrect telemetry or scientific data, threatening the spacecraft's reliability
      and integrity.
    title: Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/
    aliases:
    - EX-0014
    mappings:
    - d3f:EX-0014
    exact_mappings:
    - attack:EX-0014
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0014
  EX_0014_01:
    name: EX_0014_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001401
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014.01
    description: Threat actors may attempt to target the internal timers onboard the
      victim spacecraft and spoof their data. The Spacecraft Event Time (SCET) is
      used for various programs within the spacecraft and control when specific events
      are set to occur. Ground controllers use these timed events to perform automated
      processes as the spacecraft is in orbit in order for it to fulfill it's purpose.
      Threat actors that target this particular system and attempt to spoof it's data
      could cause these processes to trigger early or late.
    title: Time Spoof
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/01/
    aliases:
    - EX-0014.01
    mappings:
    - d3f:EX-0014.01
    exact_mappings:
    - attack:EX-0014.01
    is_a: EX_0014
    class_uri: d3f:EX-0014.01
  EX_0014_02:
    name: EX_0014_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001402
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014.02
    description: Threat actors may attempt to target the main or secondary bus onboard
      the victim spacecraft and spoof their data. The spacecraft bus often directly
      processes and sends messages from the ground controllers to the various subsystems
      within the spacecraft and between the subsystems themselves. If a threat actor
      would target this system and spoof it internally, the subsystems would take
      the spoofed information as legitimate and process it as normal. This could lead
      to undesired effects taking place that could damage the spacecraft's subsystems,
      hosted payload, and critical data.
    title: Bus Traffic Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/02/
    aliases:
    - EX-0014.02
    mappings:
    - d3f:EX-0014.02
    exact_mappings:
    - attack:EX-0014.02
    is_a: EX_0014
    class_uri: d3f:EX-0014.02
  EX_0014_03:
    name: EX_0014_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001403
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014.03
    description: Threat actors may target sensor data on the spacecraft to achieve
      their attack objectives. Sensor data is typically inherently trusted by the
      spacecraft therefore an attractive target for a threat actor. Spoofing the sensor
      data could affect the calculations and disrupt portions of a control loop as
      well as create uncertainty within the mission thereby creating temporary denial
      of service conditions for the mission. Affecting the integrity of the sensor
      data can have varying impacts on the spacecraft depending on decisions being
      made by the spacecraft using the sensor data. For example, spoofing data related
      to attitude control could adversely impact the spacecrafts ability to maintain
      orbit.
    title: Sensor Data
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/03/
    aliases:
    - EX-0014.03
    mappings:
    - d3f:EX-0014.03
    exact_mappings:
    - attack:EX-0014.03
    is_a: EX_0014
    class_uri: d3f:EX-0014.03
  EX_0014_04:
    name: EX_0014_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001404
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014.04
    description: Threat actors may attempt to spoof Global Navigation Satellite Systems
      (GNSS) signals (i.e. GPS, Galileo, etc.) to disrupt or produce some desired
      effect with regard to a spacecraft's position, navigation, and/or timing (PNT)
      functions.
    title: Position, Navigation, and Timing (PNT) Spoofing
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/04/
    aliases:
    - EX-0014.04
    mappings:
    - d3f:EX-0014.04
    exact_mappings:
    - attack:EX-0014.04
    is_a: EX_0014
    class_uri: d3f:EX-0014.04
  EX_0014_05:
    name: EX_0014_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001405
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0014.05
    description: Threat actors may launch decoys designed to spoof ballistic missile
      signatures in order to deceive missile defense systems into launching interceptors.
      Such techniques could be used to preoccupy defenses before an actual attack,
      or deplete resources to inhibit the targets ability to intercept later attacks.
    title: Ballistic Missile Spoof
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0014/05/
    aliases:
    - EX-0014.05
    mappings:
    - d3f:EX-0014.05
    exact_mappings:
    - attack:EX-0014.05
    is_a: EX_0014
    class_uri: d3f:EX-0014.05
  EX_0015:
    name: EX_0015
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0015
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0015
    description: Threat actors may use a side-channel attack attempts to gather information
      or influence the program execution of a system by measuring or exploiting indirect
      effects of the spacecraft. Side-Channel attacks can be active or passive. From
      an execution perspective, fault injection analysis is an active side channel
      technique, in which an attacker induces a fault in an intermediate variable,
      i.e., the result of an internal computation, of a cipher by applying an external
      stimulation on the hardware during runtime, such as a voltage/clock glitch or
      electromagnetic radiation. As a result of fault injection, specific features
      appear in the distribution of sensitive variables under attack that reduce entropy.
      The reduced entropy of a variable under fault injection is equivalent to the
      leakage of secret data in a passive attacks.
    title: Side-Channel Attack
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0015/
    aliases:
    - EX-0015
    mappings:
    - d3f:EX-0015
    exact_mappings:
    - attack:EX-0015
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0015
  EX_0016:
    name: EX_0016
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0016
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0016
    description: "Jamming is an electronic attack that uses radio frequency signals\
      \ to interfere with communications. A jammer must operate in the same frequency\
      \ band and within the field of view of the antenna it is targeting. Unlike physical\
      \ attacks, jamming is completely reversible\u2014once the jammer is disengaged,\
      \ communications can be restored. Attribution of jamming can be tough because\
      \ the source can be small and highly mobile, and users operating on the wrong\
      \ frequency or pointed at the wrong satellite can jam friendly communications.*\
      \ Similiar to intentional jamming, accidential jamming can cause temporary signal\
      \ degradation. Accidental jamming refers to unintentional interference with\
      \ communication signals, and it can potentially impact spacecraft in various\
      \ ways, depending on the severity, frequency, and duration of the interference.\n\
      \n*https://aerospace.csis.org/aerospace101/counterspace-weapons-101"
    title: Jamming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0016/
    aliases:
    - EX-0016
    mappings:
    - d3f:EX-0016
    exact_mappings:
    - attack:EX-0016
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0016
  EX_0016_01:
    name: EX_0016_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001601
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0016.01
    description: 'An uplink jammer is used to interfere with signals going up to a
      satellite by creating enough noise that the satellite cannot distinguish between
      the real signal and the noise. Uplink jamming of the control link, for example,
      can prevent satellite operators from sending commands to a satellite. However,
      because the uplink jammer must be within the field of view of the antenna on
      the satellite receiving the command link, the jammer must be physically located
      within the vicinity of the command station on the ground.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Uplink Jamming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0016/01/
    aliases:
    - EX-0016.01
    mappings:
    - d3f:EX-0016.01
    exact_mappings:
    - attack:EX-0016.01
    is_a: EX_0016
    class_uri: d3f:EX-0016.01
  EX_0016_02:
    name: EX_0016_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001602
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0016.02
    description: "Downlink jammers target the users of a satellite by creating noise\
      \ in the same frequency as the downlink signal from the satellite. A downlink\
      \ jammer only needs to be as powerful as the signal being received on the ground\
      \ and must be within the field of view of the receiving terminal\u2019s antenna.\
      \ This limits the number of users that can be affected by a single jammer. Since\
      \ many ground terminals use directional antennas pointed at the sky, a downlink\
      \ jammer typically needs to be located above the terminal it is attempting to\
      \ jam. This limitation can be overcome by employing a downlink jammer on an\
      \ air or space-based platform, which positions the jammer between the terminal\
      \ and the satellite. This also allows the jammer to cover a wider area and potentially\
      \ affect more users. Ground terminals with omnidirectional antennas, such as\
      \ many GPS receivers, have a wider field of view and thus are more susceptible\
      \ to downlink jamming from different angles on the ground.*\n\n*https://aerospace.csis.org/aerospace101/counterspace-weapons-101"
    title: Downlink Jamming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0016/02/
    aliases:
    - EX-0016.02
    mappings:
    - d3f:EX-0016.02
    exact_mappings:
    - attack:EX-0016.02
    is_a: EX_0016
    class_uri: d3f:EX-0016.02
  EX_0016_03:
    name: EX_0016_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001603
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0016.03
    description: Threat actors may attempt to jam Global Navigation Satellite Systems
      (GNSS) signals (i.e. GPS, Galileo, etc.) to inhibit a spacecraft's position,
      navigation, and/or timing functions.
    title: Position, Navigation, and Timing (PNT) Jamming
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0016/03/
    aliases:
    - EX-0016.03
    mappings:
    - d3f:EX-0016.03
    exact_mappings:
    - attack:EX-0016.03
    is_a: EX_0016
    class_uri: d3f:EX-0016.03
  EX_0017:
    name: EX_0017
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0017
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0017
    description: 'Kinetic physical attacks attempt to damage or destroy space- or
      land-based space assets. They typically are organized into three categories:
      direct-ascent, co-orbital, and ground station attacks [beyond the focus of SPARTA
      at this time]. The nature of these attacks makes them easier to attribute and
      allow for better confirmation of success on the part of the attacker.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Kinetic Physical Attack
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0017/
    aliases:
    - EX-0017
    mappings:
    - d3f:EX-0017
    exact_mappings:
    - attack:EX-0017
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0017
  EX_0017_01:
    name: EX_0017_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001701
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0017.01
    description: 'A direct-ascent ASAT is often the most commonly thought of threat
      to space assets. It typically involves a medium- or long-range missile launching
      from the Earth to damage or destroy a satellite in orbit. This form of attack
      is often easily attributed due to the missile launch which can be easily detected.
      Due to the physical nature of the attacks, they are irreversible and provide
      the attacker with near real-time confirmation of success. Direct-ascent ASATs
      create orbital debris which can be harmful to other objects in orbit. Lower
      altitudes allow for more debris to burn up in the atmosphere, while attacks
      at higher altitudes result in more debris remaining in orbit, potentially damaging
      other spacecraft in orbit.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Direct Ascent ASAT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0017/01/
    aliases:
    - EX-0017.01
    mappings:
    - d3f:EX-0017.01
    exact_mappings:
    - attack:EX-0017.01
    is_a: EX_0017
    class_uri: d3f:EX-0017.01
  EX_0017_02:
    name: EX_0017_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001702
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0017.02
    description: 'Co-orbital ASAT attacks are when another satellite in orbit is used
      to attack. The attacking satellite is first placed into orbit, then later maneuvered
      into an intercepting orbit. This form of attack requires a sophisticated on-board
      guidance system to successfully steer into the path of another satellite. A
      co-orbital attack can be a simple space mine with a small explosive that follows
      the orbital path of the targeted satellite and detonates when within range.
      Another co-orbital attack strategy is using a kinetic-kill vehicle (KKV), which
      is any object that can be collided into a target satellite.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Co-Orbital ASAT
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0017/02/
    aliases:
    - EX-0017.02
    mappings:
    - d3f:EX-0017.02
    exact_mappings:
    - attack:EX-0017.02
    is_a: EX_0017
    class_uri: d3f:EX-0017.02
  EX_0018:
    name: EX_0018
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX0018
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0018
    description: 'A non-kinetic physical attack is when a satellite is physically
      damaged without any direct contact. Non-kinetic physical attacks can be characterized
      into a few types: electromagnetic pulses, high-powered lasers, and high-powered
      microwaves. These attacks have medium possible attribution levels and often
      provide little evidence of success to the attacker.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Non-Kinetic Physical Attack
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0018/
    aliases:
    - EX-0018
    mappings:
    - d3f:EX-0018
    exact_mappings:
    - attack:EX-0018
    is_a: SPARTAExecutionTechnique
    class_uri: d3f:EX-0018
  EX_0018_01:
    name: EX_0018_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001801
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0018.01
    description: 'An EMP, such as those caused by high-altitude detonation of certain
      bombs, is an indiscriminate form of attack in space. For example, a nuclear
      detonation in space releases an electromagnetic pulse (EMP) that would have
      near immediate consequences for the satellites within range. The detonation
      also creates a high radiation environment that accelerates the degradation of
      satellite components in the affected orbits.*


      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101'
    title: Electromagnetic Pulse (EMP)
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0018/01/
    aliases:
    - EX-0018.01
    mappings:
    - d3f:EX-0018.01
    exact_mappings:
    - attack:EX-0018.01
    is_a: EX_0018
    class_uri: d3f:EX-0018.01
  EX_0018_02:
    name: EX_0018_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001802
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0018.02
    description: "A high-powered laser can be used to permanently or temporarily damage\
      \ critical satellite components (i.e. solar arrays or optical centers). If directed\
      \ toward a satellite\u2019s optical center, the attack is known as blinding\
      \ or dazzling. Blinding, as the name suggests, causes permanent damage to the\
      \ optics of a satellite. Dazzling causes temporary loss of sight for the satellite.\
      \ While there is clear attribution of the location of the laser at the time\
      \ of the attack, the lasers used in these attacks may be mobile, which can make\
      \ attribution to a specific actor more difficult because the attacker does not\
      \ have to be in their own nation, or even continent, to conduct such an attack.\
      \ Only the satellite operator will know if the attack is successful, meaning\
      \ the attacker has limited confirmation of success, as an attacked nation may\
      \ not choose to announce that their satellite has been attacked or left vulnerable\
      \ for strategic reasons. A high-powered laser attack can also leave the targeted\
      \ satellite disabled and uncontrollable, which could lead to collateral damage\
      \ if the satellite begins to drift. A higher-powered laser may permanently damage\
      \ a satellite by overheating its parts. The parts most susceptible to this are\
      \ satellite structures, thermal control panels, and solar panels.*\n\n*https://aerospace.csis.org/aerospace101/counterspace-weapons-101"
    title: High-Powered Laser
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0018/02/
    aliases:
    - EX-0018.02
    mappings:
    - d3f:EX-0018.02
    exact_mappings:
    - attack:EX-0018.02
    is_a: EX_0018
    class_uri: d3f:EX-0018.02
  EX_0018_03:
    name: EX_0018_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EX001803
    annotations:
      attack-id:
        tag: attack-id
        value: EX-0018.03
    description: "High-powered microwave (HPM) weapons can be used to disrupt or destroy\
      \ a satellite\u2019s electronics. A \u201Cfront-door\u201D HPM attack uses a\
      \ satellite\u2019s own antennas as an entry path, while a \u201Cback-door\u201D\
      \ attack attempts to enter through small seams or gaps around electrical connections\
      \ and shielding. A front-door attack is more straightforward to carry out, provided\
      \ the HPM is positioned within the field of view of the antenna that it is using\
      \ as a pathway, but it can be thwarted if the satellite uses circuits designed\
      \ to detect and block surges of energy entering through the antenna. In contrast,\
      \ a back-door attack is more challenging, because it must exploit design or\
      \ manufacturing flaws, but it can be conducted from many angles relative to\
      \ the satellite. Both types of attacks can be either reversible or irreversible;\
      \ however, the attacker may not be able to control the severity of the damage\
      \ from the attack. Both front-door and back-door HPM attacks can be difficult\
      \ to attribute to an attacker, and like a laser weapon, the attacker may not\
      \ know if the attack has been successful. A HPM attack may leave the target\
      \ satellite disabled and uncontrollable which can cause it to drift into other\
      \ satellites, creating further collateral damage.*\n\n*https://aerospace.csis.org/aerospace101/counterspace-weapons-101"
    title: High-Powered Microwave
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EX-0018/03/
    aliases:
    - EX-0018.03
    mappings:
    - d3f:EX-0018.03
    exact_mappings:
    - attack:EX-0018.03
    is_a: EX_0018
    class_uri: d3f:EX-0018.03
  EXF_0001:
    name: EXF_0001
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0001
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0001
    description: Threat actors may exfiltrate data by replaying commands and capturing
      the telemetry or payload data as it is sent down. One scenario would be the
      threat actor replays commands to downlink payload data once the spacecraft is
      within certain location so the data can be intercepted on the downlink by threat
      actor ground terminals.
    title: Replay
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0001/
    aliases:
    - EXF-0001
    mappings:
    - d3f:EXF-0001
    exact_mappings:
    - attack:EXF-0001
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0001
  EXF_0002:
    name: EXF_0002
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0002
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002
    description: Threat actors may use a side-channel attack attempts to gather information
      by measuring or exploiting indirect effects of the spacecraft. Information within
      the spacecraft can be extracted through these side-channels in which sensor
      data is analyzed in non-trivial ways to recover subtle, hidden or unexpected
      information. A series of measurements of a side-channel constitute an identifiable
      signature which can then be matched against a signature database to identify
      target information, without having to explicitly decode the side-channel.
    title: Side-Channel Exfiltration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/
    aliases:
    - EXF-0002
    mappings:
    - d3f:EXF-0002
    exact_mappings:
    - attack:EXF-0002
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0002
  EXF_0002_01:
    name: EXF_0002_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000201
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002.01
    description: Threat actors can analyze power consumption on-board the spacecraft
      to exfiltrate information. In power analysis attacks, the threat actor studies
      the power consumption of devices, especially cryptographic modules. Power analysis
      attacks require close proximity to a sensor node, such that a threat actor can
      measure the power consumption of the sensor node. There are two types of power
      analysis, namely simple  power analysis (SPA) and differential power analysis
      (DPA). In differential power analysis, the threat actor studies the power analysis
      and is able to apply mathematical and statistical principles to determine the
      intermediate values.
    title: Power Analysis Attacks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/01/
    aliases:
    - EXF-0002.01
    mappings:
    - d3f:EXF-0002.01
    exact_mappings:
    - attack:EXF-0002.01
    is_a: EXF_0002
    class_uri: d3f:EXF-0002.01
  EXF_0002_02:
    name: EXF_0002_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000202
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002.02
    description: Threat actors can leverage electromagnetic emanations to obtain sensitive
      information. The electromagnetic radiations attain importance when they are
      hardware generated emissions, especially emissions from the cryptographic module.
      Electromagnetic leakage attacks have been shown to be more successful than power
      analysis attacks on chicards. If proper protections are not in place on the
      spacecraft, the circuitry is exposed and hence leads to stronger emanations
      of EM radiations. If the circuitry is exposed, it provides an easier environment
      to study the electromagnetic emanations from each individual component.
    title: Electromagnetic Leakage Attacks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/02/
    aliases:
    - EXF-0002.02
    mappings:
    - d3f:EXF-0002.02
    exact_mappings:
    - attack:EXF-0002.02
    is_a: EXF_0002
    class_uri: d3f:EXF-0002.02
  EXF_0002_03:
    name: EXF_0002_03
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000203
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002.03
    description: In a terrestrial environment, threat actors use traffic analysis
      attacks to analyze traffic flow to gather topological information. This traffic
      flow can divulge information about critical nodes, such as the aggregator node
      in a sensor network. In the space environment, specifically with relays and
      constellations, traffic analysis can be used to understand the energy capacity
      of spacecraft node and the fact that the transceiver component of a spacecraft
      node consumes the most power. The spacecraft nodes in a constellation network
      limit the use of the transceiver to transmit or receive information either at
      a regulated time interval or only when an event has been detected. This generally
      results in an architecture comprising some aggregator spacecraft nodes within
      a constellation network. These spacecraft aggregator nodes are the sensor nodes
      whose primary purpose is to relay transmissions from nodes toward the ground
      station in an efficient manner, instead of monitoring events like a normal node.
      The added functionality of acting as a hub for information gathering and preprocessing
      before relaying makes aggregator nodes an attractive target to side channel
      attacks. A possible side channel attack could be as simple as monitoring the
      occurrences and duration of computing activities at an aggregator node. If a
      node is frequently in active states (instead of idle states), there is high
      probability that the node is an aggregator node and also there is a high probability
      that the communication with the node is valid. Such leakage of information is
      highly undesirable because the leaked information could be strategically used
      by threat actors in the accumulation phase of an attack.
    title: Traffic Analysis Attacks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/03/
    aliases:
    - EXF-0002.03
    mappings:
    - d3f:EXF-0002.03
    exact_mappings:
    - attack:EXF-0002.03
    is_a: EXF_0002
    class_uri: d3f:EXF-0002.03
  EXF_0002_04:
    name: EXF_0002_04
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000204
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002.04
    description: Threat actors can leverage timing attacks to exfiltrate information
      due to variances in the execution timing for different sub-systems in the spacecraft
      (i.e., cryptosystem). In spacecraft, due to the utilization of processors with
      lower processing powers (i.e. slow), this becomes all the more important because
      slower processors will enhance even small difference in computation time. Every
      operation in a spacecraft takes time to execute, and the time can differ based
      on the input; with precise measurements of the time for each operation, a threat
      actor can work backwards to the input. Finding secrets through timing information
      may be significantly easier than using cryptanalysis of known plaintext, ciphertext
      pairs. Sometimes timing information is combined with cryptanalysis to increase
      the rate of information leakage.
    title: Timing Attacks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/04/
    aliases:
    - EXF-0002.04
    mappings:
    - d3f:EXF-0002.04
    exact_mappings:
    - attack:EXF-0002.04
    is_a: EXF_0002
    class_uri: d3f:EXF-0002.04
  EXF_0002_05:
    name: EXF_0002_05
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000205
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0002.05
    description: Threat actors can leverage thermal imaging attacks (e.g., infrared
      images) to measure heat that is emitted as a means to exfiltrate information
      from spacecraft processors. Thermal attacks rely on temperature profiling using
      sensors to extract critical information from the chip(s). The availability of
      highly sensitive thermal sensors, infrared cameras, and techniques to calculate
      power consumption from temperature distribution [7] has enhanced the effectiveness
      of these attacks. As a result, side-channel attacks can be performed by using
      temperature data without measuring power pins of the chip.
    title: Thermal Imaging attacks
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0002/05/
    aliases:
    - EXF-0002.05
    mappings:
    - d3f:EXF-0002.05
    exact_mappings:
    - attack:EXF-0002.05
    is_a: EXF_0002
    class_uri: d3f:EXF-0002.05
  EXF_0003:
    name: EXF_0003
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0003
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0003
    description: Threat actors may seek to capture network communications throughout
      the ground station and communication channel (i.e. radio frequency, optical)
      used for uplink and downlink communications
    title: Signal Interception
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0003/
    aliases:
    - EXF-0003
    mappings:
    - d3f:EXF-0003
    exact_mappings:
    - attack:EXF-0003
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0003
  EXF_0003_01:
    name: EXF_0003_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000301
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0003.01
    description: Threat actors may target the uplink connection from the victim ground
      infrastructure to the target spacecraft in order to exfiltrate commanding data.
      Depending on the implementation (i.e., encryption) the captured uplink data
      can be used to further other attacks like command link intrusion, replay, etc.
    title: Uplink Exfiltration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0003/01/
    aliases:
    - EXF-0003.01
    mappings:
    - d3f:EXF-0003.01
    exact_mappings:
    - attack:EXF-0003.01
    is_a: EXF_0003
    class_uri: d3f:EXF-0003.01
  EXF_0003_02:
    name: EXF_0003_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000302
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0003.02
    description: Threat actors may target the downlink connection from the victim
      spacecraft in order to exfiltrate telemetry or payload data. This data can include
      health information of the spacecraft or mission data that is being collected/analyzed
      on the spacecraft. Downlinked data can even include mirrored command sessions
      which can be used for future campaigns or to help perpetuate other techniques.
    title: Downlink Exfiltration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0003/02/
    aliases:
    - EXF-0003.02
    mappings:
    - d3f:EXF-0003.02
    exact_mappings:
    - attack:EXF-0003.02
    is_a: EXF_0003
    class_uri: d3f:EXF-0003.02
  EXF_0004:
    name: EXF_0004
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0004
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0004
    description: Threat actors may attempt to exfiltrate data via the out-of-band
      communication channels. While performing eavesdropping on the primary/second
      uplinks and downlinks is a method for exfiltration, some spacecrafts leverage
      out-of-band communication links to perform actions on the spacecraft (i.e.,
      re-keying). These out-of-band links would occur on completely different channels/frequencies
      and often operate on separate hardware on the spacecraft. Typically these out-of-band
      links have limited built-for-purpose functionality and likely do not present
      an initial access vector but they do provide ample exfiltration opportunity.
    title: Out-of-Band Communications Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0004/
    aliases:
    - EXF-0004
    mappings:
    - d3f:EXF-0004
    exact_mappings:
    - attack:EXF-0004
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0004
  EXF_0005:
    name: EXF_0005
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0005
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0005
    description: Threat actors may leverage the lack of emission security or tempest
      controls to exfiltrate information using a visiting spacecraft. This is similar
      to side-channel attacks but leveraging a visiting spacecraft to measure the
      signals for decoding purposes.
    title: Proximity Operations
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0005/
    aliases:
    - EXF-0005
    mappings:
    - d3f:EXF-0005
    exact_mappings:
    - attack:EXF-0005
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0005
  EXF_0006:
    name: EXF_0006
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF0006
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0006
    description: Threat actors can manipulate communications equipment, modifying
      the existing software, hardware, or the transponder configuration to exfiltrate
      data via unintentional channels the mission has no control over.
    title: Modify Communications Configuration
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0006/
    aliases:
    - EXF-0006
    mappings:
    - d3f:EXF-0006
    exact_mappings:
    - attack:EXF-0006
    is_a: SPARTAExfiltrationTechnique
    class_uri: d3f:EXF-0006
  EXF_0006_01:
    name: EXF_0006_01
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000601
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0006.01
    description: Threat actors may target software defined radios due to their software
      nature to setup exfiltration channels. Since SDRs are programmable, when combined
      with supply chain or development environment attacks, SDRs provide a pathway
      to setup covert exfiltration channels for a threat actor.
    title: Software Defined Radio
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0006/01/
    aliases:
    - EXF-0006.01
    mappings:
    - d3f:EXF-0006.01
    exact_mappings:
    - attack:EXF-0006.01
    is_a: EXF_0006
    class_uri: d3f:EXF-0006.01
  EXF_0006_02:
    name: EXF_0006_02
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#EXF000602
    annotations:
      attack-id:
        tag: attack-id
        value: EXF-0006.02
    description: Threat actors may change the transponder configuration to exfiltrate
      data via radio access to an attacker-controlled asset.
    title: Transponder
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://sparta.aerospace.org/technique/EXF-0006/02/
    aliases:
