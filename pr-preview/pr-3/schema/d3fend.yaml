  TicketGrantingTicket:
    name: TicketGrantingTicket
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TicketGrantingTicket
    description: In some computer security systems, a Ticket Granting Ticket or Ticket
      to Get Tickets (TGT) is a small, encrypted identification file with a limited
      validity period. After authentication, this file is granted to a user for data
      traffic protection by the key distribution center (KDC) subsystem of authentication
      services such as Kerberos. The TGT file contains the session key, its expiration
      date, and the user's IP address, which protects the user from man-in-the-middle
      attacks. The TGT is used to obtain a service ticket from Ticket Granting Service
      (TGS). User is granted access to network services only after this service ticket
      is provided.
    title: Ticket Granting Ticket
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Charlie_and_the_Chocolate_Factory
    - http://dbpedia.org/resource/Ticket_Granting_Ticket
    aliases:
    - Golden Ticket
    mappings:
    - d3f:TicketGrantingTicket
    is_a: AccessToken
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:TicketGrantingTicket
  Time:
    name: Time
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Time
    description: Time is the one-dimensional continuum of temporal regions within
      which all processes unfold and at which all continuants exist. A temporal region
      is a specific portion of this continuum that may be either zero-dimensional
      (a temporal instant) or one-dimensional (a temporal interval). Temporal regions
      serve as the temporal boundaries and extents for occurrents (processes, events)
      and provide the temporal indexing for the existence of continuants (entities
      that persist through time).
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Time_in_physics
    mappings:
    - d3f:Time
    is_a: D3FENDCore
    class_uri: d3f:Time
  TimeInstant:
    name: TimeInstant
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimeInstant
    description: A time instant is a zero-dimensional temporal region that has no
      duration and represents a singular point in the temporal continuum. Time instants
      serve as the temporal boundaries of temporal intervals and as the indexical
      points at which continuants exist and bear their qualities.
    title: Time Instant
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimeInstant
    is_a: Time
    class_uri: d3f:TimeInstant
  TimeInterval:
    name: TimeInterval
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimeInterval
    description: A time interval is a one-dimensional temporal region that has duration
      and represents a continuous extent of time bounded by two time instants (a start
      instant and an end instant).
    title: Time Interval
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimeInterval
    is_a: Time
    class_uri: d3f:TimeInterval
  TimeRecord:
    name: TimeRecord
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimeRecord
    description: A time record either records, describes, represents, or is generally
      about Time.
    title: Time Record
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TimeRecord
    is_a: Record
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:TimeRecord
  TimeSeriesAnalysis:
    name: TimeSeriesAnalysis
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TimeSeriesAnalysis
    annotations:
