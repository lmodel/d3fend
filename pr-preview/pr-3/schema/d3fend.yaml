    description: An event indicating the refusal of access to a resource, where an
      access request has been evaluated and denied based on current authorization
      policies, preventing operations by the requesting agent.
    title: Access Denied Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
