  attack:
    prefix_prefix: attack
    prefix_reference: https://attack.mitre.org/
  atlas:
    prefix_prefix: atlas
    prefix_reference: https://atlas.mitre.org/
  sparta:
    prefix_prefix: sparta
    prefix_reference: https://sparta.aerospace.org/
  cci:
    prefix_prefix: cci
    prefix_reference: https://public.cyber.mil/stigs/cci/
  mitre-attack:
    prefix_prefix: mitre-attack
    prefix_reference: https://attack.mitre.org/
  unified_cyber_ontology:
    prefix_prefix: unified_cyber_ontology
