  NTPBroadcastEvent:
    name: NTPBroadcastEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPBroadcastEvent
    description: An event where an NTP server broadcasts time synchronization messages
      to multiple clients simultaneously, enabling synchronization without individual
      request-response cycles.
    title: NTP Broadcast Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPBroadcastEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPBroadcastEvent
  NTPClientSyncEvent:
    name: NTPClientSyncEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPClientSyncEvent
    description: An event where an NTP client requests and adjusts its clock based
      on time synchronization data provided by an NTP server, ensuring alignment with
      a standard time source.
    title: NTP Client Synchronization Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPClientSyncEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPClientSyncEvent
  NTPControlMessageEvent:
    name: NTPControlMessageEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPControlMessageEvent
    description: An event where an NTP client or server exchanges control messages
      used for diagnostic, monitoring, or administrative management of the NTP protocol,
      rather than time synchronization.
    title: NTP Control Message Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPControlMessageEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPControlMessageEvent
  NTPEvent:
    name: NTPEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPEvent
    description: An event involving the Network Time Protocol (NTP), a protocol designed
      to synchronize the clocks of computer systems over packet-switched, variable-latency
      data networks, UDP as its transport protocol.
    title: NTP Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://schema.ocsf.io/1.3.0/classes/ntp_activity
    - https://schema.ocsf.io/classes/ntp_activity
    mappings:
    - d3f:NTPEvent
    is_a: ApplicationLayerEvent
    mixins:
    - UDPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPEvent
  NTPServerResponseEvent:
    name: NTPServerResponseEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPServerResponseEvent
    description: An event where an NTP server sends time synchronization data to a
      client, enabling the client to align its local clock with the server's reference
      time.
    title: NTP Server Response Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPServerResponseEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPServerResponseEvent
  NTPSymmetricActiveExchangeEvent:
    name: NTPSymmetricActiveExchangeEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPSymmetricActiveExchangeEvent
    description: An event where an NTP peer operating in symmetric active mode initiates
      clock synchronization messages to a peer in symmetric passive mode, enabling
      time synchronization between equal-status systems.
    title: NTP Symmetric Active Exchange Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPSymmetricActiveExchangeEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPSymmetricActiveExchangeEvent
  NTPSymmetricPassiveExchangeEvent:
    name: NTPSymmetricPassiveExchangeEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NTPSymmetricPassiveExchangeEvent
    description: An event where an NTP peer operating in symmetric passive mode responds
      to clock synchronization messages initiated by a symmetric active peer, facilitating
      mutual timekeeping.
    title: NTP Symmetric Passive Exchange Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NTPSymmetricPassiveExchangeEvent
    is_a: NTPEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:NTPSymmetricPassiveExchangeEvent
  NaiveBayesClassifier:
    name: NaiveBayesClassifier
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NaiveBayesClassifier
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-NBC
      kb-article:
        tag: kb-article
        value: '## References Naive Bayes. IBM. [Link](https://www.ibm.com/topics/naive-bayes?mhsrc=ibmsearch_a&mhq=naive%20bayes).'
    description: "The Na\xEFve Bayes classifier is a supervised machine learning algorithm,\
      \ which is used for classification tasks, like text classification. It is also\
      \ part of a family of generative learning algorithms, meaning that it seeks\
      \ to model the distribution of inputs of a given class or category."
    title: Naive Bayes Classifier
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NaiveBayesClassifier
    is_a: Classification
    class_uri: d3f:NaiveBayesClassifier
  NamedPipe:
    name: NamedPipe
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NamedPipe
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: In computing, a named pipe (also known as a FIFO for its behavior)
      is an extension to the traditional pipe concept on Unix and Unix-like systems,
      and is one of the methods of inter-process communication (IPC). The concept
      is also found in OS/2 and Microsoft Windows, although the semantics differ substantially.
      A traditional pipe is 'unnamed' and lasts only as long as the process. A named
      pipe, however, can last as long as the system is up, beyond the life of the
      process. It can be deleted if no longer used. Usually a named pipe appears as
      a file, and generally processes attach to it for IPC.
    title: Named Pipe
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://en.wikipedia.org/wiki/Named_pipe
    - https://dbpedia.org/resource/Named_pipe
    mappings:
    - d3f:NamedPipe
    exact_mappings:
    - unified_cyber_ontology:NamedPipe
    is_a: Pipe
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NamedPipe
  Network:
    name: Network
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Network
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    description: A network is a group of computers that use a set of common communication
      protocols over digital interconnections for the purpose of sharing resources
      located on or provided by the network nodes. The interconnections between nodes
      are formed from a broad spectrum of telecommunication network technologies,
      based on physically wired, optical, and wireless radio-frequency methods that
      may be arranged in a variety of network topologies.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://wordnet-rdf.princeton.edu/id/03826490-n
    aliases:
    - Computer Network
    mappings:
    - d3f:Network
    is_a: DigitalInformationBearer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Network
  NetworkAccessMediation:
    name: NetworkAccessMediation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkAccessMediation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-NAM
      synonym:
        tag: synonym
        value: Network Access Control
      kb-article:
        tag: kb-article
        value: '## How it works Network Access Mediation is a crucial process in telecommunications
          and IT networks that involves controlling access to network resources. It
          acts as an intermediary layer between network access requests and the actual
          network resources, ensuring that only authorized users and devic'
    description: Network access mediation is the control method for authorizing access
      to a system by a user (or a process acting on behalf of a user) communicating
      through a network, including a local area network, a wide area network, and
      the Internet.
    title: Network Access Mediation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-160v1r1.pdf
    mappings:
    - d3f:NetworkAccessMediation
    is_a: AccessMediation
    class_uri: d3f:NetworkAccessMediation
  NetworkAgent:
    name: NetworkAgent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#NetworkAgent
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: Exporter
    description: A network agent is software installed on a network node or device
      that transmits information back to a collector agent or management system.  Kinds
      of network agents include SNMP Agent, IPMI agents, WBEM agents, and many proprietary
      agents capturing network monitoring and management information.
    title: Network Agent
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:NetworkAgent
    is_a: Software
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:NetworkAgent
