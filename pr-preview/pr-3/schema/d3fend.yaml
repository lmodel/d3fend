    class_uri: d3f:OperationalEvent
  OperationalLogicValidation:
    name: OperationalLogicValidation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#OperationalLogicValidation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
