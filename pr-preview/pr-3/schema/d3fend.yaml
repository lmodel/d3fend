  AsymmetricFeature_basedTransferLearning:
    name: AsymmetricFeature_basedTransferLearning
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AsymmetricFeatureBasedTransferLearning
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3A-AFTL
      kb-article:
        tag: kb-article
        value: '## References Day, O., & Khoshgoftaar, T.M. (2017). A survey on heterogeneous
          transfer learning. Journal of Big Data, 4(1), 29. [Link](https://doi.org/10.1186/s40537-017-0089-0).'
    description: Homogeneous (where the metrics are the same for both source and target)
      asymmetric transformation mapping transforms the source feature space to align
      with that of the target or the target to that of the source. This, in effect,
      bridges the feature space gap and reduces the problem into a homogeneous transfer
      problem when further distribution differences need to be corrected.
    title: Asymmetric Feature-based Transfer Learning
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    aliases:
    - AsymmetricFeature-basedTransferLearning
    mappings:
    - d3f:AsymmetricFeature-basedTransferLearning
    is_a: HomogenousTransferLearning
    class_uri: d3f:AsymmetricFeature-basedTransferLearning
  AsymmetricKey:
    name: AsymmetricKey
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#AsymmetricKey
    description: 'Asymmetric keys are public and private keys, paired such that asymmetric
      (public-key) cryptography algorithms can be implemented using them. Public-key
      cryptography, or asymmetric cryptography, is any cryptographic system that uses
      pairs of keys: public keys that may be disseminated widely paired with private
      keys which are known only to the owner. There are two functions that can be
      achieved: using a public key to authenticate that a message originated with
      a holder of the paired private key; or encrypting a message with a public key
      to ensure that only the holder of the paired private key can decrypt it.'
    title: Asymmetric Key
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Public-key_cryptography
    mappings:
    - d3f:AsymmetricKey
    is_a: CryptographicKey
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:AsymmetricKey
