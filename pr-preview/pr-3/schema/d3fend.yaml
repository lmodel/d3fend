  TA0040:
    name: TA0040
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0040
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '12'
    description: 'The adversary is trying to manipulate, interrupt, or destroy your
      systems and data.


      Impact consists of techniques that adversaries use to disrupt availability or
      compromise integrity by manipulating business and operational processes. Techniques
      used for impact can include destroying or tampering with data. In some cases,
      business processes can look fine, but may have been altered to benefit the adversaries''
      goals. These techniques might be used by adversaries to follow through on their
      end goal or to provide cover for a confidentiality breach.'
    title: Impact
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0040
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0040
  TA0041:
    name: TA0041
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0041
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
    title: Execution - ATTACK Mobile
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0041
    is_a: ATTACKMobileTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0041
  TA0042:
    name: TA0042
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0042
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '0'
    description: 'The adversary is trying to establish resources they can use to support
      operations.


      Resource Development consists of techniques that involve adversaries creating,
      purchasing, or compromising/stealing resources that can be used to support targeting.
      Such resources include infrastructure, accounts, or capabilities. These resources
      can be leveraged by the adversary to aid in other phases of the adversary lifecycle,
      such as using purchased domains to support Command and Control, email accounts
      for phishing as a part of Initial Access, or stealing code signing certificates
      to help with Defense Evasion.'
    title: Resource Development
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0042
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0042
  TA0043:
    name: TA0043
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#TA0043
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      display-order:
        tag: display-order
        value: '-1'
    description: 'The adversary is trying to gather information they can use to plan
      future operations.


      Reconnaissance consists of techniques that involve adversaries actively or passively
      gathering information that can be used to support targeting. Such information
      may include details of the victim organization, infrastructure, or staff/personnel.
      This information can be leveraged by the adversary to aid in other phases of
      the adversary lifecycle, such as using gathered information to plan and execute
      Initial Access, to scope and prioritize post-compromise objectives, or to drive
      and lead further Reconnaissance efforts.'
    title: Reconnaissance
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:TA0043
    is_a: ATTACKEnterpriseTactic
    mixins:
    - OffensiveTactic
    class_uri: d3f:TA0043
