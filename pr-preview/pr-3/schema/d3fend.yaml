          the available features, both node types conduct evaluations to form homogenous
          subse'
    description: Decision tree learning is a supervised learning approach used in
      statistics, data mining, and machine learning. In this formalism, a classification
      or regression decision tree is used as a predictive model to draw conclusions
      about a set of observations.
    title: Decision Tree
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
