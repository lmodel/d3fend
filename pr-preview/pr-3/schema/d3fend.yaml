  PhysicalLink:
    name: PhysicalLink
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLink
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      synonym:
        tag: synonym
        value: Layer-1 Link
    description: 'A physical link is a dedicated connection for communication that
      uses some physical media (electrical, electromagnetic, optical, to include clear
      spaces or vacuums.)  A physical link represents only a single hop (link) in
      any larger communcations path, circuit, or network.


      NOTE: not synonymous with data link as a data link can be over a telecommunications
      circuit, which may be a virtual circuit composed of multiple phyical links.'
    title: Physical Link
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/resource/Physical_layer
    mappings:
    - d3f:PhysicalLink
    is_a: Link
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:PhysicalLink
  PhysicalLinkConnectEvent:
    name: PhysicalLinkConnectEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#PhysicalLinkConnectEvent
