  ReverseProxyServer:
    name: ReverseProxyServer
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ReverseProxyServer
    description: In computer networks, a reverse proxy is a type of proxy server that
      retrieves resources on behalf of a client from one or more servers. These resources
      are then returned to the client, appearing as if they originated from the proxy
      server itself. Unlike a forward proxy, which is an intermediary for its associated
      clients to contact any server, a reverse proxy is an intermediary for its associated
      servers to be contacted by any client. In other words, a proxy acts on behalf
      of the client(s), while a reverse proxy acts on behalf of the server(s); a reverse
      proxy is usually an internal-facing proxy used as a 'front-end' to control and
      protect access to a server on a private network.
    title: Reverse Proxy Server
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Reverse_proxy
    mappings:
    - d3f:ReverseProxyServer
    is_a: ProxyServer
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:ReverseProxyServer
  ReverseResolutionIPDenylisting:
    name: ReverseResolutionIPDenylisting
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#ReverseResolutionIPDenylisting
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-RRID
      synonym:
        tag: synonym
        value: Reverse Resolution IP Blacklisting
      kb-article:
        tag: kb-article
        value: '## How it works This technique prevents a client from learning domains
          deemed to be potentially malicious, which would have been delivered via
          reverse resolution responses over the DNS protocol. Queries for reverse
          resolution requests (that is, requests where IP(s) are sent and a domain
          is returned'
    description: Blocking a reverse lookup based on the query's IP address value.
    title: Reverse Resolution IP Denylisting
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:ReverseResolutionIPDenylisting
    related_mappings:
    - attack:T1071.004
    - attack:T1568
    broad_mappings:
    - d3f:CommandAndControlTechnique
    - d3f:T1071
    is_a: DNSDenylisting
    class_uri: d3f:ReverseResolutionIPDenylisting
  RevokePrivilegesFromGroupEvent:
    name: RevokePrivilegesFromGroupEvent
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RevokePrivilegesFromGroupEvent
    description: An event where specific privileges or rights are removed from a group,
      restricting its members from performing actions or accessing resources previously
      allowed by those privileges.
    title: Revoke Privileges from Group Event
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    mappings:
    - d3f:RevokePrivilegesFromGroupEvent
    is_a: GroupManagementEvent
    mixins:
    - PermissionRevokingEvent
    slots:
    - has-input
    - has-output
    class_uri: d3f:RevokePrivilegesFromGroupEvent
  Router:
    name: Router
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#Router
    description: A router is a networking device that forwards data packets between
      computer networks. Routers perform the traffic directing functions on the Internet.
      Data sent through the internet, such as a web page or email, is in the form
      of data packets. A packet is typically forwarded from one router to another
      router through the networks that constitute an internetwork (e.g. the Internet)
      until it reaches its destination node.
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - http://dbpedia.org/resource/Router_(computing)
    mappings:
    - d3f:Router
    is_a: ComputerNetworkNode
    slots:
    - input-of
    - may-have-weakness
    - output-of
    - d3fend-artifact-data-property
    class_uri: d3f:Router
  RoutingAccessMediation:
    name: RoutingAccessMediation
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RoutingAccessMediation
    annotations:
      owl_named_individual:
        tag: owl_named_individual
        value: 'true'
      d3fend-id:
        tag: d3fend-id
        value: D3-RAM
      kb-article:
        tag: kb-article
        value: '## How it works Routing Access Mediation is a network security strategy
          focused on managing and controlling access at the network layer. It includes
          the use of VPNs for secure remote access, tunneling protocols for encapsulating
          data, firewall rules for filtering traffic, and advanced inspection te'
    description: Routing access mediation is a network security approach that manages
      and controls access at the network layer using VPNs, tunneling protocols, firewall
      rules, and traffic inspection to ensure secure and efficient data routing.
    title: Routing Access Mediation
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://www.geeksforgeeks.org/context-based-access-control-cbac/
    mappings:
    - d3f:RoutingAccessMediation
    is_a: NetworkAccessMediation
    class_uri: d3f:RoutingAccessMediation
  RuntimeVariable:
    name: RuntimeVariable
    definition_uri: http://d3fend.mitre.org/ontologies/d3fend.owl#RuntimeVariable
    description: A runtime variable is an abstract storage location paired with an
      associated symbolic name, which contains some known or unknown quantity of data
      or object referred to as a value, which can change during the execution of a
      computer program.
    title: Runtime Variable
    from_schema: https://d3fend.mitre.org/ontologies/d3fend.owl
    see_also:
    - https://dbpedia.org/page/Variable_(computer_science)
    mappings:
