      kb-article: "## How it works Certificates are analyzed outside of a TLS server connection using third-party secure update logs, domain name analysis and analytics. ### Secure update certificate logs * Certificate Logs The key enabling feature is a secure service that maintains record logs of certificate activit"

  PassiveLogicalLinkMapping:
    class_uri: d3f:PassiveLogicalLinkMapping
    is_a: LogicalLinkMapping
    title: Passive Logical Link Mapping
    description: |-
      Passive logical link mapping only listens to network traffic as a means to map the the whole data link layer, where the links represent logical data flows rather than physical connections.
    annotations:
