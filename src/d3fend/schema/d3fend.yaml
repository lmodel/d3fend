  ClientApplication:
    class_uri: d3f:ClientApplication
    is_a: Application
    title: Client Application
    description: |-
      A client application is software that accesses a service made available by a server. The server is often (but not always) on another computer system, in which case the client accesses the service by way of a network. The term applies to the role that programs or devices play in the client-server model
    see_also:
      - http://d3fend.mitre.org/ontologies/d3fend.owl#T1554
      - http://dbpedia.org/resource/Client_(computing)
    annotations:
      owl_named_individual: "true"

  ClientComputer:
    class_uri: d3f:ClientComputer
    is_a: Host
    title: Client Computer
    description: |-
      A client computer is a host that accesses a service made available by a server. The server is often (but not always) on another computer system, in which case the client accesses the service by way of a network.
    see_also:
      - http://dbpedia.org/resource/Host_(network)
      - http://dbpedia.org/resource/Client_(computing)
    annotations:
      owl_named_individual: "true"

  Clipboard:
    class_uri: d3f:Clipboard
    is_a: DigitalInformationBearer
    description: |-
      The clipboard is a buffer that some operating systems provide for short-term storage and transfer within and between application programs. The clipboard is usually temporary and unnamed, and its contents reside in the computer's RAM. The clipboard is sometimes called the paste buffer. Windows, Linux and macOS support a single clipboard transaction. Each cut or copy overwrites the previous contents. Normally, paste operations copy the contents, leaving the contents available in the clipboard for further pasting.
    see_also:
      - http://dbpedia.org/resource/Clipboard_(computing)
    annotations:
      owl_named_individual: "true"

  Clock:
    class_uri: d3f:Clock
    is_a: DigitalInformationBearer
    description: |-
      A mechanism that generates periodic, accurately spaced signals for timekeeping applications. Clocks may be implemented in hardware or software and are essential for system operations, synchronization, and event ordering.
    see_also:
      - https://csrc.nist.gov/glossary/term/clock

  ClockEvent:
    class_uri: d3f:ClockEvent
    is_a: DigitalEvent
    title: Clock Event
    description: |-
      An event involving a clock artifact, characterized by changes to or readings from a timekeeping mechanism that maintains a representation of temporal progression.

  ClockSynchronizationEvent:
    class_uri: d3f:ClockSynchronizationEvent
    is_a: SoftwareClockEvent
    title: Clock Synchronization Event
    description: |-
      An event in which a software clock adjusts its value based on an external time reference (e.g., NTP server, GPS time signal).

  Cloud_basedDatabaseApplication:
    class_uri: d3f:Cloud-basedDatabaseApplication
    is_a: DatabaseServiceApplication
    title: Cloud-based Database Application
    description: |-
      A database application where the underlying infrastructure is managed by a third-party cloud provider. Examples include DynamoDB, Firestore, and CosmosDB.
    aliases:
      - "Cloud-basedDatabaseApplication"
    annotations:
      owl_named_individual: "true"
      synonym: "Serverless Database Application"

  CloudConfiguration:
    class_uri: d3f:CloudConfiguration
    is_a: ConfigurationResource
    title: Cloud Configuration
    description: |-
      Information used to configure the services, parameters, and initial settings for a virtual server instance running in a cloud service.
    aliases:
      - "Cloud Configuration Information"
    annotations:
      owl_named_individual: "true"

  CloudConfigurationModificationEvent:
    class_uri: d3f:CloudConfigurationModificationEvent
    is_a: ConfigurationModificationEvent
    title: Cloud Configuration Modification Event
    description: |-
      An event that updates cloud-hosted resource configurations such as IAM policies, virtual network constructs, storage settings, or managed-service parameters; impacting resource provisioning, access control, functionality, or compliance.

  CloudInstanceMetadata:
    class_uri: d3f:CloudInstanceMetadata
    is_a: CloudConfiguration
    title: Cloud Instance Metadata
    description: |-
      Cloud instance metadata is configuration information on the instance and users of the instance.  This includes such information as security groups, public ip addresses, and private addresses, public keys configured, and event rotating security keys. User data can contain initialization scripts, variables, passwords, and more.
    see_also:
      - https://isc.sans.edu/forums/diary/Cloud+Metadata+Urls/22046
    annotations:
      owl_named_individual: "true"

  CloudServiceAuthentication:
    class_uri: d3f:CloudServiceAuthentication
    is_a: WebAuthentication
    title: Cloud Service Authentication
    description: |-
      A request-response comprising a user credential presentation to a system and a verification response where the verifying party is a cloud service.
    annotations:
      owl_named_individual: "true"

  CloudServiceAuthorization:
    class_uri: d3f:CloudServiceAuthorization
    is_a: Authorization
    title: Cloud Service Authorization
    description: Cloud authorization is the function of specifying access rights to cloud resources.
    annotations:
      owl_named_individual: "true"

  CloudServiceProvider:
    class_uri: d3f:CloudServiceProvider
    is_a: ServiceProvider
    title: Cloud Service Provider
    description: |-
      A cloud service provider delivers scalable and distributed computing resources over a network, enabling clients to access infrastructure, platforms, and applications remotely.
    annotations:
      owl_named_individual: "true"

  CloudServiceSensor:
    class_uri: d3f:CloudServiceSensor
    is_a: CyberSensor
    title: Cloud Service Sensor
    description: |-
      Senses data from cloud service platforms. Including data from cloud service  authentications, authorizations, and other activities.
    annotations:
      owl_named_individual: "true"

  CloudStorage:
    class_uri: d3f:CloudStorage
    is_a: SecondaryStorage
    title: Cloud Storage
    description: Cloud storage is storage held within a computing cloud.
    see_also:
      - http://dbpedia.org/resource/Cloud_computing
      - https://schema.ocsf.io/objects/databucket
      - http://dbpedia.org/resource/Cloud_storage
    annotations:
      owl_named_individual: "true"

  CloudUserAccount:
    class_uri: d3f:CloudUserAccount
    is_a: UserAccount
    title: Cloud User Account
    description: A user account on a given host is a local user account for a given cloud and specified resources within that cloud.
    annotations:
      owl_named_individual: "true"

  ClusterAnalysis:
    class_uri: d3f:ClusterAnalysis
    is_a: UnsupervisedLearning
    title: Cluster Analysis
    description: |-
      Cluster analysis or clustering is the task of grouping a set of objects in such a way that objects in the same group (called a cluster) are more similar (in some sense) to each other than to those in other groups (clusters).
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-CA"
      kb-article: "## References Cluster analysis. (n.d.). Wikipedia. [Link](https://en.wikipedia.org/wiki/Cluster_analysis)"

  Clustering:
    class_uri: d3f:Clustering
    is_a: Summarizing

  CodeAnalyzer:
    class_uri: d3f:CodeAnalyzer
    is_a: DeveloperApplication
    title: Code Analyzer
    description: |-
      Code analyzers automatically analyze the composition or behavior of computer programs regarding a property such as correctness, robustness, security, and safety. Program analysis can be performed without executing the program (static program analysis), during runtime (dynamic program analysis) or in a combination of both.
    aliases:
      - "Program Analysis Tool"
    see_also:
      - http://dbpedia.org/resource/Program_analysis
    annotations:
      owl_named_individual: "true"

  CodeRepository:
    class_uri: d3f:CodeRepository
    is_a: Database
    title: Code Repository
    description: |-
      A code repository is a form of database where code, typically source code, is stored and managed.  In revision control systems, a repository is a data structure that stores metadata for a set of files or directory structure. Depending on whether the version control system in use is distributed like (Git or Mercurial) or centralized like (Subversion, CVS, or Perforce), the whole set of information in the repository may be duplicated on every user's system or may be maintained on a single server.
    aliases:
      - "Repository"
      - "Version Control Repository"
    see_also:
      - http://dbpedia.org/resource/Repository_(version_control)
    annotations:
      owl_named_individual: "true"

  CodecApplication:
    class_uri: d3f:CodecApplication
    is_a: UserApplication
    title: Codec Application
