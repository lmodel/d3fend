  OffensiveTacticEnum:
    description: >-
      Enumeration of OffensiveTactic values. Open set: additional string
      values beyond this list are permitted.
    notes:
      - "Per ATT&CK, these are defined as Tactical Goals, not Tactics per se. Many children also fit definition of tactics. Some are neither tactics or tactical goals really (e.g., Execution, which is a useful grouping, but an action, not really a tactic or technique."
    permissible_values:
      AML_TA0000:
        description: "AI Model Access"
        notes:
          - "The adversary is attempting to gain some level of access to an AI model. AI Model Access enables techniques that use various types of access to the AI model that can be used by the adversary to gain information, develop attacks, and as a means to input data to the model. The level of access can range from the full knowledge of the internals of the model to access to the physical environment where"
        meaning: "d3f:AML.TA0000"
      AML_TA0001:
        description: "AI Attack Staging"
        notes:
          - "The adversary is leveraging their knowledge of and access to the target system to tailor the attack. AI Attack Staging consists of techniques adversaries use to prepare their attack on the target AI model. Techniques can include training proxy models, poisoning the target model, and crafting adversarial data to feed the target model. Some of these techniques can be performed in an offline manner"
        meaning: "d3f:AML.TA0001"
      AML_TA0002:
        description: "Reconnaissance"
        notes:
          - "The adversary is trying to gather information about the AI system they can use to plan future operations. Reconnaissance consists of techniques that involve adversaries actively or passively gathering information that can be used to support targeting. Such information may include details of the victim organizations' AI capabilities and research efforts. This information can be leveraged by the ad"
        meaning: "d3f:AML.TA0002"
      AML_TA0003:
        description: "Resource Development"
        notes:
          - "The adversary is trying to establish resources they can use to support operations. Resource Development consists of techniques that involve adversaries creating, purchasing, or compromising/stealing resources that can be used to support targeting. Such resources include AI artifacts, infrastructure, accounts, or capabilities. These resources can be leveraged by the adversary to aid in other phase"
        meaning: "d3f:AML.TA0003"
      AML_TA0004:
        description: "Initial Access"
        notes:
          - "The adversary is trying to gain access to the AI system. The target system could be a network, mobile device, or an edge device such as a sensor platform. The AI capabilities used by the system could be local with onboard or cloud-enabled AI capabilities. Initial Access consists of techniques that use various entry vectors to gain their initial foothold within the system."
        meaning: "d3f:AML.TA0004"
      AML_TA0005:
        description: "Execution"
        notes:
          - "The adversary is trying to run malicious code embedded in AI artifacts or software. Execution consists of techniques that result in adversary-controlled code running on a local or remote system. Techniques that run malicious code are often paired with techniques from all other tactics to achieve broader goals, like exploring a network or stealing data. For example, an adversary might use a remote"
        meaning: "d3f:AML.TA0005"
      AML_TA0006:
        description: "Persistence"
        notes:
          - "The adversary is trying to maintain their foothold via AI artifacts or software. Persistence consists of techniques that adversaries use to keep access to systems across restarts, changed credentials, and other interruptions that could cut off their access. Techniques used for persistence often involve leaving behind modified ML artifacts such as poisoned training data or manipulated AI models."
        meaning: "d3f:AML.TA0006"
      AML_TA0007:
        description: "Defense Evasion"
        notes:
          - "The adversary is trying to avoid being detected by AI-enabled security software. Defense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise. Techniques used for defense evasion include evading AI-enabled security software such as malware detectors."
        meaning: "d3f:AML.TA0007"
      AML_TA0008:
        description: "Discovery"
        notes:
          - "The adversary is trying to figure out your AI environment. Discovery consists of techniques an adversary may use to gain knowledge about the system and internal network. These techniques help adversaries observe the environment and orient themselves before deciding how to act. They also allow adversaries to explore what they can control and what's around their entry point in order to discover how"
        meaning: "d3f:AML.TA0008"
      AML_TA0009:
        description: "Collection"
        notes:
          - "The adversary is trying to gather AI artifacts and other related information relevant to their goal. Collection consists of techniques adversaries may use to gather information and the sources information is collected from that are relevant to following through on the adversary's objectives. Frequently, the next goal after collecting data is to steal (exfiltrate) the AI artifacts, or use the coll"
        meaning: "d3f:AML.TA0009"
      AML_TA0010:
        description: "Exfiltration"
        notes:
          - "The adversary is trying to steal AI artifacts or other information about the AI system. Exfiltration consists of techniques that adversaries may use to steal data from your network. Data may be stolen for its valuable intellectual property, or for use in staging future operations. Techniques for getting data out of a target network typically include transferring it over their command and control"
        meaning: "d3f:AML.TA0010"
      AML_TA0011:
        description: "Impact"
        notes:
          - "The adversary is trying to manipulate, interrupt, erode confidence in, or destroy your AI systems and data. Impact consists of techniques that adversaries use to disrupt availability or compromise integrity by manipulating business and operational processes. Techniques used for impact can include destroying or tampering with data. In some cases, business processes can look fine, but may have been"
        meaning: "d3f:AML.TA0011"
      AML_TA0012:
        description: "Privilege Escalation"
        notes:
          - "The adversary is trying to gain higher-level permissions. Privilege Escalation consists of techniques that adversaries use to gain higher-level permissions on a system or network. Adversaries can often enter and explore a network with unprivileged access but require elevated permissions to follow through on their objectives. Common approaches are to take advantage of system weaknesses, misconfigu"
        meaning: "d3f:AML.TA0012"
      AML_TA0013:
        description: "Credential Access"
        notes:
          - "The adversary is trying to steal account names and passwords. Credential Access consists of techniques for stealing credentials like account names and passwords. Techniques used to get credentials include keylogging or credential dumping. Using legitimate credentials can give adversaries access to systems, make them harder to detect, and provide the opportunity to create more accounts to help ach"
        meaning: "d3f:AML.TA0013"
      AML_TA0014:
        description: "Command and Control"
        notes:
          - "The adversary is trying to communicate with compromised AI systems to control them. Command and Control consists of techniques that adversaries may use to communicate with systems under their control within a victim network. Adversaries commonly attempt to mimic normal, expected traffic to avoid detection. There are many ways an adversary can establish command and control with various levels of s"
        meaning: "d3f:AML.TA0014"
      AML_TA0015:
        description: "Lateral Movement"
        notes:
          - "The adversary is trying to move through your AI environment. Lateral Movement consists of techniques that adversaries may use to gain access to and control other systems or components in the environment. Adversaries may pivot towards AI Ops infrastructure such as model registries, experiment trackers, vector databases, notebooks, or training pipelines. As the adversary moves through the environme"
        meaning: "d3f:AML.TA0015"
      TA0001:
        description: "Initial Access"
        notes:
          - "The adversary is trying to get into your network. Initial Access consists of techniques that use various entry vectors to gain their initial foothold within a network. Techniques used to gain a foothold include targeted spearphishing and exploiting weaknesses on public-facing web servers. Footholds gained through initial access may allow for continued access, like valid accounts and use of extern"
        meaning: "d3f:TA0001"
      TA0002:
        description: "Execution"
        notes:
          - "The adversary is trying to run malicious code. Execution consists of techniques that result in adversary-controlled code running on a local or remote system. Techniques that run malicious code are often paired with techniques from all other tactics to achieve broader goals, like exploring a network or stealing data. For example, an adversary might use a remote access tool to run a PowerShell scri"
        meaning: "d3f:TA0002"
      TA0003:
        description: "Persistence"
        notes:
          - "The adversary is trying to maintain their foothold. Persistence consists of techniques that adversaries use to keep access to systems across restarts, changed credentials, and other interruptions that could cut off their access. Techniques used for persistence include any access, action, or configuration changes that let them maintain their foothold on systems, such as replacing or hijacking legi"
        meaning: "d3f:TA0003"
      TA0004:
        description: "Privilege Escalation"
        notes:
          - "The adversary is trying to gain higher-level permissions. Privilege Escalation consists of techniques that adversaries use to gain higher-level permissions on a system or network. Adversaries can often enter and explore a network with unprivileged access but require elevated permissions to follow through on their objectives. Common approaches are to take advantage of system weaknesses, misconfigu"
        meaning: "d3f:TA0004"
      TA0005:
        description: "Defense Evasion"
        notes:
          - "The adversary is trying to avoid being detected. Defense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise. Techniques used for defense evasion include uninstalling/disabling security software or obfuscating/encrypting data and scripts. Adversaries also leverage and abuse trusted processes to hide and masquerade their malware. Other tactics' techni"
        meaning: "d3f:TA0005"
      TA0006:
        description: "Credential Access"
        notes:
          - "The adversary is trying to steal account names and passwords. Credential Access consists of techniques for stealing credentials like account names and passwords. Techniques used to get credentials include keylogging or credential dumping. Using legitimate credentials can give adversaries access to systems, make them harder to detect, and provide the opportunity to create more accounts to help ach"
        meaning: "d3f:TA0006"
      TA0007:
        description: "Discovery"
        notes:
          - "The adversary is trying to figure out your environment. Discovery consists of techniques an adversary may use to gain knowledge about the system and internal network. These techniques help adversaries observe the environment and orient themselves before deciding how to act. They also allow adversaries to explore what they can control and what's around their entry point in order to discover how it"
        meaning: "d3f:TA0007"
      TA0008:
        description: "Lateral Movement"
        notes:
          - "The adversary is trying to move through your environment. Lateral Movement consists of techniques that adversaries use to enter and control remote systems on a network. Following through on their primary objective often requires exploring the network to find their target and subsequently gaining access to it. Reaching their objective often involves pivoting through multiple systems and accounts t"
        meaning: "d3f:TA0008"
      TA0009:
        description: "Collection"
        notes:
          - "The adversary is trying to gather data of interest to their goal. Collection consists of techniques adversaries may use to gather information and the sources information is collected from that are relevant to following through on the adversary's objectives. Frequently, the next goal after collecting data is to either steal (exfiltrate) the data or to use the data to gain more information about th"
        meaning: "d3f:TA0009"
      TA0010:
        description: "Exfiltration"
        notes:
          - "The adversary is trying to steal data. Exfiltration consists of techniques that adversaries may use to steal data from your network. Once they've collected data, adversaries often package it to avoid detection while removing it. This can include compression and encryption. Techniques for getting data out of a target network typically include transferring it over their command and control channel"
        meaning: "d3f:TA0010"
      TA0011:
        description: "Command And Control"
        notes:
          - "The adversary is trying to communicate with compromised systems to control them. Command and Control consists of techniques that adversaries may use to communicate with systems under their control within a victim network. Adversaries commonly attempt to mimic normal, expected traffic to avoid detection. There are many ways an adversary can establish command and control with various levels of stea"
        meaning: "d3f:TA0011"
