  HeterogeneousAsymmetricFeature_basedTransferLearning:
    class_uri: d3f:HeterogeneousAsymmetricFeature-basedTransferLearning
    is_a: HeterogeneousTransferLearning
    title: Heterogeneous Asymmetric Feature-based Transfer Learning
    description: |-
      Asymmetric transformation mapping  transforms the source feature space to align with that of the target or the target to that of the source. This, in effect, bridges the feature space gap and reduces the problem into a homogeneous transfer problem when further distribution differences need to be corrected.
    aliases:
      - "HeterogeneousAsymmetricFeature-basedTransferLearning"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-HAFBTL"
      kb-article: "## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1), 25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0)."

  HeterogeneousFeature_basedTransferLearning:
    class_uri: d3f:HeterogeneousFeature-basedTransferLearning
    is_a: HeterogeneousTransferLearning
    title: Heterogeneous Feature-based Transfer Learning
    description: |-
      Symmetric transformation  takes both the source feature space Xs and target feature space Xt and learns feature transformations as to project each onto a common subspace Xc for adaptation purposes. This derived subspace becomes a domain-invariant feature subspace to associate cross-domain data, and in effect, reduces marginal distribution differences.
    aliases:
      - "HeterogeneousFeature-basedTransferLearning"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-HFBTL"
      kb-article: "## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1), 25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0)."

  HeterogeneousTransferLearning:
    class_uri: d3f:HeterogeneousTransferLearning
    is_a: TransferLearning
    title: Heterogeneous Transfer Learning
    description: |-
      Heterogeneous transfer learning is characterized by the source and target domains having differing feature spaces, but may also be combined with other issues such as differing data distributions and label spaces.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-HTL"
      kb-article: "## References Wang, Q., Mao, K. Z., Wang, B., & Guan, J. (2017). Big data clustering by hybrid optimization algorithm. Journal of Big Data, 4(1), 25. [Link](https://journalofbigdata.springeropen.com/articles/10.1186/s40537-017-0089-0)."

