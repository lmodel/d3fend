      - CWE_93
    title: "Improper Neutralization of CRLF Sequences in HTTP Headers ('HTTP Request/Response Splitting')"
    description: |-
      The product receives data from an HTTP agent/component (e.g., web server, proxy, browser, etc.), but it does not neutralize or incorrectly neutralizes CR and LF characters before the data is included in outgoing HTTP headers.
    aliases:
      - "CWE-113"
    annotations:
      cwe-id: "CWE-113"
      synonym: "HTTP Request Splitting"
    exact_mappings:
      - cwe:CWE-113

  CWE_114:
    class_uri: d3f:CWE-114
    is_a: CWE_73
    title: Process Control
    description: |-
      Executing commands or loading libraries from an untrusted source or in an untrusted environment can cause an application to execute malicious commands (and payloads) on behalf of an attacker.
    aliases:
      - "CWE-114"
    annotations:
      cwe-id: "CWE-114"
    exact_mappings:
      - cwe:CWE-114

  CWE_115:
    class_uri: d3f:CWE-115
    is_a: CWE_436
    title: Misinterpretation of Input
    description: "The product misinterprets an input, whether from an attacker or another product, in a security-relevant fashion."
    aliases:
      - "CWE-115"
    annotations:
      cwe-id: "CWE-115"
    exact_mappings:
      - cwe:CWE-115

  CWE_116:
    class_uri: d3f:CWE-116
    is_a: CWE_707
    title: Improper Encoding or Escaping of Output
    description: |-
      The product prepares a structured message for communication with another component, but encoding or escaping of the data is either missing or done incorrectly. As a result, the intended structure of the message is not preserved.
    aliases:
      - "CWE-116"
    annotations:
      cwe-id: "CWE-116"
      synonym: "Output Encoding"
    exact_mappings:
      - cwe:CWE-116

  CWE_1164:
    class_uri: d3f:CWE-1164
    is_a: CWE_710
    title: Irrelevant Code
    description: |-
      The product contains code that is not essential for execution, i.e. makes no state changes and has no side effects that alter data or control flow, such that removal of the code would have no impact to functionality or correctness.
    aliases:
      - "CWE-1164"
    annotations:
      cwe-id: "CWE-1164"
    exact_mappings:
      - cwe:CWE-1164

  CWE_117:
    class_uri: d3f:CWE-117
    is_a: CWE_116
    title: Improper Output Neutralization for Logs
    description: |-
      The product constructs a log message from external input, but it does not neutralize or incorrectly neutralizes special elements when the message is written to a log file.
    aliases:
      - "CWE-117"
    annotations:
      cwe-id: "CWE-117"
      synonym: "Log forging"
    exact_mappings:
      - cwe:CWE-117

  CWE_1173:
    class_uri: d3f:CWE-1173
    is_a: CWE_20
    title: Improper Use of Validation Framework
    description: |-
      The product does not use, or incorrectly uses, an input validation framework that is provided by the source language or an independent library.
    aliases:
      - "CWE-1173"
    annotations:
      cwe-id: "CWE-1173"
    exact_mappings:
      - cwe:CWE-1173

  CWE_1174:
    class_uri: d3f:CWE-1174
    is_a: CWE_1173
    title: "ASP.NET Misconfiguration: Improper Model Validation"
    description: "The ASP.NET application does not use, or incorrectly uses, the model validation framework."
    aliases:
      - "CWE-1174"
    annotations:
      cwe-id: "CWE-1174"
    exact_mappings:
      - cwe:CWE-1174

  CWE_1176:
    class_uri: d3f:CWE-1176
    is_a: CWE_405
    title: Inefficient CPU Computation
    description: |-
      The product performs CPU computations using algorithms that are not as efficient as they could be for the needs of the developer, i.e., the computations can be optimized further.
    aliases:
      - "CWE-1176"
    annotations:
      cwe-id: "CWE-1176"
    exact_mappings:
      - cwe:CWE-1176

  CWE_1177:
    class_uri: d3f:CWE-1177
    is_a: CWE_710
    title: Use of Prohibited Code
    description: |-
      The product uses a function, library, or third party component that has been explicitly prohibited, whether by the developer or the customer.
    aliases:
      - "CWE-1177"
    annotations:
      cwe-id: "CWE-1177"
    exact_mappings:
      - cwe:CWE-1177

  CWE_118:
    class_uri: d3f:CWE-118
    is_a: CWE_664
    title: "Incorrect Access of Indexable Resource ('Range Error')"
    description: |-
      The product does not restrict or incorrectly restricts operations within the boundaries of a resource that is accessed using an index or pointer, such as memory or files.
    aliases:
      - "CWE-118"
    annotations:
      cwe-id: "CWE-118"
    exact_mappings:
      - cwe:CWE-118

  CWE_1188:
    class_uri: d3f:CWE-1188
    is_a: CWE_1419
    mixins:
      - CWE_665
    title: Initialization of a Resource with an Insecure Default
    description: |-
      The product initializes or sets a resource with a default that is intended to be changed by the administrator, but the default is not secure.
    aliases:
      - "CWE-1188"
    annotations:
      cwe-id: "CWE-1188"
    exact_mappings:
      - cwe:CWE-1188

  CWE_1189:
    class_uri: d3f:CWE-1189
    is_a: CWE_653
    mixins:
      - CWE_668
    title: Improper Isolation of Shared Resources on System-on-a-Chip (SoC)
    description: The System-On-a-Chip (SoC) does not properly isolate shared resources between trusted and untrusted agents.
    aliases:
      - "CWE-1189"
    annotations:
      cwe-id: "CWE-1189"
    exact_mappings:
      - cwe:CWE-1189

  CWE_119:
    class_uri: d3f:CWE-119
    is_a: CWE_118
    title: Improper Restriction of Operations within the Bounds of a Memory Buffer
    description: |-
      The product performs operations on a memory buffer, but it reads from or writes to a memory location outside the buffer's intended boundary. This may result in read or write operations on unexpected memory locations that could be linked to other variables, data structures, or internal program data.
    aliases:
      - "CWE-119"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-119"
      synonym: "Buffer Overflow"
    exact_mappings:
      - cwe:CWE-119

  CWE_1190:
    class_uri: d3f:CWE-1190
    is_a: CWE_696
    title: DMA Device Enabled Too Early in Boot Phase
    description: |-
      The product enables a Direct Memory Access (DMA) capable device before the security configuration settings are established, which allows an attacker to extract data from or gain privileges on the product.
    aliases:
      - "CWE-1190"
    annotations:
      cwe-id: "CWE-1190"
    exact_mappings:
      - cwe:CWE-1190

  CWE_1191:
    class_uri: d3f:CWE-1191
    is_a: CWE_284
    title: On-Chip Debug and Test Interface With Improper Access Control
    description: |-
      The chip does not implement or does not correctly perform access control to check whether users are authorized to access internal registers and test modes through the physical debug/test interface.
    aliases:
      - "CWE-1191"
    annotations:
      cwe-id: "CWE-1191"
    exact_mappings:
      - cwe:CWE-1191

  CWE_1192:
    class_uri: d3f:CWE-1192
    is_a: CWE_657
    title: Improper Identifier for IP Block used in System-On-Chip (SOC)
    description: "The System-on-Chip (SoC) does not have unique, immutable identifiers for each of its components."
    aliases:
      - "CWE-1192"
    annotations:
      cwe-id: "CWE-1192"
    exact_mappings:
      - cwe:CWE-1192

  CWE_1193:
    class_uri: d3f:CWE-1193
    is_a: CWE_696
    title: Power-On of Untrusted Execution Core Before Enabling Fabric Access Control
    description: |-
      The product enables components that contain untrusted firmware before memory and fabric access controls have been enabled.
    aliases:
      - "CWE-1193"
    annotations:
      cwe-id: "CWE-1193"
    exact_mappings:
      - cwe:CWE-1193

  CWE_12:
    class_uri: d3f:CWE-12
    is_a: CWE_756
    title: "ASP.NET Misconfiguration: Missing Custom Error Page"
    description: |-
      An ASP .NET application must enable custom error pages in order to prevent attackers from mining information from the framework's built-in responses.
    aliases:
      - "CWE-12"
    annotations:
      cwe-id: "CWE-12"
    exact_mappings:
      - cwe:CWE-12

  CWE_120:
    class_uri: d3f:CWE-120
    is_a: CWE_119
    mixins:
      - CWE_787
    title: "Buffer Copy without Checking Size of Input ('Classic Buffer Overflow')"
    description: |-
      The product copies an input buffer to an output buffer without verifying that the size of the input buffer is less than the size of the output buffer, leading to a buffer overflow.
    aliases:
      - "CWE-120"
    annotations:
      cwe-id: "CWE-120"
      synonym: "Classic Buffer Overflow"
    exact_mappings:
      - cwe:CWE-120

  CWE_1204:
    class_uri: d3f:CWE-1204
    is_a: CWE_330
    title: Generation of Weak Initialization Vector (IV)
    description: |-
      The product uses a cryptographic primitive that uses an Initialization Vector (IV), but the product does not generate IVs that are sufficiently unpredictable or unique according to the expected cryptographic requirements for that primitive.
    aliases:
      - "CWE-1204"
    annotations:
      cwe-id: "CWE-1204"
    exact_mappings:
      - cwe:CWE-1204

  CWE_1209:
    class_uri: d3f:CWE-1209
    is_a: CWE_710
    title: Failure to Disable Reserved Bits
    description: |-
      The reserved bits in a hardware design are not disabled prior to production. Typically, reserved bits are used for future capabilities and should not support any functional logic in the design. However, designers might covertly use these bits to debug or further develop new capabilities in production hardware. Adversaries with access to these bits will write to them in hopes of compromising hardware state.
    aliases:
      - "CWE-1209"
    annotations:
      cwe-id: "CWE-1209"
    exact_mappings:
      - cwe:CWE-1209

  CWE_121:
    class_uri: d3f:CWE-121
    is_a: CWE_787
    mixins:
      - CWE_788
    title: Stack-based Buffer Overflow
    description: |-
      A stack-based buffer overflow condition is a condition where the buffer being overwritten is allocated on the stack (i.e., is a local variable or, rarely, a parameter to a function).
    aliases:
      - "CWE-121"
    annotations:
      cwe-id: "CWE-121"
      synonym: "Stack Overflow"
    exact_mappings:
      - cwe:CWE-121

  CWE_122:
    class_uri: d3f:CWE-122
    is_a: CWE_787
    mixins:
      - CWE_788
    title: Heap-based Buffer Overflow
    description: |-
      A heap overflow condition is a buffer overflow, where the buffer that can be overwritten is allocated in the heap portion of memory, generally meaning that the buffer was allocated using a routine such as malloc().
    aliases:
      - "CWE-122"
    annotations:
      cwe-id: "CWE-122"
    exact_mappings:
      - cwe:CWE-122

  CWE_1220:
    class_uri: d3f:CWE-1220
    is_a: CWE_284
    title: Insufficient Granularity of Access Control
    description: |-
      The product implements access controls via a policy or other feature with the intention to disable or restrict accesses (reads and/or writes) to assets in a system from untrusted agents. However, implemented access controls lack required granularity, which renders the control policy too broad because it allows accesses from unauthorized agents to the security-sensitive assets.
    aliases:
      - "CWE-1220"
    annotations:
      cwe-id: "CWE-1220"
    exact_mappings:
      - cwe:CWE-1220

  CWE_1221:
    class_uri: d3f:CWE-1221
    is_a: CWE_1419
    mixins:
      - CWE_665
    title: Incorrect Register Defaults or Module Parameters
    description: |-
      Hardware description language code incorrectly defines register defaults or hardware Intellectual Property (IP) parameters to insecure values.
    aliases:
      - "CWE-1221"
    annotations:
      cwe-id: "CWE-1221"
    exact_mappings:
      - cwe:CWE-1221

  CWE_1222:
    class_uri: d3f:CWE-1222
    is_a: CWE_1220
    title: Insufficient Granularity of Address Regions Protected by Register Locks
    description: |-
      The product defines a large address region protected from modification by the same register lock control bit. This results in a conflict between the functional requirement that some addresses need to be writable by software during operation and the security requirement that the system configuration lock bit must be set during the boot process.
    aliases:
      - "CWE-1222"
    annotations:
      cwe-id: "CWE-1222"
    exact_mappings:
      - cwe:CWE-1222

  CWE_1223:
    class_uri: d3f:CWE-1223
    is_a: CWE_362
    title: Race Condition for Write-Once Attributes
    description: |-
      A write-once register in hardware design is programmable by an untrusted software component earlier than the trusted software component, resulting in a race condition issue.
    aliases:
      - "CWE-1223"
    annotations:
      cwe-id: "CWE-1223"
    exact_mappings:
      - cwe:CWE-1223

  CWE_1224:
    class_uri: d3f:CWE-1224
    is_a: CWE_284
    title: Improper Restriction of Write-Once Bit Fields
    description: |-
      The hardware design control register "sticky bits" or write-once bit fields are improperly implemented, such that they can be reprogrammed by software.
    aliases:
      - "CWE-1224"
    annotations:
      cwe-id: "CWE-1224"
    exact_mappings:
      - cwe:CWE-1224

  CWE_1229:
    class_uri: d3f:CWE-1229
    is_a: CWE_664
    title: Creation of Emergent Resource
    description: |-
      The product manages resources or behaves in a way that indirectly creates a new, distinct resource that can be used by attackers in violation of the intended policy.
    aliases:
      - "CWE-1229"
    annotations:
      cwe-id: "CWE-1229"
    exact_mappings:
      - cwe:CWE-1229

  CWE_123:
    class_uri: d3f:CWE-123
    is_a: CWE_787
    title: Write-what-where Condition
    description: |-
      Any condition where the attacker has the ability to write an arbitrary value to an arbitrary location, often as the result of a buffer overflow.
    aliases:
      - "CWE-123"
    annotations:
      cwe-id: "CWE-123"
    exact_mappings:
      - cwe:CWE-123

  CWE_1230:
    class_uri: d3f:CWE-1230
    is_a: CWE_285
    title: Exposure of Sensitive Information Through Metadata
    description: |-
      The product prevents direct access to a resource containing sensitive information, but it does not sufficiently limit access to metadata that is derived from the original, sensitive information.
    aliases:
      - "CWE-1230"
    annotations:
      cwe-id: "CWE-1230"
    exact_mappings:
      - cwe:CWE-1230

  CWE_1231:
    class_uri: d3f:CWE-1231
    is_a: CWE_284
    title: Improper Prevention of Lock Bit Modification
    description: |-
      The product uses a trusted lock bit for restricting access to registers, address regions, or other resources, but the product does not prevent the value of the lock bit from being modified after it has been set.
    aliases:
      - "CWE-1231"
    annotations:
      cwe-id: "CWE-1231"
    exact_mappings:
      - cwe:CWE-1231

  CWE_1232:
    class_uri: d3f:CWE-1232
    is_a: CWE_667
    title: Improper Lock Behavior After Power State Transition
    description: |-
      Register lock bit protection disables changes to system configuration once the bit is set. Some of the protected registers or lock bits become programmable after power state transitions (e.g., Entry and wake from low power sleep modes) causing the system configuration to be changeable.
    aliases:
      - "CWE-1232"
    annotations:
      cwe-id: "CWE-1232"
    exact_mappings:
      - cwe:CWE-1232

  CWE_1233:
    class_uri: d3f:CWE-1233
    is_a: CWE_284
    mixins:
      - CWE_667
    title: Security-Sensitive Hardware Controls with Missing Lock Bit Protection
    description: |-
      The product uses a register lock bit protection mechanism, but it does not ensure that the lock bit prevents modification of system registers or controls that perform changes to important hardware system configuration.
    aliases:
      - "CWE-1233"
    annotations:
      cwe-id: "CWE-1233"
    exact_mappings:
      - cwe:CWE-1233

  CWE_1234:
    class_uri: d3f:CWE-1234
    is_a: CWE_667
    title: Hardware Internal or Debug Modes Allow Override of Locks
    description: System configuration protection may be bypassed during debug mode.
    aliases:
      - "CWE-1234"
    annotations:
      cwe-id: "CWE-1234"
    exact_mappings:
      - cwe:CWE-1234

  CWE_1235:
    class_uri: d3f:CWE-1235
    is_a: CWE_400
    title: Incorrect Use of Autoboxing and Unboxing for Performance Critical Operations
    description: "The code uses boxed primitives, which may introduce inefficiencies into performance-critical operations."
    aliases:
      - "CWE-1235"
    annotations:
      cwe-id: "CWE-1235"
    exact_mappings:
      - cwe:CWE-1235

  CWE_1236:
    class_uri: d3f:CWE-1236
    is_a: CWE_74
    title: Improper Neutralization of Formula Elements in a CSV File
    description: |-
      The product saves user-provided information into a Comma-Separated Value (CSV) file, but it does not neutralize or incorrectly neutralizes special elements that could be interpreted as a command when the file is opened by a spreadsheet product.
    aliases:
      - "CWE-1236"
    annotations:
      cwe-id: "CWE-1236"
      synonym: "CSV Injection"
    exact_mappings:
      - cwe:CWE-1236

  CWE_1239:
    class_uri: d3f:CWE-1239
    is_a: CWE_226
    title: Improper Zeroization of Hardware Register
    description: |-
      The hardware product does not properly clear sensitive information from built-in registers when the user of the hardware block changes.
    aliases:
      - "CWE-1239"
    annotations:
      cwe-id: "CWE-1239"
    exact_mappings:
      - cwe:CWE-1239

  CWE_124:
    class_uri: d3f:CWE-124
    is_a: CWE_786
    mixins:
      - CWE_787
    title: "Buffer Underwrite ('Buffer Underflow')"
    description: |-
      The product writes to a buffer using an index or pointer that references a memory location prior to the beginning of the buffer.
    aliases:
      - "CWE-124"
    annotations:
      cwe-id: "CWE-124"
      synonym: "buffer underrun"
    exact_mappings:
      - cwe:CWE-124

  CWE_1240:
    class_uri: d3f:CWE-1240
    is_a: CWE_327
    title: Use of a Cryptographic Primitive with a Risky Implementation
    description: |-
      To fulfill the need for a cryptographic primitive, the product implements a cryptographic algorithm using a non-standard, unproven, or disallowed/non-compliant cryptographic implementation.
    aliases:
      - "CWE-1240"
    annotations:
      cwe-id: "CWE-1240"
    exact_mappings:
      - cwe:CWE-1240

  CWE_1241:
    class_uri: d3f:CWE-1241
    is_a: CWE_330
    title: Use of Predictable Algorithm in Random Number Generator
    description: The device uses an algorithm that is predictable and generates a pseudo-random number.
    aliases:
      - "CWE-1241"
    annotations:
      cwe-id: "CWE-1241"
    exact_mappings:
      - cwe:CWE-1241

  CWE_1242:
    class_uri: d3f:CWE-1242
    is_a: CWE_284
    mixins:
      - CWE_912
    title: Inclusion of Undocumented Features or Chicken Bits
    description: The device includes chicken bits or undocumented features that can create entry points for unauthorized actors.
    aliases:
      - "CWE-1242"
    annotations:
      cwe-id: "CWE-1242"
    exact_mappings:
      - cwe:CWE-1242

  CWE_1243:
    class_uri: d3f:CWE-1243
    is_a: CWE_1263
    title: Sensitive Non-Volatile Information Not Protected During Debug
    description: Access to security-sensitive information stored in fuses is not limited during debug.
    aliases:
      - "CWE-1243"
    annotations:
      cwe-id: "CWE-1243"
    exact_mappings:
      - cwe:CWE-1243

  CWE_1244:
    class_uri: d3f:CWE-1244
    is_a: CWE_863
    title: Internal Asset Exposed to Unsafe Debug Access Level or State
    description: |-
      The product uses physical debug or test interfaces with support for multiple access levels, but it assigns the wrong debug access level to an internal asset, providing unintended access to the asset from untrusted debug agents.
    aliases:
      - "CWE-1244"
    annotations:
      cwe-id: "CWE-1244"
    exact_mappings:
      - cwe:CWE-1244

  CWE_1245:
    class_uri: d3f:CWE-1245
    is_a: CWE_684
    title: Improper Finite State Machines (FSMs) in Hardware Logic
    description: |-
      Faulty finite state machines (FSMs) in the hardware logic allow an attacker to put the system in an undefined state, to cause a denial of service (DoS) or gain privileges on the victim's system.
    aliases:
      - "CWE-1245"
    annotations:
      cwe-id: "CWE-1245"
    exact_mappings:
      - cwe:CWE-1245

  CWE_1246:
    class_uri: d3f:CWE-1246
    is_a: CWE_400
    title: Improper Write Handling in Limited-write Non-Volatile Memories
    description: |-
      The product does not implement or incorrectly implements wear leveling operations in limited-write non-volatile memories.
    aliases:
      - "CWE-1246"
    annotations:
      cwe-id: "CWE-1246"
    exact_mappings:
      - cwe:CWE-1246

  CWE_1247:
    class_uri: d3f:CWE-1247
    is_a: CWE_1384
    title: Improper Protection Against Voltage and Clock Glitches
    description: |-
      The device does not contain or contains incorrectly implemented circuitry or sensors to detect and mitigate voltage and clock glitches and protect sensitive information or software contained on the device.
    aliases:
      - "CWE-1247"
    annotations:
      cwe-id: "CWE-1247"
    exact_mappings:
      - cwe:CWE-1247

  CWE_1248:
    class_uri: d3f:CWE-1248
    is_a: CWE_693
    title: Semiconductor Defects in Hardware Logic with Security-Sensitive Implications
    description: The security-sensitive hardware module contains semiconductor defects.
    aliases:
      - "CWE-1248"
    annotations:
      cwe-id: "CWE-1248"
    exact_mappings:
      - cwe:CWE-1248

  CWE_1249:
    class_uri: d3f:CWE-1249
    is_a: CWE_1250
    title: Application-Level Admin Tool with Inconsistent View of Underlying Operating System
    description: |-
      The product provides an application for administrators to manage parts of the underlying operating system, but the application does not accurately identify all of the relevant entities or resources that exist in the OS; that is, the application's model of the OS's state is inconsistent with the OS's actual state.
    aliases:
      - "CWE-1249"
    annotations:
      cwe-id: "CWE-1249"
      synonym: "Ghost in the Shell"
    exact_mappings:
      - cwe:CWE-1249

  CWE_125:
    class_uri: d3f:CWE-125
    is_a: CWE_119
    title: Out-of-bounds Read
    description: "The product reads data past the end, or before the beginning, of the intended buffer."
    aliases:
      - "CWE-125"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-125"
      synonym: "OOB read"
    exact_mappings:
      - cwe:CWE-125

  CWE_1250:
    class_uri: d3f:CWE-1250
    is_a: CWE_664
    title: Improper Preservation of Consistency Between Independent Representations of Shared State
    description: |-
      The product has or supports multiple distributed components or sub-systems that are each required to keep their own local copy of shared data - such as state or cache - but the product does not ensure that all local copies remain consistent with each other.
    aliases:
      - "CWE-1250"
    annotations:
      cwe-id: "CWE-1250"
    exact_mappings:
      - cwe:CWE-1250

  CWE_1251:
    class_uri: d3f:CWE-1251
    is_a: CWE_1250
    title: Mirrored Regions with Different Values
    description: "The product's architecture mirrors regions without ensuring that their contents always stay in sync."
    aliases:
      - "CWE-1251"
    annotations:
      cwe-id: "CWE-1251"
    exact_mappings:
      - cwe:CWE-1251

  CWE_1252:
    class_uri: d3f:CWE-1252
    is_a: CWE_284
    title: CPU Hardware Not Configured to Support Exclusivity of Write and Execute Operations
    description: |-
      The CPU is not configured to provide hardware support for exclusivity of write and execute operations on memory. This allows an attacker to execute data from all of memory.
    aliases:
      - "CWE-1252"
    annotations:
      cwe-id: "CWE-1252"
    exact_mappings:
      - cwe:CWE-1252

  CWE_1253:
    class_uri: d3f:CWE-1253
    is_a: CWE_693
    title: Incorrect Selection of Fuse Values
    description: |-
      The logic level used to set a system to a secure state relies on a fuse being unblown. An attacker can set the system to an insecure state merely by blowing the fuse.
    aliases:
      - "CWE-1253"
    annotations:
      cwe-id: "CWE-1253"
    exact_mappings:
      - cwe:CWE-1253

  CWE_1254:
    class_uri: d3f:CWE-1254
    is_a: CWE_208
    mixins:
      - CWE_697
    title: Incorrect Comparison Logic Granularity
    description: |-
      The product's comparison logic is performed over a series of steps rather than across the entire string in one operation. If there is a comparison logic failure on one of these steps, the operation may be vulnerable to a timing attack that can result in the interception of the process for nefarious purposes.
    aliases:
      - "CWE-1254"
    annotations:
      cwe-id: "CWE-1254"
    exact_mappings:
      - cwe:CWE-1254

  CWE_1255:
    class_uri: d3f:CWE-1255
    is_a: CWE_1300
    title: Comparison Logic is Vulnerable to Power Side-Channel Attacks
    description: |-
      A device's real time power consumption may be monitored during security token evaluation and the information gleaned may be used to determine the value of the reference token.
    aliases:
      - "CWE-1255"
    annotations:
      cwe-id: "CWE-1255"
    exact_mappings:
      - cwe:CWE-1255

  CWE_1256:
    class_uri: d3f:CWE-1256
    is_a: CWE_285
    title: Improper Restriction of Software Interfaces to Hardware Features
    description: |-
      The product provides software-controllable device functionality for capabilities such as power and clock management, but it does not properly limit functionality that can lead to modification of hardware memory or register bits, or the ability to observe physical side channels.
    aliases:
      - "CWE-1256"
    annotations:
      cwe-id: "CWE-1256"
    exact_mappings:
      - cwe:CWE-1256

  CWE_1257:
    class_uri: d3f:CWE-1257
    is_a: CWE_284
    title: Improper Access Control Applied to Mirrored or Aliased Memory Regions
    description: |-
      Aliased or mirrored memory regions in hardware designs may have inconsistent read/write permissions enforced by the hardware. A possible result is that an untrusted agent is blocked from accessing a memory region but is not blocked from accessing the corresponding aliased memory region.
    aliases:
      - "CWE-1257"
    annotations:
      cwe-id: "CWE-1257"
    exact_mappings:
      - cwe:CWE-1257

  CWE_1258:
    class_uri: d3f:CWE-1258
    is_a: CWE_200
    mixins:
      - CWE_212
    title: Exposure of Sensitive System Information Due to Uncleared Debug Information
    description: |-
      The hardware does not fully clear security-sensitive values, such as keys and intermediate values in cryptographic operations, when debug mode is entered.
    aliases:
      - "CWE-1258"
    annotations:
      cwe-id: "CWE-1258"
    exact_mappings:
      - cwe:CWE-1258

  CWE_1259:
    class_uri: d3f:CWE-1259
    is_a: CWE_284
    title: Improper Restriction of Security Token Assignment
    description: |-
      The System-On-A-Chip (SoC) implements a Security Token mechanism to differentiate what actions are allowed or disallowed when a transaction originates from an entity. However, the Security Tokens are improperly protected.
    aliases:
      - "CWE-1259"
    annotations:
      cwe-id: "CWE-1259"
    exact_mappings:
      - cwe:CWE-1259

  CWE_126:
    class_uri: d3f:CWE-126
    is_a: CWE_125
    mixins:
      - CWE_788
    title: Buffer Over-read
    description: |-
      The product reads from a buffer using buffer access mechanisms such as indexes or pointers that reference memory locations after the targeted buffer.
    aliases:
      - "CWE-126"
    annotations:
      cwe-id: "CWE-126"
    exact_mappings:
      - cwe:CWE-126

  CWE_1260:
    class_uri: d3f:CWE-1260
    is_a: CWE_284
    title: Improper Handling of Overlap Between Protected Memory Ranges
    description: "The product allows address regions to overlap, which can result in the bypassing of intended memory protection."
    aliases:
      - "CWE-1260"
    annotations:
      cwe-id: "CWE-1260"
    exact_mappings:
      - cwe:CWE-1260

  CWE_1261:
    class_uri: d3f:CWE-1261
    is_a: CWE_1384
    title: Improper Handling of Single Event Upsets
    description: The hardware logic does not effectively handle when single-event upsets (SEUs) occur.
    aliases:
      - "CWE-1261"
    annotations:
      cwe-id: "CWE-1261"
    exact_mappings:
      - cwe:CWE-1261

  CWE_1262:
    class_uri: d3f:CWE-1262
    is_a: CWE_284
    title: Improper Access Control for Register Interface
    description: |-
      The product uses memory-mapped I/O registers that act as an interface to hardware functionality from software, but there is improper access control to those registers.
    aliases:
      - "CWE-1262"
    annotations:
      cwe-id: "CWE-1262"
    exact_mappings:
      - cwe:CWE-1262

  CWE_1263:
    class_uri: d3f:CWE-1263
    is_a: CWE_284
    title: Improper Physical Access Control
    description: |-
      The product is designed with access restricted to certain information, but it does not sufficiently protect against an unauthorized actor with physical access to these areas.
    aliases:
      - "CWE-1263"
    annotations:
      cwe-id: "CWE-1263"
    exact_mappings:
      - cwe:CWE-1263

  CWE_1264:
    class_uri: d3f:CWE-1264
    is_a: CWE_821
