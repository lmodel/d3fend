    title: Missing Protection Against Hardware Reverse Engineering Using Integrated Circuit (IC) Imaging Techniques
    description: |-
      Information stored in hardware may be recovered by an attacker with the capability to capture and analyze images of the integrated circuit using techniques such as scanning electron microscopy.
    aliases:
      - "CWE-1278"
    annotations:
      cwe-id: "CWE-1278"
    exact_mappings:
      - cwe:CWE-1278

  CWE_1279:
    class_uri: d3f:CWE-1279
    is_a: CWE_665
    mixins:
      - CWE_696
    title: Cryptographic Operations are run Before Supporting Units are Ready
    description: |-
      Performing cryptographic operations without ensuring that the supporting inputs are ready to supply valid data may compromise the cryptographic result.
    aliases:
      - "CWE-1279"
    annotations:
      cwe-id: "CWE-1279"
    exact_mappings:
      - cwe:CWE-1279

  CWE_128:
    class_uri: d3f:CWE-128
    is_a: CWE_682
    title: Wrap-around Error
    description: |-
      Wrap around errors occur whenever a value is incremented past the maximum value for its type and therefore "wraps around" to a very small, negative, or undefined value.
    aliases:
      - "CWE-128"
    annotations:
      cwe-id: "CWE-128"
    exact_mappings:
      - cwe:CWE-128

  CWE_1280:
    class_uri: d3f:CWE-1280
    is_a: CWE_284
    mixins:
      - CWE_696
    title: Access Control Check Implemented After Asset is Accessed
    description: "A product's hardware-based access control check occurs after the asset has been accessed."
    aliases:
      - "CWE-1280"
    annotations:
      cwe-id: "CWE-1280"
    exact_mappings:
      - cwe:CWE-1280

  CWE_1281:
    class_uri: d3f:CWE-1281
    is_a: CWE_691
    title: Sequence of Processor Instructions Leads to Unexpected Behavior
    description: |-
      Specific combinations of processor instructions lead to undesirable behavior such as locking the processor until a hard reset performed.
    aliases:
      - "CWE-1281"
    annotations:
      cwe-id: "CWE-1281"
    exact_mappings:
      - cwe:CWE-1281

  CWE_1282:
    class_uri: d3f:CWE-1282
    is_a: CWE_668
    title: Assumed-Immutable Data is Stored in Writable Memory
    description: |-
      Immutable data, such as a first-stage bootloader, device identifiers, and "write-once" configuration settings are stored in writable memory that can be re-programmed or updated in the field.
    aliases:
      - "CWE-1282"
    annotations:
      cwe-id: "CWE-1282"
    exact_mappings:
      - cwe:CWE-1282

  CWE_1283:
    class_uri: d3f:CWE-1283
    is_a: CWE_284
    title: Mutable Attestation or Measurement Reporting Data
    description: |-
      The register contents used for attestation or measurement reporting data to verify boot flow are modifiable by an adversary.
    aliases:
      - "CWE-1283"
    annotations:
      cwe-id: "CWE-1283"
    exact_mappings:
      - cwe:CWE-1283

  CWE_1284:
    class_uri: d3f:CWE-1284
    is_a: CWE_20
    title: Improper Validation of Specified Quantity in Input
    description: |-
      The product receives input that is expected to specify a quantity (such as size or length), but it does not validate or incorrectly validates that the quantity has the required properties.
    aliases:
      - "CWE-1284"
    annotations:
      cwe-id: "CWE-1284"
    exact_mappings:
      - cwe:CWE-1284

  CWE_1285:
    class_uri: d3f:CWE-1285
    is_a: CWE_20
    title: "Improper Validation of Specified Index, Position, or Offset in Input"
    description: |-
      The product receives input that is expected to specify an index, position, or offset into an indexable resource such as a buffer or file, but it does not validate or incorrectly validates that the specified index/position/offset has the required properties.
    aliases:
      - "CWE-1285"
    annotations:
      cwe-id: "CWE-1285"
    exact_mappings:
      - cwe:CWE-1285

  CWE_1286:
    class_uri: d3f:CWE-1286
    is_a: CWE_20
    title: Improper Validation of Syntactic Correctness of Input
    description: |-
      The product receives input that is expected to be well-formed - i.e., to comply with a certain syntax - but it does not validate or incorrectly validates that the input complies with the syntax.
