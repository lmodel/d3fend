  FuzzyLogic:
    class_uri: d3f:FuzzyLogic
    is_a: SymbolicAI
    title: Fuzzy Logic
    description: Fuzzy logic is a form of many-valued logic in which the truth value of variables may be any real number between 0 and 1.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-FL"
      kb-article: "## How it works It is employed to handle the concept of partial truth, where the truth value may range between completely true and completely false.[1] By contrast, in Boolean logic, the truth values of variables may only be the integer values 0 or 1. ## References 1. Fuzzy logic. (2023, May 28). I"

  GNSSReceiver:
    class_uri: d3f:GNSSReceiver
    is_a: Receiver
    title: GNSS Receiver
    description: |-
      A GNSS (Global Navigation Satellite System) receiver is an electronic device that picks up signals from one or more satellite constellations (like GPS, GLONASS, Galileo, BeiDou) to calculate precise location, velocity, and time.
    see_also:
      - https://dbpedia.org/resource/Satellite_navigation

  GNSSSatellite:
    class_uri: d3f:GNSSSatellite
    is_a: Satellite
    title: GNSS Satellite
    description: |-
      A GNSS satellite is part of a space-based constellation that transmits signals, allowing receivers on Earth to determine their position, navigation, and timing (PNT) through trilateration.
    see_also:
      - http://dbpedia.org/resource/Satellite_navigation

  GNSSSignal:
    class_uri: d3f:GNSSSignal
    is_a: ElectromagneticSignal
    title: GNSS Signal
    description: |-
      A GNSS (Global Navigation Satellite System) signal is a low-power radio signal broadcast from satellites that contains a carrier wave, a ranging code, and a navigation message. The receiver uses the carrier wave to precisely measure the time it takes for the signal to travel from the satellite, while the navigation message provides essential information like the satellite's position (ephemeris) and clock information.
    see_also:
      - https://dbpedia.org/resource/Satellite_navigation
      - https://gssc.esa.int/navipedia/index.php/GNSS_signal
    annotations:
      synonym: "Global Navigation Satellite System Signal"

  GNSSTimeRecord:
    class_uri: d3f:GNSSTimeRecord
    is_a: TimeRecord
    title: GNSS Time Record
    description: |-
      A GNSS Time Record is an information content entity encoded in a GNSS signal that represents the transmission time of that signal as determined by the transmitting satellite, expressed relative to a constellation-specific time standard and epoch.
    see_also:
      - https://gssc.esa.int/navipedia/index.php/Time_References_in_GNSS

  GPT:
    class_uri: d3f:GPT
    is_a: Transformer_basedLearning
