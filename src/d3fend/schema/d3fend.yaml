    is_a: NTPEvent
    title: NTP Control Message Event
    description: |-
      An event where an NTP client or server exchanges control messages used for diagnostic, monitoring, or administrative management of the NTP protocol, rather than time synchronization.

  NTPEvent:
    class_uri: d3f:NTPEvent
    is_a: ApplicationLayerEvent
    mixins:
      - UDPEvent
    title: NTP Event
    description: |-
      An event involving the Network Time Protocol (NTP), a protocol designed to synchronize the clocks of computer systems over packet-switched, variable-latency data networks, UDP as its transport protocol.
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/ntp_activity
      - https://schema.ocsf.io/classes/ntp_activity

  NTPServerResponseEvent:
    class_uri: d3f:NTPServerResponseEvent
    is_a: NTPEvent
    title: NTP Server Response Event
    description: |-
      An event where an NTP server sends time synchronization data to a client, enabling the client to align its local clock with the server's reference time.

  NTPSymmetricActiveExchangeEvent:
    class_uri: d3f:NTPSymmetricActiveExchangeEvent
    is_a: NTPEvent
    title: NTP Symmetric Active Exchange Event
    description: |-
      An event where an NTP peer operating in symmetric active mode initiates clock synchronization messages to a peer in symmetric passive mode, enabling time synchronization between equal-status systems.

  NTPSymmetricPassiveExchangeEvent:
    class_uri: d3f:NTPSymmetricPassiveExchangeEvent
    is_a: NTPEvent
    title: NTP Symmetric Passive Exchange Event
    description: |-
      An event where an NTP peer operating in symmetric passive mode responds to clock synchronization messages initiated by a symmetric active peer, facilitating mutual timekeeping.

  NaiveBayesClassifier:
    class_uri: d3f:NaiveBayesClassifier
    is_a: Classification
    title: Naive Bayes Classifier
    description: |-
      The Naïve Bayes classifier is a supervised machine learning algorithm, which is used for classification tasks, like text classification. It is also part of a family of generative learning algorithms, meaning that it seeks to model the distribution of inputs of a given class or category.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-NBC"
      kb-article: "## References Naive Bayes. IBM. [Link](https://www.ibm.com/topics/naive-bayes?mhsrc=ibmsearch_a&mhq=naive%20bayes)."

  NamedPipe:
    class_uri: d3f:NamedPipe
    is_a: Pipe
    title: Named Pipe
    description: |-
      In computing, a named pipe (also known as a FIFO for its behavior) is an extension to the traditional pipe concept on Unix and Unix-like systems, and is one of the methods of inter-process communication (IPC). The concept is also found in OS/2 and Microsoft Windows, although the semantics differ substantially. A traditional pipe is 'unnamed' and lasts only as long as the process. A named pipe, however, can last as long as the system is up, beyond the life of the process. It can be deleted if no longer used. Usually a named pipe appears as a file, and generally processes attach to it for IPC.
    see_also:
      - https://en.wikipedia.org/wiki/Named_pipe
      - https://dbpedia.org/resource/Named_pipe
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:NamedPipe

  Network:
    class_uri: d3f:Network
    is_a: DigitalInformationBearer
    description: |-
      A network is a group of computers that use a set of common communication protocols over digital interconnections for the purpose of sharing resources located on or provided by the network nodes. The interconnections between nodes are formed from a broad spectrum of telecommunication network technologies, based on physically wired, optical, and wireless radio-frequency methods that may be arranged in a variety of network topologies.
    aliases:
      - "Computer Network"
    see_also:
      - http://wordnet-rdf.princeton.edu/id/03826490-n
    annotations:
      owl_named_individual: "true"

  NetworkAccessMediation:
    class_uri: d3f:NetworkAccessMediation
    is_a: AccessMediation
    title: Network Access Mediation
    description: |-
      Network access mediation is the control method for authorizing access to a system by a user (or a process acting on behalf of a user) communicating through a network, including a local area network, a wide area network, and the Internet.
    see_also:
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-160v1r1.pdf
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NAM"
      synonym: "Network Access Control"
      kb-article: "## How it works Network Access Mediation is a crucial process in telecommunications and IT networks that involves controlling access to network resources. It acts as an intermediary layer between network access requests and the actual network resources, ensuring that only authorized users and devic"

  NetworkAgent:
    class_uri: d3f:NetworkAgent
    is_a: Software
    title: Network Agent
    description: |-
      A network agent is software installed on a network node or device that transmits information back to a collector agent or management system.  Kinds of network agents include SNMP Agent, IPMI agents, WBEM agents, and many proprietary agents capturing network monitoring and management information.
    annotations:
      owl_named_individual: "true"
      synonym: "Exporter"

  NetworkAudioStreamingResource:
    class_uri: d3f:NetworkAudioStreamingResource
    is_a: NetworkMediaStreamingResource
    title: Network Audio Streaming Resource
    description: A server that provides digital audio media content to users.

  NetworkAudioVisualStreamingResource:
    class_uri: d3f:NetworkAudioVisualStreamingResource
    is_a: NetworkMultimediaStreamingResource
    title: Network Audio Visual Streaming Resource
    description: A server that provides digital audio-visual media content to users.

  NetworkCardFirmware:
    class_uri: d3f:NetworkCardFirmware
    is_a: PeripheralFirmware
    title: Network Card Firmware
    description: Firmware that is installed on a network card (network interface controller).
    aliases:
      - "Network Controller Firmware"
    see_also:
      - http://dbpedia.org/resource/Network_interface_controller
    annotations:
      owl_named_individual: "true"

  NetworkConnectionCloseEvent:
    class_uri: d3f:NetworkConnectionCloseEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Close Event
    description: An event where a network connection is closed.

  NetworkConnectionEvent:
    class_uri: d3f:NetworkConnectionEvent
    is_a: NetworkEvent
    title: Network Connection Event
    description: "An event related to the establishment, maintenance, or termination of a network connection."
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/network_activity
      - https://schema.ocsf.io/classes/network_activity

  NetworkConnectionFailEvent:
    class_uri: d3f:NetworkConnectionFailEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Fail Event
    description: An event where a network connection attempt fails.

  NetworkConnectionListenEvent:
    class_uri: d3f:NetworkConnectionListenEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Listen Event
    description: An event where a network endpoint begins listening for new network connections.

  NetworkConnectionOpenEvent:
    class_uri: d3f:NetworkConnectionOpenEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Open Event
    description: An event where a network connection is successfully opened.

  NetworkConnectionRefuseEvent:
    class_uri: d3f:NetworkConnectionRefuseEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Refuse Event
    description: An event where a network connection is refused.

  NetworkConnectionResetEvent:
    class_uri: d3f:NetworkConnectionResetEvent
    is_a: NetworkConnectionEvent
    title: Network Connection Reset Event
    description: An event where an attempt is made to establish a network connection.

  NetworkDeviceEvent:
    class_uri: d3f:NetworkDeviceEvent
    is_a: HardwareDeviceEvent
    title: Network Device Event
    description: |-
      An event capturing the activity or state of network devices, such as Ethernet adapters, Wi-Fi modules, or virtual interfaces. These events highlight connectivity, configuration, or performance changes.

  NetworkDirectoryResource:
    class_uri: d3f:NetworkDirectoryResource
    is_a: NetworkFileShareResource
    title: Network Directory Resource
    description: A directory resource made available from one host to other hosts on a computer network.
    annotations:
      owl_named_individual: "true"

  NetworkEvent:
    class_uri: d3f:NetworkEvent
    is_a: DigitalEvent
    title: Network Event
    description: An event involving network communications within or between digital systems.
    see_also:
      - https://schema.ocsf.io/1.3.0/categories/network
      - https://schema.ocsf.io/categories/network
    broad_mappings:
      - unified_cyber_ontology:Action

  NetworkFileResource:
    class_uri: d3f:NetworkFileResource
    is_a: NetworkFileShareResource
    title: Network File Resource
    description: A computer file resource made available from one host to other hosts on a computer network.
    annotations:
      owl_named_individual: "true"

  NetworkFileShareResource:
    class_uri: d3f:NetworkFileShareResource
    is_a: NetworkResource
    title: Network File Share Resource
    description: |-
      A shared file resource, or network file share, is a computer file made available from one host to other hosts on a computer network. Network sharing is made possible by inter-process communication over the network. It includes both files and directories.
    annotations:
      owl_named_individual: "true"

  NetworkFlow:
    class_uri: d3f:NetworkFlow
    is_a: DigitalInformation
    title: Network Flow
    description: |-
      A summarization of network transactions between a client and server. It often summarizes bytes sent, bytes received, and protocol flags.
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:NetworkFlow
    close_mappings:
      - stix:NetworkTraffic

  NetworkFlowSensor:
    class_uri: d3f:NetworkFlowSensor
    is_a: NetworkSensor
    title: Network Flow Sensor
    description: Monitors network traffic and produces summaries of data flows traversing the network.
    annotations:
      owl_named_individual: "true"

  NetworkFrame:
    class_uri: d3f:NetworkFrame
    is_a: DigitalInformationBearer
    title: Network Frame
    description: |-
      A finite, self-delimited sequence of bits exchanged as one unit over a single data link. Formed by link-layer encapsulation, a frame typically begins with synchronization and control fields, carries a payload, ends with an integrity check, and is bounded from adjacent frames by explicit timing or delimiter symbols.
    aliases:
      - "Frame"
    see_also:
      - http://dbpedia.org/resource/Frame_(networking)

  NetworkInitScriptFileResource:
    class_uri: d3f:NetworkInitScriptFileResource
    is_a: InitScript
    mixins:
      - NetworkFileResource
    title: Network Init Script File Resource
    description: |-
      A computer file resource made available from one host to other hosts on a computer network that is also an initialization script.
    annotations:
      owl_named_individual: "true"

  NetworkInterfaceCard:
    class_uri: d3f:NetworkInterfaceCard
    is_a: HardwareDevice
    title: Network Interface Card
    description: |-
      A network interface card (NIC, also known as a network interface controller, network adapter, LAN adapter or physical network interface, and by similar terms) is a computer hardware component that connects a computer to a computer network.
    see_also:
      - https://schema.ocsf.io/objects/network_interface
      - https://dbpedia.org/page/Network_interface_controller
    annotations:
      owl_named_individual: "true"
      synonym: "Network Interface Controller"

  NetworkIsolation:
    class_uri: d3f:NetworkIsolation
    is_a: DefensiveTechnique
    title: Network Isolation
    description: Network Isolation techniques prevent network hosts from accessing non-essential system network resources.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NI"

  NetworkLink:
    class_uri: d3f:NetworkLink
    is_a: LogicalLink
    title: Network Link
    description: |-
      A network link is a link within the network layer, which is responsible for packet forwarding including routing through intermediate routers.
    see_also:
      - https://dbpedia.org/resource/Network_layer
      - https://www.techtarget.com/searchnetworking/definition/Network-layer
    annotations:
      synonym: "Layer-3 Link"

  NetworkMapping:
    class_uri: d3f:NetworkMapping
    is_a: DefensiveTechnique
    title: Network Mapping
    description: |-
      Network mapping encompasses the techniques to identify and model the physical layer, network layer, and data exchange layers of the organization's network and their physical location, and determine allowed pathways through that network.
    see_also:
      - https://en.wikipedia.org/wiki/Network_topology
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NM"
      display-order: "3"

  NetworkMediaStreamingResource:
    class_uri: d3f:NetworkMediaStreamingResource
    is_a: NetworkResource
    title: Network Media Streaming Resource
    description: A server that provides digital media content to users.

  NetworkMultimediaStreamingResource:
    class_uri: d3f:NetworkMultimediaStreamingResource
    is_a: NetworkMediaStreamingResource
    title: Network Multimedia Streaming Resource
    description: A server that provides digital multimedia content to users.

  NetworkNode:
    class_uri: d3f:NetworkNode
    is_a: DigitalInformationBearer
    title: Network Node
    description: |-
      In telecommunications networks, a node (Latin nodus, 'knot') is either a redistribution point or a communication endpoint. The definition of a node depends on the network and protocol layer referred to. A physical network node is an electronic device that is attached to a network, and is capable of creating, receiving, or transmitting information over a communications channel. A passive distribution point such as a distribution frame or patch panel is consequently not a node.
    see_also:
      - http://dbpedia.org/resource/Node_(networking)
    annotations:
      owl_named_individual: "true"

  NetworkNodeInventory:
    class_uri: d3f:NetworkNodeInventory
    is_a: AssetInventory
    title: Network Node Inventory
    description: |-
      Network node inventorying identifies and records all the network nodes (hosts, routers, switches, firewalls, etc.) in the organization's architecture.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NNI"
      synonym: "System Discovery"
      kb-article: "## How it works Administrators collect information on network nodes in their architecture using a variety of administrative and management tools that query network devices and nodes for information. In some cases, where such queries are not supported or provide specific information of interest, an"
    related_mappings:
      - attack:T1114.002
      - attack:T1505.002
      - attack:T1505.003
    broad_mappings:
      - d3f:T1114
      - d3f:T1505

  NetworkPacket:
    class_uri: d3f:NetworkPacket
    is_a: DigitalInformationBearer
    title: Network Packet
    description: |-
      A network packet is a formatted unit of data carried by a packet-switched network. Computer communications links that do not support packets, such as traditional point-to-point telecommunications links, simply transmit data as a bit stream. When data is formatted into packets, packet switching is possible and the bandwidth of the communication medium can be better shared among users than with circuit switching.
    see_also:
      - http://dbpedia.org/resource/Network_packet
    annotations:
      owl_named_individual: "true"

  NetworkPrinter:
    class_uri: d3f:NetworkPrinter
    is_a: SharedComputer
    title: Network Printer
    description: |-
      In computing, a network printer is a device that can be accessed over a network which makes a persistent representation of graphics or text, usually on paper. While most output is human-readable, bar code printers are an example of an expanded use for printers. The different types of printers include 3D printer, inkjet printer, laser printer, thermal printer, etc.  Note that not all printers are networked and the digital information to be printed must be passed either by removable media or as directly connecting the printer to a computer (e.g., by USB.)
    see_also:
      - http://dbpedia.org/resource/Printer_(computing)

  NetworkProtocolAnalyzer:
    class_uri: d3f:NetworkProtocolAnalyzer
    is_a: NetworkSensor
    title: Network Protocol Analyzer
    description: Monitors and parses network protocols to extract values from various network protocol layers.
    annotations:
      owl_named_individual: "true"

  NetworkResource:
    class_uri: d3f:NetworkResource
    is_a: RemoteResource
    title: Network Resource
    description: |-
      In computing, a shared resource, or network share, is a computer resource made available from one host to other hosts on a computer network. It is a device or piece of information on a computer that can be remotely accessed from another computer, typically via a local area network or an enterprise intranet, transparently as if it were a resource in the local machine.Network sharing is made possible by inter-process communication over the network.
    aliases:
      - "Shared Resource"
    see_also:
      - http://dbpedia.org/resource/Shared_resource
    annotations:
      owl_named_individual: "true"

  NetworkResourceAccess:
    class_uri: d3f:NetworkResourceAccess
    is_a: ResourceAccess
    title: Network Resource Access
    description: Ephemeral digital artifact comprising a request of a network resource and any response from that network resource.
    annotations:
      owl_named_individual: "true"

  NetworkResourceAccessMediation:
    class_uri: d3f:NetworkResourceAccessMediation
    is_a: AccessMediation
    title: Network Resource Access Mediation
    description: Control of access to organizational systems and services by users or processes over a network.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NRAM"
      synonym: "Remote Access Control"
      kb-article: "## How it works Network Resource Access Control involves managing and regulating access to resources within an organization's network. This includes ensuring that only authorized users or processes can access specific systems or data, often through authentication and authorization mechanisms. Examp"
    related_mappings:
      - attack:T1037.003
      - attack:T1039
      - attack:T1070.005
      - attack:T1074.002
      - attack:T1080
      - attack:T1213.001
      - attack:T1213.002
      - attack:T1491.002
    broad_mappings:
      - d3f:CollectionTechnique
      - d3f:LateralMovementTechnique
      - d3f:T1037
      - d3f:T1070
      - d3f:T1074
      - d3f:T1213
      - d3f:T1491

  NetworkScanner:
    class_uri: d3f:NetworkScanner
    is_a: CyberSensor
    title: Network Scanner
    description: |-
      A network scanner is a computer program used to retrieve usernames and info on groups, shares, and services of networked computers. This type of program scans networks for vulnerabilities in the security of that network. If there is a vulnerability with the security of the network, it will send a report back to a hacker who may use this info to exploit that network glitch to gain entry to the network or for other malicious activities. Ethical hackers often also use the information to remove the glitches and strengthen their network.
    aliases:
      - "Network Enumerator"
    see_also:
      - https://en.wikipedia.org/wiki/Network_enumeration#Software
      - https://dbpedia.org/page/Network_enumeration
    annotations:
      owl_named_individual: "true"

  NetworkSensor:
    class_uri: d3f:NetworkSensor
    is_a: CyberSensor
    title: Network Sensor
    description: A Network Sensor monitors network traffic and communication patterns.

  NetworkService:
    class_uri: d3f:NetworkService
    is_a: ServiceApplicationProcess
    title: Network Service
    description: |-
      In computer networking, a network service is an application running at the network application layer and above, that provides data storage, manipulation, presentation, communication or other capability which is often implemented using a client-server or peer-to-peer architecture based on application layer network protocols. Clients and servers will often have a user interface, and sometimes other hardware associated with it.
    see_also:
      - http://dbpedia.org/resource/Network_service

  NetworkSession:
    class_uri: d3f:NetworkSession
    is_a: Session
    title: Network Session
    description: |-
      A network session is a temporary and interactive information interchange between two or more devices communicating over a network. A session is established at a certain point in time, and then 'torn down' - brought to an end - at some later point. An established communication session may involve more than one message in each direction. A session is typically stateful, meaning that at least one of the communicating parties needs to hold current state information and save information about the session history in order to be able to communicate, as opposed to stateless communication, where the communication consists of independent requests with responses. Network sessions may be established and implemented as part of protocols and services at the application, session, or transport layers of the OSI model.
    see_also:
      - http://dbpedia.org/resource/OSI_model
      - http://dbpedia.org/resource/Session_(computer_science)
      - https://schema.ocsf.io/objects/network_connection_info
    annotations:
      owl_named_individual: "true"

  NetworkTimeServer:
    class_uri: d3f:NetworkTimeServer
    is_a: Server
    title: Network Time Server
    description: |-
      A network time server is a server computer that reads the actual time from a reference clock and distributes this information to its clients using a computer network. The time server may be a local network time server or an internet time server. The time server may also be a stand-alone hardware device. It can use NTP (RFC5905) or other protocols.
    see_also:
      - http://dbpedia.org/resource/Time_server

  NetworkTraffic:
    class_uri: d3f:NetworkTraffic
    is_a: DigitalInformationBearer
    title: Network Traffic
    description: |-
      Network traffic or data traffic is the data, or alternatively the amount of data, moving across a network at a given point of time.  Network data in computer networks is mostly encapsulated in network packets, which provide the load in the network.
    aliases:
      - "Data Traffic"
    see_also:
      - http://dbpedia.org/resource/Network_traffic
      - https://schema.ocsf.io/objects/network_traffic
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - stix:NetworkTraffic

  NetworkTrafficAnalysis:
    class_uri: d3f:NetworkTrafficAnalysis
    is_a: DefensiveTechnique
    title: Network Traffic Analysis
    description: Analyzing intercepted or summarized computer network traffic to detect unauthorized activity.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-NTA"

  NetworkTrafficAnalysisSoftware:
    class_uri: d3f:NetworkTrafficAnalysisSoftware
    is_a: DeveloperApplication
    title: Network Traffic Analysis Software
    description: |-
      A packet analyzer, also known as packet sniffer, protocol analyzer, or network analyzer, is a computer program or computer hardware such as a packet capture appliance, that can intercept and log traffic that passes over a computer network or part of a network."
    annotations:
      synonym: "Network Sniffer"

  NetworkTrafficCommunityDeviation:
    class_uri: d3f:NetworkTrafficCommunityDeviation
    is_a: NetworkTrafficAnalysis
