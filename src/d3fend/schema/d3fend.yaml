  DesktopComputer:
    class_uri: d3f:DesktopComputer
    is_a: PersonalComputer
    title: Desktop Computer
    description: |-
      A desktop computer is a personal computer designed for regular use at a single location on or near a desk or table due to its size and power requirements. The most common configuration has a case that houses the power supply, motherboard (a printed circuit board with a microprocessor as the central processing unit (CPU), memory, bus, and other electronic components, disk storage (usually one or more hard disk drives, solid state drives, optical disc drives, and in early models a floppy disk drive); a keyboard and mouse for input; and a computer monitor, speakers, and, often, a printer for output. The case may be oriented horizontally or vertically and placed either underneath, beside, or on top of a desk.
    see_also:
      - http://dbpedia.org/resource/Desktop_computer

  Detect:
    class_uri: d3f:Detect
    is_a: DefensiveTactic
    description: The detect tactic is used to identify adversary access to or unauthorized activity on computer networks.
    annotations:
      owl_named_individual: "true"
      display-order: "1"
      display-priority: "0"

  DetectionEvent:
    class_uri: d3f:DetectionEvent
    is_a: SecurityEvent
    title: Detection Event
    description: |-
      An event capturing the identification of a potential security issue, such as unauthorized access attempts, policy violations, or anomalous activities. Detection events form the foundation of cybersecurity monitoring and response.
    see_also:
      - https://schema.ocsf.io/1.3.0/categories/findings
      - https://schema.ocsf.io/categories/findings
    annotations:
      owl_named_individual: "true"

  DeveloperApplication:
    class_uri: d3f:DeveloperApplication
    is_a: UserApplication
    title: Developer Application
    description: |-
      An application used to develop computer software including applications used for software construction, analysis, testing, packaging, or management.
    see_also:
      - http://dbpedia.org/resource/Application_development
      - http://dbpedia.org/resource/Application_software

  DialUpModem:
    class_uri: d3f:DialUpModem
    is_a: Modem
    title: Dial Up Modem
    description: |-
      A dial-up modem transmits computer data over an ordinary switched telephone line that has not been designed for data use. This contrasts with leased line modems, which also operate over lines provided by a telephone company, but ones which are intended for data use and do not impose the same signaling constraints. The modulated data must fit the frequency constraints of a normal voice audio signal, and the modem must be able to perform the actions needed to connect a call through a telephone exchange, namely: picking up the line, dialing, understanding signals sent back by phone company equipment (dial tone, ringing, busy signal,) and on the far end of the call, the second modem in the connection must be able to recognize the incoming ring signal and answer the line.
    see_also:
      - http://dbpedia.org/resource/Modem#Dial-up

  DifferentialVolumeSnapshot:
    class_uri: d3f:DifferentialVolumeSnapshot
    is_a: VolumeSnapshot
    title: Differential Volume Snapshot
    description: |-
      A differential volume snapshot is a point-in-time capture of the files and directories that were changed since the last full snapshot.
    see_also:
      - https://aws.amazon.com/compare/the-difference-between-incremental-differential-and-other-backups/

  DigitalAccessBadge:
    class_uri: d3f:DigitalAccessBadge
    is_a: Credential
    title: Digital Access Badge
    description: |-
      A credential used to gain entry to an area having automated access control entry points. Example media being magnetic stripe, proximity, barcode, or smart cards are examples.
    see_also:
      - https://dbpedia.org/page/Access_badge
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-116r1.pdf
    annotations:
      owl_named_individual: "true"
      synonym: "CAC"

  DigitalArtifact:
    class_uri: d3f:DigitalArtifact
    is_a: Artifact
    title: Digital Artifact
    description: |-
      An information-bearing artifact (object) that is, or is encoded to be used with, a digital computer system. This concept is broad to include the literal instances of an artifact, or an implicit summarization of changes to or properties of other artifacts.
    see_also:
      - http://dbpedia.org/resource/Digital_artifactual_value
      - http://dbpedia.org/resource/Virtual_artifact
      - https://www.iso.org/obp/ui/#iso:std:iso-iec:19770:-1:ed-3:v1:en
    annotations:
      owl_named_individual: "true"
      display-baseurl: "/dao/artifact/"
      synonym: "Digital Asset"
    close_mappings:
      - unified_cyber_ontology:Item
    broad_mappings:
      - oscal:Resource
    slots:
      - d3fend-artifact-data-property

  DigitalAudio:
    class_uri: d3f:DigitalAudio
    is_a: DigitalMedia
    title: Digital Audio
    description: "Digital audio is a representation of sound recorded in, or converted into, digital form."

  DigitalAudioVisualMedia:
    class_uri: d3f:DigitalAudioVisualMedia
    is_a: DigitalMultimedia
    title: Digital Audio Visual Media
    description: Audiovisual (AV) is electronic media possessing both a sound and a visual component.

  DigitalCamera:
    class_uri: d3f:DigitalCamera
    is_a: HardwareDevice
    title: Digital Camera
    description: An optical instrument that can capture an image. A digital camera that captures photographs in digital memory.
    see_also:
      - https://dbpedia.org/page/Digital_camera
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:DigitalCamera

  DigitalDocument:
    class_uri: d3f:DigitalDocument
    is_a: DigitalMedia
    title: Digital Document
    description: |-
      An digital document is any electronic media content (other than computer programs or system files) that is intended to be used in either an electronic form or as printed output.
    close_mappings:
      - oscal:OscalDocument
      - spdx:SpdxDocument
      - unified_cyber_ontology:File

  DigitalEvent:
    class_uri: d3f:DigitalEvent
    is_a: Event
    title: Digital Event
    description: |-
      A digital event represents an observable occurrence, action, or state change within digital systems, networks, or their interactions. These events are characterized by their impact on the confidentiality, integrity, availability, or functionality of digital resources, processes, identities, or communications. Digital events are essential units of information in cybersecurity, serving as the basis for detecting threats, analyzing anomalies, and orchestrating responses in complex, interconnected environments.
    annotations:
      owl_named_individual: "true"
    close_mappings:
      - unified_cyber_ontology:Action

  DigitalEventRecord:
    class_uri: d3f:DigitalEventRecord
    is_a: Record
    title: Digital Event Record
    description: |-
      A digital event record is a structured representation of a digital event, encapsulating all relevant details about the occurrence for storage, analysis, and response. These records serve as the primary artifacts for cybersecurity operations, enabling threat detection, forensic investigations, and compliance reporting. Digital event records include metadata such as timestamps, origin, context, and associated resources, ensuring traceability and actionable intelligence in digital ecosystems.
    annotations:
      owl_named_individual: "true"

  DigitalFingerprint:
    class_uri: d3f:DigitalFingerprint
    is_a: Identifier
    title: Digital Fingerprint
    description: |-
      A digital signature uniquely identifies data and has the property that changing a single bit in the data will cause a completely different message digest to be generated.
    see_also:
      - https://schema.ocsf.io/objects/fingerprint
      - https://csrc.nist.gov/glossary/term/digital_fingerprint

  DigitalIdentity:
    class_uri: d3f:DigitalIdentity
    is_a: DigitalInformation
    title: Digital Identity
    description: |-
      The unique representation of a subject engaged in an online transaction. A digital identity is always unique in the context of a digital service, but does not necessarily need to uniquely identify the subject in all contexts. In other words, accessing a digital service may not mean that the subject's real-life identity is known.  Note: There is no single, widely accepted definition for this term and context is important. This definition is specific to online transactions.
    comments:
      - "Variously describes or designates. Designation is not compete or definite without context. The representation generally can be identified by a unique identifier, though this may be private information."
    see_also:
      - https://pages.nist.gov/800-63-3/sp800-63-3.html
    annotations:
      owl_named_individual: "true"
    close_mappings:
      - stix:Identity
      - unified_cyber_ontology:Identity

  DigitalImage:
    class_uri: d3f:DigitalImage
    is_a: DigitalMedia
    title: Digital Image
    description: |-
      A digital image is a pixel-based visual representation stored in formats like JPEG or PNG, used for various digital applications.

  DigitalInformation:
    class_uri: d3f:DigitalInformation
    is_a: DigitalArtifact
    title: Digital Information
    description: |-
      Digital information is a broad category of encoded representations in digital form that convey meaning, instructions, or functionality.

  DigitalInformationBearer:
    class_uri: d3f:DigitalInformationBearer
    is_a: DigitalArtifact
    title: Digital Information Bearer
    description: "A digital information bearer is a physical or virtual entity that stores, transmits, or processes digital information."

  DigitalMedia:
