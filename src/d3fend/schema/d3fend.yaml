      d3fend-id: "D3-PLLM"
      synonym: "Passive Logical Layer Mapping"

  Password:
    class_uri: d3f:Password
    is_a: Credential
    description: |-
      A password, sometimes called a passcode, is a memorized secret, typically a string of characters, usually used to confirm the identity of a user. Using the terminology of the NIST Digital Identity Guidelines, the secret is memorized by a party called the claimant while the party verifying the identity of the claimant is called the verifier. When the claimant successfully demonstrates knowledge of the password to the verifier through an established authentication protocol, the verifier is able to infer the claimant's identity.
    aliases:
      - "Passcode"
    see_also:
      - http://dbpedia.org/resource/Password
    annotations:
      owl_named_individual: "true"

  PasswordAuthentication:
    class_uri: d3f:PasswordAuthentication
    is_a: AgentAuthentication
    title: Password Authentication
    description: |-
      Password authentication is a security mechanism used to verify the identity of a user or entity attempting to access a system or resource by requiring the input of a secret string of characters, known as a password, that is associated with the user or entity.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-PWA"
    related_mappings:
      - attack:T1110.001
      - attack:T1110.002
      - attack:T1110.003
    broad_mappings:
      - d3f:T1110

  PasswordDatabase:
    class_uri: d3f:PasswordDatabase
    is_a: Database
    title: Password Database
    description: |-
      A password database is a database that holds passwords for user accounts and is usually encrypted (i.e.., the passwords are hashed). Password databases are found supporting system services (such as SAM) or part of user applications such as password managers.

  PasswordFile:
    class_uri: d3f:PasswordFile
    is_a: File
    mixins:
      - PasswordDatabase
    title: Password File
    description: "Simple form of password database held in a single file (e.g., /etc/password)"
    annotations:
      owl_named_individual: "true"

  PasswordManager:
    class_uri: d3f:PasswordManager
    is_a: Application
    title: Password Manager
    description: |-
      A password manager is a software application or hardware that helps a user store and organize passwords. Password managers usually store passwords encrypted, requiring the user to create a master password: a single, ideally very strong password which grants the user access to their entire password database. Some password managers store passwords on the user's computer (called offline password managers), whereas others store data in the provider's cloud (often called online password managers). However offline password managers also offer data storage in the user's own cloud accounts rather than the provider's cloud. While the core functionality of a password manager is to securely store large collections of passwords, many provide additional features such as form filling and password generation.
    see_also:
      - http://dbpedia.org/resource/Password_manager
    annotations:
      owl_named_individual: "true"

  PasswordRotation:
    class_uri: d3f:PasswordRotation
    is_a: CredentialRotation
    title: Password Rotation
    description: |-
      Password rotation is a security policy that mandates the periodic change of user account passwords to mitigate the risk of unauthorized access due to compromised credentials.
    see_also:
      - https://pages.nist.gov/800-63-3/sp800-63-3.html
      - https://www.auditboard.com/blog/nist-password-guidelines/
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-PR"
      kb-article: "## How it works Users may be requested to change their passwords on a regular schedule. Management servers with enterprise policies for account management provide the ability to change or reset passwords for accounts. ## Considerations Requiring users to change their passwords frequently can resu"
