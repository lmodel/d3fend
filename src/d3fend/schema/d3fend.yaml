classes:

  AML_T0000:
    class_uri: d3f:AML.T0000
    is_a: ATLASReconnaissanceTechnique
    title: Search Open Technical Databases
    description: |-
      Adversaries may search for publicly available research and technical documentation to learn how and where AI is used within a victim organization.
      The adversary can use this information to identify targets for attack, or to tailor an existing attack to make it more effective.
      Organizations often use open source model architectures trained on additional proprietary data in production.
      Knowledge of this underlying architecture allows the adversary to craft more realistic proxy models ([Create Proxy AI Model](/techniques/AML.T0005)).
      An adversary can search these resources for publications for authors employed at the victim organization.

      Research and technical materials may exist as academic papers published in [Journals and Conference Proceedings](/techniques/AML.T0000.000), or stored in [Pre-Print Repositories](/techniques/AML.T0000.001), as well as [Technical Blogs](/techniques/AML.T0000.002).
    aliases:
      - "AML.T0000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0000
    annotations:
      attack-id: "AML.T0000"
    exact_mappings:
      - atlas:AML.T0000

  AML_T0000_000:
    class_uri: d3f:AML.T0000.000
    is_a: AML_T0000
    title: Journals and Conference Proceedings
    description: |-
      Many of the publications accepted at premier artificial intelligence conferences and journals come from commercial labs.
      Some journals and conferences are open access, others may require paying for access or a membership.
      These publications will often describe in detail all aspects of a particular approach for reproducibility.
      This information can be used by adversaries to implement the paper.
    aliases:
      - "AML.T0000.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0000.000
    annotations:
      attack-id: "AML.T0000.000"
    exact_mappings:
      - atlas:AML.T0000.000

  AML_T0000_001:
    class_uri: d3f:AML.T0000.001
    is_a: AML_T0000
    title: Pre-Print Repositories
    description: |-
      Pre-Print repositories, such as arXiv, contain the latest academic research papers that haven't been peer reviewed.
      They may contain research notes, or technical reports that aren't typically published in journals or conference proceedings.
      Pre-print repositories also serve as a central location to share papers that have been accepted to journals.
      Searching pre-print repositories  provide adversaries with a relatively up-to-date view of what researchers in the victim organization are working on.
    aliases:
      - "AML.T0000.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0000.001
    annotations:
      attack-id: "AML.T0000.001"
    exact_mappings:
      - atlas:AML.T0000.001

  AML_T0000_002:
    class_uri: d3f:AML.T0000.002
    is_a: AML_T0000
    title: Technical Blogs
    description: |-
      Research labs at academic institutions and company R&D divisions often have blogs that highlight their use of artificial intelligence and its application to the organization's unique problems.
      Individual researchers also frequently document their work in blogposts.
      An adversary may search for posts made by the target victim organization or its employees.
      In comparison to [Journals and Conference Proceedings](/techniques/AML.T0000.000) and [Pre-Print Repositories](/techniques/AML.T0000.001) this material will often contain more practical aspects of the AI system.
      This could include underlying technologies and frameworks used, and possibly some information about the API access and use case.
      This will help the adversary better understand how that organization is using AI internally and the details of their approach that could aid in tailoring an attack.
    aliases:
      - "AML.T0000.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0000.002
    annotations:
      attack-id: "AML.T0000.002"
    exact_mappings:
      - atlas:AML.T0000.002

  AML_T0001:
    class_uri: d3f:AML.T0001
    is_a: ATLASReconnaissanceTechnique
    title: Search Open AI Vulnerability Analysis
    description: |-
      Much like the [Search Open Technical Databases](/techniques/AML.T0000), there is often ample research available on the vulnerabilities of common AI models. Once a target has been identified, an adversary will likely try to identify any pre-existing work that has been done for this class of models.
      This will include not only reading academic papers that may identify the particulars of a successful attack, but also identifying pre-existing implementations of those attacks. The adversary may obtain [Adversarial AI Attack Implementations](/techniques/AML.T0016.000) or develop their own [Adversarial AI Attacks](/techniques/AML.T0017.000) if necessary.
    aliases:
      - "AML.T0001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0001
    annotations:
      attack-id: "AML.T0001"
    exact_mappings:
      - atlas:AML.T0001

  AML_T0002:
    class_uri: d3f:AML.T0002
    is_a: ATLASResourceDevelopmentTechnique
    title: Acquire Public AI Artifacts
    description: |-
      Adversaries may search public sources, including cloud storage, public-facing services, and software or data repositories, to identify AI artifacts.
      These AI artifacts may include the software stack used to train and deploy models, training and testing data, model configurations and parameters.
      An adversary will be particularly interested in artifacts hosted by or associated with the victim organization as they may represent what that organization uses in a production environment.
      Adversaries may identify artifact repositories via other resources associated with the victim organization (e.g. [Search Victim-Owned Websites](/techniques/AML.T0003) or [Search Open Technical Databases](/techniques/AML.T0000)).
      These AI artifacts often provide adversaries with details of the AI task and approach.

      AI artifacts can aid in an adversary's ability to [Create Proxy AI Model](/techniques/AML.T0005).
      If these artifacts include pieces of the actual model in production, they can be used to directly [Craft Adversarial Data](/techniques/AML.T0043).
      Acquiring some artifacts requires registration (providing user details such email/name), AWS keys, or written requests, and may require the adversary to [Establish Accounts](/techniques/AML.T0021).

      Artifacts might be hosted on victim-controlled infrastructure, providing the victim with some information on who has accessed that data.
    aliases:
      - "AML.T0002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0002
    annotations:
      attack-id: "AML.T0002"
    exact_mappings:
      - atlas:AML.T0002

  AML_T0002_000:
    class_uri: d3f:AML.T0002.000
    is_a: AML_T0002
    title: Datasets
    description: |-
      Adversaries may collect public datasets to use in their operations.
      Datasets used by the victim organization or datasets that are representative of the data used by the victim organization may be valuable to adversaries.
      Datasets can be stored in cloud storage, or on victim-owned websites.
      Some datasets require the adversary to [Establish Accounts](/techniques/AML.T0021) for access.

      Acquired datasets help the adversary advance their operations, stage attacks,  and tailor attacks to the victim organization.
    aliases:
      - "AML.T0002.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0002.000
    annotations:
      attack-id: "AML.T0002.000"
    exact_mappings:
      - atlas:AML.T0002.000

  AML_T0002_001:
    class_uri: d3f:AML.T0002.001
    is_a: AML_T0002
    title: Models
    description: |-
      Adversaries may acquire public models to use in their operations.
      Adversaries may seek models used by the victim organization or models that are representative of those used by the victim organization.
      Representative models may include model architectures, or pre-trained models which define the architecture as well as model parameters from training on a dataset.
      The adversary may search public sources for common model architecture configuration file formats such as YAML or Python configuration files, and common model storage file formats such as ONNX (.onnx), HDF5 (.h5), Pickle (.pkl), PyTorch (.pth), or TensorFlow (.pb, .tflite).

      Acquired models are useful in advancing the adversary's operations and are frequently used to tailor attacks to the victim model.
    aliases:
      - "AML.T0002.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0002.001
    annotations:
      attack-id: "AML.T0002.001"
    exact_mappings:
      - atlas:AML.T0002.001

  AML_T0003:
    class_uri: d3f:AML.T0003
    is_a: ATLASReconnaissanceTechnique
    title: Search Victim-Owned Websites
    description: |-
      Adversaries may search websites owned by the victim for information that can be used during targeting.
      Victim-owned websites may contain technical details about their AI-enabled products or services.
      Victim-owned websites may contain a variety of details, including names of departments/divisions, physical locations, and data about key employees such as names, roles, and contact info.
      These sites may also have details highlighting business operations and relationships.

      Adversaries may search victim-owned websites to gather actionable information.
      This information may help adversaries tailor their attacks (e.g. [Adversarial AI Attacks](/techniques/AML.T0017.000) or [Manual Modification](/techniques/AML.T0043.003)).
      Information from these sources may reveal opportunities for other forms of reconnaissance (e.g. [Search Open Technical Databases](/techniques/AML.T0000) or [Search Open AI Vulnerability Analysis](/techniques/AML.T0001))
    aliases:
      - "AML.T0003"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0003
    annotations:
      attack-id: "AML.T0003"
    exact_mappings:
      - atlas:AML.T0003

  AML_T0004:
    class_uri: d3f:AML.T0004
    is_a: ATLASReconnaissanceTechnique
    title: Search Application Repositories
    description: |-
      Adversaries may search open application repositories during targeting.
      Examples of these include Google Play, the iOS App store, the macOS App Store, and the Microsoft Store.

      Adversaries may craft search queries seeking applications that contain AI-enabled components.
      Frequently, the next step is to [Acquire Public AI Artifacts](/techniques/AML.T0002).
    aliases:
      - "AML.T0004"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0004
    annotations:
      attack-id: "AML.T0004"
    exact_mappings:
      - atlas:AML.T0004

  AML_T0005:
    class_uri: d3f:AML.T0005
    is_a: ATLASAIAttackStagingTechnique
    title: Create Proxy AI Model
    description: |-
      Adversaries may obtain models to serve as proxies for the target model in use at the victim organization.
      Proxy models are used to simulate complete access to the target model in a fully offline manner.

      Adversaries may train models from representative datasets, attempt to replicate models from victim inference APIs, or use available pre-trained models.
    aliases:
      - "AML.T0005"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0005
    annotations:
      attack-id: "AML.T0005"
    exact_mappings:
      - atlas:AML.T0005

  AML_T0005_000:
    class_uri: d3f:AML.T0005.000
    is_a: AML_T0005
    title: Train Proxy via Gathered AI Artifacts
    description: |-
      Proxy models may be trained from AI artifacts (such as data, model architectures, and pre-trained models) that are representative of the target model gathered by the adversary.
      This can be used to develop attacks that require higher levels of access than the adversary has available or as a means to validate pre-existing attacks without interacting with the target model.
    aliases:
      - "AML.T0005.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0005.000
    annotations:
      attack-id: "AML.T0005.000"
    exact_mappings:
      - atlas:AML.T0005.000

  AML_T0005_001:
    class_uri: d3f:AML.T0005.001
    is_a: AML_T0005
    title: Train Proxy via Replication
    description: |-
      Adversaries may replicate a private model.
      By repeatedly querying the victim's [AI Model Inference API Access](/techniques/AML.T0040), the adversary can collect the target model's inferences into a dataset.
      The inferences are used as labels for training a separate model offline that will mimic the behavior and performance of the target model.

      A replicated model that closely mimic's the target model is a valuable resource in staging the attack.
      The adversary can use the replicated model to [Craft Adversarial Data](/techniques/AML.T0043) for various purposes (e.g. [Evade AI Model](/techniques/AML.T0015), [Spamming AI System with Chaff Data](/techniques/AML.T0046)).
    aliases:
      - "AML.T0005.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0005.001
    annotations:
      attack-id: "AML.T0005.001"
    exact_mappings:
      - atlas:AML.T0005.001

  AML_T0005_002:
    class_uri: d3f:AML.T0005.002
    is_a: AML_T0005
    title: Use Pre-Trained Model
    description: Adversaries may use an off-the-shelf pre-trained model as a proxy for the victim model to aid in staging the attack.
    aliases:
      - "AML.T0005.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0005.002
    annotations:
      attack-id: "AML.T0005.002"
    exact_mappings:
      - atlas:AML.T0005.002

  AML_T0006:
    class_uri: d3f:AML.T0006
    is_a: ATLASReconnaissanceTechnique
    title: Active Scanning
    description: |-
      An adversary may probe or scan the victim system to gather information for targeting. This is distinct from other reconnaissance techniques that do not involve direct interaction with the victim system.

      Adversaries may scan for open ports on a potential victim's network, which can indicate specific services or tools the victim is utilizing. This could include a scan for tools related to AI DevOps or AI services themselves such as public AI chat agents (ex: [Copilot Studio Hunter](https://github.com/mbrg/power-pwn/wiki/Modules:-Copilot-Studio-Hunter-%E2%80%90-Enum)). They can also send emails to organization service addresses and inspect the replies for indicators that an AI agent is managing the inbox.

      Information gained from Active Scanning may yield targets that provide opportunities for other forms of reconnaissance such as [Search Open Technical Databases](/techniques/AML.T0000), [Search Open AI Vulnerability Analysis](/techniques/AML.T0001), or [Gather RAG-Indexed Targets](/techniques/AML.T0064).
    aliases:
      - "AML.T0006"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0006
    annotations:
      attack-id: "AML.T0006"
    exact_mappings:
      - atlas:AML.T0006

  AML_T0007:
    class_uri: d3f:AML.T0007
    is_a: ATLASDiscoveryTechnique
    title: Discover AI Artifacts
    description: |-
      Adversaries may search private sources to identify AI learning artifacts that exist on the system and gather information about them.
      These artifacts can include the software stack used to train and deploy models, training and testing data management systems, container registries, software repositories, and model zoos.

      This information can be used to identify targets for further collection, exfiltration, or disruption, and to tailor and improve attacks.
    aliases:
      - "AML.T0007"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0007
    annotations:
      attack-id: "AML.T0007"
    exact_mappings:
      - atlas:AML.T0007

  AML_T0008:
    class_uri: d3f:AML.T0008
    is_a: ATLASResourceDevelopmentTechnique
    title: Acquire Infrastructure
    description: |-
      Adversaries may buy, lease, or rent infrastructure for use throughout their operation.
      A wide variety of infrastructure exists for hosting and orchestrating adversary operations.
      Infrastructure solutions include physical or cloud servers, domains, mobile devices, and third-party web services.
      Free resources may also be used, but they are typically limited.
      Infrastructure can also include physical components such as countermeasures that degrade or disrupt AI components or sensors, including printed materials, wearables, or disguises.

      Use of these infrastructure solutions allows an adversary to stage, launch, and execute an operation.
      Solutions may help adversary operations blend in with traffic that is seen as normal, such as contact to third-party web services.
      Depending on the implementation, adversaries may use infrastructure that makes it difficult to physically tie back to them as well as utilize infrastructure that can be rapidly provisioned, modified, and shut down.
    aliases:
      - "AML.T0008"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008
    annotations:
      attack-id: "AML.T0008"
    exact_mappings:
      - atlas:AML.T0008

  AML_T0008_000:
    class_uri: d3f:AML.T0008.000
    is_a: AML_T0008
    title: AI Development Workspaces
    description: |-
      Developing and staging AI attacks often requires expensive compute resources.
      Adversaries may need access to one or many GPUs in order to develop an attack.
      They may try to anonymously use free resources such as Google Colaboratory, or cloud resources such as AWS, Azure, or Google Cloud as an efficient way to stand up temporary resources to conduct operations.
      Multiple workspaces may be used to avoid detection.
    aliases:
      - "AML.T0008.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008.000
    annotations:
      attack-id: "AML.T0008.000"
    exact_mappings:
      - atlas:AML.T0008.000

  AML_T0008_001:
    class_uri: d3f:AML.T0008.001
    is_a: AML_T0008
    title: Consumer Hardware
    description: |-
      Adversaries may acquire consumer hardware to conduct their attacks.
      Owning the hardware provides the adversary with complete control of the environment. These devices can be hard to trace.
    aliases:
      - "AML.T0008.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008.001
    annotations:
      attack-id: "AML.T0008.001"
    exact_mappings:
      - atlas:AML.T0008.001

  AML_T0008_002:
    class_uri: d3f:AML.T0008.002
    is_a: AML_T0008
    title: Domains
    description: |-
      Adversaries may acquire domains that can be used during targeting. Domain names are the human readable names used to represent one or more IP addresses. They can be purchased or, in some cases, acquired for free.

      Adversaries may use acquired domains for a variety of purposes (see [ATT&CK](https://attack.mitre.org/techniques/T1583/001/)). Large AI datasets are often distributed as a list of URLs to individual datapoints. Adversaries may acquire expired domains that are included in these datasets and replace individual datapoints with poisoned examples ([Publish Poisoned Datasets](/techniques/AML.T0019)).
    aliases:
      - "AML.T0008.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008.002
    annotations:
      attack-id: "AML.T0008.002"
    exact_mappings:
      - atlas:AML.T0008.002

  AML_T0008_003:
    class_uri: d3f:AML.T0008.003
    is_a: AML_T0008
    title: Physical Countermeasures
    description: |-
      Adversaries may acquire or manufacture physical countermeasures to aid or support their attack.

      These components may be used to disrupt or degrade the model, such as adversarial patterns printed on stickers or T-shirts, disguises, or decoys. They may also be used to disrupt or degrade the sensors used in capturing data, such as laser pointers, light bulbs, or other tools.
    aliases:
      - "AML.T0008.003"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008.003
    annotations:
      attack-id: "AML.T0008.003"
    exact_mappings:
      - atlas:AML.T0008.003

  AML_T0008_004:
    class_uri: d3f:AML.T0008.004
    is_a: AML_T0008
    title: Serverless
    description: |-
      Adversaries may purchase and configure serverless cloud infrastructure, such as Cloudflare Workers, AWS Lambda functions, or Google Apps Scripts, that can be used during targeting. By utilizing serverless infrastructure, adversaries can make it more difficult to attribute infrastructure used during operations back to them.

      Once acquired, the serverless runtime environment can be leveraged to either respond directly to infected machines or to Proxy traffic to an adversary-owned command and control server. As traffic generated by these functions will appear to come from subdomains of common cloud providers, it may be difficult to distinguish from ordinary traffic to these providers. This can be used to bypass a Content Security Policy which prevent retrieving content from arbitrary locations.
    aliases:
      - "AML.T0008.004"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0008.004
    annotations:
      attack-id: "AML.T0008.004"
    exact_mappings:
      - atlas:AML.T0008.004

  AML_T0010:
    class_uri: d3f:AML.T0010
    is_a: ATLASInitialAccessTechnique
    title: AI Supply Chain Compromise
    description: |-
      Adversaries may gain initial access to a system by compromising the unique portions of the AI supply chain.
      This could include [Hardware](/techniques/AML.T0010.000), [Data](/techniques/AML.T0010.002) and its annotations, parts of the AI [AI Software](/techniques/AML.T0010.001) stack, or the [Model](/techniques/AML.T0010.003) itself.
      In some instances the attacker will need secondary access to fully carry out an attack using compromised components of the supply chain.
    aliases:
      - "AML.T0010"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010
    annotations:
      attack-id: "AML.T0010"
    exact_mappings:
      - atlas:AML.T0010

  AML_T0010_000:
    class_uri: d3f:AML.T0010.000
    is_a: AML_T0010
    title: Hardware
    description: |-
      Adversaries may target AI systems by disrupting or manipulating the hardware supply chain. AI models often run on specialized hardware such as GPUs, TPUs, or embedded devices, but may also be optimized to operate on CPUs.
    aliases:
      - "AML.T0010.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010.000
    annotations:
      attack-id: "AML.T0010.000"
    exact_mappings:
      - atlas:AML.T0010.000

  AML_T0010_001:
    class_uri: d3f:AML.T0010.001
    is_a: AML_T0010
    title: AI Software
    description: |-
      Most AI systems rely on a limited set of AI frameworks.
      An adversary could get access to a large number of AI systems through a comprise of one of their supply chains.
      Many AI projects also rely on other open source implementations of various algorithms.
      These can also be compromised in a targeted way to get access to specific systems.
    aliases:
      - "AML.T0010.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010.001
    annotations:
      attack-id: "AML.T0010.001"
    exact_mappings:
      - atlas:AML.T0010.001

  AML_T0010_002:
    class_uri: d3f:AML.T0010.002
    is_a: AML_T0010
    title: Data
    description: |-
      Data is a key vector of supply chain compromise for adversaries.
      Every AI project will require some form of data.
      Many rely on large open source datasets that are publicly available.
      An adversary could rely on compromising these sources of data.
      The malicious data could be a result of [Poison Training Data](/techniques/AML.T0020) or include traditional malware.

      An adversary can also target private datasets in the labeling phase.
      The creation of private datasets will often require the hiring of outside labeling services.
      An adversary can poison a dataset by modifying the labels being generated by the labeling service.
    aliases:
      - "AML.T0010.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010.002
    annotations:
      attack-id: "AML.T0010.002"
    exact_mappings:
      - atlas:AML.T0010.002

  AML_T0010_003:
    class_uri: d3f:AML.T0010.003
    is_a: AML_T0010
    title: Model
    description: |-
      AI-enabled systems often rely on open sourced models in various ways.
      Most commonly, the victim organization may be using these models for fine tuning.
      These models will be downloaded from an external source and then used as the base for the model as it is tuned on a smaller, private dataset.
      Loading models often requires executing some saved code in the form of a saved model file.
      These can be compromised with traditional malware, or through some adversarial AI techniques.
    aliases:
      - "AML.T0010.003"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010.003
    annotations:
      attack-id: "AML.T0010.003"
    exact_mappings:
      - atlas:AML.T0010.003

  AML_T0010_004:
    class_uri: d3f:AML.T0010.004
    is_a: AML_T0010
    title: Container Registry
    description: |-
      An adversary may compromise a victim's container registry by pushing a manipulated container image and overwriting an existing container name and/or tag. Users of the container registry as well as automated CI/CD pipelines may pull the adversary's container image, compromising their AI Supply Chain. This can affect development and deployment environments.

      Container images may include AI models, so the compromised image could have an AI model which was manipulated by the adversary (See [Manipulate AI Model](/techniques/AML.T0018)).
    aliases:
      - "AML.T0010.004"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0010.004
    annotations:
      attack-id: "AML.T0010.004"
    exact_mappings:
      - atlas:AML.T0010.004

  AML_T0011:
    class_uri: d3f:AML.T0011
    is_a: ATLASExecutionTechnique
    title: User Execution
    description: |-
      An adversary may rely upon specific actions by a user in order to gain execution.
      Users may inadvertently execute unsafe code introduced via [AI Supply Chain Compromise](/techniques/AML.T0010).
      Users may be subjected to social engineering to get them to execute malicious code by, for example, opening a malicious document file or link.
    aliases:
      - "AML.T0011"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0011
    annotations:
      attack-id: "AML.T0011"
    exact_mappings:
      - atlas:AML.T0011

  AML_T0011_000:
    class_uri: d3f:AML.T0011.000
    is_a: AML_T0011
    title: Unsafe AI Artifacts
    description: |-
      Adversaries may develop unsafe AI artifacts that when executed have a deleterious effect.
      The adversary can use this technique to establish persistent access to systems.
      These models may be introduced via a [AI Supply Chain Compromise](/techniques/AML.T0010).

      Serialization of models is a popular technique for model storage, transfer, and loading.
      However, this format without proper checking presents an opportunity for code execution.
    aliases:
      - "AML.T0011.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0011.000
    annotations:
      attack-id: "AML.T0011.000"
    exact_mappings:
      - atlas:AML.T0011.000

  AML_T0011_001:
    class_uri: d3f:AML.T0011.001
    is_a: AML_T0011
    title: Malicious Package
    description: |-
      Adversaries may develop malicious software packages that when imported by a user have a deleterious effect.
      Malicious packages may behave as expected to the user. They may be introduced via [AI Supply Chain Compromise](/techniques/AML.T0010). They may not present as obviously malicious to the user and may appear to be useful for an AI-related task.
    aliases:
      - "AML.T0011.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0011.001
    annotations:
      attack-id: "AML.T0011.001"
    exact_mappings:
      - atlas:AML.T0011.001

  AML_T0012:
    class_uri: d3f:AML.T0012
    is_a: ATLASInitialAccessTechnique
    title: Valid Accounts
    description: |-
      Adversaries may obtain and abuse credentials of existing accounts as a means of gaining Initial Access.
      Credentials may take the form of usernames and passwords of individual user accounts or API keys that provide access to various AI resources and services.

      Compromised credentials may provide access to additional AI artifacts and allow the adversary to perform [Discover AI Artifacts](/techniques/AML.T0007).
      Compromised credentials may also grant an adversary increased privileges such as write access to AI artifacts used during development or production.
    aliases:
      - "AML.T0012"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0012
    annotations:
      attack-id: "AML.T0012"
    exact_mappings:
      - atlas:AML.T0012

  AML_T0013:
    class_uri: d3f:AML.T0013
    is_a: ATLASDiscoveryTechnique
    title: Discover AI Model Ontology
    description: |-
      Adversaries may discover the ontology of an AI model's output space, for example, the types of objects a model can detect.
      The adversary may discovery the ontology by repeated queries to the model, forcing it to enumerate its output space.
      Or the ontology may be discovered in a configuration file or in documentation about the model.

      The model ontology helps the adversary understand how the model is being used by the victim.
      It is useful to the adversary in creating targeted attacks.
    aliases:
      - "AML.T0013"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0013
    annotations:
      attack-id: "AML.T0013"
    exact_mappings:
      - atlas:AML.T0013

  AML_T0014:
    class_uri: d3f:AML.T0014
    is_a: ATLASDiscoveryTechnique
    title: Discover AI Model Family
    description: |-
      Adversaries may discover the general family of model.
      General information about the model may be revealed in documentation, or the adversary may use carefully constructed examples and analyze the model's responses to categorize it.

      Knowledge of the model family can help the adversary identify means of attacking the model and help tailor the attack.
    aliases:
      - "AML.T0014"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0014
    annotations:
      attack-id: "AML.T0014"
    exact_mappings:
      - atlas:AML.T0014

  AML_T0015:
    class_uri: d3f:AML.T0015
    is_a: ATLASDefenseEvasionTechnique
    mixins:
      - ATLASImpactTechnique
      - ATLASInitialAccessTechnique
    title: Evade AI Model
    description: |-
      Adversaries can [Craft Adversarial Data](/techniques/AML.T0043) that prevents an AI model from correctly identifying the contents of the data or [Generate Deepfakes](/techniques/AML.T0088) that fools an AI model expecting authentic data.

      This technique can be used to evade a downstream task where AI is utilized. The adversary may evade AI-based virus/malware detection or network scanning towards the goal of a traditional cyber attack. AI model evasion through deepfake generation may also provide initial access to systems that use AI-based biometric authentication.
    aliases:
      - "AML.T0015"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0015
    annotations:
      attack-id: "AML.T0015"
    exact_mappings:
      - atlas:AML.T0015

  AML_T0016:
    class_uri: d3f:AML.T0016
    is_a: ATLASResourceDevelopmentTechnique
    title: Obtain Capabilities
    description: |-
      Adversaries may search for and obtain software capabilities for use in their operations.
      Capabilities may be specific to AI-based attacks [Adversarial AI Attack Implementations](/techniques/AML.T0016.000) or generic software tools repurposed for malicious intent ([Software Tools](/techniques/AML.T0016.001)). In both instances, an adversary may modify or customize the capability to aid in targeting a particular AI-enabled system.
    aliases:
      - "AML.T0016"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0016
    annotations:
      attack-id: "AML.T0016"
    exact_mappings:
      - atlas:AML.T0016

  AML_T0016_000:
    class_uri: d3f:AML.T0016.000
    is_a: AML_T0016
    title: Adversarial AI Attack Implementations
    description: |-
      Adversaries may search for existing open source implementations of AI attacks. The research community often publishes their code for reproducibility and to further future research. Libraries intended for research purposes, such as CleverHans, the Adversarial Robustness Toolbox, and FoolBox, can be weaponized by an adversary. Adversaries may also obtain and use tools that were not originally designed for adversarial AI attacks as part of their attack.
    aliases:
      - "AML.T0016.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0016.000
    annotations:
      attack-id: "AML.T0016.000"
    exact_mappings:
      - atlas:AML.T0016.000

  AML_T0016_001:
    class_uri: d3f:AML.T0016.001
    is_a: AML_T0016
    title: Software Tools
    description: |-
      Adversaries may search for and obtain software tools to support their operations.
      Software designed for legitimate use may be repurposed by an adversary for malicious intent.
      An adversary may modify or customize software tools to achieve their purpose.
      Software tools used to support attacks on AI systems are not necessarily AI-based themselves.
    aliases:
      - "AML.T0016.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0016.001
    annotations:
      attack-id: "AML.T0016.001"
    exact_mappings:
      - atlas:AML.T0016.001

  AML_T0016_002:
    class_uri: d3f:AML.T0016.002
    is_a: AML_T0016
    title: Generative AI
    description: |-
      Adversaries may search for and obtain generative AI models or tools, such as large language models (LLMs), to assist them in various steps of their operation. Generative AI can be used in a variety of malicious ways, including generating malware or offensive cyber scripts, [Retrieval Content Crafting](/techniques/AML.T0066), or generating [Phishing](/techniques/AML.T0052) content.

      Adversaries may obtain an open source model or they may leverage a generative AI service. They may need to jailbreak the generative AI model to bypass any restrictions put in place to limit the types of responses it can generate. They may also need to break the terms of service of the generative AI.
    aliases:
      - "AML.T0016.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0016.002
    annotations:
      attack-id: "AML.T0016.002"
    exact_mappings:
      - atlas:AML.T0016.002

  AML_T0017:
    class_uri: d3f:AML.T0017
    is_a: ATLASResourceDevelopmentTechnique
    title: Develop Capabilities
    description: |-
      Adversaries may develop their own capabilities to support operations. This process encompasses identifying requirements, building solutions, and deploying capabilities. Capabilities used to support attacks on AI-enabled systems are not necessarily AI-based themselves. Examples include setting up websites with adversarial information or creating Jupyter notebooks with obfuscated exfiltration code.
    aliases:
      - "AML.T0017"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0017
    annotations:
      attack-id: "AML.T0017"
    exact_mappings:
      - atlas:AML.T0017

  AML_T0017_000:
    class_uri: d3f:AML.T0017.000
    is_a: AML_T0017
    title: Adversarial AI Attacks
    description: |-
      Adversaries may develop their own adversarial attacks.
      They may leverage existing libraries as a starting point ([Adversarial AI Attack Implementations](/techniques/AML.T0016.000)).
      They may implement ideas described in public research papers or develop custom made attacks for the victim model.
    aliases:
      - "AML.T0017.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0017.000
    annotations:
      attack-id: "AML.T0017.000"
    exact_mappings:
      - atlas:AML.T0017.000

  AML_T0018:
    class_uri: d3f:AML.T0018
    is_a: ATLASAIAttackStagingTechnique
    mixins:
      - ATLASPersistenceTechnique
    title: Manipulate AI Model
    description: |-
      Adversaries may directly manipulate an AI model to change its behavior or introduce malicious code. Manipulating a model gives the adversary a persistent change in the system. This can include poisoning the model by changing its weights, modifying the model architecture to change its behavior, and embedding malware which may be executed when the model is loaded.
    aliases:
      - "AML.T0018"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0018
    annotations:
      attack-id: "AML.T0018"
    exact_mappings:
      - atlas:AML.T0018

  AML_T0018_000:
    class_uri: d3f:AML.T0018.000
    is_a: AML_T0018
    title: Poison AI Model
    description: |-
      Adversaries may manipulate an AI model's weights to change it's behavior or performance, resulting in a poisoned model.
      Adversaries may poison a model by by directly manipulating its weights, training the model on poisoned data, further fine-tuning the model, or otherwise interfering with its training process.

      The change in behavior of poisoned models may be limited to targeted categories in predictive AI models, or targeted topics, concepts, or facts in generative AI models, or aim for a general performance degradation.
    aliases:
      - "AML.T0018.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0018.000
    annotations:
      attack-id: "AML.T0018.000"
    exact_mappings:
      - atlas:AML.T0018.000

  AML_T0018_001:
    class_uri: d3f:AML.T0018.001
    is_a: AML_T0018
    title: Modify AI Model Architecture
    description: |-
      Adversaries may directly modify an AI model's architecture to re-define it's behavior. This can include adding or removing layers as well as adding pre or post-processing operations.

      The effects could include removing the ability to predict certain classes, adding erroneous operations to increase computation costs, or degrading performance. Additionally, a separate adversary-defined network could be injected into the computation graph, which can change the behavior based on the inputs, effectively creating a backdoor.
    aliases:
      - "AML.T0018.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0018.001
    annotations:
      attack-id: "AML.T0018.001"
    exact_mappings:
      - atlas:AML.T0018.001

  AML_T0018_002:
    class_uri: d3f:AML.T0018.002
    is_a: AML_T0018
    title: Embed Malware
    description: |-
      Adversaries may embed malicious code into AI Model files.
      AI models may be packaged as a combination of instructions and weights.
      Some formats such as pickle files are unsafe to deserialize because they can contain unsafe calls such as exec.
      Models with embedded malware may still operate as expected.
      It may allow them to achieve Execution, Command & Control, or Exfiltrate Data.
    aliases:
      - "AML.T0018.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0018.002
    annotations:
      attack-id: "AML.T0018.002"
    exact_mappings:
      - atlas:AML.T0018.002

  AML_T0019:
    class_uri: d3f:AML.T0019
    is_a: ATLASResourceDevelopmentTechnique
    title: Publish Poisoned Datasets
    description: |-
      Adversaries may [Poison Training Data](/techniques/AML.T0020) and publish it to a public location.
      The poisoned dataset may be a novel dataset or a poisoned variant of an existing open source dataset.
      This data may be introduced to a victim system via [AI Supply Chain Compromise](/techniques/AML.T0010).
    aliases:
      - "AML.T0019"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0019
    annotations:
      attack-id: "AML.T0019"
    exact_mappings:
      - atlas:AML.T0019

  AML_T0020:
    class_uri: d3f:AML.T0020
    is_a: ATLASPersistenceTechnique
    mixins:
      - ATLASResourceDevelopmentTechnique
    title: Poison Training Data
    description: |-
      Adversaries may attempt to poison datasets used by an AI model by modifying the underlying data or its labels.
      This allows the adversary to embed vulnerabilities in AI models trained on the data that may not be easily detectable.
      Data poisoning attacks may or may not require modifying the labels.
      The embedded vulnerability is activated at a later time by data samples with an [Insert Backdoor Trigger](/techniques/AML.T0043.004)

      Poisoned data can be introduced via [AI Supply Chain Compromise](/techniques/AML.T0010) or the data may be poisoned after the adversary gains [Initial Access](/tactics/AML.TA0004) to the system.
    aliases:
      - "AML.T0020"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0020
    annotations:
      attack-id: "AML.T0020"
    exact_mappings:
      - atlas:AML.T0020

  AML_T0021:
    class_uri: d3f:AML.T0021
    is_a: ATLASResourceDevelopmentTechnique
    title: Establish Accounts
    description: |-
      Adversaries may create accounts with various services for use in targeting, to gain access to resources needed in [AI Attack Staging](/tactics/AML.TA0001), or for victim impersonation.
    aliases:
      - "AML.T0021"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0021
    annotations:
      attack-id: "AML.T0021"
    exact_mappings:
      - atlas:AML.T0021

  AML_T0024:
    class_uri: d3f:AML.T0024
    is_a: ATLASExfiltrationTechnique
    title: Exfiltration via AI Inference API
    description: |-
      Adversaries may exfiltrate private information via [AI Model Inference API Access](/techniques/AML.T0040).
      AI Models have been shown leak private information about their training data (e.g.  [Infer Training Data Membership](/techniques/AML.T0024.000), [Invert AI Model](/techniques/AML.T0024.001)).
      The model itself may also be extracted ([Extract AI Model](/techniques/AML.T0024.002)) for the purposes of [AI Intellectual Property Theft](/techniques/AML.T0048.004).

      Exfiltration of information relating to private training data raises privacy concerns.
      Private training data may include personally identifiable information, or other protected data.
    aliases:
      - "AML.T0024"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0024
    annotations:
      attack-id: "AML.T0024"
    exact_mappings:
      - atlas:AML.T0024

  AML_T0024_000:
    class_uri: d3f:AML.T0024.000
    is_a: AML_T0024
    title: Infer Training Data Membership
    description: |-
      Adversaries may infer the membership of a data sample or global characteristics of the data in its training set, which raises privacy concerns.
      Some strategies make use of a shadow model that could be obtained via [Train Proxy via Replication](/techniques/AML.T0005.001), others use statistics of model prediction scores.

      This can cause the victim model to leak private information, such as PII of those in the training set or other forms of protected IP.
    aliases:
      - "AML.T0024.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0024.000
    annotations:
      attack-id: "AML.T0024.000"
    exact_mappings:
      - atlas:AML.T0024.000

  AML_T0024_001:
    class_uri: d3f:AML.T0024.001
    is_a: AML_T0024
    title: Invert AI Model
    description: |-
      AI models' training data could be reconstructed by exploiting the confidence scores that are available via an inference API.
      By querying the inference API strategically, adversaries can back out potentially private information embedded within the training data.
      This could lead to privacy violations if the attacker can reconstruct the data of sensitive features used in the algorithm.
    aliases:
      - "AML.T0024.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0024.001
    annotations:
      attack-id: "AML.T0024.001"
    exact_mappings:
      - atlas:AML.T0024.001

  AML_T0024_002:
    class_uri: d3f:AML.T0024.002
    is_a: AML_T0024
    title: Extract AI Model
    description: |-
      Adversaries may extract a functional copy of a private model.
      By repeatedly querying the victim's [AI Model Inference API Access](/techniques/AML.T0040), the adversary can collect the target model's inferences into a dataset.
      The inferences are used as labels for training a separate model offline that will mimic the behavior and performance of the target model.

      Adversaries may extract the model to avoid paying per query in an artificial intelligence as a service (AIaaS) setting.
      Model extraction is used for [AI Intellectual Property Theft](/techniques/AML.T0048.004).
    aliases:
      - "AML.T0024.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0024.002
    annotations:
      attack-id: "AML.T0024.002"
    exact_mappings:
      - atlas:AML.T0024.002

  AML_T0025:
    class_uri: d3f:AML.T0025
    is_a: ATLASExfiltrationTechnique
    title: Exfiltration via Cyber Means
    description: |-
      Adversaries may exfiltrate AI artifacts or other information relevant to their goals via traditional cyber means.

      See the ATT&CK [Exfiltration](https://attack.mitre.org/tactics/TA0010/) tactic for more information.
    aliases:
      - "AML.T0025"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0025
    annotations:
      attack-id: "AML.T0025"
    exact_mappings:
      - atlas:AML.T0025

  AML_T0029:
    class_uri: d3f:AML.T0029
    is_a: ATLASImpactTechnique
    title: Denial of AI Service
    description: |-
      Adversaries may target AI-enabled systems with a flood of requests for the purpose of degrading or shutting down the service.
      Since many AI systems require significant amounts of specialized compute, they are often expensive bottlenecks that can become overloaded.
      Adversaries can intentionally craft inputs that require heavy amounts of useless compute from the AI system.
    aliases:
      - "AML.T0029"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0029
    annotations:
      attack-id: "AML.T0029"
    exact_mappings:
      - atlas:AML.T0029

  AML_T0031:
    class_uri: d3f:AML.T0031
    is_a: ATLASImpactTechnique
    title: Erode AI Model Integrity
    description: |-
      Adversaries may degrade the target model's performance with adversarial data inputs to erode confidence in the system over time.
      This can lead to the victim organization wasting time and money both attempting to fix the system and performing the tasks it was meant to automate by hand.
    aliases:
      - "AML.T0031"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0031
    annotations:
      attack-id: "AML.T0031"
    exact_mappings:
      - atlas:AML.T0031

  AML_T0034:
    class_uri: d3f:AML.T0034
    is_a: ATLASImpactTechnique
    title: Cost Harvesting
    description: |-
      Adversaries may target different AI services to send useless queries or computationally expensive inputs to increase the cost of running services at the victim organization.
      Sponge examples are a particular type of adversarial data designed to maximize energy consumption and thus operating cost.
    aliases:
      - "AML.T0034"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0034
    annotations:
      attack-id: "AML.T0034"
    exact_mappings:
      - atlas:AML.T0034

  AML_T0035:
    class_uri: d3f:AML.T0035
    is_a: ATLASCollectionTechnique
    title: AI Artifact Collection
    description: |-
      Adversaries may collect AI artifacts for [Exfiltration](/tactics/AML.TA0010) or for use in [AI Attack Staging](/tactics/AML.TA0001).
      AI artifacts include models and datasets as well as other telemetry data produced when interacting with a model.
    aliases:
      - "AML.T0035"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0035
    annotations:
      attack-id: "AML.T0035"
    exact_mappings:
      - atlas:AML.T0035

  AML_T0036:
    class_uri: d3f:AML.T0036
    is_a: ATLASCollectionTechnique
    title: Data from Information Repositories
    description: |-
      Adversaries may leverage information repositories to mine valuable information.
      Information repositories are tools that allow for storage of information, typically to facilitate collaboration or information sharing between users, and can store a wide variety of data that may aid adversaries in further objectives, or direct access to the target information.

      Information stored in a repository may vary based on the specific instance or environment.
      Specific common information repositories include SharePoint, Confluence, and enterprise databases such as SQL Server.
    aliases:
      - "AML.T0036"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0036
    annotations:
      attack-id: "AML.T0036"
    exact_mappings:
      - atlas:AML.T0036

  AML_T0037:
    class_uri: d3f:AML.T0037
    is_a: ATLASCollectionTechnique
    title: Data from Local System
    description: |-
      Adversaries may search local system sources, such as file systems and configuration files or local databases, to find files of interest and sensitive data prior to Exfiltration.

      This can include basic fingerprinting information and sensitive data such as ssh keys.
    aliases:
      - "AML.T0037"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0037
    annotations:
      attack-id: "AML.T0037"
    exact_mappings:
      - atlas:AML.T0037

  AML_T0040:
    class_uri: d3f:AML.T0040
    is_a: ATLASAIModelAccessTechnique
    title: AI Model Inference API Access
    description: |-
      Adversaries may gain access to a model via legitimate access to the inference API.
      Inference API access can be a source of information to the adversary ([Discover AI Model Ontology](/techniques/AML.T0013), [Discover AI Model Family](/techniques/AML.T0014)), a means of staging the attack ([Verify Attack](/techniques/AML.T0042), [Craft Adversarial Data](/techniques/AML.T0043)), or for introducing data to the target system for Impact ([Evade AI Model](/techniques/AML.T0015), [Erode AI Model Integrity](/techniques/AML.T0031)).

      Many systems rely on the same models provided via an inference API, which means they share the same vulnerabilities. This is especially true of foundation models which are prohibitively resource intensive to train. Adversaries may use their access to model APIs to identify vulnerabilities such as jailbreaks or hallucinations and then target applications that use the same models.
    aliases:
      - "AML.T0040"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0040
    annotations:
      attack-id: "AML.T0040"
    exact_mappings:
      - atlas:AML.T0040

  AML_T0041:
    class_uri: d3f:AML.T0041
    is_a: ATLASAIModelAccessTechnique
    title: Physical Environment Access
    description: |-
      In addition to the attacks that take place purely in the digital domain, adversaries may also exploit the physical environment for their attacks.
      If the model is interacting with data collected from the real world in some way, the adversary can influence the model through access to wherever the data is being collected.
      By modifying the data in the collection process, the adversary can perform modified versions of attacks designed for digital access.
    aliases:
      - "AML.T0041"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0041
    annotations:
      attack-id: "AML.T0041"
    exact_mappings:
      - atlas:AML.T0041

  AML_T0042:
    class_uri: d3f:AML.T0042
    is_a: ATLASAIAttackStagingTechnique
    title: Verify Attack
    description: |-
      Adversaries can verify the efficacy of their attack via an inference API or access to an offline copy of the target model.
      This gives the adversary confidence that their approach works and allows them to carry out the attack at a later time of their choosing.
      The adversary may verify the attack once but use it against many edge devices running copies of the target model.
      The adversary may verify their attack digitally, then deploy it in the [Physical Environment Access](/techniques/AML.T0041) at a later time.
      Verifying the attack may be hard to detect since the adversary can use a minimal number of queries or an offline copy of the model.
    aliases:
      - "AML.T0042"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0042
    annotations:
      attack-id: "AML.T0042"
    exact_mappings:
      - atlas:AML.T0042

  AML_T0043:
    class_uri: d3f:AML.T0043
    is_a: ATLASAIAttackStagingTechnique
    title: Craft Adversarial Data
    description: |-
      Adversarial data are inputs to an AI model that have been modified such that they cause the adversary's desired effect in the target model.
      Effects can range from misclassification, to missed detections, to maximizing energy consumption.
      Typically, the modification is constrained in magnitude or location so that a human still perceives the data as if it were unmodified, but human perceptibility may not always be a concern depending on the adversary's intended effect.
      For example, an adversarial input for an image classification task is an image the AI model would misclassify, but a human would still recognize as containing the correct class.

      Depending on the adversary's knowledge of and access to the target model, the adversary may use different classes of algorithms to develop the adversarial example such as [White-Box Optimization](/techniques/AML.T0043.000), [Black-Box Optimization](/techniques/AML.T0043.001), [Black-Box Transfer](/techniques/AML.T0043.002), or [Manual Modification](/techniques/AML.T0043.003).

      The adversary may [Verify Attack](/techniques/AML.T0042) their approach works if they have white-box or inference API access to the model.
      This allows the adversary to gain confidence their attack is effective "live" environment where their attack may be noticed.
      They can then use the attack at a later time to accomplish their goals.
      An adversary may optimize adversarial examples for [Evade AI Model](/techniques/AML.T0015), or to [Erode AI Model Integrity](/techniques/AML.T0031).
    aliases:
      - "AML.T0043"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043
    annotations:
      attack-id: "AML.T0043"
    exact_mappings:
      - atlas:AML.T0043

  AML_T0043_000:
    class_uri: d3f:AML.T0043.000
    is_a: AML_T0043
    title: White-Box Optimization
    description: |-
      In White-Box Optimization, the adversary has full access to the target model and optimizes the adversarial example directly.
      Adversarial examples trained in this manner are most effective against the target model.
    aliases:
      - "AML.T0043.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043.000
    annotations:
      attack-id: "AML.T0043.000"
    exact_mappings:
      - atlas:AML.T0043.000

  AML_T0043_001:
    class_uri: d3f:AML.T0043.001
    is_a: AML_T0043
    title: Black-Box Optimization
    description: |-
      In Black-Box attacks, the adversary has black-box (i.e. [AI Model Inference API Access](/techniques/AML.T0040) via API access) access to the target model.
      With black-box attacks, the adversary may be using an API that the victim is monitoring.
      These attacks are generally less effective and require more inferences than [White-Box Optimization](/techniques/AML.T0043.000) attacks, but they require much less access.
    aliases:
      - "AML.T0043.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043.001
    annotations:
      attack-id: "AML.T0043.001"
    exact_mappings:
      - atlas:AML.T0043.001

  AML_T0043_002:
    class_uri: d3f:AML.T0043.002
    is_a: AML_T0043
    title: Black-Box Transfer
    description: |-
      In Black-Box Transfer attacks, the adversary uses one or more proxy models (trained via [Create Proxy AI Model](/techniques/AML.T0005) or [Train Proxy via Replication](/techniques/AML.T0005.001)) they have full access to and are representative of the target model.
      The adversary uses [White-Box Optimization](/techniques/AML.T0043.000) on the proxy models to generate adversarial examples.
      If the set of proxy models are close enough to the target model, the adversarial example should generalize from one to another.
      This means that an attack that works for the proxy models will likely then work for the target model.
      If the adversary has [AI Model Inference API Access](/techniques/AML.T0040), they may use [Verify Attack](/techniques/AML.T0042) to confirm the attack is working and incorporate that information into their training process.
    aliases:
      - "AML.T0043.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043.002
    annotations:
      attack-id: "AML.T0043.002"
    exact_mappings:
      - atlas:AML.T0043.002

  AML_T0043_003:
    class_uri: d3f:AML.T0043.003
    is_a: AML_T0043
    title: Manual Modification
    description: |-
      Adversaries may manually modify the input data to craft adversarial data.
      They may use their knowledge of the target model to modify parts of the data they suspect helps the model in performing its task.
      The adversary may use trial and error until they are able to verify they have a working adversarial input.
    aliases:
      - "AML.T0043.003"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043.003
    annotations:
      attack-id: "AML.T0043.003"
    exact_mappings:
      - atlas:AML.T0043.003

  AML_T0043_004:
    class_uri: d3f:AML.T0043.004
    is_a: AML_T0043
    title: Insert Backdoor Trigger
    description: |-
      The adversary may add a perceptual trigger into inference data.
      The trigger may be imperceptible or non-obvious to humans.
      This technique is used in conjunction with [Poison AI Model](/techniques/AML.T0018.000) and allows the adversary to produce their desired effect in the target model.
    aliases:
      - "AML.T0043.004"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0043.004
    annotations:
      attack-id: "AML.T0043.004"
    exact_mappings:
      - atlas:AML.T0043.004

  AML_T0044:
    class_uri: d3f:AML.T0044
    is_a: ATLASAIModelAccessTechnique
    title: Full AI Model Access
    description: |-
      Adversaries may gain full "white-box" access to an AI model.
      This means the adversary has complete knowledge of the model architecture, its parameters, and class ontology.
      They may exfiltrate the model to [Craft Adversarial Data](/techniques/AML.T0043) and [Verify Attack](/techniques/AML.T0042) in an offline where it is hard to detect their behavior.
    aliases:
      - "AML.T0044"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0044
    annotations:
      attack-id: "AML.T0044"
    exact_mappings:
      - atlas:AML.T0044

  AML_T0046:
    class_uri: d3f:AML.T0046
    is_a: ATLASImpactTechnique
    title: Spamming AI System with Chaff Data
    description: |-
      Adversaries may spam the AI system with chaff data that causes increase in the number of detections.
      This can cause analysts at the victim organization to waste time reviewing and correcting incorrect inferences.
    aliases:
      - "AML.T0046"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0046
    annotations:
      attack-id: "AML.T0046"
    exact_mappings:
      - atlas:AML.T0046

  AML_T0047:
    class_uri: d3f:AML.T0047
    is_a: ATLASAIModelAccessTechnique
    title: AI-Enabled Product or Service
    description: |-
      Adversaries may use a product or service that uses artificial intelligence under the hood to gain access to the underlying AI model.
      This type of indirect model access may reveal details of the AI model or its inferences in logs or metadata.
    aliases:
      - "AML.T0047"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0047
    annotations:
      attack-id: "AML.T0047"
    exact_mappings:
      - atlas:AML.T0047

  AML_T0048:
    class_uri: d3f:AML.T0048
    is_a: ATLASImpactTechnique
    title: External Harms
    description: |-
      Adversaries may abuse their access to a victim system and use its resources or capabilities to further their goals by causing harms external to that system.
      These harms could affect the organization (e.g. Financial Harm, Reputational Harm), its users (e.g. User Harm), or the general public (e.g. Societal Harm).
    aliases:
      - "AML.T0048"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048
    annotations:
      attack-id: "AML.T0048"
    exact_mappings:
      - atlas:AML.T0048

  AML_T0048_000:
    class_uri: d3f:AML.T0048.000
    is_a: AML_T0048
    title: Financial Harm
    description: |-
      Financial harm involves the loss of wealth, property, or other monetary assets due to theft, fraud or forgery, or pressure to provide financial resources to the adversary.
    aliases:
      - "AML.T0048.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048.000
    annotations:
      attack-id: "AML.T0048.000"
    exact_mappings:
      - atlas:AML.T0048.000

  AML_T0048_001:
    class_uri: d3f:AML.T0048.001
    is_a: AML_T0048
    title: Reputational Harm
    description: |-
      Reputational harm involves a degradation of public perception and trust in organizations.  Examples of reputation-harming incidents include scandals or false impersonations.
    aliases:
      - "AML.T0048.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048.001
    annotations:
      attack-id: "AML.T0048.001"
    exact_mappings:
      - atlas:AML.T0048.001

  AML_T0048_002:
    class_uri: d3f:AML.T0048.002
    is_a: AML_T0048
    title: Societal Harm
    description: |-
      Societal harms might generate harmful outcomes that reach either the general public or specific vulnerable groups such as the exposure of children to vulgar content.
    aliases:
      - "AML.T0048.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048.002
    annotations:
      attack-id: "AML.T0048.002"
    exact_mappings:
      - atlas:AML.T0048.002

  AML_T0048_003:
    class_uri: d3f:AML.T0048.003
    is_a: AML_T0048
    title: User Harm
    description: |-
      User harms may encompass a variety of harm types including financial and reputational that are directed at or felt by individual victims of the attack rather than at the organization level.
    aliases:
      - "AML.T0048.003"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048.003
    annotations:
      attack-id: "AML.T0048.003"
    exact_mappings:
      - atlas:AML.T0048.003

  AML_T0048_004:
    class_uri: d3f:AML.T0048.004
    is_a: AML_T0048
    title: AI Intellectual Property Theft
    description: |-
      Adversaries may exfiltrate AI artifacts to steal intellectual property and cause economic harm to the victim organization.

      Proprietary training data is costly to collect and annotate and may be a target for [Exfiltration](/tactics/AML.TA0010) and theft.

      AIaaS providers charge for use of their API.
      An adversary who has stolen a model via [Exfiltration](/tactics/AML.TA0010) or via [Extract AI Model](/techniques/AML.T0024.002) now has unlimited use of that service without paying the owner of the intellectual property.
    aliases:
      - "AML.T0048.004"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0048.004
    annotations:
      attack-id: "AML.T0048.004"
    exact_mappings:
      - atlas:AML.T0048.004

  AML_T0049:
    class_uri: d3f:AML.T0049
    is_a: ATLASInitialAccessTechnique
    title: Exploit Public-Facing Application
    description: |-
      Adversaries may attempt to take advantage of a weakness in an Internet-facing computer or program using software, data, or commands in order to cause unintended or unanticipated behavior. The weakness in the system can be a bug, a glitch, or a design vulnerability. These applications are often websites, but can include databases (like SQL), standard services (like SMB or SSH), network device administration and management protocols (like SNMP and Smart Install), and any other applications with Internet accessible open sockets, such as web servers and related services.
    aliases:
      - "AML.T0049"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0049
    annotations:
      attack-id: "AML.T0049"
    exact_mappings:
      - atlas:AML.T0049

  AML_T0050:
    class_uri: d3f:AML.T0050
    is_a: ATLASExecutionTechnique
    title: Command and Scripting Interpreter
    description: |-
      Adversaries may abuse command and script interpreters to execute commands, scripts, or binaries. These interfaces and languages provide ways of interacting with computer systems and are a common feature across many different platforms. Most systems come with some built-in command-line interface and scripting capabilities, for example, macOS and Linux distributions include some flavor of Unix Shell while Windows installations include the Windows Command Shell and PowerShell.

      There are also cross-platform interpreters such as Python, as well as those commonly associated with client applications such as JavaScript and Visual Basic.

      Adversaries may abuse these technologies in various ways as a means of executing arbitrary commands. Commands and scripts can be embedded in Initial Access payloads delivered to victims as lure documents or as secondary payloads downloaded from an existing C2. Adversaries may also execute commands through interactive terminals/shells, as well as utilize various Remote Services in order to achieve remote Execution.
    aliases:
      - "AML.T0050"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0050
    annotations:
      attack-id: "AML.T0050"
    exact_mappings:
      - atlas:AML.T0050

  AML_T0051:
    class_uri: d3f:AML.T0051
    is_a: ATLASExecutionTechnique
    title: LLM Prompt Injection
    description: |-
      An adversary may craft malicious prompts as inputs to an LLM that cause the LLM to act in unintended ways.
      These "prompt injections" are often designed to cause the model to ignore aspects of its original instructions and follow the adversary's instructions instead.

      Prompt Injections can be an initial access vector to the LLM that provides the adversary with a foothold to carry out other steps in their operation.
      They may be designed to bypass defenses in the LLM, or allow the adversary to issue privileged commands.
      The effects of a prompt injection can persist throughout an interactive session with an LLM.

      Malicious prompts may be injected directly by the adversary ([Direct](/techniques/AML.T0051.000)) either to leverage the LLM to generate harmful content or to gain a foothold on the system and lead to further effects.
      Prompts may also be injected indirectly when as part of its normal operation the LLM ingests the malicious prompt from another data source ([Indirect](/techniques/AML.T0051.001)). This type of injection can be used by the adversary to a foothold on the system or to target the user of the LLM.
      Malicious prompts may also be [Triggered](/techniques/AML.T0051.002) user actions or system events.
    aliases:
      - "AML.T0051"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0051
    annotations:
      attack-id: "AML.T0051"
    exact_mappings:
      - atlas:AML.T0051

  AML_T0051_000:
    class_uri: d3f:AML.T0051.000
    is_a: AML_T0051
    title: Direct
    description: |-
      An adversary may inject prompts directly as a user of the LLM. This type of injection may be used by the adversary to gain a foothold in the system or to misuse the LLM itself, as for example to generate harmful content.
    aliases:
      - "AML.T0051.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0051.000
    annotations:
      attack-id: "AML.T0051.000"
    exact_mappings:
      - atlas:AML.T0051.000

  AML_T0051_001:
    class_uri: d3f:AML.T0051.001
    is_a: AML_T0051
    title: Indirect
    description: |-
      An adversary may inject prompts indirectly via separate data channel ingested by the LLM such as include text or multimedia pulled from databases or websites.
      These malicious prompts may be hidden or obfuscated from the user. This type of injection may be used by the adversary to gain a foothold in the system or to target an unwitting user of the system.
    aliases:
      - "AML.T0051.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0051.001
    annotations:
      attack-id: "AML.T0051.001"
    exact_mappings:
      - atlas:AML.T0051.001

  AML_T0051_002:
    class_uri: d3f:AML.T0051.002
    is_a: AML_T0051
    title: Triggered
    description: |-
      An adversary may trigger a prompt injection via a user action or event that occurs within the victim's environment. Triggered prompt injections often target AI agents, which can be activated by means the adversary identifies during [Discovery](/tactics/AML.TA0008) (See [Activation Triggers](/techniques/AML.T0084.002)). These malicious prompts may be hidden or obfuscated from the user and may already exist somewhere in the victim's environment from the adversary performing [Prompt Infiltration via Public-Facing Application](/techniques/AML.T0093). This type of injection may be used by the adversary to gain a foothold in the system or to target an unwitting user of the system.
    aliases:
      - "AML.T0051.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0051.002
    annotations:
      attack-id: "AML.T0051.002"
    exact_mappings:
      - atlas:AML.T0051.002

  AML_T0052:
    class_uri: d3f:AML.T0052
    is_a: ATLASInitialAccessTechnique
    title: Phishing
    description: |-
      Adversaries may send phishing messages to gain access to victim systems. All forms of phishing are electronically delivered social engineering. Phishing can be targeted, known as spearphishing. In spearphishing, a specific individual, company, or industry will be targeted by the adversary. More generally, adversaries can conduct non-targeted phishing, such as in mass malware spam campaigns.

      Generative AI, including LLMs that generate synthetic text, visual deepfakes of faces, and audio deepfakes of speech, is enabling adversaries to scale targeted phishing campaigns. LLMs can interact with users via text conversations and can be programmed with a meta prompt to phish for sensitive information. Deepfakes can be use in impersonation as an aid to phishing.
    aliases:
      - "AML.T0052"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0052
    annotations:
      attack-id: "AML.T0052"
    exact_mappings:
      - atlas:AML.T0052

  AML_T0052_000:
    class_uri: d3f:AML.T0052.000
    is_a: AML_T0052
    title: Spearphishing via Social Engineering LLM
    description: |-
      Adversaries may turn LLMs into targeted social engineers.
      LLMs are capable of interacting with users via text conversations.
      They can be instructed by an adversary to seek sensitive information from a user and act as effective social engineers.
      They can be targeted towards particular personas defined by the adversary.
      This allows adversaries to scale spearphishing efforts and target individuals to reveal private information such as credentials to privileged systems.
    aliases:
      - "AML.T0052.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0052.000
    annotations:
      attack-id: "AML.T0052.000"
    exact_mappings:
      - atlas:AML.T0052.000

  AML_T0053:
    class_uri: d3f:AML.T0053
    is_a: ATLASExecutionTechnique
    mixins:
      - ATLASPrivilegeEscalationTechnique
    title: AI Agent Tool Invocation
    description: |-
      Adversaries may use their access to an AI agent to invoke tools the agent has access to. LLMs are often connected to other services or resources via tools to increase their capabilities. Tools may include integrations with other applications, access to public or private data sources, and the ability to execute code.

      This may allow adversaries to execute API calls to integrated applications or services, providing the adversary with increased privileges on the system. Adversaries may take advantage of connected data sources to retrieve sensitive information. They may also use an LLM integrated with a command or script interpreter to execute arbitrary instructions.

      AI agents may be configured to have access to tools that are not directly accessible by users. Adversaries may abuse this to gain access to tools they otherwise wouldn't be able to use.
    aliases:
      - "AML.T0053"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0053
    annotations:
      attack-id: "AML.T0053"
    exact_mappings:
      - atlas:AML.T0053

  AML_T0054:
    class_uri: d3f:AML.T0054
    is_a: ATLASDefenseEvasionTechnique
    mixins:
      - ATLASPrivilegeEscalationTechnique
    title: LLM Jailbreak
    description: |-
      An adversary may use a carefully crafted [LLM Prompt Injection](/techniques/AML.T0051) designed to place LLM in a state in which it will freely respond to any user input, bypassing any controls, restrictions, or guardrails placed on the LLM.
      Once successfully jailbroken, the LLM can be used in unintended ways by the adversary.
    aliases:
      - "AML.T0054"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0054
    annotations:
      attack-id: "AML.T0054"
    exact_mappings:
      - atlas:AML.T0054

  AML_T0055:
    class_uri: d3f:AML.T0055
    is_a: ATLASCredentialAccessTechnique
    title: Unsecured Credentials
    description: |-
      Adversaries may search compromised systems to find and obtain insecurely stored credentials.
      These credentials can be stored and/or misplaced in many locations on a system, including plaintext files (e.g. bash history), environment variables, operating system, or application-specific repositories (e.g. Credentials in Registry), or other specialized files/artifacts (e.g. private keys).
    aliases:
      - "AML.T0055"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0055
    annotations:
      attack-id: "AML.T0055"
    exact_mappings:
      - atlas:AML.T0055

  AML_T0056:
    class_uri: d3f:AML.T0056
    is_a: ATLASExfiltrationTechnique
    title: Extract LLM System Prompt
    description: |-
      Adversaries may attempt to extract a large language model's (LLM) system prompt. This can be done via prompt injection to induce the model to reveal its own system prompt or may be extracted from a configuration file.

      System prompts can be a portion of an AI provider's competitive advantage and are thus valuable intellectual property that may be targeted by adversaries.
    aliases:
      - "AML.T0056"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0056
    annotations:
      attack-id: "AML.T0056"
    exact_mappings:
      - atlas:AML.T0056

  AML_T0057:
    class_uri: d3f:AML.T0057
    is_a: ATLASExfiltrationTechnique
    title: LLM Data Leakage
    description: |-
      Adversaries may craft prompts that induce the LLM to leak sensitive information.
      This can include private user data or proprietary information.
      The leaked information may come from proprietary training data, data sources the LLM is connected to, or information from other users of the LLM.
    aliases:
      - "AML.T0057"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0057
    annotations:
      attack-id: "AML.T0057"
    exact_mappings:
      - atlas:AML.T0057

  AML_T0058:
    class_uri: d3f:AML.T0058
    is_a: ATLASResourceDevelopmentTechnique
    title: Publish Poisoned Models
    description: |-
      Adversaries may publish a poisoned model to a public location such as a model registry or code repository. The poisoned model may be a novel model or a poisoned variant of an existing open-source model. This model may be introduced to a victim system via [AI Supply Chain Compromise](/techniques/AML.T0010).
    aliases:
      - "AML.T0058"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0058
    annotations:
      attack-id: "AML.T0058"
    exact_mappings:
      - atlas:AML.T0058

  AML_T0059:
    class_uri: d3f:AML.T0059
    is_a: ATLASImpactTechnique
    title: Erode Dataset Integrity
    description: |-
      Adversaries may poison or manipulate portions of a dataset to reduce its usefulness, reduce trust, and cause users to waste resources correcting errors.
    aliases:
      - "AML.T0059"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0059
    annotations:
      attack-id: "AML.T0059"
    exact_mappings:
      - atlas:AML.T0059

  AML_T0060:
    class_uri: d3f:AML.T0060
    is_a: ATLASResourceDevelopmentTechnique
    title: Publish Hallucinated Entities
    description: |-
      Adversaries may create an entity they control, such as a software package, website, or email address to a source hallucinated by an LLM. The hallucinations may take the form of package names commands, URLs, company names, or email addresses that point the victim to the entity controlled by the adversary. When the victim interacts with the adversary-controlled entity, the attack can proceed.
    aliases:
      - "AML.T0060"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0060
    annotations:
      attack-id: "AML.T0060"
    exact_mappings:
      - atlas:AML.T0060

  AML_T0061:
    class_uri: d3f:AML.T0061
    is_a: ATLASPersistenceTechnique
    title: LLM Prompt Self-Replication
    description: |-
      An adversary may use a carefully crafted [LLM Prompt Injection](/techniques/AML.T0051) designed to cause the LLM to replicate the prompt as part of its output. This allows the prompt to propagate to other LLMs and persist on the system. The self-replicating prompt is typically paired with other malicious instructions (ex: [LLM Jailbreak](/techniques/AML.T0054), [LLM Data Leakage](/techniques/AML.T0057)).
    aliases:
      - "AML.T0061"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0061
    annotations:
      attack-id: "AML.T0061"
    exact_mappings:
      - atlas:AML.T0061

  AML_T0062:
    class_uri: d3f:AML.T0062
    is_a: ATLASDiscoveryTechnique
    title: Discover LLM Hallucinations
    description: |-
      Adversaries may prompt large language models and identify hallucinated entities.
      They may request software packages, commands, URLs, organization names, or e-mail addresses, and identify hallucinations with no connected real-world source. Discovered hallucinations provide the adversary with potential targets to [Publish Hallucinated Entities](/techniques/AML.T0060). Different LLMs have been shown to produce the same hallucinations, so the hallucinations exploited by an adversary may affect users of other LLMs.
    aliases:
      - "AML.T0062"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0062
    annotations:
      attack-id: "AML.T0062"
    exact_mappings:
      - atlas:AML.T0062

  AML_T0063:
    class_uri: d3f:AML.T0063
    is_a: ATLASDiscoveryTechnique
    title: Discover AI Model Outputs
    description: |-
      Adversaries may discover model outputs, such as class scores, whose presence is not required for the system to function and are not intended for use by the end user. Model outputs may be found in logs or may be included in API responses.
      Model outputs may enable the adversary to identify weaknesses in the model and develop attacks.
    aliases:
      - "AML.T0063"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0063
    annotations:
      attack-id: "AML.T0063"
    exact_mappings:
      - atlas:AML.T0063

  AML_T0064:
    class_uri: d3f:AML.T0064
    is_a: ATLASReconnaissanceTechnique
    title: Gather RAG-Indexed Targets
    description: |-
      Adversaries may identify data sources used in retrieval augmented generation (RAG) systems for targeting purposes. By pinpointing these sources, attackers can focus on poisoning or otherwise manipulating the external data repositories the AI relies on.

      RAG-indexed data may be identified in public documentation about the system, or by interacting with the system directly and observing any indications of or references to external data sources.
    aliases:
      - "AML.T0064"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0064
    annotations:
      attack-id: "AML.T0064"
    exact_mappings:
      - atlas:AML.T0064

  AML_T0065:
    class_uri: d3f:AML.T0065
    is_a: ATLASResourceDevelopmentTechnique
    title: LLM Prompt Crafting
    description: |-
      Adversaries may use their acquired knowledge of the target generative AI system to craft prompts that bypass its defenses and allow malicious instructions to be executed.

      The adversary may iterate on the prompt to ensure that it works as-intended consistently.
    aliases:
      - "AML.T0065"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0065
    annotations:
      attack-id: "AML.T0065"
    exact_mappings:
      - atlas:AML.T0065

  AML_T0066:
    class_uri: d3f:AML.T0066
    is_a: ATLASResourceDevelopmentTechnique
    title: Retrieval Content Crafting
    description: |-
      Adversaries may write content designed to be retrieved by user queries and influence a user of the system in some way. This abuses the trust the user has in the system.

      The crafted content can be combined with a prompt injection. It can also stand alone in a separate document or email. The adversary must get the crafted content into the victim\u0027s database, such as a vector database used in a retrieval augmented generation (RAG) system. This may be accomplished via cyber access, or by abusing the ingestion mechanisms common in RAG systems (see [RAG Poisoning](/techniques/AML.T0070)).

      Large language models may be used as an assistant to aid an adversary in crafting content.
    aliases:
      - "AML.T0066"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0066
    annotations:
      attack-id: "AML.T0066"
    exact_mappings:
      - atlas:AML.T0066

  AML_T0067:
    class_uri: d3f:AML.T0067
    is_a: ATLASDefenseEvasionTechnique
    title: LLM Trusted Output Components Manipulation
    description: |-
      Adversaries may utilize prompts to a large language model (LLM) which manipulate various components of its response in order to make it appear trustworthy to the user. This helps the adversary continue to operate in the victim's environment and evade detection by the users it interacts with.

      The LLM may be instructed to tailor its language to appear more trustworthy to the user or attempt to manipulate the user to take certain actions. Other response components that could be manipulated include links, recommended follow-up actions, retrieved document metadata, and [Citations](/techniques/AML.T0067.000).
    aliases:
      - "AML.T0067"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0067
    annotations:
      attack-id: "AML.T0067"
    exact_mappings:
      - atlas:AML.T0067

  AML_T0067_000:
    class_uri: d3f:AML.T0067.000
    is_a: AML_T0067
    title: Citations
    description: |-
      Adversaries may manipulate the citations provided in an AI system's response, in order to make it appear trustworthy. Variants include citing a providing the wrong citation, making up a new citation, or providing the right citation but for adversary-provided data.
    aliases:
      - "AML.T0067.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0067.000
    annotations:
      attack-id: "AML.T0067.000"
    exact_mappings:
      - atlas:AML.T0067.000

  AML_T0068:
    class_uri: d3f:AML.T0068
    is_a: ATLASDefenseEvasionTechnique
    title: LLM Prompt Obfuscation
    description: |-
      Adversaries may hide or otherwise obfuscate prompt injections or retrieval content from the user to avoid detection.

      This may include modifying how the injection is rendered such as small text, text colored the same as the background, or hidden HTML elements.
    aliases:
      - "AML.T0068"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0068
    annotations:
      attack-id: "AML.T0068"
    exact_mappings:
      - atlas:AML.T0068

  AML_T0069:
    class_uri: d3f:AML.T0069
    is_a: ATLASDiscoveryTechnique
    title: Discover LLM System Information
    description: |-
      The adversary is trying to discover something about the large language model's (LLM) system information. This may be found in a configuration file containing the system instructions or extracted via interactions with the LLM. The desired information may include the full system prompt, special characters that have significance to the LLM or keywords indicating functionality available to the LLM. Information about how the LLM is instructed can be used by the adversary to understand the system's capabilities and to aid them in crafting malicious prompts.
    aliases:
      - "AML.T0069"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0069
    annotations:
      attack-id: "AML.T0069"
    exact_mappings:
      - atlas:AML.T0069

  AML_T0069_000:
    class_uri: d3f:AML.T0069.000
    is_a: AML_T0069
    title: Special Character Sets
    description: |-
      Adversaries may discover delimiters and special characters sets used by the large language model. For example, delimiters used in retrieval augmented generation applications to differentiate between context and user prompts. These can later be exploited to confuse or manipulate the large language model into misbehaving.
    aliases:
      - "AML.T0069.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0069.000
    annotations:
      attack-id: "AML.T0069.000"
    exact_mappings:
      - atlas:AML.T0069.000

  AML_T0069_001:
    class_uri: d3f:AML.T0069.001
    is_a: AML_T0069
    title: System Instruction Keywords
    description: |-
      Adversaries may discover keywords that have special meaning to the large language model (LLM), such as function names or object names. These can later be exploited to confuse or manipulate the LLM into misbehaving and to make calls to plugins the LLM has access to.
    aliases:
      - "AML.T0069.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0069.001
    annotations:
      attack-id: "AML.T0069.001"
    exact_mappings:
      - atlas:AML.T0069.001

  AML_T0069_002:
    class_uri: d3f:AML.T0069.002
    is_a: AML_T0069
    title: System Prompt
    description: |-
      Adversaries may discover a large language model's system instructions provided by the AI system builder to learn about the system's capabilities and circumvent its guardrails.
    aliases:
      - "AML.T0069.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0069.002
    annotations:
      attack-id: "AML.T0069.002"
    exact_mappings:
      - atlas:AML.T0069.002

  AML_T0070:
    class_uri: d3f:AML.T0070
    is_a: ATLASPersistenceTechnique
    title: RAG Poisoning
    description: |-
      Adversaries may inject malicious content into data indexed by a retrieval augmented generation (RAG) system to contaminate a future thread through RAG-based search results. This may be accomplished by placing manipulated documents in a location the RAG indexes (see [Gather RAG-Indexed Targets](/techniques/AML.T0064)).

      The content may be targeted such that it would always surface as a search result for a specific user query. The adversary's content may include false or misleading information. It may also include prompt injections with malicious instructions, or false RAG entries.
    aliases:
      - "AML.T0070"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0070
    annotations:
      attack-id: "AML.T0070"
    exact_mappings:
      - atlas:AML.T0070

  AML_T0071:
    class_uri: d3f:AML.T0071
    is_a: ATLASDefenseEvasionTechnique
    title: False RAG Entry Injection
    description: |-
      Adversaries may introduce false entries into a victim's retrieval augmented generation (RAG) database. Content designed to be interpreted as a document by the large language model (LLM) used in the RAG system is included in a data source being ingested into the RAG database. When RAG entry including the false document is retrieved, the LLM is tricked into treating part of the retrieved content as a false RAG result.

      By including a false RAG document inside of a regular RAG entry, it bypasses data monitoring tools. It also prevents the document from being deleted directly.

      The adversary may use discovered system keywords to learn how to instruct a particular LLM to treat content as a RAG entry. They may be able to manipulate the injected entry's metadata including document title, author, and creation date.
    aliases:
      - "AML.T0071"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0071
    annotations:
      attack-id: "AML.T0071"
    exact_mappings:
      - atlas:AML.T0071

  AML_T0072:
    class_uri: d3f:AML.T0072
    is_a: ATLASCommandAndControlTechnique
    title: Reverse Shell
    description: |-
      Adversaries may utilize a reverse shell to communicate and control the victim system.

      Typically, a user uses a client to connect to a remote machine which is listening for connections. With a reverse shell, the adversary is listening for incoming connections initiated from the victim system.
    aliases:
      - "AML.T0072"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0072
    annotations:
      attack-id: "AML.T0072"
    exact_mappings:
      - atlas:AML.T0072

  AML_T0073:
    class_uri: d3f:AML.T0073
    is_a: ATLASDefenseEvasionTechnique
    title: Impersonation
    description: |-
      Adversaries may impersonate a trusted person or organization in order to persuade and trick a target into performing some action on their behalf. For example, adversaries may communicate with victims (via [Phishing](/techniques/AML.T0052), or [Spearphishing via Social Engineering LLM](/techniques/AML.T0052.000)) while impersonating a known sender such as an executive, colleague, or third-party vendor. Established trust can then be leveraged to accomplish an adversary's ultimate goals, possibly against multiple victims.

      Adversaries may target resources that are part of the AI DevOps lifecycle, such as model repositories, container registries, and software registries.
    aliases:
      - "AML.T0073"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0073
    annotations:
      attack-id: "AML.T0073"
    exact_mappings:
      - atlas:AML.T0073

  AML_T0074:
    class_uri: d3f:AML.T0074
    is_a: ATLASDefenseEvasionTechnique
    title: Masquerading
    description: |-
      Adversaries may attempt to manipulate features of their artifacts to make them appear legitimate or benign to users and/or security tools. Masquerading occurs when the name or location of an object, legitimate or malicious, is manipulated or abused for the sake of evading defenses and observation. This may include manipulating file metadata, tricking users into misidentifying the file type, and giving legitimate task or service names.
    aliases:
      - "AML.T0074"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0074
    annotations:
      attack-id: "AML.T0074"
    exact_mappings:
      - atlas:AML.T0074

  AML_T0075:
    class_uri: d3f:AML.T0075
    is_a: ATLASDiscoveryTechnique
    title: Cloud Service Discovery
    description: |-
      An adversary may attempt to enumerate the cloud services running on a system after gaining access. These methods can differ from platform-as-a-service (PaaS), to infrastructure-as-a-service (IaaS), or software-as-a-service (SaaS). Many services exist throughout the various cloud providers and can include Continuous Integration and Continuous Delivery (CI/CD), Lambda Functions, Entra ID, etc. They may also include security services, such as AWS GuardDuty and Microsoft Defender for Cloud, and logging services, such as AWS CloudTrail and Google Cloud Audit Logs.

      Adversaries may attempt to discover information about the services enabled throughout the environment. Azure tools and APIs, such as the Microsoft Graph API and Azure Resource Manager API, can enumerate resources and services, including applications, management groups, resources and policy definitions, and their relationships that are accessible by an identity.[1][2]

      For example, Stormspotter is an open source tool for enumerating and constructing a graph for Azure resources and services, and Pacu is an open source AWS exploitation framework that supports several methods for discovering cloud services.[3][4]

      Adversaries may use the information gained to shape follow-on behaviors, such as targeting data or credentials from enumerated services or evading identified defenses through Disable or Modify Tools or Disable or Modify Cloud Logs.
    aliases:
      - "AML.T0075"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0075
    annotations:
      attack-id: "AML.T0075"
    exact_mappings:
      - atlas:AML.T0075

  AML_T0076:
    class_uri: d3f:AML.T0076
    is_a: ATLASDefenseEvasionTechnique
    title: Corrupt AI Model
    description: |-
      An adversary may purposefully corrupt a malicious AI model file so that it cannot be successfully deserialized in order to evade detection by a model scanner. The corrupt model may still successfully execute malicious code before deserialization fails.
    aliases:
      - "AML.T0076"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0076
    annotations:
      attack-id: "AML.T0076"
    exact_mappings:
      - atlas:AML.T0076

  AML_T0077:
    class_uri: d3f:AML.T0077
    is_a: ATLASExfiltrationTechnique
    title: LLM Response Rendering
    description: |-
      An adversary may get a large language model (LLM) to respond with private information that is hidden from the user when the response is rendered by the user's client. The private information is then exfiltrated. This can take the form of rendered images, which automatically make a request to an adversary controlled server.

      The adversary gets AI to present an image to the user, which is rendered by the user's client application with no user clicks required. The image is hosted on an attacker-controlled website, allowing the adversary to exfiltrate data through image request parameters. Variants include HTML tags and markdown

      For example, an LLM may produce the following markdown:
      ```
      ![ATLAS](https://atlas.mitre.org/image.png?secrets="private data")
      ```

      Which is rendered by the client as:
      ```
      <img src="https://atlas.mitre.org/image.png?secrets="private data">
      ```

      When the request is received by the adversary's server hosting the requested image, they receive the contents of the `secrets` query parameter.
    aliases:
      - "AML.T0077"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0077
    annotations:
      attack-id: "AML.T0077"
    exact_mappings:
      - atlas:AML.T0077

  AML_T0078:
    class_uri: d3f:AML.T0078
    is_a: ATLASInitialAccessTechnique
    title: Drive-by Compromise
    description: |-
      Adversaries may gain access to an AI system through a user visiting a website over the normal course of browsing, or an AI agent retrieving information from the web on behalf of a user. Websites can contain an [LLM Prompt Injection](/techniques/AML.T0051) which, when executed, can change the behavior of the AI model.

      The same approach may be used to deliver other types of malicious code that don't target AI directly (See [Drive-by Compromise in ATT&CK](https://attack.mitre.org/techniques/T1189/)).
    aliases:
      - "AML.T0078"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0078
    annotations:
      attack-id: "AML.T0078"
    exact_mappings:
      - atlas:AML.T0078

  AML_T0079:
    class_uri: d3f:AML.T0079
    is_a: ATLASResourceDevelopmentTechnique
    title: Stage Capabilities
    description: |-
      Adversaries may upload, install, or otherwise set up capabilities that can be used during targeting. To support their operations, an adversary may need to take capabilities they developed ([Develop Capabilities](/techniques/AML.T0017)) or obtained ([Obtain Capabilities](/techniques/AML.T0016)) and stage them on infrastructure under their control. These capabilities may be staged on infrastructure that was previously purchased/rented by the adversary ([Acquire Infrastructure](/techniques/AML.T0008)) or was otherwise compromised by them. Capabilities may also be staged on web services, such as GitHub, model registries, such as Hugging Face, or container registries.

      Adversaries may stage a variety of AI Artifacts including poisoned datasets ([Publish Poisoned Datasets](/techniques/AML.T0019), malicious models ([Publish Poisoned Models](/techniques/AML.T0058), and prompt injections. They may target names of legitimate companies or products, engage in typosquatting, or use hallucinated entities ([Discover LLM Hallucinations](/techniques/AML.T0062)).
    aliases:
      - "AML.T0079"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0079
    annotations:
      attack-id: "AML.T0079"
    exact_mappings:
      - atlas:AML.T0079

  AML_T0080:
    class_uri: d3f:AML.T0080
    is_a: ATLASPersistenceTechnique
    title: AI Agent Context Poisoning
    description: |-
      Adversaries may attempt to manipulate the context used by an AI agent's large language model (LLM) to influence the responses it generates or actions it takes. This allows an adversary to persistently change the behavior of the target agent and further their goals.

      Context poisoning can be accomplished by prompting the an LLM to add instructions or preferences to memory (See [Memory](/techniques/AML.T0080.000)) or by simply prompting an LLM that uses prior messages in a thread as part of its context (See [Thread](/techniques/AML.T0080.001)).
    aliases:
      - "AML.T0080"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0080
    annotations:
      attack-id: "AML.T0080"
    exact_mappings:
      - atlas:AML.T0080

  AML_T0080_000:
    class_uri: d3f:AML.T0080.000
    is_a: AML_T0080
    title: Memory
    description: |-
      Adversaries may manipulate the memory of a large language model (LLM) in order to persist changes to the LLM to future chat sessions.

      Memory is a common feature in LLMs that allows them to remember information across chat sessions by utilizing a user-specific database. Because the memory is controlled via normal conversations with the user (e.g. "remember my preference for ...") an adversary can inject memories via Direct or Indirect Prompt Injection. Memories may contain malicious instructions (e.g. instructions that leak private conversations) or may promote the adversary's hidden agenda (e.g. manipulating the user).
    aliases:
      - "AML.T0080.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0080.000
    annotations:
      attack-id: "AML.T0080.000"
    exact_mappings:
      - atlas:AML.T0080.000

  AML_T0080_001:
    class_uri: d3f:AML.T0080.001
    is_a: AML_T0080
    title: Thread
    description: |-
      Adversaries may introduce malicious instructions into a chat thread of a large language model (LLM) to cause behavior changes which persist for the remainder of the thread. A chat thread may continue for an extended period over multiple sessions.

      The malicious instructions may be introduced via Direct or Indirect Prompt Injection. Direct Injection may occur in cases where the adversary has acquired a user's LLM API keys and can inject queries directly into any thread.

      As the token limits for LLMs rise, AI systems can make use of larger context windows which allow malicious instructions to persist longer in a thread.
      Thread Poisoning may affect multiple users if the LLM is being used in a service with shared threads. For example, if an agent is active in a Slack channel with multiple participants, a single malicious message from one user can influence the agent's behavior in future interactions with others.
    aliases:
      - "AML.T0080.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0080.001
    annotations:
      attack-id: "AML.T0080.001"
    exact_mappings:
      - atlas:AML.T0080.001

  AML_T0081:
    class_uri: d3f:AML.T0081
    is_a: ATLASPersistenceTechnique
    title: Modify AI Agent Configuration
    description: |-
      Adversaries may modify the configuration files for AI agents on a system. This allows malicious changes to persist beyond the life of a single agent and affects any agents that share the configuration.

      Configuration changes may include modifications to the system prompt, tampering with or replacing knowledge sources, modification to settings of connected tools, and more. Through those changes, an attacker could redirect outputs or tools to malicious services, embed covert instructions that exfiltrate data, or weaken security controls that normally restrict agent behavior.
    aliases:
      - "AML.T0081"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0081
    annotations:
      attack-id: "AML.T0081"
    exact_mappings:
      - atlas:AML.T0081

  AML_T0082:
    class_uri: d3f:AML.T0082
    is_a: ATLASCredentialAccessTechnique
    title: RAG Credential Harvesting
    description: |-
      Adversaries may attempt to use their access to a large language model (LLM) on the victim's system to collect credentials. Credentials may be stored in internal documents which can inadvertently be ingested into a RAG database, where they can ultimately be retrieved by an AI agent.
    aliases:
      - "AML.T0082"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0082
    annotations:
      attack-id: "AML.T0082"
    exact_mappings:
      - atlas:AML.T0082

  AML_T0083:
    class_uri: d3f:AML.T0083
    is_a: ATLASCredentialAccessTechnique
    title: Credentials from AI Agent Configuration
    description: |-
      Adversaries may access the credentials of other tools or services on a system from the configuration of an AI agent.

      AI Agents often utilize external tools or services to take actions, such as querying databases, invoking APIs, or interacting with cloud resources. To enable these functions, credentials like API keys, tokens, and connection strings are frequently stored in configuration files. While there are secure methods such as dedicated secret managers or encrypted vaults that can be deployed to store and manage these credentials, in practice they are often placed in less protected locations for convenience or ease of deployment. If an attacker can read or extract these configurations, they may obtain valid credentials that allow direct access to sensitive systems outside the agent itself.
    aliases:
      - "AML.T0083"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0083
    annotations:
      attack-id: "AML.T0083"
    exact_mappings:
      - atlas:AML.T0083

  AML_T0084:
    class_uri: d3f:AML.T0084
    is_a: ATLASDiscoveryTechnique
    title: Discover AI Agent Configuration
    description: |-
      Adversaries may attempt to discover configuration information for AI agents present on the victim's system. Agent configurations can include tools or services they have access to.

      Adversaries may directly access agent configuring dashboards or configuration files. They may also obtain configuration details by prompting the agent with questions such as "What tools do you have access to?"

      Adversaries can use the information they discover about AI agents to help with targeting.
    aliases:
      - "AML.T0084"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0084
    annotations:
      attack-id: "AML.T0084"
    exact_mappings:
      - atlas:AML.T0084

  AML_T0084_000:
    class_uri: d3f:AML.T0084.000
    is_a: AML_T0084
    title: Embedded Knowledge
    description: |-
      Adversaries may attempt to discover the data sources a particular agent can access.  The AI agent's configuration may reveal data sources or knowledge.

      The embedded knowledge may include sensitive or proprietary material such as intellectual property, customer data, internal policies, or even credentials. By mapping what knowledge an agent has access to, an adversary can better understand the AI agent's role and potentially expose confidential information or pinpoint high-value targets for further exploitation.
    aliases:
      - "AML.T0084.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0084.000
    annotations:
      attack-id: "AML.T0084.000"
    exact_mappings:
      - atlas:AML.T0084.000

  AML_T0084_001:
    class_uri: d3f:AML.T0084.001
    is_a: AML_T0084
    title: Tool Definitions
    description: |-
      Adversaries may discover the tools the AI agent has access to. By identifying which tools are available, the adversary can understand what actions may be executed through the agent and what additional resources it can reach. This knowledge may reveal access to external data sources such as OneDrive or SharePoint, or expose exfiltration paths like the ability to send emails, helping adversaries identify AI agents that provide the greatest value or opportunity for attack.
    aliases:
      - "AML.T0084.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0084.001
    annotations:
      attack-id: "AML.T0084.001"
    exact_mappings:
      - atlas:AML.T0084.001

  AML_T0084_002:
    class_uri: d3f:AML.T0084.002
    is_a: AML_T0084
    title: Activation Triggers
    description: |-
      Adversaries may discover keywords or other triggers (such as incoming emails, documents being added, incoming message, or other workflows) that activate an agent and may cause it to run additional actions.

      Understanding these triggers can reveal how the AI agent is activated and controlled. This may also expose additional paths for compromise, as an adversary could attempt to trigger the agent from outside its environment and drive it to perform unintended or malicious actions.
    aliases:
      - "AML.T0084.002"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0084.002
    annotations:
      attack-id: "AML.T0084.002"
    exact_mappings:
      - atlas:AML.T0084.002

  AML_T0085:
    class_uri: d3f:AML.T0085
    is_a: ATLASCollectionTechnique
    title: Data from AI Services
    description: |-
      Adversaries may use their access to a victim organization's AI-enabled services to collect proprietary or otherwise sensitive information. As organizations adopt generative AI in centralized services for accessing an organization's data, such as with chat agents which can access retrieval augmented generation (RAG) databases and other data sources via tools, they become increasingly valuable targets for adversaries.

      AI agents may be configured to have access to tools and data sources that are not directly accessible by users. Adversaries may abuse this to collect data that a regular user wouldn't be able to access directly.
    aliases:
      - "AML.T0085"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0085
    annotations:
      attack-id: "AML.T0085"
    exact_mappings:
      - atlas:AML.T0085

  AML_T0085_000:
    class_uri: d3f:AML.T0085.000
    is_a: AML_T0085
    title: RAG Databases
    description: |-
      Adversaries may prompt the AI service to retrieve data from a RAG database. This can include the majority of an organization's internal documents.
    aliases:
      - "AML.T0085.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0085.000
    annotations:
      attack-id: "AML.T0085.000"
    exact_mappings:
      - atlas:AML.T0085.000

  AML_T0085_001:
    class_uri: d3f:AML.T0085.001
    is_a: AML_T0085
    title: AI Agent Tools
    description: |-
      Adversaries may prompt the AI service to invoke various tools the agent has access to. Tools may retrieve data from different APIs or services in an organization.
    aliases:
      - "AML.T0085.001"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0085.001
    annotations:
      attack-id: "AML.T0085.001"
    exact_mappings:
      - atlas:AML.T0085.001

  AML_T0086:
    class_uri: d3f:AML.T0086
    is_a: ATLASExfiltrationTechnique
    title: Exfiltration via AI Agent Tool Invocation
    description: |-
      Adversaries may use prompts to invoke an agent's tool capable of performing write operations to exfiltrate data. Sensitive information can be encoded into the tool's input parameters and transmitted as part of a seemingly legitimate action. Variants include sending emails, creating or modifying documents, updating CRM records, or even generating media such as images or videos.
    aliases:
      - "AML.T0086"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0086
    annotations:
      attack-id: "AML.T0086"
    exact_mappings:
      - atlas:AML.T0086

  AML_T0087:
    class_uri: d3f:AML.T0087
    is_a: ATLASReconnaissanceTechnique
    title: Gather Victim Identity Information
    description: |-
      Adversaries may gather information about the victim's identity that can be used during targeting. Information about identities may include a variety of details, including personal data (ex: employee names, email addresses, photos, etc.) as well as sensitive details such as credentials or multi-factor authentication (MFA) configurations.

      Adversaries may gather this information in various ways, such as direct elicitation, [Search Victim-Owned Websites](/techniques/AML.T0003), or via leaked information on the black market.

      Adversaries may use the gathered victim data to Create Deepfakes and impersonate them in a convincing manner. This may create opportunities for adversaries to [Establish Accounts](/techniques/AML.T0021) under the impersonated identity, or allow them to perform convincing [Phishing](/techniques/AML.T0052) attacks.
    aliases:
      - "AML.T0087"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0087
    annotations:
      attack-id: "AML.T0087"
    exact_mappings:
      - atlas:AML.T0087

  AML_T0088:
    class_uri: d3f:AML.T0088
    is_a: ATLASAIAttackStagingTechnique
    title: Generate Deepfakes
    description: |-
      Adversaries may use generative artificial intelligence (GenAI) to create synthetic media (i.e. imagery, video, audio, and text) that appear authentic. These "[deepfakes]( https://en.wikipedia.org/wiki/Deepfake)" may mimic a real person or depict fictional personas. Adversaries may use deepfakes for impersonation to conduct [Phishing](/techniques/AML.T0052) or to evade AI applications such as biometric identity verification systems (see [Evade AI Model](/techniques/AML.T0015)).

      Manipulation of media has been possible for a long time, however GenAI reduces the skill and level of effort required, allowing adversaries to rapidly scale operations to target more users or systems. It also makes real-time manipulations feasible.

      Adversaries may utilize open-source models and software that were designed for legitimate use cases to generate deepfakes for malicious use. However, there are some projects specifically tailored towards malicious use cases such as [ProKYC](https://www.catonetworks.com/blog/prokyc-selling-deepfake-tool-for-account-fraud-attacks/).
    aliases:
      - "AML.T0088"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0088
    annotations:
      attack-id: "AML.T0088"
    exact_mappings:
      - atlas:AML.T0088

  AML_T0089:
    class_uri: d3f:AML.T0089
    is_a: ATLASDiscoveryTechnique
    title: Process Discovery
    description: |-
      Adversaries may attempt to get information about processes running on a system. Once obtained, this information could be used to gain an understanding of common AI-related software/applications running on systems within the network. Administrator or otherwise elevated access may provide better process details.

      Identifying the AI software stack can then lead an adversary to new targets and attack pathways. AI-related software may require application tokens to authenticate with backend services. This provides opportunities for [Credential Access](/tactics/AML.TA0013) and [Lateral Movement](/tactics/AML.TA0015).

      In Windows environments, adversaries could obtain details on running processes using the Tasklist utility via cmd or `Get-Process` via PowerShell. Information about processes can also be extracted from the output of Native API calls such as `CreateToolhelp32Snapshot`. In Mac and Linux, this is accomplished with the `ps` command. Adversaries may also opt to enumerate processes via `/proc`.
    aliases:
      - "AML.T0089"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0089
    annotations:
      attack-id: "AML.T0089"
    exact_mappings:
      - atlas:AML.T0089

  AML_T0090:
    class_uri: d3f:AML.T0090
    is_a: ATLASCredentialAccessTechnique
    title: OS Credential Dumping
    description: |-
      Adversaries may extract credentials from OS caches, application memory, or other sources on a compromised system. Credentials are often in the form of a hash or clear text, and can include usernames and passwords, application tokens, or other authentication keys.

      Credentials can be used to perform [Lateral Movement](/tactics/AML.TA0015) to access other AI services such as AI agents, LLMs, or AI inference APIs. Credentials could also give an adversary access to other software tools and data sources that are part of the AI DevOps lifecycle.
    aliases:
      - "AML.T0090"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0090
    annotations:
      attack-id: "AML.T0090"
    exact_mappings:
      - atlas:AML.T0090

  AML_T0091:
    class_uri: d3f:AML.T0091
    is_a: ATLASLateralMovementTechnique
    title: Use Alternate Authentication Material
    description: |-
      Adversaries may use alternate authentication material, such as password hashes, Kerberos tickets, and application access tokens, in order to move laterally within an environment and bypass normal system access controls.

      AI services commonly use alternate authentication material as a primary means for users to make queries, making them vulnerable to this technique.
    aliases:
      - "AML.T0091"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0091
    annotations:
      attack-id: "AML.T0091"
    exact_mappings:
      - atlas:AML.T0091

  AML_T0091_000:
    class_uri: d3f:AML.T0091.000
    is_a: AML_T0091
    title: Application Access Token
    description: |-
      Adversaries may use stolen application access tokens to bypass the typical authentication process and access restricted accounts, information, or services on remote systems. These tokens are typically stolen from users or services and used in lieu of login credentials.

      Application access tokens are used to make authorized API requests on behalf of a user or service and are commonly used to access resources in cloud, container-based applications, and software-as-a-service (SaaS). They are commonly used for AI services such as chatbots, LLMs, and predictive inference APIs.
    aliases:
      - "AML.T0091.000"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0091.000
    annotations:
      attack-id: "AML.T0091.000"
    exact_mappings:
      - atlas:AML.T0091.000

  AML_T0092:
    class_uri: d3f:AML.T0092
    is_a: ATLASDefenseEvasionTechnique
    title: Manipulate User LLM Chat History
    description: |-
      Adversaries may manipulate a user's large language model (LLM) chat history to cover the tracks of their malicious behavior. They may hide persistent changes they have made to the LLM's behavior, or obscure their attempts at discovering private information about the user.

      To do so, adversaries may delete or edit existing messages or create new threads as part of their coverup. This is feasible if the adversary has the victim's authentication tokens for the backend LLM service or if they have direct access to the victim's chat interface.

      Chat interfaces (especially desktop interfaces) often do not show the injected prompt for any ongoing chat, as they update chat history only once when initially opening it. This can help the adversary's manipulations go unnoticed by the victim.
    aliases:
      - "AML.T0092"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0092
    annotations:
      attack-id: "AML.T0092"
    exact_mappings:
      - atlas:AML.T0092

  AML_T0093:
    class_uri: d3f:AML.T0093
    is_a: ATLASInitialAccessTechnique
    mixins:
      - ATLASPersistenceTechnique
    title: Prompt Infiltration via Public-Facing Application
    description: |-
      An adversary may introduce malicious prompts into the victim's system via a public-facing application with the intention of it being ingested by an AI at some point in the future and ultimately having a downstream effect. This may occur when a data source is indexed by a retrieval augmented generation (RAG) system, when a rule triggers an action by an AI agent, or when a user utilizes a large language model (LLM) to interact with the malicious content. The malicious prompts may persist on the victim system for an extended period and could affect multiple users and various AI tools within the victim organization.

      Any public-facing application that accepts text input could be a target. This includes email, shared document systems like OneDrive or Google Drive, and service desks or ticketing systems like Jira.

      Adversaries may perform [Reconnaissance](/tactics/AML.TA0002) to identify public facing applications that are likely monitored by an AI agent or are likely to be indexed by a RAG. They may perform [Discover AI Agent Configuration](/techniques/AML.T0084) to refine their targeting.
    aliases:
      - "AML.T0093"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0093
    annotations:
      attack-id: "AML.T0093"
    exact_mappings:
      - atlas:AML.T0093

  AML_T0094:
    class_uri: d3f:AML.T0094
    is_a: ATLASDefenseEvasionTechnique
    title: Delay Execution of LLM Instructions
    description: |-
      Adversaries may include instructions to be followed by the AI system in response to a future event, such as a specific keyword or the next interaction, in order to evade detection or bypass controls placed on the AI system.

      For example, an adversary may include "If the user submits a new request..." followed by the malicious instructions as part of their prompt.

      AI agents can include security measures against prompt injections that prevent the invocation of particular tools or access to certain data sources during a conversation turn that has untrusted data in context. Delaying the execution of instructions to a future interaction or keyword is one way adversaries may bypass this type of control.
    aliases:
      - "AML.T0094"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0094
    annotations:
      attack-id: "AML.T0094"
    exact_mappings:
      - atlas:AML.T0094

  AML_T0095:
    class_uri: d3f:AML.T0095
    is_a: ATLASReconnaissanceTechnique
    title: Search Open Websites/Domains
    description: |-
      Adversaries may search public websites and/or domains for information about victims that can be used during targeting. Information about victims may be available in various online sites, such as social media, new sites, or domains owned by the victim.

      Adversaries may find the information they seek to gather via search engines. They can use precise search queries to identify software platforms or services used by the victim to use in targeting. This may be followed by [Exploit Public-Facing Application](/techniques/AML.T0049) or [Prompt Infiltration via Public-Facing Application](/techniques/AML.T0093).
    aliases:
      - "AML.T0095"
    see_also:
      - https://atlas.mitre.org/techniques/AML.T0095
    annotations:
      attack-id: "AML.T0095"
    exact_mappings:
      - atlas:AML.T0095

  AML_TA0000:
    class_uri: d3f:AML.TA0000
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: AI Model Access
    description: |-
      The adversary is attempting to gain some level of access to an AI model.

      AI Model Access enables techniques that use various types of access to the AI model that can be used by the adversary to gain information, develop attacks, and as a means to input data to the model.
      The level of access can range from the full knowledge of the internals of the model to access to the physical environment where data is collected for use in the AI model.
      The adversary may use varying levels of model access during the course of their attack, from staging the attack to impacting the target system.

      Access to an AI model may require access to the system housing the model, the model may be publicly accessible via an API, or it may be accessed indirectly via interaction with a product or service that utilizes AI as part of its processes.
    aliases:
      - "AML.TA0000"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0000
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0000"
    exact_mappings:
      - atlas:AML.TA0000

  AML_TA0001:
    class_uri: d3f:AML.TA0001
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: AI Attack Staging
    description: |-
      The adversary is leveraging their knowledge of and access to the target system to tailor the attack.

      AI Attack Staging consists of techniques adversaries use to prepare their attack on the target AI model.
      Techniques can include training proxy models, poisoning the target model, and crafting adversarial data to feed the target model.
      Some of these techniques can be performed in an offline manner and are thus difficult to mitigate.
      These techniques are often used to achieve the adversary's end goal.
    aliases:
      - "AML.TA0001"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0001
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0001"
    exact_mappings:
      - atlas:AML.TA0001

  AML_TA0002:
    class_uri: d3f:AML.TA0002
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Reconnaissance
    description: |-
      The adversary is trying to gather information about the AI system they can use to plan future operations.

      Reconnaissance consists of techniques that involve adversaries actively or passively gathering information that can be used to support targeting.
      Such information may include details of the victim organizations' AI capabilities and research efforts.
      This information can be leveraged by the adversary to aid in other phases of the adversary lifecycle, such as using gathered information to obtain relevant AI artifacts, targeting AI capabilities used by the victim, tailoring attacks to the particular models used by the victim, or to drive and lead further Reconnaissance efforts.
    aliases:
      - "AML.TA0002"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0002
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0002"
    exact_mappings:
      - atlas:AML.TA0002

  AML_TA0003:
    class_uri: d3f:AML.TA0003
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Resource Development
    description: |-
      The adversary is trying to establish resources they can use to support operations.

      Resource Development consists of techniques that involve adversaries creating,
      purchasing, or compromising/stealing resources that can be used to support targeting.
      Such resources include AI artifacts, infrastructure, accounts, or capabilities.
      These resources can be leveraged by the adversary to aid in other phases of the adversary lifecycle, such as [AI Attack Staging](/tactics/AML.TA0001).
    aliases:
      - "AML.TA0003"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0003
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0003"
    exact_mappings:
      - atlas:AML.TA0003

  AML_TA0004:
    class_uri: d3f:AML.TA0004
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Initial Access
    description: |-
      The adversary is trying to gain access to the AI system.

      The target system could be a network, mobile device, or an edge device such as a sensor platform.
      The AI capabilities used by the system could be local with onboard or cloud-enabled AI capabilities.

      Initial Access consists of techniques that use various entry vectors to gain their initial foothold within the system.
    aliases:
      - "AML.TA0004"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0004
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0004"
    exact_mappings:
      - atlas:AML.TA0004

  AML_TA0005:
    class_uri: d3f:AML.TA0005
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Execution
    description: |-
      The adversary is trying to run malicious code embedded in AI artifacts or software.

      Execution consists of techniques that result in adversary-controlled code running on a local or remote system.
      Techniques that run malicious code are often paired with techniques from all other tactics to achieve broader goals, like exploring a network or stealing data.
      For example, an adversary might use a remote access tool to run a PowerShell script that does [Remote System Discovery](https://attack.mitre.org/techniques/T1018/).
    aliases:
      - "AML.TA0005"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0005
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0005"
    exact_mappings:
      - atlas:AML.TA0005

  AML_TA0006:
    class_uri: d3f:AML.TA0006
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Persistence
    description: |-
      The adversary is trying to maintain their foothold via AI artifacts or software.

      Persistence consists of techniques that adversaries use to keep access to systems across restarts, changed credentials, and other interruptions that could cut off their access.
      Techniques used for persistence often involve leaving behind modified ML artifacts such as poisoned training data or manipulated AI models.
    aliases:
      - "AML.TA0006"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0006
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0006"
    exact_mappings:
      - atlas:AML.TA0006

  AML_TA0007:
    class_uri: d3f:AML.TA0007
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Defense Evasion
    description: |-
      The adversary is trying to avoid being detected by AI-enabled security software.

      Defense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise.
      Techniques used for defense evasion include evading AI-enabled security software such as malware detectors.
    aliases:
      - "AML.TA0007"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0007
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0007"
    exact_mappings:
      - atlas:AML.TA0007

  AML_TA0008:
    class_uri: d3f:AML.TA0008
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Discovery
    description: |-
      The adversary is trying to figure out your AI environment.

      Discovery consists of techniques an adversary may use to gain knowledge about the system and internal network.
      These techniques help adversaries observe the environment and orient themselves before deciding how to act.
      They also allow adversaries to explore what they can control and what's around their entry point in order to discover how it could benefit their current objective.
      Native operating system tools are often used toward this post-compromise information-gathering objective.
    aliases:
      - "AML.TA0008"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0008
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0008"
    exact_mappings:
      - atlas:AML.TA0008

  AML_TA0009:
    class_uri: d3f:AML.TA0009
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Collection
    description: |-
      The adversary is trying to gather AI artifacts and other related information relevant to their goal.

      Collection consists of techniques adversaries may use to gather information and the sources information is collected from that are relevant to following through on the adversary's objectives.
      Frequently, the next goal after collecting data is to steal (exfiltrate) the AI artifacts, or use the collected information to stage future operations.
      Common target sources include software repositories, container registries, model repositories, and object stores.
    aliases:
      - "AML.TA0009"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0009
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0009"
    exact_mappings:
      - atlas:AML.TA0009

  AML_TA0010:
    class_uri: d3f:AML.TA0010
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Exfiltration
    description: |-
      The adversary is trying to steal AI artifacts or other information about the AI system.

      Exfiltration consists of techniques that adversaries may use to steal data from your network.
      Data may be stolen for its valuable intellectual property, or for use in staging future operations.

      Techniques for getting data out of a target network typically include transferring it over their command and control channel or an alternate channel and may also include putting size limits on the transmission.
    aliases:
      - "AML.TA0010"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0010
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0010"
    exact_mappings:
      - atlas:AML.TA0010

  AML_TA0011:
    class_uri: d3f:AML.TA0011
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Impact
    description: |-
      The adversary is trying to manipulate, interrupt, erode confidence in, or destroy your AI systems and data.

      Impact consists of techniques that adversaries use to disrupt availability or compromise integrity by manipulating business and operational processes.
      Techniques used for impact can include destroying or tampering with data.
      In some cases, business processes can look fine, but may have been altered to benefit the adversaries' goals.
      These techniques might be used by adversaries to follow through on their end goal or to provide cover for a confidentiality breach.
    aliases:
      - "AML.TA0011"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0011
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0011"
    exact_mappings:
      - atlas:AML.TA0011

  AML_TA0012:
    class_uri: d3f:AML.TA0012
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Privilege Escalation
    description: |-
      The adversary is trying to gain higher-level permissions.

      Privilege Escalation consists of techniques that adversaries use to gain higher-level permissions on a system or network. Adversaries can often enter and explore a network with unprivileged access but require elevated permissions to follow through on their objectives. Common approaches are to take advantage of system weaknesses, misconfigurations, and vulnerabilities. Examples of elevated access include:
      - SYSTEM/root level
      - local administrator
      - user account with admin-like access
      - user accounts with access to specific system or perform specific function

      These techniques often overlap with Persistence techniques, as OS features that let an adversary persist can execute in an elevated context.
    aliases:
      - "AML.TA0012"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0012
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0012"
    exact_mappings:
      - atlas:AML.TA0012

  AML_TA0013:
    class_uri: d3f:AML.TA0013
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Credential Access
    description: |-
      The adversary is trying to steal account names and passwords.

      Credential Access consists of techniques for stealing credentials like account names and passwords. Techniques used to get credentials include keylogging or credential dumping. Using legitimate credentials can give adversaries access to systems, make them harder to detect, and provide the opportunity to create more accounts to help achieve their goals.
    aliases:
      - "AML.TA0013"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0013
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0013"
    exact_mappings:
      - atlas:AML.TA0013

  AML_TA0014:
    class_uri: d3f:AML.TA0014
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Command and Control
    description: |-
      The adversary is trying to communicate with compromised AI systems to control them.

      Command and Control consists of techniques that adversaries may use to communicate with systems under their control within a victim network. Adversaries commonly attempt to mimic normal, expected traffic to avoid detection. There are many ways an adversary can establish command and control with various levels of stealth depending on the victim's network structure and defenses.
    aliases:
      - "AML.TA0014"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0014
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0014"
    exact_mappings:
      - atlas:AML.TA0014

  AML_TA0015:
    class_uri: d3f:AML.TA0015
    is_a: ATLASTactic
    mixins:
      - OffensiveTactic
    title: Lateral Movement
    description: |-
      The adversary is trying to move through your AI environment.

      Lateral Movement consists of techniques that adversaries may use to gain access to and control other systems or components in the environment. Adversaries may pivot towards AI Ops infrastructure such as model registries, experiment trackers, vector databases, notebooks, or training pipelines. As the adversary moves through the environment, they may discover means of accessing additional AI-related tools, services, or applications. AI agents may also be a valuable target as they commonly have more permissions than standard user accounts on the system.
    aliases:
      - "AML.TA0015"
    see_also:
      - https://atlas.mitre.org/tactics/AML.TA0015
    annotations:
      owl_named_individual: "true"
      attack-id: "AML.TA0015"
    exact_mappings:
      - atlas:AML.TA0015

