      - "CWE-1021"
    annotations:
      cwe-id: "CWE-1021"
      synonym: "Clickjacking"
    exact_mappings:
      - cwe:CWE-1021

  CWE_1022:
    class_uri: d3f:CWE-1022
    is_a: CWE_266
    title: Use of Web Link to Untrusted Target with window.opener Access
