    description: |-
      The hardware logic for error handling and security checks can incorrectly forward data before the security check is complete.
    aliases:
      - "CWE-1264"
    annotations:
      cwe-id: "CWE-1264"
    exact_mappings:
      - cwe:CWE-1264

  CWE_1265:
    class_uri: d3f:CWE-1265
    is_a: CWE_691
    title: Unintended Reentrant Invocation of Non-reentrant Code Via Nested Calls
    description: |-
      During execution of non-reentrant code, the product performs a call that unintentionally produces a nested invocation of the non-reentrant code.
    aliases:
      - "CWE-1265"
    annotations:
      cwe-id: "CWE-1265"
    exact_mappings:
      - cwe:CWE-1265

  CWE_1266:
    class_uri: d3f:CWE-1266
