  ShadowStack:
    class_uri: d3f:ShadowStack
    is_a: DigitalInformationBearer
    title: Shadow Stack
    description: |-
      A shadow stack is a mechanism for protecting a procedure's stored return address, such as from a stack buffer overflow. The shadow stack itself is a second, separate stack that "shadows" the program call stack. In the function prologue, a function stores its return address to both the call stack and the shadow stack. In the function epilogue, a function loads the return address from both the call stack and the shadow stack, and then compares them. If the two records of the return address differ, then an attack is detected.
    see_also:
      - https://dbpedia.org/page/Shadow_stack
    annotations:
      owl_named_individual: "true"

  ShadowStackComparisons:
    class_uri: d3f:ShadowStackComparisons
    is_a: ProcessAnalysis
    title: Shadow Stack Comparisons
    description: |-
      Comparing a call stack in system memory with a shadow call stack maintained by the processor to determine unauthorized shellcode activity.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-SSC"
      kb-article: "## How it works This technique compares the call stack stored in system memory with the shadow call stack maintained in the cache memory of the processor. Mismatches between the two are compared since a return oriented programming attack may only be able to control or spoof the call stack and not t"
