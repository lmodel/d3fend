  ContentRebuild:
    class_uri: d3f:ContentRebuild
    is_a: ContentModification
    title: Content Rebuild
    description: Rebuild the file according to the spec so any unreferenced components or objects are removed.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CNR"
      synonym: "Content Reconstruction"
      kb-article: "## How it works If inputted content is divided up into components for further scrutiny, the components may be combined back afterwards in a safer state."

  ContentSubstitution:
    class_uri: d3f:ContentSubstitution
    is_a: ContentModification
    title: Content Substitution
    description: Modifies specific digital content information by replacing it with something else.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CNS"
      kb-article: "## How it works If malicious or unecessary elements is discovered within the content, or if a specific embedded portion does not comply with policy, it may be replaced with alternatives to ensure safety."

  ContentValidation:
    class_uri: d3f:ContentValidation
    is_a: ContentFiltering
    title: Content Validation
    description: Verify and validate contents complies with policy
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CV"
      kb-article: "## How it works To ensure that content is safe, it's composition must be validated according to its content policy."

  ControlCatalog:
    class_uri: d3f:ControlCatalog
    is_a: ExternalControlThing
    title: Control Catalog
    description: |-
      A control catalog is a complete list of protective measures for systems, organizations, or individuals for subject domains (e.g., security and privacy.)
    see_also:
      - http://wordnet-rdf.princeton.edu/id/06499734-n

  ControlCorrelationIdentifierCatalog:
    class_uri: d3f:ControlCorrelationIdentifierCatalog
    is_a: ControlCatalog
    title: Control Correlation Identifier Catalog
    description: A control correlation identifier (CCI) catalog provides a catalog of CCIs for a given release date.
    see_also:
      - https://public.cyber.mil/stigs/cci/

  ControlFlowGraph:
    class_uri: d3f:ControlFlowGraph
    is_a: DigitalInformation
    title: Control Flow Graph
    description: |-
      A control flow graph is a representation of all possible control flow transfers within a program, typically computed at compile-time or link-time, including calls, jumps, and returns. The control flow graph can be used to compute a control flow policy that permits only the expected control flow transfers during process execution via control flow integrity mechanisms.

  ControlFlowIntegrity:
    class_uri: d3f:ControlFlowIntegrity
    is_a: ApplicationHardening
    title: Control Flow Integrity
    description: Enforcing legal control flow transfers during application process execution.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CFI"
      kb-article: "## How it works Control flow integrity (CFI) restricts the destinations of control flow transfer instructions---particularly indirect function branches such as indirect function calls, jumps, and returns---such that execution can only proceed along paths determined to be valid at compile-time or lo"

  ControlFlowPolicy:
    class_uri: d3f:ControlFlowPolicy
    is_a: ControlFlowGraph
    title: Control Flow Policy
    description: |-
      A control flow policy is a subset of the possible control flow transfers computed from a program's control flow graph. It defines only the expected and allowed control flow transfers and is enforced by control flow integrity.

  ConvolutionalNeuralNetwork:
    class_uri: d3f:ConvolutionalNeuralNetwork
    is_a: DeepNeuralNetClassification
    title: Convolutional Neural Network
    description: |-
      A class of artificial neural network most commonly applied to analyze visual imagery.CNNs use a mathematical operation called convolution in place of general matrix multiplication in at least one of their layers.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-CNN"
