      A hardware device that functions primarily as an RF front end plus data conversion and transport, relying on an external host computer to run most waveform/DSP processing and to control operation. It is commonly connected via USB, PCIe, or similar links and behaves like a high-speed radio peripheral.
    aliases:
      - "Software-definedRadioDevice"
    see_also:
      - https://en.wikipedia.org/wiki/Software-defined_radio#RTL-SDR
    annotations:
