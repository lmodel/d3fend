    title: Python Package
    description: |-
      A Python package is an aggregation of many Python files - either in source code or in bytecode - and associated metadata and resources (text, images, etc.). Python packages can be distributed in different file formats.
    see_also:
      - https://packaging.python.org/

  PythonScriptFile:
    class_uri: d3f:PythonScriptFile
    is_a: ExecutableScript
    title: Python Script File
    annotations:
      synonym: "A script file written in the Python programming language."

  Q_Learning:
    class_uri: d3f:Q-Learning
    is_a: Model_freeReinforcementLearning
    description: |-
      Q-learning is a model-free reinforcement learning algorithm to learn the value of an action in a particular state. It does not require a model of the environment (hence "model-free"), and it can handle problems with stochastic transitions and rewards without requiring adaptations.
    aliases:
      - "Q-Learning"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-QL"
      kb-article: "## References Q-learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Q-learning)."

  QueryByCommittee:
    class_uri: d3f:QueryByCommittee
    is_a: ActiveLearning
    title: Query By Committee
    description: |-
      Query by Committee (QBC) takes inspiration from ensemble methods. Instead of just one classifier, it takes into account the decision of a committee C=ℎ1,…,ℎc of classifiers ℎi. Each classifier has the same target classes, but a different underlying model or a different view on the data.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-QBC"
      kb-article: "## References Intro to Active Learning. inovex Blog. [Link](https://www.inovex.de/de/blog/intro-to-active-learning/)."

  RAM:
    class_uri: d3f:RAM
    is_a: PrimaryStorage
    description: |-
      Random-access memory (RAM) is a form of computer memory that can be read and changed in any order, typically used to store working data and machine code.
    see_also:
      - https://dbpedia.org/page/Random-access_memory
    annotations:
      synonym: "Random-access Memory"

  RD_0001:
    class_uri: d3f:RD-0001
    is_a: SPARTAResourceDevelopmentTechnique
    title: Acquire Infrastructure
    description: |-
      Threat actors may buy, lease, or rent infrastructure that can be used for future campaigns or to perpetuate other techniques. A wide variety of infrastructure exists for threat actors to connect to and communicate with target spacecraft. Infrastructure can include:
    aliases:
      - "RD-0001"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0001/
    annotations:
      attack-id: "RD-0001"
    exact_mappings:
      - attack:RD-0001

  RD_0001_01:
    class_uri: d3f:RD-0001.01
    is_a: RD_0001
    title: Ground Station Equipment
    description: |-
      Threat actors will likely need to acquire the following types of equipment to establish ground-to-space communications:

      Antenna positioners: which also usually come with satellite tracking antenna systems, in order to accurately send and receive signals along several different bands. This infrastructure is useful in pinpointing the location of a spacecraft in the sky.

      Ground antennas: in order to send commands and receive telemetry from the victim spacecraft. Threat actors can utilize these antennas in relation to other tactics such as execution and exfiltration. Instead of compromising a third-part ground station, threat actors may opt to configure and run their own antennas in support of operations.

      Ground data processors: in order to convert RF signals to TCP packets. This equipment is utilized in ground stations to convert the telemetry into human readable format.

      Ground radio modems: in order to convert TCP packs to RF signals. This equipment is utilized in ground stations to convert commands into RF signals in order to send them to orbiting spacecraft.

      Signal generator: in order to configure amplitude, frequency, and apply modulations to the signal.

      Additional examples of equipment include couplers, attenuators, power dividers, diplexers, low noise amplifiers, high power amplifiers, filters, mixers, spectrum analyzers, etc.
    aliases:
      - "RD-0001.01"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0001/01/
    annotations:
      attack-id: "RD-0001.01"
    exact_mappings:
      - attack:RD-0001.01

  RD_0001_02:
    class_uri: d3f:RD-0001.02
    is_a: RD_0001
    title: Commercial Ground Station Services
    description: |-
      Threat actors may buy or rent commercial ground station services. These services often have all of the individual parts that are needed to properly communicate with spacecrafts. By utilizing existing infrastructure, threat actors may save time, money, and effort in order to support operations.
    aliases:
      - "RD-0001.02"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0001/02/
    annotations:
      attack-id: "RD-0001.02"
    exact_mappings:
      - attack:RD-0001.02

  RD_0001_03:
    class_uri: d3f:RD-0001.03
    is_a: RD_0001
    title: Spacecraft
    description: |-
      Threat actors may acquire their own spacecraft that has the capability to maneuver within close proximity to a target spacecraft. Since many of the commercial and military assets in space are tracked, and that information is publicly available, attackers can identify the location of space assets to infer the best positioning for intersecting orbits. Proximity operations support avoidance of the larger attenuation that would otherwise affect the signal when propagating long distances, or environmental circumstances that may present interference.
    aliases:
      - "RD-0001.03"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0001/03/
    annotations:
      attack-id: "RD-0001.03"
    exact_mappings:
      - attack:RD-0001.03

  RD_0001_04:
    class_uri: d3f:RD-0001.04
    is_a: RD_0001
    title: Launch Facility
    description: |-
      Threat actors may need to acquire a launch facility, which is a specialized location designed for launching spacecraft and rockets into space. These facilities typically include launch pads, control centers, and assembly buildings, and are often located near bodies of water or in remote areas to minimize potential safety hazards and provide enough room for rocket launches. Launch facilities can be operated by the military, national space agencies such as NASA in the United States or Roscosmos in Russia, or by private companies such as SpaceX or Blue Origin.
    aliases:
      - "RD-0001.04"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0001/04/
    annotations:
      attack-id: "RD-0001.04"
    exact_mappings:
      - attack:RD-0001.04

  RD_0002:
    class_uri: d3f:RD-0002
    is_a: SPARTAResourceDevelopmentTechnique
    title: Compromise Infrastructure
    description: |-
      Threat actors may compromise third-party infrastructure that can be used for future campaigns or to perpetuate other techniques. Infrastructure solutions include physical devices such as antenna, amplifiers, and convertors, as well as software used by satellite communicators. Instead of buying or renting infrastructure, a threat actor may compromise infrastructure and use it during other phases of the campaign's lifecycle.
    aliases:
      - "RD-0002"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0002/
    annotations:
      attack-id: "RD-0002"
    exact_mappings:
      - attack:RD-0002

  RD_0002_01:
    class_uri: d3f:RD-0002.01
    is_a: RD_0002
    title: Mission-Operated Ground System
    description: |-
      Threat actors may compromise mission owned/operated ground systems that can be used for future campaigns or to perpetuate other techniques. These ground systems have already been configured for communications to the victim spacecraft. By compromising this infrastructure, threat actors can stage, launch, and execute an operation. Threat actors may utilize these systems for various tasks, including Execution and Exfiltration.
    aliases:
      - "RD-0002.01"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0002/01/
    annotations:
      attack-id: "RD-0002.01"
    exact_mappings:
      - attack:RD-0002.01

  RD_0002_02:
    class_uri: d3f:RD-0002.02
    is_a: RD_0002
    title: 3rd Party Ground System
    description: |-
      Threat actors may compromise access to third-party ground systems that can be used for future campaigns or to perpetuate other techniques. These ground systems can be or may have already been configured for communications to the victim spacecraft. By compromising this infrastructure, threat actors can stage, launch, and execute an operation.
    aliases:
      - "RD-0002.02"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0002/02/
    annotations:
      attack-id: "RD-0002.02"
    exact_mappings:
      - attack:RD-0002.02

  RD_0002_03:
    class_uri: d3f:RD-0002.03
    is_a: RD_0002
    title: 3rd-Party Spacecraft
    description: |-
      Threat actors may compromise a 3rd-party spacecraft that has the capability to maneuver within close proximity to a target spacecraft. This technique enables historically lower-tier attackers the same capability as top tier nation-state actors without the initial development cost. Additionally, this technique complicates attribution of an attack. Since many of the commercial and military assets in space are tracked, and that information is publicly available, attackers can identify the location of space assets to infer the best positioning for intersecting orbits. Proximity operations support avoidance of the larger attenuation that would otherwise affect the signal when propagating long distances, or environmental circumstances that may present interference. Further, the compromised spacecraft may posses the capability to grapple target spacecraft once it has established the appropriate space rendezvous. If from a proximity / rendezvous perspective a threat actor has the ability to connect via docking interface or expose testing (i.e., JTAG port) once it has grappled the target spacecraft, they could perform various attacks depending on the access enabled via the physical connection.
    aliases:
      - "RD-0002.03"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0002/03/
    annotations:
      attack-id: "RD-0002.03"
    exact_mappings:
      - attack:RD-0002.03

  RD_0003:
    class_uri: d3f:RD-0003
    is_a: SPARTAResourceDevelopmentTechnique
    title: Obtain Cyber Capabilities
    description: |-
      Threat actors may buy and/or steal cyber capabilities that can be used for future campaigns or to perpetuate other techniques. Rather than developing their own capabilities in-house, threat actors may purchase, download, or steal them. Activities may include the acquisition of malware, software, exploits, and information relating to vulnerabilities. Threat actors may obtain capabilities to support their operations throughout numerous phases of the campaign lifecycle.
    aliases:
      - "RD-0003"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0003/
    annotations:
      attack-id: "RD-0003"
    exact_mappings:
      - attack:RD-0003

  RD_0003_01:
    class_uri: d3f:RD-0003.01
    is_a: RD_0003
    title: Exploit/Payload
    description: |-
      Threat actors may buy, steal, or download exploits and payloads that can be used for future campaigns or to perpetuate other techniques. An exploit/payload takes advantage of a bug or vulnerability in order to cause unintended or unanticipated behavior to occur on the victim spacecraft's hardware, software, and/or subsystems. Rather than develop their own, threat actors may find/modify exploits from online or purchase them from exploit vendors.
    aliases:
      - "RD-0003.01"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0003/01/
    annotations:
      attack-id: "RD-0003.01"
    exact_mappings:
      - attack:RD-0003.01

  RD_0003_02:
    class_uri: d3f:RD-0003.02
    is_a: RD_0003
    title: Cryptographic Keys
    description: |-
      Threat actors may obtain encryption keys as they are used for the main commanding of the target spacecraft or any of its subsystems/payloads. Once obtained, threat actors may use any number of means to command the spacecraft without needing to go through a legitimate channel. These keys may be obtained through reconnaissance of the ground system or retrieved from the victim spacecraft.
    aliases:
      - "RD-0003.02"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0003/02/
    annotations:
      attack-id: "RD-0003.02"
    exact_mappings:
      - attack:RD-0003.02

  RD_0004:
    class_uri: d3f:RD-0004
    is_a: SPARTAResourceDevelopmentTechnique
    title: Stage Capabilities
    description: |-
      Threat actors may upload, install, or otherwise set up capabilities that can be used for future campaigns or to perpetuate other techniques. To support their operations, a threat actor may need to develop their own capabilities or obtain them in some way in order to stage them on infrastructure under their control. These capabilities may be staged on infrastructure that was previously purchased or rented by the threat actor or was otherwise compromised by them.
    aliases:
      - "RD-0004"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0004/
    annotations:
      attack-id: "RD-0004"
    exact_mappings:
      - attack:RD-0004

  RD_0004_01:
    class_uri: d3f:RD-0004.01
    is_a: RD_0004
    title: Identify/Select Delivery Mechanism
    description: |-
      Threat actors may identify, select, and prepare a delivery mechanism in which to attack the space system (i.e., communicate with the victim spacecraft, deny the ground, etc.) to achieve their desired impact. This mechanism may be located on infrastructure that was previously purchased or rented by the threat actor or was otherwise compromised by them. The mechanism must include all aspects needed to communicate with the victim spacecraft, including ground antenna, converters, and amplifiers.
    aliases:
      - "RD-0004.01"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0004/01/
    annotations:
      attack-id: "RD-0004.01"
    exact_mappings:
      - attack:RD-0004.01

  RD_0004_02:
    class_uri: d3f:RD-0004.02
    is_a: RD_0004
    title: Upload Exploit/Payload
    description: |-
      Threat actors may upload exploits and payloads to a third-party infrastructure that they have purchased or rented or stage it on an otherwise compromised ground station. Exploits and payloads would include files and commands to be uploaded to the victim spacecraft in order to conduct the threat actor's attack.
    aliases:
      - "RD-0004.02"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0004/02/
    annotations:
      attack-id: "RD-0004.02"
    exact_mappings:
      - attack:RD-0004.02

  RD_0005:
    class_uri: d3f:RD-0005
    is_a: SPARTAResourceDevelopmentTechnique
    title: Obtain Non-Cyber Capabilities
    description: |-
      Threat actors may obtain non-cyber capabilities, primarily physical counterspace weapons or systems. These counterspace capabilities vary significantly in the types of effects they create, the level of technological sophistication required, and the level of resources needed to develop and deploy them. These diverse capabilities also differ in how they are employed and how easy they are to detect and attribute and the permanence of the effects they have on their target.*

      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101
    aliases:
      - "RD-0005"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0005/
    annotations:
      attack-id: "RD-0005"
    exact_mappings:
      - attack:RD-0005

  RD_0005_01:
    class_uri: d3f:RD-0005.01
    is_a: RD_0005
    title: Launch Services
    description: |-
      Threat actors may acquire launch capabilities through their own development or through space launch service providers (companies or organizations that specialize in launching payloads into space). Space launch service providers typically offer a range of services, including launch vehicle design, development, and manufacturing as well as payload integration and testing. These services are critical to the success of any space mission and require specialized expertise, advanced technology, and extensive infrastructure.
    aliases:
      - "RD-0005.01"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0005/01/
    annotations:
      attack-id: "RD-0005.01"
    exact_mappings:
      - attack:RD-0005.01

  RD_0005_02:
    class_uri: d3f:RD-0005.02
    is_a: RD_0005
    title: Non-Kinetic Physical ASAT
    description: |-
      A non-kinetic physical ASAT attack is when a satellite is physically damaged without any direct contact. Non-kinetic physical attacks can be characterized into a few types: electromagnetic pulses, high-powered lasers, and high-powered microwaves. These attacks have medium possible attribution levels and often provide little evidence of success to the attacker.*

      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101
    aliases:
      - "RD-0005.02"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0005/02/
    annotations:
      attack-id: "RD-0005.02"
    exact_mappings:
      - attack:RD-0005.02

  RD_0005_03:
    class_uri: d3f:RD-0005.03
    is_a: RD_0005
    title: Kinetic Physical ASAT
    description: |-
      Kinetic physical ASAT attacks attempt to damage or destroy space- or land-based space assets. They typically are organized into three categories: direct-ascent, co-orbital, and ground station attacks. The nature of these attacks makes them easier to attribute and allow for better confirmation of success on the part of the attacker. *

      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101
    aliases:
      - "RD-0005.03"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0005/03/
    annotations:
      attack-id: "RD-0005.03"
    exact_mappings:
      - attack:RD-0005.03

  RD_0005_04:
    class_uri: d3f:RD-0005.04
    is_a: RD_0005
    title: Electronic ASAT
    description: |-
      Rather than attempting to damage the physical components of space systems, electronic ASAT attacks target the means by which space systems transmit and receive data. Both jamming and spoofing are forms of electronic attack that can be difficult to attribute and only have temporary effects.*

      *https://aerospace.csis.org/aerospace101/counterspace-weapons-101
    aliases:
      - "RD-0005.04"
    see_also:
      - https://sparta.aerospace.org/technique/RD-0005/04/
    annotations:
      attack-id: "RD-0005.04"
    exact_mappings:
      - attack:RD-0005.04

  RDPConnectRequestEvent:
    class_uri: d3f:RDPConnectRequestEvent
    is_a: RDPEvent
    title: RDP Connect Request Event
    description: |-
      An event where an RDP client sends a connection request specifying session parameters, such as display settings, compression preferences, and security requirements, to prepare for an interactive session.

  RDPConnectResponseEvent:
    class_uri: d3f:RDPConnectResponseEvent
    is_a: RDPEvent
    title: RDP Connect Response Event
    description: |-
      An event where an RDP server acknowledges a connection request, finalizing session parameters and confirming the transition to an interactive remote session.

  RDPEvent:
    class_uri: d3f:RDPEvent
    is_a: ApplicationLayerEvent
    title: RDP Event
    description: |-
      An event involving the Remote Desktop Protocol (RDP), a communication protocol developed by Microsoft that facilitates secure remote access to graphical interfaces on desktops or applications hosted on remote servers. RDP supports multi-channel communication for transferring input, output, and management commands.
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/rdp_activity
      - https://schema.ocsf.io/classes/rdp_activity

  RDPInitialRequestEvent:
    class_uri: d3f:RDPInitialRequestEvent
    is_a: RDPEvent
    title: RDP Initial Request Event
    description: |-
      An event where an RDP client initiates communication with a server by sending a request to establish a session and negotiate protocol capabilities for remote interaction.

  RDPInitialResponseEvent:
    class_uri: d3f:RDPInitialResponseEvent
    is_a: RDPEvent
    title: RDP Initial Response Event
    description: |-
      An event where an RDP server responds to an initial request from a client, presenting its supported capabilities and agreeing to proceed with session negotiation.

  RDPSession:
    class_uri: d3f:RDPSession
    is_a: RemoteSession
    title: RDP Session
    description: |-
      A Remote Desktop Protocol (RDP) session is a session established using the RDP protocol to access Remove Desktop Services (RDS).
    aliases:
      - "Remote Desktop Session"
      - "Terminal Services"
    see_also:
      - http://dbpedia.org/resource/Remote_Desktop_Protocol
      - http://dbpedia.org/resource/Remote_Desktop_Services
    annotations:
      owl_named_individual: "true"

  RDPTLSHandshakeEvent:
    class_uri: d3f:RDPTLSHandshakeEvent
    is_a: RDPEvent
    title: RDP TLS Handshake Event
    description: |-
      An event representing the cryptographic exchange of keys and certificates between an RDP client and server to establish a secure communication channel. The handshake ensures encryption, integrity, and authentication for the session.

  REC_0001:
    class_uri: d3f:REC-0001
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Spacecraft Design Information
    description: |-
      Threat actors may gather information about the victim spacecraft's design that can be used for future campaigns or to help perpetuate other techniques. Information about the spacecraft can include software, firmware, encryption type, purpose, as well as various makes and models of subsystems.
    aliases:
      - "REC-0001"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/
    annotations:
      attack-id: "REC-0001"
    exact_mappings:
      - attack:REC-0001

  REC_0001_01:
    class_uri: d3f:REC-0001.01
    is_a: REC_0001
    title: Software Design
    description: |-
      Threat actors may gather information about the victim spacecraft's internal software that can be used for future campaigns or to help perpetuate other techniques. Information (e.g. source code, binaries, etc.) about commercial, open-source, or custom developed software may include a variety of details such as types, versions, and memory maps. Leveraging this information threat actors may target vendors of operating systems, flight software, or open-source communities to embed backdoors or for performing reverse engineering research to support offensive cyber operations.
    aliases:
      - "REC-0001.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/01/
    annotations:
      attack-id: "REC-0001.01"
    exact_mappings:
      - attack:REC-0001.01

  REC_0001_02:
    class_uri: d3f:REC-0001.02
    is_a: REC_0001
    title: Firmware
    description: |-
      Threat actors may gather information about the victim spacecraft's firmware that can be used for future campaigns or to help perpetuate other techniques. Information about the firmware may include a variety of details such as type and versions on specific devices, which may be used to infer more information (ex. configuration, purpose, age/patch level, etc.). Leveraging this information threat actors may target firmware vendors to embed backdoors or for performing reverse engineering research to support offensive cyber operations.
    aliases:
      - "REC-0001.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/02/
    annotations:
      attack-id: "REC-0001.02"
    exact_mappings:
      - attack:REC-0001.02

  REC_0001_03:
    class_uri: d3f:REC-0001.03
    is_a: REC_0001
    title: Cryptographic Algorithms
    description: |-
      Threat actors may gather information about any cryptographic algorithms used on the victim spacecraft's that can be used for future campaigns or to help perpetuate other techniques. Information about the algorithms can include type and private keys. Threat actors may also obtain the authentication scheme (i.e., key/password/counter values) and leverage it to establish communications for commanding the target spacecraft or any of its subsystems. Some spacecraft only require authentication vice authentication and encryption, therefore once obtained, threat actors may use any number of means to command the spacecraft without needing to go through a legitimate channel. The authentication information may be obtained through reconnaissance of the ground system or retrieved from the victim spacecraft.
    aliases:
      - "REC-0001.03"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/03/
    annotations:
      attack-id: "REC-0001.03"
    exact_mappings:
      - attack:REC-0001.03

  REC_0001_04:
    class_uri: d3f:REC-0001.04
    is_a: REC_0001
    title: Data Bus
    description: |-
      Threat actors may gather information about the data bus used within the victim spacecraft that can be used for future campaigns or to help perpetuate other techniques. Information about the data bus can include the make and model which could lead to more information (ex. protocol, purpose, controller, etc.), as well as locations/addresses of major subsystems residing on the bus.

      Threat actors may also gather information about the bus voltages of the victim spacecraft. This information can include optimal power levels, connectors, range, and transfer rate.
    aliases:
      - "REC-0001.04"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/04/
    annotations:
      attack-id: "REC-0001.04"
    exact_mappings:
      - attack:REC-0001.04

  REC_0001_05:
    class_uri: d3f:REC-0001.05
    is_a: REC_0001
    title: Thermal Control System
    description: |-
      Threat actors may gather information about the thermal control system used with the victim spacecraft that can be used for future campaigns or to help perpetuate other techniques. Information gathered can include type, make/model, and varies analysis programs that monitor it.
    aliases:
      - "REC-0001.05"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/05/
    annotations:
      attack-id: "REC-0001.05"
    exact_mappings:
      - attack:REC-0001.05

  REC_0001_06:
    class_uri: d3f:REC-0001.06
    is_a: REC_0001
    title: "Maneuver & Control"
    description: |-
      Threat actors may gather information about the station-keeping control systems within the victim spacecraft that can be used for future campaigns or to help perpetuate other techniques. Information gathered can include thruster types, propulsion types, attitude sensors, and data flows associated with the relevant subsystems.
    aliases:
      - "REC-0001.06"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/06/
    annotations:
      attack-id: "REC-0001.06"
    exact_mappings:
      - attack:REC-0001.06

  REC_0001_07:
    class_uri: d3f:REC-0001.07
    is_a: REC_0001
    title: Payload
    description: |-
      Threat actors may gather information about the type(s) of payloads hosted on the victim spacecraft. This information could include specific commands, make and model, and relevant software. Threat actors may also gather information about the location of the payload on the bus and internal routing as it pertains to commands within the payload itself.
    aliases:
      - "REC-0001.07"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/07/
    annotations:
      attack-id: "REC-0001.07"
    exact_mappings:
      - attack:REC-0001.07

  REC_0001_08:
    class_uri: d3f:REC-0001.08
    is_a: REC_0001
    title: Power
    description: |-
      Threat actors may gather information about the power system used within the victim spacecraft. This information can include type, power intake, and internal algorithms. Threat actors may also gather information about the solar panel configurations such as positioning, automated tasks, and layout. Additionally, threat actors may gather information about the batteries used within the victim spacecraft. This information can include the type, quantity, storage capacity, make and model, and location.
    aliases:
      - "REC-0001.08"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/08/
    annotations:
      attack-id: "REC-0001.08"
    exact_mappings:
      - attack:REC-0001.08

  REC_0001_09:
    class_uri: d3f:REC-0001.09
    is_a: REC_0001
    title: Fault Management
    description: |-
      Threat actors may gather information about any fault management that may be present on the victim spacecraft. This information can help threat actors construct specific attacks that may put the spacecraft into a fault condition and potentially a more vulnerable state depending on the fault response.
    aliases:
      - "REC-0001.09"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0001/09/
    annotations:
      attack-id: "REC-0001.09"
    exact_mappings:
      - attack:REC-0001.09

  REC_0002:
    class_uri: d3f:REC-0002
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Spacecraft Descriptors
    description: |-
      Threat actors may gather information about the victim spacecraft's descriptors that can be used for future campaigns or to help perpetuate other techniques. Information about the descriptors may include a variety of details such as identity attributes, organizational structures, and mission operational parameters.
    aliases:
      - "REC-0002"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0002/
    annotations:
      attack-id: "REC-0002"
    exact_mappings:
      - attack:REC-0002

  REC_0002_01:
    class_uri: d3f:REC-0002.01
    is_a: REC_0002
    title: Identifiers
    description: |-
      Threat actors may gather information about the victim spacecraft's identity attributes that can be used for future campaigns or to help perpetuate other techniques. Information may include a variety of details such as the satellite catalog number, international designator, mission name, and more.
    aliases:
      - "REC-0002.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0002/01/
    annotations:
      attack-id: "REC-0002.01"
    exact_mappings:
      - attack:REC-0002.01

  REC_0002_02:
    class_uri: d3f:REC-0002.02
    is_a: REC_0002
    title: Organization
    description: |-
      Threat actors may gather information about the victim spacecraft's associated organization(s) that can be used for future campaigns or to help perpetuate other techniques. Collection efforts may target the mission owner/operator in order to conduct further attacks against the organization, individual, or other interested parties. Threat actors may also seek information regarding the spacecraft's designer/builder, including physical locations, key employees, and roles and responsibilities as they pertain to the spacecraft, as well as information pertaining to the mission's end users/customers.
    aliases:
      - "REC-0002.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0002/02/
    annotations:
      attack-id: "REC-0002.02"
    exact_mappings:
      - attack:REC-0002.02

  REC_0002_03:
    class_uri: d3f:REC-0002.03
    is_a: REC_0002
    title: Operations
    description: |-
      Threat actors may gather information about the victim spacecraft's operations that can be used for future campaigns or to help perpetuate other techniques. Collection efforts may target mission objectives, orbital parameters such as orbit slot and inclination, user guides and schedules, etc. Additionally, threat actors may seek information about constellation deployments and configurations where applicable.
    aliases:
      - "REC-0002.03"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0002/03/
    annotations:
      attack-id: "REC-0002.03"
    exact_mappings:
      - attack:REC-0002.03

  REC_0003:
    class_uri: d3f:REC-0003
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Spacecraft Communications Information
    description: |-
      Threat actors may obtain information on the victim spacecraft's communication channels in order to determine specific commands, protocols, and types. Information gathered can include commanding patterns, antenna shape and location, beacon frequency and polarization, and various transponder information.
    aliases:
      - "REC-0003"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0003/
    annotations:
      attack-id: "REC-0003"
    exact_mappings:
      - attack:REC-0003

  REC_0003_01:
    class_uri: d3f:REC-0003.01
    is_a: REC_0003
    title: Communications Equipment
    description: |-
      Threat actors may gather information regarding the communications equipment and its configuration that will be used for communicating with the victim spacecraft. This includes:

      Antenna Shape: This information can help determine the range in which it can communicate, the power of it's transmission, and the receiving patterns.

      Antenna Configuration/Location:	This information can include positioning, transmission frequency, wavelength, and timing.

      Telemetry Signal Type: Information can include timing, radio frequency wavelengths, and other information that can provide insight into the spacecraft's telemetry system.

      Beacon Frequency: This information can provide insight into where the spacecrafts located, what it's orbit is, and how long it can take to communicate with a ground station.

      Beacon Polarization: This information can help triangulate the spacecrafts it orbits the earth and determine how a satellite must be oriented in order to communicate with the victim spacecraft.

      Transponder: This could include the number of transponders per band, transponder translation factor, transponder mappings, power utilization, and/or saturation point.
    aliases:
      - "REC-0003.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0003/01/
    annotations:
      attack-id: "REC-0003.01"
    exact_mappings:
      - attack:REC-0003.01

  REC_0003_02:
    class_uri: d3f:REC-0003.02
    is_a: REC_0003
    title: Commanding Details
    description: |-
      Threat actors may gather information regarding the commanding approach that will be used for communicating with the victim spacecraft. This includes:

      Commanding Signal Type: This can include timing, radio frequency wavelengths, and other information that can provide insight into the spacecraft's commanding system.

      Valid Commanding Patterns: Most commonly, this comes in the form of a command database, but can also include other means that provide information on valid commands and the communication protocols used by the victim spacecraft.

      Valid Commanding Periods: This information can provide insight into when a command will be accepted by the spacecraft and help the threat actor construct a viable attack campaign.
    aliases:
      - "REC-0003.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0003/02/
    annotations:
      attack-id: "REC-0003.02"
    exact_mappings:
      - attack:REC-0003.02

  REC_0003_03:
    class_uri: d3f:REC-0003.03
    is_a: REC_0003
    title: Mission-Specific Channel Scanning
    description: |-
      Threat actors may seek knowledge about mission-specific  communication channels dedicated to a payload. Such channels could be managed by a different organization than the owner of the spacecraft itself.
    aliases:
      - "REC-0003.03"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0003/03/
    annotations:
      attack-id: "REC-0003.03"
    exact_mappings:
      - attack:REC-0003.03

  REC_0003_04:
    class_uri: d3f:REC-0003.04
    is_a: REC_0003
    title: Valid Credentials
    description: |-
      Threat actors may seek out valid credentials which can be utilized to facilitate several tactics throughout an attack. Credentials may include, but are not limited to: system service accounts, user accounts, maintenance accounts, cryptographic keys and other authentication mechanisms.
    aliases:
      - "REC-0003.04"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0003/04/
    annotations:
      attack-id: "REC-0003.04"
    exact_mappings:
      - attack:REC-0003.04

  REC_0004:
    class_uri: d3f:REC-0004
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Launch Information
    description: |-
      Threat actors may gather the launch date and time, location of the launch (country & specific site), organizations involved, launch vehicle, etc. This information can provide insight into protocols, regulations, and provide further targets for the threat actor, including specific vulnerabilities with the launch vehicle itself.
    aliases:
      - "REC-0004"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0004/
    annotations:
      attack-id: "REC-0004"
    exact_mappings:
      - attack:REC-0004

  REC_0004_01:
    class_uri: d3f:REC-0004.01
    is_a: REC_0004
    title: Flight Termination
    description: |-
      Threat actor may obtain information regarding the vehicle's flight termination system. Threat actors may use this information to perform later attacks and target the vehicle's termination system to have desired impact on mission.
    aliases:
      - "REC-0004.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0004/01/
    annotations:
      attack-id: "REC-0004.01"
    exact_mappings:
      - attack:REC-0004.01

  REC_0005:
    class_uri: d3f:REC-0005
    is_a: SPARTAReconnaissanceTechnique
    title: Eavesdropping
    description: |-
      Threat actors may seek to capture network communications throughout the ground station and radio frequency (RF) communication used for uplink and downlink communications. RF communication frequencies vary between 30MHz and 60 GHz. Threat actors may capture RF communications using specialized hardware, such as software defined radio (SDR), handheld radio, or a computer with radio demodulator turned to the communication frequency. Network communications may be captured using packet capture software while the threat actor is on the target network.
    aliases:
      - "REC-0005"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0005/
    annotations:
      attack-id: "REC-0005"
    exact_mappings:
      - attack:REC-0005

  REC_0005_01:
    class_uri: d3f:REC-0005.01
    is_a: REC_0005
    title: Uplink Intercept Eavesdropping
    description: |-
      Threat actors may capture the RF communications as it pertains to the uplink to the victim spacecraft. This information can contain commanding information that the threat actor can use to perform other attacks against the victim spacecraft.
    aliases:
      - "REC-0005.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0005/01/
    annotations:
      attack-id: "REC-0005.01"
    exact_mappings:
      - attack:REC-0005.01

  REC_0005_02:
    class_uri: d3f:REC-0005.02
    is_a: REC_0005
    title: Downlink Intercept
    description: |-
      Threat actors may capture the RF communications as it pertains to the downlink of the victim spacecraft. This information can contain important telemetry such as onboard status and mission data.
    aliases:
      - "REC-0005.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0005/02/
    annotations:
      attack-id: "REC-0005.02"
    exact_mappings:
      - attack:REC-0005.02

  REC_0005_03:
    class_uri: d3f:REC-0005.03
    is_a: REC_0005
    title: Proximity Operations
    description: |-
      Threat actors may capture signals and/or network communications as they travel on-board the vehicle (i.e., EMSEC/TEMPEST), via RF, or terrestrial networks. This information can be decoded to determine commanding and telemetry protocols, command times, and other information that could be used for future attacks.
    aliases:
      - "REC-0005.03"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0005/03/
    annotations:
      attack-id: "REC-0005.03"
    exact_mappings:
      - attack:REC-0005.03

  REC_0005_04:
    class_uri: d3f:REC-0005.04
    is_a: REC_0005
    title: Active Scanning (RF/Optical)
    description: |-
      Threat actors may interfere with the link by actively transmitting packets to activate the transmitter and induce a reply. The scan can be similar to a brute force attack, aiming to guess the used frequencies and protocols to obtain a reply.
    aliases:
      - "REC-0005.04"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0005/04/
    annotations:
      attack-id: "REC-0005.04"
    exact_mappings:
      - attack:REC-0005.04

  REC_0006:
    class_uri: d3f:REC-0006
    is_a: SPARTAReconnaissanceTechnique
    title: Gather FSW Development Information
    description: |-
      Threat actors may obtain information regarding the flight software (FSW) development environment for the victim spacecraft. This information may include the development environment, source code, compiled binaries, testing tools, and fault management.
    aliases:
      - "REC-0006"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0006/
    annotations:
      attack-id: "REC-0006"
    exact_mappings:
      - attack:REC-0006

  REC_0006_01:
    class_uri: d3f:REC-0006.01
    is_a: REC_0006
    title: Development Environment
    description: |-
      Threat actors may gather information regarding the development environment for the victim spacecraft's FSW. This information can include IDEs, configurations, source code, environment variables, source code repositories, code "secrets", and compiled binaries.
    aliases:
      - "REC-0006.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0006/01/
    annotations:
      attack-id: "REC-0006.01"
    exact_mappings:
      - attack:REC-0006.01

  REC_0006_02:
    class_uri: d3f:REC-0006.02
    is_a: REC_0006
    title: Security Testing Tools
    description: |-
      Threat actors may gather information regarding how a victim spacecraft is tested in regards to the FSW. Understanding the testing approach including tools could identify gaps and vulnerabilities that could be discovered and exploited by a threat actor.
    aliases:
      - "REC-0006.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0006/02/
    annotations:
      attack-id: "REC-0006.02"
    exact_mappings:
      - attack:REC-0006.02

  REC_0007:
    class_uri: d3f:REC-0007
    is_a: SPARTAReconnaissanceTechnique
    title: Monitor for Safe-Mode Indicators
    description: |-
      Threat actors may gather information regarding safe-mode indicators on the victim spacecraft. Safe-mode is when all non-essential systems are shut down and only essential functions within the spacecraft are active. During this mode, several commands are available to be processed that are not normally processed. Further, many protections may be disabled at this time.
    aliases:
      - "REC-0007"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0007/
    annotations:
      attack-id: "REC-0007"
    exact_mappings:
      - attack:REC-0007

  REC_0008:
    class_uri: d3f:REC-0008
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Supply Chain Information
    description: |-
      Threat actors may gather information about a mission's supply chain or product delivery mechanisms that can be used for future campaigns or to help perpetuate other techniques.
    aliases:
      - "REC-0008"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0008/
    annotations:
      attack-id: "REC-0008"
    exact_mappings:
      - attack:REC-0008

  REC_0008_01:
    class_uri: d3f:REC-0008.01
    is_a: REC_0008
    title: Hardware Recon
    description: |-
      Threat actors may gather information that can be used to facilitate a future attack where they manipulate hardware components in the victim spacecraft prior to the customer receiving them in order to achieve data or system compromise. The threat actor can insert backdoors and give them a high level of control over the system when they modify the hardware or firmware in the supply chain. This would include ASIC and FPGA devices as well.
    aliases:
      - "REC-0008.01"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0008/01/
    annotations:
      attack-id: "REC-0008.01"
    exact_mappings:
      - attack:REC-0008.01

  REC_0008_02:
    class_uri: d3f:REC-0008.02
    is_a: REC_0008
    title: Software Recon
    description: |-
      Threat actors may gather information relating to the mission's software supply chain in order to facilitate future attacks to achieve data or system compromise. This attack can take place in a number of ways, including manipulation of source code, manipulation of the update and/or distribution mechanism, or replacing compiled versions with a malicious one.
    aliases:
      - "REC-0008.02"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0008/02/
    annotations:
      attack-id: "REC-0008.02"
    exact_mappings:
      - attack:REC-0008.02

  REC_0008_03:
    class_uri: d3f:REC-0008.03
    is_a: REC_0008
    title: Known Vulnerabilities
    description: |-
      Threat actors may gather information about vulnerabilities that can be used for future campaigns or to perpetuate other techniques. A vulnerability is a weakness in the victim spacecraft's hardware, subsystems, bus, or software that can, potentially, be exploited by a threat actor to cause unintended or unanticipated behavior to occur.  During reconnaissance as threat actors identify the types/versions of software (i.e., COTS, open-source) being used, they will look for well-known vulnerabilities that could affect the spacecraft. Threat actors may find vulnerability information by searching leaked documents, vulnerability databases/scanners, compromising ground systems, and searching through online databases.
    aliases:
      - "REC-0008.03"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0008/03/
    annotations:
      attack-id: "REC-0008.03"
    exact_mappings:
      - attack:REC-0008.03

  REC_0008_04:
    class_uri: d3f:REC-0008.04
    is_a: REC_0008
    title: Business Relationships
    description: |-
      Adversaries may gather information about the victim's business relationships that can be used during targeting. Information about an mission’s business relationships may include a variety of details, including second or third-party organizations/domains (ex: managed service providers, contractors/sub-contractors, etc.) that have connected (and potentially elevated) network access or sensitive information. This information may also reveal supply chains and shipment paths for the victim’s hardware and software resources.
    aliases:
      - "REC-0008.04"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0008/04/
    annotations:
      attack-id: "REC-0008.04"
    exact_mappings:
      - attack:REC-0008.04

  REC_0009:
    class_uri: d3f:REC-0009
    is_a: SPARTAReconnaissanceTechnique
    title: Gather Mission Information
    description: |-
      Threat actors may initially seek to gain an understanding of a target mission by gathering information commonly captured in a Concept of Operations (or similar) document and related artifacts. Information of interest includes, but is not limited to:
      	- the needs, goals, and objectives of the system
      	- system overview and key elements/instruments
      	- modes of operations (including operational constraints)
      	- proposed capabilities and the underlying science/technology used to provide capabilities (i.e., scientific papers, research studies, etc.)
      	- physical and support environments
    aliases:
      - "REC-0009"
    see_also:
      - https://sparta.aerospace.org/technique/REC-0009/
    annotations:
      attack-id: "REC-0009"
    exact_mappings:
      - attack:REC-0009

  RFShielding:
    class_uri: d3f:RFShielding
    is_a: PlatformHardening
    mixins:
      - ElectromagneticRadiationHardening
    title: RF Shielding
    description: Adding physical barriers to a platform to prevent undesired radio interference.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-RFS"

  ROM:
    class_uri: d3f:ROM
    is_a: PrimaryStorage
    description: |-
      Read-only memory (ROM) is a type of non-volatile memory used in computers and other electronic devices. Data stored in ROM cannot be electronically modified after the manufacture of the memory device. Read-only memory is useful for storing software that is rarely changed during the life of the system, also known as firmware.
    see_also:
      - https://dbpedia.org/page/Read-only_memory
    annotations:
      synonym: "Read-only Memory"

  RPCNetworkTraffic:
    class_uri: d3f:RPCNetworkTraffic
    is_a: NetworkTraffic
    title: RPC Network Traffic
    description: |-
      RPC network traffic is network traffic related to remote procedure calls between network nodes..This includes only network traffic conforming to a standard RPC protocol; not custom protocols.
    annotations:
      owl_named_individual: "true"

  RPCTrafficAnalysis:
    class_uri: d3f:RPCTrafficAnalysis
    is_a: NetworkTrafficAnalysis
    title: RPC Traffic Analysis
    description: |-
      Monitoring the activity of remote procedure calls in communication traffic to establish standard protocol operations and potential attacker activities.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-RTA"
      synonym: "RPC Protocol Analysis"
      kb-article: "## How it works A remote procedure call (RPC) enables one computer to execute a specific function on another computer, as if it were a local application process. There are numerous RPC specifications and implementations. RPC capabilities can be abused by attackers in order to achieve a variety of ta"
    related_mappings:
      - attack:T1558.003
    broad_mappings:
      - d3f:T1558

  RTCUpdateEvent:
    class_uri: d3f:RTCUpdateEvent
    is_a: HardwareClockEvent
    title: RTC Update Event
    description: "An event in which a Real-Time Clock's stored time value is read from or written to its battery-backed storage."

  RTSPServer:
    class_uri: d3f:RTSPServer
    is_a: NetworkAudioVisualStreamingResource
    title: RTSP Server
    description: A streaming server that utilizes the real-time streaming protocol.

  RadiationHardening:
    class_uri: d3f:RadiationHardening
    is_a: PlatformHardening
    title: Radiation Hardening
    description: |-
      Radiation hardening is the process of making electronic components and circuits resistant to damage or malfunction caused by high levels of ionizing radiation.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-RH"
      kb-article: "## How it works There are three core radiation hardening methodologies: 1. Radiation Hardening by Process (RHBP): modifying the physical fabrication of a semiconductor (e.g., using SOI - Silicon on Insulator), offering the highest intrinsic protection. Usually the most expensive option as it requi"

  RadioModem:
    class_uri: d3f:RadioModem
    is_a: Modem
    title: Radio Modem
    description: |-
      A radio modem provides the means to send digital data wirelessly.  Radio modems are used to communicate by direct broadcast satellite, WiFi, WiMax, mobile phones, GPS, Bluetooth and NFC. Modern telecommunications and data networks also make extensive use of radio modems where long distance data links are required. Such systems are an important part of the PSTN, and are also in common use for high-speed computer network links to outlying areas where fiber optic is not economical.
    see_also:
      - http://dbpedia.org/resource/Modem#Radio

  RandomForest:
    class_uri: d3f:RandomForest
    is_a: BootstrapAggregating
    title: Random Forest
    description: |-
      Random Forest is a ML method that combines several other ML methods. At its core, Random Forest is an ensemble method of multiple bootstrapped decision trees filled with training data and random feature selection.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-RF"
      kb-article: "## References Random forest. Wikipedia. [Link](https://en.wikipedia.org/wiki/Random_forest)."

  RandomSplits:
    class_uri: d3f:RandomSplits
    is_a: ResamplingEnsemble
    title: Random Splits
    description: The dataset is repeatedly sampled with a random split of the data into train and test sets.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-RS"
      kb-article: "## References How to Create a Random Split Cross-Validation and Bagging Ensemble for Deep Learning in Keras.\"*Machine Learning Mastery*. [Link](https://machinelearningmastery.com/how-to-create-a-random-split-cross-validation-and-bagging-ensemble-for-deep-learning-in-keras/)."

  Range:
    class_uri: d3f:Range
    is_a: Variability
    description: The range of a set of data is the difference between the largest and smallest value.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-RAN"
      kb-article: "## References Wikipedia. (n.d.). Range (statistics). [Link](https://en.wikipedia.org/wiki/Range_(statistics))"

  RangeMatching:
    class_uri: d3f:RangeMatching
    is_a: NumericPatternMatching
    title: Range Matching
    description: "Numeric Range Matching determines if a value lies with an interval of values (i.e., within the range of values.)"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-RM"

  RankCorrelationCoefficient:
    class_uri: d3f:RankCorrelationCoefficient
    is_a: Correlation
    title: Rank Correlation
    description: |-
      A rank correlation is any of several statistics that measure an ordinal association-the relationship between rankings of different ordinal variables or different rankings of the same variable, where a "ranking" is the assignment of the ordering labels "first", "second", "third", etc. to different observations of a particular variable.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-RC"
      kb-article: "Wikipedia. (n.d.). Rank correlation. [Link](https://en.wikipedia.org/wiki/Rank_correlation)"

  RawMemoryAccessFunction:
    class_uri: d3f:RawMemoryAccessFunction
    is_a: Subroutine
    title: Raw Memory Access Function
    description: "A function which accesses raw memory, usually using memory addresses."
    annotations:
      owl_named_individual: "true"

  ReadFile:
    class_uri: d3f:ReadFile
    is_a: SystemCall
    title: Read File
    description: |-
      A program that needs to access data from a file stored in a file system uses the read system call. The file is identified by a file descriptor that is normally obtained from a previous call to open. This system call reads in data in bytes, the number of which is specified by the caller, from the file and stores then into a buffer supplied by the calling process.
    see_also:
      - http://dbpedia.org/resource/Read_(system_call)
    annotations:
      owl_named_individual: "true"

  ReadMemory:
    class_uri: d3f:ReadMemory
    is_a: SystemCall
    title: Read Memory
    annotations:
      owl_named_individual: "true"

  Real_timeOperatingSystem:
    class_uri: d3f:Real-timeOperatingSystem
    is_a: OperatingSystem
    title: Real-time operating system
    description: |-
      A real-time operating system (RTOS) is an operating system (OS) for real-time computing applications that processes data and events that have critically defined time constraints.
    aliases:
      - "Real-timeOperatingSystem"
    see_also:
      - https://dbpedia.org/resource/Real-time_operating_system
    annotations:
      synonym: "RTOS"

  RealtimeClock:
    class_uri: d3f:RealtimeClock
    is_a: HardwareClock
    title: Real-time Clock
    description: |-
      A real-time clock (RTC) is an electronic device (most often in the form of an integrated circuit) that measures the passage of time.
    see_also:
      - https://dbpedia.org/resource/Real-time_clock
    annotations:
      synonym: "RTC"

  Receiver:
    class_uri: d3f:Receiver
    is_a: HardwareDevice
    description: |-
      A receiver is a device or system that acquires signals and converts them into usable information. It senses a physical carrier (such as electromagnetic fields, light, electrical currents, or acoustic waves), conditions the input, and extracts the intended content through operations like filtering, amplification, detection, synchronization, demodulation, decoding, and error correction. A receiver may be analog or digital, implemented in hardware, software, or both, and is designed to mitigate impairments such as noise, interference, and distortion while delivering recovered data or media to downstream processes.
    see_also:
