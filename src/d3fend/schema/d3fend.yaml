    aliases:
      - "C4.5"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-C4."
      kb-article: "## References C4.5 algorithm. Wikipedia. [Link](https://en.wikipedia.org/wiki/C4.5_algorithm)."

  C5_0:
    class_uri: d3f:C5.0
    is_a: DecisionTree
    description: |-
      C5.0 is the next version of C4.5, which in turn is the upgrade from ID3. The only difference between C5.0 and C4.5 is some improvements made to C5.0.
    aliases:
      - "C5.0"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-C5."
      kb-article: "## References C4.5 algorithm. Wikipedia. [Link](https://en.wikipedia.org/wiki/C4.5_algorithm)."

