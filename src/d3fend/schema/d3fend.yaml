  CoefficientOfVariation:
    class_uri: d3f:CoefficientOfVariation
    is_a: Variability
    title: Coefficient of Variation
    description: |-
      The coefficient of variation (CV), also known as relative standard deviation (RSD), is a standardized measure of dispersion of a probability distribution or frequency distribution.

      The coefficient of variation (CV) is defined as the ratio of the standard deviation to the mean .
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-COV"
      synonym: "RSD"
      kb-article: "## References Wikipedia. (n.d.). Coefficient of variation. [Link](https://en.wikipedia.org/wiki/Coefficient_of_variation)"

  CollaborativeSoftware:
    class_uri: d3f:CollaborativeSoftware
    is_a: UserApplication
    title: Collaborative Software
    description: |-
      Collaborative software or groupware is application software designed to help people working on a common task to attain their goals. One of the earliest definitions of groupware is "intentional group processes plus software to support them". Collaborative software is a broad concept that overlaps considerably with computer-supported cooperative work (CSCW). According to Carstensen and Schmidt (1999) groupware is part of CSCW. The authors claim that CSCW, and thereby groupware, addresses "how collaborative activities and their coordination can be supported by means of computer systems."
    see_also:
      - http://dbpedia.org/resource/Collaborative_software

  CollectionTechnique:
    class_uri: d3f:CollectionTechnique
    is_a: ATTACKEnterpriseTechnique
    mixins:
      - OffensiveTechnique
    title: Collection Technique
    description: The adversary is trying to gather data of interest to their goal.
    annotations:
      owl_named_individual: "true"

  CombinationLock:
    class_uri: d3f:CombinationLock
    is_a: PhysicalLock
    title: Combination Lock
    description: |-
      A combination lock is a type of locking device in which a sequence of symbols, usually numbers, is used to open the lock.
    see_also:
      - https://dbpedia.org/resource/Combination_lock

  Command:
    class_uri: d3f:Command
    is_a: DigitalInformation
    description: |-
      A directive (i.e., an instruction specifying a procedure) which, when issued to a computer system, software, or hardware component, causes that entity to execute a specific action, operation, or computation.
    see_also:
      - http://dbpedia.org/resource/Command_(computing)

  CommandAndControlTechnique:
    class_uri: d3f:CommandAndControlTechnique
    is_a: ATTACKEnterpriseTechnique
    mixins:
      - OffensiveTechnique
    title: Command and Control Technique
    description: The adversary is trying to communicate with compromised systems to control them.
    annotations:
      owl_named_individual: "true"

  CommandHistoryLog:
    class_uri: d3f:CommandHistoryLog
    is_a: EventLog
    title: Command History Log
    description: A log of commands run in an operating system shell.
    see_also:
      - http://d3fend.mitre.org/ontologies/d3fend.owl#CommandLineInterface
      - http://dbpedia.org/resource/Command_history
    annotations:
      owl_named_individual: "true"

  CommandHistoryLogFile:
    class_uri: d3f:CommandHistoryLogFile
    is_a: LogFile
    title: Command History Log File
    description: |-
      A command history log file is a file containing a command history, which the history of commands run in an operating system shell.
    see_also:
      - http://dbpedia.org/resource/Command_history
    annotations:
      owl_named_individual: "true"

  CommandLineInterface:
    class_uri: d3f:CommandLineInterface
    is_a: UserInterface
    title: Command Line Interface
    description: |-
      A command-line interface or command language interpreter (CLI), also known as command-line user interface, console user interface, and character user interface (CUI), is a means of interacting with a computer program where the user (or client) issues commands to the program in the form of successive lines of text (command lines). Command-line interfaces to computer operating systems are less widely used by casual computer users, who favor graphical user interfaces. Programs with command-line interfaces are generally easier to automate via scripting.
    aliases:
      - "CLI"
      - "CUI"
      - "Command-line Interface"
    see_also:
      - http://dbpedia.org/resource/Command-line_interface

