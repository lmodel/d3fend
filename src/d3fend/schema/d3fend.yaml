      d3fend-id: "D3-OVAR"
      synonym: "OT Variable Access Policy"
      kb-article: "## How it works Many OT Controllers and OT Communication Modules enable Read-Only or Read/Write access on a per-tag basis. As an example, when configuring OT process tags which can be accessed using the Modbus protocol, configure the tag to a Modbus Input Register to leverage the protocol's regist"

  OTWatchdogTimer:
    class_uri: d3f:OTWatchdogTimer
    is_a: OTProcessVariable
    mixins:
      - SoftwareWatchdogTimer
    title: OT Watchdog Timer
    description: |-
      An OT Watchdog Timer is a software-based monitoring mechanism used in operational technology (OT) environments to continuously supervise the execution and responsiveness of critical control applications, devices, or communication links. It operates by requiring periodic “heartbeat” signals or status updates from monitored processes within a defined time window; if these signals are not received on time (indicating a hang, fault, or abnormal delay) the OT Watchdog Timer automatically triggers predefined safety or recovery actions, such as placing equipment in a fail-safe state, restarting services, generating alarms, or initiating controlled shutdowns.
    see_also:
      - https://literature.rockwellautomation.com/idc/groups/literature/documents/pm/1756-pm005_-en-p.pdf

