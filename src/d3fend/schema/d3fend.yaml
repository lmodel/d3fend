  ReverseProxyServer:
    class_uri: d3f:ReverseProxyServer
    is_a: ProxyServer
    title: Reverse Proxy Server
    description: |-
      In computer networks, a reverse proxy is a type of proxy server that retrieves resources on behalf of a client from one or more servers. These resources are then returned to the client, appearing as if they originated from the proxy server itself. Unlike a forward proxy, which is an intermediary for its associated clients to contact any server, a reverse proxy is an intermediary for its associated servers to be contacted by any client. In other words, a proxy acts on behalf of the client(s), while a reverse proxy acts on behalf of the server(s); a reverse proxy is usually an internal-facing proxy used as a 'front-end' to control and protect access to a server on a private network.
    see_also:
      - http://dbpedia.org/resource/Reverse_proxy

  ReverseResolutionIPDenylisting:
    class_uri: d3f:ReverseResolutionIPDenylisting
    is_a: DNSDenylisting
    title: Reverse Resolution IP Denylisting
    description: "Blocking a reverse lookup based on the query's IP address value."
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-RRID"
      synonym: "Reverse Resolution IP Blacklisting"
      kb-article: "## How it works This technique prevents a client from learning domains deemed to be potentially malicious, which would have been delivered via reverse resolution responses over the DNS protocol. Queries for reverse resolution requests (that is, requests where IP(s) are sent and a domain is returned"
    related_mappings:
      - attack:T1071.004
      - attack:T1568
    broad_mappings:
      - d3f:CommandAndControlTechnique
      - d3f:T1071

  RevokePrivilegesFromGroupEvent:
    class_uri: d3f:RevokePrivilegesFromGroupEvent
    is_a: GroupManagementEvent
    mixins:
      - PermissionRevokingEvent
    title: Revoke Privileges from Group Event
    description: |-
      An event where specific privileges or rights are removed from a group, restricting its members from performing actions or accessing resources previously allowed by those privileges.

  Router:
    class_uri: d3f:Router
    is_a: ComputerNetworkNode
    description: |-
      A router is a networking device that forwards data packets between computer networks. Routers perform the traffic directing functions on the Internet. Data sent through the internet, such as a web page or email, is in the form of data packets. A packet is typically forwarded from one router to another router through the networks that constitute an internetwork (e.g. the Internet) until it reaches its destination node.
    see_also:
      - http://dbpedia.org/resource/Router_(computing)

  RoutingAccessMediation:
    class_uri: d3f:RoutingAccessMediation
    is_a: NetworkAccessMediation
    title: Routing Access Mediation
    description: |-
      Routing access mediation is a network security approach that manages and controls access at the network layer using VPNs, tunneling protocols, firewall rules, and traffic inspection to ensure secure and efficient data routing.
    see_also:
      - https://www.geeksforgeeks.org/context-based-access-control-cbac/
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-RAM"
      kb-article: "## How it works Routing Access Mediation is a network security strategy focused on managing and controlling access at the network layer. It includes the use of VPNs for secure remote access, tunneling protocols for encapsulating data, firewall rules for filtering traffic, and advanced inspection te"

  RuntimeVariable:
    class_uri: d3f:RuntimeVariable
    is_a: DigitalInformationBearer
    title: Runtime Variable
    description: |-
      A runtime variable is an abstract storage location paired with an associated symbolic name, which contains some known or unknown quantity of data or object referred to as a value, which can change during the execution of a computer program.
    see_also:
      - https://dbpedia.org/page/Variable_(computer_science)

  SARSA:
    class_uri: d3f:SARSA
    is_a: Model_freeReinforcementLearning
    description: |-
      State-action-reward-state-action (SARSA) is an algorithm for learning a Markov decision process policy, used in the reinforcement learning area of machine learning.
    see_also:
      - https://dbpedia.org/page/State%E2%80%93action%E2%80%93reward%E2%80%93state%E2%80%93action
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-SAR"
