    class_uri: d3f:AccessDeniedEvent
    is_a: AccessMediationEvent
    title: Access Denied Event
    description: |-
      An event indicating the refusal of access to a resource, where an access request has been evaluated and denied based on current authorization policies, preventing operations by the requesting agent.

  AccessGrantedEvent:
    class_uri: d3f:AccessGrantedEvent
    is_a: AccessMediationEvent
    title: Access Granted Event
    description: |-
      An event signifying that access to a resource has been authorized and successfully enforced, allowing the requesting agent to perform specified operations based on the access control policies.

  AccessMediation:
    class_uri: d3f:AccessMediation
    is_a: DefensiveTechnique
    title: Access Mediation
    description: |-
      Access mediation is the process of granting or denying specific requests to: 1) obtain and use information and related information processing services; and 2) enter specific physical facilities (e.g., Federal buildings, military establishments, border crossing entrances). Access mediation decisions should enforce least privilege by granting access for scoped durations to prevent privilege creep and, where applicable, implement just-in-time (JIT) access. Denial decisions may prevent initial access or terminate access that has already been granted, ensuring continuous enforcement of security policies.
    see_also:
      - http://dbpedia.org/resource/Access_control
      - https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=1451869
      - https://nvlpubs.nist.gov/nistpubs/FIPS/NIST.FIPS.201-2.pdf
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-160v1r1.pdf
      - https://www.cs.cmu.edu/afs/cs/usr/bsy/security/CSC-STD-001-83.txt
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-AMED"
      synonym: "Access Control"

  AccessMediationEvent:
    class_uri: d3f:AccessMediationEvent
    is_a: AccessControlEvent
    title: Access Mediation Event
    description: |-
      An event involving the intermediary control mechanism that evaluates access requests and enforces access control decisions, ensuring that subjects' resource interactions comply with the established access policies.
    aliases:
      - "Access Enforcement Event"

