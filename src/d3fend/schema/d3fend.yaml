  Expectation_maximizationClustering:
    class_uri: d3f:Expectation-maximizationClustering
    is_a: Distribution_basedClustering
    title: Expectation-maximization Clustering
    description: |-
      An unsupervised clustering algorithm and extends to NLP applications like Latent Dirichlet Allocation, the Baum-Welch algorithm for Hidden Markov Models, and medical imaging.
    aliases:
