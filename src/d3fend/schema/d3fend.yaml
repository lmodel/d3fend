      - "CWE-129"
    annotations:
      cwe-id: "CWE-129"
      synonym: "array index underflow"
    exact_mappings:
      - cwe:CWE-129

  CWE_1290:
    class_uri: d3f:CWE-1290
    is_a: CWE_284
    title: Incorrect Decoding of Security Identifiers
    description: |-
      The product implements a decoding mechanism to decode certain bus-transaction signals to security identifiers. If the decoding is implemented incorrectly, then untrusted agents can now gain unauthorized access to the asset.
    aliases:
      - "CWE-1290"
    annotations:
      cwe-id: "CWE-1290"
    exact_mappings:
      - cwe:CWE-1290

  CWE_1291:
    class_uri: d3f:CWE-1291
    is_a: CWE_693
