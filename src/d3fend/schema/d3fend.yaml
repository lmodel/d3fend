    annotations:
      owl_named_individual: "true"
      synonym: "Identity Token"
      kb-article: "## How it works An ID token is proof of the user's authentication. An ID token is encoded as a JSON Web Token (JWT), a standard format that allows your application to easily inspect its content, and make sure it comes from the expected issuer and that no one else changed it."

