    annotations:
      cwe-id: "CWE-188"
    exact_mappings:
      - cwe:CWE-188

  CWE_190:
    class_uri: d3f:CWE-190
    is_a: CWE_682
    title: Integer Overflow or Wraparound
    description: |-
      The product performs a calculation that can produce an integer overflow or wraparound when the logic assumes that the resulting value will always be larger than the original value. This occurs when an integer value is incremented to a value that is too large to store in the associated representation. When this occurs, the value may become a very small or negative number.
    aliases:
      - "CWE-190"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-190"
      synonym: "Overflow"
    exact_mappings:
      - cwe:CWE-190

  CWE_191:
    class_uri: d3f:CWE-191
    is_a: CWE_682
    title: Integer Underflow (Wrap or Wraparound)
    description: |-
      The product subtracts one value from another, such that the result is less than the minimum allowable integer value, which produces a value that is not equal to the correct result.
    aliases:
      - "CWE-191"
    annotations:
      cwe-id: "CWE-191"
      synonym: "Integer underflow"
    exact_mappings:
      - cwe:CWE-191

  CWE_192:
    class_uri: d3f:CWE-192
    is_a: CWE_681
    title: Integer Coercion Error
    description: |-
      Integer coercion refers to a set of flaws pertaining to the type casting, extension, or truncation of primitive data types.
    aliases:
      - "CWE-192"
    annotations:
      cwe-id: "CWE-192"
    exact_mappings:
      - cwe:CWE-192

  CWE_193:
    class_uri: d3f:CWE-193
    is_a: CWE_682
    title: Off-by-one Error
    description: "A product calculates or uses an incorrect maximum or minimum value that is 1 more, or 1 less, than the correct value."
    aliases:
      - "CWE-193"
    annotations:
      cwe-id: "CWE-193"
      synonym: "off-by-five"
    exact_mappings:
      - cwe:CWE-193

  CWE_194:
    class_uri: d3f:CWE-194
    is_a: CWE_681
    title: Unexpected Sign Extension
    description: |-
      The product performs an operation on a number that causes it to be sign extended when it is transformed into a larger data type. When the original number is negative, this can produce unexpected values that lead to resultant weaknesses.
    aliases:
      - "CWE-194"
    annotations:
      cwe-id: "CWE-194"
    exact_mappings:
      - cwe:CWE-194

  CWE_195:
    class_uri: d3f:CWE-195
    is_a: CWE_681
    title: Signed to Unsigned Conversion Error
    description: |-
      The product uses a signed primitive and performs a cast to an unsigned primitive, which can produce an unexpected value if the value of the signed primitive can not be represented using an unsigned primitive.
    aliases:
      - "CWE-195"
    annotations:
      cwe-id: "CWE-195"
    exact_mappings:
      - cwe:CWE-195

  CWE_196:
    class_uri: d3f:CWE-196
    is_a: CWE_681
    title: Unsigned to Signed Conversion Error
    description: |-
      The product uses an unsigned primitive and performs a cast to a signed primitive, which can produce an unexpected value if the value of the unsigned primitive can not be represented using a signed primitive.
    aliases:
      - "CWE-196"
    annotations:
      cwe-id: "CWE-196"
    exact_mappings:
      - cwe:CWE-196

  CWE_197:
    class_uri: d3f:CWE-197
    is_a: CWE_681
    title: Numeric Truncation Error
    description: Truncation errors occur when a primitive is cast to a primitive of a smaller size and data is lost in the conversion.
    aliases:
      - "CWE-197"
    annotations:
      cwe-id: "CWE-197"
    exact_mappings:
      - cwe:CWE-197

  CWE_198:
    class_uri: d3f:CWE-198
    is_a: CWE_188
    title: Use of Incorrect Byte Ordering
    description: |-
      The product receives input from an upstream component, but it does not account for byte ordering (e.g. big-endian and little-endian) when processing the input, causing an incorrect number or value to be used.
    aliases:
      - "CWE-198"
    annotations:
      cwe-id: "CWE-198"
    exact_mappings:
      - cwe:CWE-198

  CWE_20:
    class_uri: d3f:CWE-20
    is_a: CWE_707
    title: Improper Input Validation
    description: |-
      The product receives input or data, but it does not validate or incorrectly validates that the input has the properties that are required to process the data safely and correctly.
    aliases:
      - "CWE-20"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-20"
    exact_mappings:
      - cwe:CWE-20

  CWE_200:
    class_uri: d3f:CWE-200
    is_a: CWE_668
    title: Exposure of Sensitive Information to an Unauthorized Actor
    description: |-
      The product exposes sensitive information to an actor that is not explicitly authorized to have access to that information.
    aliases:
      - "CWE-200"
    annotations:
      cwe-id: "CWE-200"
      synonym: "Information Disclosure"
    exact_mappings:
      - cwe:CWE-200

  CWE_201:
    class_uri: d3f:CWE-201
    is_a: CWE_200
    title: Insertion of Sensitive Information Into Sent Data
    description: |-
      The code transmits data to another actor, but a portion of the data includes sensitive information that should not be accessible to that actor.
    aliases:
      - "CWE-201"
    annotations:
      cwe-id: "CWE-201"
    exact_mappings:
      - cwe:CWE-201

  CWE_202:
    class_uri: d3f:CWE-202
    is_a: CWE_1230
    title: Exposure of Sensitive Information Through Data Queries
    description: "When trying to keep information confidential, an attacker can often infer some of the information by using statistics."
    aliases:
      - "CWE-202"
    annotations:
      cwe-id: "CWE-202"
    exact_mappings:
      - cwe:CWE-202

  CWE_203:
    class_uri: d3f:CWE-203
    is_a: CWE_200
    title: Observable Discrepancy
    description: |-
      The product behaves differently or sends different responses under different circumstances in a way that is observable to an unauthorized actor, which exposes security-relevant information about the state of the product, such as whether a particular operation was successful or not.
    aliases:
      - "CWE-203"
    annotations:
      cwe-id: "CWE-203"
      synonym: "Side Channel Attack"
    exact_mappings:
      - cwe:CWE-203

  CWE_204:
    class_uri: d3f:CWE-204
    is_a: CWE_203
    title: Observable Response Discrepancy
    description: |-
      The product provides different responses to incoming requests in a way that reveals internal state information to an unauthorized actor outside of the intended control sphere.
    aliases:
      - "CWE-204"
    annotations:
      cwe-id: "CWE-204"
    exact_mappings:
      - cwe:CWE-204

  CWE_205:
    class_uri: d3f:CWE-205
    is_a: CWE_203
    title: Observable Behavioral Discrepancy
    description: |-
      The product's behaviors indicate important differences that may be observed by unauthorized actors in a way that reveals (1) its internal state or decision process, or (2) differences from other products with equivalent functionality.
    aliases:
      - "CWE-205"
    annotations:
      cwe-id: "CWE-205"
    exact_mappings:
      - cwe:CWE-205

  CWE_206:
    class_uri: d3f:CWE-206
    is_a: CWE_205
    title: Observable Internal Behavioral Discrepancy
    description: |-
      The product performs multiple behaviors that are combined to produce a single result, but the individual behaviors are observable separately in a way that allows attackers to reveal internal state or internal decision points.
    aliases:
      - "CWE-206"
    annotations:
      cwe-id: "CWE-206"
    exact_mappings:
      - cwe:CWE-206

  CWE_207:
    class_uri: d3f:CWE-207
    is_a: CWE_205
    title: Observable Behavioral Discrepancy With Equivalent Products
    description: |-
      The product operates in an environment in which its existence or specific identity should not be known, but it behaves differently than other products with equivalent functionality, in a way that is observable to an attacker.
    aliases:
      - "CWE-207"
    annotations:
      cwe-id: "CWE-207"
    exact_mappings:
      - cwe:CWE-207

  CWE_208:
    class_uri: d3f:CWE-208
    is_a: CWE_203
    title: Observable Timing Discrepancy
    description: |-
      Two separate operations in a product require different amounts of time to complete, in a way that is observable to an actor and reveals security-relevant information about the state of the product, such as whether a particular operation was successful or not.
    aliases:
      - "CWE-208"
    annotations:
      cwe-id: "CWE-208"
    exact_mappings:
      - cwe:CWE-208

  CWE_209:
    class_uri: d3f:CWE-209
    is_a: CWE_200
    mixins:
      - CWE_755
    title: Generation of Error Message Containing Sensitive Information
    description: |-
      The product generates an error message that includes sensitive information about its environment, users, or associated data.
    aliases:
      - "CWE-209"
    annotations:
      cwe-id: "CWE-209"
    exact_mappings:
      - cwe:CWE-209

  CWE_210:
    class_uri: d3f:CWE-210
    is_a: CWE_209
    title: Self-generated Error Message Containing Sensitive Information
    description: |-
      The product identifies an error condition and creates its own diagnostic or error messages that contain sensitive information.
    aliases:
      - "CWE-210"
    annotations:
      cwe-id: "CWE-210"
    exact_mappings:
      - cwe:CWE-210

  CWE_211:
    class_uri: d3f:CWE-211
    is_a: CWE_209
    title: Externally-Generated Error Message Containing Sensitive Information
    description: |-
      The product performs an operation that triggers an external diagnostic or error message that is not directly generated or controlled by the product, such as an error generated by the programming language interpreter that a software application uses. The error can contain sensitive system information.
    aliases:
      - "CWE-211"
    annotations:
      cwe-id: "CWE-211"
    exact_mappings:
      - cwe:CWE-211

  CWE_212:
    class_uri: d3f:CWE-212
    is_a: CWE_669
    title: Improper Removal of Sensitive Information Before Storage or Transfer
    description: |-
      The product stores, transfers, or shares a resource that contains sensitive information, but it does not properly remove that information before the product makes the resource available to unauthorized actors.
    aliases:
      - "CWE-212"
    annotations:
      cwe-id: "CWE-212"
    exact_mappings:
      - cwe:CWE-212

  CWE_213:
    class_uri: d3f:CWE-213
    is_a: CWE_200
    title: Exposure of Sensitive Information Due to Incompatible Policies
    description: |-
      The product's intended functionality exposes information to certain actors in accordance with the developer's security policy, but this information is regarded as sensitive according to the intended security policies of other stakeholders such as the product's administrator, users, or others whose information is being processed.
    aliases:
      - "CWE-213"
    annotations:
      cwe-id: "CWE-213"
    exact_mappings:
      - cwe:CWE-213

  CWE_214:
    class_uri: d3f:CWE-214
    is_a: CWE_497
    title: Invocation of Process Using Visible Sensitive Information
    description: |-
      A process is invoked with sensitive command-line arguments, environment variables, or other elements that can be seen by other processes on the operating system.
    aliases:
      - "CWE-214"
    annotations:
      cwe-id: "CWE-214"
    exact_mappings:
      - cwe:CWE-214

  CWE_215:
    class_uri: d3f:CWE-215
    is_a: CWE_200
    title: Insertion of Sensitive Information Into Debugging Code
    description: |-
      The product inserts sensitive information into debugging code, which could expose this information if the debugging code is not disabled in production.
    aliases:
      - "CWE-215"
    annotations:
      cwe-id: "CWE-215"
    exact_mappings:
      - cwe:CWE-215

  CWE_219:
    class_uri: d3f:CWE-219
    is_a: CWE_552
    title: Storage of File with Sensitive Data Under Web Root
    description: |-
      The product stores sensitive data under the web document root with insufficient access control, which might make it accessible to untrusted parties.
    aliases:
      - "CWE-219"
    annotations:
      cwe-id: "CWE-219"
    exact_mappings:
      - cwe:CWE-219

  CWE_22:
    class_uri: d3f:CWE-22
    is_a: CWE_668
    mixins:
      - CWE_706
    title: "Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
    description: |-
      The product uses external input to construct a pathname that is intended to identify a file or directory that is located underneath a restricted parent directory, but the product does not properly neutralize special elements within the pathname that can cause the pathname to resolve to a location that is outside of the restricted directory.
    aliases:
      - "CWE-22"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-22"
      synonym: "Directory traversal"
    exact_mappings:
      - cwe:CWE-22

  CWE_220:
    class_uri: d3f:CWE-220
    is_a: CWE_552
    title: Storage of File With Sensitive Data Under FTP Root
    description: |-
      The product stores sensitive data under the FTP server root with insufficient access control, which might make it accessible to untrusted parties.
    aliases:
      - "CWE-220"
    annotations:
      cwe-id: "CWE-220"
    exact_mappings:
      - cwe:CWE-220

  CWE_221:
    class_uri: d3f:CWE-221
    is_a: CWE_664
    title: Information Loss or Omission
    description: |-
      The product does not record, or improperly records, security-relevant information that leads to an incorrect decision or hampers later analysis.
    aliases:
      - "CWE-221"
    annotations:
      cwe-id: "CWE-221"
    exact_mappings:
      - cwe:CWE-221

  CWE_222:
    class_uri: d3f:CWE-222
    is_a: CWE_221
    title: Truncation of Security-relevant Information
    description: |-
      The product truncates the display, recording, or processing of security-relevant information in a way that can obscure the source or nature of an attack.
    aliases:
      - "CWE-222"
    annotations:
      cwe-id: "CWE-222"
    exact_mappings:
      - cwe:CWE-222

  CWE_223:
    class_uri: d3f:CWE-223
    is_a: CWE_221
    title: Omission of Security-relevant Information
    description: |-
      The product does not record or display information that would be important for identifying the source or nature of an attack, or determining if an action is safe.
    aliases:
      - "CWE-223"
    annotations:
      cwe-id: "CWE-223"
    exact_mappings:
      - cwe:CWE-223

  CWE_224:
    class_uri: d3f:CWE-224
    is_a: CWE_221
    title: Obscured Security-relevant Information by Alternate Name
    description: |-
      The product records security-relevant information according to an alternate name of the affected entity, instead of the canonical name.
    aliases:
      - "CWE-224"
    annotations:
      cwe-id: "CWE-224"
    exact_mappings:
      - cwe:CWE-224

  CWE_226:
    class_uri: d3f:CWE-226
    is_a: CWE_212
    mixins:
      - CWE_459
    title: Sensitive Information in Resource Not Removed Before Reuse
    description: |-
      The product releases a resource such as memory or a file so that it can be made available for reuse, but it does not clear or "zeroize" the information contained in the resource before the product performs a critical state transition or makes the resource available for reuse by other entities.
    aliases:
      - "CWE-226"
    annotations:
      cwe-id: "CWE-226"
    exact_mappings:
      - cwe:CWE-226

  CWE_228:
    class_uri: d3f:CWE-228
    is_a: CWE_703
    mixins:
      - CWE_707
    title: Improper Handling of Syntactically Invalid Structure
    description: |-
      The product does not handle or incorrectly handles input that is not syntactically well-formed with respect to the associated specification.
    aliases:
      - "CWE-228"
    annotations:
      cwe-id: "CWE-228"
    exact_mappings:
      - cwe:CWE-228

  CWE_229:
    class_uri: d3f:CWE-229
    is_a: CWE_228
    title: Improper Handling of Values
    description: |-
      The product does not properly handle when the expected number of values for parameters, fields, or arguments is not provided in input, or if those values are undefined.
    aliases:
      - "CWE-229"
    annotations:
      cwe-id: "CWE-229"
    exact_mappings:
      - cwe:CWE-229

  CWE_23:
    class_uri: d3f:CWE-23
    is_a: CWE_22
    title: Relative Path Traversal
    description: |-
      The product uses external input to construct a pathname that should be within a restricted directory, but it does not properly neutralize sequences such as ".." that can resolve to a location that is outside of that directory.
    aliases:
      - "CWE-23"
    annotations:
      cwe-id: "CWE-23"
      synonym: "Zip Slip"
    exact_mappings:
      - cwe:CWE-23

  CWE_230:
    class_uri: d3f:CWE-230
    is_a: CWE_229
    title: Improper Handling of Missing Values
    description: |-
      The product does not handle or incorrectly handles when a parameter, field, or argument name is specified, but the associated value is missing, i.e. it is empty, blank, or null.
    aliases:
      - "CWE-230"
    annotations:
      cwe-id: "CWE-230"
    exact_mappings:
      - cwe:CWE-230

  CWE_231:
    class_uri: d3f:CWE-231
    is_a: CWE_229
    title: Improper Handling of Extra Values
    description: The product does not handle or incorrectly handles when more values are provided than expected.
    aliases:
      - "CWE-231"
    annotations:
      cwe-id: "CWE-231"
    exact_mappings:
      - cwe:CWE-231

  CWE_232:
    class_uri: d3f:CWE-232
    is_a: CWE_229
    title: Improper Handling of Undefined Values
    description: |-
      The product does not handle or incorrectly handles when a value is not defined or supported for the associated parameter, field, or argument name.
    aliases:
      - "CWE-232"
    annotations:
      cwe-id: "CWE-232"
    exact_mappings:
      - cwe:CWE-232

  CWE_233:
    class_uri: d3f:CWE-233
    is_a: CWE_228
    title: Improper Handling of Parameters
    description: |-
      The product does not properly handle when the expected number of parameters, fields, or arguments is not provided in input, or if those parameters are undefined.
    aliases:
      - "CWE-233"
    annotations:
      cwe-id: "CWE-233"
    exact_mappings:
      - cwe:CWE-233

  CWE_234:
    class_uri: d3f:CWE-234
    is_a: CWE_233
    title: Failure to Handle Missing Parameter
    description: |-
      If too few arguments are sent to a function, the function will still pop the expected number of arguments from the stack. Potentially, a variable number of arguments could be exhausted in a function as well.
    aliases:
      - "CWE-234"
    annotations:
      cwe-id: "CWE-234"
    exact_mappings:
      - cwe:CWE-234

  CWE_235:
    class_uri: d3f:CWE-235
    is_a: CWE_233
    title: Improper Handling of Extra Parameters
    description: |-
      The product does not handle or incorrectly handles when the number of parameters, fields, or arguments with the same name exceeds the expected amount.
    aliases:
      - "CWE-235"
    annotations:
      cwe-id: "CWE-235"
    exact_mappings:
      - cwe:CWE-235

  CWE_236:
    class_uri: d3f:CWE-236
    is_a: CWE_233
    title: Improper Handling of Undefined Parameters
    description: |-
      The product does not handle or incorrectly handles when a particular parameter, field, or argument name is not defined or supported by the product.
    aliases:
      - "CWE-236"
    annotations:
      cwe-id: "CWE-236"
    exact_mappings:
      - cwe:CWE-236

  CWE_237:
    class_uri: d3f:CWE-237
    is_a: CWE_228
    title: Improper Handling of Structural Elements
    description: The product does not handle or incorrectly handles inputs that are related to complex structures.
    aliases:
      - "CWE-237"
    annotations:
      cwe-id: "CWE-237"
    exact_mappings:
      - cwe:CWE-237

  CWE_238:
    class_uri: d3f:CWE-238
    is_a: CWE_237
    title: Improper Handling of Incomplete Structural Elements
    description: The product does not handle or incorrectly handles when a particular structural element is not completely specified.
    aliases:
      - "CWE-238"
    annotations:
      cwe-id: "CWE-238"
    exact_mappings:
      - cwe:CWE-238

  CWE_239:
    class_uri: d3f:CWE-239
    is_a: CWE_237
    title: Failure to Handle Incomplete Element
    description: The product does not properly handle when a particular element is not completely specified.
    aliases:
      - "CWE-239"
    annotations:
      cwe-id: "CWE-239"
    exact_mappings:
      - cwe:CWE-239

  CWE_24:
    class_uri: d3f:CWE-24
    is_a: CWE_23
    title: "Path Traversal: '../filedir'"
    description: |-
      The product uses external input to construct a pathname that should be within a restricted directory, but it does not properly neutralize "../" sequences that can resolve to a location that is outside of that directory.
    aliases:
      - "CWE-24"
    annotations:
      cwe-id: "CWE-24"
    exact_mappings:
      - cwe:CWE-24

  CWE_240:
    class_uri: d3f:CWE-240
    is_a: CWE_237
    mixins:
      - CWE_707
    title: Improper Handling of Inconsistent Structural Elements
    description: |-
      The product does not handle or incorrectly handles when two or more structural elements should be consistent, but are not.
    aliases:
      - "CWE-240"
    annotations:
      cwe-id: "CWE-240"
    exact_mappings:
      - cwe:CWE-240

  CWE_241:
    class_uri: d3f:CWE-241
    is_a: CWE_228
    title: Improper Handling of Unexpected Data Type
    description: |-
      The product does not handle or incorrectly handles when a particular element is not the expected type, e.g. it expects a digit (0-9) but is provided with a letter (A-Z).
    aliases:
      - "CWE-241"
    annotations:
      cwe-id: "CWE-241"
    exact_mappings:
      - cwe:CWE-241

  CWE_242:
    class_uri: d3f:CWE-242
    is_a: CWE_1177
    title: Use of Inherently Dangerous Function
    description: The product calls a function that can never be guaranteed to work safely.
    aliases:
      - "CWE-242"
    annotations:
      cwe-id: "CWE-242"
    exact_mappings:
      - cwe:CWE-242

  CWE_243:
    class_uri: d3f:CWE-243
    is_a: CWE_573
    mixins:
      - CWE_669
    title: Creation of chroot Jail Without Changing Working Directory
    description: |-
      The product uses the chroot() system call to create a jail, but does not change the working directory afterward. This does not prevent access to files outside of the jail.
    aliases:
      - "CWE-243"
    annotations:
      cwe-id: "CWE-243"
    exact_mappings:
      - cwe:CWE-243

  CWE_244:
    class_uri: d3f:CWE-244
    is_a: CWE_226
    title: "Improper Clearing of Heap Memory Before Release ('Heap Inspection')"
    description: |-
      Using realloc() to resize buffers that store sensitive information can leave the sensitive information exposed to attack, because it is not removed from memory.
    aliases:
      - "CWE-244"
    annotations:
      cwe-id: "CWE-244"
    exact_mappings:
      - cwe:CWE-244

  CWE_245:
    class_uri: d3f:CWE-245
    is_a: CWE_695
    title: "J2EE Bad Practices: Direct Management of Connections"
    description: "The J2EE application directly manages connections, instead of using the container's connection management facilities."
    aliases:
      - "CWE-245"
    annotations:
      cwe-id: "CWE-245"
    exact_mappings:
      - cwe:CWE-245

  CWE_246:
    class_uri: d3f:CWE-246
    is_a: CWE_695
    title: "J2EE Bad Practices: Direct Use of Sockets"
    description: The J2EE application directly uses sockets instead of using framework method calls.
    aliases:
      - "CWE-246"
    annotations:
      cwe-id: "CWE-246"
    exact_mappings:
      - cwe:CWE-246

  CWE_248:
    class_uri: d3f:CWE-248
    is_a: CWE_703
    mixins:
      - CWE_705
      - CWE_755
    title: Uncaught Exception
    description: "An exception is thrown from a function, but it is not caught."
