  SymbolicLogic:
    class_uri: d3f:SymbolicLogic
    is_a: AnalyticTechnique
    title: Symbolic Logic
    description: |-
      Symbolic Logic, also known as formal logic, is a branch of mathematics that uses symbolic representations for logical expressions and relationships. It provides a systematic method for examining the structure of arguments and reasoning, focusing on the relationships between propositions rather than the content of those propositions.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-SL"
      kb-article: "## How it Works ## References 1. Symbolic Logic. (2023, June 6). In _Wolfram Mathworld_. [Link](https://mathworld.wolfram.com/SymbolicLogic.html) 2. Hughes, G. and Schagrin, M. (2023, Apr 19). Formal Logic. _Encyclopedia Brittanica_. [Link](https://www.britannica.com/topic/formal-logic) 3. Carnap,"

  SymmetricFeature_basedTransferLearning:
    class_uri: d3f:SymmetricFeature-basedTransferLearning
    is_a: HomogenousTransferLearning
    title: Symmetric Feature-based Transfer Learning
    description: |-
      Homogeneous symmetric transformation takes both the source feature space Xs and target feature space Xt and learns feature transformations as to project each onto a common subspace Xc for adaptation purposes. This derived subspace becomes a domain-invariant feature subspace to associate cross-domain data, and in effect, reduces marginal distribution differences.
    aliases:
      - "SymmetricFeature-basedTransferLearning"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-SFTL"
      kb-article: "## References Day, O., & Khoshgoftaar, T.M. (2017). A survey on heterogeneous transfer learning. *Journal of Big Data, 4*(1), 29. [Link](https://doi.org/10.1186/s40537-017-0089-0)."

  SymmetricKey:
    class_uri: d3f:SymmetricKey
    is_a: CryptographicKey
    title: Symmetric Key
    description: |-
      A symmetric key is a single key used for both encryption and decryption and used with a symmetric-key algorithm. Symmetric-key algorithms are algorithms for cryptography that use the same cryptographic keys for both encryption of plaintext and decryption of ciphertext. The keys may be identical or there may be a simple transformation to go between the two keys. The keys, in practice, represent a shared secret between two or more parties that can be used to maintain a private information link. This requirement that both parties have access to the secret key is one of the main drawbacks of symmetric key encryption, in comparison to public-key encrytption (also known as asymmetric key encryption).
    see_also:
      - http://dbpedia.org/resource/Symmetric-key_algorithm

  System:
    class_uri: d3f:System
    is_a: Artifact
    description: |-
      An artifact (instrumentality) that combines interrelated interacting artifacts designed to work as a coherent entity.  [Note that not all digital artifacts are systems nor are all systems digital artifacts.]
