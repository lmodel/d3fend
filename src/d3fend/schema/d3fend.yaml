    title: Race Condition Enabling Link Following
    description: |-
      The product checks the status of a file or directory before accessing it, which produces a race condition in which the file can be replaced with a link before the access is performed, causing the product to access the wrong file.
    aliases:
      - "CWE-363"
    annotations:
      cwe-id: "CWE-363"
    exact_mappings:
      - cwe:CWE-363

  CWE_364:
    class_uri: d3f:CWE-364
    is_a: CWE_362
    title: Signal Handler Race Condition
    description: The product uses a signal handler that introduces a race condition.
    aliases:
      - "CWE-364"
    annotations:
      cwe-id: "CWE-364"
    exact_mappings:
      - cwe:CWE-364

  CWE_366:
    class_uri: d3f:CWE-366
    is_a: CWE_362
    title: Race Condition within a Thread
    description: |-
      If two threads of execution use a resource simultaneously, there exists the possibility that resources may be used while invalid, in turn making the state of execution undefined.
    aliases:
      - "CWE-366"
    annotations:
      cwe-id: "CWE-366"
    exact_mappings:
      - cwe:CWE-366

  CWE_367:
    class_uri: d3f:CWE-367
    is_a: CWE_362
    title: Time-of-check Time-of-use (TOCTOU) Race Condition
    description: |-
      The product checks the state of a resource before using that resource, but the resource's state can change between the check and the use in a way that invalidates the results of the check. This can cause the product to perform invalid actions when the resource is in an unexpected state.
    aliases:
      - "CWE-367"
    annotations:
      cwe-id: "CWE-367"
      synonym: "TOCCTOU"
    exact_mappings:
      - cwe:CWE-367

  CWE_368:
    class_uri: d3f:CWE-368
    is_a: CWE_362
    title: Context Switching Race Condition
    description: |-
      A product performs a series of non-atomic actions to switch between contexts that cross privilege or other security boundaries, but a race condition allows an attacker to modify or misrepresent the product's behavior during the switch.
    aliases:
      - "CWE-368"
    annotations:
      cwe-id: "CWE-368"
    exact_mappings:
      - cwe:CWE-368

  CWE_369:
    class_uri: d3f:CWE-369
    is_a: CWE_682
    title: Divide By Zero
    description: The product divides a value by zero.
    aliases:
      - "CWE-369"
    annotations:
      cwe-id: "CWE-369"
    exact_mappings:
      - cwe:CWE-369

  CWE_37:
    class_uri: d3f:CWE-37
    is_a: CWE_160
    mixins:
      - CWE_36
    title: "Path Traversal: '/absolute/pathname/here'"
    description: |-
      The product accepts input in the form of a slash absolute path ('/absolute/pathname/here') without appropriate validation, which can allow an attacker to traverse the file system to unintended locations or access arbitrary files.
    aliases:
      - "CWE-37"
    annotations:
      cwe-id: "CWE-37"
    exact_mappings:
      - cwe:CWE-37

  CWE_370:
    class_uri: d3f:CWE-370
    is_a: CWE_299
    title: Missing Check for Certificate Revocation after Initial Check
    description: |-
      The product does not check the revocation status of a certificate after its initial revocation check, which can cause the product to perform privileged actions even after the certificate is revoked at a later time.
    aliases:
      - "CWE-370"
    annotations:
      cwe-id: "CWE-370"
    exact_mappings:
      - cwe:CWE-370

  CWE_372:
    class_uri: d3f:CWE-372
    is_a: CWE_664
    title: Incomplete Internal State Distinction
    description: |-
      The product does not properly determine which state it is in, causing it to assume it is in state X when in fact it is in state Y, causing it to perform incorrect operations in a security-relevant manner.
    aliases:
      - "CWE-372"
    annotations:
      cwe-id: "CWE-372"
    exact_mappings:
      - cwe:CWE-372

  CWE_374:
    class_uri: d3f:CWE-374
    is_a: CWE_668
    title: Passing Mutable Objects to an Untrusted Method
    description: The product sends non-cloned mutable data as an argument to a method or function.
    aliases:
      - "CWE-374"
    annotations:
      cwe-id: "CWE-374"
    exact_mappings:
      - cwe:CWE-374

  CWE_375:
    class_uri: d3f:CWE-375
    is_a: CWE_668
    title: Returning a Mutable Object to an Untrusted Caller
    description: |-
      Sending non-cloned mutable data as a return value may result in that data being altered or deleted by the calling function.
    aliases:
      - "CWE-375"
    annotations:
      cwe-id: "CWE-375"
    exact_mappings:
      - cwe:CWE-375

  CWE_377:
    class_uri: d3f:CWE-377
    is_a: CWE_668
    title: Insecure Temporary File
    description: Creating and using insecure temporary files can leave application and system data vulnerable to attack.
    aliases:
      - "CWE-377"
    annotations:
      cwe-id: "CWE-377"
    exact_mappings:
      - cwe:CWE-377

  CWE_378:
    class_uri: d3f:CWE-378
    is_a: CWE_377
    title: Creation of Temporary File With Insecure Permissions
    description: |-
      Opening temporary files without appropriate measures or controls can leave the file, its contents and any function that it impacts vulnerable to attack.
    aliases:
      - "CWE-378"
    annotations:
      cwe-id: "CWE-378"
    exact_mappings:
      - cwe:CWE-378

  CWE_379:
    class_uri: d3f:CWE-379
    is_a: CWE_377
    title: Creation of Temporary File in Directory with Insecure Permissions
    description: |-
      The product creates a temporary file in a directory whose permissions allow unintended actors to determine the file's existence or otherwise access that file.
    aliases:
      - "CWE-379"
    annotations:
      cwe-id: "CWE-379"
    exact_mappings:
      - cwe:CWE-379

  CWE_38:
    class_uri: d3f:CWE-38
    is_a: CWE_36
    title: "Path Traversal: '\\absolute\\pathname\\here'"
    description: |-
      The product accepts input in the form of a backslash absolute path ('\absolute\pathname\here') without appropriate validation, which can allow an attacker to traverse the file system to unintended locations or access arbitrary files.
    aliases:
      - "CWE-38"
    annotations:
      cwe-id: "CWE-38"
    exact_mappings:
      - cwe:CWE-38

  CWE_382:
    class_uri: d3f:CWE-382
    is_a: CWE_705
    title: "J2EE Bad Practices: Use of System.exit()"
    description: "A J2EE application uses System.exit(), which also shuts down its container."
    aliases:
      - "CWE-382"
    annotations:
      cwe-id: "CWE-382"
    exact_mappings:
      - cwe:CWE-382

  CWE_383:
    class_uri: d3f:CWE-383
    is_a: CWE_695
    title: "J2EE Bad Practices: Direct Use of Threads"
    description: Thread management in a Web application is forbidden in some circumstances and is always highly error prone.
    aliases:
      - "CWE-383"
    annotations:
      cwe-id: "CWE-383"
    exact_mappings:
      - cwe:CWE-383

  CWE_384:
    class_uri: d3f:CWE-384
    is_a: CWE_610
    title: Session Fixation
    description: |-
      Authenticating a user, or otherwise establishing a new user session, without invalidating any existing session identifier gives an attacker the opportunity to steal authenticated sessions.
    aliases:
      - "CWE-384"
    annotations:
      cwe-id: "CWE-384"
    exact_mappings:
      - cwe:CWE-384

  CWE_385:
    class_uri: d3f:CWE-385
    is_a: CWE_514
    title: Covert Timing Channel
    description: |-
      Covert timing channels convey information by modulating some aspect of system behavior over time, so that the program receiving the information can observe system behavior and infer protected information.
    aliases:
      - "CWE-385"
    annotations:
      cwe-id: "CWE-385"
    exact_mappings:
      - cwe:CWE-385

  CWE_386:
    class_uri: d3f:CWE-386
    is_a: CWE_706
    title: Symbolic Name not Mapping to Correct Object
    description: |-
      A constant symbolic reference to an object is used, even though the reference can resolve to a different object over time.
    aliases:
      - "CWE-386"
    annotations:
      cwe-id: "CWE-386"
    exact_mappings:
      - cwe:CWE-386

  CWE_39:
    class_uri: d3f:CWE-39
    is_a: CWE_36
    title: "Path Traversal: 'C:dirname'"
    description: |-
      The product accepts input that contains a drive letter or Windows volume letter ('C:dirname') that potentially redirects access to an unintended location or arbitrary file.
    aliases:
      - "CWE-39"
    annotations:
      cwe-id: "CWE-39"
    exact_mappings:
      - cwe:CWE-39

  CWE_390:
    class_uri: d3f:CWE-390
    is_a: CWE_755
    title: Detection of Error Condition Without Action
    description: "The product detects a specific error, but takes no actions to handle the error."
    aliases:
      - "CWE-390"
    annotations:
      cwe-id: "CWE-390"
    exact_mappings:
      - cwe:CWE-390

  CWE_391:
    class_uri: d3f:CWE-391
    is_a: CWE_754
    title: Unchecked Error Condition
    description: |-
      [PLANNED FOR DEPRECATION. SEE MAINTENANCE NOTES AND CONSIDER CWE-252, CWE-248, OR CWE-1069.] Ignoring exceptions and other error conditions may allow an attacker to induce unexpected behavior unnoticed.
    aliases:
      - "CWE-391"
    annotations:
      cwe-id: "CWE-391"
    exact_mappings:
      - cwe:CWE-391

  CWE_392:
    class_uri: d3f:CWE-392
    is_a: CWE_684
    mixins:
      - CWE_703
      - CWE_755
    title: Missing Report of Error Condition
    description: |-
      The product encounters an error but does not provide a status code or return value to indicate that an error has occurred.
    aliases:
      - "CWE-392"
    annotations:
      cwe-id: "CWE-392"
    exact_mappings:
      - cwe:CWE-392

  CWE_393:
    class_uri: d3f:CWE-393
    is_a: CWE_684
    mixins:
      - CWE_703
    title: Return of Wrong Status Code
    description: |-
      A function or operation returns an incorrect return value or status code that does not indicate the true result of execution, causing the product to modify its behavior based on the incorrect result.
    aliases:
      - "CWE-393"
    annotations:
      cwe-id: "CWE-393"
    exact_mappings:
      - cwe:CWE-393

  CWE_394:
    class_uri: d3f:CWE-394
    is_a: CWE_754
    title: Unexpected Status Code or Return Value
    description: |-
      The product does not properly check when a function or operation returns a value that is legitimate for the function, but is not expected by the product.
    aliases:
      - "CWE-394"
    annotations:
      cwe-id: "CWE-394"
    exact_mappings:
      - cwe:CWE-394

  CWE_395:
    class_uri: d3f:CWE-395
    is_a: CWE_705
    mixins:
      - CWE_755
    title: Use of NullPointerException Catch to Detect NULL Pointer Dereference
    description: |-
      Catching NullPointerException should not be used as an alternative to programmatic checks to prevent dereferencing a null pointer.
    aliases:
      - "CWE-395"
    annotations:
      cwe-id: "CWE-395"
    exact_mappings:
      - cwe:CWE-395

  CWE_396:
    class_uri: d3f:CWE-396
    is_a: CWE_221
    mixins:
      - CWE_705
      - CWE_755
    title: Declaration of Catch for Generic Exception
    description: |-
      Catching overly broad exceptions promotes complex error handling code that is more likely to contain security vulnerabilities.
    aliases:
      - "CWE-396"
    annotations:
      cwe-id: "CWE-396"
    exact_mappings:
      - cwe:CWE-396

  CWE_397:
    class_uri: d3f:CWE-397
    is_a: CWE_221
    mixins:
      - CWE_703
      - CWE_705
    title: Declaration of Throws for Generic Exception
    description: |-
      The product throws or raises an overly broad exceptions that can hide important details and produce inappropriate responses to certain conditions.
    aliases:
      - "CWE-397"
    annotations:
      cwe-id: "CWE-397"
    exact_mappings:
      - cwe:CWE-397

  CWE_40:
    class_uri: d3f:CWE-40
    is_a: CWE_36
    title: "Path Traversal: '\\\\UNC\\share\\name\\' (Windows UNC Share)"
    description: |-
      The product accepts input that identifies a Windows UNC share ('\\UNC\share\name') that potentially redirects access to an unintended location or arbitrary file.
    aliases:
      - "CWE-40"
    annotations:
      cwe-id: "CWE-40"
    exact_mappings:
      - cwe:CWE-40

  CWE_400:
    class_uri: d3f:CWE-400
    is_a: CWE_664
    title: Uncontrolled Resource Consumption
    description: The product does not properly control the allocation and maintenance of a limited resource.
    aliases:
      - "CWE-400"
    annotations:
      cwe-id: "CWE-400"
      synonym: "Resource Exhaustion"
    exact_mappings:
      - cwe:CWE-400

  CWE_401:
    class_uri: d3f:CWE-401
    is_a: CWE_772
    title: Missing Release of Memory after Effective Lifetime
    description: |-
      The product does not sufficiently track and release allocated memory after it has been used, making the memory unavailable for reallocation and reuse.
    aliases:
      - "CWE-401"
    annotations:
      cwe-id: "CWE-401"
      synonym: "Memory Leak"
    exact_mappings:
      - cwe:CWE-401

  CWE_402:
    class_uri: d3f:CWE-402
    is_a: CWE_668
    title: "Transmission of Private Resources into a New Sphere ('Resource Leak')"
    description: |-
      The product makes resources available to untrusted parties when those resources are only intended to be accessed by the product.
    aliases:
      - "CWE-402"
    annotations:
      cwe-id: "CWE-402"
      synonym: "Resource Leak"
    exact_mappings:
      - cwe:CWE-402

  CWE_403:
    class_uri: d3f:CWE-403
    is_a: CWE_402
    title: "Exposure of File Descriptor to Unintended Control Sphere ('File Descriptor Leak')"
    description: |-
      A process does not close sensitive file descriptors before invoking a child process, which allows the child to perform unauthorized I/O operations using those descriptors.
    aliases:
      - "CWE-403"
    annotations:
      cwe-id: "CWE-403"
      synonym: "File descriptor leak"
    exact_mappings:
      - cwe:CWE-403

  CWE_404:
    class_uri: d3f:CWE-404
    is_a: CWE_664
    title: Improper Resource Shutdown or Release
    description: The product does not release or incorrectly releases a resource before it is made available for re-use.
    aliases:
      - "CWE-404"
    annotations:
      cwe-id: "CWE-404"
    exact_mappings:
      - cwe:CWE-404

  CWE_405:
    class_uri: d3f:CWE-405
    is_a: CWE_400
    mixins:
      - CWE_664
    title: Asymmetric Resource Consumption (Amplification)
    description: |-
      The product does not properly control situations in which an adversary can cause the product to consume or produce excessive resources without requiring the adversary to invest equivalent work or otherwise prove authorization, i.e., the adversary's influence is "asymmetric."
    aliases:
      - "CWE-405"
    annotations:
      cwe-id: "CWE-405"
    exact_mappings:
      - cwe:CWE-405

  CWE_406:
    class_uri: d3f:CWE-406
    is_a: CWE_405
    title: Insufficient Control of Network Message Volume (Network Amplification)
    description: |-
      The product does not sufficiently monitor or control transmitted network traffic volume, so that an actor can cause the product to transmit more traffic than should be allowed for that actor.
    aliases:
      - "CWE-406"
    annotations:
      cwe-id: "CWE-406"
    exact_mappings:
      - cwe:CWE-406

  CWE_407:
    class_uri: d3f:CWE-407
    is_a: CWE_405
    title: Inefficient Algorithmic Complexity
    description: |-
      An algorithm in a product has an inefficient worst-case computational complexity that may be detrimental to system performance and can be triggered by an attacker, typically using crafted manipulations that ensure that the worst case is being reached.
    aliases:
      - "CWE-407"
    annotations:
      cwe-id: "CWE-407"
      synonym: "Quadratic Complexity"
    exact_mappings:
      - cwe:CWE-407

  CWE_408:
    class_uri: d3f:CWE-408
    is_a: CWE_405
    mixins:
      - CWE_696
    title: "Incorrect Behavior Order: Early Amplification"
    description: |-
      The product allows an entity to perform a legitimate but expensive operation before authentication or authorization has taken place.
    aliases:
      - "CWE-408"
    annotations:
      cwe-id: "CWE-408"
    exact_mappings:
      - cwe:CWE-408

  CWE_409:
    class_uri: d3f:CWE-409
    is_a: CWE_405
    title: Improper Handling of Highly Compressed Data (Data Amplification)
    description: |-
      The product does not handle or incorrectly handles a compressed input with a very high compression ratio that produces a large output.
    aliases:
      - "CWE-409"
    annotations:
      cwe-id: "CWE-409"
    exact_mappings:
      - cwe:CWE-409

  CWE_41:
    class_uri: d3f:CWE-41
    is_a: CWE_706
    title: Improper Resolution of Path Equivalence
    description: |-
      The product is vulnerable to file system contents disclosure through path equivalence. Path equivalence involves the use of special characters in file and directory names. The associated manipulations are intended to generate multiple names for the same object.
    aliases:
      - "CWE-41"
    annotations:
      cwe-id: "CWE-41"
    exact_mappings:
      - cwe:CWE-41

  CWE_410:
    class_uri: d3f:CWE-410
    is_a: CWE_664
    title: Insufficient Resource Pool
    description: |-
      The product's resource pool is not large enough to handle peak demand, which allows an attacker to prevent others from accessing the resource by using a (relatively) large number of requests for resources.
    aliases:
      - "CWE-410"
    annotations:
      cwe-id: "CWE-410"
    exact_mappings:
      - cwe:CWE-410

  CWE_412:
    class_uri: d3f:CWE-412
    is_a: CWE_667
    title: Unrestricted Externally Accessible Lock
    description: |-
      The product properly checks for the existence of a lock, but the lock can be externally controlled or influenced by an actor that is outside of the intended sphere of control.
    aliases:
      - "CWE-412"
    annotations:
      cwe-id: "CWE-412"
    exact_mappings:
      - cwe:CWE-412

  CWE_413:
    class_uri: d3f:CWE-413
    is_a: CWE_667
    title: Improper Resource Locking
    description: |-
      The product does not lock or does not correctly lock a resource when the product must have exclusive access to the resource.
    aliases:
      - "CWE-413"
    annotations:
      cwe-id: "CWE-413"
    exact_mappings:
      - cwe:CWE-413

  CWE_414:
    class_uri: d3f:CWE-414
    is_a: CWE_667
    title: Missing Lock Check
    description: A product does not check to see if a lock is present before performing sensitive operations on a resource.
    aliases:
      - "CWE-414"
    annotations:
      cwe-id: "CWE-414"
    exact_mappings:
      - cwe:CWE-414

  CWE_415:
    class_uri: d3f:CWE-415
    is_a: CWE_1341
    mixins:
      - CWE_666
      - CWE_825
    title: Double Free
    description: The product calls free() twice on the same memory address.
    aliases:
      - "CWE-415"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-415"
      synonym: "Double-free"
    exact_mappings:
      - cwe:CWE-415

  CWE_416:
    class_uri: d3f:CWE-416
    is_a: CWE_825
    title: Use After Free
    description: |-
      The product reuses or references memory after it has been freed. At some point afterward, the memory may be allocated again and saved in another pointer, while the original pointer references a location somewhere within the new allocation. Any operations using the original pointer are no longer valid because the memory "belongs" to the code that operates on the new pointer.
    aliases:
      - "CWE-416"
    annotations:
      cwe-id: "CWE-416"
      synonym: "Dangling pointer"
    exact_mappings:
      - cwe:CWE-416

  CWE_419:
    class_uri: d3f:CWE-419
    is_a: CWE_923
    title: Unprotected Primary Channel
    description: |-
      The product uses a primary channel for administration or restricted functionality, but it does not properly protect the channel.
    aliases:
      - "CWE-419"
    annotations:
      cwe-id: "CWE-419"
    exact_mappings:
      - cwe:CWE-419

  CWE_42:
    class_uri: d3f:CWE-42
    is_a: CWE_162
    mixins:
      - CWE_41
    title: "Path Equivalence: 'filename.' (Trailing Dot)"
    description: |-
      The product accepts path input in the form of trailing dot ('filedir.') without appropriate validation, which can lead to ambiguous path resolution and allow an attacker to traverse the file system to unintended locations or access arbitrary files.
    aliases:
      - "CWE-42"
    annotations:
      cwe-id: "CWE-42"
    exact_mappings:
      - cwe:CWE-42

  CWE_420:
    class_uri: d3f:CWE-420
    is_a: CWE_923
    title: Unprotected Alternate Channel
    description: "The product protects a primary channel, but it does not use the same level of protection for an alternate channel."
    aliases:
      - "CWE-420"
    annotations:
      cwe-id: "CWE-420"
    exact_mappings:
      - cwe:CWE-420

  CWE_421:
    class_uri: d3f:CWE-421
    is_a: CWE_362
    mixins:
      - CWE_420
    title: Race Condition During Access to Alternate Channel
    description: |-
      The product opens an alternate channel to communicate with an authorized user, but the channel is accessible to other actors.
    aliases:
      - "CWE-421"
    annotations:
      cwe-id: "CWE-421"
    exact_mappings:
      - cwe:CWE-421

  CWE_422:
    class_uri: d3f:CWE-422
    is_a: CWE_360
    mixins:
      - CWE_420
    title: "Unprotected Windows Messaging Channel ('Shatter')"
    description: |-
      The product does not properly verify the source of a message in the Windows Messaging System while running at elevated privileges, creating an alternate channel through which an attacker can directly send a message to the product.
    aliases:
      - "CWE-422"
    annotations:
      cwe-id: "CWE-422"
    exact_mappings:
      - cwe:CWE-422

  CWE_424:
    class_uri: d3f:CWE-424
    is_a: CWE_638
    mixins:
      - CWE_693
    title: Improper Protection of Alternate Path
    description: |-
      The product does not sufficiently protect all possible paths that a user can take to access restricted functionality or resources.
    aliases:
      - "CWE-424"
    annotations:
      cwe-id: "CWE-424"
    exact_mappings:
      - cwe:CWE-424

  CWE_425:
    class_uri: d3f:CWE-425
    is_a: CWE_288
    mixins:
      - CWE_424
      - CWE_862
    title: "Direct Request ('Forced Browsing')"
    description: "The web application does not adequately enforce appropriate authorization on all restricted URLs, scripts, or files."
    aliases:
      - "CWE-425"
    annotations:
      cwe-id: "CWE-425"
      synonym: "forced browsing"
    exact_mappings:
      - cwe:CWE-425

  CWE_426:
    class_uri: d3f:CWE-426
    is_a: CWE_642
    mixins:
      - CWE_673
    title: Untrusted Search Path
    description: |-
      The product searches for critical resources using an externally-supplied search path that can point to resources that are not under the product's direct control.
    aliases:
      - "CWE-426"
    annotations:
      cwe-id: "CWE-426"
      synonym: "Untrusted Path"
    exact_mappings:
      - cwe:CWE-426

  CWE_427:
    class_uri: d3f:CWE-427
    is_a: CWE_668
    title: Uncontrolled Search Path Element
    description: |-
      The product uses a fixed or controlled search path to find resources, but one or more locations in that path can be under the control of unintended actors.
    aliases:
      - "CWE-427"
    annotations:
      cwe-id: "CWE-427"
