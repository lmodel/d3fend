    class_uri: d3f:WindowsRegistryKeyRestoreEvent
    is_a: WindowsRegistryKeyEvent
    title: Windows Registry Key Restore Event
    description: An event where a registry key is restored to a previous state using a backup or recovery mechanism.

  WindowsRegistryKeySetSecurityEvent:
    class_uri: d3f:WindowsRegistryKeySetSecurityEvent
    is_a: WindowsRegistryKeyEvent
    title: Windows Registry Key Set Security Event
    description: An event representing the application or modification of access controls or security settings to a registry key.

  WindowsRegistryKeyUpdateEvent:
    class_uri: d3f:WindowsRegistryKeyUpdateEvent
    is_a: WindowsRegistryKeyEvent
    title: Windows Registry Key Update Event
    description: "An event where an existing registry key is updated or reconfigured, reflecting changes to its metadata or properties."

  WindowsRegistryValue:
    class_uri: d3f:WindowsRegistryValue
    is_a: SystemConfigurationDatabaseRecord
    title: Windows Registry Value
    description: |-
      A Windows Registry Value is a data structure consisting of a name, type, data (as a pointer), and the length. Windows Registry Values are always associated with a Windows Registry Key. They store the actual configuration data for the operating system and the programs that run on the system.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/sysinfo/structure-of-the-registry
      - https://schema.ocsf.io/objects/registry_value
      - https://learn.microsoft.com/en-us/windows/win32/api/winreg/ns-winreg-valentw
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - stix:WindowsRegistryValue
      - unified_cyber_ontology:WindowsRegistryValue

  WindowsRegistryValueDeletionEvent:
    class_uri: d3f:WindowsRegistryValueDeletionEvent
    is_a: WindowsRegistryValueEvent
    title: Windows Registry Value Deletion Event
    description: "An event where a registry value is deleted from the Windows Registry, permanently removing its associated data."

  WindowsRegistryValueEvent:
    class_uri: d3f:WindowsRegistryValueEvent
    is_a: WindowsRegistryEvent
    title: Windows Registry Value Event
    description: "Events representing actions performed on Windows Registry values, which store configuration data within registry keys."
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/win/registry_value_activity
      - https://schema.ocsf.io/classes/win/registry_value_activity

  WindowsRegistryValueGetEvent:
    class_uri: d3f:WindowsRegistryValueGetEvent
    is_a: WindowsRegistryValueEvent
    title: Windows Registry Value Get Event
    description: "An event where the data of a registry value is retrieved, typically to read its configuration or state."

  WindowsRegistryValueSetEvent:
    class_uri: d3f:WindowsRegistryValueSetEvent
    is_a: WindowsRegistryValueEvent
    title: Windows Registry Value Set Event
    description: "An event where data is assigned to a registry value, either creating it or updating its existing content."

  WindowsRegistryValueUpdateEvent:
    class_uri: d3f:WindowsRegistryValueUpdateEvent
    is_a: WindowsRegistryValueEvent
    title: Windows Registry Value Update Event
    description: An event indicating changes to the data or configuration of an existing registry value within the Windows Registry.

  WindowsResumeThread:
    class_uri: d3f:WindowsResumeThread
    is_a: OSAPIResumeThread
    title: Windows ResumeThread
    description: |-
      Decrements a thread's suspend count. When the suspend count is decremented to zero, the execution of the thread is resumed.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/processthreadsapi/nf-processthreadsapi-resumethread
    annotations:
      owl_named_individual: "true"

  WindowsSetThreadContext:
    class_uri: d3f:WindowsSetThreadContext
    is_a: OSAPISetThreadContext
    title: Windows SetThreadContext
    description: Sets the context for the specified thread.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/processthreadsapi/nf-processthreadsapi-setthreadcontext
    annotations:
      owl_named_individual: "true"

  WindowsShortcutFile:
    class_uri: d3f:WindowsShortcutFile
    is_a: ShortcutFile
    title: Windows Shortcut File
    description: A Microsoft Windows shortcut file.
    aliases:
      - "Shell Link"
    see_also:
      - http://dbpedia.org/resource/Shortcut_(computing)#Microsoft_Windows
      - http://dbpedia.org/resource/Symbolic_link#Shortcuts
    annotations:
      owl_named_individual: "true"

  WindowsSuspendThread:
    class_uri: d3f:WindowsSuspendThread
    is_a: OSAPISuspendThread
    title: Windows SuspendThread
    description: Suspends the specified thread.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/processthreadsapi/nf-processthreadsapi-suspendthread
    annotations:
      owl_named_individual: "true"

  WindowsTerminateProcess:
    class_uri: d3f:WindowsTerminateProcess
    is_a: OSAPITerminateProcess
    title: Windows TerminateProcess
    description: Terminates the specified process and all of its threads.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/processthreadsapi/nf-processthreadsapi-terminateprocess
    annotations:
      owl_named_individual: "true"

  WindowsVirtualAllocEx:
    class_uri: d3f:WindowsVirtualAllocEx
    is_a: OSAPIAllocateMemory
    title: Windows VirtualAllocEx
    description: |-
      Reserves, commits, or changes the state of a region of memory within the virtual address space of a specified process. The function initializes the memory it allocates to zero.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/memoryapi/nf-memoryapi-virtualallocex
    annotations:
      owl_named_individual: "true"

  WindowsVirtualFree:
    class_uri: d3f:WindowsVirtualFree
    is_a: OSAPIFreeMemory
    title: Windows VirtualFree
    description: |-
      Releases, decommits, or releases and decommits a region of pages within the virtual address space of the calling process.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/memoryapi/nf-memoryapi-virtualfree
    annotations:
      owl_named_individual: "true"

  WindowsVirtualProtectEx:
    class_uri: d3f:WindowsVirtualProtectEx
    is_a: OSAPIAllocateMemory
    title: Windows VirtualProtectEx
    description: Changes the protection on a region of committed pages in the virtual address space of a specified process.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/memoryapi/nf-memoryapi-virtualprotectex
    annotations:
      owl_named_individual: "true"

  WindowsWriteFile:
    class_uri: d3f:WindowsWriteFile
    is_a: OSAPIWriteFile
    title: Windows WriteFile
    description: Writes data to the specified file or input/output (I/O) device.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/fileapi/nf-fileapi-writefile
    annotations:
      owl_named_individual: "true"

  WindowsWriteProcessMemory:
    class_uri: d3f:WindowsWriteProcessMemory
    is_a: OSAPIWriteMemory
    title: Windows WriteProcessMemory
    description: |-
      Writes data to an area of memory in a specified process. The entire area to be written to must be accessible or the operation fails.
    see_also:
      - https://learn.microsoft.com/en-us/windows/win32/api/memoryapi/nf-memoryapi-writeprocessmemory
    annotations:
      owl_named_individual: "true"

  WiredLink:
    class_uri: d3f:WiredLink
    is_a: PhysicalLink
    title: Wired Link
    description: |-
      A physical link that uses a physical conductor or waveguide to constrain and direct signal propagation between endpoints. The signal is confined within or along a manufactured medium such as metal conductors, optical fibers, or coaxial structures.

  WirelessAccessPoint:
    class_uri: d3f:WirelessAccessPoint
    is_a: ComputerNetworkNode
    title: Wireless Access Point
    description: |-
      In computer networking, a wireless access point (WAP), or more generally just access point (AP), is a networking hardware device that allows other Wi-Fi devices to connect to a wired network. The AP usually connects to a router (via a wired network) as a standalone device, but it can also be an integral component of the router itself. An AP is differentiated from a hotspot which is a physical location where Wi-Fi access is available.
    aliases:
      - "WAP"
    see_also:
      - http://dbpedia.org/resource/Wireless_access_point

  WirelessAttacker:
    class_uri: d3f:WirelessAttacker
    is_a: RemoteAttacker
    title: Wireless Attacker
    description: "An attacker who targets wireless communication methods, like Wi-Fi, without needing physical access to the premises."

  WirelessLink:
    class_uri: d3f:WirelessLink
    is_a: PhysicalLink
    title: Wireless Link
    description: |-
      A physical link that transmits signals through free space or an unguided medium without physical connectors between endpoints. The signal propagates through air, vacuum, water, or other natural media using electromagnetic waves or acoustic energy.

  WirelessRouter:
    class_uri: d3f:WirelessRouter
    is_a: Router
    mixins:
      - WirelessAccessPoint
    title: Wireless Router
    description: |-
      A wireless router is a device that performs the functions of a router and also includes the functions of a wireless access point. It is used to provide access to the Internet or a private computer network. Depending on the manufacturer and model, it can function in a wired local area network, in a wireless-only LAN, or in a mixed wired and wireless network.
    see_also:
      - http://dbpedia.org/resource/Wireless_router

  WriteFile:
    class_uri: d3f:WriteFile
    is_a: SystemCall
    title: Write File
    description: |-
      The write is one of the most basic routines provided by a Unix-like operating system kernel. It writes data from a buffer declared by the user to a given device, such as a file. This is the primary way to output data from a program by directly using a system call. The destination is identified by a numeric code. The data to be written, for instance a piece of text, is defined by a pointer and a size, given in number of bytes. write thus takes three arguments.
    see_also:
      - http://dbpedia.org/resource/Write_(system_call)
    annotations:
      owl_named_individual: "true"

  WriteMemory:
    class_uri: d3f:WriteMemory
    is_a: SystemCall
    title: Write Memory
    annotations:
      owl_named_individual: "true"

  WriteProtectSwitch:
    class_uri: d3f:WriteProtectSwitch
    is_a: HardwareDevice
    title: Write Protect Switch
    description: A physical device used to restrict configuration of a device.
    see_also:
      - https://web-material3.yokogawa.com/FGP-110__5_.us.pdf
    annotations:
      owl_named_individual: "true"

  ZeroClientComputer:
    class_uri: d3f:ZeroClientComputer
    is_a: ThinClientComputer
    title: Zero Client Computer
    description: |-
      Zero client is also referred as ultra thin client, contains no moving parts but centralizes all processing and storage to just what is running on the server. As a result, it requires no local driver to install, no patch management, and no local operating system licensing fees or updates. The device consumes very little power and is tamper-resistant and completely incapable of storing any data locally, providing a more secure endpoint.
    see_also:
      - http://dbpedia.org/resource/Thin_client#Zero_client

  t_SNEClustering:
    class_uri: d3f:t-SNEClustering
    is_a: Projection_basedClustering
    title: t-SNE Clustering
    description: |-
      T-distributed Stochastic Neighbor Embedding (t-SNE) is a statistical method for visualizing high-dimensional data by giving each datapoint a location in a two or three-dimensional map.
    aliases:
      - "t-SNEClustering"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-TSC"
      kb-article: "## References Wikipedia. (n.d.). T-distributed stochastic neighbor embedding. [Link](https://en.wikipedia.org/wiki/T-distributed_stochastic_neighbor_embedding)"

