      - "CWE-1275"
    annotations:
      cwe-id: "CWE-1275"
    exact_mappings:
      - cwe:CWE-1275

  CWE_1276:
    class_uri: d3f:CWE-1276
    is_a: CWE_284
    title: Hardware Child Block Incorrectly Connected to Parent System
