  Image_to_ImageTranslationGAN:
    class_uri: d3f:Image-to-ImageTranslationGAN
    is_a: GenerativeAdversarialNetwork
    title: Image-to-Image Translation GAN
    description: Image-to-image translation is the task of transferring styles and characteristics from one image domain to another.
    aliases:
