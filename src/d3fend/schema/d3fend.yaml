    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-WSAA"
      kb-article: "## How it works User web session data is collected over a period of time to create a user behavior profile. Data collected includes clicks made on a website, average time between clicks, filling out web forms, order in which pages are viewed, and downloading files. Current user web session behavior"

