    annotations:
      owl_named_individual: "true"

  DHCPOfferEvent:
    class_uri: d3f:DHCPOfferEvent
    is_a: DHCPEvent
    title: DHCP Offer Event
    description: |-
      An event where a DHCP server sends an OFFER message to a client in response to a DISCOVER request, proposing an IP address and associated configuration parameters.
    aliases:
      - "DHCPOFFER"

  DHCPReleaseEvent:
    class_uri: d3f:DHCPReleaseEvent
    is_a: DHCPEvent
    title: DHCP Release Event
    description: |-
      An event where a DHCP client sends a RELEASE message to relinquish its assigned IP address and cancel any remaining lease duration.
    aliases:
      - "DHCPRELEASE"

  DHCPRequestEvent:
    class_uri: d3f:DHCPRequestEvent
    is_a: DHCPEvent
    title: DHCP Request Event
    description: |-
      An event where a DHCP client sends a REQUEST message to confirm or renew its desired IP configuration with a specific DHCP server.
    aliases:
      - "DHCPREQUEST"

  DHCPServer:
    class_uri: d3f:DHCPServer
    is_a: Server
    title: DHCP Server
    description: |-
      A Dynamic Host Configuration Protocol (DHCP) server is a type of server that assigns IP addresses to computers.  DHCP servers are used to assign IP addresses to computers and other devices automatically.  The DHCP server is responsible for assigning the unique IP address to each device.
    see_also:
      - http://dbpedia.org/resource/Dynamic_Host_Configuration_Protocol
    annotations:
      owl_named_individual: "true"

  DHCPService:
    class_uri: d3f:DHCPService
