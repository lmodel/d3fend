  ExpectedErrorReduction:
    class_uri: d3f:ExpectedErrorReduction
    is_a: ActiveLearning
    title: Expected Error Reduction
    description: |-
      Expected Error Reduction (EER) follows similar ideas as EMC, but again looks at the model output instead of the model itself and also takes the other data into account. In particular, a sample x is considered useful, if we can expect that knowing the label will reduce the future error on unseen samples
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-EER"
      kb-article: "## References Intro to Active Learning. inovex Blog. [Link](https://www.inovex.de/de/blog/intro-to-active-learning/)."

  ExpectedModelChange:
    class_uri: d3f:ExpectedModelChange
