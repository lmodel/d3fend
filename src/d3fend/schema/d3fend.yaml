    is_a: CWE_94
    title: "Improper Neutralization of Directives in Statically Saved Code ('Static Code Injection')"
    description: |-
      The product receives input from an upstream component, but it does not neutralize or incorrectly neutralizes code syntax before inserting the input into an executable resource, such as a library, configuration file, or template.
    aliases:
      - "CWE-96"
    annotations:
      cwe-id: "CWE-96"
    exact_mappings:
      - cwe:CWE-96

  CWE_97:
    class_uri: d3f:CWE-97
    is_a: CWE_96
    title: Improper Neutralization of Server-Side Includes (SSI) Within a Web Page
    description: |-
      The product generates a web page, but does not neutralize or incorrectly neutralizes user-controllable input that could be interpreted as a server-side include (SSI) directive.
    aliases:
      - "CWE-97"
    annotations:
      cwe-id: "CWE-97"
    exact_mappings:
      - cwe:CWE-97

  CWE_98:
    class_uri: d3f:CWE-98
    is_a: CWE_706
    mixins:
      - CWE_829
    title: "Improper Control of Filename for Include/Require Statement in PHP Program ('PHP Remote File Inclusion')"
    description: |-
      The PHP application receives input from an upstream component, but it does not restrict or incorrectly restricts the input before its usage in "require," "include," or similar functions.
    aliases:
      - "CWE-98"
    annotations:
      cwe-id: "CWE-98"
      synonym: "Local file inclusion"
    exact_mappings:
      - cwe:CWE-98

  CWE_99:
    class_uri: d3f:CWE-99
    is_a: CWE_74
    title: "Improper Control of Resource Identifiers ('Resource Injection')"
    description: |-
      The product receives input from an upstream component, but it does not restrict or incorrectly restricts the input before it is used as an identifier for a resource that may be outside the intended sphere of control.
    aliases:
      - "CWE-99"
    annotations:
      cwe-id: "CWE-99"
      synonym: "Insecure Direct Object Reference"
    exact_mappings:
      - cwe:CWE-99

  CacheMemory:
    class_uri: d3f:CacheMemory
    is_a: PrimaryStorage
    title: Processor Cache Memory
    description: |-
      Cache memory is temporary storage that is more readily available to the processor than the computer's main memory source, located between the main memory and the processor.  It is typically either integrated directly into the CPU chip (level 1 cache) or placed on a separate chip with a bus interconnect with the CPU (level 2 cache).
    see_also:
      - https://dbpedia.org/page/CPU_cache
      - https://whatis.techtarget.com/definition/memory
    annotations:
      owl_named_individual: "true"

  CallStack:
    class_uri: d3f:CallStack
    is_a: DigitalInformationBearer
    title: Call Stack
    description: |-
      In computer science, a call stack is a stack data structure that stores information about the active subroutines of a computer program. This kind of stack is also known as an execution stack, program stack, control stack, run-time stack, or machine stack, and is often shortened to just "the stack". Although maintenance of the call stack is important for the proper functioning of most software, the details are normally hidden and automatic in high-level programming languages. Many computer instruction sets provide special instructions for manipulating stacks.
    see_also:
      - http://dbpedia.org/resource/Call_stack
    annotations:
      owl_named_individual: "true"

  CanopyClustering:
    class_uri: d3f:CanopyClustering
    is_a: ClusterAnalysis
    title: Canopy Clustering
    description: |-
      The canopy clustering algorithm is an unsupervised pre-clustering algorithm  often used as preprocessing step for the K-means algorithm or the Hierarchical clustering algorithm. It is intended to speed up clustering operations on large data sets.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-CC"
      kb-article: "## References Wikipedia. (n.d.). Canopy clustering algorithm. [Link](https://en.wikipedia.org/wiki/Canopy_clustering_algorithm)"

  Capability:
    class_uri: d3f:Capability
    is_a: ExternalThing
    see_also:
      - https://web.archive.org/web/20081123014953/http://www.dtic.mil/doctrine/jel/new_pubs/jp1_02.pdf
      - http://dbpedia.org/resource/Capability_(systems_engineering)
    exact_mappings:
      - oscal:Capability

  CentralProcessingUnit:
    class_uri: d3f:CentralProcessingUnit
    is_a: Processor
    title: Central Processing Unit
    description: |-
      A central processing unit (CPU), also called a central processor, main processor or just processor, is the electronic circuitry that executes instructions comprising a computer program. The CPU performs basic arithmetic, logic, controlling, and input/output (I/O) operations specified by the instructions in the program. This contrasts with external components such as main memory and I/O circuitry, and specialized processors such as graphics
    see_also:
      - https://en.wikipedia.org/wiki/Central_processing_unit
    annotations:
      owl_named_individual: "true"
      synonym: "CPU"

  CentralTendency:
    class_uri: d3f:CentralTendency
    is_a: DescriptiveStatistics
    title: Central Tendency
    description: |-
      A measure of central tendency ) is a summary measure that attempts to describe a whole set of data with a single value that represents the middle or centre of its distribution.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-CT"
      kb-article: "## References Australian Bureau of Statistics. (n.d.). Measures of Central Tendency. [Link](https://www.abs.gov.au/statistics/understanding-statistics/statistical-terms-and-concepts/measures-central-tendency) Wikipedia. (n.d.). Central tendency. [Link](https://en.wikipedia.org/wiki/Central_tendency"

  Centroid_basedClustering:
    class_uri: d3f:Centroid-basedClustering
    is_a: ClusterAnalysis
    title: Centroid-based Clustering
    description: |-
      Centroid-based clustering organizes the data into non-hierarchical clusters, in contrast to hierarchical clustering defined below. K-means is the most widely-used centroid-based clustering algorithm. Centroid-based algorithms are efficient but sensitive to initial conditions and outliers.
    aliases:
      - "Centroid-basedClustering"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-CBC"
      kb-article: "## References Google Developers. (n.d.). Clustering Algorithms. [Link](https://developers.google.com/machine-learning/clustering/clustering-algorithms)"

  Certificate:
    class_uri: d3f:Certificate
    is_a: DigitalInformationBearer
    description: |-
      In cryptography, a public key certificate, also known as a digital certificate or identity certificate, is an electronic document used to prove the ownership of a public key. The certificate includes information about the key, information about the identity of its owner (called the subject), and the digital signature of an entity that has verified the certificate's contents (called the issuer). If the signature is valid, and the software examining the certificate trusts the issuer, then it can use that key to communicate securely with the certificate's subject. In email encryption, code signing, and e-signature systems, a certificate's subject is typically a person or organization. However, in Transport Layer Security (TLS) a certificate's subject is typically a computer or other device.
    aliases:
      - "Public Key Certificate"
    see_also:
      - https://schema.ocsf.io/objects/certificate
      - http://dbpedia.org/resource/Public_key_certificate
    annotations:
      owl_named_individual: "true"
    close_mappings:
      - stix:X509Certificate
      - unified_cyber_ontology:X509Certificate

  Certificate_basedAuthentication:
    class_uri: d3f:Certificate-basedAuthentication
    is_a: AgentAuthentication
    title: Certificate-based Authentication
    description: Requiring a digital certificate in order to authenticate a user.
    aliases:
      - "Certificate-basedAuthentication"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CBAN"
      kb-article: "## How it works Certificate-based authentication is a security mechanism that uses digital certificates to verify the identity of a user, device, or server before granting access to a network or system. This method relies on a pair of cryptographic keys: a public key and a private key. ## Consider"

  CertificateAnalysis:
    class_uri: d3f:CertificateAnalysis
    is_a: NetworkTrafficAnalysis
    title: Certificate Analysis
    description: |-
      Analyzing Public Key Infrastructure certificates to detect if they have been misconfigured or spoofed using both network traffic, certificate fields and third-party logs.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CA"
      kb-article: "## How it works Certificate Analysis ensures that the data elements of the certificate are current and anchored in a known trust model. Certificate authorities, revocation lists, and third-party secure logs are used in the analysis. Analysis includes detection of server impersonation, phishing domai"
    related_mappings:
      - attack:T1041
      - attack:T1048.002
      - attack:T1071
