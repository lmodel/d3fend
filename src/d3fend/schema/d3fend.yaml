  TCPEvent:
    class_uri: d3f:TCPEvent
    is_a: TransportLayerEvent
    title: TCP Event
    description: |-
      An event involving the Transmission Control Protocol (TCP), providing reliable, ordered, and error-checked delivery of data between applications.

  TFTPNetworkTraffic:
    class_uri: d3f:TFTPNetworkTraffic
    is_a: NetworkTraffic
    title: TFTP Network Traffic
    description: |-
      TFTP Network Traffic is network traffic typically used to automatically transfer configuration or boot files between machines.
    annotations:
      owl_named_individual: "true"

  TFTPServer:
    class_uri: d3f:TFTPServer
    is_a: Server
    title: TFTP Server
    description: |-
      Trivial File Transfer Protocol (TFTP) is a simple file transfer protocol, typically used to automatically transfer configuration or boot files between machines.  It is used where user authentication and directory visibility are not required.
    see_also:
      - http://dbpedia.org/resource/Trivial_File_Transfer_Protocol

  TPMBootIntegrity:
    class_uri: d3f:TPMBootIntegrity
    is_a: PlatformHardening
    title: TPM Boot Integrity
    description: |-
      Assuring the integrity of a platform by demonstrating that the boot process starts from a trusted combination of hardware and software and continues until the operating system has fully booted and applications are running.  Sometimes called Static Root of Trust Measurement (STRM).
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-TBI"
      synonym: "STRM"
      kb-article: "## How it works During the boot process, the BIOS boot block (which with this defense enabled, is the Core Root of Trust for Measurement) measures boot components (firmware, ROM). The TPM hashes those measurements and stores the hashes in Platform Configuration Registers (PCRs). Upon a subsequent b"

  TabletComputer:
    class_uri: d3f:TabletComputer
    is_a: PersonalComputer
    title: Tablet Computer
    description: |-
      A tablet computer, commonly shortened to tablet, is a mobile device, typically with a mobile operating system and touchscreen display processing circuitry, and a rechargeable battery in a single, thin and flat package. Tablets, being computers, do what other personal computers do, but lack some input/output (I/O) abilities that others have. Modern tablets largely resemble modern smartphones, the only differences being that tablets are relatively larger than smartphones, with screens 7 inches (18 cm) or larger, measured diagonally, and may not support access to a cellular network.
    aliases:
      - "Tablet"
    see_also:
      - http://dbpedia.org/resource/Tablet_computer

  TargetAudience:
    class_uri: d3f:TargetAudience
    is_a: AgentGroup
    title: Target Audience

  Technique:
    class_uri: d3f:Technique
    is_a: Plan

  TechniqueReference:
    class_uri: d3f:TechniqueReference
    is_a: D3FENDKBThing
    title: Technique Reference
    description: A reference used to develop KB articles.
    annotations:
      pref-label: "Technique Reference"

  Telecommand:
    class_uri: d3f:Telecommand
    is_a: RemoteCommand
    description: |-
      A telecommand or telecontrol is a command sent to control a remote system or systems not directly connected (e.g. via wires) to the place from which the telecommand is sent.
    see_also:
      - http://dbpedia.org/resource/Telecommand
    annotations:
      synonym: "Remote Control Command"

  TemporalDifferenceLearning:
    class_uri: d3f:TemporalDifferenceLearning
    is_a: Model_freeReinforcementLearning
    title: Temporal Difference Learning
    description: |-
      Temporal difference (TD) learning refers to a class of model-free reinforcement learning methods which learn by bootstrapping from the current estimate of the value function. These methods sample from the environment, like Monte Carlo methods, and perform updates based on current estimates, like dynamic programming methods
    comments:
      - "Temporal difference (TD) learning refers to a class of model-free reinforcement learning methods which learn by bootstrapping from the current estimate of the value function."
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-TDL"
      kb-article: "## References Temporal difference learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Temporal_difference_learning)."

  TemporalLogic:
    class_uri: d3f:TemporalLogic
    is_a: ModalLogic
    title: Temporal Logic
    description: "Temporal logic addresses the semantics of tense; i.e., qualifying expressions of when."
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-TL"
      kb-article: "## References 1. Temporal logic. (2023, June 4). In _Wikipedia_. [Link](https://en.wikipedia.org/wiki/Modal_logic#Temporal_logic)"

  TerminateProcess:
    class_uri: d3f:TerminateProcess
    is_a: SystemCall
    title: Terminate Process
    description: |-
      On many computer operating systems, a computer process terminates its execution by making an exit system call. More generally, an exit in a multithreading environment means that a thread of execution has stopped running. For resource management, the operating system reclaims resources (memory, files, etc.) that were used by the process. The process is said to be a dead process after it terminates.
    see_also:
      - http://dbpedia.org/resource/Exit_(system_call)
    annotations:
      owl_named_individual: "true"

  TertiaryStorage:
    class_uri: d3f:TertiaryStorage
    is_a: HardwareDevice
    mixins:
      - SecondaryStorage
    title: Tertiary Storage
    description: |-
      Tertiary storage or tertiary memory is memory primarily used for archiving rarely accessed information. It is primarily useful for extraordinarily large data stores. Typical examples include tape libraries and optical jukeboxes.
    see_also:
      - https://en.wikipedia.org/wiki/Computer_data_storage#Tertiary_storage

  TestExecutionTool:
    class_uri: d3f:TestExecutionTool
    is_a: DeveloperApplication
    title: Test Execution Tool
    description: |-
      A test execution tool is a type of software used to test software, hardware or complete systems.  Synonyms of test execution tool include test execution engine, test executive, test manager, test sequencer.  Two common forms in which a test execution engine may appear are as a: (a) module of a test software suite (test bench) or an integrated development environment, or (b) stand-alone application software.
    aliases:
      - "Test Execution Engine"
      - "Test Executive"
      - "Test Manager"
    see_also:
      - http://dbpedia.org/resource/Test_execution_engine

  ThinClientComputer:
    class_uri: d3f:ThinClientComputer
    is_a: SharedComputer
    title: Thin Client Computer
    description: |-
      A thin client is a lightweight computer that has been optimized for establishing a remote connection with a server-based computing environment. The server does most of the work, which can include launching software programs, performing calculations, and storing data. This contrasts with a fat client or a conventional personal computer; the former is also intended for working in a client-server model but has significant local processing power, while the latter aims to perform its function mostly locally. Thin clients are shared computers as the thin client's computing resources are provided by a remote server.
    see_also:
      - http://dbpedia.org/resource/Thin_client

  Thread:
    class_uri: d3f:Thread
    is_a: DigitalInformationBearer
    description: |-
      A Thread is the smallest unit of execution within a process, representing a sequence of instructions that can be scheduled and executed independently by the operating system.
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:Thread

  ThreadStartFunction:
    class_uri: d3f:ThreadStartFunction
    is_a: Subroutine
    title: Thread Start Function
    description: A function which invokes a create thread system call.
    annotations:
      owl_named_individual: "true"

  TicketGrantingTicket:
    class_uri: d3f:TicketGrantingTicket
    is_a: AccessToken
    title: Ticket Granting Ticket
    description: |-
      In some computer security systems, a Ticket Granting Ticket or Ticket to Get Tickets (TGT) is a small, encrypted identification file with a limited validity period. After authentication, this file is granted to a user for data traffic protection by the key distribution center (KDC) subsystem of authentication services such as Kerberos. The TGT file contains the session key, its expiration date, and the user's IP address, which protects the user from man-in-the-middle attacks. The TGT is used to obtain a service ticket from Ticket Granting Service (TGS). User is granted access to network services only after this service ticket is provided.
    aliases:
      - "Golden Ticket"
    see_also:
      - http://dbpedia.org/resource/Charlie_and_the_Chocolate_Factory
      - http://dbpedia.org/resource/Ticket_Granting_Ticket

  Time:
    class_uri: d3f:Time
    is_a: D3FENDCore
    description: |-
      Time is the one-dimensional continuum of temporal regions within which all processes unfold and at which all continuants exist. A temporal region is a specific portion of this continuum that may be either zero-dimensional (a temporal instant) or one-dimensional (a temporal interval). Temporal regions serve as the temporal boundaries and extents for occurrents (processes, events) and provide the temporal indexing for the existence of continuants (entities that persist through time).
    see_also:
      - http://dbpedia.org/resource/Time_in_physics

  TimeInstant:
    class_uri: d3f:TimeInstant
    is_a: Time
    title: Time Instant
    description: |-
      A time instant is a zero-dimensional temporal region that has no duration and represents a singular point in the temporal continuum. Time instants serve as the temporal boundaries of temporal intervals and as the indexical points at which continuants exist and bear their qualities.

  TimeInterval:
    class_uri: d3f:TimeInterval
    is_a: Time
    title: Time Interval
    description: |-
      A time interval is a one-dimensional temporal region that has duration and represents a continuous extent of time bounded by two time instants (a start instant and an end instant).

  TimeRecord:
    class_uri: d3f:TimeRecord
    is_a: Record
    title: Time Record
    description: "A time record either records, describes, represents, or is generally about Time."

  TimeSeriesAnalysis:
    class_uri: d3f:TimeSeriesAnalysis
    is_a: StatisticalMethod
    title: Time Series Analysis
    description: |-
      Time series analysis comprises methods for analyzing time series data in order to extract meaningful statistics and other characteristics of the data.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-TSA"
      kb-article: "## References Wikipedia. (n.d.). Time series. [Link](https://en.wikipedia.org/wiki/Time_series)"

  TimeSeriesDatabase:
    class_uri: d3f:TimeSeriesDatabase
    is_a: Database
    title: Time Series Database
    description: A specialized database optimized for storing and retrieving time-stamped data.
    annotations:
      owl_named_individual: "true"

  Timer:
    class_uri: d3f:Timer
    is_a: Clock
    mixins:
      - RuntimeVariable
    description: |-
      A timer or countdown timer is a type of clock that starts from a specified time duration and stops upon reaching 00:00. It can also usually be stopped manually before the whole duration has elapsed. An example of a simple timer is an hourglass. Commonly, a timer triggers an alarm when it ends. A timer can be implemented through hardware or software.
    see_also:
      - https://dbpedia.org/resource/Timer

  TimerEvent:
    class_uri: d3f:TimerEvent
    is_a: DigitalEvent
    title: Timer Event
    description: |-
      An event involving a timer artifact, characterized by the initiation, expiration, modification, or cancellation of a countdown or interval-based temporal mechanism.

  TimerExpirationEvent:
    class_uri: d3f:TimerExpirationEvent
    is_a: SoftwareTimerEvent
    title: Timer Expiration Event
    description: |-
      An event in which a software timer reaches its configured duration and triggers associated actions (callbacks, interrupts, or signals).

  TimerModificationEvent:
    class_uri: d3f:TimerModificationEvent
    is_a: SoftwareTimerEvent
    title: Timer Modification Event
    description: An event in which the duration or expiration time of an active timer is changed.

  TimerSetEvent:
    class_uri: d3f:TimerSetEvent
    is_a: SoftwareTimerEvent
    title: Timer Set Event
    description: An event in which a software timer is initialized with a specific duration or expiration time.

  Token_basedAuthentication:
