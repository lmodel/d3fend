  Page:
    class_uri: d3f:Page
    is_a: MemoryBlock
    description: |-
      A page, memory page, logical page, or virtual page is a fixed-length contiguous block of virtual memory, described by a single entry in the page table. It is the smallest unit of data for memory management in a virtual memory operating system.
    see_also:
      - https://dbpedia.org/page/Page_(computer_memory)

  PageFrame:
    class_uri: d3f:PageFrame
    is_a: MemoryBlock
    title: Page Frame
    description: |-
      A page frame is the smallest fixed-length contiguous block of physical memory into which memory pages are mapped by the operating system.
    see_also:
      - https://dbpedia.org/page/Page_(computer_memory)
    annotations:
      owl_named_individual: "true"

  PageTable:
    class_uri: d3f:PageTable
    is_a: DigitalInformationBearer
    title: Page Table
    description: |-
      A page table  is the data structure used by the MMU in a virtual memory computer system  to store the mapping between virtual addresses (virtual pages) and physical addresses (page frames).
    see_also:
      - http://dbpedia.org/resource/Page_table
    annotations:
      owl_named_individual: "true"

  Parameter_basedTransferLearning:
    class_uri: d3f:Parameter-basedTransferLearning
    is_a: HomogenousTransferLearning
    title: Parameter-based Transfer Learning
    description: |-
      The idea behind parameter-based methods is that a well-trained model on the source domain has learned a well-defined structure, and if two tasks are related, this structure can be transferred to the target model.
    aliases:
      - "Parameter-basedTransferLearning"
