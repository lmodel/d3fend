  FileInternalStructureVerification:
    class_uri: d3f:FileInternalStructureVerification
    is_a: FileFormatVerification
    title: File Internal Structure Verification
    description: |-
      The process of checking specific static values within a file, such as file signatures or magic numbers, to ensure they match the expected values defined by the file format specification.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FISV"
      kb-article: "## How it works File format specifications often define expected values for specific fields. A common example are file signatures, or magic numbers, which are used to quickly identify files. Another example is within the Compound Document Header of Microsoft Office files, the 29th and 30th byte ide"

  FileMagicByteVerification:
    class_uri: d3f:FileMagicByteVerification
    is_a: FileMetadataValueVerification
    title: File Magic Byte Verification
    description: Utilizing the magic number to verify the file
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FMBV"
      kb-article: "## How it works Many file formats use magic numbers to identify a file format or protocol. Verifying that the magic number matches the expected value of its declared format is a simple way of verifying the file format."

  FileMagicBytes:
    class_uri: d3f:FileMagicBytes
    is_a: FileHeaderBlockSignature
    title: File Magic Bytes
    description: "A specific type of header signature located at the beginning of a file, used to identify the file format."
    annotations:
      owl_named_individual: "true"

  FileMetadata:
    class_uri: d3f:FileMetadata
    is_a: Metadata
    title: File Metadata
    description: "Information that describes and provides context about a file's content, structure, and attributes."
    annotations:
      owl_named_individual: "true"

  FileMetadataConsistencyValidation:
    class_uri: d3f:FileMetadataConsistencyValidation
    is_a: FileFormatVerification
    title: File Metadata Consistency Validation
    description: |-
      The process of validating the consistency between a file's metadata and its actual content, ensuring that elements like declared lengths, pointers, and checksums accurately describe the file's content.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FMCV"
      kb-article: "## How it works This technique involves validating the consistency between a file's metadata and its actual content. It checks elements like declared lengths, pointers, and checksums to ensure they accurately describe the file's content. For instance, if a header specifies a content block of 50 byt"

  FileMetadataValueVerification:
    class_uri: d3f:FileMetadataValueVerification
    is_a: FileFormatVerification
    title: File Metadata Value Verification
    description: |-
      The process of checking specific static values within a file, such as file signatures or magic numbers, to ensure they match the expected values defined by the file format specification.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FMVV"

  FileMountEvent:
    class_uri: d3f:FileMountEvent
    is_a: FileEvent
    title: File Mount Event
    description: |-
      An event where a file system or storage volume is mounted, making its files and directories accessible to the operating system or applications.

  FilePathOpenFunction:
    class_uri: d3f:FilePathOpenFunction
    is_a: Subroutine
    title: File Path Open Function
    description: "Has an input of a file path, and opens a file handle for reading or writing."
    annotations:
      owl_named_individual: "true"

  FileRenamingEvent:
    class_uri: d3f:FileRenamingEvent
    is_a: FileEvent
    title: File Renaming Event
    description: |-
      An event representing the renaming of a file, modifying its identifier within the file system while retaining its content and metadata.

  FileSection:
    class_uri: d3f:FileSection
    is_a: DigitalInformationBearer
    title: File Section
    description: |-
      A file section is one of the portions of a file in which the file is regarded as divided and where together the file sections constitute the whole file.
    aliases:
      - "File Part"
    see_also:
      - http://wordnet-rdf.princeton.edu/id/05876035-n
    annotations:
      owl_named_individual: "true"

  FileServer:
    class_uri: d3f:FileServer
    is_a: Server
    title: File Server
    description: |-
      The term server highlights the role of the machine in the traditional client-server scheme, where the clients are the workstations using the storage. A file server does not normally perform computational tasks or run programs on behalf of its client workstations. File servers are commonly found in schools and offices, where users use a local area network to connect their client computers.
    see_also:
      - http://dbpedia.org/resource/File_server

  FileSetAttributesEvent:
    class_uri: d3f:FileSetAttributesEvent
    is_a: FileEvent
    title: File Set Attributes Event
    description: |-
      An event where a file's metadata attributes are modified, such as changing its timestamps, labels, or categorization within the system.

  FileSetPermissionsEvent:
    class_uri: d3f:FileSetPermissionsEvent
    is_a: FileEvent
    title: File Set Permissions Event
    description: |-
      An event involving the modification of a file's permissions or access control list (ACL), specifying which users or processes are granted or restricted access.

  FileShareService:
    class_uri: d3f:FileShareService
    is_a: NetworkService
    title: File Share Service
    description: A file sharing service (or file share service) provides the ability to share data across a network.
    see_also:
      - http://dbpedia.org/resource/File_sharing

  FileSystem:
    class_uri: d3f:FileSystem
    is_a: DigitalInformationBearer
    title: File System
    description: |-
      In computing, a file system or filesystem is used to control how data is stored and retrieved. Without a file system, information placed in a storage medium would be one large body of data with no way to tell where one piece of information stops and the next begins. By separating the data into pieces and giving each piece a name, the information is easily isolated and identified. Taking its name from the way paper-based information systems are named, each group of data is called a "file". The structure and logic rules used to manage the groups of information and their names is called a "file system".
    see_also:
      - http://dbpedia.org/resource/File_system
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:FileSystem

  FileSystemLink:
    class_uri: d3f:FileSystemLink
    is_a: DigitalInformationBearer
    title: File System Link
    description: |-
      A file system link associates a name with a file on a file system.  Most generally, this may be a direct reference (a hard link) or an indirect one (a soft link).
    see_also:
      - http://dbpedia.org/resource/Hard_link
    annotations:
      owl_named_individual: "true"

  FileSystemMetadata:
    class_uri: d3f:FileSystemMetadata
    is_a: Metadata
    title: File System Metadata
    description: |-
      Metadata about the files and directories in a file system.  For example file name, file length, time modified, group and user ids, and other file attributes.
    see_also:
      - http://dbpedia.org/resource/File_system#Metadata
    annotations:
      owl_named_individual: "true"

  FileSystemSensor:
    class_uri: d3f:FileSystemSensor
    is_a: EndpointSensor
    title: File System Sensor
    description: Collects files and file metadata on an endpoint.
    annotations:
      owl_named_individual: "true"

  FileTransferNetworkTraffic:
    class_uri: d3f:FileTransferNetworkTraffic
    is_a: NetworkTraffic
    title: File Transfer Network Traffic
    description: |-
      File transfer network traffic is network traffic related to file transfers between network nodes. This includes only network traffic conforming to standard file transfer protocols, not custom transfer protocols.
    annotations:
      owl_named_individual: "true"

  FileUnmountEvent:
    class_uri: d3f:FileUnmountEvent
    is_a: FileEvent
    title: File Unmount Event
    description: |-
      An event where a file system or storage volume is unmounted, disconnecting its files and directories from the operating system or applications.

  FileUpdateEvent:
    class_uri: d3f:FileUpdateEvent
    is_a: FileEvent
    title: File Update Event
    description: |-
      An event involving changes to the content or metadata of an existing file, reflecting updates that alter its state or properties.

  FingerPrintScannerInputDevice:
    class_uri: d3f:FingerPrintScannerInputDevice
    is_a: ImageScannerInputDevice
    title: Finger Print Scanner Input Device
    description: |-
      A fingerprint sensor is an electronic device used to capture a digital image of the fingerprint pattern. The captured image is called a live scan. This live scan is digitally processed to create a biometric template (a collection of extracted features) which is stored and used for matching. Many technologies have been used including optical, capacitive, RF, thermal, piezoresistive, ultrasonic, piezoelectric, and MEMS.
    aliases:
      - "Fingerprint Sensor"
    see_also:
      - http://dbpedia.org/resource/Fingerprint#Fingerprint_sensors

  Firewall:
    class_uri: d3f:Firewall
    is_a: ComputerNetworkNode
    description: |-
      In computing, a firewall is a network security system that monitors and controls incoming and outgoing network traffic based on predetermined security rules. A firewall typically establishes a barrier between a trusted internal network and untrusted external network, such as the Internet. Firewalls are often categorized as either network firewalls or host-based firewalls. Network firewalls filter traffic between two or more networks and run on network hardware. Host-based firewalls run on host computers and control network traffic in and out of those machines. This definition refers to network firewalls.
    aliases:
      - "Network Firewall"
    see_also:
      - http://dbpedia.org/resource/Firewall_(computing)
    annotations:
      owl_named_individual: "true"

  Firmware:
    class_uri: d3f:Firmware
    is_a: Software
    description: |-
      In electronic systems and computing, firmware is a type of software that provides control, monitoring and data manipulation of engineered products and systems. Typical examples of devices containing firmware are embedded systems (such as traffic lights, consumer appliances, remote controls and digital watches), computers, computer peripherals, mobile phones, and digital cameras. The firmware contained in these devices provides the low-level control program for the device.
    see_also:
      - http://dbpedia.org/resource/Firmware
    annotations:
      owl_named_individual: "true"

  FirmwareBehaviorAnalysis:
    class_uri: d3f:FirmwareBehaviorAnalysis
    is_a: PlatformMonitoring
    title: Firmware Behavior Analysis
    description: Analyzing the behavior of embedded code in firmware and looking for anomalous behavior and suspicious activity.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FBA"
      synonym: "Firmware Timing Analysis"
      kb-article: "## How it works Firmware behavior analysis provides protections by ensuring that installed firmware has not been tampered with or modified. Firmware analysis applies to mutable firmware and immutable read-only memory (ROMs). Firmware in deployed network devices is typically not analyzed and monitor"
    related_mappings:
      - attack:T1014
      - attack:T1542.001
      - attack:T1542.002
      - attack:T1542.004
    broad_mappings:
      - d3f:DefenseEvasionTechnique
      - d3f:T1542

  FirmwareEmbeddedMonitoringCode:
    class_uri: d3f:FirmwareEmbeddedMonitoringCode
    is_a: PlatformMonitoring
    title: Firmware Embedded Monitoring Code
    description: Monitoring code is injected into firmware for integrity monitoring of firmware and firmware data.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FEMC"
      kb-article: "## How it works Firmware in deployed network devices is typically not monitored for malicious changes. This technique provides a method to embed a software security component into the deployed firmware which provides a near real-time monitoring hook. The exception handling code, in the firmware, is"
    related_mappings:
      - attack:T1014
      - attack:T1542.001
      - attack:T1542.002
      - attack:T1542.004
    broad_mappings:
      - d3f:DefenseEvasionTechnique
      - d3f:T1542

  FirmwareSensor:
    class_uri: d3f:FirmwareSensor
    is_a: EndpointSensor
    title: Firmware Sensor
    description: Collects information on firmware installed on an Endpoint.
    annotations:
      owl_named_individual: "true"

  FirmwareVerification:
    class_uri: d3f:FirmwareVerification
    is_a: PlatformMonitoring
    title: Firmware Verification
    description: Cryptographically verifying firmware integrity.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FV"
      kb-article: "## How it works Cryptographic hash values are computed for system and peripheral firmware. The hash values are compared against precomputed hash values for the identified firmware. A hash value mismatch may indicate that the firmware may have been tampered with or updated with a non-current release"
    related_mappings:
      - attack:T1014
      - attack:T1542.001
      - attack:T1542.002
      - attack:T1542.004
    broad_mappings:
      - d3f:DefenseEvasionTechnique
      - d3f:T1542

  First_orderLogic:
    class_uri: d3f:First-orderLogic
    is_a: PredicateLogic
    title: First-order Logic
    description: |-
      First-order logic is a collection of formal systems used in mathematics, philosophy, linguistics, and computer science. First-order logic uses quantified variables over non-logical objects, and allows the use of sentences that contain variables.
    aliases:
      - "First-orderLogic"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-FOL"
      synonym: "FOL"
      kb-article: "## How it works For propositions such as \"Socrates is a man\", one can have expressions in the form \"there exists x such that x is Socrates and x is a man\", where \"there exists\" is a quantifier, while x is a variable. This distinguishes it from propositional logic, which does not use quantifiers or"

  First_stageBootLoader:
    class_uri: d3f:First-stageBootLoader
    is_a: BootLoader
    title: First-stage Boot Loader
    description: The very first routine run in order to load the operating system.
    aliases:
      - "First-stageBootLoader"

  FlashMemory:
    class_uri: d3f:FlashMemory
    is_a: SecondaryStorage
    title: Flash Memory
    description: |-
      Flash memory is an electronic non-volatile computer memory storage medium that can be electrically erased and reprogrammed.
    see_also:
      - https://dbpedia.org/page/Flash_memory

  Forecasting:
    class_uri: d3f:Forecasting
    is_a: AnalyticalPurpose

  ForwardProxyServer:
    class_uri: d3f:ForwardProxyServer
    is_a: ProxyServer
    title: Forward Proxy Server
    description: |-
      An forward (or open) proxy is a proxy server that is accessible by any Internet user. Generally, a proxy server only allows users within a network group (i.e. a closed proxy) to store and forward Internet services such as DNS or web pages to reduce and control the bandwidth used by the group. With an open proxy, however, any user on the Internet is able to use this forwarding service.
    see_also:
      - http://dbpedia.org/resource/Open_proxy

  ForwardResolutionDomainDenylisting:
    class_uri: d3f:ForwardResolutionDomainDenylisting
    is_a: DNSDenylisting
    title: Forward Resolution Domain Denylisting
    description: "Blocking a lookup based on the query's domain name value."
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FRDDL"
      synonym: "Forward Resolution Domain Blacklisting"
      kb-article: "## How it works Policies are created that filter DNS queries using fully qualified domain name (FQDN) of record in the query. A DNS policy can be created for blocking DNS queries from FQDNs that have been identified as unauthorized. ## Considerations Continuous maintenance of unauthorized domain"
    related_mappings:
      - attack:T1071.004
      - attack:T1568
    broad_mappings:
      - d3f:CommandAndControlTechnique
      - d3f:T1071

  ForwardResolutionIPDenylisting:
    class_uri: d3f:ForwardResolutionIPDenylisting
    is_a: DNSDenylisting
    title: Forward Resolution IP Denylisting
    description: "Blocking a DNS lookup's answer's IP address value."
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-FRIDL"
      synonym: "Forward Resolution IP Blacklisting"
      kb-article: "## How it works This technique prevents a client from learning IP addresses deemed to be potentially malicious, which would have been delivered via forward resolution responses. Responses to forward resolution requests (that is, requests where a domain is sent and IP(s) are returned) are collected"

