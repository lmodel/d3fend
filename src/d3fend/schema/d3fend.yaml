    title: Improper Protection of Physical Side Channels
    description: |-
      The device does not contain sufficient protection mechanisms to prevent physical side channels from exposing sensitive information due to patterns in physically observable phenomena such as variations in power consumption, electromagnetic emissions (EME), or acoustic emissions.
    aliases:
      - "CWE-1300"
    annotations:
      cwe-id: "CWE-1300"
    exact_mappings:
      - cwe:CWE-1300

  CWE_1301:
    class_uri: d3f:CWE-1301
    is_a: CWE_226
    title: Insufficient or Incomplete Data Removal within Hardware Component
    description: |-
      The product's data removal process does not completely delete all data and potentially sensitive information within hardware components.
    aliases:
      - "CWE-1301"
    annotations:
      cwe-id: "CWE-1301"
    exact_mappings:
      - cwe:CWE-1301

  CWE_1302:
    class_uri: d3f:CWE-1302
    is_a: CWE_1294
    title: Missing Security Identifier
    description: |-
      The product implements a security identifier mechanism to differentiate what actions are allowed or disallowed when a transaction originates from an entity. A transaction is sent without a security identifier.
    aliases:
      - "CWE-1302"
    annotations:
      cwe-id: "CWE-1302"
    exact_mappings:
      - cwe:CWE-1302

  CWE_1303:
    class_uri: d3f:CWE-1303
    is_a: CWE_1189
    mixins:
      - CWE_203
    title: Non-Transparent Sharing of Microarchitectural Resources
    description: |-
      Hardware structures shared across execution contexts (e.g., caches and branch predictors) can violate the expected architecture isolation between contexts.
    aliases:
      - "CWE-1303"
    annotations:
      cwe-id: "CWE-1303"
    exact_mappings:
      - cwe:CWE-1303

  CWE_1304:
    class_uri: d3f:CWE-1304
    is_a: CWE_284
    title: Improperly Preserved Integrity of Hardware Configuration State During a Power Save/Restore Operation
    description: |-
      The product performs a power save/restore operation, but it does not ensure that the integrity of the configuration state is maintained and/or verified between the beginning and ending of the operation.
    aliases:
      - "CWE-1304"
    annotations:
      cwe-id: "CWE-1304"
    exact_mappings:
      - cwe:CWE-1304

  CWE_131:
    class_uri: d3f:CWE-131
    is_a: CWE_682
    title: Incorrect Calculation of Buffer Size
    description: |-
      The product does not correctly calculate the size to be used when allocating a buffer, which could lead to a buffer overflow.
    aliases:
      - "CWE-131"
    annotations:
      cwe-id: "CWE-131"
    exact_mappings:
      - cwe:CWE-131

  CWE_1310:
    class_uri: d3f:CWE-1310
    is_a: CWE_1329
    title: Missing Ability to Patch ROM Code
    description: Missing an ability to patch ROM code may leave a System or System-on-Chip (SoC) in a vulnerable state.
    aliases:
      - "CWE-1310"
    annotations:
      cwe-id: "CWE-1310"
    exact_mappings:
      - cwe:CWE-1310

  CWE_1311:
    class_uri: d3f:CWE-1311
    is_a: CWE_284
    title: Improper Translation of Security Attributes by Fabric Bridge
    description: |-
      The bridge incorrectly translates security attributes from either trusted to untrusted or from untrusted to trusted when converting from one fabric protocol to another.
    aliases:
      - "CWE-1311"
    annotations:
      cwe-id: "CWE-1311"
    exact_mappings:
      - cwe:CWE-1311

  CWE_1312:
    class_uri: d3f:CWE-1312
    is_a: CWE_284
    title: Missing Protection for Mirrored Regions in On-Chip Fabric Firewall
    description: |-
      The firewall in an on-chip fabric protects the main addressed region, but it does not protect any mirrored memory or memory-mapped-IO (MMIO) regions.
    aliases:
      - "CWE-1312"
    annotations:
      cwe-id: "CWE-1312"
    exact_mappings:
      - cwe:CWE-1312

  CWE_1313:
    class_uri: d3f:CWE-1313
    is_a: CWE_284
    title: Hardware Allows Activation of Test or Debug Logic at Runtime
    description: |-
      During runtime, the hardware allows for test or debug logic (feature) to be activated, which allows for changing the state of the hardware. This feature can alter the intended behavior of the system and allow for alteration and leakage of sensitive data by an adversary.
    aliases:
      - "CWE-1313"
    annotations:
      cwe-id: "CWE-1313"
    exact_mappings:
      - cwe:CWE-1313

  CWE_1314:
    class_uri: d3f:CWE-1314
    is_a: CWE_862
    title: Missing Write Protection for Parametric Data Values
    description: |-
      The device does not write-protect the parametric data values for sensors that scale the sensor value, allowing untrusted software to manipulate the apparent result and potentially damage hardware or cause operational failure.
    aliases:
      - "CWE-1314"
    annotations:
      cwe-id: "CWE-1314"
    exact_mappings:
      - cwe:CWE-1314

  CWE_1315:
    class_uri: d3f:CWE-1315
    is_a: CWE_284
    title: Improper Setting of Bus Controlling Capability in Fabric End-point
    description: |-
      The bus controller enables bits in the fabric end-point to allow responder devices to control transactions on the fabric.
    aliases:
      - "CWE-1315"
    annotations:
      cwe-id: "CWE-1315"
    exact_mappings:
      - cwe:CWE-1315

  CWE_1316:
    class_uri: d3f:CWE-1316
    is_a: CWE_284
    title: Fabric-Address Map Allows Programming of Unwarranted Overlaps of Protected and Unprotected Ranges
    description: |-
      The address map of the on-chip fabric has protected and unprotected regions overlapping, allowing an attacker to bypass access control to the overlapping portion of the protected region.
    aliases:
      - "CWE-1316"
    annotations:
      cwe-id: "CWE-1316"
    exact_mappings:
      - cwe:CWE-1316

  CWE_1317:
    class_uri: d3f:CWE-1317
    is_a: CWE_284
    title: Improper Access Control in Fabric Bridge
    description: |-
      The product uses a fabric bridge for transactions between two Intellectual Property (IP) blocks, but the bridge does not properly perform the expected privilege, identity, or other access control checks between those IP blocks.
    aliases:
      - "CWE-1317"
    annotations:
      cwe-id: "CWE-1317"
    exact_mappings:
      - cwe:CWE-1317

  CWE_1318:
    class_uri: d3f:CWE-1318
    is_a: CWE_693
    title: Missing Support for Security Features in On-chip Fabrics or Buses
    description: |-
      On-chip fabrics or buses either do not support or are not configured to support privilege separation or other security features, such as access control.
    aliases:
      - "CWE-1318"
    annotations:
      cwe-id: "CWE-1318"
    exact_mappings:
      - cwe:CWE-1318

  CWE_1319:
    class_uri: d3f:CWE-1319
    is_a: CWE_693
    title: Improper Protection against Electromagnetic Fault Injection (EM-FI)
    description: |-
      The device is susceptible to electromagnetic fault injection attacks, causing device internal information to be compromised or security mechanisms to be bypassed.
    aliases:
      - "CWE-1319"
    annotations:
      cwe-id: "CWE-1319"
    exact_mappings:
      - cwe:CWE-1319

  CWE_1320:
    class_uri: d3f:CWE-1320
    is_a: CWE_284
    title: Improper Protection for Outbound Error Messages and Alert Signals
    description: |-
      Untrusted agents can disable alerts about signal conditions exceeding limits or the response mechanism that handles such alerts.
    aliases:
      - "CWE-1320"
    annotations:
      cwe-id: "CWE-1320"
    exact_mappings:
      - cwe:CWE-1320

  CWE_1321:
    class_uri: d3f:CWE-1321
    is_a: CWE_915
    title: "Improperly Controlled Modification of Object Prototype Attributes ('Prototype Pollution')"
    description: |-
      The product receives input from an upstream component that specifies attributes that are to be initialized or updated in an object, but it does not properly control modifications of attributes of the object prototype.
    aliases:
      - "CWE-1321"
    annotations:
      cwe-id: "CWE-1321"
    exact_mappings:
      - cwe:CWE-1321

  CWE_1322:
    class_uri: d3f:CWE-1322
    is_a: CWE_834
    title: "Use of Blocking Code in Single-threaded, Non-blocking Context"
    description: |-
      The product uses a non-blocking model that relies on a single threaded process for features such as scalability, but it contains code that can block when it is invoked.
    aliases:
      - "CWE-1322"
    annotations:
      cwe-id: "CWE-1322"
    exact_mappings:
      - cwe:CWE-1322

  CWE_1323:
    class_uri: d3f:CWE-1323
    is_a: CWE_284
    title: Improper Management of Sensitive Trace Data
    description: |-
      Trace data collected from several sources on the System-on-Chip (SoC) is stored in unprotected locations or transported to untrusted agents.
    aliases:
      - "CWE-1323"
    annotations:
      cwe-id: "CWE-1323"
    exact_mappings:
      - cwe:CWE-1323

  CWE_1325:
    class_uri: d3f:CWE-1325
    is_a: CWE_770
    title: Improperly Controlled Sequential Memory Allocation
    description: |-
      The product manages a group of objects or resources and performs a separate memory allocation for each object, but it does not properly limit the total amount of memory that is consumed by all of the combined objects.
    aliases:
      - "CWE-1325"
    annotations:
      cwe-id: "CWE-1325"
      synonym: "Stack Exhaustion"
    exact_mappings:
      - cwe:CWE-1325

  CWE_1326:
    class_uri: d3f:CWE-1326
    is_a: CWE_693
    title: Missing Immutable Root of Trust in Hardware
    description: |-
      A missing immutable root of trust in the hardware results in the ability to bypass secure boot or execute untrusted or adversarial boot code.
    aliases:
      - "CWE-1326"
    annotations:
      cwe-id: "CWE-1326"
    exact_mappings:
      - cwe:CWE-1326

  CWE_1327:
    class_uri: d3f:CWE-1327
    is_a: CWE_668
    title: Binding to an Unrestricted IP Address
    description: |-
      The product assigns the address 0.0.0.0 for a database server, a cloud service/instance, or any computing resource that communicates remotely.
    aliases:
      - "CWE-1327"
    annotations:
      cwe-id: "CWE-1327"
    exact_mappings:
      - cwe:CWE-1327

  CWE_1328:
    class_uri: d3f:CWE-1328
    is_a: CWE_285
    title: Security Version Number Mutable to Older Versions
    description: |-
      Security-version number in hardware is mutable, resulting in the ability to downgrade (roll-back) the boot firmware to vulnerable code versions.
    aliases:
      - "CWE-1328"
    annotations:
      cwe-id: "CWE-1328"
    exact_mappings:
      - cwe:CWE-1328

  CWE_1329:
    class_uri: d3f:CWE-1329
    is_a: CWE_1357
    mixins:
      - CWE_664
    title: Reliance on Component That is Not Updateable
    description: |-
      The product contains a component that cannot be updated or patched in order to remove vulnerabilities or significant bugs.
    aliases:
      - "CWE-1329"
    annotations:
      cwe-id: "CWE-1329"
    exact_mappings:
      - cwe:CWE-1329

  CWE_1330:
    class_uri: d3f:CWE-1330
    is_a: CWE_1301
    title: Remanent Data Readable after Memory Erase
    description: Confidential information stored in memory circuits is readable or recoverable after being cleared or erased.
    aliases:
      - "CWE-1330"
    annotations:
      cwe-id: "CWE-1330"
    exact_mappings:
      - cwe:CWE-1330

  CWE_1331:
    class_uri: d3f:CWE-1331
    is_a: CWE_653
    mixins:
      - CWE_668
    title: Improper Isolation of Shared Resources in Network On Chip (NoC)
    description: |-
      The Network On Chip (NoC) does not isolate or incorrectly isolates its on-chip-fabric and internal resources such that they are shared between trusted and untrusted agents, creating timing channels.
    aliases:
      - "CWE-1331"
    annotations:
      cwe-id: "CWE-1331"
    exact_mappings:
      - cwe:CWE-1331

  CWE_1332:
    class_uri: d3f:CWE-1332
    is_a: CWE_1384
    title: Improper Handling of Faults that Lead to Instruction Skips
    description: |-
      The device is missing or incorrectly implements circuitry or sensors that detect and mitigate the skipping of security-critical CPU instructions when they occur.
    aliases:
      - "CWE-1332"
    annotations:
      cwe-id: "CWE-1332"
    exact_mappings:
      - cwe:CWE-1332

  CWE_1333:
    class_uri: d3f:CWE-1333
    is_a: CWE_407
    title: Inefficient Regular Expression Complexity
    description: |-
      The product uses a regular expression with an inefficient, possibly exponential worst-case computational complexity that consumes excessive CPU cycles.
    aliases:
      - "CWE-1333"
    annotations:
      cwe-id: "CWE-1333"
      synonym: "Catastrophic backtracking"
    exact_mappings:
      - cwe:CWE-1333

  CWE_1334:
    class_uri: d3f:CWE-1334
    is_a: CWE_284
    title: Unauthorized Error Injection Can Degrade Hardware Redundancy
    description: |-
      An unauthorized agent can inject errors into a redundant block to deprive the system of redundancy or put the system in a degraded operating mode.
    aliases:
      - "CWE-1334"
    annotations:
      cwe-id: "CWE-1334"
    exact_mappings:
      - cwe:CWE-1334

  CWE_1335:
    class_uri: d3f:CWE-1335
    is_a: CWE_682
    title: Incorrect Bitwise Shift of Integer
    description: |-
      An integer value is specified to be shifted by a negative amount or an amount greater than or equal to the number of bits contained in the value causing an unexpected or indeterminate result.
    aliases:
      - "CWE-1335"
    annotations:
      cwe-id: "CWE-1335"
    exact_mappings:
      - cwe:CWE-1335

  CWE_1336:
    class_uri: d3f:CWE-1336
    is_a: CWE_94
    title: Improper Neutralization of Special Elements Used in a Template Engine
    description: |-
      The product uses a template engine to insert or process externally-influenced input, but it does not neutralize or incorrectly neutralizes special elements or syntax that can be interpreted as template expressions or other code directives when processed by the engine.
    aliases:
      - "CWE-1336"
    annotations:
      cwe-id: "CWE-1336"
      synonym: "Client-Side Template Injection / CSTI"
    exact_mappings:
      - cwe:CWE-1336

  CWE_1338:
    class_uri: d3f:CWE-1338
    is_a: CWE_693
    title: Improper Protections Against Hardware Overheating
    description: A hardware device is missing or has inadequate protection features to prevent overheating.
    aliases:
      - "CWE-1338"
    annotations:
      cwe-id: "CWE-1338"
    exact_mappings:
      - cwe:CWE-1338

  CWE_1339:
    class_uri: d3f:CWE-1339
    is_a: CWE_682
    title: Insufficient Precision or Accuracy of a Real Number
    description: |-
      The product processes a real number with an implementation in which the number's representation does not preserve required accuracy and precision in its fractional part, causing an incorrect result.
    aliases:
      - "CWE-1339"
    annotations:
      cwe-id: "CWE-1339"
    exact_mappings:
      - cwe:CWE-1339

  CWE_134:
    class_uri: d3f:CWE-134
    is_a: CWE_668
    title: Use of Externally-Controlled Format String
    description: |-
      The product uses a function that accepts a format string as an argument, but the format string originates from an external source.
    aliases:
      - "CWE-134"
    annotations:
      cwe-id: "CWE-134"
    exact_mappings:
      - cwe:CWE-134

  CWE_1341:
    class_uri: d3f:CWE-1341
    is_a: CWE_675
    title: Multiple Releases of Same Resource or Handle
    description: |-
      The product attempts to close or release a resource or handle more than once, without any successful open between the close operations.
    aliases:
      - "CWE-1341"
    annotations:
      cwe-id: "CWE-1341"
    exact_mappings:
      - cwe:CWE-1341

  CWE_1342:
    class_uri: d3f:CWE-1342
    is_a: CWE_226
    title: Information Exposure through Microarchitectural State after Transient Execution
    description: |-
      The processor does not properly clear microarchitectural state after incorrect microcode assists or speculative execution, resulting in transient execution.
    aliases:
      - "CWE-1342"
    annotations:
      cwe-id: "CWE-1342"
    exact_mappings:
      - cwe:CWE-1342

  CWE_135:
    class_uri: d3f:CWE-135
    is_a: CWE_682
    title: Incorrect Calculation of Multi-Byte String Length
    description: The product does not correctly calculate the length of strings that can contain wide or multi-byte characters.
    aliases:
      - "CWE-135"
    annotations:
      cwe-id: "CWE-135"
    exact_mappings:
      - cwe:CWE-135

  CWE_1351:
    class_uri: d3f:CWE-1351
    is_a: CWE_1384
    title: Improper Handling of Hardware Behavior in Exceptionally Cold Environments
    description: |-
      A hardware device, or the firmware running on it, is missing or has incorrect protection features to maintain goals of security primitives when the device is cooled below standard operating temperatures.
    aliases:
      - "CWE-1351"
    annotations:
      cwe-id: "CWE-1351"
    exact_mappings:
      - cwe:CWE-1351

  CWE_1357:
    class_uri: d3f:CWE-1357
    is_a: CWE_710
    title: Reliance on Insufficiently Trustworthy Component
    description: |-
      The product is built from multiple separate components, but it uses a component that is not sufficiently trusted to meet expectations for security, reliability, updateability, and maintainability.
    aliases:
      - "CWE-1357"
    annotations:
      cwe-id: "CWE-1357"
    exact_mappings:
      - cwe:CWE-1357

  CWE_138:
    class_uri: d3f:CWE-138
    is_a: CWE_707
    title: Improper Neutralization of Special Elements
    description: |-
      The product receives input from an upstream component, but it does not neutralize or incorrectly neutralizes special elements that could be interpreted as control elements or syntactic markers when they are sent to a downstream component.
    aliases:
      - "CWE-138"
    annotations:
      cwe-id: "CWE-138"
    exact_mappings:
      - cwe:CWE-138

  CWE_1384:
    class_uri: d3f:CWE-1384
    is_a: CWE_703
    title: Improper Handling of Physical or Environmental Conditions
    description: |-
      The product does not properly handle unexpected physical or environmental conditions that occur naturally or are artificially induced.
    aliases:
      - "CWE-1384"
    annotations:
      cwe-id: "CWE-1384"
    exact_mappings:
      - cwe:CWE-1384

  CWE_1385:
    class_uri: d3f:CWE-1385
    is_a: CWE_346
    title: Missing Origin Validation in WebSockets
    description: "The product uses a WebSocket, but it does not properly verify that the source of data or communication is valid."
    aliases:
      - "CWE-1385"
    annotations:
      cwe-id: "CWE-1385"
      synonym: "Cross-Site WebSocket hijacking (CSWSH)"
    exact_mappings:
      - cwe:CWE-1385

  CWE_1386:
    class_uri: d3f:CWE-1386
    is_a: CWE_59
    title: Insecure Operation on Windows Junction / Mount Point
    description: |-
      The product opens a file or directory, but it does not properly prevent the name from being associated with a junction or mount point to a destination that is outside of the intended control sphere.
    aliases:
      - "CWE-1386"
    annotations:
      cwe-id: "CWE-1386"
    exact_mappings:
      - cwe:CWE-1386

  CWE_1389:
    class_uri: d3f:CWE-1389
    is_a: CWE_704
    title: Incorrect Parsing of Numbers with Different Radices
    description: |-
      The product parses numeric input assuming base 10 (decimal) values, but it does not account for inputs that use a different base number (radix).
    aliases:
      - "CWE-1389"
    annotations:
      cwe-id: "CWE-1389"
    exact_mappings:
      - cwe:CWE-1389

  CWE_1390:
    class_uri: d3f:CWE-1390
    is_a: CWE_287
    title: Weak Authentication
    description: |-
      The product uses an authentication mechanism to restrict access to specific users or identities, but the mechanism does not sufficiently prove that the claimed identity is correct.
    aliases:
      - "CWE-1390"
    annotations:
      cwe-id: "CWE-1390"
    exact_mappings:
      - cwe:CWE-1390

  CWE_1391:
    class_uri: d3f:CWE-1391
    is_a: CWE_1390
    title: Use of Weak Credentials
    description: |-
      The product uses weak credentials (such as a default key or hard-coded password) that can be calculated, derived, reused, or guessed by an attacker.
    aliases:
      - "CWE-1391"
    annotations:
      cwe-id: "CWE-1391"
    exact_mappings:
      - cwe:CWE-1391

  CWE_1392:
    class_uri: d3f:CWE-1392
    is_a: CWE_1391
    title: Use of Default Credentials
    description: The product uses default credentials (such as passwords or cryptographic keys) for potentially critical functionality.
    aliases:
      - "CWE-1392"
    annotations:
      cwe-id: "CWE-1392"
    exact_mappings:
      - cwe:CWE-1392

  CWE_1393:
    class_uri: d3f:CWE-1393
    is_a: CWE_1392
    title: Use of Default Password
    description: The product uses default passwords for potentially critical functionality.
    aliases:
      - "CWE-1393"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-1393"
    exact_mappings:
      - cwe:CWE-1393

  CWE_1394:
    class_uri: d3f:CWE-1394
    is_a: CWE_1392
    title: Use of Default Cryptographic Key
    description: The product uses a default cryptographic key for potentially critical functionality.
    aliases:
      - "CWE-1394"
    annotations:
      cwe-id: "CWE-1394"
    exact_mappings:
      - cwe:CWE-1394

  CWE_1395:
    class_uri: d3f:CWE-1395
    is_a: CWE_657
    title: Dependency on Vulnerable Third-Party Component
    description: The product has a dependency on a third-party component that contains one or more known vulnerabilities.
    aliases:
      - "CWE-1395"
    annotations:
      cwe-id: "CWE-1395"
    exact_mappings:
      - cwe:CWE-1395

  CWE_14:
    class_uri: d3f:CWE-14
    is_a: CWE_733
