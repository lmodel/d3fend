      - d3f:T1505

  LogicalRules:
    class_uri: d3f:LogicalRules
    is_a: SymbolicLogic
    title: Logical Rules
    description: |-
      A logical rule matches event data or set of values to a conditional expression and results in the determination of a truth value, which may be used to determine the next action or step to take.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-LR"
      kb-article: "## How it works Logic rules define a set of patterns that in some patterns must match input data. If the the conditions are met, then the rule will \"fire\" and some action will be taken, usually notifying a person or another system that the event being monitored needs further processing or attention"

  LoginSession:
    class_uri: d3f:LoginSession
    is_a: Session
    title: Login Session
    description: |-
      In computing, a login session is the period of activity between a user logging in and logging out of a (multi-user) system. This includes local login sessions, where a user has direct physical access to a computer, as well as domain login sessions, where a user logs into a computer that is part of a network domain.
    aliases:
      - "Logon Session"
    see_also:
      - https://learn.microsoft.com/en-us/windows-server/security/windows-authentication/windows-logon-scenarios
      - http://dbpedia.org/resource/Login_session
    annotations:
      owl_named_individual: "true"

  LogisticRegression:
    class_uri: d3f:LogisticRegression
    is_a: RegressionAnalysis
