  UserGroup:
    class_uri: d3f:UserGroup
    is_a: AccessControlGroup
    title: User Group
    description: |-
      User groups are a way to collect user accounts and/or computer accounts into manageable units. Administrators can assign permissions, roles, or access to resources, as well as modify group membership, depending on the operating system.
    annotations:
      owl_named_individual: "true"
      synonym: "Security Group"

  UserGroupPermissions:
    class_uri: d3f:UserGroupPermissions
    is_a: AccessPolicyAdministration
    title: User Group Permissions
    description: Access control where access is determined based on attributes associated with users and the objects being accessed.
    see_also:
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-82r3.pdf
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3F-UGPH"
      synonym: "Role Based Access Controls"
      kb-article: "## How it works Access is determined based on the attributes associated with subjects (requesters) and the objects being accessed. Each object and subject has a set of associated attributes, such as location, time of creation, and access rights. Access to an object is authorized or denied depending"

  UserInitConfigurationFile:
    class_uri: d3f:UserInitConfigurationFile
    is_a: ConfigurationFile
    mixins:
      - UserLogonInitResource
    title: User Init Configuration File
    description: |-
      A user initialization configuration file is a file containing the information necessary to configure that part of a user's environment which is common to all applications and actions. User configurations may be overridden by more specific configuration information (such as that found in a application configuration file.)
    aliases:
      - "User Configuration File"
    annotations:
      owl_named_individual: "true"

  UserInitScript:
    class_uri: d3f:UserInitScript
    is_a: ExecutableScript
    mixins:
      - InitScript
      - UserLogonInitResource
    title: User Init Script
    description: "A script used to initialize and configure elements of the user's applications and user environment."
    annotations:
      owl_named_individual: "true"

  UserInputFunction:
    class_uri: d3f:UserInputFunction
    is_a: InputFunction
    title: User Input Function
    description: Generic function that receives direct user input from an untrusted source.
    annotations:
      owl_named_individual: "true"

  UserInterface:
    class_uri: d3f:UserInterface
    is_a: DigitalInformationBearer
    title: User Interface
    description: |-
      The user interface (UI), in the industrial design field of human-machine interaction, is the space where interactions between humans and machines occur. The goal of this interaction is to allow effective operation and control of the machine from the human end, whilst the machine simultaneously feeds back information that aids the operators' decision-making process. Examples of this broad concept of user interfaces include the interactive aspects of computer operating systems, hand tools, heavy machinery operator controls, and process controls. The design considerations applicable when creating user interfaces are related to or involve such disciplines as ergonomics and psychology.
    aliases:
      - "UI"
    see_also:
      - http://dbpedia.org/resource/User_interface

  UserLogonInitResource:
    class_uri: d3f:UserLogonInitResource
    is_a: LocalResource
    title: User Logon Init Resource
    description: |-
      A user logon initialization resource contains information used to configure a user's environment when a user logs into a system.
    annotations:
      owl_named_individual: "true"

  UserManualReference:
    class_uri: d3f:UserManualReference
    is_a: TechniqueReference
    title: User Manual Reference
    annotations:
      pref-label: "User Manual"

  UserProcess:
    class_uri: d3f:UserProcess
    is_a: Process
    title: User Process
    description: |-
      A user process is a process running to perform functions in the name of on particular user and user account, such as run an application or application service serving any number users.  This is in contrast to a system process, which executes software to fulfill operating system functions.
    annotations:
      owl_named_individual: "true"
    close_mappings:
      - stix:Process
    broad_mappings:
      - unified_cyber_ontology:Process

  UserProfile:
    class_uri: d3f:UserProfile
    is_a: DigitalInformationBearer
    title: User Profile
    description: |-
      A user profile is a collection of settings and information associated with a user. It contains critical information that is used to identify an individual, such as their name, age, portrait photograph and individual characteristics such as knowledge or expertise.
    see_also:
      - https://en.wikipedia.org/wiki/User_profile
      - http://dbpedia.org/resource/User_profile

  UserSessionInitConfigAnalysis:
    class_uri: d3f:UserSessionInitConfigAnalysis
    is_a: OperatingSystemMonitoring
    title: User Session Init Config Analysis
    description: Analyzing modifications to user session config files such as .bashrc or .bash_profile.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-USICA"
      synonym: "User Startup Config Analysis"
    related_mappings:
      - attack:T1546.004
      - attack:T1564.002
    broad_mappings:
      - d3f:T1546
      - d3f:T1564

  UserStartupDirectory:
    class_uri: d3f:UserStartupDirectory
    is_a: UserLogonInitResource
    title: User Startup Directory
    description: A user startup directory holds information necessary to start the users session with the system.
    annotations:
      owl_named_individual: "true"

  UserStartupScriptFile:
    class_uri: d3f:UserStartupScriptFile
    is_a: ExecutableScript
    mixins:
      - UserLogonInitResource
    title: User Startup Script File
    description: |-
      A user startup script file is a shortcut file that is executed when a user logs in and starts a session on the host.  These indicate applications the user wants started at login.  For Windows, these are typically found in the user's startup directory.
    annotations:
      owl_named_individual: "true"

  UserToUserMessage:
    class_uri: d3f:UserToUserMessage
    is_a: DigitalMessage
    title: User to User Message
    description: |-
      Personal message, private message (PM), direct message (DM), or personal chat (PC) is a private form of messaging between different members on a given platform. It is only seen and accessible by the users participating in the message.
    aliases:
      - "Personal Message"
      - "Private Message"
    see_also:
      - http://dbpedia.org/resource/Personal_message
    annotations:
      owl_named_individual: "true"

  UtilitySoftware:
    class_uri: d3f:UtilitySoftware
    is_a: Software
    title: Utility Software
    description: |-
      Utility applications are software applications designed to help to analyze, configure, optimize or maintain a computer. It is used to support the computer infrastructure - in contrast to application software, which is aimed at directly performing tasks that benefit ordinary users. However, utilities often form part of the application systems. For example, a batch job may run user-written code to update a database and may then include a step that runs a utility to back up the database, or a job may run a utility to compress a disk before copying files.
    aliases:
      - "Utility Application"
    see_also:
      - http://dbpedia.org/resource/Utility_software

  VMImage:
    class_uri: d3f:VMImage
    is_a: StorageImage
    title: Virtual Machine Image
    description: |-
      A Virtual Machine Image (VMI) is a file that encapsulates the entire state of a virtual machine at a given point in time. This includes the operating system, applications, data, and configurations. VMIs are used to create and replicate virtual machines, ensuring consistency and reliability across different environments.
    aliases:
      - "VM Image"
    see_also:
      - https://dbpedia.org/resource/Virtual_machine_image
      - https://www.ituonline.com/tech-definitions/what-is-a-virtual-machine-image/
    annotations:
      owl_named_individual: "true"

  VPNServer:
    class_uri: d3f:VPNServer
    is_a: Server
    title: VPN Server
    description: |-
      A VPN server is a type of server that enables hosting and delivery of VPN services.

      It is a combination of VPN hardware and software technologies that provides VPN clients with connectivity to a secure and/or private network, or rather, the VPN.
    see_also:
      - http://dbpedia.org/resource/Virtual_private_network
      - https://www.techopedia.com/definition/30750/vpn-server

  Variability:
    class_uri: d3f:Variability
    is_a: DescriptiveStatistics
    description: |-
      Dispersion (also called variability, scatter, or spread) is the extent to which a distribution is stretched or squeezed. A measure of statistical dispersion is a nonnegative real number that is zero if all the data are the same and increases as the data become more diverse.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-VAR"
      kb-article: "## References Wikipedia. (n.d.). Statistical dispersion. [Link](https://en.wikipedia.org/wiki/Statistical_dispersion)"

  VariableInitialization:
    class_uri: d3f:VariableInitialization
    is_a: SourceCodeHardening
    title: Variable Initialization
    description: Setting variables to a known value before use.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-VI"
      kb-article: "## How it Works Initializing variables upon declaration ensures that the variable has a known quantity before use. ## Considerations * Default behavior when declaring variables varies by language. * This is particularly important in programming languages that do not initialize variables to a defaul"
    related_mappings:
      - attack:T1505.001
    broad_mappings:
      - d3f:T1505

  VariableTypeValidation:
    class_uri: d3f:VariableTypeValidation
    is_a: SourceCodeHardening
    title: Variable Type Validation
    description: Ensuring that a variable has the correct type.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-VTV"
      kb-article: "## How it Works A developer should consider how the variable will be used throughout the program and choose the correct variable type. A developer should programmatically check if a variable has the correct (expected) type before using that variable. ## Considerations * The result of an operation o"

  Variance:
    class_uri: d3f:Variance
    is_a: Variability
    description: |-
      Variance is a measure of dispersion, meaning it is a measure of how far a set of numbers is spread out from their average value.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-VAR"
      kb-article: "## References Wikipedia. (n.d.). Variance. [Link](https://en.wikipedia.org/wiki/Variance)"

  VarianceReduction:
    class_uri: d3f:VarianceReduction
    is_a: ActiveLearning
    title: Variance Reduction
    description: |-
      Leverages a well-known result from statistical learning and decomposes the model error into a data noise term, a model bias term and a model variance term. As the noise term only depends on the data and the bias is induced by the choice of model, any reduction in the error can only come from the variance term.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-VR"
      kb-article: "## References Intro to Active Learning. inovex Blog. [Link](https://www.inovex.de/de/blog/intro-to-active-learning/)."

  VectorImage:
    class_uri: d3f:VectorImage
    is_a: DigitalImage
    title: Vector Image
    description: A graphical image created using mathematical equations and geometric shapes defined by vectors.
    annotations:
      owl_named_individual: "true"

  VectorImageFile:
    class_uri: d3f:VectorImageFile
    is_a: ImageFile
    title: Vector Image File
    description: A file that contains graphics data represented by vectors.
    annotations:
      owl_named_individual: "true"

  Vehicle:
    class_uri: d3f:Vehicle
    is_a: PhysicalArtifact
    description: "A vehicle is a machine designed for self-propulsion, usually to transport people, cargo, or both."
    see_also:
      - http://dbpedia.org/resource/Vehicle

  VehicleOperatingMode:
    class_uri: d3f:VehicleOperatingMode
    is_a: OperatingMode
    title: Vehicle Operating Mode

  Vendor:
    class_uri: d3f:Vendor
    is_a: Provider
    description: A vendor sells or supplies goods and services to customers.

  VersionControlTool:
    class_uri: d3f:VersionControlTool
    is_a: DeveloperApplication
    title: Version Control Tool
    description: |-
      Version control tools are tools that used to conduct version control. A  component of software configuration management, version control, also known as revision control, source control, or source code management systems are systems responsible for the management of changes to documents, computer programs, large web sites, and other collections of information. Changes are usually identified by a number or letter code, termed the "revision number", "revision level", or simply "revision". For example, an initial set of files is "revision 1". When the first change is made, the resulting set is "revision 2", and so on. Each revision is associated with a timestamp and the person making the change. Revisions can be compared, restored, and with some types of files, merged.
    aliases:
      - "Revision Control"
      - "Source Control"
    see_also:
      - http://dbpedia.org/resource/Software_configuration_management
      - http://dbpedia.org/resource/Version_control

  VideoInputDevice:
    class_uri: d3f:VideoInputDevice
    is_a: InputDevice
    title: Video Input Device
    description: |-
      Video input devices are used to digitize images or video from the outside world into the computer. The information can be stored in a multitude of formats depending on the user's requirement.
    see_also:
      - http://dbpedia.org/resource/Input_device#Video_input_devices
    annotations:
      owl_named_individual: "true"

  VideoSurveillance:
    class_uri: d3f:VideoSurveillance
    is_a: PhysicalAccessMonitoring
    title: Video Surveillance
    description: |-
      Monitoring of physical areas via camera video feeds to deter, detect, and investigate unauthorized access and related security events.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-VS"
      synonym: "CCTV Surveillance"
      kb-article: "## How it works Video surveillance uses digital cameras that stream to a video management system (VMS) or network video recorder (NVR) for live monitoring, recording, and retrieval. Recording can be continuous or event-driven using analytics (motion in regions of interest, line crossing) or externa"
    related_mappings:
      - attack:T1125
    broad_mappings:
      - d3f:CollectionTechnique

  VirtualAddress:
    class_uri: d3f:VirtualAddress
    is_a: MemoryAddress
    title: Virtual Address
    description: |-
      A virtual address in memory is a pointer or marker for a memory space that an operating system allows a process to use. The virtual address points to a location in primary storage that a process can use independently of other processes.
    see_also:
      - https://dbpedia.org/page/Virtual_address_space
      - https://en.wikipedia.org/wiki/Memory_address#Logical_addresses
      - https://www.techopedia.com/definition/9934/virtual-address-va
    annotations:
      owl_named_individual: "true"
      synonym: "Logical Address"

  VirtualMemorySpace:
    class_uri: d3f:VirtualMemorySpace
    is_a: MemoryAddressSpace
    title: Virtual Memory Space
    description: |-
      Virtual memory is a memory management technique where secondary memory can be used as if it were a part of the main memory. Virtual memory uses hardware and software to enable a computer to compensate for physical memory shortages
    see_also:
      - https://dbpedia.org/page/Virtual_memory
      - https://whatis.techtarget.com/definition/memory

  VirtualizationSoftware:
    class_uri: d3f:VirtualizationSoftware
    is_a: ServiceApplication
    title: Virtualization Software
    description: |-
      Virtualization software allows a single host computer to create and run one or more virtual environments. Virtualization software is most often used to emulate a complete computer system in order to allow a guest operating system to be run, for example allowing Linux to run as a guest on top of a PC that is natively running a Microsoft Windows operating system (or the inverse, running Windows as a guest on Linux).
    see_also:
      - http://dbpedia.org/resource/Category:Virtualization_software
    annotations:
      owl_named_individual: "true"

  Volume:
    class_uri: d3f:Volume
    is_a: DigitalInformationBearer
    description: |-
      In the context of computer operating systems, a volume or logical drive is a single accessible storage area with a single file system, typically (though not necessarily) resident on a single partition of a hard disk. Although a volume might be different from a physical disk drive, it can still be accessed with an operating system's logical interface. However, a volume differs from a partition.
    aliases:
      - "Drive Volume"
      - "Logical Drive"
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - unified_cyber_ontology:Volume

  VolumeBootRecord:
    class_uri: d3f:VolumeBootRecord
    is_a: BootRecord
    title: Volume Boot Record
    description: |-
      A volume boot record (VBR) (also known as a volume boot sector, a partition boot record or a partition boot sector) is a type of boot sector introduced by the IBM Personal Computer. It may be found on a partitioned data storage device, such as a hard disk, or an unpartitioned device, such as a floppy disk, and contains machine code for bootstrapping programs (usually, but not necessarily, operating systems) stored in other parts of the device. On non-partitioned storage devices, it is the first sector of the device. On partitioned devices, it is the first sector of an individual partition on the device, with the first sector of the entire device being a Master Boot Record (MBR) containing the partition table.
    see_also:
      - http://dbpedia.org/resource/Volume_boot_record
    annotations:
      owl_named_individual: "true"

  VolumeSnapshot:
    class_uri: d3f:VolumeSnapshot
    is_a: StorageSnapshot
    title: Volume Snapshot
    description: A volume snapshot is a point-in-time copy of a storage volume.
    see_also:
      - https://en.wikipedia.org/wiki/Shadow_Copy
      - https://kubernetes-csi.github.io/docs/snapshot-restore-feature.html
    annotations:
      owl_named_individual: "true"

  Voting:
    class_uri: d3f:Voting
    is_a: EnsembleLearning
    description: Voting is another form of ensembling.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-VOT"
      kb-article: "## References Ensemble learning. Wikipedia. [Link](https://en.wikipedia.org/wiki/Ensemble_learning)."

  Vulnerability:
    class_uri: d3f:Vulnerability
    is_a: D3FENDCore
    description: |-
      A Vulnerability is a publicly disclosed instance of one or more weaknesses in a product that an attacker could exploit, violating its confidentiality, integrity, or availability.
    annotations:
      owl_named_individual: "true"
    exact_mappings:
      - spdx:Vulnerability
      - stix:Vulnerability

  WatchdogTimer:
    class_uri: d3f:WatchdogTimer
    is_a: Timer
    title: Watchdog Timer
    description: |-
      A watchdog timer (WDT, or simply a watchdog) is an electronic or software timer that is used to detect and recover from computer malfunctions.
    see_also:
      - https://dbpedia.org/resource/Watchdog_timer
    annotations:
      synonym: "Watchdog"

  WatchdogTimerConfigurationEvent:
    class_uri: d3f:WatchdogTimerConfigurationEvent
    is_a: WatchdogTimerEvent
    title: Watchdog Timer Configuration Event
    description: "An event in which a watchdog timer's timeout period or recovery action is configured."

  WatchdogTimerEvent:
    class_uri: d3f:WatchdogTimerEvent
    is_a: TimerEvent
    title: Watchdog Timer Event
    description: |-
      A watchdog timer event is any occurrence in which a watchdog timer is started, updated, reset, expired, or otherwise interacts with the system it monitors, resulting in a state change, status report, or corrective action intended to detect, signal, or recover from abnormal or stalled system behavior.

  WatchdogTimerExpirationEvent:
    class_uri: d3f:WatchdogTimerExpirationEvent
    is_a: WatchdogTimerEvent
    title: Watchdog Timer Expiration Event
    description: An event indicating the watchdog timer was not serviced in time and triggers a reset or escalation action.

  WatchdogTimerResetEvent:
    class_uri: d3f:WatchdogTimerResetEvent
    is_a: WatchdogTimerEvent
    title: Watchdog Timer Reset Event
    description: An event where a watchdog timer is reset as a consequence of watchdog timer expiry or watchdog timer escalation policy.

  WatchdogTimerServiceEvent:
    class_uri: d3f:WatchdogTimerServiceEvent
    is_a: WatchdogTimerEvent
    title: Watchdog Timer Service Event
    description: "An event in which the watchdog timer is serviced (kicked/pet), extending the time until expiry."

  Weakness:
    class_uri: d3f:Weakness
    is_a: D3FENDCore
    description: |-
      A weakness is a condition in a software, firmware, hardware, or service component that, under certain circumstances, could contribute to the introduction of vulnerabilities.
    slots:
      - may-be-weakness-of

  WebAPIResource:
    class_uri: d3f:WebAPIResource
    is_a: WebResource
    title: Web API Resource
    description: |-
      A web API resource is an API resource identified by a Uniform Resource Identifier (URI) and made available from one host to another host via a web protocol and across a network or networks.

  WebAccessToken:
    class_uri: d3f:WebAccessToken
    is_a: SessionToken
    title: Web Access Token
    description: |-
      A web access token is a credential that allows a web client application to access a specific resource to perform specific actions on behalf of the user.
    see_also:
      - http://dbpedia.org/resource/JSON_Web_Token
      - https://auth0.com/blog/id-token-access-token-what-is-the-difference/
    annotations:
      synonym: "WAT"

  WebApplication:
    class_uri: d3f:WebApplication
    is_a: ServiceApplication
    title: Web Application
    description: An application which is delivered by a web server over HTTP protocols that is presented to a client web browser.
    aliases:
      - "Web App"
      - "Web Application"
    see_also:
      - http://dbpedia.org/resource/Web_application
    annotations:
      owl_named_individual: "true"

  WebApplicationFirewall:
    class_uri: d3f:WebApplicationFirewall
    is_a: ApplicationLayerFirewall
    title: Web Application Firewall
    description: |-
      A web application firewall (or WAF) filters, monitors, and blocks HTTP traffic to and from a web application. A WAF is differentiated from a regular firewall in that a WAF is able to filter the content of specific web applications while regular firewalls serve as a safety gate between servers. By inspecting HTTP traffic, it can prevent attacks stemming from web application security flaws, such as SQL injection, cross-site scripting (XSS), file inclusion, and security misconfigurations.
    aliases:
      - "WAF"
    see_also:
      - http://dbpedia.org/resource/Web_application_firewall

  WebApplicationServer:
    class_uri: d3f:WebApplicationServer
    is_a: WebServer
    title: Web Application Server
    description: |-
      A web application server is a web server that hosts applications. Application server frameworks are software frameworks for building application servers. An application server framework provides both facilities to create web applications and a server environment to run them. In the case of Java application servers, the server behaves like an extended virtual machine for running applications, transparently handling connections to the database on one side, and, often, connections to the Web client on the other.
    see_also:
      - http://dbpedia.org/resource/Application_server
    annotations:
      owl_named_individual: "true"

