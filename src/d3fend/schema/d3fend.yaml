    annotations:
      owl_named_individual: "true"

  LongShort_termMemory:
    class_uri: d3f:LongShort-termMemory
    is_a: RecurrentNeuralNetwork
    title: Long Short-term Memory
    description: |-
      Unlike standard feedforward neural networks, LSTM has feedback connections. Such a recurrent neural network (RNN) can process not only single data points (such as images), but also entire sequences of data (such as speech or video). This characteristic makes LSTM networks ideal for processing and predicting data
    aliases:
      - "LongShort-termMemory"
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3A-LSTM"
      kb-article: "## References Wikipedia. (2021, September 29). Long short-term memory. [Link](https://en.wikipedia.org/wiki/Long_short-term_memory)"

  MACAddress:
    class_uri: d3f:MACAddress
    is_a: Identifier
    title: MAC Address
    description: |-
      A media access control address (MAC address) is a unique identifier assigned to a network interface controller (NIC) for use as a network address in communications within a network segment.
    see_also:
