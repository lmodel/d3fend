  KernelEvent:
    class_uri: d3f:KernelEvent
    is_a: DigitalEvent
    title: Kernel Event
    description: |-
      An event involving operations at the kernel level of an operating system, encompassing interactions with core system resources such as drivers, modules, system calls, and other privileged processes. Kernel events are critical for understanding low-level system behavior and ensuring the integrity of the operating environment.
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/kernel_activity
      - https://schema.ocsf.io/classes/kernel_activity

  KernelModule:
    class_uri: d3f:KernelModule
    is_a: ObjectFile
    title: Kernel Module
    description: |-
      A loadable kernel module (LKM) is an object file that contains code to extend the running kernel, or so-called base kernel, of an operating system. LKMs are typically used to add support for new hardware (as device drivers) and/or filesystems, or for adding system calls. When the functionality provided by a LKM is no longer required, it can be unloaded in order to free memory and other resources.

      Most current Unix-like systems and Microsoft Windows support loadable kernel modules, although they might use a different name for them, such as kernel loadable module (kld) in FreeBSD, kernel extension (kext) in macOS,[1] kernel extension module in AIX, kernel-mode driver in Windows NT[2] and downloadable kernel module (DKM) in VxWorks. They are also known as kernel loadable modules (or KLM), and simply as kernel modules (KMOD).
    aliases:
      - "LKM"
      - "Loadable Kernel Module"
    see_also:
      - https://schema.ocsf.io/objects/kernel_driver
      - http://dbpedia.org/resource/Loadable_kernel_module
    annotations:
      owl_named_individual: "true"

  KernelModuleEvent:
    class_uri: d3f:KernelModuleEvent
    is_a: KernelEvent
    title: Kernel Module Event
    description: |-
      An event involving the management of kernel modules, such as the loading or unloading of device drivers, extensions, or other dynamically linked components essential for kernel functionality.
    see_also:
      - https://schema.ocsf.io/1.3.0/classes/kernel_extension
      - https://schema.ocsf.io/classes/kernel_extension_activity

  KernelModuleLoadEvent:
    class_uri: d3f:KernelModuleLoadEvent
    is_a: KernelModuleEvent
    title: Kernel Module Load Event
    description: |-
      An event representing the loading of a kernel module, such as a device driver or dynamically linked extension, into the operating system kernel to extend or modify its capabilities.

  KernelModuleUnloadEvent:
    class_uri: d3f:KernelModuleUnloadEvent
    is_a: KernelModuleEvent
    title: Kernel Module Unload Event
    description: |-
