      - d3f:ExfiltrationTechnique
      - d3f:T1048
      - d3f:T1071
      - d3f:T1573

  CertificateFile:
    class_uri: d3f:CertificateFile
    is_a: File
    title: Certificate File
    description: |-
      A file containing a digital certificate. In cryptography, a public key certificate (also known as a digital certificate or identity certificate) is an electronic document used to prove the ownership of a public key. The certificate includes information about the key, information about its owner's identity, and the digital signature of an entity that has verified the certificate's contents are correct. If the signature is valid, and the person examining the certificate trusts the signer, then they know they can use that key to communicate with its owner.
    see_also:
      - http://dbpedia.org/resource/Public_key_certificate
    annotations:
      owl_named_individual: "true"
    close_mappings:
      - stix:X509Certificate
      - unified_cyber_ontology:X509Certificate

  CertificatePinning:
    class_uri: d3f:CertificatePinning
    is_a: CredentialHardening
    title: Certificate Pinning
    description: |-
      Persisting either a server's X.509 certificate or their public key and comparing that to server's presented identity to allow for greater client confidence in the remote server's identity for SSL connections.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CP"
      kb-article: "## How it works Pinning allows for a trusted copy of a certificate or public key to be associated with a server and thus reducing the likelihood of frequently visited sites being subjected to man-in-the-middle attacks. Certificates or public keys can be pinned after a trusted connection has been est"

  CertificateRotation:
    class_uri: d3f:CertificateRotation
    is_a: CredentialRotation
    title: Certificate Rotation
    description: |-
      Certificate rotation involves replacing digital certificates and their private keys to maintain cryptographic integrity and trust, mitigating key compromise risks and ensuring continuous secure communications.
    see_also:
      - https://docs.couchbase.com/server/7.0/manage/manage-security/rotate-server-certificates.html
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CERO"
      kb-article: "## How it works Certificate rotation should be performed when: - Any certificate expires. - A new CA authority is substituted for the old, thus requiring a replacement root certificate. - New or modified constraints need to be imposed on one or more certificates. - A security breach has occurred."

  CertificateTrustStore:
    class_uri: d3f:CertificateTrustStore
    is_a: TrustStore
    title: Certificate Trust Store
    description: |-
      A certificate truststore is used to store public certificates used to authenticate clients by the server for an SSL connection.
    see_also:
      - http://dbpedia.org/resource/Public_key_certificate
      - https://www.educative.io/edpresso/keystore-vs-truststore
    annotations:
      owl_named_individual: "true"

  ChangeDefaultPassword:
    class_uri: d3f:ChangeDefaultPassword
    is_a: StrongPasswordPolicy
    title: Change Default Password
    description: |-
      Changing the default password means replacing the factory-set credentials with a strong, unique password before the device is deployed, preventing unauthorized access.
    annotations:
      owl_named_individual: "true"
      d3fend-id: "D3-CDP"
      kb-article: "## How it works Change the default password as soon as a new device is received. The default credentials are normally documented in an instruction manual that is either packaged with the device, published online through official means, or published online through unofficial means. ## Considerations"
    related_mappings:
