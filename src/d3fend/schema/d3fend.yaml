  HardwareDevice:
    class_uri: d3f:HardwareDevice
    is_a: DigitalInformationBearer
    mixins:
      - PhysicalArtifact
    title: Hardware Device
    description: |-
      Hardware devices are the physical artifacts that constitute a network or computer system. Hardware devices are the physical parts or components of a computer, such as the monitor, keyboard, computer data storage, hard disk drive (HDD), graphic cards, sound cards, memory (RAM), motherboard, and so on, all of which are tangible physical objects. By contrast, software is instructions that can be stored and run by hardware. Hardware is directed by the software to execute any command or instruction. A combination of hardware and software forms a usable computing system.
    see_also:
      - https://schema.ocsf.io/objects/device_hw_info
      - http://dbpedia.org/resource/Computer_hardware
    annotations:
      owl_named_individual: "true"
    broad_mappings:
      - unified_cyber_ontology:Device

  HardwareDeviceBindEvent:
    class_uri: d3f:HardwareDeviceBindEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Bind Event
    description: |-
      An event where a device is logically bound to a system or process, typically for exclusive use or integration with specific software components.

  HardwareDeviceConfiguration:
    class_uri: d3f:HardwareDeviceConfiguration
    is_a: ConfigurationResource
    title: Hardware Device Configuration
    description: Information used to configure the parameters and settings for hardware devices.

  HardwareDeviceConnectionEvent:
    class_uri: d3f:HardwareDeviceConnectionEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Connection Event
    description: |-
      An event representing the physical or logical attachment of a device to a system, enabling its operational functionality.

  HardwareDeviceDisabledEvent:
    class_uri: d3f:HardwareDeviceDisabledEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Disabled Event
    description: |-
      An event where a device transitions to an inactive or unavailable state, often due to deactivation, failure, or maintenance.

  HardwareDeviceDisconnectionEvent:
    class_uri: d3f:HardwareDeviceDisconnectionEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Disconnection Event
    description: "An event representing the removal of a device from a system, ceasing its operational functionality or availability."

  HardwareDeviceEnabledEvent:
    class_uri: d3f:HardwareDeviceEnabledEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Enabled Event
    description: |-
      An event where a device becomes operational and available for use, typically following initialization, activation, or repair.

  HardwareDeviceEvent:
    class_uri: d3f:HardwareDeviceEvent
    is_a: DigitalEvent
    title: Hardware Device Event
    description: |-
      An event capturing the existence, state, or interaction of hardware or virtual devices within a system. Device events encompass activities such as discovery, connection, disconnection, operational state changes, or configuration modifications, providing visibility into device behavior and health.

  HardwareDeviceMoveEvent:
    class_uri: d3f:HardwareDeviceMoveEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Move Event
    description: |-
      An event where a device is relocated or reassigned within a system or network, potentially affecting its operational scope or connectivity.

  HardwareDeviceStateEvent:
    class_uri: d3f:HardwareDeviceStateEvent
    is_a: HardwareDeviceEvent
    title: Hardware Device State Event
    description: |-
      An event involving a change to a device's state, such as connection, disconnection, modification, or operational state transitions (e.g., online or offline). Device state events provide visibility into device availability and operational conditions.

  HardwareDeviceUnbindEvent:
    class_uri: d3f:HardwareDeviceUnbindEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Unbind Event
    description: "An event where a device is logically unbound from a system or process, releasing it from exclusive use or integration."

  HardwareDeviceUpdateEvent:
    class_uri: d3f:HardwareDeviceUpdateEvent
    is_a: HardwareDeviceStateEvent
    title: Hardware Device Update Event
    description: |-
      An event capturing updates or changes to a device's configuration, properties, or state, including firmware updates, reconfigurations, or optimizations.

  HardwareDriver:
    class_uri: d3f:HardwareDriver
    is_a: DigitalInformationBearer
    title: Hardware Driver
    description: |-
      In computing, a device driver (commonly referred to simply as a driver) is a computer program that operates or controls a particular type of device that is attached to a computer. A driver provides a software interface to hardware devices, enabling operating systems and other computer programs to access hardware functions without needing to know precise details of the hardware being used. A driver communicates with the device through the computer bus or communications subsystem to which the hardware connects. When a calling program invokes a routine in the driver, the driver issues commands to the device. Once the device sends data back to the driver, the driver may invoke routines in the original calling program. Drivers are hardware dependent and operating-system-specific. They usually provide the interrupt handling required for any necessary asynchronous time-dependent hardware interface.
    aliases:
      - "Device Driver"
    see_also:
      - http://dbpedia.org/resource/Device_driver
    annotations:
      owl_named_individual: "true"

  HardwareTimer:
    class_uri: d3f:HardwareTimer
    is_a: HardwareDevice
    mixins:
      - Timer
    title: Hardware Timer
    description: |-
      A hardware timer is defined as an electronic component that serves as an 8-bit or 16-bit counter, capable of measuring time intervals, generating timed outputs, and driving loads through mechanisms such as pulse width modulation (PWM).
    see_also:
      - https://www.sciencedirect.com/topics/engineering/hardware-timer

  HardwareTimerConfigurationEvent:
    class_uri: d3f:HardwareTimerConfigurationEvent
    is_a: HardwareTimerEvent
    title: Hardware Timer Configuration Event
    description: "An event in which a hardware timer's registers or operational parameters are programmed or modified."

