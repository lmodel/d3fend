    description: |-
      Sensitive memory is cleared according to the source code, but compiler optimizations leave the memory untouched when it is not read from again, aka "dead store removal."
    aliases:
      - "CWE-14"
    annotations:
      cwe-id: "CWE-14"
    exact_mappings:
      - cwe:CWE-14

  CWE_140:
    class_uri: d3f:CWE-140
    is_a: CWE_138
    title: Improper Neutralization of Delimiters
    description: The product does not neutralize or incorrectly neutralizes delimiters.
    aliases:
      - "CWE-140"
    annotations:
      cwe-id: "CWE-140"
    exact_mappings:
      - cwe:CWE-140

  CWE_141:
    class_uri: d3f:CWE-141
    is_a: CWE_140
    title: Improper Neutralization of Parameter/Argument Delimiters
    description: |-
      The product receives input from an upstream component, but it does not neutralize or incorrectly neutralizes special elements that could be interpreted as parameter or argument delimiters when they are sent to a downstream component.
    aliases:
      - "CWE-141"
    annotations:
      cwe-id: "CWE-141"
    exact_mappings:
      - cwe:CWE-141

  CWE_1419:
    class_uri: d3f:CWE-1419
    is_a: CWE_665
    title: Incorrect Initialization of Resource
    description: |-
      The product attempts to initialize a resource but does not correctly do so, which might leave the resource in an unexpected, incorrect, or insecure state when it is accessed.
    aliases:
      - "CWE-1419"
    annotations:
      cwe-id: "CWE-1419"
    exact_mappings:
      - cwe:CWE-1419

  CWE_142:
    class_uri: d3f:CWE-142
    is_a: CWE_140
