    class_uri: d3f:CWE-609
    is_a: CWE_667
    title: Double-Checked Locking
    description: |-
      The product uses double-checked locking to access a resource without the overhead of explicit synchronization, but the locking is insufficient.
    aliases:
      - "CWE-609"
    annotations:
      cwe-id: "CWE-609"
    exact_mappings:
      - cwe:CWE-609

  CWE_61:
    class_uri: d3f:CWE-61
    is_a: CWE_59
    title: UNIX Symbolic Link (Symlink) Following
    description: |-
      The product, when opening a file or directory, does not sufficiently account for when the file is a symbolic link that resolves to a target outside of the intended control sphere. This could allow an attacker to cause the product to operate on unauthorized files.
    aliases:
      - "CWE-61"
    annotations:
      cwe-id: "CWE-61"
      synonym: "Symlink following"
    exact_mappings:
      - cwe:CWE-61

  CWE_610:
    class_uri: d3f:CWE-610
    is_a: CWE_664
    title: Externally Controlled Reference to a Resource in Another Sphere
    description: |-
      The product uses an externally controlled name or reference that resolves to a resource that is outside of the intended control sphere.
    aliases:
      - "CWE-610"
    annotations:
      cwe-id: "CWE-610"
    exact_mappings:
      - cwe:CWE-610

  CWE_611:
    class_uri: d3f:CWE-611
    is_a: CWE_610
    title: Improper Restriction of XML External Entity Reference
    description: |-
      The product processes an XML document that can contain XML entities with URIs that resolve to documents outside of the intended sphere of control, causing the product to embed incorrect documents into its output.
    aliases:
      - "CWE-611"
    annotations:
      owl_named_individual: "true"
      cwe-id: "CWE-611"
      synonym: "XXE"
    exact_mappings:
      - cwe:CWE-611

  CWE_612:
    class_uri: d3f:CWE-612
    is_a: CWE_1230
    title: Improper Authorization of Index Containing Sensitive Information
    description: |-
      The product creates a search index of private or sensitive documents, but it does not properly limit index access to actors who are authorized to see the original information.
    aliases:
      - "CWE-612"
    annotations:
      cwe-id: "CWE-612"
    exact_mappings:
      - cwe:CWE-612

  CWE_613:
    class_uri: d3f:CWE-613
    is_a: CWE_672
    title: Insufficient Session Expiration
    description: |-
      According to WASC, "Insufficient Session Expiration is when a web site permits an attacker to reuse old session credentials or session IDs for authorization."
    aliases:
      - "CWE-613"
    annotations:
      cwe-id: "CWE-613"
    exact_mappings:
      - cwe:CWE-613

  CWE_614:
    class_uri: d3f:CWE-614
    is_a: CWE_319
    title: "Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
    description: |-
      The Secure attribute for sensitive cookies in HTTPS sessions is not set, which could cause the user agent to send those cookies in plaintext over an HTTP session.
    aliases:
      - "CWE-614"
    annotations:
      cwe-id: "CWE-614"
    exact_mappings:
      - cwe:CWE-614

  CWE_615:
    class_uri: d3f:CWE-615
    is_a: CWE_540
    title: Inclusion of Sensitive Information in Source Code Comments
    description: |-
      While adding general comments is very useful, some programmers tend to leave important data, such as: filenames related to the web application, old links or links which were not meant to be browsed by users, old code fragments, etc.
    aliases:
      - "CWE-615"
    annotations:
      cwe-id: "CWE-615"
    exact_mappings:
      - cwe:CWE-615

  CWE_616:
    class_uri: d3f:CWE-616
    is_a: CWE_345
    title: Incomplete Identification of Uploaded File Variables (PHP)
    description: |-
      The PHP application uses an old method for processing uploaded files by referencing the four global variables that are set for each file (e.g. $varname, $varname_size, $varname_name, $varname_type). These variables could be overwritten by attackers, causing the application to process unauthorized files.
    aliases:
      - "CWE-616"
    annotations:
      cwe-id: "CWE-616"
    exact_mappings:
      - cwe:CWE-616

  CWE_617:
    class_uri: d3f:CWE-617
    is_a: CWE_670
    title: Reachable Assertion
    description: |-
      The product contains an assert() or similar statement that can be triggered by an attacker, which leads to an application exit or other behavior that is more severe than necessary.
    aliases:
      - "CWE-617"
    annotations:
      cwe-id: "CWE-617"
      synonym: "assertion failure"
    exact_mappings:
      - cwe:CWE-617

  CWE_618:
    class_uri: d3f:CWE-618
    is_a: CWE_749
    title: Exposed Unsafe ActiveX Method
    description: |-
      An ActiveX control is intended for use in a web browser, but it exposes dangerous methods that perform actions that are outside of the browser's security model (e.g. the zone or domain).
    aliases:
      - "CWE-618"
    annotations:
      cwe-id: "CWE-618"
    exact_mappings:
      - cwe:CWE-618

  CWE_619:
    class_uri: d3f:CWE-619
    is_a: CWE_402
    title: "Dangling Database Cursor ('Cursor Injection')"
    description: |-
      If a database cursor is not closed properly, then it could become accessible to other users while retaining the same privileges that were originally assigned, leaving the cursor "dangling."
    aliases:
      - "CWE-619"
    annotations:
      cwe-id: "CWE-619"
    exact_mappings:
      - cwe:CWE-619

  CWE_62:
    class_uri: d3f:CWE-62
    is_a: CWE_59
    title: UNIX Hard Link
    description: |-
      The product, when opening a file or directory, does not sufficiently account for when the name is associated with a hard link to a target that is outside of the intended control sphere. This could allow an attacker to cause the product to operate on unauthorized files.
    aliases:
      - "CWE-62"
    annotations:
      cwe-id: "CWE-62"
    exact_mappings:
      - cwe:CWE-62

  CWE_620:
    class_uri: d3f:CWE-620
    is_a: CWE_1390
    title: Unverified Password Change
    description: |-
      When setting a new password for a user, the product does not require knowledge of the original password, or using another form of authentication.
    aliases:
      - "CWE-620"
    annotations:
      cwe-id: "CWE-620"
    exact_mappings:
      - cwe:CWE-620

  CWE_621:
    class_uri: d3f:CWE-621
    is_a: CWE_914
    title: Variable Extraction Error
    description: |-
      The product uses external input to determine the names of variables into which information is extracted, without verifying that the names of the specified variables are valid. This could cause the program to overwrite unintended variables.
    aliases:
      - "CWE-621"
    annotations:
      cwe-id: "CWE-621"
      synonym: "Variable overwrite"
    exact_mappings:
      - cwe:CWE-621

  CWE_622:
    class_uri: d3f:CWE-622
    is_a: CWE_20
    title: Improper Validation of Function Hook Arguments
    description: |-
      The product adds hooks to user-accessible API functions, but it does not properly validate the arguments. This could lead to resultant vulnerabilities.
    aliases:
      - "CWE-622"
    annotations:
      cwe-id: "CWE-622"
    exact_mappings:
      - cwe:CWE-622

  CWE_623:
    class_uri: d3f:CWE-623
    is_a: CWE_267
    title: Unsafe ActiveX Control Marked Safe For Scripting
    description: "An ActiveX control is intended for restricted use, but it has been marked as safe-for-scripting."
    aliases:
      - "CWE-623"
    annotations:
      cwe-id: "CWE-623"
    exact_mappings:
      - cwe:CWE-623

  CWE_624:
    class_uri: d3f:CWE-624
    is_a: CWE_77
    title: Executable Regular Expression Error
    description: |-
      The product uses a regular expression that either (1) contains an executable component with user-controlled inputs, or (2) allows a user to enable execution by inserting pattern modifiers.
    aliases:
      - "CWE-624"
    annotations:
      cwe-id: "CWE-624"
    exact_mappings:
      - cwe:CWE-624

  CWE_625:
    class_uri: d3f:CWE-625
    is_a: CWE_185
    title: Permissive Regular Expression
    description: The product uses a regular expression that does not sufficiently restrict the set of allowed values.
    aliases:
      - "CWE-625"
    annotations:
      cwe-id: "CWE-625"
    exact_mappings:
      - cwe:CWE-625

  CWE_626:
    class_uri: d3f:CWE-626
    is_a: CWE_147
    mixins:
      - CWE_436
    title: Null Byte Interaction Error (Poison Null Byte)
    description: |-
      The product does not properly handle null bytes or NUL characters when passing data between different representations or components.
    aliases:
      - "CWE-626"
    annotations:
      cwe-id: "CWE-626"
    exact_mappings:
      - cwe:CWE-626

  CWE_627:
    class_uri: d3f:CWE-627
    is_a: CWE_914
    title: Dynamic Variable Evaluation
    description: |-
      In a language where the user can influence the name of a variable at runtime, if the variable names are not controlled, an attacker can read or write to arbitrary variables, or access arbitrary functions.
    aliases:
      - "CWE-627"
    annotations:
      cwe-id: "CWE-627"
      synonym: "Dynamic evaluation"
    exact_mappings:
      - cwe:CWE-627

  CWE_628:
    class_uri: d3f:CWE-628
    is_a: CWE_573
    title: Function Call with Incorrectly Specified Arguments
    description: |-
      The product calls a function, procedure, or routine with arguments that are not correctly specified, leading to always-incorrect behavior and resultant weaknesses.
    aliases:
      - "CWE-628"
    annotations:
      cwe-id: "CWE-628"
    exact_mappings:
      - cwe:CWE-628

  CWE_636:
    class_uri: d3f:CWE-636
    is_a: CWE_657
    mixins:
      - CWE_755
    title: "Not Failing Securely ('Failing Open')"
    description: |-
      When the product encounters an error condition or failure, its design requires it to fall back to a state that is less secure than other options that are available, such as selecting the weakest encryption algorithm or using the most permissive access control restrictions.
    aliases:
      - "CWE-636"
    annotations:
      cwe-id: "CWE-636"
      synonym: "Failing Open"
    exact_mappings:
      - cwe:CWE-636

  CWE_637:
    class_uri: d3f:CWE-637
    is_a: CWE_657
    title: "Unnecessary Complexity in Protection Mechanism (Not Using 'Economy of Mechanism')"
    description: |-
      The product uses a more complex mechanism than necessary, which could lead to resultant weaknesses when the mechanism is not correctly understood, modeled, configured, implemented, or used.
    aliases:
      - "CWE-637"
    annotations:
      cwe-id: "CWE-637"
      synonym: "Unnecessary Complexity"
    exact_mappings:
      - cwe:CWE-637

  CWE_638:
    class_uri: d3f:CWE-638
    is_a: CWE_657
    mixins:
      - CWE_862
    title: Not Using Complete Mediation
    description: |-
      The product does not perform access checks on a resource every time the resource is accessed by an entity, which can create resultant weaknesses if that entity's rights or privileges change over time.
    aliases:
      - "CWE-638"
    annotations:
      cwe-id: "CWE-638"
    exact_mappings:
      - cwe:CWE-638

  CWE_639:
    class_uri: d3f:CWE-639
    is_a: CWE_863
    title: Authorization Bypass Through User-Controlled Key
    description: |-
      The system's authorization functionality does not prevent one user from gaining access to another user's data or record by modifying the key value identifying the data.
    aliases:
      - "CWE-639"
    annotations:
      cwe-id: "CWE-639"
      synonym: "Broken Object Level Authorization / BOLA"
    exact_mappings:
      - cwe:CWE-639

  CWE_64:
    class_uri: d3f:CWE-64
    is_a: CWE_59
    title: Windows Shortcut Following (.LNK)
    description: |-
      The product, when opening a file or directory, does not sufficiently handle when the file is a Windows shortcut (.LNK) whose target is outside of the intended control sphere. This could allow an attacker to cause the product to operate on unauthorized files.
    aliases:
      - "CWE-64"
    annotations:
      cwe-id: "CWE-64"
      synonym: "Windows symbolic link following"
    exact_mappings:
      - cwe:CWE-64

  CWE_640:
    class_uri: d3f:CWE-640
    is_a: CWE_1390
    title: Weak Password Recovery Mechanism for Forgotten Password
    description: |-
      The product contains a mechanism for users to recover or change their passwords without knowing the original password, but the mechanism is weak.
    aliases:
      - "CWE-640"
    annotations:
      cwe-id: "CWE-640"
    exact_mappings:
      - cwe:CWE-640

  CWE_641:
    class_uri: d3f:CWE-641
    is_a: CWE_99
    title: Improper Restriction of Names for Files and Other Resources
    description: |-
      The product constructs the name of a file or other resource using input from an upstream component, but it does not restrict or incorrectly restricts the resulting name.
    aliases:
      - "CWE-641"
    annotations:
      cwe-id: "CWE-641"
    exact_mappings:
      - cwe:CWE-641

  CWE_642:
    class_uri: d3f:CWE-642
    is_a: CWE_668
    title: External Control of Critical State Data
    description: |-
      The product stores security-critical state information about its users, or the product itself, in a location that is accessible to unauthorized actors.
    aliases:
      - "CWE-642"
    annotations:
      cwe-id: "CWE-642"
    exact_mappings:
      - cwe:CWE-642

  CWE_643:
    class_uri: d3f:CWE-643
    is_a: CWE_91
    mixins:
      - CWE_943
    title: "Improper Neutralization of Data within XPath Expressions ('XPath Injection')"
    description: |-
      The product uses external input to dynamically construct an XPath expression used to retrieve data from an XML database, but it does not neutralize or incorrectly neutralizes that input. This allows an attacker to control the structure of the query.
    aliases:
      - "CWE-643"
    annotations:
      cwe-id: "CWE-643"
    exact_mappings:
      - cwe:CWE-643

  CWE_644:
    class_uri: d3f:CWE-644
    is_a: CWE_116
    title: Improper Neutralization of HTTP Headers for Scripting Syntax
    description: |-
      The product does not neutralize or incorrectly neutralizes web scripting syntax in HTTP headers that can be used by web browser components that can process raw headers, such as Flash.
    aliases:
      - "CWE-644"
    annotations:
      cwe-id: "CWE-644"
    exact_mappings:
      - cwe:CWE-644

  CWE_645:
    class_uri: d3f:CWE-645
    is_a: CWE_287
    title: Overly Restrictive Account Lockout Mechanism
    description: |-
      The product contains an account lockout protection mechanism, but the mechanism is too restrictive and can be triggered too easily, which allows attackers to deny service to legitimate users by causing their accounts to be locked out.
    aliases:
      - "CWE-645"
    annotations:
      cwe-id: "CWE-645"
    exact_mappings:
      - cwe:CWE-645

  CWE_646:
    class_uri: d3f:CWE-646
    is_a: CWE_345
    title: Reliance on File Name or Extension of Externally-Supplied File
    description: |-
      The product allows a file to be uploaded, but it relies on the file name or extension of the file to determine the appropriate behaviors. This could be used by attackers to cause the file to be misclassified and processed in a dangerous fashion.
    aliases:
      - "CWE-646"
    annotations:
      cwe-id: "CWE-646"
    exact_mappings:
      - cwe:CWE-646

  CWE_647:
    class_uri: d3f:CWE-647
    is_a: CWE_863
    title: Use of Non-Canonical URL Paths for Authorization Decisions
    description: |-
      The product defines policy namespaces and makes authorization decisions based on the assumption that a URL is canonical. This can allow a non-canonical URL to bypass the authorization.
    aliases:
      - "CWE-647"
    annotations:
      cwe-id: "CWE-647"
    exact_mappings:
      - cwe:CWE-647

  CWE_648:
    class_uri: d3f:CWE-648
    is_a: CWE_269
    title: Incorrect Use of Privileged APIs
    description: |-
      The product does not conform to the API requirements for a function call that requires extra privileges. This could allow attackers to gain privileges by causing the function to be called incorrectly.
    aliases:
      - "CWE-648"
    annotations:
      cwe-id: "CWE-648"
    exact_mappings:
      - cwe:CWE-648

  CWE_649:
    class_uri: d3f:CWE-649
    is_a: CWE_345
    title: Reliance on Obfuscation or Encryption of Security-Relevant Inputs without Integrity Checking
    description: |-
      The product uses obfuscation or encryption of inputs that should not be mutable by an external actor, but the product does not use integrity checks to detect if those inputs have been modified.
    aliases:
      - "CWE-649"
    annotations:
      cwe-id: "CWE-649"
    exact_mappings:
      - cwe:CWE-649

  CWE_65:
    class_uri: d3f:CWE-65
    is_a: CWE_59
    title: Windows Hard Link
    description: |-
      The product, when opening a file or directory, does not sufficiently handle when the name is associated with a hard link to a target that is outside of the intended control sphere. This could allow an attacker to cause the product to operate on unauthorized files.
    aliases:
      - "CWE-65"
    annotations:
      cwe-id: "CWE-65"
    exact_mappings:
      - cwe:CWE-65

  CWE_650:
    class_uri: d3f:CWE-650
    is_a: CWE_436
    title: Trusting HTTP Permission Methods on the Server Side
    description: |-
      The server contains a protection mechanism that assumes that any URI that is accessed using HTTP GET will not cause a state change to the associated resource. This might allow attackers to bypass intended access restrictions and conduct resource modification and deletion attacks, since some applications allow GET to modify state.
    aliases:
      - "CWE-650"
    annotations:
      cwe-id: "CWE-650"
    exact_mappings:
      - cwe:CWE-650

  CWE_651:
    class_uri: d3f:CWE-651
    is_a: CWE_538
    title: Exposure of WSDL File Containing Sensitive Information
    description: |-
      The Web services architecture may require exposing a Web Service Definition Language (WSDL) file that contains information on the publicly accessible services and how callers of these services should interact with them (e.g. what parameters they expect and what types they return).
    aliases:
      - "CWE-651"
    annotations:
      cwe-id: "CWE-651"
    exact_mappings:
      - cwe:CWE-651

  CWE_652:
    class_uri: d3f:CWE-652
    is_a: CWE_91
    mixins:
      - CWE_943
    title: "Improper Neutralization of Data within XQuery Expressions ('XQuery Injection')"
    description: |-
      The product uses external input to dynamically construct an XQuery expression used to retrieve data from an XML database, but it does not neutralize or incorrectly neutralizes that input. This allows an attacker to control the structure of the query.
    aliases:
      - "CWE-652"
    annotations:
      cwe-id: "CWE-652"
    exact_mappings:
      - cwe:CWE-652

  CWE_653:
    class_uri: d3f:CWE-653
    is_a: CWE_657
    mixins:
      - CWE_693
    title: Improper Isolation or Compartmentalization
    description: |-
      The product does not properly compartmentalize or isolate functionality, processes, or resources that require different privilege levels, rights, or permissions.
    aliases:
      - "CWE-653"
    annotations:
      cwe-id: "CWE-653"
      synonym: "Separation of Privilege"
    exact_mappings:
      - cwe:CWE-653

  CWE_654:
    class_uri: d3f:CWE-654
    is_a: CWE_657
    mixins:
      - CWE_693
    title: Reliance on a Single Factor in a Security Decision
    description: |-
      A protection mechanism relies exclusively, or to a large extent, on the evaluation of a single condition or the integrity of a single object or entity in order to make a decision about granting access to restricted resources or functionality.
    aliases:
      - "CWE-654"
    annotations:
      cwe-id: "CWE-654"
      synonym: "Separation of Privilege"
    exact_mappings:
      - cwe:CWE-654

  CWE_655:
    class_uri: d3f:CWE-655
    is_a: CWE_657
    mixins:
      - CWE_693
    title: Insufficient Psychological Acceptability
    description: |-
      The product has a protection mechanism that is too difficult or inconvenient to use, encouraging non-malicious users to disable or bypass the mechanism, whether by accident or on purpose.
    aliases:
      - "CWE-655"
    annotations:
      cwe-id: "CWE-655"
    exact_mappings:
      - cwe:CWE-655

  CWE_656:
    class_uri: d3f:CWE-656
    is_a: CWE_657
    mixins:
      - CWE_693
    title: Reliance on Security Through Obscurity
    description: |-
      The product uses a protection mechanism whose strength depends heavily on its obscurity, such that knowledge of its algorithms or key data is sufficient to defeat the mechanism.
    aliases:
      - "CWE-656"
    annotations:
      cwe-id: "CWE-656"
      synonym: "Never Assuming your secrets are safe"
    exact_mappings:
      - cwe:CWE-656

  CWE_657:
    class_uri: d3f:CWE-657
    is_a: CWE_710
    title: Violation of Secure Design Principles
    description: The product violates well-established principles for secure design.
    aliases:
      - "CWE-657"
    annotations:
      cwe-id: "CWE-657"
    exact_mappings:
      - cwe:CWE-657

  CWE_66:
    class_uri: d3f:CWE-66
    is_a: CWE_706
    title: Improper Handling of File Names that Identify Virtual Resources
    description: |-
      The product does not handle or incorrectly handles a file name that identifies a "virtual" resource that is not directly specified within the directory that is associated with the file name, causing the product to perform file-based operations on a resource that is not a file.
    aliases:
      - "CWE-66"
    annotations:
      cwe-id: "CWE-66"
    exact_mappings:
      - cwe:CWE-66

  CWE_662:
    class_uri: d3f:CWE-662
    is_a: CWE_664
    mixins:
      - CWE_691
    title: Improper Synchronization
    description: |-
      The product utilizes multiple threads or processes to allow temporary access to a shared resource that can only be exclusive to one process at a time, but it does not properly synchronize these actions, which might cause simultaneous accesses of this resource by multiple threads or processes.
    aliases:
      - "CWE-662"
    annotations:
      cwe-id: "CWE-662"
    exact_mappings:
      - cwe:CWE-662

  CWE_663:
    class_uri: d3f:CWE-663
    is_a: CWE_662
    title: Use of a Non-reentrant Function in a Concurrent Context
    description: |-
      The product calls a non-reentrant function in a concurrent context in which a competing code sequence (e.g. thread or signal handler) may have an opportunity to call the same function or otherwise influence its state.
    aliases:
      - "CWE-663"
    annotations:
      cwe-id: "CWE-663"
    exact_mappings:
      - cwe:CWE-663

  CWE_664:
    class_uri: d3f:CWE-664
    is_a: Weakness
    title: Improper Control of a Resource Through its Lifetime
    description: |-
      The product does not maintain or incorrectly maintains control over a resource throughout its lifetime of creation, use, and release.
    aliases:
      - "CWE-664"
    annotations:
      cwe-id: "CWE-664"
    exact_mappings:
      - cwe:CWE-664

  CWE_665:
    class_uri: d3f:CWE-665
    is_a: CWE_664
    title: Improper Initialization
    description: |-
      The product does not initialize or incorrectly initializes a resource, which might leave the resource in an unexpected state when it is accessed or used.
    aliases:
      - "CWE-665"
    annotations:
      cwe-id: "CWE-665"
    exact_mappings:
      - cwe:CWE-665

  CWE_666:
    class_uri: d3f:CWE-666
    is_a: CWE_664
    title: Operation on Resource in Wrong Phase of Lifetime
    description: |-
      The product performs an operation on a resource at the wrong phase of the resource's lifecycle, which can lead to unexpected behaviors.
    aliases:
      - "CWE-666"
    annotations:
      cwe-id: "CWE-666"
    exact_mappings:
      - cwe:CWE-666

  CWE_667:
    class_uri: d3f:CWE-667
    is_a: CWE_662
    title: Improper Locking
    description: |-
      The product does not properly acquire or release a lock on a resource, leading to unexpected resource state changes and behaviors.
    aliases:
      - "CWE-667"
    annotations:
      cwe-id: "CWE-667"
