    aliases:
      - "CWE-1291"
    annotations:
      cwe-id: "CWE-1291"
    exact_mappings:
      - cwe:CWE-1291

  CWE_1292:
    class_uri: d3f:CWE-1292
    is_a: CWE_284
    title: Incorrect Conversion of Security Identifiers
    description: |-
      The product implements a conversion mechanism to map certain bus-transaction signals to security identifiers. However, if the conversion is incorrectly implemented, untrusted agents can gain unauthorized access to the asset.
    aliases:
      - "CWE-1292"
    annotations:
      cwe-id: "CWE-1292"
    exact_mappings:
      - cwe:CWE-1292

  CWE_1293:
