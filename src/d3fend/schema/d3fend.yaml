  T1064:
    class_uri: d3f:T1064
    is_a: DefenseEvasionTechnique
    mixins:
      - ExecutionTechnique
    title: Scripting
    description: |-
      **This technique has been deprecated. Please use [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059) where appropriate.**
    comments:
      - "**This technique has been deprecated. Please use [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059) where appropriate.**"
    annotations:
